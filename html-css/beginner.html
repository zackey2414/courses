code:"<div class=\"layout\">\n  <header class=\"l-header\">ヘッダー</header>\n  <aside class=\"l-sidebar\">サイドバー</aside>\n  <main class=\"l-main\">メインコンテンツ</main>\n  <footer class=\"l-footer\">フッター</footer>\n</div>",

answer:".responsive-grid {\n  display: grid;\n  grid-template-columns: 1fr; /* スマホ: 1カラム */\n  gap: 16px;\n}\n\n@media (min-width: 768px) {\n  .responsive-grid {\n    grid-template-columns: repeat(2, 1fr); /* タブレット: 2カラム */\n  }\n}\n\n@media (min-width: 1024px) {\n  .responsive-grid {\n    grid-template-columns: repeat(3, 1fr); /* デスクトップ: 3カラム */\n  }\n}\n\n.card {\n  background: #fff;\n  border-radius: 10px;\n  padding: 20px;\n  box-shadow: 0 2px 8px rgba(0,0,0,0.06);\n}"},
  {diff:2,q:"clamp()とrem単位を使って、スマホで16px・デスクトップで24pxの間を流動的に変化するフォントサイズと、vw/vh単位を使ったヒーローセクションを書け。",
code:"/* clamp() と rem / vw / vh を使った流動的なデザイン */",
answer:"/* 流動的なフォントサイズ */\n:root {\n  font-size: 16px; /* 1rem = 16px */\n}\n\nh1 {\n  font-size: clamp(1rem, 2.5vw, 1.5rem);\n  /* 最小16px, 流動2.5vw, 最大24px */\n}\n\n/* ヒーローセクション */\n.hero {\n  width: 100%;\n  min-height: 100vh;         /* ビューポートの高さ全体 */\n  padding: 0 5vw;            /* 左右に5vwのパディング */\n  display: flex;\n  align-items: center;\n  background: linear-gradient(135deg, #1e1b4b, #4c1d95);\n  color: #fff;\n}\n\n.hero h1 {\n  font-size: clamp(1.5rem, 5vw, 3rem);\n  line-height: 1.2;\n}"},

  {diff:2,q:"transitionと@keyframesを使ってボタンにホバーエフェクトと、カードの「フェードインスライドアップ」アニメーションを実装せよ。",
code:"<button class=\"btn\">ホバーしてね</button>\n<div class=\"animated-card\">アニメーションカード</div>",
answer:".btn {\n  background: #6366f1;\n  color: #fff;\n  border: none;\n  padding: 12px 24px;\n  border-radius: 8px;\n  cursor: pointer;\n  font-size: 15px;\n  transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;\n}\n\n.btn:hover {\n  transform: translateY(-2px);\n  box-shadow: 0 6px 20px rgba(99,102,241,0.4);\n  background: #4f46e5;\n}\n\n@keyframes fadeInUp {\n  from {\n    opacity: 0;\n    transform: translateY(20px);\n  }\n  to {\n    opacity: 1;\n    transform: translateY(0);\n  }\n}\n\n.animated-card {\n  background: #fff;\n  border-radius: 10px;\n  padding: 20px;\n  animation: fadeInUp 0.5s ease forwards;\n}"},

{title:"ブラウザとHTMLの関係",

code:"<!DOCTYPE html>\n<html lang=\"ja\">\n<head>\n  <link rel=\"stylesheet\" href=\"../assets/course.css\">\n  <!-- ブラウザへのメタ情報 -->\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n  <title>タブに表示されるタイトル</title>\n</head>\n<body>\n  <!-- ユーザーに見える内容 -->\n  <h1>最大の見出し</h1>\n  <p>段落テキスト。<a href=\"https://example.com\">リンク</a></p>\n  <img src=\"photo.jpg\" alt=\"写真の説明（アクセシビリティのため必須）\">\n</body>\n</html>",
afterCode:"DOCTYPE宣言はHTML5であることをブラウザに伝えます。これがないと「後方互換モード（Quirks Mode）」で動作し、CSSの計算が変わる場合があります。lang=\"ja\"は検索エンジンや読み上げソフトが言語を判断するために使います。"},
{title:"テキストとリストの基本タグ",
body:"HTMLのタグは意味（セマンティクス）を持ちます。h1〜h6は見出しレベルを表し、検索エンジン（SEO）にとってページ構造のヒントになります。h1はページ内に1つだけ使うのが基本です。Pythonのコメントに相当する「このコードは何をしているか」を説明する役割を、HTMLタグが構造に対して担っていると考えると理解しやすいです。\n\nリストはul（unordered list / 箇条書き）とol（ordered list / 番号付き）の2種類があり、どちらも内部にliを置きます。aタグのhref属性は絶対URL・相対パス・ページ内アンカー（#id名）が使えます。imgのalt属性は画像が読み込めないときのテキストであり、視覚障害者向けのスクリーンリーダーにも読まれるためアクセシビリティの観点から必ず記述します。",
table:T.htmlTags,
afterTable:"strongタグは「重要性」を、emタグは「強調」を意味します。見た目（太字・斜体）のためだけに使う場合はCSS（font-weight: bold）で対処するのが正しいアプローチです。意味と見た目を分けることがHTML/CSSの基本原則です。"},
]},
{id:"ch2",num:2,title:"セマンティックHTMLとフォーム",est:"50分",
goal:"header/main/section/footerなどのセマンティック要素を使ってアクセシブルなページ構造を組める。form/input/select/buttonを使った入力フォームを実装できる。",
sections:[
{title:"セマンティック要素で意味のある構造を作る",
body:"HTML5以前は<div id=\"header\">のようにdivに名前を付けて構造を表していましたが、現在はheader/main/section/footerといったセマンティック（意味的）な要素を使います。これらを使うことで、検索エンジンのクローラーがページの構造を理解しやすくなり、スクリーンリーダー（視覚障害者向け読み上げ装置）が正しくナビゲートできるようになります。\n\nPythonで関数・クラス・モジュールに意味のある名前を付けるのと同じ感覚です。コードを読む人間（そしてブラウザやbot）が意図を読み取れるよう、適切なタグを選ぶことが保守性とアクセシビリティに直結します。",
table:T.semanticTags,
afterTable:"navタグは必ずしもheader内になくてもかまいません。サイドバーのナビゲーションにもnavを使えます。一方、単なる装飾目的のグループ化にはdivを、文中の一部を装飾するにはspanを使います。"},
{title:"フォーム要素とアクセシビリティ",
body:"フォームはユーザーからサーバーへデータを送る仕組みです。formタグのaction属性が送信先URL、method属性がHTTPメソッド（get/post）を指定します。inputのtype属性は入力値の種類を定義し、ブラウザがスマートフォンのキーボード表示やバリデーション（required / min / pattern）を自動で行います。\n\nPythonで引数の型チェックをするように、HTMLのtype属性とrequired属性がフロントエンド側の第一防御線になります。ただしサーバー側のバリデーションも必ず必要です（フロントの検証はユーザーが簡単に回避できます）。labelとinputをfor属性で紐付けると、ラベルをクリックしてもフォームにフォーカスが当たるため、入力しやすくなります。",
table:T.formElements,
afterTable:"<input type=\"email\">は送信前にブラウザが自動でメール形式を検証します。スマートフォンではメール専用キーボードが表示されます。type=\"number\"はスマートフォンで数字キーパッドを呼び出します。こうしたUXの改善がtype属性の大きな価値です。"},
]},
{id:"ch3",num:3,title:"CSSの基礎",est:"50分",
goal:"インライン・内部・外部スタイルシートの違いを理解し、要素/クラス/IDセレクタとカスケード・詳細度の仕組みを使って基本的なスタイリングができる。",
sections:[
{title:"CSSの3種類の記述方法とセレクタ",
body:"CSSはHTML要素に視覚的なスタイル（色・サイズ・レイアウト等）を当てる言語です。記述方法は3つあり、インラインスタイル（style属性）・内部スタイルシート（headタグ内のstyleタグ）・外部スタイルシート（linkタグで読み込む.cssファイル）です。実務では保守性の観点から外部スタイルシートがほぼ必須です。Pythonで設定値をコードに直書き（ハードコード）せず設定ファイルに分離するのと同じ理由です。\n\nセレクタは「どの要素にスタイルを当てるか」を指定するパターンです。Pythonのリスト内包表記の条件式に似て、CSSのセレクタも柔軟な絞り込みが書けます。特にクラスセレクタ（.クラス名）は再利用性が高く、コンポーネント指向の設計に向いています。",
table:T.selectors,
afterTable:"疑似クラスのa:hoverはマウスを重ねたときのスタイルです。:focus（フォーカス時）・:first-child・:nth-child(n)等も頻繁に使います。疑似要素のp::before・p::afterはCSSでHTML要素の前後にコンテンツを挿入できる仕組みです。"},
{title:"カスケードと詳細度",
body:"「カスケード」はCSSの中心概念で、複数のスタイルが競合したとき、どのルールが優先されるかを決める仕組みです。優先順位は「詳細度（Specificity）」と「記述順」で決まります。詳細度の高さはインラインスタイル > ID > クラス/疑似クラス > 要素 の順です。Pythonで変数スコープ（ローカル > グローバル）が優先されるのと似た概念です。\n\n!importantはすべてのルールを上書きできますが、保守性を大きく損なうため原則として使用を避けます。代わりに詳細度を適切に管理するか、クラス名を工夫します。CSSの問題の多くはこの詳細度の競合に起因するため、早めに理解しておくことが重要です。",
code:"/* 詳細度の例 */\np          { color: black; }   /* 詳細度: 0,0,1 */\n.text      { color: blue;  }   /* 詳細度: 0,1,0 */\n#intro     { color: green; }   /* 詳細度: 1,0,0 */\np.text     { color: red;   }   /* 詳細度: 0,1,1 */\n\n/* 記述順: 同詳細度なら後勝ち */\np { color: #333; }\np { color: #666; } /* こちらが適用される */\n\n/* 継承: 親要素のfont-familyは子に引き継がれる */\nbody { font-family: sans-serif; } /* 全要素に適用 */",
afterCode:"CSSのcascadeはスタイルが「滝のように」流れ落ちてくるイメージです。specifishityという可視化ツールを使うと詳細度の値を直感的に把握できます。実務ではIDセレクタはCSSでほとんど使わず、クラスに統一するプロジェクトも多いです。"},
]},
{id:"ch4",num:4,title:"ボックスモデル",est:"50分",
goal:"CSSボックスモデルの4層構造（content/padding/border/margin）を理解し、box-sizing: border-boxとdisplayプロパティを使ってレイアウトを正確に制御できる。",
sections:[
{title:"ボックスモデルの4層構造",
body:"HTMLのすべての要素は「箱（ボックス）」として扱われます。箱の内側から content（実際の内容） → padding（内側の余白） → border（枠線） → margin（外側の余白）の4層で構成されます。Pythonでオブジェクトが属性を持つように、すべての要素がこの4つの寸法を持っています。\n\n初期値では width プロパティは content 部分の幅だけを指定し、padding と border が加算されます（content-box）。しかし box-sizing: border-box に変更すると、width が content+padding+border の合計幅になり、計算が直感的になります。現代のCSSでは全要素に border-box を指定するのがほぼ標準的なリセットです。",
table:T.boxModel,
afterTable:"margin: 0 auto は「上下0・左右自動」を意味し、ブロック要素を水平方向に中央揃えする古典的な手法です。marginの相殺（margin collapsing）は2つの垂直marginが隣接するとき大きい方だけ適用される仕組みで、想定外の余白になりやすいため注意が必要です。"},
{title:"display プロパティ：ブロックとインライン",
body:"displayプロパティは要素がどう振る舞うかを決定します。block（div/p/h1など）は幅いっぱいに広がり前後に改行が入ります。inline（span/a/strongなど）はテキストの流れに沿って配置され、width/heightは効きません。inline-blockはinlineのように横に並びつつ、blockのようにwidth/heightが指定できます。\n\nPythonの型がオブジェクトの振る舞いを決めるように、displayが要素のレイアウト上の振る舞いを決めます。なお display: none は要素を非表示にし、レイアウトからも消えます。visibility: hidden は見えないがスペースは保持されます。この違いは後のJavaScriptアニメーションで重要になります。",
code:"/* block: 幅いっぱい、前後改行あり */\ndiv { display: block; width: 50%; }\n\n/* inline: 幅高さ指定不可、横に並ぶ */\nspan { display: inline; }\n\n/* inline-block: 横に並び、幅高さも指定可 */\n.badge {\n  display: inline-block;\n  width: 24px;\n  height: 24px;\n  line-height: 24px;\n  text-align: center;\n  border-radius: 50%;\n  background: #6366f1;\n  color: #fff;\n}\n\n/* none: 非表示でスペースも消える */\n.hidden { display: none; }",
afterCode:"display: flex と display: grid は次の章で詳しく扱いますが、どちらもブロックコンテナを作るという点では displayの拡張です。これらを理解する前にblock/inline/inline-blockを体感しておくことで、Flexbox・Gridの動作原理が腑に落ちやすくなります。"},
]},
{id:"ch5",num:5,title:"Flexbox",est:"55分",
goal:"display: flexを使いjustify-content/align-items/flex-direction/gapでナビゲーションバーやカードグリッドの横並びレイアウトを実装できる。",
sections:[
{title:"Flexboxの仕組みと主要プロパティ",
body:"Flexboxはコンテナ内のアイテムを1次元（横一列または縦一列）に並べるためのレイアウトシステムです。display: flexを指定した要素がフレックスコンテナになり、直下の子要素がフレックスアイテムになります。Pythonのリストが要素を一方向に並べるように、Flexboxは子要素を主軸（flex-direction）に沿って並べます。\n\njustify-contentは主軸方向（デフォルトでは水平方向）の配置を、align-itemsは交差軸方向（デフォルトでは垂直方向）の配置を制御します。この2つで「中央揃え」「均等配置」「端揃え」など多様なレイアウトが実現できます。gap（旧grid-gap）でアイテム間の隙間を指定できるため、margin計算が不要になりコードが簡潔になります。",
table:T.flexProps,
afterTable:"flex: 1 は flex-grow: 1 / flex-shrink: 1 / flex-basis: 0 の省略形です。コンテナの余白をアイテム間で均等に分配します。一方 flex-wrap: wrap を指定しないと、アイテムが多くても折り返さず画面外にはみ出します。"},
{title:"Flexboxによるナビゲーションとカードレイアウト",
body:"ナビゲーションバーは「左にロゴ、右にリンク群」という典型的なレイアウトで、Flexboxのjustify-content: space-betweenで2行のCSSで実現できます。かつてはfloatを使って実装していましたが、Flexboxの登場で格段に簡潔になりました。\n\nカードをグリッド状に並べるには、コンテナにdisplay: flex / flex-wrap: wrap / gapを指定し、各カードにflex: 1 / min-width（最小幅）を設定します。画面幅が狭くなると自動で折り返し、レスポンシブに近い動作が得られます。完全なレスポンシブ対応には次の章のGridとメディアクエリを組み合わせます。",
code:"/* ナビゲーションバー */\n.site-header {\n  display: flex;\n  justify-content: space-between; /* 左右に分ける */\n  align-items: center;            /* 垂直方向に中央揃え */\n  padding: 0 24px;\n  height: 64px;\n  background: #1e1b4b;\n}\n\n/* カードグリッド */\n.card-grid {\n  display: flex;\n  flex-wrap: wrap;  /* 折り返しあり */\n  gap: 16px;\n  padding: 16px;\n}\n\n.card {\n  flex: 1;          /* 余白を均等に分配 */\n  min-width: 240px; /* これ以下になると折り返す */\n  background: #fff;\n  border-radius: 10px;\n  padding: 20px;\n}",
afterCode:"Flexboxは1次元のレイアウトに最適です。「横一列のナビ」「縦並びのサイドバーメニュー」「アイコン+テキストの横並び」など、局所的な配置にはFlexboxが使いやすいです。ページ全体の2次元レイアウト（行と列を同時に制御）にはGridが向いています。"},
]},
{id:"ch6",num:6,title:"CSS Grid",est:"55分",
goal:"display: gridでgrid-template-columns/rowsとfr単位を使い、作品ギャラリーや2カラムレイアウトを実装できる。FlexboxとGridの使い分けの判断基準を理解できる。",
sections:[
{title:"CSS Gridの基本概念",
body:"CSS Gridは2次元（行と列）を同時に制御できるレイアウトシステムです。Flexboxが1次元（行または列のどちらか）を扱うのに対し、Gridはスプレッドシートのような格子状のレイアウトを直接定義できます。Pythonの2次元リスト（リストのリスト）がセルを行列で管理するように、Gridも行（row）と列（column）で空間を定義します。\n\nfr（fraction）単位は利用可能なスペースの割合を指定します。grid-template-columns: 1fr 2fr とすると、左列が1/3・右列が2/3の幅になります。repeat()関数は繰り返しを省略でき、repeat(3, 1fr) は 1fr 1fr 1fr と同じです。auto-fillとauto-fitを使うと、カラム数をブラウザが自動計算するレスポンシブグリッドが1行で書けます。",
table:T.gridProps,
afterTable:"grid-column: 1 / -1 は「1列目から最後の列まで」を意味します。-1は末尾を表すPythonのスライス記法に似た便利な表記です。grid-template-areas プロパティを使うと、領域に名前を付けてASCIIアート風にレイアウトを記述できます。"},
{title:"FlexboxとGridの使い分け",
body:"「FlexboxかGridかどちらを使うべきか」は頻繁に議論されます。基本原則は「コンテンツ主導（content-out）ならFlex、レイアウト主導（layout-in）ならGrid」です。Flexboxはアイテムのサイズに応じてレイアウトが決まり、Gridは先に格子を定義してそこにアイテムを配置します。\n\n実際には両者を組み合わせて使います。例えばページ全体のマクロレイアウト（ヘッダー/サイドバー/メイン/フッター）にGridを使い、ナビバー内のアイコン+テキストの配置にFlexboxを使う、というパターンが一般的です。どちらか一方に固執せず、目的に応じて使い分けることが重要です。",
code:"/* auto-fill: レスポンシブギャラリー */\n.gallery {\n  display: grid;\n  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));\n  gap: 16px;\n}\n\n/* 名前付きエリア：直感的なレイアウト定義 */\n.page-layout {\n  display: grid;\n  grid-template-areas:\n    \"header  header\"\n    \"sidebar main\"\n    \"footer  footer\";\n  grid-template-columns: 240px 1fr;\n  grid-template-rows: auto 1fr auto;\n  min-height: 100vh;\n  gap: 0;\n}\n\n.page-header  { grid-area: header;  }\n.page-sidebar { grid-area: sidebar; }\n.page-main    { grid-area: main;    }\n.page-footer  { grid-area: footer;  }",
afterCode:"minmax(200px, 1fr) は「最小200px、最大1fr」を意味します。auto-fillは列数を自動計算し、コンテナに収まる最大数の列を作ります。auto-fitはauto-fillと似ていますが、空のトラックを折りたたむため少ないアイテムでも列が広がります。"},
]},
{id:"ch7",num:7,title:"レスポンシブデザイン",est:"55分",
goal:"viewport metaタグとメディアクエリ（@media）でモバイルファースト設計を実装できる。clamp()と相対単位（rem/em/%/vw/vh）を使って流動的なレイアウトが書ける。",
sections:[
{title:"viewport metaタグとメディアクエリ",
body:"スマートフォンのブラウザはデフォルトでページを980px幅で仮想的に描画し縮小表示します。これを防ぐためにviewport metaタグ（<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">）が必要です。このタグがないとメディアクエリが意図通りに動作しません。\n\nメディアクエリは画面幅・解像度・カラースキームなどの条件に応じてCSSを切り替えます。モバイルファーストとは「まずスマートフォン向けのスタイルを書き、min-widthで画面が広くなるにつれてスタイルを追加していく」設計思想です。逆のmax-width（デスクトップファースト）より、後から追加するスタイルが少なく済むため保守性が高いとされています。",
table:T.mediaQuery,
afterTable:"ブレークポイントは一般的にスマートフォン（〜767px）・タブレット（768px〜1023px）・デスクトップ（1024px〜）の3段階が基本です。ただし特定の解像度に固執せず、「コンテンツが崩れ始めたタイミング」でブレークポイントを設けるアプローチが実務では推奨されます。"},
{title:"相対単位とclamp()による流動的なデザイン",
body:"pxは絶対単位で画面サイズに依存しませんが、remやemは相対単位です。rem（root em）は:rootのfont-size（デフォルト16px）を基準にします。em は親要素のfont-sizeを基準にするため、コンポーネント内部での相対的なサイズ指定に向いています。%は親要素に対する割合、vw/vhはビューポートの幅/高さに対する割合です。\n\nclamp(最小値, 推奨値, 最大値)関数は3つの値の間でCSSプロパティを流動的に変化させます。clamp(1rem, 2.5vw, 2rem)とすると、画面幅に応じて16px〜32pxの間でフォントサイズが変わり、メディアクエリなしでレスポンシブなタイポグラフィが実現できます。",
code:"/* 相対単位の使い分け */\n:root { font-size: 16px; } /* 1rem = 16px */\n\nbody {\n  font-size: 1rem;          /* 16px */\n  line-height: 1.7;         /* emで相対指定 */\n}\n\nh1 { font-size: clamp(1.5rem, 4vw, 2.5rem); }\n/* 最小24px / 流動 / 最大40px */\n\n.container {\n  width: min(100% - 32px, 1100px);\n  /* 100%-32pxかつ最大1100px */\n  margin: 0 auto;\n}\n\n.hero {\n  height: 100svh;    /* スマホのブラウザバーを除外する svh */\n  padding: 0 5vw;\n}",
afterCode:"svh（small viewport height）はモバイルブラウザのアドレスバーが表示されているときのビューポート高さです。100vhがアドレスバーを含む高さになる問題を回避できます。min()・max()・clamp()の数学関数はCSS Valuesレベル4仕様で定義され、現代ブラウザでは全て対応済みです。"},
]},
{id:"ch8",num:8,title:"アニメーションとCSS変数",est:"50分",
goal:"transitionとtransform、@keyframesを使ってインタラクティブなUIアニメーションを実装できる。CSS変数（カスタムプロパティ）でデザイントークンを管理してテーマ切り替えを実装できる。",
sections:[
{title:"transitionとtransform",
body:"transitionはCSSプロパティが変化するときのアニメーションを指定します。たとえば button:hover { background: blue; } だけだと瞬時に変わりますが、transitionを追加すると滑らかに変化します。duration（所要時間）・timing-function（速度曲線）・delay（開始遅延）の3要素で動きを制御します。\n\ntransformはDOM上の位置を変えずに要素を視覚的に移動（translate）・回転（rotate）・拡大縮小（scale）します。GPUで処理されるため、topやleftのアニメーションよりもtranslateのほうがパフォーマンスが高くなります。ホバーエフェクトでtranslateY(-2px)（少し上に浮く）やscale(1.05)（少し拡大）を組み合わせると質感の高いUIになります。",
table:T.transitionProps,
afterTable:"will-change: transformをあらかじめ指定すると、ブラウザがGPUレイヤーを事前に確保しアニメーションをより滑らかにできます。ただし多用すると逆にメモリを消費するため、アニメーションが必要な要素にのみ使います。"},
{title:"@keyframesとCSS変数",
body:"@keyframesはより複雑なアニメーションを定義します。from（0%）とto（100%）、または任意のパーセンテージでキーフレームを指定し、animationプロパティで要素に適用します。Pythonのジェネレータがステップごとに値を生成するように、キーフレームはアニメーションの各段階の状態を定義します。\n\nCSS変数（カスタムプロパティ）は--変数名: 値 で定義し、var(--変数名) で参照します。:rootに定義するとグローバル変数として全要素から参照できます。色・フォントサイズ・余白など「デザイントークン」を変数化することで、テーマ切り替えや変更が1箇所で完結します。JavaScriptからもelement.style.setProperty('--color-primary', '#new')で動的に変更できます。",
code:"/* CSS変数によるデザイントークン */\n:root {\n  --color-primary: #6366f1;\n  --color-bg: #f8f7f4;\n  --color-text: #1e1b4b;\n  --radius-md: 10px;\n  --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);\n}\n\n/* @keyframesアニメーション */\n@keyframes fadeInUp {\n  from { opacity: 0; transform: translateY(24px); }\n  to   { opacity: 1; transform: translateY(0);    }\n}\n\n@keyframes pulse {\n  0%, 100% { transform: scale(1); }\n  50%       { transform: scale(1.05); }\n}\n\n.card {\n  background: #fff;\n  border-radius: var(--radius-md);\n  box-shadow: var(--shadow-sm);\n  animation: fadeInUp 0.4s ease forwards;\n  transition: transform 0.2s ease, box-shadow 0.2s ease;\n}\n\n.card:hover {\n  transform: translateY(-4px);\n  box-shadow: 0 8px 24px rgba(0,0,0,0.12);\n}",
afterCode:"prefers-reduced-motionメディアクエリに対応することで、前庭感覚障害や動きに敏感なユーザー向けにアニメーションを無効化できます。@media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }をリセットに加えることがアクセシビリティのベストプラクティスです。"},
]},
