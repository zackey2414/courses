     answer:`registerPaint('dot-pattern', class {
  static get inputProperties() {
    return ['--dot-color', '--dot-size'];
  }
  paint(ctx, size, properties) {
    const color = properties.get('--dot-color').toString().trim() || '#6366f1';
    const dotSize = parseInt(properties.get('--dot-size').toString()) || 8;
    ctx.fillStyle = color;
    for (let x = 0; x < size.width; x += dotSize * 2) {
      for (let y = 0; y < size.height; y += dotSize * 2) {
        ctx.beginPath();
        ctx.arc(x + dotSize/2, y + dotSize/2, dotSize/4, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
});`},

     answer:`function hexToRgba(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return \`rgba(\${r}, \${g}, \${b}, 1)\`;
}

const plugin = () => ({
  postcssPlugin: 'postcss-hex-to-rgba',
  Declaration(decl) {
    if (decl.prop === 'color' || decl.prop === 'background-color') {
      decl.value = decl.value.replace(/#[0-9a-fA-F]{6}/g, hexToRgba);
    }
  },
});
plugin.postcss = true;
module.exports = plugin;`}

   sections:[
     {title:"CSS Houdiniとは・Paint API", body:`CSS HoudiniはブラウザのCSSレンダリングエンジンに直接アクセスできるAPI群です。これまでは不可能だったカスタムCSS描画・レイアウト・タイピングを実現します。Pythonのメタクラスがクラス生成に介入するように、HoudiniはCSSエンジンに介入します。

Paint API（CSS Houdini Paint Worklet）はbackground-imageやborder-imageの値としてJavaScriptで描画した結果を使えます。2DキャンバスAPIと同じAPIでcanvasに描画し、その結果がCSSから呼び出せます。グラデーション・パターン・複雑な背景を純粋にJavaScriptとCSSで実装できます。

Workletはメインスレッドとは独立したスレッドで実行されるため、UIをブロックしません。CSS.paintWorklet.addModule('my-paint.js')でWorkletを登録し、background: paint(my-painter)のようにCSSから呼び出します。ChromeとEdgeでサポートされており、Firefoxはまだ対応中です（2024年時点）。`,
      code:`/* 使用側のCSS */
.fancy-border {
  --border-color: #6366f1;
  --noise-alpha: 0.15;
  border: 20px solid transparent;
  border-image: paint(noise-border);
  padding: 16px;
}

/* paint-worklet.js */
registerPaint('noise-border', class {
  static get inputProperties() {
    return ['--border-color', '--noise-alpha'];
  }
  paint(ctx, geom, properties) {
    const color = properties.get('--border-color').toString().trim();
    const alpha = parseFloat(properties.get('--noise-alpha').toString()) || 0.1;
    ctx.fillStyle = color;
    // ノイズ模様を描画
    for (let i = 0; i < geom.width * geom.height * 0.05; i++) {
      const x = Math.random() * geom.width;
      const y = Math.random() * geom.height;
      ctx.globalAlpha = Math.random() * alpha;
      ctx.fillRect(x, y, 2, 2);
    }
  }
});

// HTML: <script>CSS.paintWorklet.addModule('paint-worklet.js')<\/script>`,
      afterCode:"Paint Workletの入力はinputPropertiesで宣言したCSS Custom Propertiesのみです。ランダムや時間に依存する描画は毎フレームWorkletが再呼び出されます。不必要な再描画を防ぐため、アニメーションには@propertyと組み合わせましょう。"},
     {title:"@propertyと型付きカスタムプロパティ", body:`CSS Properties and Values API（@property）は、カスタムプロパティに型・継承・初期値を付与します。最大の恩恵はアニメーションです。通常のカスタムプロパティは文字列として扱われるため補間できませんが、@propertyで型を宣言すると数値・色・長さのアニメーションが可能になります。

syntaxには<number>・<color>・<length>・<percentage>・<angle>・<image>などを指定します。inheritsはfalseにすると親要素からの継承を防ぎ、コンポーネントのカプセル化に役立ちます。initial-valueはCSS変数が未定義の場合のデフォルト値です。

グラデーションアニメーションは従来CSSだけでは不可能でしたが、@propertyで色や角度をカスタムプロパティ化することで実現できます。Houdiniがない古いブラウザへのフォールバックとして、通常のcssアニメーションを@supportsで分岐します。`,
      code:`@property --hue {
  syntax: '<angle>';
  inherits: false;
  initial-value: 0deg;
}

@keyframes rainbow {

  inherits: false;
  initial-value: 0%;
}

.progress-ring {

     {title:"animation-timelineとscroll()関数", body:`Scroll-Driven AnimationsはJavaScriptのIntersectionObserverやscrollイベントを使わずに、CSSだけでスクロール連動アニメーションを実装できる仕様です。Chrome 115で実装され、Edge・Firefox（2024年）でも対応が進んでいます。

animation-timeline: scroll()はスクロールコンテナの位置にアニメーションを紐付けます。引数にはスクロール方向（block/inline/x/y）とスクロールするコンテナ（root/nearest）を指定します。プログレスバーを使うには: width: 0; animation: grow linear; animation-timeline: scroll(root block);と設定するだけです。

従来のJavaScriptによるスクロールアニメーションはメインスレッドをブロックしてガクつく問題がありましたが、Scroll-Driven AnimationsはGPUコンポジタースレッドで実行されるため非常に滑らかです。これはrequestAnimationFrameより根本的な改善です。`,

      afterCode:"animation-fill-mode: bothを設定すると、アニメーション開始前と終了後もキーフレームのスタイルが維持されます。スクロール位置が中間でもスタイルが正しく表示されます。"},
     {title:"view()タイムラインとanimation-range", body:`view()タイムラインは個々の要素がビューポートに入る・出るタイミングにアニメーションを紐付けます。scroll()がページ全体のスクロール位置に対応するのに対し、view()は各要素ごとの可視性に対応します。

animation-rangeはアニメーションが動く範囲を指定します。entry 0% entry 100%（要素がビューポートに入り始めてから完全に入るまで）、exit 0% exit 100%（出始めから完全に出るまで）、cover 0% cover 50%（要素の上端がビューポートの上端から0%〜50%の間）などのキーワードを組み合わせます。

複数のanimation-rangeを使うと、入るときにフェードイン・出るときにフェードアウトという双方向アニメーションが作れます。これはIntersectionObserverで実装すると複雑なコードが必要でしたが、CSSだけで実現できます。`,
      code:`/* スクロールで現れるカード */
.scroll-card {
  animation: slide-in linear both;
  animation-timeline: view();
  animation-range: entry 10% entry 50%;
}

@keyframes slide-in {
  from {
    opacity: 0;
    transform: translateX(-40px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

/* 入るときも出るときもアニメーション */
.bidirectional {
  animation: appear linear both;
  animation-timeline: view();
  animation-range: entry 0% cover 30%, exit 70% exit 100%;
}

@keyframes appear {
  0%   { opacity: 0; transform: scale(0.8); }
  100% { opacity: 1; transform: scale(1); }
}`,
      afterCode:"animation-rangeのpercentageはビューポートサイズに対する割合です。contain: layoutを親要素に設定するとview()タイムラインの基準が変わります。デバッグにはChrome DevToolsのAnimationsパネルが便利です。"}
   ]},
  {id:"ch3", num:3, title:"View Transitions API", est:"60分",
   goal:"View Transitions APIでページ遷移アニメーションを実装し、共有要素トランジションで要素をページ間で滑らかに引き継ぎできる。",
   sections:[
     {title:"View Transitions APIの基本", body:`View Transitions APIは、DOMの変更前後のビジュアルをブラウザがキャプチャし、その間に滑らかなトランジションを自動生成するAPIです。これまでSPAのページ遷移アニメーションはJavaScriptで手動実装する必要があり、複雑なコードが必要でした。View Transitions APIによりこれが大幅に簡略化されます。

document.startViewTransition(callback)がコアAPIです。callbackでDOMを変更すると、ブラウザが変更前後のスクリーンショットを撮り、デフォルトではクロスフェードアニメーションを実行します。MPA（マルチページアプリ）でも<meta name="view-transition" content="same-origin">を追加するだけで基本的なトランジションが有効になります（Chrome 126+）。

::view-transition-old(root)と::view-transition-new(root)の疑似要素をCSSでスタイルすることで、デフォルトのクロスフェード以外のアニメーションを設定できます。スライド・ズーム・回転など任意のアニメーションが可能です。`,
      code:`// SPA: ページ遷移のView Transition
async function navigate(newContent) {
  if (!document.startViewTransition) {
    document.querySelector('main').innerHTML = newContent;
    return;
  }

  const transition = document.startViewTransition(() => {
    document.querySelector('main').innerHTML = newContent;
  });

  await transition.finished;
}

/* カスタムトランジション: スライド */
::view-transition-old(root) {
  animation: slide-out 0.3s ease-in forwards;
}

::view-transition-new(root) {
  animation: slide-in 0.3s ease-out forwards;
}

@keyframes slide-out {
  to { transform: translateX(-100%); opacity: 0; }
}

@keyframes slide-in {
  from { transform: translateX(100%); opacity: 0; }
}`,
      afterCode:"transition.readyはスクリーンショット取得後・アニメーション開始前のPromiseです。このタイミングでWeb Animations APIを使うと、JavaScriptで動的なアニメーションパスを計算できます。"},
     {title:"共有要素トランジション（Shared Element Transition）", body:`共有要素トランジションは、ページ間で同じ要素が「移動」しているように見せる技術です。例えば、カード一覧から詳細ページに遷移するとき、そのカードが滑らかに拡大して詳細ページのヘッダーになります。これはiOSのUIKitや，Android Jetpack Composeが提供するシェアード要素トランジションと同等の体験をWebで実現します。

view-transition-nameプロパティで要素に名前をつけます。一覧ページと詳細ページで同じ名前を持つ要素が対応付けられ、自動的に補間アニメーションが適用されます。ただしview-transition-nameは1つのページ内でユニークでなければならないため、動的なコンテンツ（IDが異なる各カード）にはJavaScriptで動的に設定します。

::view-transition-group(name)疑似要素のCSSをカスタマイズすると、共有要素のアニメーションカーブ・継続時間・イージングを変更できます。`,
      code:`// 一覧ページ: クリック時に対象カードにview-transition-nameを設定
document.querySelectorAll('.card').forEach(card => {
  card.addEventListener('click', async () => {
    const id = card.dataset.id;

    // 一時的にview-transition-nameを設定
    card.style.viewTransitionName = 'card-' + id;

    await document.startViewTransition(async () => {
      const html = await fetch('/detail/' + id).then(r => r.text());
      document.body.innerHTML = html;
    }).finished;

    // 詳細ページの対応要素: .hero { view-transition-name: card-42; }
  });
});

/* アニメーションのカスタマイズ */
::view-transition-group(card-42) {
  animation-duration: 0.5s;
  animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
}

/* 詳細ページ側 */
.detail-hero {
  /* JSで動的に: style.viewTransitionName = 'card-' + pageId */
}`,
      afterCode:"view-transition-nameが設定された要素はStackingContextを作るため、z-indexの扱いに注意が必要です。また、同じページ内に同じ名前が2つあるとトランジションが動作しないため、動的コンテンツでは必ず名前を一意にします。"}
   ]},
  {id:"ch4", num:4, title:"Anchor Positioning", est:"55分",
   goal:"CSS Anchor Positioningで任意の要素を基準に他の要素を配置し、画面端での自動折り返し（position-try-fallbacks）を実装できる。",
   sections:[
     {title:"anchor-nameとposition-anchorの基本", body:`CSS Anchor Positioningは「特定の要素を基準にして別の要素を配置する」仕様です。これまでツールチップ・ドロップダウン・ポップオーバーの配置はJavaScriptでターゲット要素のgetBoundingClientRect()を計算して手動でposition: fixedを設定していました。Anchor PositioningはこれをネイティブCSSで実現します。

anchor-nameで基準となる要素に名前をつけ、配置したい要素にposition-anchorで参照します。配置にはanchor()関数を使い、anchor(top)・anchor(bottom)・anchor(left)・anchor(right)・anchor(center)でアンカー要素の各辺の座標を取得します。配置される要素はabsolute・fixedである必要があります。

popoverAPI（HTML仕様）とAnchor Positioningは自然に組み合わさります。<div popover>要素はデフォルトでtop layerに表示されるため、z-indexを気にせずレイアウトから独立して配置できます。`,
      code:`/* ボタン（アンカー要素） */
.menu-button {
  anchor-name: --dropdown-anchor;
  position: relative;
}

/* ドロップダウン（アンカーを参照） */
.dropdown {
  position: absolute;
  position-anchor: --dropdown-anchor;

  /* アンカーの左端から右端まで */
  left: anchor(left);
  right: anchor(right);

  /* アンカーの下端に配置 */
  top: anchor(bottom);
  margin-top: 4px;

  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  padding: 8px 0;
}`,
      afterCode:"Anchor Positioningは2024年にChrome 125・Edge 125でリリースされました。Firefoxは未対応（2024年末時点）なため、@supports (anchor-name: --x)でフォールバックを用意することをおすすめします。"},
     {title:"position-try-fallbacksで自動折り返し", body:`ツールチップやドロップダウンが画面端に近い場合、配置が画面外にはみ出す問題があります。従来はJavaScriptでビューポートとの衝突を検知して配置を切り替えていました。position-try-fallbacksはこれをCSSで宣言的に解決します。

@position-tryルールで代替配置のスタイルセットを定義し、position-try-fallbacksでその優先順序を指定します。ブラウザはデフォルト配置から試みて、ビューポートからはみ出す場合は次の候補を試みます。flip-blockとflip-inlineというキーワードでよくある上下・左右の反転も簡単に設定できます。

inset-areaプロパティは要素をグリッド状のエリアに配置する新しい方法です。top center・left spanなどのキーワードでアンカー要素の周囲の9つの領域（3x3グリッド）に配置できます。`,
      code:`/* デフォルト: アンカーの下に配置 */
.tooltip {
  position: absolute;
  position-anchor: --trigger;

  top: anchor(bottom);
  left: anchor(center);
  transform: translateX(-50%);
  margin-top: 8px;

  /* 画面端で自動折り返し */
  position-try-fallbacks:
    --above,      /* 上に折り返す */
    --left,       /* 左に折り返す */
    flip-inline;  /* 左右を自動反転 */
}

@position-try --above {
  top: auto;
  bottom: anchor(top);
  margin-top: 0;
  margin-bottom: 8px;
}

@position-try --left {
  top: anchor(center);
  left: auto;
  right: calc(100% - anchor(left));
  transform: translateY(-50%);
  margin-top: 0;
  margin-right: 8px;
}`,
      afterCode:"position-try-fallbacksで試みる順序はリストの左から右です。ブラウザはビューポートに収まる最初の候補を使います。inset-area: topのような新構文を使うと上下左右を直感的に設定できます。"}
   ]},
  {id:"ch5", num:5, title:"CSS Custom Properties高度な使い方", est:"55分",
   goal:"CSS Custom Propertiesをコンポーネントのトークンシステムとして活用し、Space Toggle Trick・スコープ変数・@propertyとの組み合わせで高度な動的スタイリングができる。",
   sections:[
     {title:"デザイントークンとCSSカスタムプロパティ", body:`デザイントークンとはデザインシステムの基本単位です。色・スペーシング・フォントサイズ・影などを変数として定義し、UIコンポーネント全体で一貫して使います。CSS Custom Propertiesはデザイントークンを実装する最もネイティブな方法です。

トークンは階層化するのがベストプラクティスです。Primitive（生の値: --color-blue-500: #3b82f6）、Semantic（意味付き: --color-primary: var(--color-blue-500)）、Component（コンポーネント固有: --button-bg: var(--color-primary)）の3層構造にします。この構造でダークモード切り替えはSemanticトークンだけを変更するだけで全コンポーネントに反映されます。

Tailwind CSS v4.0はCSS Custom Propertiesをネイティブに使ったデザイントークンシステムを採用しています。JavaScriptの設定ファイルではなくCSSで直接テーマを定義できるため、ランタイムでの動的テーマ変更が容易になります。`,
      code:`/* Primitiveトークン */
:root {
  --color-indigo-50:  #eef2ff;
  --color-indigo-500: #6366f1;
  --color-indigo-900: #312e81;
  --space-1: 4px;
  --space-2: 8px;
  --space-4: 16px;
  --space-8: 32px;
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 16px;
}

/* Semanticトークン */
:root {
  --color-primary: var(--color-indigo-500);
  --color-bg: #ffffff;
  --color-text: #111827;
}

@media (prefers-color-scheme: dark) {
  :root {
    --color-primary: #818cf8;
    --color-bg: #0f172a;
    --color-text: #f1f5f9;
  }
}

/* Componentトークン */
.button {
  --button-bg: var(--color-primary);
  --button-color: #fff;
  --button-padding: var(--space-2) var(--space-4);
  background: var(--button-bg);
  color: var(--button-color);
  padding: var(--button-padding);
  border-radius: var(--radius-md);
}`,
      afterCode:"コンポーネントスコープのトークン（--button-bg）を上書きするだけで、コンポーネント全体のスタイルを変更できます。これはCSS Modulesや外部ライブラリなしに、ネイティブCSSでスコープドスタイリングを実現する方法です。"},
     {title:"@scope・@layerとカスケード管理", body:`@scopeはCSS Cascade Level 6の仕様で、特定のサブツリーにのみ適用されるスコープドスタイルを書けます。Shadow DOMのようなカプセル化をlight DOMで実現します。上限要素と下限要素を指定して、その範囲内のみに適用されます。

@layerはカスケードにレイヤー（層）を導入します。reset・base・components・utilitiesのように層の優先順位を宣言し、後から追加されたスタイルでも層の優先順位でカスケードが決まります。!importantを多用せず、設計通りの優先順位を保てます。Tailwind CSS v3以降も@layerを積極的に使っています。

これらを組み合わせると、外部ライブラリのスタイルをbaseレイヤーに配置してスコープで影響範囲を限定し、自分のコンポーネントスタイルをcomponentsレイヤーで上書きする、といった精密なカスケード管理が可能になります。`,
      code:`/* @layer: カスケードの優先順位を宣言 */
@layer reset, base, components, utilities;

@layer reset {
  *, *::before, *::after { box-sizing: border-box; margin: 0; }
}

@layer base {
  body { font-family: 'Noto Sans JP', sans-serif; }
  a { color: var(--color-primary); }
}

@layer components {
  .card {
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    padding: var(--space-4);
  }
}

/* @scope: コンポーネントスコープのスタイル */
@scope (.sidebar) to (.sidebar-item) {
  /* .sidebar内、ただし.sidebar-item以下は除外 */
  a {
    color: var(--color-primary);
    text-decoration: none;
  }
}`,
      afterCode:"@layerの優先順位はリストの後ろほど高くなります。utilitiesをcomponentsより後に宣言することで、ユーティリティクラスがコンポーネントスタイルを確実に上書きします。Tailwind CSSの設計原則と同じです。"}
   ]},
  {id:"ch6", num:6, title:"Container Queries・Style Queries", est:"55分",
   goal:"Container QueriesでコンポーネントのサイズベースのレスポンシブデザインをCSSで実装し、Style Queriesでカスタムプロパティの値に基づいてスタイルを条件分岐できる。",
   sections:[
     {title:"Container QueriesとSize Queries", body:`Container Queriesは「コンポーネントがどのビューポートに置かれているか」ではなく「コンポーネント自身のサイズ」に基づいてスタイルを変えます。これにより真にコンポーネント駆動のレスポンシブデザインが実現できます。@mediaがビューポート幅を参照するのに対し、@containerはコンテナ要素のサイズを参照します。

container-type: inline-sizeを親要素に設定すると、その要素がコンテナになります。子要素からは@container (min-width: N)でそのコンテナのサイズに基づいてスタイルを変更できます。サイドバーに置いたカードとメインコンテンツに置いたカードが自動的に適切なレイアウトを選択するような設計が可能です。

container-nameで名前付きコンテナを作ると、ネストしたコンテナから特定の親コンテナのサイズを参照できます。@container card (min-width: 400px)のように名前を指定します。`,
      code:`/* 親: コンテナを定義 */
.card-wrapper {
  container-type: inline-size;
  container-name: card;
}

/* 子: コンテナサイズに基づいてスタイルを変える */

/* コンテナが400px以上: 横レイアウト */

      afterCode:"container-type: size（縦横両方監視）よりcontainer-type: inline-size（横幅のみ）の方がパフォーマンスが良いです。ブラウザは縦方向の計算が循環参照になる可能性があるため、block-sizeのContainer Queriesは計算コストが高くなります。"},
     {title:"Style Queriesで状態ドリブンスタイリング", body:`Style Queriesはコンテナの「スタイル（CSS Custom Propertiesの値）」に基づいてスタイルを変える仕組みです。@container style(--variant: primary)のように、カスタムプロパティの値を条件にできます。これはコンポーネントのバリアント（プライマリ・セカンダリ・デンジャーなど）をCSS変数で宣言的に切り替える強力なパターンです。

現時点（Chrome 111+）ではCSS Custom Propertiesの値のみがStyle Queriesで使えます。通常のCSSプロパティ（colorやfont-sizeなど）へのStyle Queriesはまだ実装されていません。

Style Queriesはデザインシステムのコンポーネントバリアント実装に特に有効です。Reactでいえばprops.variantに基づいてclassNameを切り替える代わりに、CSSカスタムプロパティを設定してStyle Queriesで子要素を変えるという手法です。`,
      code:`/* コンポーネントにvariantを設定 */
.button {
  container-type: style;
  /* JS/HTMLから動的に設定: style="--variant: danger" */
}

/* Style Queryでバリアントに応じてスタイルを変える */

/* デフォルト */

}`,
      afterCode:"Style Queriesはサポートが広がりつつあります。現時点ではChrome・Edge・Safariで使えますが、Firefoxは2024年末時点で未対応です。@supportsをStyle QueriesのフォールバックとしてCustom Propertyに基づいたフォールバックを用意しましょう。"}
   ]},
  {id:"ch7", num:7, title:"PostCSS Plugin開発", est:"60分",
   goal:"PostCSSプラグインのAPIを理解して独自のCSSトランスフォームを実装し、CSSASTを走査・変換できる。",
   sections:[
     {title:"PostCSSとCSSのAST", body:`PostCSSはCSSをASTに変換して操作できるツールです。BabelがJavaScriptのASTを操作するのとまったく同じ考え方で、PostCSSはCSSのASTを提供します。autoprefixer・tailwindcss・stylelintなど多くの主要ツールがPostCSSプラグインとして実装されています。

PostCSSのASTノードの種類はRoot（CSSファイル全体）・Rule（セレクタブロック）・Declaration（プロパティ: 値）・AtRule（@keyframesなど）・Comment（コメント）です。各ノードにはwalkRules()・walkDecls()・walkAtRules()でアクセスできます。

プラグインはplain objectを返す関数として定義します。ノードタイプ名をキーにしたメソッドを持つオブジェクトを返すと、PostCSSが各ノードにアクセスするたびにそのメソッドを呼び出します。once(root)はルートへの単一アクセス、Declaration(decl)はDeclarationノードへの逐次アクセスです。`,
      code:`// postcss-typography-scale.js
// フォントサイズをrem変換して型スケールを適用するプラグイン

const BASE_FONT_PX = 16;
const SCALE_RATIO = 1.25; // Major Third

function pxToRem(px) {
  return \`\${px / BASE_FONT_PX}rem\`;
}

const plugin = (opts = {}) => ({
  postcssPlugin: 'postcss-typography-scale',

  Declaration(decl) {
    // font-size: Npxをremに変換
    if (decl.prop === 'font-size' && decl.value.endsWith('px')) {
      const px = parseFloat(decl.value);
      decl.value = pxToRem(px);
    }

    // font-size: scale(N)をタイプスケールに変換
    const scaleMatch = decl.value.match(/^scale\((-?\d+)\)$/);
    if (decl.prop === 'font-size' && scaleMatch) {
      const step = parseInt(scaleMatch[1]);
      const px = BASE_FONT_PX * Math.pow(SCALE_RATIO, step);
      decl.value = pxToRem(Math.round(px * 100) / 100);
    }
  },
});

plugin.postcss = true;
module.exports = plugin;`,
      afterCode:"decl.cloneBefore()やdecl.cloneAfter()で新しいDeclarationを隣に挿入できます。decl.remove()でノードを削除します。PostCSSはコメントと空白を正確に保持するので、出力のフォーマットが元のCSSを壊しません。"},
     {title:"AtRuleとRuleの変換・生成", body:`AtRuleとRuleの変換はPostCSSプラグインの中でも高度な使い方です。例えばTheme Tokenプラグインを作り、@token color-primary: #6366f1;のような独自構文をCSS Custom Propertiesに変換することができます。このアプローチはLess/Sassのような独自の変数構文を持つプリプロセッサーの実装に使われています。

postcss.ruleとpostcss.declのファクトリ関数で新しいノードを作成してrule.append()で追加します。変換後はatRule.remove()で元の@ruleを削除します。出力のインデントはrawk source.startプロパティを参照して元のコードのインデントに合わせます。

Containerサポートを追加するプラグインや、ネストCSSをフラットなCSSに変換するプラグインもこのパターンで実装されています。PostCSSはCSSの未来仕様を現在のブラウザに対してpolyfillする重要な役割を担っています。`,
      code:`// postcss-design-tokens.js
// @token name: value; → :root { --token-name: value; } に変換

const postcss = require('postcss');

const plugin = () => ({
  postcssPlugin: 'postcss-design-tokens',

  AtRule: {
    // @token ブロックを処理
    token(atRule) {
      const root = atRule.root();
      const rootRule = postcss.rule({ selector: ':root' });

      // @token 内の各宣言を処理
      atRule.walkDecls(decl => {
        rootRule.append(
          postcss.decl({
            prop: \`--token-\${decl.prop}\`,
            value: decl.value,
          })
        );
      });

      // :root ルールを追加して元の@tokenを削除
      root.prepend(rootRule);
      atRule.remove();
    },
  },

  // @use-token name; → var(--token-name) に変換
  AtRule: {
    'use-token'(atRule) {
      const tokenName = atRule.params.trim();
      atRule.replaceWith(
        postcss.decl({ prop: 'content', value: \`var(--token-\${tokenName})\` })
      );
    }
  }
});

plugin.postcss = true;
module.exports = plugin;`,
      afterCode:"AtRule: { tokenName(atRule) {} }の形式で特定の@ruleのみを処理できます。AtRule(atRule) {}にするとすべての@ruleが対象になります。パフォーマンスのため、対象のノードタイプに絞って処理しましょう。"}
   ]},
  {id:"ch8", num:8, title:"パフォーマンス・Core Web Vitals改善", est:"60分",
   goal:"LCP・CLS・INPを計測・分析し、critical CSS抽出・font-displayの最適化・content-visibilityによるレンダリング最適化を実装できる。",
   sections:[
     {title:"Core Web Vitals（LCP・CLS・INP）の理解", body:`Core Web Vitals（CWV）はGoogleが定義したWebパフォーマンスの3指標で、検索ランキングに直接影響します。LCP（Largest Contentful Paint）はビューポート内の最大コンテンツが表示されるまでの時間で、2.5秒以内が目標です。CLS（Cumulative Layout Shift）はページのレイアウトがどれだけずれるかで、0.1以下が目標です。INP（Interaction to Next Paint）はユーザーのインタラクション後に次のフレームが描画されるまでの時間で、200ms以下が目標です。

CLS（レイアウトシフト）はCSS観点で最も対処しやすい指標です。画像・動画・広告にwidth/heightを明示するか、aspect-ratioを設定することでロード前からスペースが確保されます。フォントのFOUT（フォント読み込み後のテキストジャンプ）はfont-display: optionalまたはsize-adjustで対処します。動的コンテンツの挿入はスクロール位置より上に行わないこと。

LCPはHTMLの先頭にLCP候補（ヒーロー画像・h1）のpreloadを置き、CSSのbackground-imageをHTMLのimgタグに変えることで改善できます。ヒーロー画像にfetchpriority="high"属性を付けると優先的に読み込まれます。`,
      code:`<!-- LCP最適化: ヒーロー画像のpreloadとfetchpriority -->
<head>
  <link rel="stylesheet" href="../assets/course.css">
  <!-- Critical CSSをインライン化 -->
  <!-- ヒーロー画像を最優先で読み込む -->
  <link rel="preload" href="/hero.webp" as="image"
    fetchpriority="high">

  <!-- スタイルシートは非同期読み込み -->
  <link rel="preload" href="/styles.css" as="style"
    onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="/styles.css"></noscript>
</head>

<!-- CLS対策: 画像に必ずwidth/heightを指定 -->
<img src="/hero.webp" width="1200" height="630"
  alt="ヒーロー画像" fetchpriority="high"
  style="aspect-ratio: 1200/630">`,
      afterCode:"Critical CSSをインライン化することで、外部CSSのダウンロードを待たずにファーストビューがレンダリングされます。Critical CSSの抽出にはcritters・penthouseなどのツールを使います。"},
     {title:"レンダリングパフォーマンスの最適化", body:`content-visibilityプロパティはブラウザが画面外の要素のレンダリングをスキップできる強力な最適化です。長いリスト（100件以上のカード、記事一覧）では30〜50%のレンダリング時間削減が報告されています。contain-intrinsic-sizeで要素の推定サイズを指定することで、スクロールバーの位置を安定させます。

will-change: transformはブラウザにその要素がアニメーションすることを事前に知らせ、合成レイヤーを作成します。アニメーション中のレンダリングがGPUコンポジタースレッドで処理されるため、メインスレッドが忙しくてもアニメーションが滑らかに動きます。ただし過剰使用はメモリを消費するため、アニメーション開始直前にJavaScriptで付加してアニメーション終了後に削除するのが適切です。

INP（旧FID・First Input Delay）の改善にはCSSのcontain: strictやcontent-visibilityが効きます。レイアウト計算を少なくすることで、ユーザーのクリックに対するブラウザの応答が速くなります。`,
      code:`/* content-visibility: 長いリストの最適化 */
.article-card {
  content-visibility: auto;
  contain-intrinsic-size: 0 280px; /* 推定高さ */
}

/* will-change: アニメーション前に付けて後で外す */
.animated-element {
  transition: transform 0.3s ease;
  /* will-changeはJSで動的に付加する
   el.style.willChange = 'transform';
   後でel.style.willChange = 'auto'; */
}

/* contain: strict で不要なレイアウト再計算を防ぐ */
.widget {
  contain: layout style paint;
  /* このボックス内の変更が外部のレイアウトに影響しない */
}

/* overscroll-behavior: スクロールの連鎖を防ぐ */
.modal {
  overflow-y: auto;
  overscroll-behavior: contain;
  /* モーダル内のスクロールが背景に伝わらない */
}`,
      afterCode:"Chrome DevTools Performance InsightsパネルでLCP・CLSの原因を特定できます。web-vitalsライブラリを使うとJavaScriptでCWVの実際の値を計測してAnalyticsに送れます。本番環境での実ユーザーデータがCWV改善の出発点です。"}
   ]},
];
