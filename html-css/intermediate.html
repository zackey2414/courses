:where(h1, h2, h3, h4) {
  font-family: 'Noto Sans JP', sans-serif;
  line-height: 1.4;
  color: #1e1b4b;
}
/* :is(h1, h2, h3, h4) だと内部の最高詳細度(0,0,1)になる */
/* :where() はゼロ詳細度なので他のルールで上書きしやすい */

/* 2. :has() — フォーカスされたinputを含むグループを強調 */
.form-group:has(input:focus),
.form-group:has(textarea:focus) {
  background: #f5f3ff;
  border-radius: 8px;
  padding: 8px;
  outline: 2px solid #6366f1;
}

/* 3. :has() — チェック済みcheckboxを持つlabelを緑に */
label:has(input[type="checkbox"]:checked) {
  color: #16a34a;
  font-weight: 700;
}

/* :is() の便利な使い方 — 複数コンテキストへの適用 */
:is(article, section, aside) :is(h2, h3) {
