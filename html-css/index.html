    body: "HTMLの文法はPythonとは根本的に異なります。Pythonではインデントとコロンで構造を表現しますが、HTMLでは「開始タグ」と「終了タグ」のペアで囲むことで構造を表します。例えば <p>テキスト</p> は「pという要素でテキストを囲んでいる」という意味です。<p>が開始タグ、</p>が終了タグ、全体を「p要素」と呼びます。Pythonでいえば、関数呼び出し p('テキスト') のような感覚で、<p> が関数名、中身がその引数のようなものです。\n\nタグには「属性」を付けることができます。<a href=\"https://example.com\">リンク</a> の href=\"...\" が属性です。Pythonの関数でキーワード引数を渡すのと同じ発想で、要素に追加情報を与えます。属性は常に開始タグの中に書き、属性名=\"値\" の形式で指定します。複数の属性はスペースで区切ります（例: <img src=\"photo.jpg\" alt=\"写真\" width=\"300\">）。\n\n一部の要素は終了タグを持ちません。<img>（画像）、<br>（改行）、<input>（入力欄）、<meta>（メタ情報）などの「空要素」と呼ばれるタグです。これらは中身を持たず、属性だけで情報を伝えます。Pythonで例えると、引数だけで動く関数（戻り値で表示するのではなく、副作用で動作する関数）に似ています。",
    code: "<!-- HTML の基本文法 -->\n\n<!-- 1. 開始タグと終了タグのペア -->\n<p>これは段落です。</p>\n<!-- Python的に: p(\"これは段落です。\") -->\n\n<!-- 2. タグの入れ子（ネスト） -->\n<div>\n  <h1>見出し</h1>\n  <p>段落テキスト</p>\n</div>\n<!-- Python的に: div(h1(\"見出し\"), p(\"段落テキスト\")) -->\n\n<!-- 3. 属性（キーワード引数のようなもの） -->\n<a href=\"https://example.com\" target=\"_blank\">リンクテキスト</a>\n<!-- Python的に: a(\"リンクテキスト\", href=\"https://example.com\", target=\"_blank\") -->\n\n<!-- 4. 空要素（終了タグなし） -->\n<img src=\"photo.jpg\" alt=\"写真の説明\">\n<br>\n<input type=\"text\" name=\"username\">",

    body: "Webの本質は「ハイパーリンク」です。これはPythonのimport文が「他のモジュールを参照する」のと似た概念ですが、Webではファイルシステム上の .py ファイルだけでなく、世界中のどのWebページにもリンクを張ることができます。<a>タグ（anchor: アンカー）の href 属性にURLを指定し、タグで囲んだテキストがクリック可能なリンクになります。FlaskやDjangoのテンプレートで url_for() を使ってリンク先のURLを生成しますが、そのURLが最終的に挿入されるのが <a> タグの href 属性です。\n\nhref属性にはURLだけでなく、ページ内の特定位置（href=\"#section2\"）、メールアドレス（href=\"mailto:info@example.com\"）、電話番号（href=\"tel:+81-3-1234-5678\"）も指定できます。target=\"_blank\" を付けるとリンクが新しいタブで開きますが、この時はセキュリティ上 rel=\"noopener noreferrer\" を必ず併記してください。これは、新しいタブで開いたページから元ページの window.opener オブジェクトを介した攻撃（タブナビング）を防ぐためです。最近のブラウザはデフォルトで対策済みですが、明示するのがベストプラクティスです。\n\n画像は <img> タグで表示します。src 属性に画像ファイルのパスまたはURLを指定し、alt 属性に代替テキストを必ず記述します。alt はPythonの関数でdocstringを書くのと同じく、「画像が何を伝えようとしているか」を文章で説明するものです。画像が読み込めなかった場合にalt テキストが表示され、スクリーンリーダーにも読み上げられるため、アクセシビリティの要です。width と height を明示すると、画像読み込み前にブラウザがスペースを確保でき、レイアウトシフト（読み込み中にページがガタガタ動く現象）を防げます。",

    body: "HTML5で導入されたセマンティックタグは、<div>（意味のない汎用コンテナ）に「意味」を持たせた要素です。<header>、<nav>、<main>、<article>、<section>、<aside>、<footer> がその代表です。見た目はdivと完全に同じ（ブロック要素として表示される）ですが、ブラウザ、スクリーンリーダー、検索エンジンにとって「このブロックがページ内でどんな役割を持つか」を伝える重要な手がかりになります。\n\nPythonのプロジェクト構成で例えると、全てのコードを utils.py に入れるのではなく、models.py（データモデル）、views.py（表示ロジック）、services.py（ビジネスロジック）に分けるのと同じ発想です。ファイル名を見ただけで中身の役割が分かるように、HTMLのタグを見ただけでそのブロックの役割が分かるようにするのがセマンティックタグの目的です。スクリーンリーダーは <nav> タグを検出すると「ナビゲーション」とアナウンスし、<main> に直接ジャンプする機能を提供します。\n\n最も間違えやすいのは <section> と <article> の使い分けです。<article> は「それだけで独立して意味をなすコンテンツ」です。ブログ記事、ニュース記事、ユーザーコメントなど、他のサイトに転載しても意味が通じるものが article です。<section> は「テーマのまとまり」で、章や節のように他のコンテンツの文脈の中で意味を持つものです。記事（article）の中に章（section）が入ることは多いですが、章の中に記事が入ることは稀です。",

  est: "60分",
  goal: "Webアプリケーションの入口であるHTMLフォームを正しく構築できるようになる。form要素のaction/method属性がFlask/Djangoのルーティングとどう対応するかを理解し、様々なinput typeを適切に使い分けられる。HTML標準のバリデーション属性（required, pattern, minlength等）を使いこなし、label要素との紐付けやfieldset/legendによるグループ化でアクセシブルなフォームを設計できる状態がゴール。",
  sections: [{
    title: "フォームの基本構造 — Flask/Djangoとの接続点",
    body: "HTMLのフォームは、ユーザーからデータを受け取ってサーバーに送信するための仕組みです。Python開発者にとって馴染み深い例で言えば、FlaskやDjangoのテンプレートに書くログイン画面や登録画面の入力フォームがまさにこれです。PythonのFlaskで request.form['username'] や request.form['password'] のようにフォームデータを受け取ったことがあるなら、「そのデータを送る側」の仕組みがHTMLフォームです。\n\n<form> タグで全体を囲み、action 属性に送信先のURLを、method 属性にHTTPメソッド（GET or POST）を指定します。Pythonの requests ライブラリで requests.get(url, params=...) と requests.post(url, data=...) を使い分けるのと全く同じ発想です。GETはURLにパラメータが付くため検索クエリなどに使い、POSTはリクエストボディにデータが入るためパスワードを含むログインやユーザー登録に使います。Flaskでいうところの @app.route('/login', methods=['POST']) がフォームの送信先です。\n\nフォーム内の各入力要素（input, textarea, select）には name 属性が必須です。この name がPython側でデータを取り出すキーになります。Flask なら request.form['email']、Django なら request.POST['email'] のように name の値でアクセスします。name を付け忘れるとデータが送信されないため、最も多いバグの原因の1つです。フォーム送信時にはページ全体がリロードされるのがデフォルトの挙動ですが、React等のSPAではJavaScriptで非同期送信に切り替えます。",
    code: "<!-- Flaskのログイン処理と対応するHTMLフォーム -->\n\n<!-- Python (Flask) 側:\n@app.route('/api/login', methods=['POST'])\ndef login():\n    email = request.form['email']       # ← name=\"email\" に対応\n    password = request.form['password'] # ← name=\"password\" に対応\n    return redirect('/dashboard')\n-->\n\n<!-- HTML (テンプレート) 側: -->\n<form action=\"/api/login\" method=\"POST\">\n  <!-- action=\"/api/login\" → Flask の @app.route('/api/login') に送信 -->\n  <!-- method=\"POST\" → methods=['POST'] に対応 -->\n\n  <label for=\"email\">メールアドレス</label>\n  <input type=\"email\" id=\"email\" name=\"email\" required>\n  <!-- name=\"email\" → request.form['email'] で取得 -->\n\n  <label for=\"password\">パスワード</label>\n  <input type=\"password\" id=\"password\" name=\"password\" required>\n  <!-- name=\"password\" → request.form['password'] で取得 -->\n\n  <button type=\"submit\">ログイン</button>\n</form>",
    afterCode: "Django を使っている場合は、{% csrf_token %} をフォーム内に書くとCSRFトークンが hidden input として自動生成されます。これは <input type=\"hidden\" name=\"csrfmiddlewaretoken\" value=\"...\"> というHTMLに展開されます。Flask-WTFでも同様の仕組みがあります。セキュリティのためにPOSTフォームにはCSRFトークンが必須です。"
  }, {
    title: "多様なinput type — 型を正しく選ぶ理由",
    body: "HTML5では多数の input type が追加されました。Pythonで変数に int 型と str 型を使い分けるのと同じ発想で、HTMLでも入力データの種類に応じた type を選ぶことが重要です。type=\"email\" にするだけで @ マークの存在チェックが自動で行われ、type=\"number\" にすれば数値以外の入力が防がれ、type=\"date\" にすれば日付ピッカーが自動表示されます。PythonのWTFormsで StringField、IntegerField、DateField を使い分けるのと全く同じ考え方です。\n\ntype の選択はモバイルでの使い勝手に劇的な影響を与えます。type=\"tel\" ならスマートフォンでテンキーが表示され、type=\"email\" なら @ ボタンが追加された専用キーボードが現れ、type=\"url\" なら .com ボタン付きのキーボードが表示されます。ユーザー体験（UX）を考える上で、input type の選択はCSSのデザイン以上に重要です。適切な type を選ぶだけで、追加のJavaScriptを書かずにバリデーションとモバイル最適化の両方が手に入ります。\n\ntype=\"hidden\" は画面に表示されない隠しフィールドで、CSRFトークン、セッションID、前のページから引き継いだ値などをサーバーに送り返すために使います。DjangoやFlask-WTFのCSRFトークンは、内部的に <input type=\"hidden\"> として生成されています。また、type=\"file\" はファイルアップロードのための入力欄で、この場合は form 要素に enctype=\"multipart/form-data\" を追加する必要があります。Flaskの request.files['avatar'] でファイルを受け取る際に、HTML側でこの設定が必要です。",
    table: T.inputTypes,
    afterTable: "type属性を正しく指定するだけで、ブラウザ標準のバリデーションとモバイル最適化が無料で手に入ります。JavaScriptでカスタムバリデーションを書く前に、まずHTML標準の機能を最大限活用しましょう。Pythonでも組み込み関数で済むことにわざわざサードパーティライブラリを使わないのと同じ原則です。"
  }, {
    title: "select と textarea — テキスト入力以外の要素",
    body: "入力要素は <input> だけではありません。複数の選択肢から1つを選ばせたい場合は <select>（ドロップダウンメニュー）を、長文の自由記述を受け取りたい場合は <textarea>（複数行テキスト入力）を使います。Pythonで関数の引数に Literal['A', 'B', 'C'] のような制約を付けるのが select、str 型で自由入力を受け取るのが textarea に相当します。\n\n<select> の中には <option> タグで選択肢を並べます。value 属性がサーバーに送信される値で、タグの中身がユーザーに表示されるテキストです。Pythonの辞書 {'tokyo': '東京都', 'osaka': '大阪府'} のように、内部的な値（value）と表示名を分離できます。<optgroup> タグで選択肢をグループ化することも可能で、都道府県を地方ごとにまとめる場合などに使います。\n\n<textarea> は rows と cols 属性で初期サイズを指定しますが、CSSで幅と高さを制御するのが一般的です。input と異なり、<textarea> は開始タグと終了タグのペアで囲む必要があります（<textarea></textarea>）。初期値はタグの中身として記述し、value 属性ではないことに注意してください。",
    code: "<!-- ドロップダウンメニュー -->\n<label for=\"prefecture\">都道府県</label>\n<select id=\"prefecture\" name=\"prefecture\">\n  <option value=\"\">選択してください</option>\n  <optgroup label=\"関東\">\n    <option value=\"tokyo\">東京都</option>\n    <option value=\"kanagawa\">神奈川県</option>\n  </optgroup>\n  <optgroup label=\"関西\">\n    <option value=\"osaka\">大阪府</option>\n    <option value=\"kyoto\">京都府</option>\n  </optgroup>\n</select>\n<!-- Flask: request.form['prefecture'] → 'tokyo' (valueの値が送られる) -->\n\n<!-- 複数行テキスト入力 -->\n<label for=\"message\">お問い合わせ内容</label>\n<textarea id=\"message\" name=\"message\" rows=\"5\" cols=\"40\"\n          placeholder=\"ご質問やご意見をお書きください\"></textarea>\n<!-- Flask: request.form['message'] → ユーザーが入力した複数行テキスト -->",
    afterCode: "select に multiple 属性を付けると複数選択が可能になり、Flask側では request.form.getlist('prefecture') でリストとして取得できます。ただしUIとしてはチェックボックスの方が分かりやすいことが多いため、選択肢が少ない場合はチェックボックスも検討しましょう。"
  }, {
    title: "バリデーション属性 — ブラウザが自動でチェックしてくれる",
    body: "HTMLには標準でバリデーション（入力検証）の仕組みが組み込まれています。Pythonで Flask-WTF の validators.DataRequired() や validators.Length(min=3, max=20) をフォーム定義に追加するのと同じ考え方で、HTMLの属性を付けるだけで入力チェックが有効になります。required 属性を付けるだけで必須入力になり、minlength で最低文字数、maxlength で最大文字数、min/max で数値の範囲、pattern で正規表現チェックが可能です。\n\nHTMLバリデーションはクライアント側（ブラウザ）で実行されるため、フォーム送信前にユーザーにリアルタイムでフィードバックを返せます。バリデーションに失敗した項目には赤枠やエラーメッセージが自動表示され、フォームは送信されません。ただし重要な注意点として、HTMLバリデーションはDevToolsから簡単に無効化できます。悪意のあるユーザーは HTML の required 属性を削除してフォームを送信できるため、サーバー側（Python側）のバリデーションは必ず併用してください。「クライアント側はUXのため、サーバー側はセキュリティのため」の二重バリデーションが鉄則です。\n\npattern 属性には正規表現を指定できます。構文はPythonの re モジュールとほぼ同じですが、^（先頭）と $（末尾）は自動的に付与されるため、パターン自体には書く必要がありません。Pythonで re.fullmatch(pattern, value) を使うのと同じで、入力全体がパターンに一致するかどうかがチェックされます。title 属性を併用すると、バリデーション失敗時にその文字列がエラーメッセージとして表示されるため、ユーザーが「何が間違っているか」を理解しやすくなります。",
    table: T.formValidation,
    code: "<!-- Flask-WTF のバリデータと対応する HTML 属性 -->\n\n<!-- Python: username = StringField(validators=[DataRequired(), Length(min=3, max=20)]) -->\n<input type=\"text\" name=\"username\" required minlength=\"3\" maxlength=\"20\">\n\n<!-- Python: email = StringField(validators=[DataRequired(), Email()]) -->\n<input type=\"email\" name=\"email\" required>\n<!-- type=\"email\" だけで @ のチェックが自動で行われる -->\n\n<!-- Python: age = IntegerField(validators=[NumberRange(min=0, max=150)]) -->\n<input type=\"number\" name=\"age\" min=\"0\" max=\"150\">\n\n<!-- Python: zipcode = StringField(validators=[Regexp(r'^\\d{3}-\\d{4}$')]) -->\n<input type=\"text\" name=\"zipcode\"\n       pattern=\"[0-9]{3}-[0-9]{4}\"\n       title=\"000-0000の形式で入力してください\"\n       required\n       placeholder=\"例: 100-0001\">\n<!-- pattern は ^ と $ が自動付与されるので書かない -->",
    afterCode: "title 属性に書いた文字列は、バリデーション失敗時のエラーメッセージに含まれます。「入力が正しくありません」のような曖昧なメッセージではなく、「000-0000の形式で入力してください」のように具体的な例を示すのがユーザーフレンドリーです。"
  }, {
    title: "label要素とアクセシビリティ — 全員が使えるフォームにする",
    body: "フォームのアクセシビリティは、視覚障害者だけでなく全てのユーザーの操作性に影響します。最も重要なのが <label> タグで、入力欄に「何を入力するか」の説明を紐付けます。label を正しく紐付けると、ラベルのテキストをクリックするだけで対応する入力欄にフォーカスが移動します。特にチェックボックスやラジオボタンは非常に小さく、ラベルがクリック可能かどうかでスマートフォンでの操作性が劇的に変わります。\n\nlabel と input の紐付け方は2つあります。第一の方法（明示的ラベル）は、label の for 属性と input の id 属性を同じ値にする方法です。Pythonで変数名を揃えるのと同じで、for=\"email\" と id=\"email\" をペアにします。第二の方法（暗黙的ラベル）は、label タグで input 全体を囲む方法です。明示的ラベルの方がスクリーンリーダーとの互換性が高く推奨されますが、チェックボックスやラジオボタンでは暗黙的ラベル（label で input を囲む形）の方がコードが簡潔になるため、状況に応じて使い分けます。\n\nfieldset と legend は関連する入力をグループ化するための要素です。例えば「性別」のラジオボタン3つを fieldset で囲み legend で「性別」と付けると、スクリーンリーダーは「性別グループの中の男性」のように読み上げます。Pythonの dataclass でフィールドをグループ化する、あるいは argparse で引数グループ（add_argument_group）を作るのと似た発想です。グループ化することで、フォームが長くなっても論理的な構造が明確になります。",
    table: T.formAccessibility,
    code: "<!-- 方法1: 明示的ラベル（for + id のペア。推奨） -->\n<label for=\"username\">ユーザー名</label>\n<input type=\"text\" id=\"username\" name=\"username\">\n<!-- Python的に: for=\"username\" と id=\"username\" が同じ値 → 紐付け完了 -->\n\n<!-- 方法2: 暗黙的ラベル（labelで囲む） -->\n<label>\n  ユーザー名\n  <input type=\"text\" name=\"username\">\n</label>\n\n<!-- fieldset + legend でグループ化 -->\n<fieldset>\n  <legend>配送方法</legend>\n  <label><input type=\"radio\" name=\"shipping\" value=\"standard\"> 通常配送</label>\n  <label><input type=\"radio\" name=\"shipping\" value=\"express\"> 速達</label>\n  <label><input type=\"radio\" name=\"shipping\" value=\"pickup\"> 店舗受取</label>\n</fieldset>\n<!-- スクリーンリーダー: 「配送方法グループ、通常配送、ラジオボタン」 -->",
    afterCode: "アクセシビリティは「誰かのための特別対応」ではなく、全ユーザーの操作性を向上させるための設計原則です。Pythonで型ヒントを書くと自分自身のコードが読みやすくなるのと同じで、アクセシブルなフォームは結果的にすべての人にとって使いやすくなります。label をクリックして入力欄にフォーカスが移る挙動は、マウスユーザーにとっても便利な機能です。"
  }]

  id: "ch4",
  num: 4,
  title: "CSSセレクタと優先度",
  est: "50分",
  goal: "要素・クラス・ID・属性・擬似クラスなどのセレクタを自在に使い分けられるようになる。結合子（子孫、子、隣接兄弟、一般兄弟）の意味を正しく理解し、詳細度の計算ルールを把握して「なぜこのスタイルが適用されないのか」というデバッグを自力で行える状態がゴール。",
  sections: [{
    title: "CSSの基本構文とセレクタ一覧",
    body: "CSSのルールは「セレクタ { プロパティ: 値; }」という構造です。Pythonで辞書（dict）にスタイル設定を書くのと似ています。セレクタが「どの要素に」、プロパティが「何を」、値が「どのように」を指定します。\n\nセレクタにはいくつかの種類があり、要素セレクタ（pやdivなど）は最も基本的なもの、クラスセレクタ（.classname）は再利用可能なスタイル定義、IDセレクタ（#id）はページ内で一意の要素への指定に使います。属性セレクタ（[type=\"text\"]）はinput要素のtype属性などで絞り込む時に便利です。\n\n実務ではクラスセレクタが最も多用されます。IDセレクタは詳細度が高すぎてスタイルの上書きが難しくなるため、CSSの設計においては使用を避ける方針が主流です（HTMLのidは残しつつ、CSSではクラスで指定する）。",
    table: T.selectorTypes,
    code: "/* 要素セレクタ */\np { color: #333; }\n\n/* クラスセレクタ */\n.alert { background: #fef3c7; padding: 12px; }\n\n/* IDセレクタ（CSS では使用を控えめに） */\n#header { background: #1e1b4b; }\n\n/* 属性セレクタ */\ninput[type=\"email\"] { border-color: #6366f1; }\n\n/* 擬似クラス */\na:hover { color: #4338ca; }\nli:first-child { font-weight: bold; }\nli:nth-child(2n) { background: #f9fafb; }",
    afterCode: "擬似クラスは「状態」を表します。:hover（マウスが上にある）、:focus（入力欄が選択されている）、:first-child（最初の子要素）など、JavaScriptを書かずに動的なスタイルを適用できます。"
  }, {
    title: "結合子（Combinator）",
    body: "セレクタを組み合わせて「どの位置にある要素か」を指定するのが結合子です。Pythonのファイルパスのように「フォルダ/サブフォルダ/ファイル」と辿るイメージで、HTMLの木構造の中の位置関係を表現します。\n\n最も使われるのは子孫結合子（スペース区切り）で、「div p」は「divの中のどこかにあるp」にマッチします。子結合子（>）は「直下の子要素のみ」にマッチし、深い階層の要素には影響しません。\n\n隣接兄弟結合子（+）と一般兄弟結合子（~）は、兄弟関係にある要素を指定します。「h2の直後のp」や「h2と同じ階層にあるすべてのp」といった条件で使い分けます。Pythonのリストで隣り合う要素に別処理をするイメージです。",
    table: T.combinators,
    code: "/* 子孫結合子: nav の中の全ての a */\nnav a { color: #6366f1; }\n\n/* 子結合子: nav の直下の a のみ */\nnav > a { font-weight: bold; }\n\n/* 隣接兄弟結合子: h2 直後の p */\nh2 + p { font-size: 1.1em; margin-top: 4px; }\n\n/* 一般兄弟結合子: h2 以降の全ての p */\nh2 ~ p { line-height: 1.8; }",
    afterCode: "子孫結合子（スペース）は便利ですが、深い階層まで探索するためパフォーマンスに影響することがあります。可能なら子結合子（>）を使い、探索範囲を限定するのがベストプラクティスです。"
  }, {
    title: "詳細度（Specificity）",
    body: "CSSで最もつまずきやすいのが「なぜこのスタイルが適用されないのか」問題です。原因のほとんどは詳細度（Specificity）で、同じプロパティに対して複数のルールが存在する場合、詳細度が高い方が勝ちます。\n\n詳細度は (a, b, c) の3つの数字で計算されます。aはIDセレクタの数、bはクラス・属性・擬似クラスの数、cは要素・擬似要素の数です。a列が最も重く、a=1のセレクタはb=100のセレクタにも勝ちます。Pythonで言えばタプルの辞書順比較と同じです。\n\n!importantは全ての詳細度を上書きする切り札ですが、多用すると「!importantの上書き合戦」に陥り、保守不能なCSSになります。本来は詳細度の設計で解決すべき問題を力技で封じ込めるものなので、使用は最小限に留めましょう。",
    table: T.specificity,
    afterTable: "覚え方: IDは「100点」、クラスは「10点」、要素は「1点」と点数化して比較する方法が直感的です（厳密には桁が独立しているので点数制は近似ですが、実用的には十分です）。"
  }, {
    title: "CSSの読み込み順とカスケード",
    body: "同じ詳細度のルールが複数ある場合は、後から読み込まれた方が優先されます。これが「カスケード」（Cascade）の基本で、CSSの正式名称「Cascading Style Sheets」の由来です。\n\nスタイルの適用優先度は高い順に: !important > インラインstyle属性 > IDセレクタ > クラスセレクタ > 要素セレクタ > ブラウザデフォルト です。これに加えて同順位なら「後から書かれた方」が勝つルールが適用されます。\n\nPythonの変数スコープ（LEGB規則: Local → Enclosing → Global → Built-in）と似た階層構造です。最もローカルな指定が最も優先されます。CSSでのデバッグは、DevToolsのComputedパネルで「最終的にどのルールが適用されたか」を確認するのが最も効率的です。",
    code: "/* 同じ詳細度なら後に書いた方が勝つ */\np { color: blue; }   /* ← 負ける */\np { color: red; }    /* ← 勝つ（後に書いた） */\n\n/* 詳細度が高い方が勝つ（順序は関係ない） */\n.text { color: green; }  /* (0,1,0) ← 勝つ */\np { color: red; }         /* (0,0,1) ← 負ける */\n\n/* !important は詳細度を無視して最優先 */\np { color: blue !important; }  /* ← これが最優先 */\n#main .text p { color: red; }  /* ← 負ける */",
    afterCode: "デバッグTip: DevToolsのElementsパネルで要素を選択し、Stylesタブを見ると、適用されている全てのCSSルールが詳細度順に表示されます。打ち消し線で消されているルールが「負けた」ルールです。"
  }]

  sections: [{
    title: "モバイルファーストとは",
    body: "モバイルファーストとは「まずモバイル向けのスタイルを基本として書き、画面が広くなるにつれてスタイルを追加していく」設計手法です。PythonでAPIを設計する時に「最小限の引数で動く関数をまず作り、オプション引数で機能を拡張する」のと同じ発想です。\n\n逆のアプローチ（デスクトップファースト）だと、モバイル対応のために大量のスタイルを上書き（打ち消し）しなければなりません。display: noneやwidth: autoなどのリセットが頻発し、CSSが冗長になります。モバイルファーストならスタイルの追加だけで済むため、CSSの量が少なく保守しやすくなります。\n\n実際のメディアクエリの書き方としては、min-widthを使います。「768px以上なら2列にする」のように画面が広くなる時だけルールを追加する形式です。max-widthは「この幅以下で」という条件で、デスクトップファーストの書き方になります。",
    code: "/* モバイルファースト: min-width で上書き */\n.container {\n  padding: 12px;           /* モバイル: 基本 */\n  font-size: 14px;\n}\n\n@media (min-width: 768px) {\n  .container {\n    padding: 24px;         /* タブレット: 拡張 */\n    font-size: 16px;\n  }\n}\n\n@media (min-width: 1024px) {\n  .container {\n    padding: 32px;         /* デスクトップ: さらに拡張 */\n    max-width: 1100px;\n    margin: 0 auto;\n  }\n}",
    afterCode: "メディアクエリの順序に注意: min-widthを使う場合は小さい値から大きい値へ順に書きます。逆順にするとカスケード（後に書いた方が優先）のルールで意図しない上書きが起きます。"
  }, {
    title: "メディアクエリの実践",
    body: "メディアクエリは「画面の条件に応じてCSSルールを切り替える」仕組みです。Pythonのif文で条件分岐するのと同じで、@media (条件) { ... } の中に条件付きのCSSルールを書きます。\n\nブレークポイント（切り替えるポイント）の設定は、特定のデバイスの幅ではなく「レイアウトが壊れるポイント」で決めるのが現代のベストプラクティスです。ただし参考として一般的なブレークポイントを知っておくと便利です。\n\n複数の条件をand / or / notで組み合わせることも可能です。@media (min-width: 768px) and (orientation: landscape)のように書くと、768px以上かつ横向きの場合にのみスタイルが適用されます。",
    table: T.mediaQueries,
    code: "/* 基本のメディアクエリ */\n@media (min-width: 768px) {\n  .sidebar { display: block; }\n}\n\n/* 複数条件の組み合わせ */\n@media (min-width: 768px) and (max-width: 1023px) {\n  /* タブレットだけに適用 */\n  .content { padding: 20px; }\n}\n\n/* ダークモード対応 */\n@media (prefers-color-scheme: dark) {\n  :root {\n    --bg: #0f0e1a;\n    --text: #e5e7eb;\n  }\n}\n\n/* アニメーション無効化（アクセシビリティ） */\n@media (prefers-reduced-motion: reduce) {\n  * { animation: none !important; transition: none !important; }\n}",
    afterCode: "prefers-color-schemeやprefers-reduced-motionは、ユーザーのOS設定を検出するメディアクエリです。ダークモード対応やアニメーション無効化といったユーザビリティ向上に活用できます。"
  }, {
    title: "viewport設定と相対単位",
    body: "HTMLのheadに<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">を入れないと、モバイルブラウザはページをデスクトップ幅（980pxなど）で表示し、縮小して画面に収めようとします。この1行がないと、どんなに丁寧にレスポンシブCSSを書いてもモバイルで正しく表示されません。\n\nレスポンシブデザインではpx（絶対値）だけでなく、相対単位を使い分けることが重要です。remはルート要素（html）のフォントサイズ基準、emは親要素のフォントサイズ基準、vw/vhはビューポートの幅/高さの1%です。\n\nclamp()関数は「最小値・推奨値・最大値」の3つを指定し、画面幅に応じて推奨値が自動調整される関数です。メディアクエリを書かなくてもフォントサイズや余白が滑らかにスケーリングされるため、2026年現在では非常によく使われています。",
    table: T.responsiveUnits,
    code: "/* 相対単位の実践 */\nhtml { font-size: 16px; }  /* 1rem = 16px */\n\nh1 { font-size: clamp(1.5rem, 3vw + 1rem, 3rem); }\np  { font-size: clamp(0.875rem, 1vw + 0.5rem, 1.125rem); }\n\n.container {\n  width: min(90%, 1100px);  /* 90%と1100pxの小さい方 */\n  margin: 0 auto;\n  padding: clamp(12px, 3vw, 40px);\n}\n\n.hero {\n  height: 100vh;       /* ビューポートの高さ100% */\n  height: 100dvh;      /* 動的ビューポート高さ（モバイル対応） */\n}",
    afterCode: "100vhはモバイルブラウザのURLバーの影響を受けるため、100dvh（Dynamic Viewport Height）が推奨されます。dvhはURLバーの表示/非表示に応じて値が変化するため、意図しない隙間やスクロールを防げます。"
  }, {
    title: "レスポンシブデザインの実践パターン",
    body: "レスポンシブデザインの実践では、いくつかの定番パターンがあります。最も基本的なのは「モバイルで1列、デスクトップで2〜3列」への切り替えです。GridのautoFillパターンを使えばメディアクエリなしで実現できますが、より細かい制御が必要な場合はメディアクエリを使います。\n\n画像のレスポンシブ対応は3つのレベルがあります。最もシンプルなのはmax-width: 100%で親要素にフィットさせる方法。高度な対応にはpicture要素とsrcset属性で画面サイズに応じて異なる画像を提供する方法があり、特にモバイルのデータ通信量削減に効果的です。\n\nテーブルのレスポンシブ対応も頻出の課題です。列数が多いテーブルはモバイルではoverflowX: autoで横スクロールさせるか、display: blockに変更して各行をカード形式に変換するアプローチがあります。",
    table: T.viewportMeta,
    code: "/* テーブルのレスポンシブ */\n.table-wrapper {\n  overflow-x: auto;           /* 横スクロール */\n  -webkit-overflow-scrolling: touch; /* iOSの慣性スクロール */\n}\n\n/* ナビゲーションのレスポンシブ */\n.nav-menu {\n  display: flex;\n  flex-direction: column;     /* モバイル: 縦並び */\n  gap: 8px;\n}\n\n@media (min-width: 768px) {\n  .nav-menu {\n    flex-direction: row;      /* デスクトップ: 横並び */\n    gap: 20px;\n  }\n}",
    afterCode: "user-scalable=noやmaximum-scale=1.0は、ピンチズームを無効化するため、弱視のユーザーがテキストを拡大できなくなります。WCAG（Webアクセシビリティガイドライン）では非推奨とされているため、特別な理由がない限り設定しないでください。"
  }]
}, {
  id: "ch9",
  num: 9,
  title: "CSSカスタムプロパティとアニメーション",
  est: "50分",
  goal: "CSSカスタムプロパティ（CSS変数）を使ったテーマ管理ができるようになる。transition / transform / @keyframesを使ったアニメーションを実装し、パフォーマンスを意識した滑らかなUIエフェクトを書ける状態がゴール。",
  sections: [{
    title: "CSSカスタムプロパティ（CSS変数）",
    body: "CSSカスタムプロパティは、Pythonの定数定義やconfigファイルと同じ発想で、値に名前を付けて再利用できる仕組みです。--で始まる名前で宣言し、var()関数で参照します。\n\nPythonのsettings.pyにPRIMARY_COLOR = '#6366f1'と書いて各所で参照するのと同じように、:rootに色やサイズを定義し、CSS全体で統一して使います。値を変更する時は1箇所だけ修正すれば全体に反映されるため、大規模サイトの保守性が劇的に向上します。\n\nカスタムプロパティはJavaScriptからも操作でき、ダークモード切り替えやテーマカラーの動的変更に活用されます。また、セレクタのスコープ内でローカルに上書きできるため、コンポーネント単位での変数管理も可能です。",
    table: T.customProps,
    code: ":root {\n  /* テーマカラー */\n  --color-primary: #6366f1;\n  --color-bg: #f8f7f4;\n  --color-text: #1e1b4b;\n\n  /* サイズ */\n  --radius: 8px;\n  --spacing: 16px;\n}\n\n/* ダークテーマ: 変数を上書きするだけ */\n[data-theme=\"dark\"] {\n  --color-primary: #818cf8;\n  --color-bg: #0f0e1a;\n  --color-text: #e5e7eb;\n}\n\n.card {\n  background: var(--color-bg);\n  color: var(--color-text);\n  border-radius: var(--radius);\n  padding: var(--spacing);\n}",
    afterCode: "ポイント: var()の第2引数はフォールバック値です。var(--color, #333)と書くと、--colorが未定義の場合に#333が使われます。型チェックの仕組みがないため、存在しない変数名を書いてもエラーにはなりません。"
  }, {
    title: "transition（トランジション）",
    body: "transitionは「状態変化にアニメーションを付ける」最もシンプルな方法です。:hoverや:focusでスタイルが変わる時に、瞬時に切り替わるのではなく滑らかに変化させます。Pythonで値を段階的に変えるfor文に近い概念ですが、CSSが自動的に中間フレームを計算してくれます。\n\ntransitionで指定できるのは「数値で補間可能なプロパティ」だけです。color（#333→#fff）、opacity（0→1）、transform（translateY(0)→translateY(-4px)）、width / height / padding / marginなどが対象です。一方、display（noneとblockの間に中間がない）はtransitionできません。\n\nパフォーマンスの観点では、transformとopacityだけをアニメーションさせるのがベストプラクティスです。widthやheightの変化はリフロー（再計算）を引き起こし、大量の要素がある場合にカクつく原因になります。",
    table: T.transitionProps,
    code: "/* ボタンのホバーエフェクト */\n.btn {\n  background: #6366f1;\n  color: #fff;\n  padding: 10px 24px;\n  border-radius: 8px;\n  transition: background 0.2s ease, transform 0.2s ease;\n}\n.btn:hover {\n  background: #4f46e5;\n  transform: translateY(-2px);\n}\n.btn:active {\n  transform: translateY(0); /* 押し込み感 */\n}\n\n/* フォーカス時のアウトライン */\ninput:focus {\n  outline: 2px solid #6366f1;\n  outline-offset: 2px;\n  transition: outline-offset 0.15s ease;\n}",
    afterCode: "transition は変化前のセレクタに書きます。:hoverに書くと「マウスが乗った時だけアニメーション」し、離れた時は瞬時に戻ります。両方向でアニメーションさせたい場合は、元のセレクタに書きましょう。"
  }, {
    title: "transform（トランスフォーム）",
    body: "transformは要素の「変形」を行うプロパティで、移動（translate）、回転（rotate）、拡大縮小（scale）、傾斜（skew）の4つの変形を組み合わせて使います。transformはGPUで処理されるため、widthやtopを変えるよりも圧倒的にパフォーマンスが良好です。\n\nPythonのmatplotlibでグラフの要素を回転・移動させるのと同じ概念ですが、CSSではこれらの変形をリアルタイムでアニメーションさせることが前提の設計になっています。transitionや@keyframesと組み合わせて使うのが一般的です。\n\n複数のtransformを1つのプロパティにスペース区切りで書くことも可能です。transform: translateY(-4px) scale(1.02)のように書くと「上に4px移動しつつ、2%拡大する」という複合的な変形になります。",
    table: T.transformFuncs,
    code: "/* カードのホバーエフェクト（translateY + shadow） */\n.card {\n  transition: transform 0.3s ease, box-shadow 0.3s ease;\n}\n.card:hover {\n  transform: translateY(-4px);\n  box-shadow: 0 12px 40px rgba(0,0,0,0.12);\n}\n\n/* 回転アイコン */\n.icon-rotate {\n  transition: transform 0.3s ease;\n}\n.icon-rotate:hover {\n  transform: rotate(180deg);\n}\n\n/* 要素の中心を基準に拡大 */\n.zoom {\n  transition: transform 0.2s ease;\n  transform-origin: center;\n}\n.zoom:hover {\n  transform: scale(1.1);\n}",
    afterCode: "transform-origin はデフォルトで要素の中心（center center）ですが、top left や bottom right に変えることで回転の中心を移動できます。"
  }, {
    title: "@keyframes アニメーション",
    body: "transitionが「2つの状態間の変化」を扱うのに対し、@keyframesは「複数のステップを持つ自由なアニメーション」を定義できます。Pythonのforループで座標を段階的に変えるのと同じように、0%から100%の各ポイントでスタイルを指定します。\n\n@keyframesで定義した名前をanimationプロパティで参照し、duration（長さ）、timing-function（緩急）、iteration-count（繰り返し回数）を設定します。infiniteを指定すると無限に繰り返されます。\n\nanimation-fill-modeのforwardsを付けると、アニメーション終了後に最終状態を維持します。付けないと元の状態に瞬時に戻ります。ページ読み込み時のフェードインアニメーションなどでは、forwardsを付けないと一瞬元に戻って不自然に見えるので注意しましょう。",
    code: "/* フェードイン + スライドアップ */\n@keyframes fadeSlideUp {\n  from {\n    opacity: 0;\n    transform: translateY(30px);\n  }\n  to {\n    opacity: 1;\n    transform: translateY(0);\n  }\n}\n\n.animate-in {\n  animation: fadeSlideUp 0.6s ease-out forwards;\n}\n\n/* 複数ステップのアニメーション */\n@keyframes bounce {\n  0%, 100% { transform: translateY(0); }\n  25% { transform: translateY(-20px); }\n  50% { transform: translateY(-10px); }\n  75% { transform: translateY(-15px); }\n}\n\n.bouncing { animation: bounce 1s ease-in-out infinite; }\n\n/* アニメーションの遅延（要素ごとにずらす） */\n.item:nth-child(1) { animation-delay: 0s; }\n.item:nth-child(2) { animation-delay: 0.1s; }\n.item:nth-child(3) { animation-delay: 0.2s; }",
    afterCode: "パフォーマンスTip: アニメーション中にwidthやheightを変えるとリフロー（レイアウト再計算）が発生し、60fpsを維持できなくなることがあります。transform と opacity だけをアニメーションさせるのが滑らかなUIの秘訣です。"
  }]
}, {
  id: "ch10",
  num: 10,
  title: "モダンCSS機能",
  est: "45分",
  goal: "Container Queries、:has()セレクタ、CSS Nesting、Cascade Layersなど、2024年以降に広くサポートされたモダンCSS機能を理解し、従来のアプローチとの違いやメリットを説明できる状態がゴール。これらの機能を適切な場面で選択し、保守性の高いCSS設計ができるようになる。",
  sections: [{
    title: "Container Queries",
    body: "メディアクエリが「ビューポート（画面全体）の幅」を条件にするのに対し、Container Queriesは「親要素の幅」を条件にできます。これにより、コンポーネントが「どこに配置されても自動的に最適なレイアウトになる」ことが実現します。\n\nPythonのクラスで例えると、メディアクエリは「グローバル変数に基づいて動作を変える」のに対し、Container Queriesは「self（自分のコンテキスト）に基づいて動作を変える」ようなものです。コンポーネントの独立性が高まり、再利用しやすくなります。\n\n使い方は、まず親要素にcontainer-type: inline-sizeを指定し、@container (条件) { ... }でスタイルを切り替えます。サイドバーに置いた時は縦並び、メインコンテンツに置いた時は横並び、といった切り替えが自動的に行われます。",
    code: "/* 親をコンテナとして登録 */\n.card-wrapper {\n  container-type: inline-size;\n  container-name: card;\n}\n\n/* コンテナの幅に応じてスタイルを変更 */\n.card { display: grid; grid-template-columns: 1fr; }\n\n@container card (min-width: 400px) {\n  .card {\n    grid-template-columns: 150px 1fr;\n  }\n}\n\n@container card (min-width: 700px) {\n  .card {\n    grid-template-columns: 200px 1fr 150px;\n  }\n}",
    afterCode: "container-type: inline-sizeは横幅のみ追跡します。container-type: sizeは幅と高さの両方を追跡しますが、通常はinline-sizeで十分です。container-nameは省略可能ですが、名前を付けると複数のコンテナを区別できます。"
  }, {
    title: ":has() セレクタ",
    body: ":has()は「CSSに親セレクタが来た」と言われる革命的な機能です。「特定の子要素を持つ親要素」にスタイルを適用でき、従来はJavaScriptが必須だった条件付きスタイリングがCSSだけで実現できます。\n\nPythonのfilter関数やリスト内包表記のif条件に近い概念です。例えばform:has(input:invalid)は「無効な入力を含むフォーム全体」にスタイルを適用でき、label:has(+ input:focus)は「直後のinputにフォーカスがある時のlabel」を選択できます。\n\nブラウザサポートは2024年にほぼ全てのモダンブラウザで対応が完了しています。ただし古いブラウザをサポートする必要がある場合は、@supportsで機能検出を行い、フォールバックを提供しましょう。",
    code: "/* 画像を含むカード: パディング調整 */\n.card:has(> img:first-child) {\n  padding-top: 0;\n  overflow: hidden;\n}\n\n/* チェック済みラベルの強調 */\nlabel:has(input:checked) {\n  color: #16a34a;\n  font-weight: 700;\n  background: #f0fdf4;\n}\n\n/* 無効な入力を含むフォームの枠 */\nform:has(:invalid) {\n  border-left: 4px solid #dc2626;\n}\n\n/* ダークモード: data属性に基づくスタイリング */\nhtml:has([data-theme=\"dark\"]) body {\n  background: #0f0e1a;\n  color: #e5e7eb;\n}",
    afterCode: ":has() は擬似クラスなので詳細度は (0,1,0) です。:has(#id) のように内部にIDセレクタを持つ場合、:has()自体の詳細度にIDの重み (1,0,0) が加算されます。"
  }, {
    title: "CSS Nesting",
    body: "CSS Nestingは、SassやLessなどのプリプロセッサで長年使われてきた「セレクタのネスト」をネイティブCSSに持ち込んだ機能です。子セレクタを親セレクタの中に入れ子で書けるため、CSSの構造がHTMLの構造に近くなり、可読性が大幅に向上します。\n\nPythonのクラス定義でメソッドをインデントして書くように、親セレクタのブロック内に子セレクタを書きます。& は「親セレクタ自体」を表す特殊な記号で、&:hover は「親要素のホバー状態」を意味します。\n\n2024年後半からChrome / Firefox / Safariの全てで完全サポートされ、プリプロセッサ不要でネストが書けるようになりました。ただし深すぎるネスト（4階層以上）は可読性を下げるため、2〜3階層に留めるのがベストプラクティスです。",
    code: "/* ネイティブ CSS Nesting */\n.card {\n  background: #fff;\n  border-radius: 12px;\n  padding: 20px;\n\n  /* &は .card 自体を指す */\n  &:hover {\n    box-shadow: 0 8px 30px rgba(0,0,0,0.12);\n  }\n\n  /* 子孫セレクタ */\n  h3 {\n    color: #1e1b4b;\n    margin-bottom: 8px;\n  }\n\n  p {\n    color: #6b7280;\n    line-height: 1.8;\n  }\n\n  /* メディアクエリもネスト可能 */\n  @media (min-width: 768px) {\n    display: grid;\n    grid-template-columns: 200px 1fr;\n  }\n}\n\n/* 従来の書き方（ネストなし）との比較 */\n/* .card { ... }\n   .card:hover { ... }\n   .card h3 { ... }\n   .card p { ... }\n   @media (...) { .card { ... } } */",
    afterCode: "注意: ネストされたセレクタは & を暗黙的に含みます。h3 { ... } は .card h3 { ... }（子孫結合子）に展開されます。直下の子にだけ適用したい場合は & > h3 と明示的に書きます。"
  }, {
    title: "Cascade Layers (@layer)",
    body: "Cascade Layers は、CSSの優先度を「層（レイヤー）」で管理する仕組みです。従来のCSSでは詳細度の高い方が勝つため、サードパーティのCSSライブラリと自分のCSSが衝突すると、!importantで無理やり上書きする「詳細度戦争」が起きていました。\n\nLayersを使うと、レイヤーの宣言順で優先度が決まり、後に宣言したレイヤーが先に宣言したレイヤーに常に勝ちます。つまり、サードパーティCSSをreset層、自分のCSSをcomponents層に入れれば、詳細度に関係なく自分のスタイルが優先されます。\n\nPythonの名前空間やモジュールシステムに近い概念で、スタイルの適用範囲と優先度を明示的に管理できます。大規模プロジェクトやデザインシステムの構築において、CSSの保守性を劇的に向上させる機能です。",
    table: T.modernCSS,
    code: "/* レイヤーの優先度を宣言 */\n@layer reset, base, components, utilities;\n\n/* resetレイヤー（最低優先度） */\n@layer reset {\n  *, *::before, *::after { box-sizing: border-box; margin: 0; }\n}\n\n/* baseレイヤー */\n@layer base {\n  body { font-family: 'Noto Sans JP', sans-serif; }\n  a { color: var(--color-primary); }\n}\n\n/* componentsレイヤー */\n@layer components {\n  .btn { padding: 10px 24px; border-radius: 8px; }\n  .card { background: #fff; border-radius: 12px; }\n}\n\n/* utilitiesレイヤー（最高優先度） */\n@layer utilities {\n  .hidden { display: none; }\n  .text-center { text-align: center; }\n}\n\n/* レイヤー外のスタイルは全レイヤーより優先 */\n.override { color: red; }",
