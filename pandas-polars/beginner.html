const chapters = [
{id:"ch1",num:1,title:"DataFrameの基本",est:"45分",
goal:"DataFrameの概念を理解し、pandasとpolarsの両方でDataFrameを作成できる。shape・dtypes・head・describeで基本的なデータ把握ができる。",
sections:[
{title:"DataFrameとは何か",
body:`DataFrameは「表形式のデータ」を扱うための中心的なデータ構造です。Excelのシートと同じように行と列があり、各列は同じ型のデータを持ちます。Pythonのリストや辞書と違って、DataFrameはNumPyを基盤として数値演算を高速に処理できます。

pandasはPythonデータ分析の事実上の標準ライブラリで、2008年にリリースされて以来広く使われてきました。polarsはRust製の新しいライブラリで、並列処理を活かした高速な処理が特徴です。APIは似ていますが細部が異なります。このコースではタイタニックのデータセットを使い、両者の違いを実践的に学びます。`,
table:T.dfConcepts,
afterTable:`NumPyのndarrayは同一型の多次元配列ですが、DataFrameは列ごとに異なる型（int/float/str）を持てます。pandasの内部はNumPy配列でできており、polarsはArrow配列を使います。`},
{title:"DataFrameの作成と基本操作",
body:`DataFrameは辞書・リスト・CSVなど様々なソースから作成できます。最も簡単なのは辞書から作る方法で、キーが列名・値がリストになります。pandasとpolarsで基本的な書き方はほぼ同じですが、メソッド名に微妙な違いがあります。

describeメソッドは数値列の統計量（count・mean・std・min・25%・50%・75%・max）を一気に確認できる強力なツールです。データを受け取ったらまずdescribe()を実行して異常値や欠損の傾向を把握することがデータ分析の第一歩です。`,
code:`import pandas as pd
import polars as pl

# dictから作成
data = {
    'name': ['Alice', 'Bob', 'Carol'],
    'age': [25, 30, 22],
    'score': [88.5, 91.0, 76.3]
}

df_pd = pd.DataFrame(data)
df_pl = pl.DataFrame(data)

# 基本情報
print("shape:", df_pd.shape)         # (3, 3)
print("columns:", df_pd.columns.tolist())
print("dtypes:\\n", df_pd.dtypes)
print("\\nhead:\\n", df_pd.head(2))
print("\\ndescribe:\\n", df_pd.describe())`,
afterCode:`pandasのcolumnsはIndex型を返すので.tolist()で普通のリストにできます。polarsはPythonのリストをそのまま返します。この違いは実務でしばしば混乱を招くので覚えておきましょう。`},
]},
{id:"ch2",num:2,title:"データ読み書き",est:"50分",
goal:"CSVやParquet等のファイルを読み書きできる。エンコーディングやsep等のオプションを使いこなせる。",
sections:[
{title:"CSVの読み込みとオプション",
body:`データ分析の現場では大半のデータがCSVやExcel形式で渡されます。pd.read_csv()はデフォルトでも動くことが多いですが、日本語データではencoding='utf-8'や'shift-jis'の指定が必要です。また、区切り文字がタブの場合はsep='\\t'、ヘッダが無い場合はheader=Noneを指定します。

polarsのpl.read_csv()は同様のオプションを持ちますが、デフォルトのエンコーディング推定がpandasと異なる場合があります。大容量CSVではpolarsの並列読み込みが数倍高速になることがあります。`,
table:T.ioFormats,
afterTable:`Parquetは列指向の圧縮フォーマットで、CSVより読み書きが高速で容量も小さくなります。データを長期保存する場合はParquetを使うのが実務では一般的です。`},
{title:"読み込み時のよくあるオプション",
body:`実務でよく遭遇するのが文字化け（エンコーディング問題）です。Windowsで作成されたCSVはShift-JISのことが多く、read_csv('file.csv', encoding='shift-jis')と指定します。それでも読めない場合はerrors='replace'や'ignore'を追加します。

dtype引数で列の型を明示的に指定すると、読み込み時の自動型推定によるミスを防げます。例えば郵便番号は数値として読まれると先頭のゼロが消えてしまうため、dtype={'zip_code': str}のように文字列で読む必要があります。`,
code:`import pandas as pd

# 基本的な読み込み
df = pd.read_csv('titanic.csv')

# オプション付き
df2 = pd.read_csv(
    'data.csv',
    encoding='utf-8',    # 文字コード指定
    sep=',',             # 区切り文字
    header=0,            # ヘッダ行番号
    na_values=['N/A', '-'],  # 欠損値として扱う文字列
    dtype={'PassengerId': int, 'Name': str},
    usecols=['Name', 'Age', 'Survived']  # 必要な列だけ読む
)

# 書き出し
df.to_csv('output.csv', index=False, encoding='utf-8')

# Parquet（高速・圧縮）
df.to_parquet('output.parquet')
df3 = pd.read_parquet('output.parquet')`,
afterCode:`usecols で必要な列だけ読み込むとメモリ使用量を大幅に削減できます。数百列あるデータでは10列だけ読む指定をするだけで速度が劇的に改善することがあります。`},
]},
{id:"ch3",num:3,title:"選択とフィルタリング",est:"55分",
goal:"pandas の loc/iloc/boolean indexing と polars の filter()/select() を使い、必要なデータを柔軟に抽出できる。",
sections:[
{title:"pandasの選択方法",
body:`pandasには行・列を選択する方法が複数あります。[]演算子は列名で列を選べ、df['age']で単列、df[['age','name']]で複数列を取得します。locはラベルベースのアクセスでdf.loc[0:2, 'age':'name']のように範囲指定ができます。ilocは整数インデックスベースで、df.iloc[0:3, 1:3]のようにスライスで指定します。

boolean indexingは「条件を満たす行だけ抽出する」最も頻繁に使うパターンです。df[df['age'] > 25]で25歳超の行だけ抽出できます。複数条件はdf[(df['age'] > 25) & (df['score'] > 80)]のように&（AND）や|（OR）で組み合わせますが、各条件を必ず括弧で囲む必要があります。`,
table:T.filterOps,
afterTable:`locとilocの違いで混乱しやすいのがスライスの扱いです。loc[0:3]はインデックス3を含む（4行）のに対し、iloc[0:3]はPythonのリストと同様に3を含まない（3行）です。`},
{title:"polarsのfilterとselect",
body:`polarsではfilter()で行を絞り込み、select()で列を選択します。条件式にはpl.col('列名')を使い、これはpandasのdf['列名']に相当します。polarsはメソッドチェーンが基本設計なので、filter→select→sort→limit等を自然に繋げて書けます。

polarsでは条件演算子が直感的で、is_in()・is_null()・is_between()等の便利なメソッドが用意されています。pandasのboolean indexingに比べてエラーメッセージが明確なのも特徴です。`,
code:`import pandas as pd
import polars as pl

df_pd = pd.read_csv('titanic.csv')
df_pl = pl.read_csv('titanic.csv')

# pandas: 女性の生存者を Name と Age だけ取得
result_pd = df_pd.loc[
    (df_pd['Sex'] == 'female') & (df_pd['Survived'] == 1),
    ['Name', 'Age']
]

# polars: 同じ操作
result_pl = (
    df_pl
    .filter((pl.col('Sex') == 'female') & (pl.col('Survived') == 1))
    .select(['Name', 'Age'])
)

print(result_pd.head(3))
print(result_pl.head(3))`,
afterCode:`polarsはlazy APIも提供しており、scan_csv()で読み込み・filter/selectをチェーンしてcollect()で実行すると、必要な列・行だけをメモリに載せる最適化が自動で行われます。大規模データでは特に有効です。`},
]},
{id:"ch4",num:4,title:"列操作",est:"50分",
goal:"列の追加・削除・名前変更・型変換・文字列操作を pandas と polars 両方で実行できる。",
sections:[
{title:"列の追加・削除・名前変更",
body:`データ分析では元の列から新しい特徴量を作る「特徴量エンジニアリング」が重要です。pandasでは直接代入（df['new']=...）またはassign()メソッドで列を追加します。assign()はメソッドチェーンで使えるため、複数列を一度に追加したい場合に便利です。

polarsではwith_columns()が対応メソッドで、pl.col()を使った式で新列を定義します。polarsのwith_columns()はイミュータブル（元のDataFrameを変更しない）で、常に新しいDataFrameを返します。pandasのassign()も同様ですが、直接代入（df['new']=...）は元のDataFrameを変更します。`,
table:T.colOps,
afterTable:`列名のリネームはpandasではrename(columns={'old':'new'})、polarsではrename({'old':'new'})です。複数列を一度にリネームする場合も辞書に複数の対応を書けばOKです。`},
{title:"型変換と文字列操作",
body:`データ読み込み時に型が意図通りにならないことがよくあります。例えば数値のはずの列が文字列として読まれた場合、astype(int)やastype(float)で変換します。変換できない値（欠損値や'N/A'等の文字列）があるとエラーになるので、事前に欠損処理が必要です。

pandasの文字列操作はstrアクセサ経由で行います。df['name'].str.upper()・df['name'].str.split()・df['name'].str.contains('pattern')等が使えます。polarsではpl.col('name').str.to_uppercase()のようにstr名前空間のメソッドを呼びます。`,
code:`import pandas as pd

df = pd.read_csv('titanic.csv')

# 列追加: Fare をカテゴリ化
df = df.assign(
    FareCategory=pd.cut(df['Fare'], bins=[0,10,50,600],
                        labels=['cheap','mid','expensive']),
    NameLength=df['Name'].str.len()
)

# 型変換
df['Age'] = df['Age'].fillna(0).astype(int)

# 文字列操作: 敬称抽出
df['Title'] = df['Name'].str.extract(r', (\\w+)\\.')

# 列削除
df = df.drop(['Ticket','Cabin'], axis=1)

# 列名変更
df = df.rename(columns={'Pclass': 'PassengerClass'})

print(df[['Name','Title','NameLength','FareCategory']].head(3))`,
afterCode:`pd.cut()は連続値をビン（区間）に分類するときに便利です。labelsに名前を付けると結果がわかりやすくなります。同様にpd.qcut()は分位数で均等に区切ります。`},
]},
{id:"ch5",num:5,title:"欠損値の処理",est:"45分",
goal:"欠損値を検出・集計し、削除・定数補完・前後方補完など状況に応じた欠損処理ができる。",
sections:[
{title:"欠損値の検出と集計",
body:`実世界のデータには必ずといっていいほど欠損値があります。pandasでは欠損値をNaN（Not a Number）として管理し、polarsではnullとして管理します。両者とも「値が存在しない」という概念ですが、内部表現が異なります。

欠損値を無視したまま集計すると誤った結果になります。例えばdf['age'].mean()はNaNを除いて計算するので問題ありませんが、df['age'] + df['salary']のような演算でどちらかがNaNなら結果もNaNになります。まずisnull().sum()で欠損状況を把握してから処理方針を決めることが重要です。`,
table:T.missingOps,
afterTable:`欠損値の処理方針は「削除」「固定値補完」「統計値補完（平均・中央値）」「前後値補完」の4つが基本です。どれを使うかはデータの性質と分析目的によって変わります。`},
{title:"欠損値の補完テクニック",
body:`補完方法の選択はデータの性質に依存します。年齢のような連続変数には中央値補完が外れ値の影響を受けにくくて適しています。性別のようなカテゴリ変数には最頻値（mode()）補完が一般的です。時系列データでは前方補完（ffill）が自然な選択です。

polarsのfill_null(strategy='forward')はpandasのfillna(method='ffill')に対応します。ただし先頭行が欠損している場合は前方補完できないため、後続処理で確認が必要です。欠損の多い列（例：Cabinで70%以上が欠損）は思い切って列ごと削除するのも現実的な戦略です。`,
code:`import pandas as pd

df = pd.read_csv('titanic.csv')

# 欠損状況の確認
print("欠損数:")
print(df.isnull().sum()[df.isnull().sum() > 0])
print(f"\\n全体の欠損率: {df.isnull().sum().sum() / df.size:.2%}")

# Age: 中央値で補完
median_age = df['Age'].median()
df['Age'] = df['Age'].fillna(median_age)

# Embarked: 最頻値で補完
df['Embarked'] = df['Embarked'].fillna(df['Embarked'].mode()[0])

# Cabin: 欠損が多すぎるので列ごと削除
df = df.drop('Cabin', axis=1)

# 確認
print("\\n補完後の欠損:")
print(df.isnull().sum()[df.isnull().sum() > 0])`,
afterCode:`補完した値が分析に影響するかを検証するために、補完前後のdescribeを比較するのが良い習慣です。中央値で補完すると中央値付近にデータが集中して分布が変わることがあります。`},
]},
{id:"ch6",num:6,title:"グループ集計",est:"55分",
goal:"groupby/group_by で複数集計関数を適用できる。pivot_table で二次元集計ができる。重複排除もできる。",
sections:[
{title:"groupbyによる集計",
body:`groupby（グループ化と集計）はデータ分析の中核です。SQLのGROUP BY句と同じ考え方で、「客室クラスごとの生存率」や「出発港ごとの平均運賃」のような集計を実現します。pandasではgroupby()にagg()を繋げて複数の集計関数を同時に適用できます。

polarsではgroup_by().agg([...])の形で、複数の集計式をリストで渡します。polarsのagg内ではpl.col('x').sum()・pl.col('x').mean()・pl.len()（件数）等の式を使います。pandasのNamed Aggregation（agg(name=('col','func'))）はpolarsのalias()に相当します。`,
table:T.groupOps,
afterTable:`groupby後にreset_index()を呼ぶとグループキーが通常の列に戻ります。as_index=Falseを指定しても同じ効果が得られ、こちらの方が簡潔です。`},
{title:"pivot_tableと重複排除",
body:`pivot_tableはgroupbyのクロス集計版で、行と列の2次元で集計できます。例えば「客室クラス（行）×性別（列）の生存率テーブル」をpd.pivot_table(df, values='Survived', index='Pclass', columns='Sex', aggfunc='mean')一行で作れます。Excelのピボットテーブルと同じ操作性で、プレゼン用の集計表に適しています。

重複排除はdrop_duplicates()で行います。subset=['col1','col2']で特定列の組合せで重複判定ができます。keep='first'（デフォルト）で最初の行を残し、keep='last'で最後の行を残します。データクレンジングで頻繁に使う操作です。`,
code:`import pandas as pd

df = pd.read_csv('titanic.csv')
df['Age'] = df['Age'].fillna(df['Age'].median())

# groupby + 複数集計
summary = df.groupby('Pclass').agg(
    count=('Survived', 'count'),
    survival_rate=('Survived', 'mean'),
    avg_age=('Age', 'mean'),
    avg_fare=('Fare', 'mean')
).round(2)
print(summary)

# pivot_table: クラス×性別の生存率
pivot = pd.pivot_table(
    df, values='Survived',
    index='Pclass', columns='Sex',
    aggfunc='mean'
).round(3)
print("\\n", pivot)

# 重複排除
df_unique = df.drop_duplicates(subset=['Name'])
print(f"\\n重複除去後: {len(df_unique)} 行")`,
afterCode:`pivot_tableのfill_value=0を指定すると、集計結果がNaNになった箇所を0で埋められます。margins=Trueにすると合計行・合計列も追加されます。`},
]},
{id:"ch7",num:7,title:"結合とマージ",est:"50分",
goal:"pd.merge と polars.join で left/right/inner/outer の結合ができる。pd.concat で縦・横の結合もできる。",
sections:[
{title:"DataFrameの結合（JOIN）",
body:`複数のDataFrameを結合することはデータ分析でよくある操作です。SQLのJOINと同じ概念で、pandasではpd.merge()、polarsではdf.join()を使います。how引数でinner/left/right/outerを指定します。on引数で結合キー（共通の列名）を指定し、列名が異なる場合はleft_on・right_onで個別に指定します。

inner joinは両方のDataFrameに存在する行だけを残します。left joinは左のDataFrameの全行を残し、右に対応する値がなければNaNを入れます。データが必ず揃っていない実務データではleft joinが最も使われます。`,
table:T.joinTypes,
afterTable:`polarsのjoin()はhow='left'/'inner'/'outer'/'cross'等に対応します。outer joinはpandasでhow='outer'ですが、polarsではhow='full'と指定することに注意してください。`},
{title:"concatによる縦横結合",
body:`pd.concat()は複数のDataFrameを縦（axis=0）または横（axis=1）に結合します。縦結合は同じ列構造を持つデータを積み重ねる場合（例：月ごとのデータをまとめる）に使います。ignore_index=Trueでインデックスをリセットするのが一般的です。

横結合（axis=1）は同じ行数のDataFrameを列方向に並べます。pandasのmergeとは異なりキーを使わないため、インデックスが揃っていることが前提です。インデックスを揃えるためにset_index()を使ってからconcatするパターンがよく使われます。`,
code:`import pandas as pd

df_main = pd.read_csv('titanic.csv')

# 補助テーブルを作成（仮）
df_extra = pd.DataFrame({
    'PassengerId': [1, 2, 3],
    'HomeCountry': ['UK', 'USA', 'France']
})

# LEFT JOIN: 全乗客に国情報を付与（ない場合はNaN）
df_merged = pd.merge(df_main, df_extra, on='PassengerId', how='left')
print(df_merged[['Name','HomeCountry']].head(5))

# 縦方向concat: 2つのサブセットを結合
df_first = df_main[df_main['Pclass'] == 1]
df_third = df_main[df_main['Pclass'] == 3]
df_concat = pd.concat([df_first, df_third], ignore_index=True)
print(f"\\n結合後: {len(df_concat)} 行")`,
afterCode:`mergeでsuffixes=('_left','_right')を指定すると、両方のDataFrameに同名の列がある場合に列名の衝突を解決できます。デフォルトは_x・_yが付きます。`},
]},
{id:"ch8",num:8,title:"可視化入門",est:"50分",
goal:"matplotlib と seaborn で棒グラフ・散布図・ヒストグラムを描ける。DataFrame.plot() ショートカットで素早く確認グラフを作れる。",
sections:[
{title:"matplotlib基礎とDataFrame.plot()",
body:`matplotlibはPythonの基本的な可視化ライブラリです。plt.figure()でキャンバスを作成し、plt.plot()・plt.bar()・plt.scatter()等でグラフを描き、plt.show()で表示します。pandasのDataFrameには.plot()メソッドが組み込まれていて、df.plot.bar()・df.plot.hist()等のショートカットでmatplotlibのグラフをすぐに作れます。

EDA（探索的データ分析）では速度が重要なので、まずdf.plot()でざっくり確認し、発表資料にはmatplotlib/seabornで丁寧に整形するという使い分けが実務的です。`,
table:T.plotTypes,
afterTable:`plt.tight_layout()はラベルやタイトルが切れないように余白を自動調整します。グラフを保存する場合はplt.savefig('output.png', dpi=150, bbox_inches='tight')が便利です。`},
{title:"seabornによる統計可視化",
body:`seabornはmatplotlibの上に構築された統計可視化ライブラリで、DataFrameをそのまま渡してグラフを作れるのが特徴です。sns.barplot()・sns.scatterplot()・sns.histplot()・sns.boxplot()等が揃っており、hue引数でカテゴリ列を色分けできます。

sns.heatmap()はcorr()（相関行列）と組み合わせて使うと、各列の相関関係を一覧できます。数値列が多いデータセットでどの特徴量が強く関連しているかを視覚的に把握するのに最適です。`,
code:`import pandas as pd
import matplotlib.pyplot as plt
import seaborn as sns

df = pd.read_csv('titanic.csv')
df['Age'] = df['Age'].fillna(df['Age'].median())

fig, axes = plt.subplots(1, 3, figsize=(14, 4))

# 1. 棒グラフ: Pclass ごとの生存率
survival = df.groupby('Pclass')['Survived'].mean()
axes[0].bar(survival.index, survival.values,
            color=['#6366f1','#8b5cf6','#a78bfa'])
axes[0].set_title('Survival Rate by Class')
axes[0].set_ylabel('Rate')

# 2. ヒストグラム: 年齢分布
sns.histplot(df['Age'], bins=20, ax=axes[1],
             color='#6366f1', kde=True)
axes[1].set_title('Age Distribution')

# 3. 散布図: 年齢 vs 運賃（生存で色分け）
sns.scatterplot(data=df, x='Age', y='Fare',
                hue='Survived', ax=axes[2],
                palette={0:'#ef4444', 1:'#22c55e'}, alpha=0.6)
axes[2].set_title('Age vs Fare')

plt.tight_layout()
plt.show()`,
afterCode:`複数のサブプロットはplt.subplots(rows, cols)で作り、axes[i]に描画します。figsize=(幅, 高さ)の単位はインチです。Jupyter Notebookではplt.show()が無くても表示されますが、スクリプトでは必要です。`},
]},
];
