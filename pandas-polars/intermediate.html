import pandas as pd

passengers = pd.DataFrame({'pid':[1,2,3,4],'name':['Alice','Bob','Carol','Dave']})

    con.register('passengers', passengers)

   answer:`import pandas as pd

df = pd.read_csv('titanic.csv')

def drop_nulls(df, cols):
    return df.dropna(subset=cols)

def to_category(df, cols):
    for c in cols:
        df[c] = df[c].astype('category')
    return df

def remove_fare_outliers(df, quantile=0.95):
    threshold = df['Fare'].quantile(quantile)
    return df[df['Fare'] <= threshold]

result = (
    df
    .pipe(drop_nulls, ['Age','Embarked'])
    .pipe(to_category, ['Sex','Embarked'])
    .pipe(remove_fare_outliers, 0.95)
)
print(result.shape, result.dtypes[['Sex','Embarked']])`},

sections:[
{title:"DatetimeIndexとresample",
body:`時系列データ分析において、pandasのDatetimeIndexは日付・時刻をインデックスとして持つ特別な仕組みです。通常の整数インデックスと異なり、日付の演算・スライス・集計が自然に書けます。DatetimeIndexを持つSeriesやDataFrameに対してresample()を呼ぶと、指定した時間粒度（日次・週次・月次など）でグループ化してagg()で集計できます。

なぜresampleが便利かというと、日次の株価データを月次で集計したいとき、groupby(pd.Grouper(freq='ME'))と書くのと同じですが、resample('ME').mean()の方が短く意図が明確です。resampleはSQLのDATE_TRUNC+GROUP BYに相当する操作を一行で表現できます。`,
table:T.resampleFreqs,
afterTable:`pandas 2.2以降、'M'（月末）は非推奨になり 'ME' が推奨されます。同様に 'Q' → 'QE'、'A' → 'YE' と変わっています。古いコードをメンテナンスする際は注意が必要です。`},
{title:"rolling/expanding/shiftと時系列補完",
body:`rolling(N)はN行のウィンドウで移動統計を計算します。rolling(7).mean()で7日移動平均、rolling(7).std()で7日標準偏差が計算できます。min_periods引数を指定すると、ウィンドウが埋まる前でも最低何行あれば計算するかを制御できます。

expanding()は先頭からの累積統計を計算します。expanding().mean()は毎行「ここまでの全データの平均」を返すので、リアルタイム学習の評価などに使います。shift(N)はN行ずらすことで前日比や前期差分が簡単に計算できます。時系列に欠損がある場合は、asfreq('D')で日次インデックスに揃えてからinterpolate(method='linear')で線形補完するパターンが実務で頻繁に使われます。`,
code:`import pandas as pd
import numpy as np

# 日次の株価データを作成
dates = pd.date_range('2024-01-01', periods=60, freq='B')
np.random.seed(0)
prices = pd.Series(100 + np.cumsum(np.random.randn(60)), index=dates, name='price')

# 月次集計（最終値）
monthly = prices.resample('ME').last()
print("月次終値:\\n", monthly)

# 5日移動平均
ma5 = prices.rolling(5).mean()

# 前日比
pct_chg = prices.pct_change() * 100

# 7日間の最大値（ウィンドウが埋まる前は1行以上で計算）
rolling_max = prices.rolling(7, min_periods=1).max()

# 不規則時系列を均一化して補完
irregular = prices.iloc[::3]          # 3営業日ごとに間引き
daily = irregular.asfreq('B')         # 全営業日に拡張（NaNが入る）
filled = daily.interpolate('linear')   # 線形補完
print("\\n補完後の欠損数:", filled.isna().sum())`,

]},

sections:[
{title:"apply/mapの使い方と落とし穴",
body:`pandasのapply()はSeriesまたはDataFrameの各行・各列にPython関数を適用します。柔軟で強力ですが、内部でPythonのfor文と同じ処理をするため大量データでは非常に遅くなります。apply()はNumPyのベクトル演算が使えない複雑なロジック（条件分岐が多い、外部ライブラリを呼ぶ等）に限定して使うべきです。

map()はSeries専用でScalarを返す変換に使います。applymap()（pandas 2.1以降はmap()に統合）はDataFrame全セルへの適用です。polarsではmap_elements()が相当しますが、同様にPythonレベルの処理なので遅くなります。実務では「まず組み込みメソッドで書けないか？」を常に考えることが重要です。`,
table:T.applyVsVec,
afterTable:`apply()の速度問題を回避する最も確実な方法は「pandasやpolarsが提供する組み込みメソッドを使う」ことです。文字列処理ならstr、日時処理ならdt、数値ならNumPy演算で、apply()の出番はほぼなくせます。`},
{title:"NumPyルーティンとpolarsのベクトル化",
body:`NumPyはCで書かれたベクトル演算ライブラリで、pandas SeriesにそのままNumPy関数を適用できます。np.log(df['x'])・np.sqrt(df['x'])・np.where(condition, a, b)等がapply()の数十倍高速です。np.where()は条件に応じた値を返す三項演算子で、lambda x: 'high' if x>50 else 'low'をapplyするよりはるかに速く書けます。

polarsは設計レベルでベクトル化を徹底しており、map_elements()を使わなくてもpl.col().log()・pl.col().sqrt()・pl.when().then().otherwise()等でほぼすべての変換を表現できます。polarsのwhen/then/otherwiseはSQLのCASE WHENに相当し、複雑な条件分岐もベクトル化されたまま記述できます。`,
code:`import pandas as pd
import polars as pl
import numpy as np

df_pd = pd.DataFrame({
    'value': [1.0, 4.0, 9.0, 16.0, 25.0],
    'group': ['A','B','A','B','A']
})

# pandas: NumPy ルーティンでベクトル化
df_pd['sqrt_val'] = np.sqrt(df_pd['value'])
df_pd['log_val'] = np.log(df_pd['value'])
df_pd['label'] = np.where(df_pd['value'] > 10, 'high', 'low')

# polars: 組み込みメソッドで同じことを
df_pl = pl.DataFrame({'value': [1.0,4.0,9.0,16.0,25.0], 'group':['A','B','A','B','A']})
df_pl = df_pl.with_columns([
    pl.col('value').sqrt().alias('sqrt_val'),
    pl.col('value').log(base=2.718281828).alias('log_val'),
    pl.when(pl.col('value') > 10).then(pl.lit('high')).otherwise(pl.lit('low')).alias('label')
])

print(df_pd)
print(df_pl)`,
afterCode:`timeit で apply vs np.where を比較すると 10〜100 倍の差が出ることがあります。100万行のデータで apply が 2 秒かかるところ np.where は 0.02 秒、といった差が実務では無視できなくなります。`},
]},

sections:[
{title:"カテゴリ型のメモリ削減効果",
body:`カテゴリ型（Categorical）は、少数の固定値が大量に繰り返される列に有効なデータ型です。pandasの場合、通常のobject（str）型は各行に文字列を丸ごと保存しますが、Categorical型は内部でコード（整数）と辞書（コード→文字列のマッピング）を分けて管理します。例えば「male/female」が100万行あるとき、objectでは100万個の文字列を保存しますが、Categoricalでは辞書2件＋100万個の整数インデックスで済みます。

polarsも同様にpl.Categorical型を提供しており、メモリ効率が大幅に向上します。さらにカテゴリ型はgroupbyやsortが高速になるメリットもあります。実務では読み込んだCSVのカテゴリ列をすぐにastype('category')するのが定番の前処理です。`,
table:T.catMemory,
afterTable:`memory_usage(deep=True) でobject型のメモリを正確に計測できます。deep=Falseだとポインタサイズしか返さないため必ずdeep=Trueを使ってください。`},
{title:"get_dummies と One-Hot Encoding",
body:`機械学習モデルは文字列を直接扱えないため、カテゴリ変数を数値のバイナリ列に変換する必要があります。これがOne-Hot Encoding（ダミー変数化）です。pandasではpd.get_dummies(df, columns=['col'])一行でダミー列を追加できます。

drop_first=Trueを指定すると、K個のカテゴリのうち最初の1列を除いてK-1列を生成します。「male/female」なら「female列だけ」を残し、male=0が暗黙的にfemaleでないことを意味します。これにより多重共線性（Dummy Variable Trap）を回避でき、線形モデルで重要です。polarsではpl.get_dummies()またはwith_columns内のcast操作で同様の処理ができます。`,
code:`import pandas as pd
import numpy as np

df = pd.read_csv('titanic.csv')[['Sex','Embarked','Pclass','Survived']].dropna()

# カテゴリ型に変換してメモリを確認
df['Sex'] = df['Sex'].astype('category')
df['Embarked'] = df['Embarked'].astype('category')
print("Sexカテゴリ:", df['Sex'].cat.categories.tolist())
print("メモリ(deep):", df.memory_usage(deep=True).sum() // 1024, "KB")

# One-Hot Encoding
df_ohe = pd.get_dummies(df, columns=['Sex','Embarked'], drop_first=True, dtype=int)
print("\\n列一覧:", df_ohe.columns.tolist())
print(df_ohe.head(3))`,
afterCode:`scikit-learnのOneHotEncoderはpipeline組み込みが可能でより柔軟ですが、EDAや小規模前処理ではget_dummies()が手軽です。未知カテゴリへの対応が必要な本番システムではOneHotEncoderを使いましょう。`},
]},
{id:"ch4",num:4,title:"Polars Lazy API",est:"60分",
goal:"scan_csv/scan_parquet でLazyFrameを作成し、filter/select/group_by をチェーンして collect() で実行できる。explain() でクエリプランを確認し、Eager APIとの使い分けを理解できる。",
sections:[
{title:"LazyFrameとクエリ最適化",
body:`polarsのLazy APIは「実行を遅らせる」仕組みです。scan_csv()やscan_parquet()は実際にはファイルを読まず、読み込み計画を立てるだけです。そこにfilter/select/group_byを繋げても、collect()を呼ぶまで何も実行されません。これによりpolarsが全体のクエリを見てから最適な実行計画（列プッシュダウン・述語プッシュダウン）を立てることができます。

「列プッシュダウン」とはselect(['a','b'])を先に書いておくと、ファイルを読む段階から必要な列しか読まない最適化です。「述語プッシュダウン」はfilterを可能な限りデータソースの近くで実行することです。10GBのParquetから特定の条件に合う行だけ抽出する場合、Eagerだと10GB全部読んでからfilterしますが、Lazyは読む段階でフィルタが適用されます。`,
table:T.lazyOps,
afterTable:`explain() はLazyFrameのクエリプランを文字列で返します。SELECTION（列選択）やFILTER（行フィルタ）がCSV_SCAN直下に来ていれば最適化が効いている証拠です。`},
{title:"Lazy APIの実践パターン",
body:`LazyFrameに対してはEager APIとほぼ同じメソッドが使えます。filter・select・with_columns・group_by・sort・joinがすべてLazyのまま連鎖でき、collect()で初めてデータがメモリに展開されます。fetchメソッドを使えばcollect()の代わりに先頭N行だけ実行することもでき、デバッグに便利です。

実務では「処理の最後でcollect()を一度だけ呼ぶ」のが基本です。ループ内でcollect()を繰り返すと最適化が効かなくなります。scan_csvで読んでLazyで絞り込み・集計してcollect()、その結果をpandasに渡す（.to_pandas()）パターンも多用されます。`,
code:`import polars as pl

# scan_csv: Lazy に読み込む（ファイルはまだ読まない）
lf = pl.scan_csv('titanic.csv')

# クエリプランを確認
print(lf.filter(pl.col('Age') >= 30).select(['Name','Age','Fare']).explain())

# 実際に集計して collect
result = (
    lf
    .filter(pl.col('Survived') == 1)          # 生存者のみ
    .with_columns(
        pl.col('Fare').log(base=10).alias('log_fare')
    )
    .group_by('Pclass')
    .agg([
        pl.col('Age').mean().round(1).alias('avg_age'),
        pl.col('log_fare').mean().round(3).alias('avg_log_fare'),
        pl.len().alias('count')
    ])
    .sort('Pclass')
    .collect()                                 # ここで初めて実行
)
print(result)`,
afterCode:`polarsのLazy APIはSQLエンジンに近い設計です。クエリオプティマイザが書いた順序に関わらず最適な実行順を選ぶため、プログラマはwhat（何を取りたいか）だけを記述すればよく、how（どう取るか）はpolarsに任せられます。`},
]},
{id:"ch5",num:5,title:"Parquetと列指向フォーマット",est:"55分",
goal:"Parquetの列指向構造とその利点を説明できる。PyArrowとの連携でスキーマ検証ができる。pandasとpolarsでParquetの読み書きができ、列選択によるI/O最適化を実践できる。",
sections:[
{title:"Parquetの仕組みと利点",
body:`Parquetは「列指向（columnar）」のバイナリフォーマットです。CSVが行ごとにデータを並べるのに対し、Parquetは列ごとにデータを並べて保存します。例えば100列あるテーブルから3列だけ読みたい場合、CSVでは100列全部読んでから3列を選ぶ必要がありますが、Parquetは目的の3列分のバイト列だけ読めばよく、I/Oが大幅に削減されます。これを「列プッシュダウン（column pushdown）」と言います。

列が同じ型のデータの固まりなので圧縮効率も高く、同じ値が連続する場合はRun-Length Encodingで圧縮され、ファイルサイズがCSVの5〜10分の1になることも珍しくありません。また型情報がスキーマとして保存されるため、読み込み時に型推定が不要で、CSVのように数値が文字列として読まれるミスが起きません。`,
table:T.parquetVsCsv,
afterTable:`Parquetのデフォルト圧縮はSnappyです。圧縮率を上げたい場合はcompression='gzip'または'zstd'を指定しますが、圧縮・解凍に時間がかかるトレードオフがあります。`},
{title:"PyArrow連携とスキーマ検証",
body:`PyArrowはApache Arrow形式のPython実装で、pandasとpolarsの両方がParquetの読み書きにPyArrowを内部で使用しています。PyArrowを直接使うとスキーマ（列名と型の定義）を事前に定義してから読み込む「スキーマ検証」が可能です。本番パイプラインでは想定外の型や列名でデータが来ることがあり、スキーマ検証で早期にエラーを検知できます。

pandasではread_parquet(columns=['a','b'])で特定列だけ読めます。polarsではscan_parquet().select(['a','b']).collect()のLazy APIを使うと、ファイルレベルで必要列だけ読む最適化が自動で効きます。大容量Parquetファイルでは列選択だけで読み込み時間が劇的に短縮されます。`,
code:`import pandas as pd
import polars as pl
import pyarrow as pa
import pyarrow.parquet as pq

# pandasでParquetに書き出し
df = pd.read_csv('titanic.csv')
df.to_parquet('titanic.parquet', engine='pyarrow', compression='snappy', index=False)

# PyArrow でスキーマだけ読む（データは読まない）
schema = pq.read_schema('titanic.parquet')
print("Parquetスキーマ:")
for field in schema:
    print(f"  {field.name}: {field.type}")

# pandas: 特定列だけ読む（列プッシュダウン）
df_partial = pd.read_parquet('titanic.parquet', columns=['Name','Age','Survived'])
print("\\n列選択読み込み:", df_partial.shape, df_partial.dtypes.to_dict())

# polars Lazy: スキーマ確認 + 列選択
lf = pl.scan_parquet('titanic.parquet')
print("\\nPolarsスキーマ:", lf.schema)
result = lf.select(['Name','Age','Survived']).collect()
print(result.head(3))`,
afterCode:`PyArrowのpa.Table.from_pandas()でpandas DataFrameをArrow形式に変換し、pa.Table.to_pandas()で戻せます。polarsはpd.DataFrame.to_arrow()とpl.from_arrow()で双方向変換できます。`},
]},
{id:"ch6",num:6,title:"DuckDBとSQLの連携",est:"55分",
goal:"DuckDBをインメモリSQLエンジンとして使い、pandas/polarsのDataFrameをSQLで操作できる。context managerで複数テーブルをJOINし、結果をpandas DataFrameとして受け取れる。",
sections:[
{title:"DuckDBの基本とDataFrame連携",
body:`DuckDBはインプロセス（ライブラリとして動く）の分析特化型SQLデータベースです。PostgreSQLに似たSQL方言を使いながら、サーバー不要でPythonプロセス内で動きます。最大の特徴はpandasやpolarsのDataFrameをそのままSQLの「テーブル」として参照できることです。duckdb.sql("SELECT * FROM df")と書くだけで、df（pandas DataFrame）をSQLで操作できます。

なぜDuckDBを使うのか？SQLに慣れたエンジニアがpandasのAPIを覚えずにデータ操作できること、また複雑なJOINや窓関数をSQLで書いた方がわかりやすい場合があることが主な理由です。DuckDBはParquetファイルを直接クエリできる機能も持ち、"SELECT * FROM 'data/*.parquet'"のようにワイルドカードで複数ファイルをまとめて読む高度な使い方もできます。`,
table:T.duckdbSyntax,
afterTable:`duckdb.sql(...).df() でpandas DataFrameを返します。.pl() でpolars DataFrameも返せます。大量データを扱う場合は.arrow()でArrow Tableとして受け取りpolarsに渡すとメモリ効率が良くなります。`},
{title:"context managerと複数テーブル操作",
body:`duckdb.connect()はインメモリデータベースへの接続を返します。with文（context manager）と組み合わせることで、接続のライフサイクルを明確に管理できます。接続オブジェクトに対してregister('table_name', dataframe)を呼ぶと、そのDataFrameがSQLテーブルとして登録されます。複数のDataFrameを登録すればJOINも書けます。

SQLに慣れたチームでは、pandasのmergeよりもJOINで書いた方がレビューしやすいという場面があります。一方でpandasやpolarsのAPIはメモリ効率や型安全性で優れている場合もあり、用途に応じて使い分けることが実務では重要です。DuckDBは「SQLとDataFrameの橋渡し」として使うのが最もコストパフォーマンスが高い使い方です。`,
code:`import duckdb
import pandas as pd

df = pd.read_csv('titanic.csv')

# シンプルな使い方: DataFrameを直接参照
avg_by_class = duckdb.sql("""
    SELECT
        Pclass,
        ROUND(AVG(Fare), 2)     AS avg_fare,
        ROUND(AVG(Survived), 3) AS survival_rate,
        COUNT(*)                AS n
    FROM df
    WHERE Age IS NOT NULL
    GROUP BY Pclass
    ORDER BY Pclass
""").df()
print(avg_by_class)

# context manager: 複数テーブルをJOIN
extra_info = pd.DataFrame({
    'Pclass': [1, 2, 3],
    'class_name': ['First', 'Second', 'Third']
})

with duckdb.connect() as con:
    con.register('titanic', df)
    con.register('class_info', extra_info)
    result = con.execute("""
        SELECT t.Name, t.Survived, c.class_name
        FROM titanic t
        JOIN class_info c ON t.Pclass = c.Pclass
        WHERE t.Sex = 'female'
        ORDER BY t.Survived DESC
        LIMIT 5
    """).df()

print("\\n", result)`,
afterCode:`DuckDBはParquetファイルを直接クエリできます。duckdb.sql("SELECT * FROM 'data.parquet' WHERE age > 30")のように書けるため、pandasを一切使わずSQLだけで前処理を完結させるパイプラインも構築できます。`},
]},
{id:"ch7",num:7,title:"高度な集計分析",est:"55分",
goal:"transform() でグループ内ベクトル化集計ができる。pipe() でデータ処理をメソッドチェーン化できる。カスタム集計関数を agg() に渡して柔軟な集計が書ける。",
sections:[
{title:"transform()とグループ内演算",
body:`groupby().transform()はgroupby().agg()と異なり、元のDataFrameと同じ行数のSeriesを返します。これはグループ統計を各行に展開したいときに使います。例えば「各乗客の運賃をクラスの平均運賃で割った標準化値」を計算したい場合、agg()で平均を出してからmergeする代わりに、transform('mean')一行で元のDataFrameに揃った形の平均列が得られます。

polarsではover()がtransform()に相当します。pl.col('Fare').mean().over('Pclass')とすると、Pclassごとの平均がFareと同じ行数で返ります。このパターンはウィンドウ関数（SQLのAVG() OVER (PARTITION BY ...)）と同等であり、SQLに慣れているエンジニアには理解しやすい概念です。`,
table:T.aggFuncs,
afterTable:`transform()に渡せる関数は文字列（'mean','sum','std'等）だけでなく、カスタム関数も渡せます。ただし遅くなるため、組み込みの集計関数が使えるなら優先してください。`},
{title:"pipe()によるメソッドチェーンとカスタム集計",
body:`pipe(func, *args, **kwargs)はDataFrameを第一引数としてfuncを呼び出し、その戻り値を次のメソッドに渡します。これによりfunc1、func2、func3の順に適用する処理を df.pipe(func1).pipe(func2).pipe(func3) と書け、中間変数を減らして処理の流れが一目でわかります。特にデータ前処理パイプラインを関数単位で分割して再利用したい場合に有効です。

agg()にはリスト・辞書・カスタム関数を渡せます。Named Aggregation（agg(new_name=('col','func'))）はpandas 0.25以降で使えるきれいな書き方で、集計後の列名をagg()内で指定できます。複数集計のresult DataFrameがMultiIndexにならず、すっきりした列名になります。`,
code:`import pandas as pd
import numpy as np

df = pd.read_csv('titanic.csv').dropna(subset=['Age','Fare'])

# transform(): グループ平均を各行に展開
df['fare_class_mean'] = df.groupby('Pclass')['Fare'].transform('mean')
df['fare_z_score'] = (df['Fare'] - df['fare_class_mean']) / df.groupby('Pclass')['Fare'].transform('std')
print(df[['Pclass','Fare','fare_class_mean','fare_z_score']].head(6))

# Named Aggregation: きれいな列名で複数集計
summary = df.groupby(['Pclass','Sex']).agg(
    count=('Survived','count'),
    survival_rate=('Survived','mean'),
    avg_age=('Age','mean'),
    fare_p90=('Fare', lambda x: x.quantile(0.9))
).round(2)
print("\\n", summary)

# pipe() でデータ処理をチェーン
def clip_fare(df, upper_q=0.99):
    threshold = df['Fare'].quantile(upper_q)
    return df.assign(Fare=df['Fare'].clip(upper=threshold))

def add_age_group(df):
    return df.assign(age_group=pd.cut(df['Age'], [0,18,40,100], labels=['child','adult','senior']))

result = df.pipe(clip_fare, 0.99).pipe(add_age_group)
print("\\n", result[['Age','age_group','Fare']].head(5))`,
afterCode:`polarsでover()を使ったウィンドウ演算は、with_columns([pl.col('Fare').mean().over('Pclass').alias('fare_class_mean')])と書きます。pandasのtransform()より明示的で可読性が高いとpolarsユーザーには好まれます。`},
]},
{id:"ch8",num:8,title:"インタラクティブ可視化",est:"55分",
goal:"Plotly Expressでインタラクティブグラフを作れる。Altairの宣言的な文法でグラフを構築できる。hvPlotでpandas/polarsのDataFrameから直接グラフを生成できる。",
sections:[
{title:"PlotlyとAltairの基本",
body:`matplotlib/seabornが静的グラフを生成するのに対し、Plotly・Altair・hvPlotはインタラクティブグラフ（ズーム・ホバー・フィルタが可能）を生成します。Jupyter NotebookやDashboard等のWeb環境で特に有用です。Plotly Expressはpx.scatter()・px.bar()・px.histogram()等の高レベルAPIを提供し、少ないコードでリッチなグラフを作れます。dataにDataFrameを渡し、x/y/color/size等の引数で列を指定するだけです。

Altairは「データ → エンコーディング」という宣言的な思想で設計されています。どの列をX軸にするか・Y軸にするか・色にするかを.encode()で宣言し、グラフのスタイル（mark_bar/mark_line/mark_point等）を組み合わせます。Vega-Liteというオープンな仕様に基づいているため、JSON形式でグラフ定義をエクスポートでき、JavaScriptとの連携もしやすい特徴があります。`,
table:T.vizLibs,
afterTable:`plotly.expressはplotly.graph_objects（go.）の高レベルラッパーです。細かいカスタマイズが必要な場合はfig.update_layout()・fig.update_traces()でgo.レベルの設定を上書きできます。`},
{title:"hvPlotとpandas/polarsの直接連携",
body:`hvPlotはholoviewsベースのライブラリで、import hvplot.pandas を実行するとpandas DataFrameに.hvplot()メソッドが追加されます。df.hvplot.line()・df.hvplot.scatter()・df.hvplot.bar()のようにDataFrame.plot()と同じ感覚でインタラクティブグラフを生成できます。既存のpandasコードに最小限の変更でインタラクティブ化できるのが大きな特徴です。

import hvplot.polarsとするとpolarsでも同様に使えます。実務では「既にmatplotlibで書いたEDAコードをインタラクティブにしたい」というときにhvPlotへの移行コストが最も低くなります。Plotlyは表現力が高い反面APIを覚え直す必要があり、Altairは宣言的で美しいですが独特の文法があります。用途と習熟度に応じて使い分けましょう。`,
code:`import pandas as pd
import plotly.express as px
import altair as alt

df = pd.read_csv('titanic.csv').dropna(subset=['Age','Fare'])
df['Pclass'] = df['Pclass'].astype(str)
df['Survived_label'] = df['Survived'].map({0:'死亡',1:'生存'})

# Plotly Express: 散布図
fig = px.scatter(
    df, x='Age', y='Fare', color='Survived_label',
    symbol='Pclass', opacity=0.6,
    title='年齢 vs 運賃（生存状況・クラス）',
    color_discrete_map={'生存':'#22c55e','死亡':'#ef4444'},
    labels={'Age':'年齢','Fare':'運賃'}
)
fig.update_layout(legend_title='状況')
fig.show()

# Altair: クラス別生存率 棒グラフ
summary = df.groupby('Pclass', as_index=False)['Survived'].mean().round(3)
summary.columns = ['Pclass','rate']

chart = (
    alt.Chart(summary)
    .mark_bar(cornerRadiusTopLeft=4, cornerRadiusTopRight=4)
    .encode(
        x=alt.X('Pclass:N', axis=alt.Axis(title='客室クラス')),
        y=alt.Y('rate:Q', axis=alt.Axis(title='生存率', format='%'), scale=alt.Scale(domain=[0,1])),
        color=alt.Color('rate:Q', scale=alt.Scale(scheme='purpleblue'), legend=None),
        tooltip=['Pclass','rate']
    )
    .properties(title='クラス別生存率', width=300, height=250)
)
chart.show()`,
afterCode:`hvPlotを使う場合は import hvplot.pandas の後に df.hvplot.scatter(x='Age', y='Fare', by='Survived') で同じ散布図をインタラクティブに描けます。JupyterLabやVoilaと組み合わせるとダッシュボードにもなります。`},
]},
];
