    q: "Polars の LazyFrame を使って、遅延評価の最適化効果を確認してください。\n複数のフィルタ・変換を連鎖させた場合、Eager と Lazy でどう違うか比較してください。",
    code: "# 大きめのDataFrameに対して filter → with_columns → group_by を\n# Eager (DataFrame) と Lazy (LazyFrame) で比較",
    answer: "import polars as pl\nimport numpy as np\nimport time\n\nn = 2_000_000\nnp.random.seed(42)\ndata = {\n    \"id\": np.arange(n),\n    \"group\": np.random.choice([\"X\",\"Y\",\"Z\"], n),\n    \"score\": np.random.randn(n) * 100,\n    \"flag\": np.random.choice([True, False], n)\n}\n\nplf = pl.DataFrame(data)\n\n# Eager\nt0 = time.time()\nr1 = plf.filter(pl.col(\"flag\") == True)\nr2 = r1.with_columns((pl.col(\"score\") * 2).alias(\"doubled\"))\nr3 = r2.group_by(\"group\").agg(pl.col(\"doubled\").mean())\nt1 = time.time()\nprint(f\"Eager: {t1-t0:.4f}秒\")\nprint(r3)\n\n# Lazy\nt0 = time.time()\nresult_lazy = (\n    plf.lazy()\n    .filter(pl.col(\"flag\") == True)\n    .with_columns((pl.col(\"score\") * 2).alias(\"doubled\"))\n    .group_by(\"group\")\n    .agg(pl.col(\"doubled\").mean())\n    .collect()\n)\nt1 = time.time()\nprint(f\"\\nLazy: {t1-t0:.4f}秒\")\nprint(result_lazy)\n\nprint(\"\\n※ Lazy は内部でクエリプランを最適化し、不要な列の読み込みを省略できる\")"

    title: "JSON と Excel",
    body: "JSON は Web API から取得したデータの読み込みに頻繁に使います。pandas は pd.read_json() でフラットな JSON 配列を、pd.json_normalize() でネストした JSON をフラットな DataFrame に変換できます。Polars は pl.read_json() と pl.read_ndjson()（改行区切り JSON）を使います。\n\nExcel の読み書きは pandas の得意分野で、pd.read_excel() / df.to_excel() が充実しています。シート名の指定、ヘッダー行の指定、セル範囲の指定など細かい制御が可能です。Polars も pl.read_excel() をサポートしていますが、openpyxl や calamine といった外部ライブラリが必要です。\n\n実務では「クライアントから Excel で受け取り → pandas で読み込み → Parquet で保存 → 以後は Polars で高速処理」というパイプラインがよく見られます。フォーマット間の変換を自在に行えることが、データエンジニアの基本スキルです。",
    code: "import pandas as pd\nimport polars as pl\n\n# JSON 読み込み\npdf = pd.read_json(\"data.json\")\nplf = pl.read_json(\"data.json\")\n\n# NDJSON（1行1オブジェクトの JSON）\nplf_nd = pl.read_ndjson(\"data.ndjson\")\n\n# Excel 読み込み\npdf_excel = pd.read_excel(\"report.xlsx\", sheet_name=\"Sheet1\")\nplf_excel = pl.read_excel(\"report.xlsx\", sheet_name=\"Sheet1\")\n\n# Excel 書き出し\npdf.to_excel(\"output.xlsx\", index=False)",

  id: "ch5",

  title: "欠損値処理とデータクリーニング",

  goal: "欠損値の検出・削除・穴埋めを pandas と Polars の両方で自在に行えるようになる。NaN / None / null の違いを理解し、前方穴埋め・補間・型変換まで含めたデータクリーニングの一連のフローを組み立てられることがゴール。",
  sections: [{
    title: "欠損値の表現 — NaN vs null",
    body: "欠損値（データが存在しない状態）の扱いは pandas と Polars で根本的に異なります。pandas は歴史的に浮動小数点の NaN (Not a Number) を欠損値として使ってきました。これは NumPy 由来の設計ですが、整数列に NaN を入れると自動的に float64 に変換されるという副作用があります。pandas 1.0 以降では pd.NA という新しい欠損値マーカーが導入されましたが、完全な移行には至っていません。\n\nPolars は Apache Arrow の null をそのまま使います。null はどの型でも使え、整数列に null を入れても型が変わりません。この設計の方が直感的で、型の安定性が保たれます。Arrow の null はビットマスクで管理されるため、メモリ効率も良いです。\n\nPython の None は pandas では NaN に変換されることが多いですが、文字列列では None のまま残ることがあります。Polars では None は一貫して null になります。この挙動の違いはデータクリーニングで頻繁に遭遇するので、しっかり押さえておきましょう。",
    code: "import pandas as pd\nimport polars as pl\nimport numpy as np\n\n# pandas — NaN と型変換の問題\nps = pd.Series([1, 2, None, 4])\nprint(ps)        # 0    1.0  ← int が float に変わる!\nprint(ps.dtype)  # float64\n\n# Polars — null でも型が保たれる\npls = pl.Series([1, 2, None, 4])\nprint(pls)       # [1, 2, null, 4]\nprint(pls.dtype) # Int64  ← 型が変わらない",
    afterTable: "pandas 2.0 以降では pd.array([1, 2, pd.NA, 4], dtype='Int64')（大文字の I）で Nullable 整数型を使えますが、デフォルトではまだ NaN ベースです。"
  }, {
    title: "欠損値の検出と確認",
    body: "データを読み込んだらまず欠損値の状況を確認します。pandas では df.isnull()（= df.isna()）で各セルが欠損かどうかの真偽値 DataFrame が返り、df.isnull().sum() で列ごとの欠損数、df.isnull().sum().sum() で全体の欠損数がわかります。\n\nPolars では df.null_count() で列ごとの null 数を一発で取得できます。また df.is_null() でセルごとの真偽値 DataFrame、df.select(pl.all().is_null().sum()) で列ごとの null 数も取得できます。\n\n欠損値の割合を確認するのも重要です。列の欠損率が 50% を超えていたらその列自体を削除する、5% 以下なら穴埋めする、といった判断基準を持っておくと、クリーニングの方針を素早く決められます。",
    table: T.missingCompare,
    afterTable: "ポイント: pandas の isnull() と isna() は完全に同じ関数です。どちらを使っても構いませんが、チーム内で統一しておくとコードの一貫性が保たれます。"
  }, {
    title: "欠損値の削除と穴埋め",
    body: "欠損値の処理方法は大きく2つ — 削除（行ごと or 列ごと）と穴埋め（固定値・前方・後方・補間）です。\n\n削除は pandas の dropna()、Polars の drop_nulls() で行います。pandas は how='any'（1つでも欠損があれば削除）と how='all'（全列が欠損の場合のみ削除）を選べます。subset 引数で特定の列だけを対象にすることも可能です。\n\n穴埋めは pandas の fillna()、Polars の fill_null() です。固定値（0, '不明' など）で穴埋めする他、前方穴埋め（forward fill: 直前の有効値で埋める）や線形補間（interpolate）も使えます。時系列データでは前方穴埋めが定番で、「最後に観測された値が続いている」という仮定で欠損を埋めます。",
    code: "import pandas as pd\nimport polars as pl\n\ndata = {\"名前\": [\"A\",\"B\",\"C\",\"D\"], \"点数\": [80, None, 92, None], \"評価\": [\"良\",None,\"優\",\"可\"]}\n\n# pandas\npdf = pd.DataFrame(data)\nprint(pdf.dropna())                          # 欠損行を削除\nprint(pdf.fillna({\"点数\": 0, \"評価\": \"不明\"})) # 穴埋め\nprint(pdf[\"点数\"].ffill())                    # 前方穴埋め\n\n# Polars\nplf = pl.DataFrame(data)\nprint(plf.drop_nulls())                      # 欠損行を削除\nprint(plf.with_columns([                     # 穴埋め\n    pl.col(\"点数\").fill_null(0),\n    pl.col(\"評価\").fill_null(\"不明\")\n]))\nprint(plf.with_columns(                      # 前方穴埋め\n    pl.col(\"点数\").fill_null(strategy=\"forward\")\n))",
    afterCode: "ポイント: 穴埋めの値は分析結果に大きく影響します。0 で埋めると平均が下がり、平均値で埋めると分散が小さくなります。「なぜその値で埋めるのか」を意識することが重要です。"
  }, {
    title: "型変換とデータクリーニング",
    body: "実データでは「数値のはずの列が文字列型になっている」「日付がただの文字列」といった型の不整合が頻繁に起きます。CSV から読み込むと全列が文字列になってしまうケースもあり、適切な型に変換するのがクリーニングの基本です。\n\npandas では astype() で型変換し、errors='coerce' を付けると変換できない値を NaN にできます。pd.to_numeric() / pd.to_datetime() という専用関数もあります。Polars では cast() で変換し、strict=False で変換失敗を null にできます。\n\n重複行の処理も重要なクリーニング操作です。pandas は df.duplicated() で重複を検出し、df.drop_duplicates() で削除します。Polars では df.is_duplicated() と df.unique() を使います。",
    code: "import pandas as pd\nimport polars as pl\n\n# pandas — 型変換\npdf = pd.DataFrame({\"値\": [\"100\",\"200\",\"abc\",\"400\"]})\npdf[\"値_num\"] = pd.to_numeric(pdf[\"値\"], errors=\"coerce\")\nprint(pdf)  # abc → NaN\n\n# Polars — 型変換\nplf = pl.DataFrame({\"値\": [\"100\",\"200\",\"abc\",\"400\"]})\nplf2 = plf.with_columns(\n    pl.col(\"値\").cast(pl.Int64, strict=False).alias(\"値_num\")\n)\nprint(plf2)  # abc → null\n\n# 重複除去\npdf2 = pd.DataFrame({\"x\": [1,1,2,2,3], \"y\": [\"a\",\"a\",\"b\",\"b\",\"c\"]})\nprint(pdf2.drop_duplicates())\nplf3 = pl.DataFrame({\"x\": [1,1,2,2,3], \"y\": [\"a\",\"a\",\"b\",\"b\",\"c\"]})\nprint(plf3.unique())",
    afterCode: "ミニ演習: 文字列 '2024-01-15' を pandas と Polars でそれぞれ日時型に変換してください。pandas は pd.to_datetime()、Polars は str.to_datetime() を使います。"
  }]

  sections: [{

    body: "DataFrame 全体に対する集約は、pandas では df['列'].sum() / mean() / std() / min() / max() / count() などで行います。Polars も同様のメソッドを持ちますが、式ベースの書き方 df.select(pl.col('列').sum()) が推奨されます。\n\n複数列・複数集約を一度に行う場合、pandas では df.agg({'列A': 'sum', '列B': 'mean'}) のように辞書形式で指定します。Polars では df.select([pl.col('列A').sum(), pl.col('列B').mean()]) のようにリストで式を渡します。Polars の式ベースの方が、同じ列に複数の集約（平均と標準偏差）を適用するときに自然に書けます。\n\nカウント系の集約も重要です。pandas の value_counts() は各値の出現回数を返し、Polars では df['列'].value_counts() で同等の結果が得られます。nunique()（ユニークな値の数）も頻繁に使います。",
    code: "import pandas as pd\nimport polars as pl\n\ndata = {\"カテゴリ\": [\"A\",\"B\",\"A\",\"B\",\"A\"], \"売上\": [100, 200, 150, 300, 120]}\n\n# pandas\npdf = pd.DataFrame(data)\nprint(\"合計:\", pdf[\"売上\"].sum())\nprint(\"平均:\", pdf[\"売上\"].mean())\nprint(\"件数別:\\n\", pdf[\"カテゴリ\"].value_counts())\n\n# Polars\nplf = pl.DataFrame(data)\nprint(plf.select([\n    pl.col(\"売上\").sum().alias(\"合計\"),\n    pl.col(\"売上\").mean().alias(\"平均\")\n]))\nprint(plf[\"カテゴリ\"].value_counts())",

  }, {
    title: "グループ化 — groupby / group_by",

    code: "import pandas as pd\nimport polars as pl\n\ndata = {\"グループ\": [\"A\",\"A\",\"A\",\"B\",\"B\",\"B\"],\n        \"値\": [10, 20, 30, 100, 200, 300]}\n\n# pandas — transform でウィンドウ関数\npdf = pd.DataFrame(data)\npdf[\"グループ平均\"] = pdf.groupby(\"グループ\")[\"値\"].transform(\"mean\")\npdf[\"累計\"] = pdf.groupby(\"グループ\")[\"値\"].cumsum()\nprint(pdf)\n\n# Polars — over() でウィンドウ関数\nplf = pl.DataFrame(data)\nresult = plf.with_columns([\n    pl.col(\"値\").mean().over(\"グループ\").alias(\"グループ平均\"),\n    pl.col(\"値\").cum_sum().over(\"グループ\").alias(\"累計\")\n])\nprint(result)",

    body: "データベースの世界では、複数のテーブルを共通キーで結びつける操作を JOIN と呼びます。DataFrame でもまったく同じ概念を使い、pandas は pd.merge()、Polars は df.join() で結合します。\n\n結合方法は4種類あります。内部結合 (inner) は両方のテーブルにキーが存在する行だけを残します。左結合 (left) は左テーブルの全行を残し、右に一致がなければ欠損値になります。外部結合 (outer / full) は両方の全行を残します。クロス結合 (cross) はすべての組み合わせを作ります。\n\n実務で最も使うのは left join です。「マスターテーブルの全行を残しつつ、別テーブルの情報を付け足す」というパターンが非常に多いためです。inner join はデータの欠損を見逃しやすいため、意図的に「両方に存在するもの」だけを抽出したい場合に限って使います。",
