    {diff:2,q:"AbstractTreeVisitorを継承してIrPluginContextを受け取るシンプルなIRプラグインを実装し、全てのIrCallノードを訪問してcalleeの名前をログ出力してください。",
     code:"// IrPluginの骨格\nclass LogAllCallsPlugin(val context: IrPluginContext) : IrElementTransformerVoid() {\n    // visitCall をオーバーライド\n}",
     answer:"class LogAllCallsPlugin(val context: IrPluginContext) : IrElementTransformerVoid() {\n    override fun visitCall(expression: IrCall): IrExpression {\n        val name = expression.symbol.owner.name.asString()\n        println(\"[plugin] call: \${name}\")\n        return super.visitCall(expression)\n    }\n}\n// ComponentRegistrar で登録\nclass MyPluginRegistrar : ComponentRegistrar {\n    override fun registerProjectComponents(project: MockProject, configuration: CompilerConfiguration) {\n        IrGenerationExtension.registerExtension(project, object : IrGenerationExtension {\n            override fun generate(moduleFragment: IrModuleFragment, pluginContext: IrPluginContext) {\n                moduleFragment.transform(LogAllCallsPlugin(pluginContext), null)\n            }\n        })\n    }\n}"},
    {diff:3,q:"Compiler Pluginでsuspend関数に自動タイムアウトを付与するプラグインの設計方針を説明し、withTimeout(5000)でラップするIR変換のスケッチを書いてください。",
     code:"// @AutoTimeout アノテーション付き suspend 関数を変換\nannotation class AutoTimeout(val ms: Long = 5000)\n// IrGenerationExtension でどう変換するか",
     answer:"// IR変換のスケッチ（実際にはIrBuilderWithScope等を使う）\nclass AutoTimeoutTransformer(val context: IrPluginContext) : IrElementTransformerVoidWithContext() {\n    override fun visitFunction(declaration: IrFunction): IrStatement {\n        if (!declaration.isSuspend) return super.visitFunction(declaration)\n        val hasAnnotation = declaration.annotations.any {\n            it.type.classFqName?.shortName()?.asString() == \"AutoTimeout\"\n        }\n        if (!hasAnnotation) return super.visitFunction(declaration)\n        // 本体を withTimeout(ms) { ... } でラップする IR を生成\n        // context.referenceFunctions(\"kotlinx.coroutines\", \"withTimeout\") で参照取得\n        // IrBlockBodyBuilder で新しい body を組み立て\n        println(\"変換対象: \${declaration.name.asString()}\")\n        return super.visitFunction(declaration)\n    }\n}"},

  ch2:[
    {diff:2,q:"コルーチンのContinuationを手動で使って、中断と再開を制御するシンプルな例を書いてください（suspendCoroutineを使う）。",
     code:"import kotlin.coroutines.*\n\n// suspendCoroutine を使って手動で継続を制御\nsuspend fun manualDelay(ms: Long): Unit {\n    // Continuation を保存して後で resume\n}",
     answer:"import kotlin.coroutines.*\nimport java.util.concurrent.ScheduledExecutorService\nimport java.util.concurrent.TimeUnit\nimport java.util.concurrent.Executors\n\nval scheduler: ScheduledExecutorService = Executors.newSingleThreadScheduledExecutor()\n\nsuspend fun manualDelay(ms: Long): Unit = suspendCoroutine { cont ->\n    scheduler.schedule({ cont.resume(Unit) }, ms, TimeUnit.MILLISECONDS)\n}\n\nfun main() = kotlinx.coroutines.runBlocking {\n    println(\"開始\")\n    manualDelay(500)\n    println(\"500ms 後\")\n    scheduler.shutdown()\n}"},

     code:"// cinterop 定義ファイル (memory.def)\nheaders = stdlib.h\n\n// NativeMain でmalloc/freeを呼ぶ",
     answer:"// memory.def\nheaders = stdlib.h\n\n// NativeMain.kt\nimport kotlinx.cinterop.*\nimport platform.posix.*\n\nfun main() {\n    // 100バイトのメモリを確保\n    val ptr = malloc(100.toULong())\n        ?: error(\"メモリ確保失敗\")\n    try {\n        // メモリに書き込み\n        val bytePtr = ptr.reinterpret<ByteVar>()\n        for (i in 0 until 10) { bytePtr[i] = (i + 65).toByte() }\n        // 読み取り\n        val str = bytePtr.toKString()\n        println(str.take(10)) // ABCDEFGHIJ\n    } finally {\n        free(ptr) // 必ず解放\n    }\n}"},

     code:"import kotlinx.cinterop.*\nimport platform.posix.*\n\n// staticCFunction で Cのコールバックを作る\n// qsort に渡して整数配列をソート",
     answer:"import kotlinx.cinterop.*\nimport platform.posix.*\n\nfun main() {\n    val nums = intArrayOf(5, 2, 8, 1, 9, 3)\n    val comparator = staticCFunction<CPointer<*>?, CPointer<*>?, Int> { a, b ->\n        val ia = a!!.reinterpret<IntVar>().pointed.value\n        val ib = b!!.reinterpret<IntVar>().pointed.value\n        ia - ib\n    }\n    nums.usePinned { pinned ->\n        qsort(pinned.addressOf(0), nums.size.toULong(), sizeOf<IntVar>().toULong(), comparator)\n    }\n    println(nums.toList()) // [1, 2, 3, 5, 8, 9]\n}"},

    {diff:2,q:"KSPプロセッサを実装して、@Repositoryアノテーションが付いたクラスの一覧をresources/repositories.txtに書き出すコードを書いてください。",
     code:"// RepositoryProcessor.kt\nclass RepositoryProcessor(val env: SymbolProcessorEnvironment) : SymbolProcessor {\n    override fun process(resolver: Resolver): List<KSAnnotated> {\n        // @Repository アノテーション付きクラスを収集して出力\n    }\n}",
     answer:"class RepositoryProcessor(val env: SymbolProcessorEnvironment) : SymbolProcessor {\n    override fun process(resolver: Resolver): List<KSAnnotated> {\n        val symbols = resolver.getSymbolsWithAnnotation(\"com.example.Repository\")\n        val names = symbols\n            .filterIsInstance<KSClassDeclaration>()\n            .map { it.qualifiedName?.asString() ?: it.simpleName.asString() }\n            .toList()\n        if (names.isNotEmpty()) {\n            val file = env.codeGenerator.createNewFile(\n                Dependencies(false), \"\", \"repositories\", \"txt\"\n            )\n            file.writer().use { it.write(names.joinToString(\"\\n\")) }\n        }\n        return emptyList()\n    }\n}"},
    {diff:3,q:"KSPで@AutoBuilderアノテーション付きdata classのBuilderクラスを自動生成するプロセッサを書いてください。",
     code:"// 入力\n@AutoBuilder\ndata class User(val name: String, val age: Int, val email: String = \"\")\n// 出力期待: UserBuilder クラス（各フィールドのセッター + build()）",
     answer:"class AutoBuilderProcessor(val env: SymbolProcessorEnvironment) : SymbolProcessor {\n    override fun process(resolver: Resolver): List<KSAnnotated> {\n        resolver.getSymbolsWithAnnotation(\"AutoBuilder\")\n            .filterIsInstance<KSClassDeclaration>()\n            .forEach { cls ->\n                val params = cls.primaryConstructor?.parameters ?: return@forEach\n                val pkg  = cls.packageName.asString()\n                val name = cls.simpleName.asString()\n                val file = env.codeGenerator.createNewFile(Dependencies(false), pkg, \"\${name}Builder\")\n                file.writer().use { w ->\n                    w.write(\"package \${pkg}\\n\\n\")\n                    w.write(\"class \${name}Builder {\\n\")\n                    params.forEach { p ->\n                        val pName = p.name!!.asString()\n                        val pType = p.type.resolve().declaration.simpleName.asString()\n                        w.write(\"  var \${pName}: \${pType}? = null\\n\")\n                    }\n                    w.write(\"  fun build() = \${name}(\${params.joinToString(\",\") { \"\${it.name!!.asString()}=\${it.name!!.asString()}!!\" }})\\n\")\n                    w.write(\"}\\n\")\n                }\n            }\n        return emptyList()\n    }\n}"},

     code:"import arrow.core.*\nimport arrow.core.raise.*\n\ndata class UserInput(val name: String, val age: Int, val email: String)\ndata class ValidUser(val name: String, val age: Int, val email: String)\n// 全バリデーションエラーを蓄積して返す",
     answer:"import arrow.core.*\nimport arrow.core.raise.*\n\ndata class UserInput(val name: String, val age: Int, val email: String)\ndata class ValidUser(val name: String, val age: Int, val email: String)\n\nfun validate(input: UserInput): Either<Nel<String>, ValidUser> = either {\n    zipOrAccumulate(\n        { ensure(input.name.isNotBlank()) { \"名前は必須\" } },\n        { ensure(input.age in 0..150)    { \"年齢は0〜150\" } },\n        { ensure(input.email.contains(\"@\")) { \"メールが不正\" } }\n    ) { _, _, _ -> ValidUser(input.name, input.age, input.email) }\n}\n\nfun main() {\n    println(validate(UserInput(\"\", -1, \"bad\")))\n    // Left(NonEmptyList(名前は必須, 年齢は0〜150, メールが不正))\n    println(validate(UserInput(\"Alice\", 30, \"a@b.com\")))\n    // Right(ValidUser(name=Alice, age=30, email=a@b.com))\n}"},

     answer:"import arrow.optics.*\n\n@optics data class Street(val name: String, val number: Int) { companion object }\n@optics data class Address(val city: String, val street: Street) { companion object }\n@optics data class Company(val name: String, val address: Address) { companion object }\n\nfun main() {\n    val company = Company(\"JetBrains\", Address(\"Prague\", Street(\"V Parku\", 2308)))\n\n    // 3段ネストのLens合成\n    val streetNumberLens = Company.address compose Address.street compose Street.number\n    val updated = streetNumberLens.modify(company) { it + 1 }\n    println(updated.address.street.number)  // 2309\n\n    // Prism との合成（sealed class内）\n    println(Company.address.city.get(company)) // Prague\n}"},

     code:"import jdk.jfr.*\n// カスタムJFRイベントを定義してコルーチンの実行時間を計測",
     answer:"import jdk.jfr.*\nimport kotlinx.coroutines.*\n\n@Label(\"Coroutine Execution\")\n@Category(\"Kotlin\", \"Coroutines\")\nclass CoroutineEvent : Event() {\n    @Label(\"Function Name\") lateinit var functionName: String\n    @Label(\"Duration ms\") var durationMs: Long = 0\n}\n\nsuspend fun <T> measureCoroutine(name: String, block: suspend () -> T): T {\n    val event = CoroutineEvent().apply { this.functionName = name; begin() }\n    val start = System.currentTimeMillis()\n    return try { block() }\n    finally {\n        event.durationMs = System.currentTimeMillis() - start\n        event.commit()\n        println(\"[JFR] \${name}: \${event.durationMs}ms\")\n    }\n}\n\nfun main() = runBlocking {\n    measureCoroutine(\"fetchData\") {\n        delay(100)\n        \"result\"\n    }\n}"},

const chapters = [
  {id:"ch1",num:1,title:"Compiler Plugin開発",est:"70分",
   goal:"Kotlinコンパイラのプラグインアーキテクチャを理解し、IrGenerationExtensionを使ってIR（中間表現）を変換するプラグインを実装できる。アノテーション処理と組み合わせてコード生成の自動化ができるようになる。",
   sections:[
    {title:"Kotlinコンパイラの内部アーキテクチャとIR",
     body:"Kotlinコンパイラは複数のフロントエンドとバックエンドを持つ複雑な処理パイプラインです。ソースコード→PSI（Program Structure Interface）→フロントエンドIR（FIR）→バックエンドIR（IR）→JVMバイトコード/JS/Nativeという流れで処理されます。Pythonのast モジュールでASTを操作するのと概念的に近いですが、Kotlinのコンパイラプラグインははるかに強力です。\n\nIR（Intermediate Representation）はコンパイラの中間表現で、型付きのASTと考えられます。IrGenerationExtensionを実装することで、コンパイルの最後の段階でIRを変換できます。関数の本体を書き換えたり、新しい関数を追加したり、アノテーションに基づいてコードを変換したりできます。\n\nKotlinコンパイラプラグインの実用例：kotlinx.serializationはクラスのserialize/deserialize関数を自動生成します。KotestはDSLの型チェックを強化します。Composed（Jetpack Compose）はComposable関数を変換してComposeランタイムが扱える形に変換します。これらは全てCompiler Pluginとして実装されています。",
     code:"// build.gradle.kts（プラグインプロジェクト）\nplugins {\n    kotlin(\"jvm\") version \"2.0.21\"\n    kotlin(\"kapt\")\n}\ndependencies {\n    compileOnly(\"org.jetbrains.kotlin:kotlin-compiler-embeddable:2.0.21\")\n    kapt(\"com.google.auto.service:auto-service:1.1.1\")\n    compileOnly(\"com.google.auto.service:auto-service-annotations:1.1.1\")\n}\n\n// ComponentRegistrar.kt\n@AutoService(ComponentRegistrar::class)\nclass MyPluginRegistrar : ComponentRegistrar {\n    override val supportsK2 = true\n    override fun registerProjectComponents(\n        project: MockProject, configuration: CompilerConfiguration\n    ) {\n        IrGenerationExtension.registerExtension(\n            project, MyIrGenerationExtension(configuration)\n        )\n    }\n}\nclass MyIrGenerationExtension(val config: CompilerConfiguration) : IrGenerationExtension {\n    override fun generate(module: IrModuleFragment, context: IrPluginContext) {\n        module.transform(MyTransformer(context), null)\n    }\n}",
     afterCode:"K2コンパイラ（Kotlin 2.0以降のデフォルト）ではFIRプラグインAPIが変わっています。ComponentRegistrarのsupportsK2=trueを設定することでK2互換を宣言できます。FirExtensionRegistrarを使った新しいAPIに移行する際は公式ドキュメントのK2 Migrationガイドを参照してください。"},
    {title:"IRトランスフォーマーの実装",
     body:"IrElementTransformerVoidを継承してvisit*メソッドをオーバーライドすることでIRノードを変換します。visitFunction・visitCall・visitClass等の各ノード種別に対応したメソッドがあります。Pythonのast.NodeTransformerと同じ設計パターンです。\n\n新しいIRノードの生成にはIrBuilderWithScopeやIrBlockBodyBuilderを使います。IrPluginContextからKotlinの標準ライブラリ関数（delay・withTimeout等）へのシンボル参照を取得し、IrCallノードを組み立てます。型情報（IrType）も正確に扱う必要があり、型の不一致はコンパイラのパニックを引き起こします。\n\nデバッグにはdumpKotlinLike()メソッドが有効です。変換前後のIRをKotlinコードとして出力することで、変換が期待通りか視覚的に確認できます。プラグインのテストは通常別プロジェクトを用意し、対象プラグインを依存に追加してKotlinコードをコンパイルする形で行います。",
     code:"// IRトランスフォーマーの実装例（関数呼び出しをログ出力でラップ）\nclass LoggingTransformer(val context: IrPluginContext) : IrElementTransformerVoidWithContext() {\n    private val printlnFun = context.referenceFunctions(\n        CallableId(FqName(\"kotlin.io\"), Name.identifier(\"println\"))\n    ).first { it.owner.valueParameters.size == 1 }\n\n    override fun visitFunction(declaration: IrFunction): IrStatement {\n        // @Logged アノテーションが付いている場合のみ変換\n        val hasLogged = declaration.annotations.any {\n            it.type.classFqName?.shortName()?.asString() == \"Logged\"\n        }\n        if (!hasLogged) return super.visitFunction(declaration)\n\n        val name = declaration.name.asString()\n        declaration.body = context.irFactory.createBlockBody(\n            declaration.startOffset, declaration.endOffset\n        ) {\n            // println(\">> functionName\") を先頭に挿入\n            // ... IrCall を使ってprintlnを呼ぶ\n            // 元の body の statement を追加\n        }\n        return declaration\n    }\n}",
     afterCode:"KotlinコンパイラプラグインのAPIはKotlinのマイナーバージョン間でも変更されることがあります。プラグインの依存はkotlin-compiler-embeddableを使い、バージョンを固定して管理します。Kotlinのメジャーバージョンアップ時に必ずプラグインの互換性テストを行ってください。"},
  ]},
  {id:"ch2",num:2,title:"コルーチン内部実装（Continuation・Dispatcher）",est:"70分",
   goal:"Kotlinコルーチンがどのようにstatemachineにコンパイルされるかを理解する。Continuationインターフェースを手動で実装し、カスタムCoroutineDispatcherを作成できる。コルーチンのスケジューリングと構造化された同時実行の内部動作を説明できるようになる。",
   sections:[
    {title:"ステートマシンへのコンパイルとContinuation",
     body:"suspend関数はコンパイル時にContinuationPassing Style（CPS）に変換されます。各suspend呼び出しポイントがステートマシンの状態（state）になり、再開時にどのポイントから実行を続けるかを管理します。Pythonのジェネレータが内部でstatemachineになるのと同じ原理です。\n\nコンパイルされたsuspend関数は「最後の引数にContinuation<T>が追加されたメソッド」になります。suspend fun fetch(): Stringはfun fetch(cont: Continuation<String>): Anyにコンパイルされます。中断時はCORROUTINE_SUSPENDEDを返し、完了時はcont.resumeWith(Result.success(value))を呼びます。\n\nsuspendCoroutineまたはsuspendCancellableCoroutineを使うと、Continuation<T>に直接アクセスして保存・後で再開するコードを書けます。これがThreadをブリッジしたり、コールバックAPIをsuspend関数にラップしたりするための基盤です。kotlin.coroutinesパッケージの低レベルAPIを理解することで、既存の非同期ライブラリとの統合が容易になります。",
     code:"import kotlin.coroutines.*\nimport kotlinx.coroutines.*\n\n// Continuation を手動で操作するコールバックブリッジ\nfun <T> callbackToCoroutine(\n    doAsync: (callback: (T?, Throwable?) -> Unit) -> Unit\n): suspend () -> T = {\n    suspendCancellableCoroutine { cont ->\n        doAsync { result, error ->\n            when {\n                cont.isActive && error != null -> cont.resumeWithException(error)\n                cont.isActive && result != null -> cont.resume(result)\n            }\n        }\n        cont.invokeOnCancellation { /* クリーンアップ */ }\n    }\n}\n\n// 使用例：コールバックAPIをsuspendに変換\nfun legacyApiCall(callback: (String?, Throwable?) -> Unit) {\n    Thread { Thread.sleep(100); callback(\"result\", null) }.start()\n}\n\nsuspend fun modernApiCall(): String = suspendCancellableCoroutine { cont ->\n    legacyApiCall { result, error ->\n        if (error != null) cont.resumeWithException(error)\n        else cont.resume(result ?: \"\")\n    }\n}\n\nfun main() = runBlocking {\n    println(modernApiCall()) // \"result\"\n}",
     afterCode:"Continuationのresume/resumeWithExceptionはスレッドセーフに呼べますが、同じContinuationを2回resumeするとIllegalStateExceptionになります。コールバックが複数回呼ばれる可能性がある場合はAtomicBooleanで一度だけresumeするガードを設けてください。"},
    {title:"CoroutineDispatcherとStructured Concurrency",
     body:"CoroutineDispatcherはコルーチンをどのスレッド/スレッドプールで実行するかを決定します。Dispatchers.IO・Dispatchers.Default・Dispatchers.Mainがデフォルトで提供されます。カスタムDispatcherはCoroutineDispatcher抽象クラスを継承しdispatch(context, block)を実装します。これはPythonのasyncio.set_event_loop_policy()でイベントループを差し替えるのに相当します。\n\nStructured Concurrency（構造化された同時実行）はコルーチンの「親子関係」によってライフサイクルを管理します。子コルーチンが完了するまで親は終わらず、親がキャンセルされると全子がキャンセルされます。この仕組みにより「起動したコルーチンが迷子になる（leaked coroutine）」問題を防ぎます。\n\nCoroutineScope.coroutineContextはJob・Dispatcher・CoroutineName等の要素を持ちます。withContext(Dispatchers.IO + CoroutineName(\"fetch\"))のように複数の要素を+で組み合わせられます。launch/asyncのcontextパラメーターでジョブを共有したり、新しいスコープでアイソレーションを作ったりできます。",
     code:"import kotlin.coroutines.*\nimport kotlinx.coroutines.*\nimport java.util.concurrent.Executors\n\n// カスタム Dispatcher（ワークスティーリング付きExecutor）\nclass BoundedDispatcher(threads: Int) : CoroutineDispatcher() {\n    private val executor = Executors.newWorkStealingPool(threads)\n    override fun dispatch(context: CoroutineContext, block: Runnable) {\n        executor.execute(block)\n    }\n    fun shutdown() { executor.shutdown() }\n}\n\n// Structured Concurrency の確認\nfun main() = runBlocking {\n    val parent = launch {\n        val child1 = launch {\n            delay(1000)\n            println(\"子1完了\") // キャンセルされた場合は実行されない\n        }\n        val child2 = launch {\n            delay(500)\n            println(\"子2完了\")\n        }\n        // parent をキャンセルすると child1・child2 も自動キャンセル\n    }\n    delay(200)\n    parent.cancelAndJoin() // 子コルーチンも含めてキャンセル\n    println(\"全終了（子1は未完了）\")\n}",
     afterCode:"GlobalScope.launchはStructured Concurrencyの外側で動作するため、コルーチンが迷子になるリスクがあります。アプリケーションのトップレベルスコープ（CoroutineScope(SupervisorJob() + Dispatchers.Default)）を自前で管理するか、DI経由でinjectionすることが推奨されます。"},
  ]},
  {id:"ch3",num:3,title:"Kotlin/Native・C interop",est:"65分",
   goal:"Kotlin/NativeのメモリモデルとcinteropによるCライブラリ連携を実装できる。staticCFunctionでCコールバックを作成し、POSIX・platform APIを使ったシステムプログラミングができるようになる。",
   sections:[
    {title:"Kotlin/Nativeのメモリモデルとcinterop",
     body:"Kotlin/NativeはKotlinコードをLLVMを通じてネイティブバイナリにコンパイルします。JVMなしで動作し、iOSアプリのFramework・Linux/Windows実行ファイル・WebAssemblyとして出力できます。Pythonのctypesでネイティブライブラリを呼ぶのに相当しますが、静的型付けのためより安全です。\n\ncinteropはCのヘッダーファイルからKotlinのバインディング（.klib）を生成するツールです。.defファイルでヘッダーとリンクするライブラリを指定し、gradlewタスクで自動生成します。生成されたバインディングでCのstructをKotlinの型として安全にアクセスできます。\n\nKotlin/Nativeのメモリ管理はGCではなくSwiftに似たARC（自動参照カウント）ベースです。Kotlin 1.7.20以降は新しいメモリマネージャー（Unified Memory Manager）がデフォルトになり、JVM側と同様のGCが使われます。Cのメモリ（malloc/free）はKotlinのGCの管理外なので、必ずfinallyブロックで解放してください。",
     code:"// cinterop 定義ファイル: libcurl.def\nheaders = curl/curl.h\nlinkerOpts = -lcurl\ncompilerOpts = -I/usr/include\n\n// Main.kt（libcurl を使って HTTP GET）\nimport kotlinx.cinterop.*\nimport libcurl.*\n\nfun httpGet(url: String): String = memScoped {\n    val curl = curl_easy_init() ?: error(\"curl init failed\")\n    try {\n        val resultBuilder = StringBuilder()\n        curl_easy_setopt(curl, CURLOPT_URL, url.cstr.ptr)\n        curl_easy_setopt(curl, CURLOPT_WRITEFUNCTION, staticCFunction<CPointer<ByteVar>?,ULong,ULong,COpaquePointer?,ULong> { data, size, nmemb, _ ->\n            val bytes = data?.readBytes((size * nmemb).toInt()) ?: return@staticCFunction 0UL\n            resultBuilder.append(bytes.decodeToString())\n            size * nmemb\n        })\n        curl_easy_perform(curl)\n        resultBuilder.toString()\n    } finally {\n        curl_easy_cleanup(curl)\n    }\n}",
     afterCode:"memScoped { }ブロック内で確保したメモリは、ブロックを抜けると自動的に解放されます。ブロックをまたいで長期間メモリを保持したい場合はnativeHeap.allocで確保し、nativeHeap.freeで明示的に解放します。"},
    {title:"POSIX・Platformライブラリとシステムプログラミング",
     body:"Kotlin/Nativeにはplatform.posixパッケージを通じてPOSIX APIが提供されます。ファイル操作・ソケット・スレッド（pthread）・シグナル処理などのシステムプログラミングがKotlinから直接行えます。これはPythonのosモジュール・subprocessに相当します。\n\nplatform.linux・platform.darwin（macOS/iOS）・platform.windows等のプラットフォーム固有パッケージでOS固有のAPIにアクセスできます。Linuxのepoll・macOSのkqueue・WindowsのIOCPなどの高性能I/Oを直接使う際に必要です。KMPのexpect/actualと組み合わせてプラットフォーム間の差異を吸収できます。\n\nワーカースレッドはpthread_createやplatform.posix.pthread_*関数で管理できます。ただしKotlin/Nativeはimmutableなオブジェクトのみスレッド間で安全に共有でき、mutableオブジェクトはfreezeまたはAtomicRef・AtomicInt等を使います。Kotlin 1.7.20以降のUnified Memory Managerではこの制限が大幅に緩和されています。",
     code:"import kotlinx.cinterop.*\nimport platform.posix.*\n\n// POSIX でファイルを読み込む\nfun readFile(path: String): String = memScoped {\n    val file = fopen(path, \"r\") ?: error(\"Cannot open file: \${path}\")\n    try {\n        val buffer = allocArray<ByteVar>(4096)\n        val result = StringBuilder()\n        while (true) {\n            val line = fgets(buffer, 4096, file) ?: break\n            result.append(line.toKString())\n        }\n        result.toString()\n    } finally {\n        fclose(file)\n    }\n}\n\n// ソケット通信（TCP クライアント）\nfun tcpConnect(host: String, port: Int): Int {\n    val sock = socket(AF_INET, SOCK_STREAM, 0)\n    if (sock < 0) error(\"socket() failed\")\n    memScoped {\n        val addr = alloc<sockaddr_in>()\n        addr.sin_family = AF_INET.convert()\n        addr.sin_port = htons(port.toUShort())\n        inet_aton(host, addr.sin_addr.ptr)\n        connect(sock, addr.ptr.reinterpret(), sizeOf<sockaddr_in>().convert())\n    }\n    return sock\n}",
     afterCode:"Kotlin/NativeでPOSIX関数を使う際、エラー返却値（-1や NULL）とerrnoを必ずチェックしてください。nativeErrorが設定されたerrnoの値を返すネイティブ関数のエラーハンドリングは、JVM例外と異なりC流の明示的なチェックが必要です。"},
  ]},
  {id:"ch4",num:4,title:"KSP（Kotlin Symbol Processing）",est:"65分",
   goal:"KSPプロセッサを実装し、アノテーション付きクラスからKotlinコードを自動生成できる。Resolver APIでシンボルを検索し、KSPのインクリメンタル処理を活用できる。プロセッサのテストをksp-testing-libraryで書けるようになる。",
   sections:[
    {title:"KSPとkaptの違い・Resolver API",
     body:"KSP（Kotlin Symbol Processing）はkaptの後継であるアノテーション処理フレームワークです。kaptはJavaのAnnotation Processing APIをKotlinから利用するためJavaソースへの変換が必要でビルドが遅いという問題がありました。KSPはKotlinのシンボルを直接処理するためkaptより最大で2倍高速です。KMPにも対応しています。\n\nKSPのプロセッサはSymbolProcessorインターフェースを実装します。process(resolver)メソッドが呼ばれ、Resolverを使ってシンボルを検索します。resolver.getSymbolsWithAnnotation(\"com.example.MyAnnotation\")でアノテーション付きシンボルを取得できます。PythonのASTを処理するのに比べて型情報が豊富で、メソッドシグネチャ・型パラメーター・アノテーション引数まで型安全にアクセスできます。\n\nコード生成にはCodeGeneratorを使います。env.codeGenerator.createNewFile()でKotlinソースファイルを作成し、kotlinx.poet（KotlinPoet）でKotlinコードを生成するのが標準的なパターンです。インクリメンタル処理（変更されたファイルだけ再処理）のためにDependenciesを適切に設定することでビルド速度が向上します。",
     code:"// SymbolProcessor の実装\nclass BuilderGeneratorProcessor(val env: SymbolProcessorEnvironment) : SymbolProcessor {\n    override fun process(resolver: Resolver): List<KSAnnotated> {\n        val symbols = resolver.getSymbolsWithAnnotation(\"com.example.AutoBuilder\")\n        val unprocessed = mutableListOf<KSAnnotated>()\n\n        symbols.filterIsInstance<KSClassDeclaration>().forEach { cls ->\n            if (!cls.validate()) { unprocessed.add(cls); return@forEach }\n            generateBuilder(cls)\n        }\n        return unprocessed\n    }\n\n    private fun generateBuilder(cls: KSClassDeclaration) {\n        val pkg  = cls.packageName.asString()\n        val name = cls.simpleName.asString()\n        val props = cls.primaryConstructor?.parameters?.map { p ->\n            \"\${p.name!!.asString()}: \${p.type.resolve().declaration.simpleName.asString()}\"\n        } ?: return\n\n        val code = buildString {\n            appendLine(\"package \${pkg}\")\n            appendLine(\"class \${name}Builder {\")\n            cls.primaryConstructor?.parameters?.forEach { p ->\n                appendLine(\"  var \${p.name!!.asString()}: \${p.type.resolve().declaration.simpleName.asString()}? = null\")\n            }\n            appendLine(\"  fun build() = \${name}(\${props.joinToString(\",\")})\")\n            appendLine(\"}\")\n        }\n        env.codeGenerator.createNewFile(\n            Dependencies(false, cls.containingFile!!), pkg, \"\${name}Builder\"\n        ).writer().use { it.write(code) }\n    }\n}",
     afterCode:"KSPのincrementalな処理では、生成されたファイルが依存するソースファイルをDependenciesに渡すことが重要です。間違えると変更検知が機能せず、再ビルドが必要なときにスキップされる問題が起きます。"},
    {title:"KotlinPoetとプロセッサのテスト",
     body:"KotlinPoetはSquare製のKotlinコード生成ライブラリです。文字列テンプレートでコードを書く代わりに、型安全なビルダーAPIでKotlinコードを生成します。FunSpec・TypeSpec・PropertySpec等のビルダーを使うことで、構文エラーのないコードを確実に生成できます。Pythonのjinja2でコードを生成するより安全です。\n\nKotlinPoetはimportの自動管理ができます。ClassName(\"kotlin.collections\",\"List\")のように完全修飾クラス名でコード内の型を参照し、KotlinPoetが自動でimportを追加します。手動でimport文を書く必要がなく、衝突する名前もエイリアスで解決されます。\n\nKSPプロセッサのテストにはksp-testing-library（Poko・KSP公式）を使います。もしくはcompile-testingライブラリでテストプロセッサをin-memoryでコンパイルし、生成されたコードを文字列比較でテストします。プロセッサのロジックが複雑な場合はユニットテストでKSシンボルをモックして個別に検証します。",
     code:"// KotlinPoet を使ったコード生成\nimport com.squareup.kotlinpoet.*\nimport com.squareup.kotlinpoet.ParameterizedTypeName.Companion.parameterizedBy\n\nfun generateRepository(entityName: String, pkg: String): FileSpec {\n    val entityClass = ClassName(pkg, entityName)\n    val listType = List::class.asClassName().parameterizedBy(entityClass)\n\n    val findAll = FunSpec.builder(\"findAll\")\n        .returns(listType)\n        .addStatement(\"return db.query(\"SELECT * FROM \${entityName.lowercase()}s\")\")\n        .build()\n    val findById = FunSpec.builder(\"findById\")\n        .addParameter(\"id\", Int::class)\n        .returns(entityClass.copy(nullable=true))\n        .addStatement(\"return db.queryOne(\"SELECT * FROM \${entityName.lowercase()}s WHERE id = \$id\")\")\n        .build()\n\n    val repoClass = TypeSpec.classBuilder(\"\${entityName}Repository\")\n        .addFunction(findAll)\n        .addFunction(findById)\n        .build()\n\n    return FileSpec.builder(pkg, \"\${entityName}Repository\")\n        .addType(repoClass)\n        .build()\n}",
     afterCode:"KSPとKotlinPoetの組み合わせはRoomDatabase（Android）・Dagger/Hilt・Moshi・Retrofit等の主要ライブラリで使われています。これらのソースコードを読むことで、実践的なプロセッサ設計のベストプラクティスを学べます。"},
  ]},
  {id:"ch5",num:5,title:"Arrow-kt高度な使い方（Effect・Optics）",est:"65分",
   goal:"Arrow-ktのRaise DSL・Effect・ResourceをEitherと組み合わせて実務規模のエラー処理を設計できる。Opticsでネストしたimmutableデータ構造を効率的に操作し、Kleisli合成などの関数型パターンを実務コードに適用できるようになる。",
   sections:[
    {title:"Raise DSLとResource管理",
     body:"Arrow 1.2のRaise APIはEitherを直接使うよりも自然な命令型スタイルでエラーを表現できます。effect { }・either { }ブロック内でraise(error)をスローのように使い、bind()でEither値を取り出します。Haskellのdo-notationに近い書き心地です。\n\nResourceはArrow 1.2で追加されたリソース管理モナドです。Kotlinのuse { }・try/finallyの問題（ネストが深くなる）を解決し、複数リソースの取得・解放を宣言的に書けます。Pythonのcontextlib.ExitStackに対応し、例外やキャンセルが発生しても全リソースが確実に解放されます。\n\nArrowのScheduleは再試行ロジック（retry）を型安全に表現します。Schedule.recurs(3)で3回リトライ、Schedule.exponential(Duration(100, MILLISECONDS))で指数バックオフ、Schedule.jittered()でジッター付きバックオフが設定できます。PythonのtenacityやBackoffに相当します。",
     code:"import arrow.core.*\nimport arrow.core.raise.*\nimport arrow.fx.coroutines.*\n\n// Raise DSL でエラー処理\nsealed interface AppError\ndata class DbError(val msg: String)  : AppError\ndata class ApiError(val msg: String) : AppError\n\nsuspend fun fetchUser(id: Int): Either<DbError, User> = TODO()\nsuspend fun callApi(user: User): Either<ApiError, String> = TODO()\n\nsuspend fun process(id: Int): Either<AppError, String> = either {\n    val user   = fetchUser(id).mapLeft { it as AppError }.bind()\n    val result = callApi(user).mapLeft { it as AppError }.bind()\n    result\n}\n\n// Resource 管理\nfun dbConnection(url: String): Resource<Connection> = resource {\n    val conn = DriverManager.getConnection(url)\n    install({ conn }) { c, _ -> c.close() }  // 確実にcloseされる\n}\n\nsuspend fun withDb(url: String) {\n    dbConnection(url).use { conn ->\n        // conn を使用\n    }  // ここで自動クローズ\n}",
     afterCode:"Arrow-ktのEitherとコルーチンを組み合わせる際、withContext内でeither { }が使えます。Arrow 1.2のRaiseコンテキストはコルーチンコンテキストと独立しているため、suspend関数内でbind()を使うにはeither { }ブロックが必要です。"},
    {title:"型クラスとKleisli合成",
     body:"Kotlinには言語レベルの型クラスはありませんが、interfaceとジェネリクスで型クラスパターンを模倣できます。ArrowのTypeClass概念（Eq・Order・Show等）はKotlin 1.9以降のcontext parameters（コンテキスト受け取り）で将来的により自然な記述が可能になります。\n\nKleisliはA → M<B>という形の関数を合成するパターンです。KleisliはA → Either<E, B>のような型を持ち、flatMap・andThenで複数の変換をパイプラインとして組み合わせます。Repositoryのバリデーション・変換・永続化を連鎖させる際に使います。ReaderモナドはKleisli<R, A, B>として表現でき、依存性注入の純粋関数型版です。\n\nArrow-ktのoptics-composeはLens・Prism・Traversalを自由に合成できます。Prism.andThen(Lens)はPrismとLensの合成を返し、sealed classのサブタイプ内のフィールドを1段の操作で変更できます。大きなドメインモデルの不変更新に有効で、Haskellのlendsライブラリの哲学をKotlinで実現します。",
     code:"import arrow.optics.*\nimport arrow.optics.dsl.*\nimport arrow.core.*\n\n// Kleisli 合成パターン（Either でのパイプライン）\ntypealias Step<I, O> = (I) -> Either<String, O>\n\nfun <A, B, C> Step<A, B>.andThen(next: Step<B, C>): Step<A, C> =\n    { input -> this(input).flatMap { next(it) } }\n\nfun validateAge(n: Int): Either<String, Int> =\n    if (n >= 0) n.right() else \"負の年齢\".left()\nfun toAgeGroup(age: Int): Either<String, String> =\n    when {\n        age < 18 -> \"未成年\".right()\n        age < 65 -> \"成人\".right()\n        else     -> \"シニア\".right()\n    }\nfun requireAdult(group: String): Either<String, String> =\n    if (group == \"成人\" || group == \"シニア\") group.right()\n    else \"未成年は不可\".left()\n\nval adultCheck: Step<Int, String> =\n    ::validateAge andThen ::toAgeGroup andThen ::requireAdult\n\nfun main() {\n    println(adultCheck(30))   // Right(成人)\n    println(adultCheck(-1))   // Left(負の年齢)\n    println(adultCheck(10))   // Left(未成年は不可)\n}",
     afterCode:"context parameters（旧context receivers）はKotlin 2.1以降の実験的機能で、型クラスパターンをより自然に記述できます。fun context(eq: Eq<T>) areEqual(a: T, b: T) = eq.equals(a, b)のようにコンテキスト引数を受け取る関数を定義できます。現時点では@OptIn(ExperimentalContextParameters::class)が必要です。"},
  ]},
  {id:"ch6",num:6,title:"Ktor + React KMPフルスタック",est:"65分",
   goal:"KMPを使ってKtor（JVM）バックエンドとKotlin/JS Reactフロントエンドで共通のモデルを共有するフルスタックアプリを構築できる。kotlinx.serializationとKtor Clientを使ったAPI通信・セッション認証・デプロイまで一貫して実装できるようになる。",
   sections:[
    {title:"KMPフルスタックアーキテクチャ",
     body:"KMPフルスタックはshared（共通モデル・APIインターフェース）・server（Ktor JVM）・client（Kotlin/JS + React）の3モジュール構成が基本です。sharedモジュールのコードは全プラットフォームでコンパイルされるため、APIのリクエスト・レスポンス型をサーバーとクライアントで完全に共有できます。PythonのFastAPIとReact（TypeScript）の構成でOpenAPIスキーマを共有するのに相当しますが、Kotlinの型システムで完全に静的に保証されます。\n\nsharedモジュールにはAPIのエンドポイント定義（インターフェースまたはsealed class）・レスポンスモデル・バリデーションロジックを配置します。KtorのResources APIを使うとタイプセーフなルーティングをsharedに定義でき、クライアントもサーバーも同じルートを参照します。\n\nKotlin/JSのReactバインディング（kotlin-wrappers）はReact 18のhooks・コンポーネント・Context APIをKotlinから型安全に使えます。ReactのJSXに相当するKotlin DSL（react-dom/html）でDOM要素を型安全に構築できます。Webpack（または Vite-plugin-kotlin-multiplatform）でバンドルします。",
     code:"// shared/src/commonMain/Api.kt\n@Serializable\ndata class TodoItem(val id: Int, val title: String, val done: Boolean = false)\n\n@Serializable\ndata class CreateTodoRequest(val title: String)\n\n// Ktor Resources（タイプセーフなルート定義）\n@Resource(\"/todos\")\nclass Todos {\n    @Resource(\"{id}\")\n    class ById(val parent: Todos = Todos(), val id: Int)\n}\n\n// server/src/main/Application.kt\nfun Application.configureRouting() {\n    routing {\n        get<Todos> {\n            call.respond(TodoService.findAll())\n        }\n        post<Todos> {\n            val req = call.receive<CreateTodoRequest>()\n            call.respond(HttpStatusCode.Created, TodoService.create(req))\n        }\n        delete<Todos.ById> { route ->\n            TodoService.delete(route.id)\n            call.respond(HttpStatusCode.NoContent)\n        }\n    }\n}",
     afterCode:"Ktor ResourcesはKMP対応のタイプセーフルーティングで、クライアント（Ktor HttpClient）からhref(Todos.ById(id=1))でURLを生成できます。これによりサーバー・クライアント間のURLの文字列的な不一致が排除されます。"},
    {title:"Kotlin/JS ReactコンポーネントとデプロイメNt",
     body:"Kotlin/JSでReactアプリを書く場合、FC<Props>（Function Component）とhooks（useState・useEffect・useContext）をKotlinから使います。Propsはexternalインターフェースで定義し、型安全にコンポーネントに渡せます。JavaScriptのReactコードをKotlinで書き直すイメージで、ほぼ同等の機能が利用できます。\n\nAPIクライアントはKtor HttpClientのJSエンジンを使います。Ktor ResourcesのAPIをKMPクライアントとして使うとURLの型安全が担保されます。useEffectでデータフェッチを行い、StateFlowをcollectAsStateで購読するパターンがKMPフルスタックでは一般的です。\n\nデプロイはサーバー（Ktor/fat jar）とクライアント（Webpack bundle）を別々にビルドし、Ktorのstaticルートでフロントエンドの静的ファイルを配信します。Dockerizeする場合はマルチステージビルドでJDK+node環境でビルドし、軽量なJRE実行環境イメージで動作させます。GraalVM Native Imageを使うとコールドスタートを劇的に短縮できます。",
     code:"// client/src/jsMain/App.kt（Kotlin/JS React）\nimport react.*\nimport react.dom.html.ReactHTML.*\nimport kotlinx.browser.window\nimport kotlinx.coroutines.*\n\nval App = FC<Props> {\n    var todos by useState<List<TodoItem>>(emptyList())\n    var input  by useState(\"\")\n    val scope  = remember { MainScope() }\n\n    useEffect { // マウント時にデータ取得\n        scope.launch {\n            val result = ApiClient.getTodos()\n            todos = result\n        }\n        cleanup { scope.cancel() }\n    }\n\n    div {\n        h1 { +\"Kotlin/JS Todo App\" }\n        div {\n            input {\n                value = input\n                onChange = { e -> input = e.target.value }\n                placeholder = \"新しいTodo\"\n            }\n            button {\n                onClick = {\n                    if (input.isNotBlank()) {\n                        scope.launch {\n                            val created = ApiClient.createTodo(CreateTodoRequest(input))\n                            todos = todos + created\n                            input = \"\"\n                        }\n                    }\n                }\n                +\"追加\"\n            }\n        }\n        ul {\n            todos.forEach { todo ->\n                li { key = todo.id.toString(); +todo.title }\n            }\n        }\n    }\n}",
     afterCode:"Kotlin/JSのWebpackバンドルサイズはデフォルトで大きくなりがちです。./gradlew jsBrowserProductionWebpackでminify・tree-shakingが有効になります。さらにDCE（Dead Code Elimination）を有効にするとKotlin標準ライブラリの未使用部分が除去され大幅に削減できます。"},
  ]},
  {id:"ch7",num:7,title:"パフォーマンスチューニング",est:"60分",
   goal:"JFR・async-profiler・JVM GCログを使ってJVMアプリのボトルネックを特定できる。オブジェクトアロケーション削減・インライン最適化・コルーチンのディスパッチ最適化を実装でき、ベンチマークをKotlin Benchmarkで計測できるようになる。",
   sections:[
    {title:"JVMプロファイリングとGC最適化",
     body:"Kotlinアプリのパフォーマンスチューニングはまず計測から始まります。async-profilerはサンプリングベースのプロファイラーで、CPU・アロケーション・ロックのFlame Chartを生成します。JFR（Java Flight Recorder）はJDK標準の継続的プロファイリングツールで、本番環境でも低オーバーヘッドで動作します。PythonのcProfileやpySpyに相当します。\n\nJVMのGC（ガベージコレクション）はデフォルトでG1GCが使われます。大量の短命オブジェクトはEden領域のマイナーGCで回収されますが、頻繁なオブジェクト生成はGCプレッシャーを高めます。-Xlog:gc*でGCログを有効にし、GCViewer等でグラフ化するとGCの頻度・時間が視覚化できます。\n\nKotlinのinlineキーワードはラムダを呼び出し先にインライン展開し、Function objectのアロケーションをゼロにします。高階関数をhotpathで使う場合にinlineを付けることでGCプレッシャーを大幅に削減できます。また、プリミティブ型を使うとboxing（Integer vs int）が避けられJVMが最適化しやすくなります。Kotlin 2.0以降はValue Classが安定しており、型安全なラッパーをプリミティブ同等のパフォーマンスで使えます。",
     code:"// inline 関数でアロケーション削減\ninline fun <T> measureTime(block: () -> T): Pair<T, Long> {\n    val start = System.nanoTime()\n    val result = block()  // ラムダがインライン展開される → アロケーションなし\n    return result to (System.nanoTime() - start)\n}\n\n// Value Class（JVM ではプリミティブとして扱われる）\n@JvmInline\nvalue class UserId(val value: Int)  // Int のラッパーだがboxingなし\n\n@JvmInline\nvalue class Email(val value: String) {\n    init { require(value.contains(\"@\")) { \"Invalid email\" } }\n}\n\n// crossinline・noinline の違い\ninline fun doWithCallback(\n    crossinline onSuccess: () -> Unit,\n    noinline onError: (Throwable) -> Unit  // Functionオブジェクトとして渡す\n) {\n    try {\n        onSuccess()  // crossinline: inlineされるが非局所returnは禁止\n    } catch (e: Throwable) {\n        onError(e)  // noinline: Functionオブジェクトのまま渡す\n    }\n}",
     afterCode:"Kotlinのinline関数内でreturnを使うと「非局所return」が発生し、呼び出し元の関数を返します。これはPythonにない概念です。意図しない非局所returnを防ぐにはcrossinlineを使ってラムダ内の非局所returnを禁止します。"},
    {title:"Kotlin Benchmarkとコルーチン最適化",
     body:"kotlinx-benchmarkライブラリを使うとJMH（Java Microbenchmark Harness）ベースのベンチマークをKotlinで書けます。@Benchmark・@Setup・@TearDown・@Stateアノテーションを使い、JVMのJITウォームアップを考慮した正確な計測ができます。Pythonのtimeit・benchmarkアプローチと比べてJVMの最適化を考慮したより信頼性の高い結果が得られます。\n\nコルーチンのパフォーマンスで重要なのはDispatcherの選択とコンテキストスイッチのコストです。withContext(Dispatchers.IO)は毎回スレッドを切り替えるため、I/O処理の粒度が細かいとオーバーヘッドになります。IO処理をまとめてバッチ化するか、Channel・Flowを使ってストリームとして処理することでコンテキストスイッチを減らせます。\n\nメモリ消費の削減にはSequence（遅延コレクション）・Channel・Flowを使います。大量データをListに全件読み込まずストリーム処理することで、ピークメモリを数十分の一に抑えられます。OOMエラーはHeapDumpを解析し、DomainObjectが大量に保持されている場合はストリーム化を検討します。",
     code:"import kotlinx.benchmark.*\nimport org.openjdk.jmh.annotations.*\n\n@State(Scope.Benchmark)\n@Fork(1)\n@Warmup(iterations = 3)\n@Measurement(iterations = 5)\nclass ListVsSequenceBenchmark {\n    private val data = (1..100_000).toList()\n\n    @Benchmark\n    fun withList(): Long {\n        return data\n            .filter { it % 2 == 0 }\n            .map { it.toLong() * it }\n            .sum()\n    }\n\n    @Benchmark\n    fun withSequence(): Long {\n        return data.asSequence()\n            .filter { it % 2 == 0 }\n            .map { it.toLong() * it }\n            .sum()\n    }\n}\n\n// build.gradle.kts\n// plugins { id(\"org.jetbrains.kotlinx.benchmark\") version \"0.4.10\" }\n// benchmark { targets { register(\"main\") } }\n// ./gradlew benchmark",
     afterCode:"JMHベンチマークはウォームアップが重要です。@Warmup(iterations=5)でJITコンパイルが落ち着いた状態から計測を始めます。Warmupなしの計測はJITが安定していないため10倍以上の誤差が出ることがあります。GCの影響を排除するために@GCアノテーションもあります。"},
  ]},
  {id:"ch8",num:8,title:"ライブラリ公開・API設計",est:"60分",
   goal:"Kotlinライブラリを設計・実装・テストしてMavenCentralに公開できる。Binary Compatibility Validatorで後方互換性を管理し、@ExperimentalAPIアノテーションで段階的なAPI安定化ができるようになる。",
   sections:[
    {title:"ライブラリAPI設計と互換性管理",
     body:"優れたKotlinライブラリのAPI設計はいくつかの原則に従います。第一に「最小限のpublicサーface」：不要なクラス・関数はinternalまたはprivateにして、外部への依存を最小化します。第二に「イミュータビリティの優先」：publicなpropertyはvalで定義し、副作用のないAPIを設計します。第三に「型安全な設計」：Stringの代わりにvalue classを使い、誤った値の渡し方をコンパイル時に防ぎます。\n\n後方互換性の管理は大規模ライブラリの継続的な課題です。Binary Compatibility Validator（BCV）はpublicなAPI（クラス・メソッド・シグネチャ）のスナップショット（.apiファイル）を維持し、CIでの変更を検出します。Kotlinx.coroutinesやKtorがこのツールを使っています。APIを変更する前に@Deprecated(ReplaceWith)でマイグレーションパスを示すことで、利用者がアップグレードしやすくなります。\n\n@RequiresOptIn（旧@Experimental）はAPI利用者が明示的に@OptIn(MyApi::class)を宣言しないと使えないようにします。段階的なAPI安定化（実験的→安定）のプロセスで、Kotlin自身もこの仕組みを使ってcoroutinesのAPIを段階的に安定化させました。Kotlinx.serializationのSerializationExperimentalApiが典型例です。",
     code:"// API設計のベストプラクティス\n@RequiresOptIn(message = \"This API is experimental and may change\")\n@Retention(AnnotationRetention.BINARY)\nannotation class ExperimentalMyLibraryApi\n\n// Value Class で型安全\n@JvmInline value class PageNumber(val value: Int) {\n    init { require(value > 0) { \"PageNumber must be positive\" } }\n}\n@JvmInline value class PageSize(val value: Int) {\n    init { require(value in 1..1000) { \"PageSize must be 1-1000\" } }\n}\n\n// DSL for library configuration（Builderパターン）\nclass LibraryConfig private constructor(\n    val baseUrl: String,\n    val timeout: Long,\n    val retries: Int,\n) {\n    class Builder {\n        var baseUrl: String = \"\"\n        var timeout: Long   = 5000\n        var retries: Int    = 3\n        fun build() = LibraryConfig(baseUrl, timeout, retries)\n    }\n    companion object {\n        fun build(block: Builder.() -> Unit) = Builder().apply(block).build()\n    }\n}\n\n// 非推奨マーカー\n@Deprecated(\n    message = \"Use newFunction() instead\",\n    replaceWith = ReplaceWith(\"newFunction()\"),\n    level = DeprecationLevel.WARNING\n)\nfun oldFunction() = Unit",
     afterCode:"KDocはKotlinの公式ドキュメンテーションコメント形式で、Javadocに相当します。@param・@return・@throws・@sampleタグを使ってAPIを文書化します。Dokkaコマンドで HTML/Markdown/Javadocドキュメントを生成でき、GitHub Pagesで公開するとライブラリのドキュメントサイトが完成します。"},
    {title:"MavenCentralへの公開とCI/CD",
     body:"Kotlin/KMPライブラリをMavenCentralに公開するにはSonatype OSSRHアカウント・GPG署名・POMメタデータの3つが必要です。maven-publishプラグインとsigningプラグインを組み合わせて設定します。Gradle nexus-publish-pluginを使うとclose/releaseの操作も自動化できます。Pythonのtwine（PyPI）やnpm publish（npm registry）に相当します。\n\nKMPライブラリのpublishは各ターゲット（JVM・JS・Native）ごとに別々のアーティファクトが生成されます。Kotlin Multiplatformのpublication設定はkotlin { }ブロックで行い、Gradle MetadataでKMP対応が宣言されます。macOS上でのビルドが必要なターゲット（iosArm64等）はGitHub ActionsのmacOSランナーで実行します。\n\nCIは「PR→テスト＋APIチェック」「tagプッシュ→MavenCentralへのリリース」の2段階が典型的です。GitHub ActionsのGRADLE_PUBLISHシークレットにGPGキーとOSSRH認証情報を登録し、自動リリースを実現します。ChangeLogの自動生成にはgit-cliff・release-pleaseが使えます。",
     code:"// build.gradle.kts（KMP ライブラリのリリース設定）\nplugins {\n    kotlin(\"multiplatform\") version \"2.0.21\"\n    id(\"maven-publish\")\n    id(\"signing\")\n    id(\"io.github.gradle-nexus.publish-plugin\") version \"2.0.0\"\n}\n\nkotlin {\n    jvm(); js(IR) { browser() }\n    // iOS ターゲットは macOS ランナーが必要\n    // iosArm64(); iosSimulatorArm64()\n}\n\ngroup   = \"com.example\"\nversion = \"1.0.0\"\n\nnexusPublishing {\n    repositories.sonatype {\n        nexusUrl.set(uri(\"https://s01.oss.sonatype.org/service/local/\"))\n        snapshotRepositoryUrl.set(uri(\"https://s01.oss.sonatype.org/content/repositories/snapshots/\"))\n        username.set(providers.environmentVariable(\"OSSRH_USERNAME\"))\n        password.set(providers.environmentVariable(\"OSSRH_PASSWORD\"))\n    }\n}\n\nsigning {\n    val key = providers.environmentVariable(\"GPG_SIGNING_KEY\")\n    val pwd = providers.environmentVariable(\"GPG_SIGNING_PASSWORD\")\n    useInMemoryPgpKeys(key.orNull, pwd.orNull)\n    sign(publishing.publications)\n}",
     afterCode:"KMPライブラリのバージョニングにはSemVer（Major.Minor.Patch）を使います。パブリックAPIの後方互換を破る変更はMajorバージョンを上げ、新機能追加はMinor、バグ修正はPatchを上げます。Binary Compatibility Validatorと組み合わせることで、意図しないAPIの破壊的変更をCIで防止できます。"},
  ]},
