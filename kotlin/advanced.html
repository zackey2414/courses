answer:`import com.google.devtools.ksp.processing.*
import com.google.devtools.ksp.symbol.*
import com.google.devtools.ksp.validate

@Target(AnnotationTarget.CLASS)
annotation class Loggable

class LoggableProcessor(private val env: SymbolProcessorEnvironment) : SymbolProcessor {
    override fun process(resolver: Resolver): List<KSAnnotated> {
        val symbols = resolver
            .getSymbolsWithAnnotation(Loggable::class.qualifiedName!!)
            .filterIsInstance<KSClassDeclaration>()

        val file = env.codeGenerator.createNewFile(
            dependencies = Dependencies(false),
            packageName = "generated",
            fileName = "LogRegistry"
        )
        file.bufferedWriter().use { w ->
            w.write("package generated\n\n")
            w.write("object LogRegistry {\n")
            w.write("  val classes = listOf(\n")
            symbols.forEach { w.write("    \"\${it.qualifiedName?.asString()}\",\n") }
            w.write("  )\n}\n")
        }
        return symbols.filterNot { it.validate() }.toList()
    }
}

answer:`import arrow.core.*

sealed class AgeError {
    data class ParseError(val input: String) : AgeError()
    data class RangeError(val age: Int) : AgeError()
}

fun parseAge(input: String): Either<AgeError, Int> {
    val age = input.toIntOrNull()
        ?: return AgeError.ParseError(input).left()
    return if (age in 0..150) age.right()
    else AgeError.RangeError(age).left()
}

fun main() {
    println(parseAge("25"))    // Either.Right(25)
    println(parseAge("abc"))   // Either.Left(ParseError(input=abc))
    println(parseAge("200"))   // Either.Left(RangeError(age=200))
}`},
],

code:`import io.ktor.server.application.*
import io.ktor.server.routing.*
import io.ktor.server.response.*

// User, UserRepository interface, InMemoryUserRepository,
// GetUserUseCase, そして routing { } の骨格を書け`,
answer:`import io.ktor.server.application.*
import io.ktor.server.engine.*
import io.ktor.server.netty.*
import io.ktor.server.routing.*
import io.ktor.server.response.*
import kotlinx.serialization.Serializable

@Serializable
data class User(val id: Int, val name: String)

interface UserRepository {
    suspend fun findById(id: Int): User?
}

class InMemoryUserRepository : UserRepository {
    private val store = mapOf(1 to User(1, "Alice"), 2 to User(2, "Bob"))
    override suspend fun findById(id: Int) = store[id]
}

class GetUserUseCase(private val repo: UserRepository) {
    suspend fun execute(id: Int): User? = repo.findById(id)
}

fun Application.configureRouting(useCase: GetUserUseCase) {
    routing {
        get("/users/{id}") {
            val id = call.parameters["id"]?.toIntOrNull()
                ?: return@get call.respond(io.ktor.http.HttpStatusCode.BadRequest)
            val user = useCase.execute(id)
                ?: return@get call.respond(io.ktor.http.HttpStatusCode.NotFound)
            call.respond(user)
        }
    }
}`},

code:`// Context Parameters (2.2+, experimental)
// value class UserId の定義と、context付き関数の例を書け`,
answer:`@file:OptIn(ExperimentalContextParameters::class)

import kotlin.experimental.ExperimentalContextParameters

interface Logger {
    fun log(msg: String)
}

object ConsoleLogger : Logger {
    override fun log(msg: String) = println("[LOG] \$msg")
}

// value class: インライン最適化、型安全ラッパー
@JvmInline
value class UserId(val value: Int) {
    init { require(value > 0) { "UserId must be positive" } }
}

// Context Parameters で Logger を暗黙注入
context(logger: Logger)
fun greetUser(id: UserId) {
    logger.log("Hello, user \${id.value}")
}

fun main() {
    val id = UserId(42)
    with(ConsoleLogger) {
        greetUser(id)  // [LOG] Hello, user 42
    }

    // value class はコンパイル後 Int に最適化される
    // UserId(0) は IllegalArgumentException
}`},

        delay(500)
        println("fetched in \${Thread.currentThread().name}")
    }

    supervisorScope {

{title:"Effect SystemとPythonとの比較",
body:`Effect System（またはEffect Monad）は「副作用を型に表現する」概念です。ArrowのEffect<E,A>は「エラーEが起きうる、値Aを返す計算」を表します。通常の関数呼び出しと見た目は変わりませんが、エラー型がシグネチャに現れるためAPIの使い手がエラーハンドリングを強制されます。

PythonのResult型パターン（return (value, None) or (None, error)）と比べると、ArrowはEitherをflatMapでチェーンできるため、複数のエラーを持つ処理を読みやすく書けます。また、Pythonではエラーをraise/exceptで扱う命令型スタイルが主流ですが、Arrowでは「エラーも値として扱う」宣言的スタイルです。

実務では「例外をどこでcatchするか」問題（外側のtry-catchが深くなる）をEitherで解消できます。ただし全コードをArrowで書くのではなく、コアなビジネスロジック層のエラー表現にEitherを使い、エッジ（HTTP handler等）で変換するのが現実的な設計です。`,
code:`import arrow.core.*
import arrow.core.raise.*

sealed class AppError {
    data class NotFound(val id: Int) : AppError()
    data class Unauthorized(val msg: String) : AppError()
}

// raise DSL でネストなしにエラーを返す
suspend fun getUser(id: Int, token: String): Either<AppError, String> = either {
    if (token != "secret") raise(AppError.Unauthorized("invalid token"))
    if (id <= 0) raise(AppError.NotFound(id))
    "User#\$id"  // 正常値
}

fun main() {
    // kotlinx.coroutines.runBlocking は import が必要
    // ここでは簡略化のため直接値を使う
    println(getUser(1, "secret"))    // Either.Right(User#1)
    println(getUser(1, "bad"))       // Either.Left(Unauthorized(...))
    println(getUser(-1, "secret"))   // Either.Left(NotFound(id=-1))
}`,
afterCode:`Arrow の zip / parZip を使うと複数の Either を同時にバリデーションし、全エラーを集約できます（Validated の役割）。フォームバリデーションやリクエスト検証に有効です。`},
]},

sections:[
{title:"Clean Architecture with Ktor",
body:`KtorはJetBrains製の軽量Webフレームワークで、Springのような重厚な規約はなく、アーキテクチャは開発者が設計します。Clean Architectureを採用する場合、Route/Plugin層・UseCase層・Repository層・DataSource層に分離するのが一般的です。PythonのFastAPI + 手動レイヤ分離に近い感覚で設計できます。

DIはKoinやHiltが多く使われます。Koinはシンプルで、module { single { UserRepository() } } のように定義し、by inject<UserRepository>()で注入します。テスト時はモジュールをオーバーライドしてMockRepositoryに差し替えられます。

実務のKtorプロジェクトではExposedかKtorm（SQLのORMライブラリ）、またはJOOQを使ってDB操作を行います。ExposedはKotlin DSLでSQLを書けるため、PythonのSQLAlchemyコアAPIに近い書き方ができます。コネクションプールにはHikariCPを使い、Coroutines対応のラッパー（exposed-coroutines）と組み合わせるのが標準的です。`,

afterTable:`KtorのPluginとしてinstall(ContentNegotiation) { json() }・install(Authentication) { jwt { } }を追加することでJSONシリアライズと認証を設定できます。これはFastAPIのDependsやMiddlewareに相当します。`},
{title:"GraphQL（graphql-kotlin）とマイクロサービス設計",
body:`graphql-kotlinはExpediaが開発するKotlin向けGraphQLライブラリで、Ktor向けのktor-graphqlサーバーを提供します。スキーマはKotlinのクラスから自動生成され、@GraphQLQueryアノテーションを持つクラスがルートQueryになります。Pythonのstrawberryやariadneと同様の「コードファースト」アプローチです。

マイクロサービス構成では各サービスをKtorで実装し、サービス間通信にはKtorのHTTPクライアントまたはgRPC（grpc-kotlin）を使います。分散トレーシングにはOpenTelemetry Kotlin SDKをCoroutinesと統合して使うのが現在のベストプラクティスです。CoroutineContextにTraceContextを載せることで、async { }をまたいだトレース伝播が実現できます。

PythonのFastAPI + Celeryで実現していたような非同期タスクキューは、KotlinではKtor + Coroutines + Redis/Kafka Client（kotlinx-coroutines対応）で実装します。Coroutinesのstructured concurrencyにより、タスクのキャンセルとエラー伝播が自然に管理できます。`,
code:`// graphql-kotlin の最小例
import com.expediagroup.graphql.server.ktor.*
import com.expediagroup.graphql.generator.annotations.GraphQLDescription

data class User(val id: Int, val name: String)

class UserQuery {
    @GraphQLDescription("IDでユーザーを取得")
    suspend fun user(id: Int): User? =
        if (id == 1) User(1, "Alice") else null
}

// Application.module() 内
fun Application.configureGraphQL() {
    install(GraphQL) {
        schema { packages = listOf("com.example") }
        queries = listOf(UserQuery())
    }
    routing { graphQLPostRoute() }
}
// POST /graphql に { "query": "{ user(id:1) { id name } }" }`,
afterCode:`graphql-kotlinのsubscriptionsにはWebSocketが使われます。Coroutinesの Flow<T> を返すことでリアルタイムストリーミングを実装できます。`},
]},
{id:"ch5",num:5,title:"Compose Multiplatform",est:"60分",
goal:"Composable関数・State・rememberの仕組みを説明できる。Compose MultiplatformでデスクトップおよびWebへのKMP配信の基礎を理解できる。ViewModelパターンをCompose UIと組み合わせて実装できる。",
sections:[
{title:"Composable・State・rememberの仕組み",
body:`Compose Multiplatformは宣言的UIフレームワークで、Android向けJetpack Composeの思想をデスクトップ・Web・iOSに拡張したものです。@ComposableアノテーションはKotlinコンパイラプラグインが処理し、差分更新（再コンポーズ）の単位になります。Pythonのtkinterやtkmesと異なり、状態が変わると影響するComposableのみが再描画されます。

remember { mutableStateOf(0) }は「コンポーズをまたいで値を保持する」機能で、ReactのuseStateに相当します。stateオブジェクトの.valueが変わると、そのstateを読んでいるComposableが自動的に再コンポーズされます。この仕組みをState Hoistingと組み合わせると、親が状態を持ち子に値とコールバックを渡す「単方向データフロー」が実現できます。

Compose UIのレイアウトはColumn/Row/Box/LazyColumnが基本です。これはFlutterのColumn/Row、SwiftUIのVStack/HStackと同様の概念です。Modifierチェーンでパディング・クリック・背景などを付与します。`,
table:T.composeState,
afterTable:`rememberCoroutineScope()でComposable内からCoroutineを起動できます。LaunchedEffect(key)はkeyが変わった時に副作用（データフェッチ等）を再実行します。PythonのuseEffect依存配列と同等の概念です。`},
{title:"Kotlin Multiplatform（KMP）とCompose Web",
body:`Kotlin Multiplatform（KMP）はビジネスロジックを複数のプラットフォームで共有する仕組みです。expect/actual機構により「共通コードでAPIを定義し、各プラットフォーム実装を提供する」パターンが使えます。例えばexpect class PlatformFile(path: String)をiOS/Android/JVM向けにそれぞれactualで実装します。

Compose MultiplatformのWebターゲットはKotlin/JSまたはKotlin/WASMを使います。WASM（wasm-js）はKotlin 2.1で安定化されており、Kotlin/JSより実行速度が大幅に向上しています。ただしWASMはHTTPリクエストやDOMアクセスにJavaScriptとの橋渡し（interop）が必要で、まだエコシステムが発展途上です。

Flutterと比べると、KMP+Composeは「ビジネスロジックの共有」に強みがあり、UIは各プラットフォームで調整できます。Flutterは「完全同一UI」を全プラットフォームで実現する思想です。どちらが適切かはプロダクトのUX要件によります。`,
code:`// Compose Desktop の最小アプリ
import androidx.compose.material3.*
import androidx.compose.runtime.*
import androidx.compose.ui.window.*

// expect/actual でプラットフォーム分岐
expect fun getPlatformName(): String
// JVM側: actual fun getPlatformName() = "Desktop"
// JS側:  actual fun getPlatformName() = "Web"

@Composable
fun App() {
    var text by remember { mutableStateOf("Hello") }
    MaterialTheme {
        Button(onClick = { text = "KMP on \${getPlatformName()}" }) {
            Text(text)
        }
    }
}

fun main() = application {
    Window(onCloseRequest = ::exitApplication) { App() }
}`,
afterCode:`KMPプロジェクトの作成はKotlin Multiplatform Wizard（kmp.jetbrains.com）が最も手軽です。gradle/libs.versions.tomlでバージョン管理することがKotlinエコシステムの標準です。`},
]},
{id:"ch6",num:6,title:"Kotlin最新機能（2.x）",est:"55分",
goal:"Context Parametersの構文と用途を説明できる。value classのインライン最適化の仕組みを理解し適切に使える。WASM Targetの現状とKotlinエコシステムの全体像を把握できる。",
sections:[
{title:"Context Parameters・value class・WASM",
body:`Kotlin 2.2で実験的に導入されたContext Parametersは、暗黙的なパラメータを型安全に渡す機能です。context(logger: Logger)と宣言することで、関数呼び出し側のwith(logger) { }ブロック内でそのパラメータが自動的に利用可能になります。ScalaのGiven/Usingやimplicit parameterに相当し、依存注入のボイラープレートを大幅に削減できます。

value class（旧inline class）は単一プロパティをラップした型で、コンパイル後はラップを除去して元の型として扱われます。@JvmInline value class UserId(val value: Int)とすると、JVMレベルではIntとして動作しながら、コード上はUserId型として型安全に扱えます。Pythonではint型のIDを間違えてstr型の別IDと混同してしまうバグが起きやすいですが、value classを使えばコンパイル時にチェックできます。

WASM Targetはブラウザ向けのWebAssembly出力で、Kotlin/WASMとも呼ばれます。2.1でwasm-jsターゲットが安定化されており、Compose for WebのWASMバックエンドとして使われています。JavaScript interopにはJsExternalインターフェースを使い、JS APIをKotlinから呼び出します。`,
table:T.kotlin2x,
afterTable:`Context Parametersを有効にするにはbuild.gradle.ktsに kotlinOptions { freeCompilerArgs += "-Xcontext-parameters" } を追加します（2.2時点）。安定化後はこの設定は不要になる予定です。`},
{title:"Kotlinエコシステムの現状と今後",
body:`2025年現在、Kotlinエコシステムはサーバーサイド・Android・KMPの3軸で急速に成熟しています。サーバーサイドではSpring Boot + Kotlin、またはKtor + Kotlin Coroutinesが二大選択肢です。Spring Bootは大企業での採用実績が多く、KtorはJetBrains謹製で軽量・Coroutinesネイティブです。

AndroidではJetpack Compose + KMMが事実上の標準になりつつあります。GoogleはKotlinファーストを明言しており、新しいJetpackライブラリはKotlin APIが優先されます。iOSとロジックを共有したい場合はKMM（Kotlin Multiplatform Mobile）を使い、UIはそれぞれSwiftUIとCompose Androidで書くのが現実的な選択です。

Pythonとの比較という観点では、Kotlinはより静的型付け・パフォーマンス・マルチプラットフォームに強みがあります。Pythonはデータサイエンス・スクリプティング・プロトタイピングに優れます。実務では両方を使い分けることも多く、KotlinバックエンドとPython ML推論サービスをgRPCで繋ぐアーキテクチャなども一般的です。Kotlinエンジニアとして食っていくために最重要なのは、Coroutines・型システム・KMPの理解です。`,
code:`// Kotlin 2.x の主要機能まとめ

// 1. value class で型安全ラッパー
@JvmInline value class Email(val value: String) {
    init { require("@" in value) { "Invalid email" } }
}

// 2. Context Parameters (2.2+)
context(scope: CoroutineScope)
fun launchWork() = scope.launch { delay(100); println("done") }

// 3. データクラスのcopy改善 (2.0+)
data class Config(val host: String, val port: Int = 8080)
val dev  = Config("localhost")
val prod = dev.copy(host = "prod.example.com", port = 443)

fun main() {
    val email = Email("user@example.com")
    println(email.value)  // user@example.com
    println(prod)         // Config(host=prod.example.com, port=443)
}`,
afterCode:`Kotlinの公式ロードマップはkotlinlang.org/docs/roadmap.htmlで確認できます。Context Parameters・Explicit Backing Fields・improved WASMは今後のリリースで安定化予定です。コミュニティはKotlin Slack（kotlinlang.slack.com）が最も活発です。`},
]},

          exercises.map((ex, i) => React.createElement(Exercise, { key: `${ch.id}-ex-${i}`, ex, chId: ch.id }))
        ),

        React.createElement('div', { style:{ display:'flex', justifyContent:'space-between', marginTop:36 } },
          currentCh > 0
            ? React.createElement('button', {
                onClick: () => setCurrentCh(currentCh - 1),
                style:{ background:'#ede9fe', color:'#5b21b6', border:'none', borderRadius:10, padding:'10px 24px', fontWeight:700, cursor:'pointer', fontSize:14 }
              }, `← Chapter ${chapters[currentCh-1].num}: ${chapters[currentCh-1].title}`)
            : React.createElement('div'),
          currentCh < chapters.length - 1
            ? React.createElement('button', {
                onClick: () => setCurrentCh(currentCh + 1),
                style:{ background:'#7c3aed', color:'#fff', border:'none', borderRadius:10, padding:'10px 24px', fontWeight:700, cursor:'pointer', fontSize:14 }
              }, `Chapter ${chapters[currentCh+1].num}: ${chapters[currentCh+1].title} →`)
            : React.createElement('button', {
                onClick: () => setCompleted(true),
                style:{ background:'linear-gradient(135deg,#7c3aed,#6366f1)', color:'#fff', border:'none', borderRadius:10, padding:'10px 28px', fontWeight:800, cursor:'pointer', fontSize:14 }
              }, 'コースを完了する 🎉')
        )
      ),

      React.createElement('div', { style:{ textAlign:'center', color:'#9ca3af', fontSize:12, paddingBottom:40 } },
        'kotlinlang.org ・ Kotlin 2.x 時点'
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(KotlinAdvancedCourse));
  </script>
</body>
</html>
