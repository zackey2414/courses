     answer:"fun main() {\n    val name: String? = null\n    println(name?.length)          // null（エラーなし）\n    println(name?.length ?: 0)    // 0（エルビス演算子）\n    name?.let { println(\"名前: \${it}\") }  // nullなので何も表示されない\n    val notNull: String? = \"Alice\"\n    notNull?.let { println(\"名前: \${it}\") }  // \"名前: Alice\"\n}"},

     answer:"fun toIntSafe(value: Any?): Int? = value as? Int\n\nfun main() {\n    println(toIntSafe(42))      // 42\n    println(toIntSafe(\"hello\")) // null\n    println(toIntSafe(3.14))    // null\n}"},

     code:"data class Student(val name: String, val grade: Int, val score: Double)\nval students = listOf(\n    Student(\"Alice\",1,88.0), Student(\"Bob\",2,72.0),\n    Student(\"Carol\",1,95.0), Student(\"Dave\",2,63.0)\n)\n// 1年生の平均点・成績上位2名・学年ごとのグループを求める",
     answer:"data class Student(val name: String, val grade: Int, val score: Double)\nval students = listOf(\n    Student(\"Alice\",1,88.0), Student(\"Bob\",2,72.0),\n    Student(\"Carol\",1,95.0), Student(\"Dave\",2,63.0)\n)\nfun main() {\n    val avg1st = students.filter { it.grade == 1 }.map { it.score }.average()\n    println(\"1年生平均: \${avg1st}\") // 91.5\n    val top2 = students.sortedByDescending { it.score }.take(2)\n    println(\"上位2名: \${top2.map { it.name }}\") // [Carol, Alice]\n    val byGrade = students.groupBy { it.grade }\n    println(\"グループ: \${byGrade.keys}\") // [1, 2]\n}"},

     code:"// String の拡張関数\nfun String.wordCount(): Int {\n    // 実装\n}\n// Int の拡張関数\nfun Int.times(action: () -> Unit) {\n    // 実装\n}",

    {diff:2,q:"コルーチンのキャンセルとタイムアウトを実装してください。withTimeoutを使い、処理が遅すぎたらTimeoutCancellationExceptionをキャッチしてフォールバック値を返す関数を書いてください。",
     code:"import kotlinx.coroutines.*\n\nsuspend fun slowOperation(): String {\n    delay(2000)\n    return \"成功\"\n}\n\nsuspend fun safeOperation(): String {\n    // 500ms でタイムアウト\n}",
     answer:"import kotlinx.coroutines.*\n\nsuspend fun slowOperation(): String {\n    delay(2000)\n    return \"成功\"\n}\n\nsuspend fun safeOperation(): String = try {\n    withTimeout(500) { slowOperation() }\n} catch (e: TimeoutCancellationException) {\n    \"タイムアウト: デフォルト値\"\n}\n\nfun main() = runBlocking {\n    println(safeOperation()) // \"タイムアウト: デフォルト値\"\n}"},

const chapters = [
  {id:"ch1",num:1,title:"Kotlinとは・開発環境",est:"30分",
   goal:"KotlinがJVMで動作する仕組みとJavaとの関係を理解し、IntelliJ IDEAまたはKotlin Playgroundで最初のプログラムを動かせるようになる。Kotlinを選ぶ理由とJava・Pythonとの比較ができる。",
   sections:[
    {title:"Kotlinの特徴と誕生背景",
     body:"Kotlinは2011年にJetBrains（IntelliJ IDEAの開発元）が設計し、2016年に正式リリースされた静的型付け言語です。JVM・JavaScript・Nativeをターゲットにでき、AndroidアプリはGoogleが2017年から公式サポートしています。Pythonとの大きな違いは「コンパイルされる」「静的型付け」「null安全が言語仕様に組み込まれている」の3点です。\n\nKotlinはJavaとの相互運用性が100%あり、既存のJavaライブラリやフレームワーク（Spring・Hibernate等）をそのまま使えます。これがJavaからの移行コストを下げ、企業での採用を後押ししています。Pythonのように動的型付けで気軽に書き始めることはできませんが、型システムによって大規模コードベースでのバグを早期発見できます。\n\nJava開発者にとってKotlinは「Javaをより安全かつ簡潔にした言語」であり、Python開発者には「型安全で高性能なサーバーサイド言語」として魅力的です。バックエンドAPIサーバー（Ktor・Spring Boot）からAndroidアプリ、KMPを使ったiOSアプリまで幅広いドメインをカバーできます。",
     code:"// Kotlin の特徴を一覧するサンプル\nfun main() {\n    // 型推論（明示的な型宣言不要）\n    val message = \"Hello, Kotlin!\"\n    println(message)\n\n    // Null 安全（コンパイル時に null を検出）\n    val name: String? = null\n    println(name?.length ?: 0) // null でも安全\n\n    // データクラス（boilerplate ゼロ）\n    data class Point(val x: Int, val y: Int)\n    val p = Point(3, 4)\n    println(p) // Point(x=3, y=4) 自動生成 toString\n\n    // 拡張関数（既存クラスに機能追加）\n    fun Int.squared() = this * this\n    println(5.squared()) // 25\n}",
     afterCode:"Kotlin Playground（play.kotlinlang.org）はブラウザで即座にKotlinを試せる環境です。ローカル開発にはIntelliJ IDEA Community Edition（無料）が推奨で、KotlinプラグインがプリインストールされておりGradleビルドも統合されています。"},
    {title:"開発環境のセットアップとHello World",
     body:"IntelliJ IDEAでKotlinプロジェクトを作成する場合、「New Project → Kotlin → JVM | IDEA」を選択します。Gradleを使うプロジェクトでは build.gradle.kts（KotlinスクリプトDSL）を使うのが現代的なスタイルです。Pythonのpyproject.tomlに相当する役割を果たします。\n\nKotlinのソースファイルは .kt 拡張子を持ち、パッケージ宣言はファイルの先頭に書きます。Javaと違いクラス名とファイル名を一致させる必要はなく、トップレベルの関数・プロパティをクラスに属さずに定義できます。これはPythonのモジュールレベル関数に近い設計です。\n\nKotlinコンパイラ（kotlinc）はコマンドラインからも使えますが、実務ではGradle経由のビルドが標準です。JVMターゲットのKotlinはJavaバイトコードにコンパイルされ、JVM上で実行されます。Pythonと異なりGCはJVMに委ねられ、GILはなくマルチスレッド処理が真に並列で動作します。",
     code:"// build.gradle.kts の基本設定\nplugins {\n    kotlin(\"jvm\") version \"2.0.21\"\n    application\n}\n\nrepositories { mavenCentral() }\n\ndependencies {\n    implementation(\"org.jetbrains.kotlinx:kotlinx-coroutines-core:1.8.0\")\n    testImplementation(kotlin(\"test\"))\n}\n\napplication {\n    mainClass.set(\"MainKt\")\n}\n\n// src/main/kotlin/Main.kt\npackage com.example\n\nfun main() {\n    println(\"Hello, Kotlin!\")\n    val numbers = (1..10).filter { it % 2 == 0 }\n    println(numbers) // [2, 4, 6, 8, 10]\n}",
     afterCode:"KotlinはREPLも提供しています。コマンドラインから kotlinc だけ実行するとインタラクティブシェルが起動します。PythonのREPLのようにコードを試しながら学べますが、実務での主要なフローはIntelliJ IDEAによるファイル編集です。"},
  ]},
  {id:"ch2",num:2,title:"変数・型・文字列テンプレート",est:"35分",
   goal:"val/varとKotlinの型システムを使いこなし、型推論・明示的型宣言・型変換を適切に行える。文字列テンプレートとmultiline文字列を使った読みやすいコードが書けるようになる。",
   sections:[
    {title:"val / var と型システム",
     body:"Kotlinの変数宣言にはvalとvarの2種類があります。valはJavaのfinal変数・Pythonの「再代入しない慣習」に対応しますが、Kotlinはコンパイラレベルで再代入を禁止します。実務では基本的にvalを使い、どうしても再代入が必要な場合のみvarを使います。\n\nKotlinの型システムはJavaより表現力が高く、型推論によって冗長な型注釈なしにコードを書けます。Int・Long・Double・Float・Boolean・Char・Stringがプリミティブ型に相当し、Kotlin内部ではJVMプリミティブに最適化されますがKotlinコード上は全てオブジェクトとして扱います。\n\n型変換はKotlinでは暗黙的に行われません。IntをLongに代入するにはtoLong()メソッドを呼ぶ必要があります。これはPythonの暗黙的な数値変換（int+float=float）とは対照的で、型安全性を高めるための設計です。数値リテラルには_を区切りに使えます（1_000_000）。",
     code:"fun main() {\n    // 型推論\n    val name = \"Kotlin\"       // String\n    val version = 2           // Int\n    val pi = 3.14159          // Double\n\n    // 明示的型宣言\n    val big: Long = 9_000_000_000L\n    val ratio: Float = 0.5f\n\n    // 型変換は明示的に\n    val intVal = 42\n    val longVal: Long = intVal.toLong()\n    val doubleVal = intVal.toDouble()\n\n    // 型チェックとスマートキャスト\n    val any: Any = \"Hello\"\n    if (any is String) {\n        println(any.length)  // スマートキャスト：String として使える\n    }\n    println(\"\${name} \${version} \${pi}\")\n}",
     afterCode:"KotlinのAnyはJavaのObjectに相当するルート型です。Nothingは「値を返さない（常に例外か無限ループ）」型を表し、throw式の型として使われます。Unit はPythonのNone・Javaのvoidに相当し、意味のある戻り値がないことを示します。"},
    {title:"文字列テンプレートとmultiline文字列",
     body:"Kotlinの文字列テンプレートはPythonのf-string（f\"{}\"）に対応します。シンプルな変数参照は$変数名、複雑な式は\${} で囲みます。テンプレート内に任意のKotlin式を書けるため、if式やメソッド呼び出しも使えます。\n\ntrimIndent()・trimMargin()はmultiline文字列のインデントを処理します。trimIndent()は各行の共通インデントを取り除き、trimMargin()はパイプ文字（|）をマージンとして使います。Pythonのtextwrap.dedent()に相当します。\n\nKotlinのStringクラスはJavaのStringと完全互換で、split・replace・contains・startsWith等の豊富なメソッドを持ちます。正規表現にはRegex（kotlin.text.Regex）を使い、Pythonのreモジュールに近いAPIを提供します。文字列はイミュータブルで、変更にはStringBuilderまたはbuildString{}ビルダーを使います。",
     code:"fun main() {\n    val name = \"Alice\"\n    val score = 88.5\n\n    // 文字列テンプレート\n    println(\"名前: \${name}, スコア: \${score}\")\n    println(\"判定: \${if (score >= 90) \"優\" else \"良\"}\")\n    println(\"文字数: \${name.length}\")\n\n    // Multiline 文字列\n    val json = \"\"\"\n        {\n            \"name\": \"\${name}\",\n            \"score\": \${score}\n        }\n    \"\"\".trimIndent()\n    println(json)\n\n    // buildString でStringBuilder\n    val result = buildString {\n        for (i in 1..5) append(i)\n        append(\"!\")\n    }\n    println(result) // 12345!\n}",
     afterCode:"KotlinのString.format()はJavaのString.format()と同じAPIを提供します。しかし文字列テンプレートのほうが読みやすく型安全なため、現代のKotlinコードでは文字列テンプレートを優先します。"},
  ]},
  {id:"ch3",num:3,title:"制御構文・when式",est:"35分",
   goal:"if・when・for・whileの各制御構文を使いこなし、Javaのswitchより強力なwhen式によるパターンマッチングができる。範囲（Range）・進行（Progression）を使ったループが書けるようになる。",
   sections:[
    {title:"if式とwhen式",
     body:"Kotlinではifはステートメントではなく「式」です。値を返すことができ、三項演算子の代わりにif式を使います。PythonのA if condition else Bに対応しますが、Kotlinのif式は複数行のブロックも扱えます。ブロックの場合は最後の式が値になります。\n\nwhen式はJavaのswitchを大幅に強化したものです。分岐条件に任意の式・型チェック（is）・範囲・複数値をカンマ区切りで書けます。Pythonの match...case（3.10+）に相当しますが、kotlinのwhen式は値を返せる点が優れています。elseはJavaのdefaultに相当し、全パターンを網羅していない場合は必須です。\n\nsealed classとwhenを組み合わせると、コンパイラがexhaustiveチェック（全パターンを処理しているか）を行います。これがKotlinの型安全なパターンマッチングの真価で、sealed class追加時にwhenブランチを追加し忘れるとコンパイルエラーになります。",
     code:"fun main() {\n    // if は式（値を返す）\n    val x = 15\n    val label = if (x > 10) \"大きい\" else \"小さい\"\n    println(label) // \"大きい\"\n\n    // when 式（型チェック・範囲・複数値）\n    fun describe(n: Int): String = when (n) {\n        0          -> \"ゼロ\"\n        1, 2, 3    -> \"小さな正の数\"\n        in 4..99   -> \"中くらいの数\"\n        is Int     -> \"Int型\" // ここには到達しない\n        else       -> \"大きな数\"\n    }\n    println(describe(0))   // ゼロ\n    println(describe(2))   // 小さな正の数\n    println(describe(50))  // 中くらいの数\n\n    // when を式として使い変数に代入\n    val grade = when {\n        x >= 90 -> \"A\"\n        x >= 80 -> \"B\"\n        else    -> \"C\"\n    }\n    println(grade) // C\n}",
     afterCode:"whenをexhaustiveにしたい場合、sealed class・sealed interface・enumと組み合わせます。elseをつけず全ブランチを明示することで、将来のケース追加時にコンパイルエラーで検出できます。"},
    {title:"for・while・Rangeと進行",
     body:"KotlinのforはJavaの拡張for・PythonのforとほぼRNA同じで、Iterableを実装したオブジェクトを反復できます。rangesを使ったループはPythonのrange()に対応しますが、1..10（両端含む）・1 until 10（上端を含まない）・downTo・stepといった豊富な表現があります。\n\nwithIndex()でインデックス付きの反復、zip()で2つのコレクションを対応させた反復ができます。Pythonのenumerate()とzip()に相当し、使い方も似ています。forEachとforEachIndexedはラムダを使った反復で、ラムダの中でbreakが使えない点に注意です（ラベル付きreturnで代替できます）。\n\nwhileとdo...whileはJavaとほぼ同じです。Kotlinには後置でdo...whileが存在し、少なくとも1回は実行される保証が必要なケースに使います。breakとcontinueはJavaと同様に使えますが、ラベル付きbreakでネストしたループを外側から抜けることもできます。",
     code:"fun main() {\n    // 範囲（Range）\n    for (i in 1..5) print(\"$i \") // 1 2 3 4 5\n    println()\n    for (i in 1 until 5) print(\"$i \") // 1 2 3 4\n    println()\n    for (i in 10 downTo 1 step 3) print(\"$i \") // 10 7 4 1\n    println()\n\n    // withIndex\n    val fruits = listOf(\"apple\",\"banana\",\"cherry\")\n    for ((index, fruit) in fruits.withIndex()) {\n        println(\"\${index}: \${fruit}\")\n    }\n\n    // ラベル付き break\n    outer@ for (i in 1..3) {\n        for (j in 1..3) {\n            if (j == 2) break@outer\n            print(\"\${i}-\${j} \")\n        }\n    }\n    println() // 1-1\n}",
     afterCode:"Kotlin標準ライブラリのrepeat(n) { }はwhileループのシンタックスシュガーです。forEachとforの選択はケースバイケースですが、コレクション操作のチェーン中はforEachが自然に使えます。"},
  ]},
  {id:"ch4",num:4,title:"関数・デフォルト引数・named引数",est:"40分",
   goal:"Kotlinの関数定義の様々な形式を習得し、デフォルト引数とnamed引数でAPIを設計できる。ラムダと高階関数の構文を使いこなし、スコープ関数（let・run・also・apply・with）の使い分けができるようになる。",
   sections:[
    {title:"関数定義とデフォルト・named引数",
     body:"Kotlinの関数はfunキーワードで定義します。戻り値の型は引数リストの後にコロンを付けて書きます。式本体（=）を使うと単一式の関数を一行で書けます。Pythonのdef f(x): return x*2 に対してKotlinでは fun f(x: Int) = x * 2 と書きます。\n\nデフォルト引数はJavaにはない機能で、Pythonと同様に引数のデフォルト値を定義できます。ただしKotlinではデフォルト引数を持つ引数の後ろにデフォルトなし引数を置くことができる点がPythonより柔軟です（Pythonはデフォルトなし引数は必ずデフォルト引数より前）。Named引数を使うと引数の順序に依存しない関数呼び出しができ、引数の意味が明確になります。\n\nKotlinの関数はオーバーロードに対応しており、同名の関数を引数の型や数が異なる形で複数定義できます。Pythonはデフォルト引数と*argsでこれを代替することが多いですが、Kotlinではオーバーロードのほうが型安全です。vararg（可変引数）はPythonの*argsに対応し、配列として受け取られます。",
     code:"// 基本的な関数定義\nfun add(a: Int, b: Int): Int = a + b\n\n// デフォルト引数\nfun createUser(\n    name: String,\n    age: Int = 0,\n    role: String = \"user\",\n    active: Boolean = true\n): String = \"\${name}(\${role}, age=\${age}, active=\${active})\"\n\nfun main() {\n    println(add(3, 4)) // 7\n\n    // Named 引数（順序不問）\n    println(createUser(\"Alice\"))\n    println(createUser(name = \"Bob\", role = \"admin\", age = 30))\n    println(createUser(\"Carol\", active = false))\n\n    // vararg（可変引数）\n    fun sum(vararg nums: Int) = nums.sum()\n    println(sum(1, 2, 3, 4, 5)) // 15\n    val arr = intArrayOf(10, 20, 30)\n    println(sum(*arr)) // スプレッド演算子で配列を展開\n}",
     afterCode:"@JvmOverloadsアノテーションをKotlin関数に付けると、Javaからデフォルト引数を持つ関数を呼び出すためのオーバーロードメソッドが自動生成されます。KotlinとJavaが混在するプロジェクトでは重要なアノテーションです。"},
    {title:"ラムダ・高階関数・スコープ関数",
     body:"Kotlinのラムダはブレース{}で囲み、引数とarrowを使って書きます。引数が1つの場合はitで参照できます。これはPythonのlambdaよりも柔軟で、複数文を含むブロックも書けます。\n\nKotlinの標準ライブラリにはlet・run・also・apply・withという5つのスコープ関数があります。いずれもオブジェクトを「それ」として特定のコンテキストで操作するためのものですが、参照方法（it vs this）と戻り値（レシーバーオブジェクト vs ラムダ結果）が異なります。Pythonにはこれに直接対応する構文はありませんが、withステートメントがwithに概念的に近いです。\n\nletはnull安全なブロック実行（?.let）に最もよく使われ、処理結果を返します。applyはオブジェクトの設定（ビルダーパターン）に使い、オブジェクト自身を返します。alsoはデバッグログやサイドエフェクトに使い、オブジェクトを返します。これらを使いこなすとKotlinのコードが宣言的で読みやすくなります。",
     code:"fun main() {\n    // ラムダ\n    val doubled = { x: Int -> x * 2 }\n    println(doubled(5)) // 10\n\n    val nums = listOf(1, 2, 3, 4, 5)\n    println(nums.filter { it % 2 == 0 }) // [2, 4]\n    println(nums.map { it * it })        // [1, 4, 9, 16, 25]\n\n    // スコープ関数\n    data class Config(var host: String = \"\", var port: Int = 0)\n\n    // apply: オブジェクト設定（this で参照、オブジェクトを返す）\n    val cfg = Config().apply {\n        host = \"localhost\"\n        port = 8080\n    }\n\n    // let: 変換処理（it で参照、ラムダ結果を返す）\n    val result = cfg.let { \"\${it.host}:\${it.port}\" }\n    println(result) // localhost:8080\n\n    // also: サイドエフェクト（it で参照、オブジェクトを返す）\n    val cfg2 = Config().also { println(\"Config作成: \${it}\") }\n}",
     afterCode:"スコープ関数の選択指針：変換→let、設定→apply、サイドエフェクト→also、thisとして使いたい→run/with。乱用すると可読性が下がるため、チームでスタイルガイドを共有することが重要です。"},
  ]},
  {id:"ch5",num:5,title:"Null安全・Elvis演算子",est:"40分",
   goal:"KotlinのNull安全システムの仕組みを理解し、?.・?:・!!・letを組み合わせてnullableな値を安全に扱えるようになる。JavaライブラリのNullに対処するパターンを習得し、NullPointerExceptionを防ぐコードが書けるようになる。",
   sections:[
    {title:"Nullable型とNull安全演算子",
     body:"KotlinはNullを型システムに組み込んでいます。String型はnullを許容しませんが、String?型はnullを許容します。この区別をコンパイラが強制するため、NullPointerException（Javaの「10億ドルの失敗」とも呼ばれる）をコンパイル時に大幅に防げます。Pythonには型ヒント（Optional[str]）がありますが、実行時にチェックはされません。\n\nNull安全演算子は4つあります。安全呼び出し演算子（?.）はnullなら処理をスキップしnullを返します。エルビス演算子（?:）はnullの場合のデフォルト値を指定します。非null宣言（!!）は「絶対nullでない」とプログラマが主張し、nullならNPEを発生させます。安全キャスト（as?）はキャスト失敗時にnullを返します。\n\n実務ではletと組み合わせたパターン（nullableValue?.let { ... }）が頻出です。nullでない場合だけブロックを実行し、ブロックの結果またはnullが返ります。Pythonでは if value is not None: の代わりにKotlinでは?.letを使うとより表現豊かです。",
     code:"fun main() {\n    val name: String? = null\n    val city: String? = \"Tokyo\"\n\n    // ?. 安全呼び出し\n    println(name?.length)        // null\n    println(city?.uppercase())   // TOKYO\n\n    // ?: エルビス演算子\n    println(name?.length ?: -1)  // -1\n    println(city?.length ?: 0)   // 5\n\n    // let（null でなければ実行）\n    name?.let { println(\"名前: \${it}\") }  // 実行されない\n    city?.let { println(\"都市: \${it}\") }  // 都市: Tokyo\n\n    // チェーン\n    data class User(val address: Address?)\n    data class Address(val city: String?)\n    val user: User? = User(Address(\"Osaka\"))\n    println(user?.address?.city ?: \"不明\") // Osaka\n}",
     afterCode:"!!（非null宣言）はNullPointerExceptionを明示的に許容するため、使用は最小限にしてください。テストコードやnullにならないことが文脈上明確な場所にのみ使用し、本番コードでは?.と?:で代替する設計を心がけましょう。"},
    {title:"JavaライブラリとPlatform Type",
     body:"KotlinからJavaライブラリを呼び出すとき、JavaメソッドがnullをreturnできるかKotlinはコンパイル時にわかりません。このためJavaのString型はKotlinではString!（Platform Type）と呼ばれ、nullable性が未知の状態になります。このままでは型安全性が失われます。\n\nJavaメソッドに@Nullable・@NotNullアノテーションが付いている場合はKotlinが正しく解釈します。アノテーションがない場合、KotlinコードでJavaの戻り値を受け取るときに明示的にString?として宣言するか、nullチェックを行うのが安全なパターンです。\n\nKotlinの標準ライブラリで提供されるcheckNotNull()・requireNotNull()はnullをアサーションし、失敗時にIllegalStateExceptionをスローします。Pythonのassertに相当しますが、本番環境でも動作することが保証されています。checkNotNull()はロジックエラー、requireNotNull()は引数の事前条件チェックに使い分けます。",
     code:"// Java ライブラリとの連携\nimport java.util.HashMap\n\nfun main() {\n    // Java の HashMap（Platform Type）\n    val javaMap = HashMap<String, String>()\n    javaMap[\"key\"] = \"value\"\n\n    // Java の戻り値は null の可能性がある\n    val value: String? = javaMap[\"key\"]   // 安全: nullable として扱う\n    val value2 = javaMap[\"missing\"] ?: \"\" // エルビスでデフォルト\n\n    // requireNotNull / checkNotNull\n    fun processName(name: String?) {\n        val validName = requireNotNull(name) { \"名前はnullにできません\" }\n        println(validName.uppercase())\n    }\n\n    try {\n        processName(null)\n    } catch (e: IllegalArgumentException) {\n        println(\"エラー: \${e.message}\")\n    }\n    processName(\"alice\") // ALICE\n}",
     afterCode:"Kotlin 1.8以降はJavaのOptional<T>との連携ヘルパーが強化されています。Java 8以降のAPIでOptionalを返すメソッドにはgetOrNull()拡張関数が使えます。"},
  ]},
  {id:"ch6",num:6,title:"クラス・data class・object",est:"40分",
   goal:"Kotlinのクラス定義・継承・インターフェースを実装できる。data classの自動生成機能を活用し、companion objectとobjectでシングルトンとファクトリーパターンを実装できるようになる。",
   sections:[
    {title:"クラス・継承・インターフェース",
     body:"Kotlinのクラスはデフォルトでfinal（継承不可）です。Javaでは全クラスが継承可能でfinalを付けて封じますが、Kotlinは逆にopenを付けることで継承を許可します。これは「意図しない継承による壊れやすいサブクラス問題」を防ぐ設計上の選択です。\n\nPrimaryコンストラクタはクラス名の後ろにカッコを使って書き、Secondaryコンストラクタは本体内にconstructorで追加します。initブロックで初期化処理を書けます。Pythonの__init__の役割をPrimaryコンストラクタとinitが分担する形です。\n\nKotlinのinterfaceはJava 8+のinterfaceと同様にデフォルト実装を持てます。抽象クラス（abstract class）と違い、interfaceはstateを持てません（バッキングフィールドを持たない）。多重インターフェース実装は可能で、Pythonの多重継承の代替として使われます。",
     code:"// 継承可能なクラス（open を付ける）\nopen class Animal(val name: String) {\n    open fun speak(): String = \"\${name}が鳴く\"\n    fun describe() = \"動物: \${name}\"\n}\n\nclass Dog(name: String, val breed: String) : Animal(name) {\n    override fun speak() = \"\${name}がワン！\"\n}\n\n// インターフェース（デフォルト実装あり）\ninterface Flyable {\n    val maxAltitude: Int get() = 1000\n    fun fly() = \"高度 \${maxAltitude}m を飛行中\"\n}\ninterface Swimmable {\n    fun swim() = \"泳いでいる\"\n}\n\nclass Duck(name: String) : Animal(name), Flyable, Swimmable {\n    override val maxAltitude = 500\n    override fun speak() = \"\${name}がガーガー！\"\n}\n\nfun main() {\n    val d = Duck(\"Donald\")\n    println(d.speak())    // Donald がガーガー！\n    println(d.fly())      // 高度 500m を飛行中\n    println(d.swim())     // 泳いでいる\n    println(d is Animal)  // true\n}",
     afterCode:"Kotlinのdata classはcomponent1()・component2()…を自動実装し、分割宣言（destructuring declaration）をサポートします。val (name, age) = userのように書けます。これはPythonのタプルアンパックに対応します。"},
    {title:"data class・sealed class・object",
     body:"data classはvalues objectパターンを表現するKotlinの特別なクラスです。equals・hashCode・toString・copy・componentN関数が自動生成され、ボイラープレートなしにイミュータブルなデータ型を定義できます。PythonのdataclassデコレーターまたはNamedTupleに相当し、コード量が劇的に減ります。\n\nsealed classは「閉じた継承ツリー」を表現します。sealed classのサブクラスは同じパッケージ内でのみ定義でき、whenでexhaustiveなパターンマッチングが保証されます。TypeScriptのunion型・Pythonの型制限に相当しますが、Kotlinのほうがコンパイラによる型安全が強力です。\n\nobjectキーワードは匿名クラスのインスタンス（object expression）またはシングルトン（object declaration）を作ります。companion objectはクラスに関連付けられたシングルトンで、Javaのstaticメンバーに対応します。Javaとの互換性のため@JvmStaticを付けると真のstaticメソッドになります。",
     code:"// data class\ndata class Point(val x: Double, val y: Double) {\n    fun distanceTo(other: Point) =\n        Math.sqrt((x - other.x).pow(2) + (y - other.y).pow(2))\n}\n\n// sealed class（代数的データ型）\nsealed class Shape {\n    data class Circle(val radius: Double) : Shape()\n    data class Rectangle(val w: Double, val h: Double) : Shape()\n    object Empty : Shape()\n}\n\nfun area(shape: Shape): Double = when (shape) {\n    is Shape.Circle    -> Math.PI * shape.radius * shape.radius\n    is Shape.Rectangle -> shape.w * shape.h\n    Shape.Empty        -> 0.0\n    // else 不要（exhaustive）\n}\n\n// companion object\nclass Database private constructor(val url: String) {\n    companion object {\n        fun connect(url: String) = Database(url)\n        const val DEFAULT_URL = \"jdbc:h2:mem:test\"\n    }\n}\n\nfun main() {\n    val db = Database.connect(Database.DEFAULT_URL)\n    val c  = Shape.Circle(5.0)\n    println(area(c).toInt()) // 78\n}",
     afterCode:"data classのcopyは浅いコピー（shallow copy）です。ネストしたmutableオブジェクトは参照が共有されます。完全なイミュータビリティを保つには、プロパティも不変コレクションやvalue objectにすることが重要です。"},
  ]},
  {id:"ch7",num:7,title:"コレクション・拡張関数",est:"45分",
   goal:"KotlinのMutable/Immutableコレクション（List・Set・Map）を正しく使い分け、標準ライブラリのコレクション操作関数を実務レベルで活用できる。拡張関数を自作してコードの表現力を高められるようになる。",
   sections:[
    {title:"コレクションとImmutability",
     body:"Kotlinはコレクションを「読み取り専用（read-only）」と「変更可能（mutable）」に明示的に分けています。listOf()・setOf()・mapOf()は読み取り専用、mutableListOf()・mutableSetOf()・mutableMapOf()は変更可能です。これはPythonのtupleとlistの区別に相当しますが、Kotlinのread-onlyはJavaのunmodifiableListと異なり「変更できないこと」はコンパイラが保証する点が重要です。\n\nKotlinのコレクション操作関数は豊富で、Pythonのリスト内包表記・itertools・functoolsに匹敵する表現力があります。filter・map・reduce・fold・groupBy・flatMap・zip・associate・partition・chunked・windowed等が標準ライブラリに含まれます。\n\nシーケンス（Sequence）は遅延評価版のコレクションです。asSequence()でListをSequenceに変換すると、チェーンされた操作が要素ごとに順番に処理され中間リストが生成されません。大量データ処理でメモリ効率が向上します。Pythonのgeneratorおよびitertoolsのlazyパイプラインに対応します。",
     code:"fun main() {\n    // 読み取り専用 vs 変更可能\n    val readOnly  = listOf(1, 2, 3)\n    val mutable   = mutableListOf(1, 2, 3)\n    mutable.add(4) // OK\n    // readOnly.add(4) // コンパイルエラー\n\n    // 豊富なコレクション操作\n    val nums = (1..10).toList()\n    val (evens, odds) = nums.partition { it % 2 == 0 }\n    println(evens) // [2, 4, 6, 8, 10]\n    println(odds)  // [1, 3, 5, 7, 9]\n\n    // groupBy\n    val words = listOf(\"apple\",\"ant\",\"bee\",\"banana\",\"cat\")\n    val grouped = words.groupBy { it.first() }\n    println(grouped) // {a=[apple,ant], b=[bee,banana], c=[cat]}\n\n    // Sequence（遅延評価）\n    val result = (1..1_000_000).asSequence()\n        .filter { it % 2 == 0 }\n        .map { it * it }\n        .take(5)\n        .toList()\n    println(result) // [4, 16, 36, 64, 100]\n}",
     afterCode:"LinkedList・ArrayDeque・PriorityQueueなどJavaコレクションもそのまま使えます。KotlinはArrayDequeを標準ライブラリに追加しており、スタック・キューとして使いやすいAPIが提供されています。"},
    {title:"拡張関数と演算子オーバーロード",
     body:"Kotlin最大の特徴の一つが「拡張関数（Extension Function）」です。既存のクラスを変更せずに新しいメソッドを追加できます。Pythonのモンキーパッチ（既存クラスへのメソッド追加）に似ていますが、Kotlinは型安全でツールのサポート（補完・リファクタリング）が受けられます。\n\n拡張関数はReceiver型のメンバー関数のように呼び出せますが、内部的には静的ディスパッチのため仮想ディスパッチにはなりません。つまりオーバーライドはできません。これを理解して拡張関数でユーティリティを設計することで、拡張性の高いAPIが作れます。\n\n演算子オーバーロードはoperatorキーワードを付けた関数で実装します。+はplus()、*はtimes()、[]はget()/set()に対応します。Pythonの__add__・__mul__等に相当しますが、Kotlinは定義できる演算子の種類が限られていて乱用を防ぐ設計です。",
     code:"// 拡張関数の定義\nfun String.isPalindrome(): Boolean {\n    val cleaned = this.lowercase().filter { it.isLetter() }\n    return cleaned == cleaned.reversed()\n}\n\nfun Int.factorial(): Long {\n    require(this >= 0) { \"負の数は不可\" }\n    return (1..this.toLong()).fold(1L) { acc, n -> acc * n }\n}\n\nfun <T> List<T>.second(): T {\n    if (size < 2) throw NoSuchElementException()\n    return this[1]\n}\n\n// 演算子オーバーロード\ndata class Vector(val x: Double, val y: Double) {\n    operator fun plus(other: Vector)  = Vector(x + other.x, y + other.y)\n    operator fun times(scalar: Double) = Vector(x * scalar, y * scalar)\n    val magnitude get() = Math.sqrt(x * x + y * y)\n}\n\nfun main() {\n    println(\"level\".isPalindrome())  // true\n    println(5.factorial())           // 120\n    val v1 = Vector(3.0, 4.0)\n    val v2 = v1 * 2.0\n    println(v2)             // Vector(x=6.0, y=8.0)\n    println(v2.magnitude)   // 10.0\n}",
     afterCode:"拡張関数の設計で注意すべき点：拡張関数はオーバーライドできないため、継承で解決すべき問題に拡張関数を使うと混乱が生じます。「型に機能を追加したいがサブクラスを作るほどではない」ユーティリティに最適です。"},
  ]},
  {id:"ch8",num:8,title:"Coroutines入門",est:"45分",
   goal:"kotlinx.coroutinesの基本的な使い方を理解し、launch・async・await・suspendを使った非同期コードを書ける。CoroutineScopeとDispatchers.IOを使ってI/O処理を効率化し、キャンセルとエラー処理が実装できるようになる。",
   sections:[
    {title:"コルーチンの基本とsuspend関数",
     body:"コルーチンは「中断可能な計算」の仕組みで、スレッドをブロックせずに非同期処理を行えます。Pythonのasync/awaitと概念は同じですが、Kotlinのコルーチンはより柔軟なディスパッチャシステムと構造化された同時実行（Structured Concurrency）を提供します。\n\nsuspend関数はコルーチン内でのみ呼び出せる中断可能な関数です。Pythonのasync defに対応します。通常のコードから起動するにはrunBlockingまたはCoroutineScopeが必要です。delay()は非ブロッキングなスリープで、Thread.sleep()と違ってコルーチンの中断ポイントになりスレッドを解放します。\n\nlaunchはFireAndForget型のコルーチンを起動しJobを返します。asyncは結果を返すコルーチンを起動しDeferred<T>を返します。await()でDeferredから結果を取り出します。Pythonのasyncio.createTask()・asyncio.gather()に相当します。構造化された同時実行により、スコープがキャンセルされると子コルーチンも自動的にキャンセルされます。",
     code:"import kotlinx.coroutines.*\n\n// suspend 関数（非同期I/Oをシミュレート）\nsuspend fun fetchUser(id: Int): String {\n    delay(100)  // 非ブロッキングスリープ\n    return \"User-\${id}\"\n}\n\nfun main() = runBlocking {\n    // launch: 結果不要な並行処理\n    val job = launch {\n        repeat(3) { i ->\n            println(\"処理 \${i}\")\n            delay(100)\n        }\n    }\n\n    // async: 結果を返す並行処理\n    val d1 = async { fetchUser(1) }\n    val d2 = async { fetchUser(2) }\n    println(\"\${d1.await()} と \${d2.await()}\")  // 並列実行\n\n    job.join()  // job の完了を待つ\n    println(\"全完了\")\n}",
     afterCode:"Dispatchers.IOはI/O処理（ネットワーク・ファイル）向けのスレッドプールです。Dispatchers.Defaultは計算処理向けのCPUスレッドプールです。Dispatchers.Mainはメインスレッド（Androidの場合UIスレッド）です。withContext(Dispatchers.IO) { }で処理するスレッドを切り替えられます。"},
    {title:"キャンセル・エラー処理・FlowとChannel",
     body:"コルーチンのキャンセルはCancellationExceptionを使います。suspend関数のキャンセルポイント（delay・yield等）で自動的に検出されます。isActive・ensureActive()を使うとCPUバウンドなループでもキャンセルに応答できます。Pythonのasyncio.CancelledError相当です。\n\nwithTimeout(ms) { }は指定時間で処理をキャンセルし、TimeoutCancellationExceptionをスローします。withTimeoutOrNull(ms) { }はnullを返すバリアントです。try/finally内の処理はキャンセル後も実行されるため、クリーンアップコードはfinallyに書けます。\n\nCoroutineExceptionHandlerをスコープに登録するとトップレベルのエラーをキャッチできます。supervisorScopeを使うと子コルーチンのエラーが他の子を巻き込まない独立したスコープを作れます。Pythonのasyncio.gather(return_exceptions=True)に近い動作です。",
     code:"import kotlinx.coroutines.*\n\nsuspend fun riskyOp(): String {\n    delay(2000)\n    return \"OK\"\n}\n\nfun main() = runBlocking {\n    // withTimeout\n    val result = try {\n        withTimeout(500) { riskyOp() }\n    } catch (e: TimeoutCancellationException) {\n        \"タイムアウト\"\n    }\n    println(result) // タイムアウト\n\n    // キャンセル可能なループ\n    val job = launch(Dispatchers.Default) {\n        var n = 0\n        while (isActive) {  // キャンセル確認\n            n++\n            if (n % 100000 == 0) println(\"n=\${n}\")\n        }\n    }\n    delay(200)\n    job.cancelAndJoin()\n    println(\"キャンセル完了\")\n\n    // supervisorScope で独立エラー処理\n    supervisorScope {\n        launch { throw RuntimeException(\"子1エラー\") }\n        launch { delay(100); println(\"子2は正常完了\") }\n    }\n}",
     afterCode:"Kotlinのコルーチンはスレッドより軽量で、同じスレッドで何万ものコルーチンを同時実行できます。1コルーチンのメモリ使用量は数KBで、1スレッドの数MB〜数十MBと比較して圧倒的に効率的です。"},
  ]},
];
