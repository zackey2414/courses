     answer:"fun main() {\n    val name: String? = null\n    println(name?.length)          // null（エラーなし）\n    println(name?.length ?: 0)    // 0（エルビス演算子）\n    name?.let { println(\"名前: \${it}\") }  // nullなので何も表示されない\n    val notNull: String? = \"Alice\"\n    notNull?.let { println(\"名前: \${it}\") }  // \"名前: Alice\"\n}"},

     answer:"fun toIntSafe(value: Any?): Int? = value as? Int\n\nfun main() {\n    println(toIntSafe(42))      // 42\n    println(toIntSafe(\"hello\")) // null\n    println(toIntSafe(3.14))    // null\n}"},

     code:"// String の拡張関数\nfun String.wordCount(): Int {\n    // 実装\n}\n// Int の拡張関数\nfun Int.times(action: () -> Unit) {\n    // 実装\n}",

     code:"import kotlinx.coroutines.*\n\nsuspend fun slowOperation(): String {\n    delay(2000)\n    return \"成功\"\n}\n\nsuspend fun safeOperation(): String {\n    // 500ms でタイムアウト\n}",
     answer:"import kotlinx.coroutines.*\n\nsuspend fun slowOperation(): String {\n    delay(2000)\n    return \"成功\"\n}\n\nsuspend fun safeOperation(): String = try {\n    withTimeout(500) { slowOperation() }\n} catch (e: TimeoutCancellationException) {\n    \"タイムアウト: デフォルト値\"\n}\n\nfun main() = runBlocking {\n    println(safeOperation()) // \"タイムアウト: デフォルト値\"\n}"},

const chapters = [
  {id:"ch1",num:1,title:"Kotlinとは・開発環境",est:"60分",
   goal:"KotlinがなぜJetBrainsによって作られたのか、JVM上でどう動くのかを理解する。開発環境を構築し、Hello Worldプログラムを1行ずつ理解して実行できるようになる。PythonとKotlinの根本的な違いを説明できるようになる。",
   sections:[
    {title:"Kotlinの誕生 ― なぜJetBrainsは新しい言語を作ったのか",
     body:"Kotlinは2011年にチェコのソフトウェア企業JetBrainsが開発を始め、2016年に正式リリース（1.0）された汎用プログラミング言語です。JetBrainsはIntelliJ IDEA、PyCharm、WebStormなど世界中の開発者が使うIDE（統合開発環境）を開発している会社で、自社製品のほとんどがJavaで書かれていました。しかしJavaには冗長な記述が多く、null安全の仕組みがなく、関数型プログラミングのサポートも弱いという課題がありました。JetBrainsは「Javaの資産を活かしながら、より安全で簡潔に書ける言語」を目指してKotlinを設計しました。\n\nPython開発者にとってKotlinが重要な理由は、Pythonの弱点をカバーする設計になっている点です。Pythonは動的型付け言語で実行時までエラーが見つかりにくいのに対し、Kotlinは静的型付けでコンパイル時にバグを検出します。PythonにはNone（null）チェックの仕組みがなく、AttributeError: 'NoneType' object has no attributeというエラーに悩まされますが、Kotlinはnull安全を言語仕様に組み込んでおり、この種のエラーをコンパイル段階で防ぎます。さらにKotlinはJVM上で動くためPythonよりも高速で、マルチスレッド処理も真に並列で実行できます（PythonにはGILという制約があります）。\n\n2017年にGoogleがAndroidの公式開発言語としてKotlinを採用したことで、Kotlinの知名度は爆発的に上がりました。現在ではAndroidアプリ開発だけでなく、サーバーサイド開発（Spring Boot、Ktor）、マルチプラットフォーム開発（Kotlin Multiplatform）、さらにはiOSアプリやWebフロントエンドまでKotlinでカバーできる範囲が広がっています。",
     code:"// Kotlin で書くとこんなに簡潔\n// Python の場合:\n//   class Point:\n//       def __init__(self, x, y):\n//           self.x = x\n//           self.y = y\n//       def __repr__(self):\n//           return f\"Point(x={self.x}, y={self.y})\"\n//       def __eq__(self, other): ...\n//       def __hash__(self): ...\n\n// Kotlin なら1行で全部揃う\ndata class Point(val x: Int, val y: Int)\n\nfun main() {\n    val p = Point(3, 4)\n    println(p)          // Point(x=3, y=4) ← toString自動生成\n    println(p == Point(3, 4)) // true ← equals自動生成\n}",
     afterCode:"この例のように、Pythonで何行も書いていたボイラープレートコード（__init__、__repr__、__eq__、__hash__）がKotlinではdata classの1行で済みます。こうした簡潔さと安全性がKotlinの大きな魅力です。"},
    {title:"JVMとは何か ― Kotlinのコードが動く仕組み",
     body:"Kotlinを理解するうえで避けて通れないのがJVM（Java Virtual Machine）です。Pythonではソースコードを書いたら python main.py とコマンドを打てばすぐに実行されます。これはPythonインタプリタがソースコードを逐次読み込んで実行しているからです。一方、Kotlinのコードは直接実行されるのではなく、まずコンパイラ（kotlinc）によって「バイトコード」という中間形式に変換され、そのバイトコードをJVMが実行します。この2段階のプロセスがKotlinの特徴です。\n\nJVMはもともとJava言語のために作られた仮想マシンですが、現在ではKotlin、Scala、Groovy、Clojureなど多くの言語がJVM上で動作します。JVMの最大の利点は「Write Once, Run Anywhere（一度書けばどこでも動く）」で、Windows、macOS、Linuxのどの環境でもJVMさえあれば同じバイトコードが動きます。また、JVMにはJIT（Just-In-Time）コンパイラが搭載されており、実行中に頻繁に使われるコードをネイティブマシンコードに変換して高速化します。このためKotlinはPythonのCPython実装よりも一般的に数十倍高速です。\n\nKotlinがJVM上で動くということは、Javaの膨大なライブラリ資産をそのまま利用できることを意味します。Javaで書かれたSpring Framework、Apache Commons、JUnit、Jacksonなどの定番ライブラリをKotlinコードから直接呼び出せます。逆にKotlinで書いたコードもJavaから呼び出せます。この「100%のJava相互運用性」がKotlinの普及を支える大きな要因です。なおKotlinにはJVM以外にもJavaScript（Kotlin/JS）やネイティブバイナリ（Kotlin/Native）をターゲットにするモードもありますが、本コースではJVMターゲットを中心に学びます。",
     code:"// Kotlin のコンパイルと実行の流れ\n//\n// 1. ソースコード（.kt ファイル）を書く\n//    Main.kt → fun main() { println(\"Hello\") }\n//\n// 2. kotlinc でコンパイル（バイトコードに変換）\n//    $ kotlinc Main.kt -include-runtime -d Main.jar\n//    → Main.jar（JVMバイトコードを含むJARファイル）が生成される\n//\n// 3. JVM で実行\n//    $ java -jar Main.jar\n//    → Hello と表示される\n//\n// Python との比較:\n//    Python: python main.py → インタプリタが直接実行\n//    Kotlin: kotlinc → .jar生成 → java -jar で実行\n\nfun main() {\n    // Kotlin から Java のクラスを直接使える\n    val now = java.time.LocalDateTime.now()\n    println(\"現在時刻: \${now}\")\n\n    // Java のコレクションも使える\n    val javaList = java.util.ArrayList<String>()\n    javaList.add(\"Kotlin\")\n    javaList.add(\"Java\")\n    println(\"Javaリスト: \${javaList}\")\n}",
     afterCode:"JARファイルとは「Java Archive」の略で、コンパイルされたバイトコードやリソースをまとめたZIP形式のアーカイブです。-include-runtimeオプションを付けると、Kotlinの標準ライブラリもJARに含まれるため、Kotlinランタイムがインストールされていない環境でも実行できます。"},
    {title:"開発環境のセットアップ ― 3つの方法",
     body:"Kotlinの開発環境を構築する方法は主に3つあります。最も手軽なのは「Kotlin Playground（play.kotlinlang.org）」で、ブラウザ上でKotlinコードを書いて即座に実行できます。何もインストールする必要がなく、本コースの序盤の演習にはこれで十分です。Pythonでいうと Google Colab や Jupyter Notebook のオンライン版に相当します。\n\n本格的に開発する場合は「IntelliJ IDEA」の利用を強く推奨します。JetBrainsが開発するIDEで、Community Edition（無料版）でもKotlinの開発に必要な機能がすべて揃っています。インストールは jetbrains.com/idea からダウンロードするだけです。IntelliJ IDEAにはKotlinプラグインがプリインストールされており、コード補完、エラー検出、リファクタリング、デバッガなどの機能がすぐに使えます。PythonでいうPyCharmの姉妹製品で、操作感も似ています。新規プロジェクトの作成は「File → New Project → Kotlin → JVM」を選ぶだけです。\n\nコマンドラインで開発したい場合は、kotlincコンパイラを単体でインストールできます。macOSなら brew install kotlin、Linuxなら SDKMAN（sdk install kotlin）でインストールできます。また実務ではビルドツール「Gradle」を使ってプロジェクトを管理するのが標準的です。GradleはPythonのpip + pyproject.toml + Makefileを合わせたような存在で、依存関係の管理、ビルド、テスト実行、パッケージングを一括して行います。build.gradle.kts ファイルでKotlinのDSL（ドメイン固有言語）を使ってビルド設定を記述します。",
     code:"// ===== 方法1: Kotlin Playground =====\n// play.kotlinlang.org にアクセスして以下を貼り付けて「Run」\n\nfun main() {\n    println(\"Kotlin Playground で実行中!\")\n}\n\n// ===== 方法2: コマンドライン =====\n// macOS:\n//   $ brew install kotlin\n//   $ kotlinc -version   ← バージョン確認\n//   $ kotlinc Main.kt -include-runtime -d Main.jar\n//   $ java -jar Main.jar\n//\n// REPL（対話モード）も使える:\n//   $ kotlinc    ← 対話シェル起動\n//   >>> println(\"Hello from REPL\")\n//   Hello from REPL\n\n// ===== 方法3: Gradle プロジェクト =====\n// build.gradle.kts の最小構成:\nplugins {\n    kotlin(\"jvm\") version \"2.0.21\"\n    application\n}\n\nrepositories { mavenCentral() }\n\napplication {\n    mainClass.set(\"MainKt\")  // Main.kt の main 関数\n}\n\n// 実行: $ ./gradlew run",
     afterCode:"IntelliJ IDEAを使う場合、Gradleの設定は自動的に行われます。初めてKotlinを触る方はまずKotlin Playgroundで試し、慣れてきたらIntelliJ IDEAに移行するのがおすすめです。本コースのコード例はすべてKotlin Playgroundでも動作します。"},
    {title:"Hello World ― 1行ずつ完全に理解する",
     body:"プログラミング言語を学ぶとき、最初に書くのは伝統的に「Hello, World!」です。Pythonでは print(\"Hello, World!\") の1行で済みますが、Kotlinでは fun main() { ... } という構造が必要です。これは冗長に見えるかもしれませんが、Kotlinが静的型付け言語であり、プログラムのエントリーポイント（開始地点）を明示的に定義する設計になっているためです。ここではKotlinのHello Worldプログラムを1行ずつ分解して完全に理解しましょう。\n\nfunはKotlinで「関数」を定義するキーワードです。Pythonのdefに相当します。mainは特別な名前で、プログラムの実行開始点を表します。Pythonでは if __name__ == \"__main__\": というイディオムでエントリーポイントを示しますが、Kotlinではmainという名前の関数が自動的にエントリーポイントになります。main関数の引数は省略可能ですが、コマンドライン引数を受け取りたい場合は fun main(args: Array<String>) と書きます。\n\nprintlnは「print line」の略で、引数を標準出力に表示して改行します。Pythonのprint()とほぼ同じ機能です。Kotlinにはprintln（改行あり）とprint（改行なし）の2つの出力関数があります。Pythonのprint(end=\"\")に相当するのがKotlinのprintです。波括弧 {} は関数の本体を囲みます。Pythonがインデントでブロックを表すのに対し、Kotlinは波括弧でブロックの開始と終了を明示します。セミコロンは行末に不要です（書いてもエラーにはなりませんが、Kotlinのスタイルガイドでは省略が推奨されています）。",
     code:"// ===== Kotlin の Hello World =====\n\n// fun    → 関数を定義するキーワード（Python の def に相当）\n// main   → プログラムのエントリーポイント（実行開始点）\n// ()     → 引数なし（args: Array<String> を入れれば引数を受け取れる）\n// { }    → 関数の本体（Python のインデントブロックに相当）\nfun main() {\n    // println → 標準出力に文字列を表示して改行する\n    // Python の print() と同じ\n    println(\"Hello, World!\")\n\n    // print → 改行なしで表示（Python の print(end=\"\") に相当）\n    print(\"Hello, \")\n    print(\"Kotlin!\")\n    println()  // 空の println で改行だけ\n\n    // 文字列テンプレート（Python の f-string に相当）\n    val language = \"Kotlin\"  // 変数宣言（次章で詳しく学ぶ）\n    println(\"I love \${language}!\")\n}\n\n// 出力結果:\n// Hello, World!\n// Hello, Kotlin!\n// I love Kotlin!",
     afterCode:"Pythonとの最大の違いは「コンパイルが必要」な点です。Kotlinのコードは書いたらまずコンパイラに通され、エラーがあればその時点で指摘されます。つまりプログラムを実行する前にスペルミスや型の間違いが分かるのです。Pythonでは実行して初めてエラーに気づくことが多いですが、Kotlinではその心配が大幅に減ります。"},
    {title:"PythonとKotlinの根本的な違い",
     body:"PythonからKotlinに移行する際に最も重要なのは、両言語の設計思想の違いを理解することです。Pythonは「動的型付け」言語で、変数に型を宣言する必要がなく、同じ変数にint、str、listなど任意の型の値を代入できます。一方Kotlinは「静的型付け」言語で、変数の型はコンパイル時に確定し、一度決まった型に別の型の値を代入するとコンパイルエラーになります。ただしKotlinには強力な「型推論」があるため、多くの場合は型を明示的に書かなくてもコンパイラが自動的に推論してくれます。\n\nもう一つの大きな違いはエラーの検出タイミングです。Pythonでは変数名のタイプミスや存在しないメソッドの呼び出しは、そのコードが実行されるまでエラーになりません。Kotlinではこうしたエラーがコンパイル時に検出されるため、プログラムを動かす前に問題を修正できます。大規模プロジェクトでは、この違いが開発効率とコードの信頼性に大きな差を生みます。\n\n実行速度にも大きな差があります。PythonのCPython実装はインタプリタ方式で逐次実行するため、計算処理が遅いことが知られています。KotlinはJVMのJITコンパイラによって実行時に最適化されるため、多くのベンチマークでPythonの10倍〜100倍高速です。ただしKotlinにはJVMの起動時間（数百ミリ秒〜数秒）というオーバーヘッドがあり、ちょっとしたスクリプトを素早く実行したい用途ではPythonのほうが向いています。",
     code:"// ===== Python と Kotlin の比較 =====\n\n// --- 動的型付け（Python）---\n// x = 42        ← 型宣言不要、int が入る\n// x = \"hello\"   ← 同じ変数に str を代入できる（エラーにならない）\n// x = [1, 2, 3] ← list も代入できる\n\n// --- 静的型付け（Kotlin）---\nfun main() {\n    val x = 42        // 型推論により Int と確定\n    // x = \"hello\"    // コンパイルエラー！ Int 型に String は代入できない\n    println(x)\n\n    // 型を明示的に書くこともできる\n    val name: String = \"Kotlin\"\n    val pi: Double = 3.14\n    println(\"\${name} \${pi}\")\n\n    // Python にはない「コンパイル時エラー」の例\n    // val result = name + pi  // エラー: String と Double は + できない\n    // Python なら \"Kotlin\" + 3.14 は TypeError（実行時エラー）\n    // Kotlin ならコンパイル時にエラーで止まる\n\n    // 正しくは文字列テンプレートを使う\n    val result = \"\${name} \${pi}\"\n    println(result)\n}",
     afterCode:"Pythonの柔軟さとKotlinの安全性はトレードオフの関係にあります。短いスクリプトやデータ分析にはPythonの動的型付けが便利ですが、何千行もの大規模プロジェクトや複数人での開発ではKotlinの静的型付けによるバグ防止効果が非常に大きくなります。このコースでは「Pythonではこう書くが、Kotlinではなぜこう書くのか」を常に意識しながら学んでいきます。"},
  ]},
  {id:"ch2",num:2,title:"変数・型・文字列テンプレート",est:"60分",
   goal:"val/varの違いとPythonの変数との根本的な違いを理解する。Kotlinの型システム（型推論・明示的型宣言・型変換）を使いこなし、文字列テンプレートを自在に活用できるようになる。Pythonの動的型付けと比較しながら、なぜ静的型付けが大規模開発で有利なのかを説明できるようになる。",
   sections:[
    {title:"val と var ― Pythonの変数とは根本的に違う",
     body:"Pythonでは変数は「名前を値に束縛する」仕組みで、x = 42 の後に x = \"hello\" と書いても何の問題もありません。同じ変数に異なる型の値を自由に入れ替えられます。しかしKotlinでは変数の宣言に val と var の2つのキーワードを使い分けます。val は「value（値）」の略で、一度代入したら二度と変更できない変数です。var は「variable（変数）」の略で、何度でも再代入できます。ただしどちらの場合も、最初に決まった型以外の値を代入することはできません。\n\nKotlinのベストプラクティスでは、デフォルトで val を使い、どうしても再代入が必要な場合にのみ var を使います。これはPythonの世界では馴染みが薄い考え方かもしれませんが、val を使うことで「この変数は途中で変わらない」という保証がコード上に明示されます。プログラムが複雑になるほど、この保証の価値は大きくなります。例えばチーム開発で他の人が書いたコードを読むとき、val で宣言されていれば「この値はここから先で変わることはない」と安心して読み進められます。\n\nPythonにも定数という概念はありますが（慣習的に大文字の変数名を使う：MAX_SIZE = 100）、実行時には再代入を止める仕組みがありません。Kotlinの val はコンパイラが再代入を禁止するため、誤って値を書き換えてしまうバグを完全に防げます。なお val は「変数が参照するオブジェクト」の再代入を禁止するだけで、オブジェクト自体の中身が変わることは止められません。例えば val list = mutableListOf(1, 2, 3) としたとき、list に別のリストを代入することはできませんが、list.add(4) でリストの中身を変更することはできます。",
     code:"fun main() {\n    // val: 再代入できない（Pythonには対応する仕組みがない）\n    val greeting = \"Hello\"  // 型推論で String と確定\n    // greeting = \"Hi\"      // コンパイルエラー！ val は再代入不可\n    println(greeting)\n\n    // var: 再代入できる（Pythonの通常の変数に近い）\n    var count = 0           // 型推論で Int と確定\n    count = 1               // OK: var なので再代入できる\n    count = 2               // OK\n    // count = \"three\"      // コンパイルエラー！ Int 型に String は入らない\n    println(count)\n\n    // Python との比較\n    // Python: x = 42; x = \"hello\"  ← OK（動的型付け）\n    // Kotlin: var x = 42; x = \"hello\" ← コンパイルエラー（静的型付け）\n\n    // val でもオブジェクトの中身は変えられる\n    val names = mutableListOf(\"Alice\", \"Bob\")\n    names.add(\"Carol\")      // OK: リストの中身を変更\n    // names = mutableListOf(\"Dave\")  // コンパイルエラー！ val は再代入不可\n    println(names)  // [Alice, Bob, Carol]\n}",
     afterCode:"目安として、Kotlinの実務コードでは変数の8割以上が val で宣言されます。ループカウンタやアキュムレータなど、本当に値が変化する場面でのみ var を使います。val をデフォルトにする習慣を最初から身につけましょう。"},
    {title:"型推論と明示的型宣言 ― Pythonの動的型付けとの違い",
     body:"Pythonは動的型付け言語なので、変数の型はプログラムの実行中に自由に変化します。一方Kotlinは静的型付け言語で、すべての変数・関数の戻り値の型がコンパイル時に確定します。しかしKotlinには強力な「型推論（Type Inference）」があるため、多くの場合は型を明示的に書く必要がありません。val name = \"Kotlin\" と書くだけで、コンパイラが右辺の値から name の型を String と推論してくれます。つまり型安全でありながら、Pythonに近い簡潔さで書けるのです。\n\n型を明示的に書くのは、型推論だけでは意図が伝わらない場合です。例えば val number = 42 は Int と推論されますが、大きな数を扱うために Long にしたい場合は val number: Long = 42 と書きます。また、変数の宣言時に値を代入しない場合は型の明示が必須です。val name: String と宣言しておき、後から name = \"Kotlin\" と代入できます（ただし val なので1回だけ）。関数の引数には必ず型を書く必要がありますが、戻り値の型は式本体関数（= を使う1行関数）では省略できます。\n\nKotlinの基本型は Int（32ビット整数）、Long（64ビット整数）、Double（64ビット浮動小数点）、Float（32ビット浮動小数点）、Boolean（真偽値）、Char（1文字）、String（文字列）です。Pythonでは int は任意精度（どれだけ大きな数でも扱える）ですが、Kotlinの Int は32ビットの範囲（-2,147,483,648 から 2,147,483,647）に制限されます。この範囲を超える場合は Long を使います。Kotlinではすべての型がオブジェクトとして扱われ、1.toString() のようにメソッドを呼び出せます。Pythonとのもう一つの違いは、Kotlinでは暗黙的な型変換が一切行われないことです。Pythonでは 1 + 1.5 が自動的に float の 2.5 になりますが、Kotlinでは Int と Double の直接加算はできず、明示的に toDouble() で変換する必要があります。",
     code:"fun main() {\n    // === 型推論（コンパイラが自動で型を判定）===\n    val name = \"Kotlin\"       // String と推論される\n    val version = 2           // Int と推論される\n    val pi = 3.14159          // Double と推論される\n    val isAwesome = true      // Boolean と推論される\n    val initial = 'K'         // Char と推論される\n\n    // === 明示的型宣言（意図を明確にしたい場合）===\n    val big: Long = 9_000_000_000L   // L サフィックスで Long リテラル\n    val ratio: Float = 0.5f          // f サフィックスで Float リテラル\n    val byte: Byte = 127             // 小さい範囲の整数\n\n    // === 型変換は必ず明示的に行う ===\n    val intVal = 42\n    val longVal: Long = intVal.toLong()     // Int → Long\n    val doubleVal: Double = intVal.toDouble() // Int → Double\n    val strVal: String = intVal.toString()   // Int → String\n    // val wrong: Long = intVal  // コンパイルエラー！暗黙変換なし\n\n    // Python との比較:\n    // Python: 1 + 1.5 → 2.5（暗黙変換）\n    // Kotlin: 1 + 1.5 → コンパイルOK（IntリテラルはDoubleに自動変換される）\n    // ただし変数の場合は明示変換が必要:\n    val a: Int = 1\n    val b: Double = 1.5\n    val sum = a.toDouble() + b  // 明示的に変換\n    println(\"合計: \${sum}\")\n\n    // 数値リテラルの _ 区切り（読みやすさのため）\n    val million = 1_000_000\n    val hexColor = 0xFF_AA_33\n    println(\"\${million} \${hexColor}\")\n}",
     afterCode:"Kotlinの型推論はとても賢く、ほとんどの場面で型を書く必要がありません。しかしチーム開発では意図を明確にするために型を書くこともあります。IntelliJ IDEAでは推論された型がエディタ上に薄い色で表示されるため、型を書かなくても何の型なのか一目で分かります。"},
    {title:"Kotlinの特殊な型 ― Any, Unit, Nothing",
     body:"Kotlinにはすべての型の頂点に位置する3つの特殊な型があります。Any はすべてのnon-null型の親型で、PythonのobjectやJavaのObjectに相当します。どんな型の値も Any 型の変数に代入できます。Pythonではすべてのオブジェクトが object を継承しているのと同じ関係です。Any には toString()、equals()、hashCode() の3つのメソッドが定義されており、すべてのKotlinオブジェクトでこれらのメソッドが使えます。\n\nUnit は「意味のある値を返さない」ことを表す型で、PythonのNoneやJavaのvoidに近い概念です。Kotlinの関数で戻り値の型を指定しない場合、暗黙的に Unit が返されます。Pythonでは return 文を省略すると None が返りますが、Kotlinでは Unit が返ります。Unit は型でもあり値でもあるという少し変わった性質を持っています。\n\nNothing は「この関数は正常に戻ることがない」ことを表す型です。常に例外をスローする関数や、無限ループの関数の戻り値型として使われます。例えば TODO(\"未実装\") という関数は Nothing を返す型として定義されています。Pythonには直接対応する概念がありませんが、typing.NoReturn に近いものです。Nothing は全ての型のサブタイプであるため、throw 式はどんな型の位置にも書くことができます。",
     code:"fun main() {\n    // === Any: すべての型の親 ===\n    val anything: Any = 42       // Int を Any に代入\n    val anything2: Any = \"hello\"  // String を Any に代入\n    println(anything.toString())  // すべてのオブジェクトで使える\n\n    // 型チェックとスマートキャスト\n    if (anything is Int) {\n        // このブロック内では anything は Int として使える\n        println(anything + 10)  // 52\n    }\n\n    // === Unit: 戻り値がない関数 ===\n    fun greet(name: String): Unit {\n        println(\"Hello, \${name}!\")\n        // return Unit  ← 省略可能\n    }\n    // 上と同じ（Unit は省略できる）\n    fun greet2(name: String) {\n        println(\"Hello, \${name}!\")\n    }\n    greet(\"Kotlin\")\n\n    // === Nothing: 正常に戻らない関数 ===\n    // fun fail(message: String): Nothing {\n    //     throw IllegalArgumentException(message)\n    // }\n    // val result: String = data ?: fail(\"データがない\")\n    // ↑ fail() は Nothing なのでどんな型の位置にも書ける\n\n    // TODO() は Nothing を返す便利関数\n    // fun notYetImplemented(): Int = TODO(\"あとで実装する\")\n}",
     afterCode:"Any? はnull許容型のルートで、Kotlin の型階層の最上位です。Any は non-null 型の親、Any? は null を含むすべての型の親です。この区別がKotlinのnull安全の基盤になっています（null安全は第5章で詳しく学びます）。"},
    {title:"文字列テンプレートとmultiline文字列",
     body:"Kotlinの文字列テンプレートはPythonのf-string（f\"Hello, {name}\"）に非常に似た機能です。Pythonでは文字列の前に f を付けて波括弧 {} の中に式を書きますが、Kotlinでは通常の文字列の中にドル記号 $ を使って変数を埋め込みます。単純な変数参照は $変数名 だけで済み、複雑な式の場合は \\${式} と波括弧で囲みます。Pythonの f-string と比べると、毎回 f を付ける必要がない分だけ手軽です。\n\nKotlinの文字列にはもう一つ「rawステリング（生文字列）」があります。トリプルクォート \"\"\"...\"\"\" で囲むと、エスケープシーケンス（\\n や \\t）が特殊文字として解釈されず、改行もそのまま文字列に含まれます。Pythonのトリプルクォート文字列と同じ概念ですが、Kotlinでは trimIndent() メソッドを組み合わせて使うのが一般的です。trimIndent() は各行の共通インデントを自動的に取り除いてくれるため、コード内のインデントと出力の見た目を独立して管理できます。Pythonの textwrap.dedent() に相当しますが、メソッドチェーンで使えるためより自然です。\n\nKotlinの String は Java の String と完全互換で、イミュータブル（変更不可）です。文字列を効率的に組み立てるには StringBuilder を使いますが、Kotlinには buildString { } というビルダー関数が用意されており、Pythonの ''.join(parts) のような使い方ができます。文字列の分割は split()、置換は replace()、検索は contains()、正規表現は Regex クラスを使います。Pythonの re モジュールに相当する機能がすべて標準ライブラリに含まれています。",
     code:"fun main() {\n    val name = \"Alice\"\n    val score = 88.5\n\n    // === 文字列テンプレート（Python の f-string に相当）===\n    // Python: f\"名前: {name}, スコア: {score}\"\n    println(\"名前: \${name}, スコア: \${score}\")\n\n    // 式を埋め込む（\\${} の中に任意の式を書ける）\n    println(\"判定: \${if (score >= 90) \"優\" else \"良\"}\")\n    println(\"大文字: \${name.uppercase()}\")\n    println(\"文字数: \${name.length}\")\n\n    // 単純な変数は \\$ だけでもOK（波括弧なし）\n    println(\"名前は \\$name です\")  // ← こう書くこともできる\n\n    // === Raw文字列（トリプルクォート）===\n    // Python のトリプルクォートと同じだが trimIndent() で整形\n    val json = \"\"\"\n        {\n            \"name\": \"\${name}\",\n            \"score\": \${score}\n        }\n    \"\"\".trimIndent()\n    println(json)\n\n    // trimMargin で | をマージンに使う\n    val sql = \"\"\"\n        |SELECT *\n        |FROM users\n        |WHERE name = '\${name}'\n    \"\"\".trimMargin()\n    println(sql)\n\n    // === buildString（効率的な文字列構築）===\n    // Python: ''.join([str(i) for i in range(1, 6)]) + \"!\"\n    val result = buildString {\n        for (i in 1..5) append(i)\n        append(\"!\")\n    }\n    println(result) // 12345!\n\n    // === 文字列操作メソッド ===\n    val sentence = \"Hello Kotlin World\"\n    println(sentence.split(\" \"))         // [Hello, Kotlin, World]\n    println(sentence.replace(\"World\", \"!\"))  // Hello Kotlin !\n    println(sentence.contains(\"Kotlin\"))     // true\n    println(sentence.startsWith(\"Hello\"))    // true\n}",
     afterCode:"Kotlinの文字列テンプレートは f を付け忘れるというPythonでありがちなミスが起こりません。Kotlinの文字列にはすべてテンプレート機能が組み込まれているためです。String.format() も使えますが、文字列テンプレートのほうが型安全で読みやすいため、現代のKotlinコードでは文字列テンプレートを優先します。"},
  ]},
  {id:"ch3",num:3,title:"制御構文・when式",est:"60分",
   goal:"if・when・for・whileの各制御構文を使いこなし、Pythonの制御構文との違いを理解する。特にKotlin独自の「式としてのif」「when式によるパターンマッチング」を活用して、簡潔で安全なコードが書けるようになる。範囲（Range）を使ったループやラベル付きbreakの使い方を習得する。",
   sections:[
    {title:"if式 ― Pythonのifとは決定的に違う点",
     body:"Pythonの if は「文（statement）」で、処理を分岐させるだけです。値を返したい場合は三項演算子 value = A if condition else B という特殊な構文を使います。一方Kotlinの if は「式（expression）」です。つまり if 自体が値を返すため、変数への代入や関数の戻り値として直接使えます。Kotlinには三項演算子（condition ? A : B）が存在しません。if式がその役割を果たすからです。\n\nif式が値を返すとき、各ブランチの最後の式がその値になります。単純な1行の場合はもちろん、複数行のブロックでも最後の式が返り値になります。ただし値として使う場合は必ず else ブランチが必要です。else がないと、条件が偽のときに返す値がないためコンパイルエラーになります。これはPythonの三項演算子で else を省略できないのと同じ理屈です。\n\nKotlinでは if/else の代わりに when 式を使うことも多いですが、単純な2択の分岐には if 式がシンプルで適しています。Pythonから来た方にとっては「if が値を返す」という概念が最初は違和感があるかもしれませんが、慣れると非常に便利です。変数を var で宣言してから if で分岐して代入するよりも、val に if 式の結果を直接代入するほうが安全で読みやすいコードになります。",
     code:"fun main() {\n    val score = 85\n\n    // === if 式で値を返す（Kotlinの特徴）===\n    // Python: label = \"合格\" if score >= 60 else \"不合格\"\n    // Kotlin:\n    val label = if (score >= 60) \"合格\" else \"不合格\"\n    println(label) // 合格\n\n    // === ブロックの場合、最後の式が値になる ===\n    val message = if (score >= 90) {\n        println(\"素晴らしい成績です\")  // 副作用（表示）\n        \"優秀\"                        // ← これが返り値\n    } else if (score >= 60) {\n        \"合格\"\n    } else {\n        \"要再試験\"\n    }\n    println(message) // 合格\n\n    // === Pythonとの比較: 条件の書き方 ===\n    val x = 42\n    // Python: if x > 0 and x < 100:\n    // Kotlin: if (x > 0 && x < 100)\n    // ※ Kotlin は条件を () で囲む必要がある\n    // ※ and/or ではなく &&/|| を使う\n    if (x > 0 && x < 100) {\n        println(\"x は 1〜99 の範囲\")\n    }\n\n    // === val + if式 vs var + if文 ===\n    // 良い書き方（val + if 式）\n    val result = if (x % 2 == 0) \"偶数\" else \"奇数\"\n\n    // 悪い書き方（var + if 文）\n    var result2 = \"\"\n    if (x % 2 == 0) result2 = \"偶数\" else result2 = \"奇数\"\n    // ↑ var を使うので意図せず後から変更されるリスクがある\n\n    println(\"\${x} は \${result}\")\n}",
     afterCode:"Kotlinには三項演算子（? :）がありません。if (cond) a else b がその役割を完全に果たすためです。Pythonの a if cond else b と書き順が違う（Kotlinは条件が先）ことに注意しましょう。"},
    {title:"when式 ― Pythonのmatch/caseよりも強力",
     body:"when式はKotlinで最もよく使われる制御構文の一つで、JavaのswitchやPythonのmatch...case（Python 3.10以降）に相当します。しかしKotlinのwhenはこれらよりもはるかに柔軟で、値の一致だけでなく、範囲チェック（in 1..10）、型チェック（is String）、複数値の一致（1, 2, 3 ->）、任意の条件式など、あらゆるパターンで分岐できます。もちろんif式と同様に値を返す「式」として使えます。\n\nwhen式には2つの書き方があります。1つ目は when(引数) { ... } の形式で、引数の値に対してマッチングを行います。Pythonの match subject: に対応します。2つ目は when { ... } のように引数なしで書く形式で、各ブランチに任意のBoolean式を書けます。こちらはif/else ifの連鎖をすっきり書くためのもので、Pythonには直接対応する構文がありません。\n\nwhenを式として使う場合（値を返す場合）は、すべてのケースを網羅する必要があります。enumやsealed classに対するwhenでは、全パターンを列挙すればelseが不要になります。逆にelseを書かないことで、将来新しいケースが追加されたときにコンパイルエラーで検出できるという大きな利点があります。これはPythonのmatch文にはない、Kotlinの型システムならではの安全機能です。",
     code:"fun main() {\n    // === when(引数) の形式 ===\n    val dayNumber = 3\n    val dayName = when (dayNumber) {\n        1 -> \"月曜日\"\n        2 -> \"火曜日\"\n        3 -> \"水曜日\"\n        4 -> \"木曜日\"\n        5 -> \"金曜日\"\n        6, 7 -> \"週末\"    // 複数値をカンマで列挙\n        else -> \"不正な値\"  // 式として使うなら else 必須\n    }\n    println(dayName) // 水曜日\n\n    // === 範囲チェック・型チェック ===\n    fun classify(value: Any): String = when (value) {\n        is String -> \"文字列: \${value.length}文字\"  // スマートキャスト\n        is Int -> when {\n            value < 0   -> \"負の整数\"\n            value == 0  -> \"ゼロ\"\n            value in 1..100 -> \"1〜100の整数\"\n            else -> \"大きな整数\"\n        }\n        is Boolean -> \"真偽値: \${value}\"\n        else -> \"その他の型: \${value::class.simpleName}\"\n    }\n    println(classify(\"Hello\"))  // 文字列: 5文字\n    println(classify(42))       // 1〜100の整数\n    println(classify(-5))       // 負の整数\n    println(classify(true))     // 真偽値: true\n\n    // === when（引数なし）= if/else if の代替 ===\n    val score = 75\n    val grade = when {\n        score >= 90 -> \"A（優秀）\"\n        score >= 80 -> \"B（良好）\"\n        score >= 70 -> \"C（普通）\"\n        score >= 60 -> \"D（可）\"\n        else        -> \"F（不可）\"\n    }\n    println(\"\${score}点 → \${grade}\") // 75点 → C（普通）\n\n    // === enum と when の組み合わせ ===\n    enum class Color { RED, GREEN, BLUE }\n    val color = Color.GREEN\n    val hex = when (color) {\n        Color.RED   -> \"#FF0000\"\n        Color.GREEN -> \"#00FF00\"\n        Color.BLUE  -> \"#0000FF\"\n        // else 不要！全パターンを網羅しているため\n    }\n    println(\"\${color} → \${hex}\")\n}",
     afterCode:"when式の強力な点は、Pythonのmatch文と異なり式として値を返せること、そしてenum/sealed classと組み合わせるとコンパイラが網羅性を検証してくれることです。新しいenumメンバーを追加したときにwhenの更新を忘れるとコンパイルエラーになるので、バグが実行時ではなくコンパイル時に見つかります。"},
    {title:"for文とRange ― Pythonのrangeとenumerateに対応",
     body:"KotlinのforループはPythonのforに概念的に似ており、コレクションやRangeの各要素を順番に処理します。構文は for (要素 in コレクション) { ... } です。Pythonとの大きな違いは2つあります。まずKotlinでは条件を括弧 () で囲む必要があること、そしてブロックを波括弧 {} で囲むことです（Pythonはコロンとインデント）。\n\nPythonの range(1, 11) に相当するのがKotlinの 1..10 です。ただしPythonのrangeは上端を含みませんが、Kotlinの .. は両端を含む点に注意してください。上端を含まないRangeが欲しい場合は 1 until 10 を使います。逆順のループには downTo を、ステップ幅の指定には step を使います。Pythonの range(10, 0, -2) はKotlinでは 10 downTo 1 step 2 と書きます。Pythonより英語的で読みやすいのが特徴です。\n\nインデックス付きのループにはPythonの enumerate() に相当する withIndex() を使います。Kotlinの分割宣言（destructuring declaration）により for ((index, value) in list.withIndex()) と書けます。2つのリストを同時にループするにはPythonの zip() と同じ名前の zip() が使えます。これらの機能はPythonと非常に似ているため、Python開発者にとっては馴染みやすいでしょう。",
     code:"fun main() {\n    // === Range（範囲）===\n    // Python: for i in range(1, 6):    → 1, 2, 3, 4, 5\n    // Kotlin: for (i in 1..5)          → 1, 2, 3, 4, 5（両端含む！）\n    print(\"1..5: \")\n    for (i in 1..5) print(\"\${i} \")\n    println() // 1 2 3 4 5\n\n    // Python: for i in range(1, 5):    → 1, 2, 3, 4\n    // Kotlin: for (i in 1 until 5)     → 1, 2, 3, 4（上端を含まない）\n    print(\"1 until 5: \")\n    for (i in 1 until 5) print(\"\${i} \")\n    println() // 1 2 3 4\n\n    // Python: for i in range(10, 0, -3):  → 10, 7, 4, 1\n    // Kotlin: for (i in 10 downTo 1 step 3)\n    print(\"downTo + step: \")\n    for (i in 10 downTo 1 step 3) print(\"\${i} \")\n    println() // 10 7 4 1\n\n    // === withIndex（Pythonの enumerate に相当）===\n    val fruits = listOf(\"りんご\", \"バナナ\", \"さくらんぼ\")\n    // Python: for i, fruit in enumerate(fruits):\n    for ((index, fruit) in fruits.withIndex()) {\n        println(\"\${index}: \${fruit}\")\n    }\n\n    // === zip（2つのリストを同時にループ）===\n    val names = listOf(\"Alice\", \"Bob\", \"Carol\")\n    val scores = listOf(90, 75, 88)\n    // Python: for name, score in zip(names, scores):\n    for ((name, score) in names.zip(scores)) {\n        println(\"\${name}: \${score}点\")\n    }\n\n    // === リストの直接ループ ===\n    // Python: for fruit in fruits:\n    for (fruit in fruits) {\n        println(\"果物: \${fruit}\")\n    }\n}",
     afterCode:"Kotlinの 1..5 は IntRange というオブジェクトを生成します。Range自体もコレクションの一種なので、toList() でリストに変換したり、contains() で値の包含チェックをしたりできます。5 in 1..10 という書き方でPythonの 5 in range(1, 11) と同じチェックができます。"},
    {title:"whileとラベル付きbreak/continue",
     body:"while文とdo...while文はPythonのwhileとほぼ同じ動作をします。while は条件が真である限りループを繰り返し、do...while は最低1回は実行してからループ条件をチェックします。Pythonには do...while に直接対応する構文がないため、Pythonでは while True: ... if not condition: break というパターンで代替しますが、Kotlinなら do { ... } while (condition) と直接書けます。\n\nbreakとcontinueもPythonと同じ概念ですが、Kotlinにはさらに「ラベル付きbreak/continue」という機能があります。ネストしたループで外側のループを直接抜けたい場合、Pythonではフラグ変数を使ったりbreakを連鎖させたりする必要がありますが、Kotlinではループにラベル（名前@）を付けて break@ラベル名 と書くだけで外側のループから抜けられます。これはコードの見通しを大幅に改善します。\n\nKotlinの標準ライブラリには repeat(n) { ... } という便利な関数もあります。これは「n回繰り返す」ためのシンタックスシュガーで、Pythonの for _ in range(n): に相当します。ラムダのパラメータとして0始まりのインデックスが渡されるため、回数と現在の反復回数の両方が分かります。forEach や forEachIndexed もラムダベースの反復で、コレクション操作のチェーンの中で自然に使えます。",
     code:"fun main() {\n    // === while（Python の while と同じ）===\n    var n = 5\n    while (n > 0) {\n        print(\"\${n} \")\n        n--\n    }\n    println() // 5 4 3 2 1\n\n    // === do...while（Python にはない構文）===\n    // 最低1回は実行される\n    var input: String\n    var attempt = 0\n    do {\n        input = if (attempt < 2) \"\" else \"valid\"\n        attempt++\n        println(\"試行 \${attempt}: input=\\\"\${input}\\\"\")\n    } while (input.isEmpty())\n    // Python で同等のコード:\n    // while True:\n    //     input = get_input()\n    //     if input: break\n\n    // === ラベル付き break ===\n    // Python でネストしたループを抜けるには:\n    //   found = False\n    //   for i in range(3):\n    //       for j in range(3):\n    //           if i == 1 and j == 1:\n    //               found = True; break\n    //       if found: break\n    //\n    // Kotlin なら1行で済む:\n    outer@ for (i in 0..2) {\n        for (j in 0..2) {\n            if (i == 1 && j == 1) break@outer  // 外側のループを直接抜ける\n            print(\"(\${i},\${j}) \")\n        }\n    }\n    println() // (0,0) (0,1) (0,2) (1,0)\n\n    // === ラベル付き continue ===\n    outer@ for (i in 1..3) {\n        for (j in 1..3) {\n            if (j == 2) continue@outer  // 外側ループの次の反復へ\n            print(\"\${i}-\${j} \")\n        }\n    }\n    println() // 1-1 2-1 3-1\n\n    // === repeat（Pythonの for _ in range(n) に相当）===\n    repeat(3) { index ->\n        println(\"繰り返し \${index + 1} 回目\")\n    }\n}",
     afterCode:"ラベル付きbreak/continueは便利ですが、多用するとコードの流れが追いにくくなります。ネストが深くなりすぎる場合は、内側のループを関数に切り出すほうが可読性が高くなります。また、forEachラムダの中ではbreakが使えませんが、return@forEach と書くとcontinueと同じ効果が得られます。"},
  ]},
  {id:"ch4",num:4,title:"関数・デフォルト引数・named引数",est:"40分",
   goal:"Kotlinの関数定義の様々な形式を習得し、デフォルト引数とnamed引数でAPIを設計できる。ラムダと高階関数の構文を使いこなし、スコープ関数（let・run・also・apply・with）の使い分けができるようになる。",
   sections:[
    {title:"関数定義とデフォルト・named引数",
     body:"Kotlinの関数はfunキーワードで定義します。戻り値の型は引数リストの後にコロンを付けて書きます。式本体（=）を使うと単一式の関数を一行で書けます。Pythonのdef f(x): return x*2 に対してKotlinでは fun f(x: Int) = x * 2 と書きます。\n\nデフォルト引数はJavaにはない機能で、Pythonと同様に引数のデフォルト値を定義できます。ただしKotlinではデフォルト引数を持つ引数の後ろにデフォルトなし引数を置くことができる点がPythonより柔軟です（Pythonはデフォルトなし引数は必ずデフォルト引数より前）。Named引数を使うと引数の順序に依存しない関数呼び出しができ、引数の意味が明確になります。\n\nKotlinの関数はオーバーロードに対応しており、同名の関数を引数の型や数が異なる形で複数定義できます。Pythonはデフォルト引数と*argsでこれを代替することが多いですが、Kotlinではオーバーロードのほうが型安全です。vararg（可変引数）はPythonの*argsに対応し、配列として受け取られます。",
     code:"// 基本的な関数定義\nfun add(a: Int, b: Int): Int = a + b\n\n// デフォルト引数\nfun createUser(\n    name: String,\n    age: Int = 0,\n    role: String = \"user\",\n    active: Boolean = true\n): String = \"\${name}(\${role}, age=\${age}, active=\${active})\"\n\nfun main() {\n    println(add(3, 4)) // 7\n\n    // Named 引数（順序不問）\n    println(createUser(\"Alice\"))\n    println(createUser(name = \"Bob\", role = \"admin\", age = 30))\n    println(createUser(\"Carol\", active = false))\n\n    // vararg（可変引数）\n    fun sum(vararg nums: Int) = nums.sum()\n    println(sum(1, 2, 3, 4, 5)) // 15\n    val arr = intArrayOf(10, 20, 30)\n    println(sum(*arr)) // スプレッド演算子で配列を展開\n}",
     afterCode:"@JvmOverloadsアノテーションをKotlin関数に付けると、Javaからデフォルト引数を持つ関数を呼び出すためのオーバーロードメソッドが自動生成されます。KotlinとJavaが混在するプロジェクトでは重要なアノテーションです。"},
    {title:"ラムダ・高階関数・スコープ関数",
     body:"Kotlinのラムダはブレース{}で囲み、引数とarrowを使って書きます。引数が1つの場合はitで参照できます。これはPythonのlambdaよりも柔軟で、複数文を含むブロックも書けます。\n\nKotlinの標準ライブラリにはlet・run・also・apply・withという5つのスコープ関数があります。いずれもオブジェクトを「それ」として特定のコンテキストで操作するためのものですが、参照方法（it vs this）と戻り値（レシーバーオブジェクト vs ラムダ結果）が異なります。Pythonにはこれに直接対応する構文はありませんが、withステートメントがwithに概念的に近いです。\n\nletはnull安全なブロック実行（?.let）に最もよく使われ、処理結果を返します。applyはオブジェクトの設定（ビルダーパターン）に使い、オブジェクト自身を返します。alsoはデバッグログやサイドエフェクトに使い、オブジェクトを返します。これらを使いこなすとKotlinのコードが宣言的で読みやすくなります。",
     code:"fun main() {\n    // ラムダ\n    val doubled = { x: Int -> x * 2 }\n    println(doubled(5)) // 10\n\n    val nums = listOf(1, 2, 3, 4, 5)\n    println(nums.filter { it % 2 == 0 }) // [2, 4]\n    println(nums.map { it * it })        // [1, 4, 9, 16, 25]\n\n    // スコープ関数\n    data class Config(var host: String = \"\", var port: Int = 0)\n\n    // apply: オブジェクト設定（this で参照、オブジェクトを返す）\n    val cfg = Config().apply {\n        host = \"localhost\"\n        port = 8080\n    }\n\n    // let: 変換処理（it で参照、ラムダ結果を返す）\n    val result = cfg.let { \"\${it.host}:\${it.port}\" }\n    println(result) // localhost:8080\n\n    // also: サイドエフェクト（it で参照、オブジェクトを返す）\n    val cfg2 = Config().also { println(\"Config作成: \${it}\") }\n}",
     afterCode:"スコープ関数の選択指針：変換→let、設定→apply、サイドエフェクト→also、thisとして使いたい→run/with。乱用すると可読性が下がるため、チームでスタイルガイドを共有することが重要です。"},
  ]},
  {id:"ch5",num:5,title:"Null安全・Elvis演算子",est:"40分",
   goal:"KotlinのNull安全システムの仕組みを理解し、?.・?:・!!・letを組み合わせてnullableな値を安全に扱えるようになる。JavaライブラリのNullに対処するパターンを習得し、NullPointerExceptionを防ぐコードが書けるようになる。",
   sections:[
    {title:"Nullable型とNull安全演算子",
     body:"KotlinはNullを型システムに組み込んでいます。String型はnullを許容しませんが、String?型はnullを許容します。この区別をコンパイラが強制するため、NullPointerException（Javaの「10億ドルの失敗」とも呼ばれる）をコンパイル時に大幅に防げます。Pythonには型ヒント（Optional[str]）がありますが、実行時にチェックはされません。\n\nNull安全演算子は4つあります。安全呼び出し演算子（?.）はnullなら処理をスキップしnullを返します。エルビス演算子（?:）はnullの場合のデフォルト値を指定します。非null宣言（!!）は「絶対nullでない」とプログラマが主張し、nullならNPEを発生させます。安全キャスト（as?）はキャスト失敗時にnullを返します。\n\n実務ではletと組み合わせたパターン（nullableValue?.let { ... }）が頻出です。nullでない場合だけブロックを実行し、ブロックの結果またはnullが返ります。Pythonでは if value is not None: の代わりにKotlinでは?.letを使うとより表現豊かです。",
     code:"fun main() {\n    val name: String? = null\n    val city: String? = \"Tokyo\"\n\n    // ?. 安全呼び出し\n    println(name?.length)        // null\n    println(city?.uppercase())   // TOKYO\n\n    // ?: エルビス演算子\n    println(name?.length ?: -1)  // -1\n    println(city?.length ?: 0)   // 5\n\n    // let（null でなければ実行）\n    name?.let { println(\"名前: \${it}\") }  // 実行されない\n    city?.let { println(\"都市: \${it}\") }  // 都市: Tokyo\n\n    // チェーン\n    data class User(val address: Address?)\n    data class Address(val city: String?)\n    val user: User? = User(Address(\"Osaka\"))\n    println(user?.address?.city ?: \"不明\") // Osaka\n}",
     afterCode:"!!（非null宣言）はNullPointerExceptionを明示的に許容するため、使用は最小限にしてください。テストコードやnullにならないことが文脈上明確な場所にのみ使用し、本番コードでは?.と?:で代替する設計を心がけましょう。"},
    {title:"JavaライブラリとPlatform Type",
     body:"KotlinからJavaライブラリを呼び出すとき、JavaメソッドがnullをreturnできるかKotlinはコンパイル時にわかりません。このためJavaのString型はKotlinではString!（Platform Type）と呼ばれ、nullable性が未知の状態になります。このままでは型安全性が失われます。\n\nJavaメソッドに@Nullable・@NotNullアノテーションが付いている場合はKotlinが正しく解釈します。アノテーションがない場合、KotlinコードでJavaの戻り値を受け取るときに明示的にString?として宣言するか、nullチェックを行うのが安全なパターンです。\n\nKotlinの標準ライブラリで提供されるcheckNotNull()・requireNotNull()はnullをアサーションし、失敗時にIllegalStateExceptionをスローします。Pythonのassertに相当しますが、本番環境でも動作することが保証されています。checkNotNull()はロジックエラー、requireNotNull()は引数の事前条件チェックに使い分けます。",
     code:"// Java ライブラリとの連携\nimport java.util.HashMap\n\nfun main() {\n    // Java の HashMap（Platform Type）\n    val javaMap = HashMap<String, String>()\n    javaMap[\"key\"] = \"value\"\n\n    // Java の戻り値は null の可能性がある\n    val value: String? = javaMap[\"key\"]   // 安全: nullable として扱う\n    val value2 = javaMap[\"missing\"] ?: \"\" // エルビスでデフォルト\n\n    // requireNotNull / checkNotNull\n    fun processName(name: String?) {\n        val validName = requireNotNull(name) { \"名前はnullにできません\" }\n        println(validName.uppercase())\n    }\n\n    try {\n        processName(null)\n    } catch (e: IllegalArgumentException) {\n        println(\"エラー: \${e.message}\")\n    }\n    processName(\"alice\") // ALICE\n}",
     afterCode:"Kotlin 1.8以降はJavaのOptional<T>との連携ヘルパーが強化されています。Java 8以降のAPIでOptionalを返すメソッドにはgetOrNull()拡張関数が使えます。"},
  ]},
  {id:"ch6",num:6,title:"クラス・data class・object",est:"40分",
   goal:"Kotlinのクラス定義・継承・インターフェースを実装できる。data classの自動生成機能を活用し、companion objectとobjectでシングルトンとファクトリーパターンを実装できるようになる。",
   sections:[
    {title:"クラス・継承・インターフェース",
     body:"Kotlinのクラスはデフォルトでfinal（継承不可）です。Javaでは全クラスが継承可能でfinalを付けて封じますが、Kotlinは逆にopenを付けることで継承を許可します。これは「意図しない継承による壊れやすいサブクラス問題」を防ぐ設計上の選択です。\n\nPrimaryコンストラクタはクラス名の後ろにカッコを使って書き、Secondaryコンストラクタは本体内にconstructorで追加します。initブロックで初期化処理を書けます。Pythonの__init__の役割をPrimaryコンストラクタとinitが分担する形です。\n\nKotlinのinterfaceはJava 8+のinterfaceと同様にデフォルト実装を持てます。抽象クラス（abstract class）と違い、interfaceはstateを持てません（バッキングフィールドを持たない）。多重インターフェース実装は可能で、Pythonの多重継承の代替として使われます。",
     code:"// 継承可能なクラス（open を付ける）\nopen class Animal(val name: String) {\n    open fun speak(): String = \"\${name}が鳴く\"\n    fun describe() = \"動物: \${name}\"\n}\n\nclass Dog(name: String, val breed: String) : Animal(name) {\n    override fun speak() = \"\${name}がワン！\"\n}\n\n// インターフェース（デフォルト実装あり）\ninterface Flyable {\n    val maxAltitude: Int get() = 1000\n    fun fly() = \"高度 \${maxAltitude}m を飛行中\"\n}\ninterface Swimmable {\n    fun swim() = \"泳いでいる\"\n}\n\nclass Duck(name: String) : Animal(name), Flyable, Swimmable {\n    override val maxAltitude = 500\n    override fun speak() = \"\${name}がガーガー！\"\n}\n\nfun main() {\n    val d = Duck(\"Donald\")\n    println(d.speak())    // Donald がガーガー！\n    println(d.fly())      // 高度 500m を飛行中\n    println(d.swim())     // 泳いでいる\n    println(d is Animal)  // true\n}",
     afterCode:"Kotlinのdata classはcomponent1()・component2()…を自動実装し、分割宣言（destructuring declaration）をサポートします。val (name, age) = userのように書けます。これはPythonのタプルアンパックに対応します。"},
    {title:"data class・sealed class・object",
     body:"data classはvalues objectパターンを表現するKotlinの特別なクラスです。equals・hashCode・toString・copy・componentN関数が自動生成され、ボイラープレートなしにイミュータブルなデータ型を定義できます。PythonのdataclassデコレーターまたはNamedTupleに相当し、コード量が劇的に減ります。\n\nsealed classは「閉じた継承ツリー」を表現します。sealed classのサブクラスは同じパッケージ内でのみ定義でき、whenでexhaustiveなパターンマッチングが保証されます。TypeScriptのunion型・Pythonの型制限に相当しますが、Kotlinのほうがコンパイラによる型安全が強力です。\n\nobjectキーワードは匿名クラスのインスタンス（object expression）またはシングルトン（object declaration）を作ります。companion objectはクラスに関連付けられたシングルトンで、Javaのstaticメンバーに対応します。Javaとの互換性のため@JvmStaticを付けると真のstaticメソッドになります。",
     code:"// data class\ndata class Point(val x: Double, val y: Double) {\n    fun distanceTo(other: Point) =\n        Math.sqrt((x - other.x).pow(2) + (y - other.y).pow(2))\n}\n\n// sealed class（代数的データ型）\nsealed class Shape {\n    data class Circle(val radius: Double) : Shape()\n    data class Rectangle(val w: Double, val h: Double) : Shape()\n    object Empty : Shape()\n}\n\nfun area(shape: Shape): Double = when (shape) {\n    is Shape.Circle    -> Math.PI * shape.radius * shape.radius\n    is Shape.Rectangle -> shape.w * shape.h\n    Shape.Empty        -> 0.0\n    // else 不要（exhaustive）\n}\n\n// companion object\nclass Database private constructor(val url: String) {\n    companion object {\n        fun connect(url: String) = Database(url)\n        const val DEFAULT_URL = \"jdbc:h2:mem:test\"\n    }\n}\n\nfun main() {\n    val db = Database.connect(Database.DEFAULT_URL)\n    val c  = Shape.Circle(5.0)\n    println(area(c).toInt()) // 78\n}",
     afterCode:"data classのcopyは浅いコピー（shallow copy）です。ネストしたmutableオブジェクトは参照が共有されます。完全なイミュータビリティを保つには、プロパティも不変コレクションやvalue objectにすることが重要です。"},
  ]},
  {id:"ch7",num:7,title:"コレクション・拡張関数",est:"45分",
   goal:"KotlinのMutable/Immutableコレクション（List・Set・Map）を正しく使い分け、標準ライブラリのコレクション操作関数を実務レベルで活用できる。拡張関数を自作してコードの表現力を高められるようになる。",
   sections:[
    {title:"コレクションとImmutability",
     body:"Kotlinはコレクションを「読み取り専用（read-only）」と「変更可能（mutable）」に明示的に分けています。listOf()・setOf()・mapOf()は読み取り専用、mutableListOf()・mutableSetOf()・mutableMapOf()は変更可能です。これはPythonのtupleとlistの区別に相当しますが、Kotlinのread-onlyはJavaのunmodifiableListと異なり「変更できないこと」はコンパイラが保証する点が重要です。\n\nKotlinのコレクション操作関数は豊富で、Pythonのリスト内包表記・itertools・functoolsに匹敵する表現力があります。filter・map・reduce・fold・groupBy・flatMap・zip・associate・partition・chunked・windowed等が標準ライブラリに含まれます。\n\nシーケンス（Sequence）は遅延評価版のコレクションです。asSequence()でListをSequenceに変換すると、チェーンされた操作が要素ごとに順番に処理され中間リストが生成されません。大量データ処理でメモリ効率が向上します。Pythonのgeneratorおよびitertoolsのlazyパイプラインに対応します。",
     code:"fun main() {\n    // 読み取り専用 vs 変更可能\n    val readOnly  = listOf(1, 2, 3)\n    val mutable   = mutableListOf(1, 2, 3)\n    mutable.add(4) // OK\n    // readOnly.add(4) // コンパイルエラー\n\n    // 豊富なコレクション操作\n    val nums = (1..10).toList()\n    val (evens, odds) = nums.partition { it % 2 == 0 }\n    println(evens) // [2, 4, 6, 8, 10]\n    println(odds)  // [1, 3, 5, 7, 9]\n\n    // groupBy\n    val words = listOf(\"apple\",\"ant\",\"bee\",\"banana\",\"cat\")\n    val grouped = words.groupBy { it.first() }\n    println(grouped) // {a=[apple,ant], b=[bee,banana], c=[cat]}\n\n    // Sequence（遅延評価）\n    val result = (1..1_000_000).asSequence()\n        .filter { it % 2 == 0 }\n        .map { it * it }\n        .take(5)\n        .toList()\n    println(result) // [4, 16, 36, 64, 100]\n}",
     afterCode:"LinkedList・ArrayDeque・PriorityQueueなどJavaコレクションもそのまま使えます。KotlinはArrayDequeを標準ライブラリに追加しており、スタック・キューとして使いやすいAPIが提供されています。"},
    {title:"拡張関数と演算子オーバーロード",
     body:"Kotlin最大の特徴の一つが「拡張関数（Extension Function）」です。既存のクラスを変更せずに新しいメソッドを追加できます。Pythonのモンキーパッチ（既存クラスへのメソッド追加）に似ていますが、Kotlinは型安全でツールのサポート（補完・リファクタリング）が受けられます。\n\n拡張関数はReceiver型のメンバー関数のように呼び出せますが、内部的には静的ディスパッチのため仮想ディスパッチにはなりません。つまりオーバーライドはできません。これを理解して拡張関数でユーティリティを設計することで、拡張性の高いAPIが作れます。\n\n演算子オーバーロードはoperatorキーワードを付けた関数で実装します。+はplus()、*はtimes()、[]はget()/set()に対応します。Pythonの__add__・__mul__等に相当しますが、Kotlinは定義できる演算子の種類が限られていて乱用を防ぐ設計です。",
     code:"// 拡張関数の定義\nfun String.isPalindrome(): Boolean {\n    val cleaned = this.lowercase().filter { it.isLetter() }\n    return cleaned == cleaned.reversed()\n}\n\nfun Int.factorial(): Long {\n    require(this >= 0) { \"負の数は不可\" }\n    return (1..this.toLong()).fold(1L) { acc, n -> acc * n }\n}\n\nfun <T> List<T>.second(): T {\n    if (size < 2) throw NoSuchElementException()\n    return this[1]\n}\n\n// 演算子オーバーロード\ndata class Vector(val x: Double, val y: Double) {\n    operator fun plus(other: Vector)  = Vector(x + other.x, y + other.y)\n    operator fun times(scalar: Double) = Vector(x * scalar, y * scalar)\n    val magnitude get() = Math.sqrt(x * x + y * y)\n}\n\nfun main() {\n    println(\"level\".isPalindrome())  // true\n    println(5.factorial())           // 120\n    val v1 = Vector(3.0, 4.0)\n    val v2 = v1 * 2.0\n    println(v2)             // Vector(x=6.0, y=8.0)\n    println(v2.magnitude)   // 10.0\n}",
     afterCode:"拡張関数の設計で注意すべき点：拡張関数はオーバーライドできないため、継承で解決すべき問題に拡張関数を使うと混乱が生じます。「型に機能を追加したいがサブクラスを作るほどではない」ユーティリティに最適です。"},
  ]},
  {id:"ch8",num:8,title:"Coroutines入門",est:"45分",
   goal:"kotlinx.coroutinesの基本的な使い方を理解し、launch・async・await・suspendを使った非同期コードを書ける。CoroutineScopeとDispatchers.IOを使ってI/O処理を効率化し、キャンセルとエラー処理が実装できるようになる。",
   sections:[
    {title:"コルーチンの基本とsuspend関数",
     body:"コルーチンは「中断可能な計算」の仕組みで、スレッドをブロックせずに非同期処理を行えます。Pythonのasync/awaitと概念は同じですが、Kotlinのコルーチンはより柔軟なディスパッチャシステムと構造化された同時実行（Structured Concurrency）を提供します。\n\nsuspend関数はコルーチン内でのみ呼び出せる中断可能な関数です。Pythonのasync defに対応します。通常のコードから起動するにはrunBlockingまたはCoroutineScopeが必要です。delay()は非ブロッキングなスリープで、Thread.sleep()と違ってコルーチンの中断ポイントになりスレッドを解放します。\n\nlaunchはFireAndForget型のコルーチンを起動しJobを返します。asyncは結果を返すコルーチンを起動しDeferred<T>を返します。await()でDeferredから結果を取り出します。Pythonのasyncio.createTask()・asyncio.gather()に相当します。構造化された同時実行により、スコープがキャンセルされると子コルーチンも自動的にキャンセルされます。",
     code:"import kotlinx.coroutines.*\n\n// suspend 関数（非同期I/Oをシミュレート）\nsuspend fun fetchUser(id: Int): String {\n    delay(100)  // 非ブロッキングスリープ\n    return \"User-\${id}\"\n}\n\nfun main() = runBlocking {\n    // launch: 結果不要な並行処理\n    val job = launch {\n        repeat(3) { i ->\n            println(\"処理 \${i}\")\n            delay(100)\n        }\n    }\n\n    // async: 結果を返す並行処理\n    val d1 = async { fetchUser(1) }\n    val d2 = async { fetchUser(2) }\n    println(\"\${d1.await()} と \${d2.await()}\")  // 並列実行\n\n    job.join()  // job の完了を待つ\n    println(\"全完了\")\n}",
     afterCode:"Dispatchers.IOはI/O処理（ネットワーク・ファイル）向けのスレッドプールです。Dispatchers.Defaultは計算処理向けのCPUスレッドプールです。Dispatchers.Mainはメインスレッド（Androidの場合UIスレッド）です。withContext(Dispatchers.IO) { }で処理するスレッドを切り替えられます。"},
    {title:"キャンセル・エラー処理・FlowとChannel",
     body:"コルーチンのキャンセルはCancellationExceptionを使います。suspend関数のキャンセルポイント（delay・yield等）で自動的に検出されます。isActive・ensureActive()を使うとCPUバウンドなループでもキャンセルに応答できます。Pythonのasyncio.CancelledError相当です。\n\nwithTimeout(ms) { }は指定時間で処理をキャンセルし、TimeoutCancellationExceptionをスローします。withTimeoutOrNull(ms) { }はnullを返すバリアントです。try/finally内の処理はキャンセル後も実行されるため、クリーンアップコードはfinallyに書けます。\n\nCoroutineExceptionHandlerをスコープに登録するとトップレベルのエラーをキャッチできます。supervisorScopeを使うと子コルーチンのエラーが他の子を巻き込まない独立したスコープを作れます。Pythonのasyncio.gather(return_exceptions=True)に近い動作です。",
     code:"import kotlinx.coroutines.*\n\nsuspend fun riskyOp(): String {\n    delay(2000)\n    return \"OK\"\n}\n\nfun main() = runBlocking {\n    // withTimeout\n    val result = try {\n        withTimeout(500) { riskyOp() }\n    } catch (e: TimeoutCancellationException) {\n        \"タイムアウト\"\n    }\n    println(result) // タイムアウト\n\n    // キャンセル可能なループ\n    val job = launch(Dispatchers.Default) {\n        var n = 0\n        while (isActive) {  // キャンセル確認\n            n++\n            if (n % 100000 == 0) println(\"n=\${n}\")\n        }\n    }\n    delay(200)\n    job.cancelAndJoin()\n    println(\"キャンセル完了\")\n\n    // supervisorScope で独立エラー処理\n    supervisorScope {\n        launch { throw RuntimeException(\"子1エラー\") }\n        launch { delay(100); println(\"子2は正常完了\") }\n    }\n}",
     afterCode:"Kotlinのコルーチンはスレッドより軽量で、同じスレッドで何万ものコルーチンを同時実行できます。1コルーチンのメモリ使用量は数KBで、1スレッドの数MB〜数十MBと比較して圧倒的に効率的です。"},
  ]},
];
