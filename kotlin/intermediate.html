const chapters = [
  {
    id:"ch1", title:"Coroutines深化", est:"60分",
    goal:"CoroutineScope・CoroutineContext・Dispatcherの役割を理解し、structured concurrencyとwithContextを使って安全な非同期処理を設計できる。",
    sections:[
      {
        title:"CoroutineScope と structured concurrency",
        body:`KotlinのCoroutineは「スコープ」に紐づいて動作します。GlobalScopeは実践では使うべきではなく、代わりにCoroutineScopeを明示的に作成し、そのライフサイクルをアプリケーションのコンポーネントと一致させるのが原則です。これをstructured concurrency（構造化された並行性）と呼びます。

structured concurrencyの恩恵は、親スコープがキャンセルされると子コルーチンも自動でキャンセルされ、メモリリークやゾンビスレッドが生まれにくくなる点にあります。Pythonのasyncio.gatherにも似た概念ですが、Kotlinではキャンセルが言語レベルで保証されます。`,
        table: "dispatchers",
        afterTable:"Dispatcherの選択はパフォーマンスに直結します。CPU集約処理にDispatchers.IOを使うとスレッド数が過剰になり、逆にI/O処理にDispatchers.Defaultを使うとスレッドが枯渇します。withContextで必要な場面だけDispatcherを切り替えるのが実践的なパターンです。",
        code:`import kotlinx.coroutines.*

// 良い例：スコープを自分で管理
class MyService : CoroutineScope by CoroutineScope(Dispatchers.Default) {
    fun start() {
        launch { // このスコープに紐づく
            delay(1000)
            println("done")
        }
    }
    fun stop() = cancel() // 全子コルーチンをキャンセル
}

// withContextでDispatcherを切り替える
suspend fun readFile(path: String): String = withContext(Dispatchers.IO) {
    java.io.File(path).readText()
}`,
        afterCode:"withContextはsuspend関数内で安全にDispatcherを切り替えます。launchやasyncと異なり、新しいコルーチンを生成せず現在のコルーチンのコンテキストだけを変えます。この違いを意識するとコードが読みやすくなります。"
      },
      {
        title:"Flow 基礎と Channel",
        body:`Flowはコルーチンベースの非同期ストリームです。Javaのストリームと似ていますが、非同期・サスペンド可能な点が大きく異なります。flow { }ブロックで値を生成し、collectで消費します。この「cold」な性質から、collectが呼ばれるたびに最初から実行されます。

Channelはコルーチン間のデータ受け渡しに使うキューです。送信側はsend()、受信側はreceive()を使います。FlowはChannelより高水準なAPIですが、双方向通信や複数の送信元が必要な場面ではChannelが適しています。`,
        code:`import kotlinx.coroutines.*
import kotlinx.coroutines.flow.*
import kotlinx.coroutines.channels.*

// Flow: cold stream
fun numbers() = flow {
    for (i in 1..3) {
        delay(100)
        emit(i)
    }
}

// Channel: coroutine間の通信
fun main() = runBlocking {
    // Flow
    numbers().collect { println("flow: $it") }

    // Channel
    val ch = Channel<Int>()
    launch { for (i in 1..3) ch.send(i); ch.close() }

        afterTable:"iOS向けには通常Kotlin/Nativeがコンパイルに使われます。iOSのAPIにはObjective-Cのinteropを通じてアクセスでき、SwiftUIアプリのSharedモジュールとして組み込めます。ただしKotlin/Nativeのコンパイルは時間がかかるため、開発中はJVM/Android向けの確認を先行させると効率的です。",
        code:`// commonMain/src/Platform.kt
expect fun getPlatformName(): String
expect fun currentTimeMillis(): Long

// commonMain/src/Greeting.kt（共有ロジック）
class Greeting {
    fun greet(): String = "Hello from \${getPlatformName()}!"
    fun timestamp(): Long = currentTimeMillis()
}

// androidMain/src/Platform.kt
actual fun getPlatformName(): String = "Android \${android.os.Build.VERSION.SDK_INT}"
actual fun currentTimeMillis(): Long = System.currentTimeMillis()

// iosMain/src/Platform.kt
actual fun getPlatformName(): String = UIDevice.currentDevice.systemName()
actual fun currentTimeMillis(): Long = NSDate().timeIntervalSince1970.toLong() * 1000`,
        afterCode:"commonMainに置けるのはKotlin標準ライブラリとKotlin Multiplatform対応のライブラリのみです。kotlinx-coroutines・kotlinx-serialization・Ktor clientなどは対応しています。プラットフォーム固有SDKはandroidMain等の各ソースセットに置きます。"

      {
        title:"共有ロジックの設計方針",
        body:`KMMで共有すべきは「ビジネスロジック」であり、UIは各プラットフォームのネイティブ技術（Android: Jetpack Compose、iOS: SwiftUI）で書くのが推奨されます。ネットワーク層・データモデル・バリデーション・キャッシュロジックをcommonMainに集中させることで、重複コードを大幅に削減できます。

アーキテクチャとしてはClean Architecture（Repository → UseCase → ViewModel相当）をcommonMainに配置し、UI層のみプラットフォーム分岐させるパターンが普及しています。ViewModelに相当するものはKMMではStateFlowを返すクラスとして実装し、Android側ではそのままLifecycle-aware collectorsで購読、iOS側ではObjective-Cのインターフェース経由でSwiftから使います。`,
        code:`// commonMain: Repository + UseCase
interface UserRepository {
    suspend fun getUsers(): List<User>
}

class GetUsersUseCase(private val repo: UserRepository) {
    suspend operator fun invoke(): List<User> = repo.getUsers()
}

// commonMain: 共有ViewModel相当
class UserViewModel(private val useCase: GetUsersUseCase) {
    private val _state = MutableStateFlow<List<User>>(emptyList())
    val state: StateFlow<List<User>> = _state.asStateFlow()

    fun load() {
        CoroutineScope(Dispatchers.Default).launch {
            _state.value = useCase()
        }
    }
}`,

function DataTable({ data }) {
  if (!data) return null;
  return React.createElement('div', { style:{ overflowX:'auto', margin:'16px 0' } },
    React.createElement('table', { style:{ width:'100%', borderCollapse:'collapse', fontSize:14 } },
      React.createElement('thead', null,
        React.createElement('tr', null,
          data.h.map((h,i) => React.createElement('th', { key:i, style:{ background:'#ede9fe', color:'#4c1d95', padding:'8px 12px', textAlign:'left', border:'1px solid #ddd6fe', fontWeight:700 } }, h))
        )
      ),
      React.createElement('tbody', null,
        data.r.map((row,i) => React.createElement('tr', { key:i, style:{ background: i%2===0 ? '#faf5ff':'#f5f3ff' } },
          row.map((cell,j) => React.createElement('td', { key:j, style:{ padding:'7px 12px', border:'1px solid #ede9fe', fontSize:13, lineHeight:1.5 } }, cell))
        ))
      )
    ),
    data.cap && React.createElement('p', { style:{ textAlign:'right', fontSize:11, color:'#7c3aed', marginTop:4 } }, data.cap)
  );
}

function Code({ code }) {
  const [copied, setCopied] = useState(false);
  function copy() {
    navigator.clipboard.writeText(code).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1500); });
  }
  return React.createElement('div', { style:{ position:'relative', margin:'12px 0' } },
    React.createElement('button', {
      onClick: copy,
      style:{ position:'absolute', top:8, right:8, zIndex:2, background: copied ? '#7c3aed':'#4c1d95', color:'#fff', border:'none', borderRadius:6, padding:'3px 10px', fontSize:11, cursor:'pointer' }
    }, copied ? 'Copied!' : 'Copy'),
    React.createElement('pre', {
      style:{ background:'#1e1b4b', color:'#e0e7ff', padding:'16px 16px 16px 16px', borderRadius:10, overflowX:'auto', fontFamily:"'JetBrains Mono', monospace", fontSize:13, lineHeight:1.7, margin:0 }
    }, React.createElement('code', null, code))
  );
}

function Exercise({ ex, chId }) {
  const [open, setOpen] = useState(false);
  const stars = '⭐'.repeat(ex.diff);
  return React.createElement('div', { style:{ border:'1px solid #ddd6fe', borderRadius:10, marginBottom:12, overflow:'hidden' } },
    React.createElement('div', { style:{ background:'#f5f3ff', padding:'12px 16px', fontWeight:700, fontSize:14, color:'#4c1d95' } },
      stars + ' ' + ex.q
    ),
    ex.code && React.createElement(Code, { code: ex.code }),
    React.createElement('button', {
      onClick: () => setOpen(o => !o),
      style:{ width:'100%', background: open ? '#7c3aed':'#ede9fe', color: open ? '#fff':'#4c1d95', border:'none', padding:'8px', cursor:'pointer', fontWeight:700, fontSize:13 }
    }, open ? '▲ 回答を閉じる' : '▼ 回答を見る'),
    open && React.createElement(Code, { code: ex.answer })

}

    },

}
