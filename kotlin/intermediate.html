     answer:"class Tag(val name: String, val attrs: Map<String,String> = emptyMap()) {\n    val children = mutableListOf<Any>()\n    operator fun String.unaryPlus() { children.add(this) }\n    fun render(sb: StringBuilder, indent: String = \"\") {\n        val attrStr = attrs.entries.joinToString(\" \") { \" \${it.key}=\\\"\${it.value}\\\"\" }\n        sb.append(\"\${indent}<\${name}\${attrStr}>\\n\")\n        children.forEach { when(it) {\n            is String -> sb.append(\"\${indent}  \${it}\\n\")\n            is Tag    -> it.render(sb, \"\${indent}  \")\n        }}\n        sb.append(\"\${indent}</\${name}>\\n\")\n    }\n}\nfun tag(name: String, attrs: Map<String,String> = emptyMap(), block: Tag.() -> Unit): Tag =\n    Tag(name, attrs).apply(block)\nfun html(block: Tag.() -> Unit) = buildString { tag(\"html\", block = block).render(this) }\nfun Tag.body(block: Tag.() -> Unit) { children.add(tag(\"body\", block = block)) }\nfun Tag.h1(block: Tag.() -> Unit) { children.add(tag(\"h1\", block = block)) }\nfun Tag.p(block: Tag.() -> Unit)  { children.add(tag(\"p\", block = block)) }\nfun Tag.div(className: String=\"\", block: Tag.() -> Unit) {\n    children.add(tag(\"div\", if (className.isNotEmpty()) mapOf(\"class\" to className) else emptyMap(), block))\n}"},

    {diff:2,q:"Arrow-ktのEitherを使って、バリデーションエラーを型安全に処理するコードを書いてください。",
     code:"import arrow.core.*\n\ndata class User(val name: String, val age: Int)\n\nfun validateName(name: String): Either<String, String> {\n    // 空なら Left(\"名前は必須\")\n}\nfun validateAge(age: Int): Either<String, Int> {\n    // 0未満なら Left(\"年齢エラー\")\n}",
     answer:"import arrow.core.*\n\ndata class User(val name: String, val age: Int)\n\nfun validateName(name: String): Either<String, String> =\n    if (name.isBlank()) \"名前は必須\".left() else name.right()\n\nfun validateAge(age: Int): Either<String, Int> =\n    if (age < 0) \"年齢は0以上\".left() else age.right()\n\nfun createUser(name: String, age: Int): Either<String, User> =\n    validateName(name).flatMap { n ->\n        validateAge(age).map { a -> User(n, a) }\n    }\n\nfun main() {\n    println(createUser(\"Alice\", 30)) // Right(User(name=Alice, age=30))\n    println(createUser(\"\", 30))     // Left(名前は必須)\n    println(createUser(\"Bob\", -1))  // Left(年齢は0以上)\n}"},

const chapters = [
  {id:"ch1",num:1,title:"Ktor WebサーバーAPI構築",est:"65分",
   goal:"Ktorをセットアップし、JSONを返すRESTful APIエンドポイントを設計・実装できる。ルーティング・コンテントネゴシエーション・バリデーション・認証プラグインを組み合わせた実務レベルのサーバーが書けるようになる。",
   sections:[
    {title:"Ktor プロジェクトのセットアップとルーティング",
     body:"KtorはJetBrains製のKotlin用非同期Webフレームワークです。PythonのFastAPIに相当するポジションで、コルーチンベースの非ブロッキングI/OとDSLによる宣言的なルーティングが特徴です。Spring Bootより設定が少なく、小〜中規模のAPIサーバーに向いています。\n\nKtorのルーティングはroutingブロック内にget・post・put・delete等のDSLで定義します。call.parametersでパスパラメータ、call.receiveで本文をデシリアライズします。ContentNegotiationプラグインを追加するとJSON（kotlinx.serialization）の自動変換が有効になります。\n\nPythonのFastAPIがPydanticでリクエスト・レスポンスのバリデーションを行うように、KtorではRequestValidationプラグインまたは手動でrequire/checkNotNullを使ってバリデーションします。Ktorの設計はプラグインの組み合わせで機能を追加していく拡張性重視のアーキテクチャです。",
     code:"// Application.kt\nimport io.ktor.server.application.*\nimport io.ktor.server.engine.*\nimport io.ktor.server.netty.*\nimport io.ktor.server.plugins.contentnegotiation.*\nimport io.ktor.serialization.kotlinx.json.*\nimport io.ktor.server.routing.*\nimport io.ktor.server.request.*\nimport io.ktor.server.response.*\nimport io.ktor.http.*\nimport kotlinx.serialization.Serializable\n\n@Serializable\ndata class User(val id: Int, val name: String, val email: String)\n\nfun main() {\n    embeddedServer(Netty, port = 8080) {\n        install(ContentNegotiation) { json() }\n        routing { configureUserRoutes() }\n    }.start(wait = true)\n}\n\nfun Route.configureUserRoutes() {\n    val users = mutableListOf(User(1,\"Alice\",\"a@ex.com\"))\n    route(\"/users\") {\n        get { call.respond(users) }\n        get(\"/{id}\") {\n            val id = call.parameters[\"id\"]?.toIntOrNull()\n                ?: return@get call.respond(HttpStatusCode.BadRequest)\n            val user = users.find { it.id == id }\n                ?: return@get call.respond(HttpStatusCode.NotFound)\n            call.respond(user)\n        }\n        post {\n            val user = call.receive<User>()\n            users.add(user)\n            call.respond(HttpStatusCode.Created, user)\n        }\n    }\n}",
     afterCode:"KtorはembeddedServer（直接起動）とcreateApplication（テスト用）の2つの起動方法があります。テストではtestApplication { }ブロックを使うことでHTTPクライアントを使ったエンドツーエンドテストをJVMだけで実行できます。"},
    {title:"ミドルウェア・認証・エラーハンドリング",
     body:"Ktorのミドルウェアは「プラグイン」として提供されます。install(CallLogging)でリクエストログ、install(CORS)でCORS設定、install(RateLimit)でレート制限が追加できます。PythonのFastAPIのmiddlewareデコレーターに近いですが、KtorはDSLで設定を構造化できます。\n\n認証はinstall(Authentication)で設定し、対応するrouting{authenticate(\"name\") { ... }}で保護します。JWT認証はktor-server-auth-jwtライブラリで実装でき、JWTのバリデーション・クレーム取得が設定ベースで書けます。\n\nStatusPagesプラグインを使うと例外をHTTPレスポンスにマッピングできます。Pythonのexception_handlerデコレーターに相当し、カスタム例外クラスごとにstatus codeとレスポンスボディを定義します。これを使うことでサービス層でビジネスエラー例外をスローし、ルーティング層では例外を捕捉しない設計が実現できます。",
     code:"fun Application.configurePlugins() {\n    install(CallLogging) {\n        level = Level.INFO\n        filter { call -> call.request.path().startsWith(\"/api\") }\n    }\n    install(CORS) {\n        allowHost(\"localhost:3000\")\n        allowHeader(HttpHeaders.ContentType)\n        allowHeader(HttpHeaders.Authorization)\n        allowMethod(HttpMethod.Put)\n        allowMethod(HttpMethod.Delete)\n    }\n    install(StatusPages) {\n        exception<NotFoundException> { call, cause ->\n            call.respond(HttpStatusCode.NotFound, mapOf(\"error\" to cause.message))\n        }\n        exception<IllegalArgumentException> { call, cause ->\n            call.respond(HttpStatusCode.BadRequest, mapOf(\"error\" to cause.message))\n        }\n        exception<Throwable> { call, cause ->\n            call.application.log.error(\"Unhandled error\", cause)\n            call.respond(HttpStatusCode.InternalServerError, mapOf(\"error\" to \"Internal error\"))\n        }\n    }\n}\nclass NotFoundException(msg: String) : RuntimeException(msg)",
     afterCode:"本番KtorアプリケーションではKoin・HiltなどのDIコンテナを使って依存関係を管理します。Koin-ktorプラグインはinstall(Koin)でKtor組み込みができ、call.inject<UserService>()のように依存を取得できます。"},
  ]},
  {id:"ch2",num:2,title:"Exposed ORMとデータベース操作",est:"60分",
   goal:"Exposed DSLとDAOスタイルの両方を使ってデータベース操作を実装できる。マイグレーション・トランザクション・リレーションを正しく扱い、コネクションプールの設定とパフォーマンスチューニングができるようになる。",
   sections:[
    {title:"Exposed DSL と Table定義",
     body:"ExposedはJetBrains製のKotlin向けORMフレームワークです。PythonのSQLAlchemy CoreとORM両方を提供するのと同様、ExposedもDSL（SQLライク）スタイルとDAO（Entityベース）スタイルの2種類のAPIがあります。\n\nDSLスタイルはSQL文に近い記述でクエリを書きます。Table objectでスキーマを定義し、insertAndGetId・select・update・deleteで操作します。型安全なカラム参照により、タイプミスをコンパイル時に検出できます。PythonのSQLAlchemy Coreのtable.c.columnに相当します。\n\nDAOスタイルはEntityクラスで各行を表現し、オブジェクト指向的に操作します。Repositoryパターンと組み合わせるとサービス層からDBの詳細を隠蔽できます。SchemaUtils.createMissing()でテーブルの自動作成、SchemaUtils.drop()で削除が可能です。プロダクション環境では代わりにFlywayやLiquibaseを使ったマイグレーション管理が推奨されます。",
     code:"import org.jetbrains.exposed.sql.*\nimport org.jetbrains.exposed.sql.transactions.*\n\n// テーブル定義（DSLスタイル）\nobject Users : Table(\"users\") {\n    val id    = integer(\"id\").autoIncrement()\n    val name  = varchar(\"name\", 255)\n    val email = varchar(\"email\", 255).uniqueIndex()\n    val createdAt = long(\"created_at\").default(System.currentTimeMillis())\n    override val primaryKey = PrimaryKey(id)\n}\n\nfun main() {\n    Database.connect(\n        url      = \"jdbc:postgresql://localhost/mydb\",\n        driver   = \"org.postgresql.Driver\",\n        user     = \"postgres\",\n        password = \"secret\"\n    )\n    transaction {\n        SchemaUtils.create(Users)\n        val newId = Users.insertAndGetId {\n            it[name]  = \"Alice\"\n            it[email] = \"alice@example.com\"\n        }\n        val user = Users.select { Users.id eq newId.value }.single()\n        println(user[Users.name]) // Alice\n    }\n}",
     afterCode:"Exposed のトランザクションはデフォルトでREAD_COMMITTEDです。transaction(Connection.TRANSACTION_SERIALIZABLE) { }のように引数でisolation levelを変更できます。長時間トランザクションはロック競合の原因になるため、必要な処理だけをトランザクション内に収める設計が重要です。"},
    {title:"リレーションとコネクションプール",
     body:"ExposedのDAOスタイルでは、EntityクラスのreferencedOnまたはreferrersOnでリレーションを定義します。LazyLoadingがデフォルトですが、eagerLoadingブロックを使うとN+1問題を避けたJOINクエリを発行できます。PythonのSQLAlchemy ORMのrelationship()とlazy=True/Falseに対応します。\n\nコネクションプールはHikariCPを使うのが標準です。Database.connect()にDataSourceとしてHikariDataSourceを渡します。最大接続数・接続タイムアウト・アイドルタイムアウトを適切に設定することで、高負荷時の接続枯渇を防げます。Pythonのsqlalchemy create_engine(pool_size=...)に相当します。\n\nKtorとExposedを組み合わせる場合、コルーチンとトランザクションのブリッジが必要です。withContext(Dispatchers.IO)でI/Oスレッドに切り替え、suspendトランザクション（exposed-spring-boot-starterまたはexposed-kotlin-coroutines）を使うとsuspend関数からTransactionを扱えます。",
     code:"import com.zaxxer.hikari.*\nimport org.jetbrains.exposed.dao.*\nimport org.jetbrains.exposed.dao.id.*\n\n// HikariCP コネクションプール\nfun createDataSource(): HikariDataSource {\n    val config = HikariConfig().apply {\n        jdbcUrl         = \"jdbc:postgresql://localhost/mydb\"\n        driverClassName = \"org.postgresql.Driver\"\n        username        = \"postgres\"\n        password        = \"secret\"\n        maximumPoolSize = 10\n        connectionTimeout = 30_000\n        idleTimeout       = 600_000\n    }\n    return HikariDataSource(config)\n}\n\n// DAO スタイル（1対多リレーション）\nobject UsersTable : IntIdTable(\"users\") { val name = varchar(\"name\", 255) }\nobject PostsTable : IntIdTable(\"posts\") {\n    val title  = varchar(\"title\", 255)\n    val author = reference(\"user_id\", UsersTable)\n}\n\nclass User(id: EntityID<Int>) : IntEntity(id) {\n    companion object : IntEntityClass<User>(UsersTable)\n    var name by UsersTable.name\n    val posts by Post referrersOn PostsTable.author\n}\nclass Post(id: EntityID<Int>) : IntEntity(id) {\n    companion object : IntEntityClass<Post>(PostsTable)\n    var title  by PostsTable.title\n    var author by User referencedOn PostsTable.author\n}",
     afterCode:"Exposed 0.50以降はkotlinx.coroutinesのsuspendedTransaction/newSuspendedTransactionが提供されています。これを使うことでコルーチンのコンテキストを維持しながらDBアクセスができ、構造化された同時実行のメリットが享受できます。"},
  ]},
  {id:"ch3",num:3,title:"Coroutines Flow・StateFlow・SharedFlow",est:"60分",
   goal:"Kotlin FlowでリアクティブなデータストリームをRxJavaなしに実装できる。StateFlowでUI状態を管理し、SharedFlowでイベントを配信できる。Flowのoperator（map・filter・combine・flatMapLatest）を使いこなせるようになる。",
   sections:[
    {title:"Flowの基本と操作子",
     body:"Kotlin FlowはコルーチンベースのリアクティブストリームAPIです。RxJava/RxPythonの代替として、シンプルな構文で非同期データストリームを扱えます。flow { }ビルダーでコールドFlowを作り、collect { }で購読します。PythonのAsyncGeneratorに近い概念です。\n\nFlowはコールドです——collectするたびに新しいシーケンスが始まります。各オペレーター（map・filter・flatMapLatest等）は新しいFlowを返す純粋な変換で、中間処理は遅延評価されます。collectが呼ばれるまで何も実行されません。これはPythonのジェネレータパイプラインと同じ設計思想です。\n\nflatMapLatest・flatMapConcat・flatMapMergeの違いは重要です。flatMapLatestは新しい値が来たら前の処理をキャンセル（最新優先）、flatMapConcatは順番に完了を待つ（直列）、flatMapMergeは並列実行します。UIで検索クエリのたびにAPIを呼ぶ場合はflatMapLatestが適切です。",
     code:"import kotlinx.coroutines.*\nimport kotlinx.coroutines.flow.*\n\nfun main() = runBlocking {\n    // 基本的な Flow\n    val flow = flow {\n        for (i in 1..5) {\n            delay(100)\n            emit(i)\n        }\n    }\n\n    // オペレーターチェーン\n    flow\n        .filter { it % 2 == 0 }\n        .map { it * it }\n        .collect { println(it) } // 4, 16\n\n    // combine（2つの Flow を合成）\n    val f1 = flowOf(1, 2, 3)\n    val f2 = flowOf(\"a\", \"b\", \"c\")\n    f1.zip(f2) { n, s -> \"\${n}\${s}\" }\n      .collect { println(it) } // 1a, 2b, 3c\n\n    // flatMapLatest（最新の値のみ処理）\n    val query = flow { emit(\"ko\"); delay(50); emit(\"kotlin\") }\n    query.flatMapLatest { q ->\n        flow { delay(100); emit(\"結果: \${q}\") }\n    }.collect { println(it) } // \"結果: kotlin\"のみ\n}",
     afterCode:"Flowのエラー処理にはcatch { }オペレーターを使います。collectの外でtry/catchを書いても、Flowの内部例外は捕捉できないため必ずcatch { }オペレーターをパイプラインに組み込んでください。"},
    {title:"StateFlow・SharedFlow・Channel",
     body:"StateFlowはホットFlowの一種で、常に「現在の値」を保持します。Android ViewModelでUI状態を管理するために設計されており、collect直後に最新値を受け取れます。PythonのasyncioのEventに近いですが、値を保持する点が異なります。\n\nSharedFlowはStateFlowより汎用的で、複数のサブスクライバーに同一の値をブロードキャストできます。replayパラメーターで購読開始時に過去の値を受け取るキャッシュ数を設定できます。UIのone-shot events（トーストやナビゲーション）の配信にはreplay=0のSharedFlowが適切です。\n\nChannelはコルーチン間の通信プリミティブで、Producer-Consumerパターンを実装します。Channelは一度のみ消費されるのに対し、SharedFlowは複数のサブスクライバーが購読できます。実務ではChannelはService間、SharedFlowはUI層のイベント配信に使い分けます。",
     code:"import kotlinx.coroutines.*\nimport kotlinx.coroutines.flow.*\n\nclass CounterViewModel {\n    // StateFlow: 常に現在の状態を保持\n    private val _count = MutableStateFlow(0)\n    val count: StateFlow<Int> = _count.asStateFlow()\n\n    // SharedFlow: one-shot events\n    private val _events = MutableSharedFlow<String>(replay = 0)\n    val events: SharedFlow<String> = _events.asSharedFlow()\n\n    suspend fun increment() {\n        _count.update { it + 1 }\n        if (_count.value >= 10) _events.emit(\"達成！10回に到達\")\n    }\n}\n\nfun main() = runBlocking {\n    val vm = CounterViewModel()\n    launch { vm.events.collect { println(\"イベント: \${it}\") } }\n    launch { vm.count.collect { println(\"カウント: \${it}\") } }\n    repeat(11) { vm.increment(); delay(50) }\n    delay(100)\n}",
     afterCode:"StateFlowとLiveDataの違い：StateFlowはKotlinのコルーチンと統合されており、Androidだけでなくバックエンドでも使えます。LiveDataはAndroid Lifecycle対応の状態保持でメインスレッド必須です。新規プロジェクトではStateFlowが推奨されます。"},
  ]},
  {id:"ch4",num:4,title:"DSLビルダーパターン",est:"55分",
   goal:"Kotlinのラムダレシーバーを使ってタイプセーフなDSLを設計・実装できる。@DslMarkerでスコープを制限し、HTMLビルダー・設定DSL・テストDSLを自作できるようになる。",
   sections:[
    {title:"ラムダレシーバーとDSL設計",
     body:"Kotlinのラムダレシーバー（Lambda with Receiver）はDSL設計の核心です。fun Widget.configure(block: Widget.() -> Unit)のように関数引数をReceiver型付きラムダにすると、blockの中でthisを省略してWidgetのメソッドを呼べます。Pythonのcontextmanagerに近い感覚ですが、thisバインディングがより強力です。\n\napply { }はラムダレシーバーの典型例で、ラムダ内でthisを使ってオブジェクトを設定し、オブジェクト自身を返します。apply { this.host = \"localhost\" }はbuilder.host = \"localhost\"と書けることを意味します。このパターンでandroid.view.View・OkHttpClientなど多くのライブラリがDSLライクなAPIを提供しています。\n\nDSLの設計原則：1) ネストが自然に表現できること、2) 補完が効くこと（型安全）、3) @DslMarkerでスコープの漏れを防ぐこと。GradleのKotlinスクリプト（build.gradle.kts）もこのパターンで作られており、Groovyと比べて補完が完全に機能します。",
     code:"// シンプルなDSLの実装例：HTTP Requestビルダー\n@DslMarker annotation class RequestDsl\n\n@RequestDsl\nclass RequestBuilder {\n    var url: String = \"\"\n    var method: String = \"GET\"\n    private val headers = mutableMapOf<String, String>()\n    private var body: String? = null\n\n    fun header(name: String, value: String) { headers[name] = value }\n    fun body(content: String) { body = content }\n    fun build() = Request(url, method, headers, body)\n}\n\ndata class Request(val url: String, val method: String,\n                   val headers: Map<String,String>, val body: String?)\n\nfun request(block: RequestBuilder.() -> Unit): Request =\n    RequestBuilder().apply(block).build()\n\nfun main() {\n    val req = request {\n        url = \"https://api.example.com/users\"\n        method = \"POST\"\n        header(\"Content-Type\", \"application/json\")\n        header(\"Authorization\", \"Bearer token123\")\n        body(\"\"\"{\"name\":\"Alice\"}\"\"\")\n    }\n    println(req.url)    // https://api.example.com/users\n    println(req.headers) // {Content-Type=..., Authorization=...}\n}",
     afterCode:"Kotlinx.htmlライブラリはこのDSLパターンでHTMLを型安全に生成するライブラリです。Ktor・Compose多様なコンテキストで使え、HTMLの全タグが型検査を受けるためタイポがコンパイル時に検出されます。"},
    {title:"テストDSLとGroovyからの移行",
     body:"KotestはKotlinネイティブのテストフレームワークで、様々なスペックスタイル（BDD・FunSpec・DescribeSpec等）をDSLで提供します。JUnit5と比べてKotlinのコルーチンとの統合が優れており、shouldBeなどのマッチャーが拡張関数として自然に使えます。\n\nGradleのビルドスクリプトをGroovyからKotlin DSLに移行する動機は、型安全なAPI・IDEの補完・リファクタリングのしやすさです。build.gradle（Groovy）はビルド時まで型エラーが検出されませんが、build.gradle.kts（Kotlin）はコンパイル時に検出されます。大規模プロジェクトでの保守性が大幅に向上します。\n\nカスタムGradleプラグインもKotlinで書けます。Plugin<Project>を実装し、applyブロックでtasksを追加するシンプルなAPIです。チームで共通のビルドロジック（コードスタイルチェック・テストレポート等）をプラグインとして集約することで、複数プロジェクト間のビルド設定を統一できます。",
     code:"// Kotest DescribeSpec（BDD スタイル）\nclass UserServiceSpec : DescribeSpec({\n    val repo = mockk<UserRepository>()\n    val svc  = UserService(repo)\n\n    beforeEach { clearMocks(repo) }\n\n    describe(\"getUser\") {\n        context(\"ユーザーが存在する場合\") {\n            it(\"ユーザーを返す\") {\n                every { repo.findById(1) } returns User(1, \"Alice\")\n                svc.getUser(1) shouldBe User(1, \"Alice\")\n            }\n        }\n        context(\"ユーザーが存在しない場合\") {\n            it(\"NotFoundException をスローする\") {\n                every { repo.findById(99) } returns null\n                shouldThrow<NotFoundException> { svc.getUser(99) }\n            }\n        }\n    }\n})\n\n// カスタムマッチャー（拡張関数で定義）\ninfix fun User.shouldHaveName(expected: String) {\n    this.name shouldBe expected\n}",
     afterCode:"Kotestのデータドリブンテストは withData { listOf(...) }ブロックで書けます。同じテストロジックを複数のテストデータで実行でき、JUnitの@ParameterizedTestよりシンタックスが洗練されています。"},
  ]},
  {id:"ch5",num:5,title:"テスト（Kotest・MockK）",est:"55分",
   goal:"KotestとMockKを使ってunit/integration/property-basedテストを実装できる。coroutines対応のテスト・テストコンテナ・カバレッジ計測を実務レベルで運用できるようになる。",
   sections:[
    {title:"KotestとMockKの基本",
     body:"KotestはKotlinファーストのテストフレームワークで、JUnit5上で動作します。DescribeSpec・ShouldSpec・FunSpec・StringSpec・BehaviorSpecなど複数のスタイルが選べます。コルーチンのテストには特にKotestが優れており、TestScopeを使った非同期テストが書きやすいです。\n\nMockKはKotlin向けのモッキングライブラリで、Javaのmockito-kotlinよりもKotlinのfinal class・object・拡張関数・コルーチンへの対応が優れています。every { ... } returnsで振る舞いを定義し、verify { ... }で呼び出しを検証します。spyk()で実クラスをラップしつつ一部だけモックするspyも使いやすいAPIです。\n\ncoEveryとcoVerifyはコルーチンのsuspend関数をモック・検証するためのMockKのAPIです。Pythonのasynctest.patchに相当します。coEvery { repo.findById(1) } returns userのように書けます。コルーチンをawaitせずモックするとテストがハングする可能性があるため、必ずcoEvery/coVerifyを使ってください。",
     code:"import io.kotest.core.spec.style.DescribeSpec\nimport io.kotest.matchers.shouldBe\nimport io.mockk.*\n\nclass OrderServiceSpec : DescribeSpec({\n    val repo    = mockk<OrderRepository>()\n    val mailer  = mockk<MailService>(relaxed = true) // relaxed: 未設定メソッドを無視\n    val service = OrderService(repo, mailer)\n\n    describe(\"placeOrder\") {\n        it(\"注文を保存してメールを送信する\") {\n            val order = Order(1, \"Alice\", 5000)\n            every { repo.save(order) } returns order\n            // メール送信の戻り値は不要（relaxed）\n\n            val result = service.placeOrder(order)\n\n            result shouldBe order\n            verify { repo.save(order) }\n            verify { mailer.sendConfirmation(order) }\n        }\n        it(\"保存失敗時は例外を伝播する\") {\n            every { repo.save(any()) } throws RuntimeException(\"DB Error\")\n            shouldThrow<RuntimeException> { service.placeOrder(Order(2,\"Bob\",100)) }\n            verify(exactly = 0) { mailer.sendConfirmation(any()) }\n        }\n    }\n})",
     afterCode:"mockk<T>(relaxed=true)はすべてのメソッドにデフォルトの「何もしない」動作を設定します。設定が不要なモックに使うと定型コードを減らせますが、意図しないメソッド呼び出しを見逃す可能性があるため、重要なメソッドはverifyで必ず検証してください。"},
    {title:"コルーチンテストとTestcontainers",
     body:"Kotlinx.coroutines.testパッケージはコルーチンのテスト用ユーティリティを提供します。runTest { }はテスト用のCoroutineScopeを提供し、delay()の時間を仮想的に進めることができます。テストが実際に数秒待つことなく、delay(1000)を含む処理をミリ秒で検証できます。\n\nadvanceTimeBy(ms)とadvanceUntilIdle()で仮想クロックを操作します。advanceUntilIdle()は保留中の全コルーチンが完了するまで進めます。PythonのasyncioのManualClockに近い概念です。TestCoroutineDispatcherを使うとスケジューラーを完全制御できます。\n\nTestcontainersはDockerコンテナをテスト内から起動するJavaライブラリです。PostgreSQL・Redis・Kafkaなどの実サービスをテスト内で起動することで、モックなしのインテグレーションテストが書けます。@ContainerアノテーションとKotestの拡張機能を組み合わせるとテストクラス単位でコンテナを管理できます。",
     code:"import kotlinx.coroutines.test.*\nimport io.kotest.core.spec.style.FunSpec\n\nclass TimerTest : FunSpec({\n    test(\"遅延処理をスキップして検証\") {\n        runTest {\n            var result = \"\"\n            launch {\n                delay(5000)  // 仮想5秒\n                result = \"done\"\n            }\n            advanceTimeBy(5001)\n            result shouldBe \"done\"\n        }\n    }\n})\n\n// Testcontainers で PostgreSQL テスト\nclass DbIntegrationTest : FunSpec({\n    val pg = PostgreSQLContainer<Nothing>(\"postgres:16\").apply {\n        withDatabaseName(\"testdb\")\n        withUsername(\"test\")\n        withPassword(\"test\")\n    }\n    beforeSpec { pg.start() }\n    afterSpec  { pg.stop() }\n\n    test(\"実際のDBへの書き込みと読み込み\") {\n        val ds = createDataSource(pg.jdbcUrl, pg.username, pg.password)\n        // 実際のDB操作をテスト\n    }\n})",
     afterCode:"kotlinx.coroutines.testのrunTestはデフォルトのタイムアウトが60秒です。testTimeoutパラメーターで変更できます。TestCoroutineDispatcherはKotlinx-coroutines 1.6以降でStandardTestDispatcherとUnconfinedTestDispatcherに分かれており、後者は即座に全コルーチンを実行します。"},
  ]},
  {id:"ch6",num:6,title:"Kotlin Multiplatform入門",est:"60分",
   goal:"KMPプロジェクトを構築し、commonMain・jvmMain・jsMain・iosMainの依存関係を管理できる。expect/actualでプラットフォーム固有実装を分離し、共通ビジネスロジックをiOS・Androidで共有できるようになる。",
   sections:[
    {title:"KMPプロジェクト構造とGradleセットアップ",
     body:"Kotlin Multiplatform（KMP）は「共通のKotlinコードを複数のプラットフォームで使い回す」仕組みです。Pythonのコードは原則的に1つのランタイムで動きますが、KMPはJVM・JavaScript・Native（iOS/macOS/Linux等）のネイティブバイナリに同じコードをコンパイルできます。\n\nプロジェクト構造はcommonMain（全プラットフォーム共通）・jvmMain・jsMain・iosMain・androidMain等のソースセットで構成されます。commonMainに置いたコードが共有され、プラットフォーム固有のAPIはexpect/actualで差し替えます。ビジネスロジック・データモデル・APIクライアント・バリデーションをcommonMainに置き、UIはプラットフォーム固有とするのが典型的な分割です。\n\nkotlinx.serializationはマルチプラットフォーム対応のJSONライブラリで、@Serializableアノテーションを付けたdata classをJSONに変換できます。Pythonのpydantic・dataclassesとJSONのencode/decodeに相当します。Ktorもマルチプラットフォーム対応のHTTPクライアントとして使えます（ktor-client-core＋プラットフォームエンジン）。",
     code:"// build.gradle.kts\nkotlin {\n    jvm()\n    js(IR) { browser() }\n    iosArm64(); iosSimulatorArm64()\n\n    sourceSets {\n        commonMain.dependencies {\n            implementation(\"org.jetbrains.kotlinx:kotlinx-coroutines-core:1.8.0\")\n            implementation(\"org.jetbrains.kotlinx:kotlinx-serialization-json:1.6.3\")\n            implementation(\"io.ktor:ktor-client-core:2.3.7\")\n        }\n        jvmMain.dependencies {\n            implementation(\"io.ktor:ktor-client-cio:2.3.7\")\n        }\n        jsMain.dependencies {\n            implementation(\"io.ktor:ktor-client-js:2.3.7\")\n        }\n        iosMain.dependencies {\n            implementation(\"io.ktor:ktor-client-darwin:2.3.7\")\n        }\n    }\n}\n\n// commonMain: Serializable なデータモデル\n@Serializable\ndata class Product(val id: Int, val name: String, val price: Double)",
     afterCode:"KMPとFlutterの選択基準：KMPはUI部分は各プラットフォームネイティブのまま、ロジック層を共有します。Flutterはエンジンとも含めてクロスプラットフォームですが、ネイティブUIとの統合は制限があります。既存のiOS/Androidアプリにロジックを共有したい場合はKMPが自然です。"},
    {title:"expect/actualとプラットフォーム固有実装",
     body:"expect/actualメカニズムはKMPの核心です。commonMainにexpect宣言（シグネチャのみ）を書き、各プラットフォームのsourceSetにactual実装を書きます。Javaのinterfaceとimplementationに近いですが、コンパイラがactual実装の存在を強制します。\n\nexpect classはコンストラクターを含む完全なクラスの差し替えが可能で、expect fun（トップレベル関数）やexpect val（プロパティ）も使えます。例えばUUID生成、日付フォーマット、暗号化（各プラットフォームのネイティブAPIを使う）に活用されます。Pythonのabcモジュールに概念は似ていますが、プラットフォーム分離が静的に保証されます。\n\nKMPの実務的なユースケース：リポジトリ層・ユースケース（ビジネスロジック）・APIクライアント・バリデーションをcommonMainに置き、Androidはcompose_uiコンポーネント、iOSはSwiftUIがUIを担当します。このアーキテクチャをShared/Platform分離とも呼び、KMPコミュニティで広く採用されています。",
     code:"// commonMain/src/Platform.kt\nexpect fun getPlatformName(): String\nexpect class PlatformLogger() {\n    fun log(message: String)\n}\n\n// jvmMain/src/Platform.jvm.kt\nactual fun getPlatformName() = \"JVM \${System.getProperty(\"java.version\")}\"\nactual class PlatformLogger actual constructor() {\n    actual fun log(message: String) = println(\"[JVM] \${message}\")\n}\n\n// jsMain/src/Platform.js.kt\nactual fun getPlatformName() = \"JavaScript \${js(\"typeof process !== 'undefined' ? process.version : 'Browser'\") as String}\"\nactual class PlatformLogger actual constructor() {\n    actual fun log(message: String) = console.log(\"[JS] \${message}\")\n}\n\n// commonMain から使う\nfun appStart() {\n    val logger = PlatformLogger()\n    logger.log(\"起動: \${getPlatformName()}\")\n}",
     afterCode:"iosMainのactual実装でObjective-CのAPIを直接呼べるのがKotlin/Nativeの強みです。platform.Foundation.NSUUID().UUIDStringのようにiOS SDKをそのままKotlinから呼び出せます。SwiftやObjective-Cの既存コードベースとの統合も容易です。"},
  ]},
  {id:"ch7",num:7,title:"Compose for Desktop",est:"55分",
   goal:"Compose for Desktopを使ってGUIアプリを構築できる。状態管理・リスト表示・ナビゲーション・テーマ設定を実装し、JVMライブラリとの統合・パッケージングができるようになる。",
   sections:[
    {title:"Compose for Desktopの基本とUI構築",
     body:"Compose for DesktopはJetpackCompose（Android UI）をデスクトップ（Windows/macOS/Linux）に移植したフレームワークです。宣言的UIとリアクティブ状態管理を提供し、Pythonのtkinter・PySideと同じデスクトップアプリを、Kotlinで型安全かつ高性能に構築できます。\n\nComposable関数（@Composable）はUIの構成単位です。remember { }とmutableStateOf()で状態を管理し、状態が変わると影響するComposable自動的に再コンポーズ（再描画）されます。PythonのStreamlitの動作原理に似ています（状態変化で自動再実行）。\n\nMaterialTheme・MaterialDesign 3のコンポーネント（Button・TextField・LazyColumn等）が標準で使えます。Modifier APIで余白・サイズ・クリック・ドラッグなどを付加します。PythonのPyQtのQSS・レイアウトマネージャーより宣言的で、CSSに近い書き心地です。",
     code:"import androidx.compose.desktop.ui.tooling.preview.Preview\nimport androidx.compose.foundation.layout.*\nimport androidx.compose.foundation.lazy.LazyColumn\nimport androidx.compose.foundation.lazy.items\nimport androidx.compose.material3.*\nimport androidx.compose.runtime.*\nimport androidx.compose.ui.Modifier\nimport androidx.compose.ui.unit.dp\nimport androidx.compose.ui.window.Window\nimport androidx.compose.ui.window.application\n\ndata class Task(val id: Int, val title: String, var done: Boolean = false)\n\n@Composable\nfun TaskApp() {\n    val tasks = remember { mutableStateListOf(\n        Task(1,\"Kotlinを学ぶ\"), Task(2,\"KMPで実装\"), Task(3,\"テストを書く\")\n    )}\n    var input by remember { mutableStateOf(\"\") }\n\n    MaterialTheme {\n        Column(Modifier.padding(16.dp)) {\n            Row {\n                OutlinedTextField(input, {input=it}, Modifier.weight(1f), placeholder={Text(\"新しいタスク\")})\n                Spacer(Modifier.width(8.dp))\n                Button(onClick={if(input.isNotBlank()){tasks.add(Task(tasks.size+1,input));input=\"\"}}) {\n                    Text(\"追加\")\n                }\n            }\n            LazyColumn(Modifier.fillMaxSize().padding(top=8.dp)) {\n                items(tasks, key={it.id}) { task ->\n                    Row(Modifier.padding(vertical=4.dp)) {\n                        Checkbox(task.done, {tasks[tasks.indexOf(task)]=task.copy(done=it)})\n                        Text(task.title, Modifier.padding(start=8.dp))\n                    }\n                }\n            }\n        }\n    }\n}\n\nfun main() = application {\n    Window(::exitApplication, title=\"Todo App\") { TaskApp() }\n}",
     afterCode:"Compose for DesktopのパッケージングはGradleのcompose.desktop.application { }ブロックで設定します。./gradlew packageDmgでmacOS用インストーラー、packageMsiでWindows用MSIを生成できます。nativeDistributionsでJREをバンドルするか選択できます。"},
    {title:"状態管理とナビゲーション",
     body:"大規模なCompose for Desktopアプリでは状態管理の設計が重要です。ViewModelパターン（ViewModel＋StateFlow）をJVMで使い、ComposeのcollectAsState()で購読します。AndroidのJetpack ViewModelは使えませんが、同等のクラスを自前で作るか、Decompose・Ark等のKMPナビゲーションライブラリを使います。\n\nナビゲーションはCompose Navigationライブラリ（Android）がDesktopでも使えます。rememberNavController()でナビゲーション状態を管理し、NavHostで画面を切り替えます。Decomposeライブラリを使うとKMPネイティブのナビゲーション（状態のシリアライズ・バックスタック管理）が実現できます。\n\n複数のウィンドウや（モーダル）ダイアログはapplication { }ブロック内に複数のWindow { }を書くか、DialogWindowを使います。メニューバーはMenuBar { }コンポーザブルで定義でき、macOSのネイティブメニューバーと統合されます。システムトレイアイコンはTray()で管理できます。",
     code:"import androidx.compose.runtime.*\nimport kotlinx.coroutines.flow.*\n\n// ViewModel 相当のクラス\nclass AppViewModel {\n    private val _screen = MutableStateFlow(\"home\")\n    val screen = _screen.asStateFlow()\n    private val _items = MutableStateFlow(listOf(\"Item 1\", \"Item 2\"))\n    val items = _items.asStateFlow()\n\n    fun navigate(dest: String) { _screen.value = dest }\n    fun addItem(s: String) { _items.update { it + s } }\n}\n\n@Composable\nfun App(vm: AppViewModel) {\n    val screen by vm.screen.collectAsState()\n    val items  by vm.items.collectAsState()\n\n    MaterialTheme {\n        when (screen) {\n            \"home\"   -> HomeScreen(items, { vm.addItem(it) }, { vm.navigate(\"detail\") })\n            \"detail\" -> DetailScreen { vm.navigate(\"home\") }\n        }\n    }\n}\n\n@Composable\nfun HomeScreen(items: List<String>, onAdd: (String)->Unit, onDetail: ()->Unit) {\n    Column {\n        Text(\"ホーム\", style = MaterialTheme.typography.headlineMedium)\n        Button(onClick=onDetail) { Text(\"詳細へ\") }\n    }\n}",
     afterCode:"Compose for Desktopはマルチスレッドレンダリングをサポートしており、UIスレッドをブロックしない設計が重要です。重い処理はwithContext(Dispatchers.Default)に移し、結果をMutableStateFlowで返すパターンを一貫して使ってください。"},
  ]},
  {id:"ch8",num:8,title:"Arrow-kt・関数型プログラミング",est:"60分",
   goal:"Arrow-ktのEither・Option・Validated・IO型を使った関数型スタイルのエラー処理を実装できる。モナド合成・型クラス・Lens（Optics）の基本概念を理解し、実務のKotlinコードに関数型パターンを適用できるようになる。",
   sections:[
    {title:"Either・Option・Raisedでエラー処理",
     body:"Arrow-ktはKotlin向けの関数型プログラミングライブラリです。最も実用的な機能はEither<L, R>（エラーまたは成功値の二択）とOption<A>（値があるかないか）です。Pythonのresult型（returns・rusult等）に相当しますが、Kotlinの型システムと完全に統合されており補完・リファクタリングが効きます。\n\nEither<Error, Result>のLeftはエラー、Rightは成功を表します。flatMapでチェーンし、mapで変換し、fold{}で両ケースを処理します。try/catchが「例外を投げる」ところをEitherは「値として返す」ため、エラーを無視する可能性がなく全てのケースをコンパイル時に強制します。\n\nArrow 1.2以降はRaised（DSL）スタイルが追加され、either { }ブロック内でbind()・raise()を使うことで命令型スタイルでEitherを扱えます。エラーをthrowする代わりにraise(error)し、Either値はbind()で取り出します。PythonのResult monadのdo-notationに近い書き方が可能になりました。",
     code:"import arrow.core.*\n\ndata class User(val id: Int, val name: String, val age: Int)\nsealed class UserError {\n    data class InvalidName(val msg: String) : UserError()\n    data class InvalidAge(val msg: String)  : UserError()\n    data class NotFound(val id: Int)        : UserError()\n}\n\nfun validateName(name: String): Either<UserError, String> =\n    if (name.isBlank()) UserError.InvalidName(\"名前は必須\").left()\n    else name.right()\n\nfun validateAge(age: Int): Either<UserError, Int> =\n    if (age < 0 || age > 150) UserError.InvalidAge(\"年齢が不正\").left()\n    else age.right()\n\n// either {} DSL（bind で取り出し、raise でエラー）\nfun createUser(id: Int, name: String, age: Int): Either<UserError, User> = either {\n    val validName = validateName(name).bind()\n    val validAge  = validateAge(age).bind()\n    User(id, validName, validAge)\n}\n\nfun main() {\n    createUser(1, \"Alice\", 30).fold(\n        { err -> println(\"エラー: \${err}\") },\n        { user -> println(\"作成: \${user}\") }\n    )\n    createUser(2, \"\", 30).fold(\n        { err -> println(\"エラー: \${err}\") },\n        { user -> println(\"作成: \${user}\") }\n    )\n}",
     afterCode:"Arrow-ktのValidated（現在はEither+mapOrAccumulate）は複数のバリデーションエラーを蓄積できます。Either.zipOrAccumulate()を使うと全フィールドのエラーをリストで返せるため、フォームバリデーションに適しています。"},
    {title:"Opticsとデータ変換",
     body:"Opticsはネストしたイミュータブルデータ構造を安全に操作するパターンです。Arrow-ktのarrow-optics（kspアノテーション処理）を使うと、@opticsアノテーション付きのdata classから自動的にLens・Prism・Traversalが生成されます。\n\nLensは「ネストしたデータのフィールドを取得・更新する」ための関数型アクセサーです。Pythonのchained attribute accessの型安全版です。user.address.city = \"Osaka\"はイミュータブルにはできませんが、Lens.addressCityでuser.copy(address = user.address.copy(city = \"Osaka\"))を型安全かつ簡潔に書けます。\n\nPrismはsealed classのサブタイプへのアクセスに使います。Traversalはコレクション内の全要素を一括操作します。これらを合成して深くネストしたデータ変換を1行で書けるのがOpticsの強みです。実務ではconfig・ドメインモデルの更新処理で有効です。",
     code:"import arrow.optics.*\nimport arrow.optics.dsl.*\n\n@optics data class Address(val city: String, val zip: String) {\n    companion object\n}\n@optics data class User(val name: String, val address: Address) {\n    companion object\n}\n\nfun main() {\n    val user = User(\"Alice\", Address(\"Tokyo\", \"100-0001\"))\n\n    // Lens で深いネストを更新（copy を手書きしない）\n    val moved = User.address.city.modify(user) { \"Osaka\" }\n    println(moved) // User(name=Alice, address=Address(city=Osaka, zip=100-0001))\n\n    // Lens の合成\n    val cityLens = User.address compose Address.city\n    println(cityLens.get(user))         // Tokyo\n    val updated = cityLens.set(user, \"Kyoto\")\n    println(updated.address.city)       // Kyoto\n\n    // Traversal でコレクション一括更新\n    val users = listOf(user, moved)\n    val capitalized = users.map { User.address.city.modify(it) { it.uppercase() } }\n    println(capitalized.map { it.address.city }) // [TOKYO, OSAKA]\n}",
     afterCode:"Arrow-kt 1.2以降のarrow-optics-kspを使うと、KSP（Kotlin Symbol Processing）でビルド時にLens等が自動生成されます。手書きのLensより保守性が高く、フィールド追加時にコンパイルエラーで検出できます。"},
  ]},
