        code: "import java.io.File\nimport kotlinx.coroutines.*\n\ndata class Task(val id: Int, val title: String, var done: Boolean = false, val priority: Int = 2)\n\nclass TaskRepository(private val filePath: String) {\n    private val tasks = mutableListOf<Task>()\n    private var nextId = 1\n\n    fun load() {\n        runCatching { File(filePath).readLines() }\n            .getOrDefault(emptyList())\n            .forEach { line ->\n                line.split(\",\").takeIf { it.size == 4 }?.let { p ->\n                    tasks.add(Task(p[0].toInt(), p[1], p[2].toBoolean(), p[3].toInt()))\n                    if (p[0].toInt() >= nextId) nextId = p[0].toInt() + 1\n                }\n            }\n        println(\"ロード完了: \${tasks.size}件\")\n    }\n\n    suspend fun save() = withContext(Dispatchers.IO) {\n        runCatching {\n            File(filePath).bufferedWriter().use { w ->\n                tasks.forEach { t ->\n                    w.write(\"\${t.id},\${t.title},\${t.done},\${t.priority}\")\n                    w.newLine()\n                }\n            }\n        }.onSuccess { println(\"保存完了\") }.onFailure { println(\"保存失敗: \${it.message}\") }\n    }\n\n    fun add(title: String, priority: Int = 2): Task =\n        Task(nextId++, title, priority = priority).also { tasks.add(it) }\n\n    fun complete(id: Int): Boolean =\n        tasks.find { it.id == id }?.let { it.done = true; true } ?: false\n\n    fun list(onlyPending: Boolean = false): List<Task> =\n        if (onlyPending) tasks.filter { !it.done } else tasks.toList()\n}\n\nfun main() = runBlocking {\n    val repo = TaskRepository(\"tasks.csv\")\n    repo.load()\n    println(\"TaskManager v1.0 | コマンド: add <タイトル> / list / done <id> / save / quit\")\n\n    while (true) {\n        print(\"> \")\n        val parts = readLine()?.trim()?.split(\" \", limit = 2) ?: break\n        when (parts[0]) {\n            \"add\" -> {\n                val t = repo.add(parts.getOrElse(1) { \"無題\" })\n                println(\"追加: [\${t.id}] \${t.title}\")\n            }\n            \"list\" -> repo.list().forEach { t ->\n                val m = if (t.done) \"✓\" else \"○\"\n                println(\"\${m} [\${t.id}] \${t.title}\")\n            }\n            \"done\" -> {\n                val id = parts.getOrNull(1)?.toIntOrNull() ?: continue\n                println(if (repo.complete(id)) \"完了マーク: \${id}\" else \"IDが見つかりません\")\n            }\n            \"save\" -> repo.save()\n            \"quit\" -> { repo.save(); println(\"終了します\"); break }\n            else -> println(\"不明なコマンド: \${parts[0]}\")\n        }\n    }\n}",
