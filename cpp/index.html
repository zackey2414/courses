#include <cstring>
class Buffer {
    char* data;
    size_t size;
public:
    Buffer(const char* s);

#include <cstring>
class Buffer {
    char* data;
    size_t size;
public:
    Buffer(const char* s) : size(strlen(s)+1) {
        data = new char[size];
        memcpy(data, s, size);
    }
    Buffer(const Buffer& other) : size(other.size) {
        data = new char[size];
        memcpy(data, other.data, size);
    }
    Buffer& operator=(const Buffer& other) {
        if (this != &other) {
            delete[] data;
            size = other.size;
            data = new char[size];
            memcpy(data, other.data, size);
        }
        return *this;
    }
    ~Buffer() { delete[] data; }
    void print() const { std::cout << data << std::endl; }
};
int main() {
    Buffer b1("hello");
    Buffer b2 = b1;
    b1.print(); b2.print();
    return 0;
}`},

    sections:[
      {title:"vector と配列操作",body:`\`std::vector\` はC++で最も使われるコンテナです。Pythonのリストに相当しますが、内部は連続メモリ上の配列のため、ランダムアクセスがO(1)で高速です。push_backは平均O(1)（アモータイズド）です。\n\nvectorを使う際は \`reserve()\` を使って事前にメモリを確保するとパフォーマンスが向上します。なぜなら push_back の際にサイズ超過するとメモリ再確保（倍サイズで確保してコピー）が走るからです。容量が予測できる場合は \`reserve(n)\` で先に確保しましょう。\n\nイテレータはコンテナの要素を指す「スマートポインタ」のようなものです。\`begin()\` は最初の要素、\`end()\` は末尾の1つ先を指します。STLアルゴリズムはこのイテレータ範囲で動作します。Python のスライスと概念的に似ています。`,table:T.stlContainers,code:`#include <iostream>

      {title:"map, unordered_map, set",body:`\`std::map\` はキーでソートされた連想コンテナで、内部は赤黒木です。検索・挿入はO(log n)。キーの順序が重要な場合や範囲クエリが必要な場合に使います。\n\n\`std::unordered_map\` はハッシュマップで、平均O(1)の検索・挿入です。Pythonの \`dict\` に相当します。ほとんどの用途でこちらの方が速いですが、キー順のイテレーションはできません。\n\n\`std::set\` は重複なし集合（内部はソート済み赤黒木）。\`unordered_set\` はハッシュ集合。Pythonの \`set\` に相当しますが、ハッシュ化可能な型である必要があります。カスタム型をキーにする場合はハッシュ関数を提供する必要があります。`,code:`#include <iostream>

    sections:[
      {title:"ラムダ式の構文",body:`ラムダ式（匿名関数）はC++11で導入された機能で、Pythonの \`lambda\` より遥かに強力です。構文は \`[capture](params) -> return_type { body }\` で、キャプチャリストで外部変数を取り込めます。\n\nキャプチャリストは \`[=]\`（全変数をコピーでキャプチャ）、\`[&]\`（全変数を参照でキャプチャ）、\`[x, &y]\`（xはコピー、yは参照）のように指定します。Pythonのクロージャは変数を自動でキャプチャしますが、C++では明示的に指定する必要があります。\n\nSTLアルゴリズムと組み合わせることで、\`sort`, `find_if`, `copy_if`, `transform`, `for_each\` などを柔軟に使えます。これはPythonの \`sorted(key=...)`, `filter()`, `map()\` に対応します。`,table:T.algorithms,code:`#include <iostream>

#include <algorithm>
#include <numeric>

    std::vector<int> v = {5, 2, 8, 1, 9, 3, 7, 4, 6};

    // キャプチャで外部変数を取り込む
    int threshold = 5;
    auto count_above = std::count_if(v.begin(), v.end(),
        [threshold](int x) { return x > threshold; }); // threshold をコピーキャプチャ
    std::cout << "Above " << threshold << ": " << count_above << std::endl;

    // transform: 各要素を変換
    std::vector<int> doubled(v.size());
    std::transform(v.begin(), v.end(), doubled.begin(),
        [](int x) { return x * 2; });

    // accumulate: 合計
    int total = std::accumulate(v.begin(), v.end(), 0);
    std::cout << "Sum: " << total << std::endl;

    // sort with custom comparator
    std::sort(v.begin(), v.end(), [](int a, int b) { return a > b; }); // 降順

    return 0;
}`},
      {title:"std::function と高階関数",body:`\`std::function<R(Args...)>\` は任意の呼び出し可能オブジェクト（ラムダ・関数ポインタ・ファンクタ）を格納できる型です。Pythonでは関数を第一級オブジェクトとして自然に扱えますが、C++では \`std::function\` を使うことで同様のことができます。\n\nただし \`std::function\` には型消去のオーバーヘッドがあります。パフォーマンスが重要な場面では、テンプレートパラメータとして関数型を受け取る方が高速です。\n\nC++14以降は \`auto\` をラムダ引数に使えるジェネリックラムダが使えます。\`[](auto x) { return x * 2; }\` のように書けばテンプレート関数と同様に動作します。`,code:`#include <iostream>

    sections:[
      {title:"RAIIとスマートポインタの概念",body:`RAII（Resource Acquisition Is Initialization）はC++の根幹設計原則で、「リソースの取得をオブジェクトの初期化と同時に行い、解放をデストラクタに任せる」考え方です。ファイル・ネットワーク接続・メモリなど、すべてのリソース管理をこの原則で行います。\n\nPythonの \`with\` 文と \`__enter__`/`__exit__\` に似ていますが、C++ではブロックを抜けると自動的にデストラクタが呼ばれるため、明示的な \`with\` が不要です。\n\nスマートポインタは生のポインタをRAIIでラップしたものです。\`unique_ptr\` は唯一の所有者で、スコープを抜けると自動削除。\`shared_ptr\` は参照カウントで複数オーナー。\`weak_ptr\` は所有権を持たない弱参照です。2011年以降の現代C++では、生の \`new`/`delete\` はほぼ不要になりました。`,table:T.smartPtrs,code:`#include <iostream>
#include <memory>
#include <vector>

class Resource {
    std::string name;
public:
    Resource(const std::string& n) : name(n) {
        std::cout << name << " acquired" << std::endl;
    }
    ~Resource() { std::cout << name << " released" << std::endl; }
    void use() const { std::cout << name << " in use" << std::endl; }
};

int main() {
    // unique_ptr: スコープを抜けると自動解放
    {
        auto r = std::make_unique<Resource>("FileHandle");
        r->use();
    } // ここで自動解放

    // shared_ptr: 参照カウント
    auto s1 = std::make_shared<Resource>("Connection");
    {
        auto s2 = s1; // カウント2
        std::cout << "Count: " << s1.use_count() << std::endl;
    } // カウント1に戻る
    std::cout << "Count: " << s1.use_count() << std::endl;
    // s1 スコープ終了でカウント0 → 解放
    return 0;
}`},
      {title:"所有権の移動とムーブセマンティクス",body:`C++11で導入されたムーブセマンティクスは、オブジェクトの「所有権移動」を効率的に行います。コピーは全データを複製するのに対し、ムーブは内部リソースのポインタを移すだけです。\n\n\`unique_ptr\` はコピーできません（所有権が1つしかないため）。所有権を別の場所に移すには \`std::move()\` を使います。移動後の元の \`unique_ptr\` は nullptr になります。\n\nRvalue参照（\`T&&\`）とムーブコンストラクタ・ムーブ代入演算子が内部機構です。\`std::vector\` に \`push_back\` するとき、コンパイラは可能な場合自動でムーブを選択します。大きなオブジェクトを関数の戻り値にする場合もRVO（Return Value Optimization）やムーブが使われます。`,code:`#include <iostream>

    }
    // ムーブコンストラクタ
    BigData(BigData&& other) noexcept : data(std::move(other.data)) {
        std::cout << "Moved!" << std::endl;
    }
    size_t size() const { return data.size(); }
};

int main() {
    // unique_ptr の所有権移動
    auto p1 = std::make_unique<int>(42);
    auto p2 = std::move(p1); // p1 は nullptr に
    std::cout << (p1 == nullptr ? "p1 is null" : "p1 is valid") << std::endl;
    std::cout << *p2 << std::endl; // 42

    // BigData の移動
    BigData b1(1000);
    BigData b2 = std::move(b1); // コピーではなくムーブ
    std::cout << "b2 size: " << b2.size() << std::endl;
    return 0;
}`,afterCode:"関数の戻り値でローカル変数を返す場合、コンパイラはRVO(Return Value Optimization)を自動適用します。`return std::move(local)` と書く必要はなく、むしろRVOを妨げる可能性があります。"},

    sections:[
      {title:"例外処理の基本",body:`C++の例外処理はPythonと非常に似ていますが、パフォーマンスへの影響があります。Pythonは例外が発生しなくても \`try\` のオーバーヘッドがありますが、C++の例外は発生しない限りほぼゼロコストです（ゼロコスト例外）。ただし例外が実際に発生すると比較的重い処理が走ります。\n\nこのため、C++では「例外は本当に例外的な状況だけに使う」のが慣習です。関数の戻り値で成功・失敗を表す（\`std::optional`, `std::expected\`）か、例外かを用途に応じて選びます。パフォーマンスクリティカルなパスでは例外を避ける設計も多くあります。\n\n標準例外は \`std::exception\` を基底とする階層を持ちます。\`what()\` メソッドでエラーメッセージを取得できます。`,table:T.exceptions,code:`#include <iostream>

double safe_sqrt(double x) {

      {title:"カスタム例外とnoexcept",body:`独自の例外クラスを定義するには \`std::exception\` か \`std::runtime_error\` を継承します。\`what()\` をオーバーライドしてエラーメッセージを提供します。\n\n\`noexcept\` は「この関数は例外を送出しない」ことをコンパイラに伝えます。デストラクタやムーブ操作に使うことが重要です。デストラクタが例外を送出すると \`std::terminate\` が呼ばれてプログラムが即終了します。ムーブ操作が \`noexcept\` だと \`std::vector\` が再確保時にコピーではなくムーブを使えます。\n\nC++23では \`std::expected<T,E>\` が標準化され、例外を使わずに成功値かエラー値を返す関数型スタイルが書けるようになりました。Rustの \`Result<T,E>\` に相当します。`,code:`#include <iostream>

class AppError : public std::runtime_error {
    int code_;

    AppError(int code, const std::string& msg)

    int code() const noexcept { return code_; } // noexcept を保証
};

class DatabaseError : public AppError {
public:
    DatabaseError(const std::string& msg)
        : AppError(500, "DB: " + msg) {}
};

void query(const std::string& sql) {

      {title:"ファイルI/Oとstd::filesystem",body:`C++のファイルI/Oは `<fstream>` ヘッダーで提供されます。\`std::ofstream\` で書き込み、\`std::ifstream\` で読み込みです。Pythonの \`open()\` に相当します。\n\nファイルオブジェクトはスコープを抜けると自動でクローズされます（RAII）。Pythonの \`with open()\` に相当しますが、C++では明示的な \`with\` なしに自動クローズが保証されます。\n\nC++17で `<filesystem>` が標準化され、ファイルシステム操作が安全にできるようになりました。ファイルの存在確認・作成・削除・パス操作などをOSに依存せず書けます。`,code:`#include <iostream>
#include <fstream>
#include <string>
#include <filesystem>

namespace fs = std::filesystem;

int main() {
    // 書き込み
    {
        std::ofstream out("data.txt");
        out << "Hello, File!" << std::endl;
        out << "Line 2" << std::endl;
    } // 自動クローズ

    // 読み込み
    {
        std::ifstream in("data.txt");
        std::string line;
        while (std::getline(in, line)) {
            std::cout << line << std::endl;
        }
    }

    // std::filesystem (C++17)
    fs::path p = "data.txt";
    std::cout << "exists: " << fs::exists(p) << std::endl;
    std::cout << "size: " << fs::file_size(p) << " bytes" << std::endl;
    std::cout << "stem: " << p.stem() << std::endl;   // "data"
    std::cout << "ext: " << p.extension() << std::endl; // ".txt"

    fs::remove(p);
    return 0;
}`},
      {title:"std::optional, std::variant, std::any",body:`C++17で追加されたこれらの型は「型安全な合計型」を提供します。\n\n\`std::optional<T>\` は「値があるかもしれないし、ないかもしれない」型です。Pythonの \`None\` を返す可能性のある関数を型安全に表現できます。Rustの \`Option<T>\` に相当します。\n\n\`std::variant<A,B,C>\` は「AかBかCのどれか1つ」を格納する型です。Cの \`union\` を型安全にしたものです。\`std::visit\` でパターンマッチングのように処理できます。Rustの \`enum\` に相当します。\n\n\`std::any\` は任意の型を格納できますが型安全性が低下します。\`std::variant\` で代替できる場合はそちらを使いましょう。`,code:`#include <iostream>
#include <optional>
#include <variant>
#include <string>

// optional: 失敗しうる操作
std::optional<double> safe_log(double x) {
    if (x <= 0) return std::nullopt;
    return std::log(x);
}

// variant: 型安全なユニオン
using JsonValue = std::variant<int, double, std::string, bool>;

void print_json(const JsonValue& v) {
    std::visit([](const auto& val) {
        std::cout << val << std::endl;
    }, v);
}

int main() {
    // optional の使い方
    auto r1 = safe_log(10.0);
    auto r2 = safe_log(-1.0);

    // variant の使い方
    std::vector<JsonValue> values = {42, 3.14, std::string("hello"), true};
    for (auto& v : values) print_json(v);

    // 型チェック

        std::cout << "Is int: " << std::get<int>(values[0]) << std::endl;
    }
    return 0;
