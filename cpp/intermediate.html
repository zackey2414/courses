class RingBuffer {
    T data[N];
    size_t head = 0, tail = 0, count = 0;
public:
    void push(const T& val) {
        if (full()) throw std::overflow_error("Ring buffer full");
        data[tail] = val;
        tail = (tail + 1) % N;
        count++;
    }
    T pop() {
        if (empty()) throw std::underflow_error("Ring buffer empty");
        T val = data[head];
        head = (head + 1) % N;
        count--;
        return val;
    }
    bool empty() const { return count == 0; }
    bool full() const { return count == N; }
    size_t size() const { return count; }

class BlockingQueue {
    std::queue<T> q;
    std::mutex mtx;
    std::condition_variable cv;
public:
    void push(T val) {
        {
            std::lock_guard<std::mutex> lock(mtx);
            q.push(std::move(val));
        }
        cv.notify_one();
    }
    T pop() {
        std::unique_lock<std::mutex> lock(mtx);
        cv.wait(lock, [this]{ return !q.empty(); });
        T val = std::move(q.front());
        q.pop();
        return val;
    }
};`},

    template<typename F>
    std::future<std::invoke_result_t<F>> submit(F&& f);
};`,answer:`class ThreadPool {
    std::vector<std::thread> workers;
    std::queue<std::function<void()>> tasks;
    std::mutex mtx;
    std::condition_variable cv;
    bool stop = false;
public:
    ThreadPool(size_t n) {
        for (size_t i = 0; i < n; i++) {
            workers.emplace_back([this]{
                while (true) {
                    std::function<void()> task;
                    { std::unique_lock<std::mutex> lock(mtx);
                      cv.wait(lock, [this]{ return stop || !tasks.empty(); });
                      if (stop && tasks.empty()) return;
                      task = std::move(tasks.front()); tasks.pop(); }
                    task();
                }
            });
        }
    }
    ~ThreadPool() {
        { std::lock_guard<std::mutex> lock(mtx); stop = true; }
        cv.notify_all();
        for (auto& w : workers) w.join();
    }
    template<typename F>
    auto submit(F&& f) -> std::future<std::invoke_result_t<F>> {
        using R = std::invoke_result_t<F>;
        auto task = std::make_shared<std::packaged_task<R()>>(std::forward<F>(f));
        auto fut = task->get_future();
        { std::lock_guard<std::mutex> lock(mtx);
          tasks.emplace([task](){ (*task)(); }); }
        cv.notify_one();
        return fut;
    }
};`},

void parallel_for_each(std::vector<T>& v, F func, size_t n_threads = 4);`,answer:`template<typename T, typename F>
void parallel_for_each(std::vector<T>& v, F func, size_t n_threads = 4) {
    size_t chunk = (v.size() + n_threads - 1) / n_threads;
    std::vector<std::thread> threads;
    for (size_t i = 0; i < n_threads; i++) {
        size_t start = i * chunk;
        size_t end = std::min(start + chunk, v.size());
        if (start >= v.size()) break;
        threads.emplace_back([&v, func, start, end]{
            for (size_t j = start; j < end; j++) func(v[j]);
        });
    }
    for (auto& t : threads) t.join();
}`},

#include <memory>
#include <string>
#include <iostream>
struct Number { double val; };
struct Var { std::string name; };
struct BinOp;
using Expr = std::variant<Number, Var, std::shared_ptr<BinOp>>;
struct BinOp { char op; Expr lhs, rhs; };
double eval(const Expr& e) {
    return std::visit([](const auto& node) -> double {
        using T = std::decay_t<decltype(node)>;
        if constexpr (std::is_same_v<T, Number>) return node.val;
        else if constexpr (std::is_same_v<T, Var>) return 0.0; // 変数は0
        else {
            double l = eval(node->lhs), r = eval(node->rhs);
            switch(node->op) {
                case '+': return l+r; case '-': return l-r;
                case '*': return l*r; case '/': return l/r;
            }
            return 0;
        }
    }, e);
}`},

    std::queue<T> q;
    mutable std::mutex mtx;
    std::condition_variable cv;

    void push(T val) {
        { std::lock_guard<std::mutex> lock(mtx); q.push(std::move(val)); }
        cv.notify_one();

        }
        val = std::move(q.front()); q.pop();
        return true;
    }
};

  {id:"ch8",num:8,title:"カスタムアロケータとメモリ管理",est:"60分",
   goal:"カスタムアロケータのインターフェースを理解し、プールアロケータを実装できる。placement newとアライメントの概念を説明できる。",
   sections:[
     {title:"STLカスタムアロケータ",body:`STLのコンテナはメモリ確保の方法をテンプレートパラメータ（アロケータ）で差し替えられます。デフォルトは `std::allocator<T>` ですが、カスタムアロケータで特定の最適化ができます。\n\nプールアロケータは事前確保したメモリブロックから素早くメモリを返す仕組みです。通常の `new` はヒープ管理のオーバーヘッドがありますが、プールアロケータはそれを回避します。ゲームエンジンや実時間処理でよく使われます。\n\nメモリアライメントは型がメモリ上で特定バイト境界に配置されること要件です。`alignas(T)` で変数のアライメントを指定できます。`double` は8バイト境界、SIMD型は16〜64バイト境界が必要なことが多いです。`,table:T.memoryLayout,code:`#include <memory>
#include <new>
#include <cstddef>

// シンプルなプールアロケータ
template<typename T>
class PoolAllocator {
    static constexpr size_t POOL_SIZE = 4096;
    alignas(T) char pool_[sizeof(T) * POOL_SIZE];
    size_t next_ = 0;

public:
    using value_type = T;

    T* allocate(size_t n) {
        if (next_ + n > POOL_SIZE) throw std::bad_alloc();
        T* p = reinterpret_cast<T*>(pool_) + next_;
        next_ += n;
        return p;
    }

    void deallocate(T*, size_t) {
        // プールリセットは一括で行う
    }

    void reset() { next_ = 0; }
};

// placement new でスタック上に構築
struct alignas(16) SimdVec { // 16バイトアライメント必須
    float x, y, z, w;
};

void placement_demo() {
    alignas(SimdVec) char buf[sizeof(SimdVec)];
    SimdVec* v = new(buf) SimdVec{1.0f, 2.0f, 3.0f, 4.0f};
    // 使用後は明示的デストラクタ
    v->~SimdVec();
}`,afterCode:"STLアロケータのインターフェースはC++11で簡略化されました。`allocate()` と `deallocate()` の2メソッドと `value_type` typedef が最低限必要です。"},

  {id:"ch9",num:9,title:"パフォーマンスチューニング",est:"60分",
   goal:"コンパイラ最適化フラグを理解し、キャッシュフレンドリーなデータ構造を設計できる。constexprでコンパイル時計算を行い、プロファイリングツールで実測できる。",
   sections:[
     {title:"最適化の原則とキャッシュ",body:`「早すぎる最適化は諸悪の根源」とKnuthは言いましたが、C++ではパフォーマンスが要件になる場面が多くあります。最適化の第一歩は計測です。推測でなく、プロファイリングで真のボトルネックを特定してから最適化します。\n\nキャッシュ効率はパフォーマンスに大きく影響します。現代CPUのL1キャッシュは数MB、L3でも数十MBです。キャッシュミスはメモリアクセスが数百サイクルの遅延を引き起こします。連続メモリを使う `std::vector` が `std::list` より速いのはキャッシュ局所性が高いからです。\n\nData-Oriented Design（DOD）はゲームエンジンで生まれた設計思想で、データを処理パターンに合わせて配置します。SoA（Structure of Arrays）はキャッシュに乗る量を最大化します。`,table:T.perfTechniques,code:`#include <chrono>
#include <vector>
#include <algorithm>
#include <numeric>
#include <iostream>

using Clock = std::chrono::high_resolution_clock;

// AoS vs SoA のキャッシュ効率比較
struct ParticleAoS { float x, y, z, vx, vy, vz, mass; };

struct ParticlesSoA {
    std::vector<float> x, y, z, vx, vy, vz, mass;
    void resize(size_t n) { x.resize(n); y.resize(n); z.resize(n);
                            vx.resize(n); vy.resize(n); vz.resize(n); mass.resize(n); }
};

void update_aos(std::vector<ParticleAoS>& p, float dt) {
    for (auto& pi : p) { pi.x += pi.vx * dt; pi.y += pi.vy * dt; pi.z += pi.vz * dt; }
}

void update_soa(ParticlesSoA& p, float dt) {
    for (size_t i = 0; i < p.x.size(); i++) {
        p.x[i] += p.vx[i] * dt;
        p.y[i] += p.vy[i] * dt;
        p.z[i] += p.vz[i] * dt;
    }
}`,afterCode:"プロファイリングツール: Linux では `perf stat ./app` でキャッシュミス率、`perf record` + `perf report` でホットスポット特定ができます。Valgrind の `cachegrind` はキャッシュシミュレーションを提供します。"},

  {id:"ch10",num:10,title:"型安全なプログラミング",est:"55分",
   goal:"std::variant・型消去(type erasure)・タグ付き型でランタイムエラーをコンパイル時エラーに変換できる。std::visitでパターンマッチングを実装できる。",
   sections:[
     {title:"variantと型消去",body:``std::variant<A,B,C>` はRustの `enum` やHaskellの代数的データ型に相当します。どれか一つの型の値を持ち、`std::visit` でパターンマッチングのように型ごとに処理できます。\n\n型消去（type erasure）は「異なる型を共通の操作で扱えるようにするテクニック」です。仮想関数を使う方法（ポリモーフィズム）と、`std::function` のようにテンプレートベースで型情報を消去する方法があります。\n\n強い型付け（strong typing）は `using Meter = double;` のような別名だけでは型安全でなく、`struct Meter { double value; };` のようにラッパー型を作る必要があります。これにより `meter + kilogram` のような誤りをコンパイルエラーにできます。`,code:`#include <variant>
#include <string>
#include <iostream>
#include <memory>

// Result型 (Rustのように)
template<typename T, typename E = std::string>
class Result {
    std::variant<T, E> data;
    bool ok;
public:
    static Result<T,E> success(T val) {
        Result r; r.data = std::move(val); r.ok = true; return r;
    }
    static Result<T,E> failure(E err) {
        Result r; r.data = std::move(err); r.ok = false; return r;
    }
    bool is_ok() const { return ok; }
    const T& value() const { return std::get<T>(data); }
    const E& error() const { return std::get<E>(data); }
};

// JSON値のvariant
struct JsonNull {};
using Json = std::variant<JsonNull, bool, int, double, std::string>;

std::string json_to_string(const Json& j) {
    return std::visit([](const auto& v) -> std::string {
        using T = std::decay_t<decltype(v)>;
        if constexpr (std::is_same_v<T, JsonNull>) return "null";
        else if constexpr (std::is_same_v<T, bool>) return v ? "true" : "false";
        else if constexpr (std::is_same_v<T, std::string>) return '"' + v + '"';
        else return std::to_string(v);
    }, j);
}`,afterCode:"C++23では `std::expected<T,E>` が標準化され、エラーハンドリングがより表現力豊かになりました。`Result` のような自作型の代わりに使えます。"},
   ]},

  {id:"ch12",num:12,title:"総合演習とアーキテクチャ設計",est:"70分",

   sections:[
     {title:"プロジェクトアーキテクチャ設計",body:`中規模以上のC++プロジェクトでは、ディレクトリ構成・依存管理・インターフェース設計が重要になります。よく使われる構成は `include/`(公開ヘッダー)・`src/`(実装)・`tests/`(テスト)・`third_party/`(外部ライブラリ)・`CMakeLists.txt` です。\n\n依存性逆転原則（DIP）: 高レベルモジュールが低レベルモジュールの実装ではなく、抽象（インターフェース）に依存するよう設計します。C++では純粋仮想クラス・`std::function`・テンプレートパラメータで抽象化します。\n\nコンパイル時間管理も重要です: ヘッダーのインクルード最小化・前方宣言の活用・Pimplパターン・プリコンパイルヘッダー(PCH)が効果的です。テンプレートの定義はヘッダーに必要なのでコンパイル時間が増加しやすい点を意識しましょう。`,code:`// 良い設計の例: 依存性注入
class IStorage {
public:
    virtual void save(const std::string& key, const std::string& val) = 0;
    virtual std::optional<std::string> load(const std::string& key) = 0;
    virtual ~IStorage() = default;
};

class FileStorage : public IStorage {
    std::string dir;
public:
    FileStorage(std::string dir) : dir(std::move(dir)) {}
    void save(const std::string& key, const std::string& val) override;
    std::optional<std::string> load(const std::string& key) override;
};

class MemoryStorage : public IStorage { // テスト用
    std::unordered_map<std::string, std::string> data;
public:
    void save(const std::string& k, const std::string& v) override { data[k]=v; }
    std::optional<std::string> load(const std::string& k) override {
        auto it = data.find(k);
        if (it != data.end()) return it->second;
        return std::nullopt;
    }
};

class TodoService {
    IStorage& storage; // インターフェースに依存 (実装に依存しない)
public:
    TodoService(IStorage& s) : storage(s) {}
    // ...
};`,afterCode:"コースを修了したおめでとうございます。次の上級コースではコンパイラ・GC実装・ELFバイナリ解析・JIT・ライブラリ設計を扱います。C++の最深部を探求しましょう。"},

function DataTable({tbl}) {
  if (!tbl) return null;
  return (
    <div>
      {tbl.cap && <caption style={{display:'block',color:'#a78bfa',fontSize:'.85rem',marginBottom:'.5rem'}}>{tbl.cap}</caption>}
      <table>
        <thead><tr>{tbl.h.map((h,i)=><th key={i}>{h}</th>)}</tr></thead>
        <tbody>{tbl.r.map((row,i)=><tr key={i}>{row.map((c,j)=><td key={j}>{c}</td>)}</tr>)}</tbody>
      </table>
    </div>
  );
}
function CodeBlock({code}) {
  if (!code) return null;
  return <pre><code>{code}</code></pre>;
}
function Exercise({ex}) {
  const [open, setOpen] = React.useState(false);
  return (
    <div className="ex-block">
      <div className="ex-header"><span className="diff">{'⭐'.repeat(ex.diff)}</span></div>
      <p className="ex-q">{ex.q}</p>
      <CodeBlock code={ex.code}/>
      <button className="toggle-btn" onClick={()=>setOpen(!open)}>{open?'回答を隠す':'回答を見る'}</button>
      {open && <div className="answer"><CodeBlock code={ex.answer}/></div>}
    </div>
  );
}
function Section({s}) {
  return (
    <div className="section">
      <h3>{s.title}</h3>
      {s.body.split('\n').map((p,i)=>p.trim()&&<p key={i}>{p.trim()}</p>)}
      {s.table && <DataTable tbl={s.table}/>}
      <CodeBlock code={s.code}/>
      {s.afterCode && <p style={{color:'#cbd5e1',fontSize:'.95rem',marginTop:'.5rem'}}>{s.afterCode}</p>}
    </div>
  );
}
function App() {
  const [cur, setCur] = React.useState(0);
  const [open, setOpen] = React.useState(false);
  const [done, setDone] = React.useState(false);
  const ch = chapters[cur];
  const exList = EX[ch.id] || [];
  function goTo(idx) { setCur(idx); setOpen(false); window.scrollTo(0,0); }
  if (done) return (
    <div className="completion">
      <div className="badge">🎉 中級コース完了!</div>
      <p style={{color:'#ddd6fe',marginBottom:'1.5rem'}}>実務で戦えるC++エンジニアになりました。上級コースではコンパイラ・GC・JIT実装に挑戦しましょう。</p>
      <a href="../index.html" style={{background:'linear-gradient(135deg,#7c3aed,#5b21b6)',color:'#fff',padding:'.75rem 2rem',borderRadius:'.75rem',fontWeight:600}}>ホームに戻る</a>
    </div>
  );
  return (
    <div>
      <div className="chapter">
        <div className="chapter-header" onClick={()=>setOpen(!open)}>
          <span className="chapter-title">第{ch.num}章: {ch.title}</span>
          <div className="chapter-meta">
            <span className="chapter-est">⏱ {ch.est}</span>
            <span className="chevron">{open?'▲':'▼'}</span>
          </div>
        </div>
        {open && (
          <div className="chapter-body">
            <div className="goal-block">
              <h4>🎯 この章のゴール</h4>
              <p>{ch.goal}</p>
            </div>
            {ch.sections.map((s,i)=><Section key={i} s={s}/>)}
            {exList.length>0 && (
              <div>
                <h3 style={{color:'#a78bfa',margin:'1.5rem 0 1rem',borderBottom:'1px solid #3730a3',paddingBottom:'.25rem'}}>演習問題</h3>
                {exList.map((ex,i)=><Exercise key={`${ch.id}-${i}`} ex={ex}/>)}
              </div>
            )}
          </div>
        )}
      </div>
      <div className="nav-buttons">
        <button className="nav-btn" onClick={()=>goTo(cur-1)} disabled={cur===0}>← 前の章</button>
        {cur<chapters.length-1
          ?<button className="nav-btn" onClick={()=>goTo(cur+1)}>次の章 →</button>
          :<button className="nav-btn" onClick={()=>setDone(true)}>コース完了 🎉</button>}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
