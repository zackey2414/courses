const EX = {
  ch1:[
    {diff:1,q:"Todo構造体を定義し、コンストラクタで id・title・done・priority を初期化するコードを書いてください。",code:"struct Todo {\n    // id, title, done, priority フィールドを定義\n    // コンストラクタを初期化リストで実装\n};",answer:"struct Todo {\n    int id;\n    std::string title;\n    bool done;\n    int priority;\n    Todo(int id, std::string title, int priority = 2)\n        : id(id), title(std::move(title)), done(false), priority(priority) {}\n};"},
    {diff:1,q:"Todo を標準出力に表示する operator<< をオーバーロードしてください。",code:"// [1] Buy milk [priority:2] [PENDING]\n// [2] Write code [priority:1] [DONE]\nstd::ostream& operator<<(std::ostream& os, const Todo& t) {\n    // 実装\n}",answer:"std::ostream& operator<<(std::ostream& os, const Todo& t) {\n    os << \"[\" << t.id << \"] \" << t.title\n       << \" [priority:\" << t.priority << \"]\"\n       << \" [\" << (t.done ? \"DONE\" : \"PENDING\") << \"]\";\n    return os;\n}"},
    {diff:2,q:"TodoManager クラスを定義し、add(title, priority) メソッドと list() メソッドを実装してください。",code:"class TodoManager {\n    std::vector<Todo> todos;\n    int next_id = 1;\npublic:\n    void add(const std::string& title, int priority = 2);\n    void list() const;\n};",answer:"class TodoManager {\n    std::vector<Todo> todos;\n    int next_id = 1;\npublic:\n    void add(const std::string& title, int priority = 2) {\n        todos.emplace_back(next_id++, title, priority);\n    }\n    void list() const {\n        if (todos.empty()) { std::cout << \"No todos.\" << std::endl; return; }\n        for (const auto& t : todos) std::cout << t << std::endl;\n    }\n};"},
  ],
  ch2:[
    {diff:1,q:"TodoManager に complete(int id) メソッドを追加し、指定IDのタスクを完了にしてください。",code:"void complete(int id) {\n    // id が一致する Todo を find_if で探し done = true に\n}",answer:"void complete(int id) {\n    auto it = std::find_if(todos.begin(), todos.end(),\n        [id](const Todo& t){ return t.id == id; });\n    if (it != todos.end()) it->done = true;\n    else std::cout << \"Todo \" << id << \" not found.\" << std::endl;\n}"},
    {diff:2,q:"remove(int id) メソッドを erase-remove イディオムで実装してください。",code:"void remove(int id) {\n    // remove_if + erase で削除\n}",answer:"void remove(int id) {\n    auto it = std::remove_if(todos.begin(), todos.end(),\n        [id](const Todo& t){ return t.id == id; });\n    if (it == todos.end()) { std::cout << \"Not found.\" << std::endl; return; }\n    todos.erase(it, todos.end());\n}"},
    {diff:2,q:"pending() メソッドで未完了タスクの一覧を返してください (copy_if 使用)。",code:"std::vector<Todo> pending() const {\n    // copy_if + back_inserter\n}",answer:"std::vector<Todo> pending() const {\n    std::vector<Todo> result;\n    std::copy_if(todos.begin(), todos.end(), std::back_inserter(result),\n        [](const Todo& t){ return !t.done; });\n    return result;\n}"},
  ],
  ch3:[
    {diff:1,q:"priority順(昇順)でソートする sort_by_priority() メソッドを実装してください。",code:"void sort_by_priority() {\n    // std::sort + ラムダ\n}",answer:"void sort_by_priority() {\n    std::sort(todos.begin(), todos.end(),\n        [](const Todo& a, const Todo& b){ return a.priority < b.priority; });\n}"},
    {diff:2,q:"タイトルにキーワードが含まれるTodoだけを返す search(keyword) を実装してください。",code:"std::vector<Todo> search(const std::string& keyword) const {\n    // string::find で部分一致検索\n}",answer:"std::vector<Todo> search(const std::string& keyword) const {\n    std::vector<Todo> result;\n    std::copy_if(todos.begin(), todos.end(), std::back_inserter(result),\n        [&keyword](const Todo& t){\n            return t.title.find(keyword) != std::string::npos;\n        });\n    return result;\n}"},
    {diff:3,q:"統計情報を表示する stats() メソッドを実装してください (総数・完了数・完了率)。",code:"void stats() const {\n    // count_if で完了数を計算し表示\n}",answer:"void stats() const {\n    int total = todos.size();\n    int done = std::count_if(todos.begin(), todos.end(),\n        [](const Todo& t){ return t.done; });\n    double rate = total > 0 ? 100.0 * done / total : 0.0;\n    std::cout << \"Total: \" << total << \" Done: \" << done\n              << \" Rate: \" << std::fixed << std::setprecision(1) << rate << \"%\" << std::endl;\n}"},
  ],
  ch4:[
    {diff:1,q:"TodoをCSV形式(id,title,done,priority)でファイルに書き出す save() を実装してください。",code:"void save(const std::string& path) const {\n    std::ofstream out(path);\n    // ヘッダー行: id,title,done,priority\n    // 各Todo を CSV1行で書き出す\n}",answer:"void save(const std::string& path) const {\n    std::ofstream out(path);\n    out << \"id,title,done,priority\n\";\n    for (const auto& t : todos) {\n        out << t.id << \",\" << t.title << \",\"\n            << (t.done ? 1 : 0) << \",\" << t.priority << \"\n\";\n    }\n}"},
    {diff:2,q:"CSVファイルからTodoを読み込む load() を実装してください。",code:"void load(const std::string& path) {\n    std::ifstream in(path);\n    // ヘッダー行をスキップ\n    // 各行をパースして todos に追加\n}",answer:"void load(const std::string& path) {\n    std::ifstream in(path);\n    if (!in) return;\n    std::string line;\n    std::getline(in, line); // ヘッダースキップ\n    todos.clear();\n    while (std::getline(in, line)) {\n        std::istringstream ss(line);\n        std::string token;\n        Todo t(0, \"\");\n        std::getline(ss, token, ','); t.id = std::stoi(token);\n        std::getline(ss, token, ','); t.title = token;\n        std::getline(ss, token, ','); t.done = (token == \"1\");\n        std::getline(ss, token, ','); t.priority = std::stoi(token);\n        todos.push_back(t);\n        if (t.id >= next_id) next_id = t.id + 1;\n    }\n}"},
    {diff:2,q:"load()で読み込んだデータをsave()で別ファイルに保存し、再度load()して同一性を確認するテストを書いてください。",code:"// ファイルに保存→読み込み→比較して内容が同じか確認",answer:"void test_save_load() {\n    TodoManager mgr;\n    mgr.add(\"Buy milk\", 1);\n    mgr.add(\"Write tests\", 2);\n    mgr.save(\"test.csv\");\n    TodoManager mgr2;\n    mgr2.load(\"test.csv\");\n    mgr2.list();\n    std::filesystem::remove(\"test.csv\");\n}"},
  ],
  ch5:[
    {diff:1,q:"コマンドライン引数を解析して add/list/done/remove コマンドに振り分けるmain関数を実装してください。",code:"// ./todo add \"Buy milk\" 1\n// ./todo list\n// ./todo done 1\n// ./todo remove 2\nint main(int argc, char* argv[]) {\n    if (argc < 2) { /* usage */ return 1; }\n    std::string cmd = argv[1];\n    // 各コマンドに振り分け\n}",answer:"int main(int argc, char* argv[]) {\n    if (argc < 2) {\n        std::cout << \"Usage: todo <add|list|done|remove> [args]\" << std::endl;\n        return 1;\n    }\n    TodoManager mgr;\n    mgr.load(\"todos.csv\");\n    std::string cmd = argv[1];\n    if (cmd == \"add\" && argc >= 3) {\n        int pri = argc >= 4 ? std::stoi(argv[3]) : 2;\n        mgr.add(argv[2], pri);\n    } else if (cmd == \"list\") {\n        mgr.list();\n    } else if (cmd == \"done\" && argc >= 3) {\n        mgr.complete(std::stoi(argv[2]));\n    } else if (cmd == \"remove\" && argc >= 3) {\n        mgr.remove(std::stoi(argv[2]));\n    }\n    mgr.save(\"todos.csv\");\n    return 0;\n}"},
    {diff:2,q:"不正な引数を渡した場合に適切なエラーメッセージを出力する引数バリデーションを追加してください。",code:"// ./todo done abc  → エラー: ID must be a number\n// ./todo add        → エラー: title required",answer:"if (cmd == \"done\" && argc >= 3) {\n    try {\n        int id = std::stoi(argv[2]);\n        mgr.complete(id);\n    } catch (const std::invalid_argument&) {\n        std::cerr << \"Error: ID must be a number\" << std::endl;\n        return 1;\n    }\n} else if (cmd == \"add\") {\n    if (argc < 3) { std::cerr << \"Error: title required\" << std::endl; return 1; }\n    mgr.add(argv[2]);\n}"},
    {diff:3,q:"--sort-priority フラグと --filter-done フラグをオプション引数として追加してください。",code:"// ./todo list --sort-priority --filter-done",answer:"bool sort_pri = false, filter_done = false;\nfor (int i = 2; i < argc; i++) {\n    if (std::string(argv[i]) == \"--sort-priority\") sort_pri = true;\n    if (std::string(argv[i]) == \"--filter-done\") filter_done = true;\n}\nif (cmd == \"list\") {\n    if (sort_pri) mgr.sort_by_priority();\n    if (filter_done) {\n        for (auto& t : mgr.pending()) std::cout << t << std::endl;\n    } else {\n        mgr.list();\n    }\n}"},
  ],
  ch6:[
    {diff:1,q:"Todoクラスに operator< を定義し、priority順でstd::sortできるようにしてください。",code:"bool operator<(const Todo& other) const {\n    // priority が小さいほど高優先度\n}",answer:"bool operator<(const Todo& other) const {\n    return priority < other.priority;\n}\n// 使用例:\n// std::sort(todos.begin(), todos.end()); // operator< が使われる"},
    {diff:2,q:"TodoManager に operator[] を追加し、インデックスでアクセスできるようにしてください。",code:"Todo& operator[](size_t idx) { /* ... */ }\nconst Todo& operator[](size_t idx) const { /* ... */ }",answer:"Todo& operator[](size_t idx) {\n    if (idx >= todos.size()) throw std::out_of_range(\"Index out of range\");\n    return todos[idx];\n}\nconst Todo& operator[](size_t idx) const {\n    if (idx >= todos.size()) throw std::out_of_range(\"Index out of range\");\n    return todos[idx];\n}"},
    {diff:2,q:"Todo同士の等値比較 operator== を id ベースで実装してください。",code:"bool operator==(const Todo& other) const { /* id で比較 */ }",answer:"bool operator==(const Todo& other) const { return id == other.id; }\nbool operator!=(const Todo& other) const { return !(*this == other); }"},
  ],
  ch7:[
    {diff:1,q:"テンプレート関数 find_by<T> を実装し、任意のフィールドでTodoを検索できるようにしてください。",code:"template<typename Pred>\nstd::optional<Todo> find_by(Pred pred) const {\n    // find_if でpredがtrueな最初の要素を返す\n}\n// 使用例:\n// auto t = mgr.find_by([](const Todo& t){ return t.id == 3; });",answer:"template<typename Pred>\nstd::optional<Todo> find_by(Pred pred) const {\n    auto it = std::find_if(todos.begin(), todos.end(), pred);\n    if (it != todos.end()) return *it;\n    return std::nullopt;\n}"},
    {diff:2,q:"テンプレート関数 transform_todos<R> を実装し、各Todoから任意の値を抽出するコレクションを返してください。",code:"template<typename R, typename F>\nstd::vector<R> transform_todos(F func) const {\n    // std::transform を使用\n}\n// 使用例:\n// auto titles = mgr.transform_todos<string>([](const Todo& t){ return t.title; });",answer:"template<typename R, typename F>\nstd::vector<R> transform_todos(F func) const {\n    std::vector<R> result;\n    result.reserve(todos.size());\n    std::transform(todos.begin(), todos.end(), std::back_inserter(result), func);\n    return result;\n}"},
    {diff:3,q:"テンプレートで汎用的な grouped_by<K> を実装し、Todoをキーでグループ化したmapを返してください。",code:"template<typename K, typename F>\nstd::map<K, std::vector<Todo>> grouped_by(F key_func) const {\n    // 各Todoのキーを計算してmapに振り分け\n}\n// 使用例:\n// auto by_priority = mgr.grouped_by<int>([](const Todo& t){ return t.priority; });",answer:"template<typename K, typename F>\nstd::map<K, std::vector<Todo>> grouped_by(F key_func) const {\n    std::map<K, std::vector<Todo>> result;\n    for (const auto& t : todos) result[key_func(t)].push_back(t);\n    return result;\n}"},
  ],
  ch8:[
    {diff:1,q:"InvalidIdError と DuplicateTitleError カスタム例外を定義してください。",code:"class TodoError : public std::runtime_error {\npublic:\n    TodoError(const std::string& msg) : std::runtime_error(msg) {}\n};\n// InvalidIdError と DuplicateTitleError を TodoError から派生",answer:"class TodoError : public std::runtime_error {\npublic:\n    TodoError(const std::string& msg) : std::runtime_error(msg) {}\n};\nclass InvalidIdError : public TodoError {\npublic:\n    InvalidIdError(int id) : TodoError(\"Invalid todo ID: \" + std::to_string(id)) {}\n};\nclass DuplicateTitleError : public TodoError {\npublic:\n    DuplicateTitleError(const std::string& t) : TodoError(\"Duplicate title: \" + t) {}\n};"},
    {diff:2,q:"add() で同名タスクが存在する場合に DuplicateTitleError を投げるバリデーションを追加してください。",code:"void add(const std::string& title, int priority = 2) {\n    // 同名チェック → DuplicateTitleError\n    todos.emplace_back(next_id++, title, priority);\n}",answer:"void add(const std::string& title, int priority = 2) {\n    auto it = std::find_if(todos.begin(), todos.end(),\n        [&title](const Todo& t){ return t.title == title; });\n    if (it != todos.end()) throw DuplicateTitleError(title);\n    todos.emplace_back(next_id++, title, priority);\n}"},
    {diff:2,q:"complete() で存在しないIDを指定した場合に InvalidIdError を投げるようにしてください。",code:"void complete(int id) {\n    auto it = std::find_if(todos.begin(), todos.end(),\n        [id](const Todo& t){ return t.id == id; });\n    // 見つからなければ InvalidIdError\n    it->done = true;\n}",answer:"void complete(int id) {\n    auto it = std::find_if(todos.begin(), todos.end(),\n        [id](const Todo& t){ return t.id == id; });\n    if (it == todos.end()) throw InvalidIdError(id);\n    it->done = true;\n}"},
  ],
  ch9:[
    {diff:2,q:"TodoManager をヘッダー(todo.h)と実装(todo.cpp)に分割した場合のtodo.hを書いてください。",code:"// todo.h: 宣言のみ。#pragma once を使用\n// Todo構造体、TodoManager クラス宣言を含める",answer:"// todo.h\n#pragma once\n#include <string>\n#include <vector>\n#include <optional>\n#include <map>\n\nstruct Todo {\n    int id;\n    std::string title;\n    bool done;\n    int priority;\n    Todo(int id, std::string title, int priority = 2);\n    bool operator<(const Todo& o) const;\n    bool operator==(const Todo& o) const;\n};\nstd::ostream& operator<<(std::ostream&, const Todo&);\n\nclass TodoManager {\n    std::vector<Todo> todos;\n    int next_id = 1;\npublic:\n    void add(const std::string& title, int priority = 2);\n    void complete(int id);\n    void remove(int id);\n    void list() const;\n    void save(const std::string& path) const;\n    void load(const std::string& path);\n    void sort_by_priority();\n    std::vector<Todo> pending() const;\n    std::vector<Todo> search(const std::string& kw) const;\n    void stats() const;\n};"},
    {diff:2,q:"Makefileを作成し、make / make clean が動作するようにしてください。",code:"# Makefile\n# CXX, CXXFLAGS, SRCS, OBJS, TARGET を定義",answer:"CXX = g++\nCXXFLAGS = -std=c++17 -Wall -O2\nTARGET = todo\nSRCS = main.cpp todo.cpp storage.cpp\nOBJS = $(SRCS:.cpp=.o)\n\n$(TARGET): $(OBJS)\n	$(CXX) $(CXXFLAGS) -o $@ $^\n\n%.o: %.cpp\n	$(CXX) $(CXXFLAGS) -c -o $@ $<\n\nclean:\n	rm -f $(OBJS) $(TARGET)\n\n.PHONY: clean"},
    {diff:3,q:"ヘッダーガード (#pragma once) と インクルードガード (#ifndef) の違いを説明し、両方の例を書いてください。",code:"// pragma once 方式\n// #ifndef 方式",answer:"// pragma once: コンパイラ拡張、ほぼ全環境対応・シンプル\n#pragma once\n// ...ヘッダー内容...\n\n// #ifndef 方式: C標準、移植性が最高\n#ifndef MYHEADER_H\n#define MYHEADER_H\n// ...ヘッダー内容...\n#endif // MYHEADER_H\n\n// 実用上 #pragma once で十分。歴史的コードや組み込みでは #ifndef が使われる"},
  ],
  ch10:[
    {diff:2,q:"全機能を組み合わせてTodoアプリの完全なmain.cppを実装してください。",code:"// add / list / done / remove / search / stats コマンドに対応\n// 例外処理、ファイル永続化込み",answer:"#include <iostream>\n#include <string>\n#include \"todo.h\"\n\nint main(int argc, char* argv[]) {\n    TodoManager mgr;\n    mgr.load(\"todos.csv\");\n    if (argc < 2) {\n        std::cout << \"Usage: todo <add|list|done|remove|search|stats> [args]\" << std::endl;\n        return 1;\n    }\n    std::string cmd = argv[1];\n    try {\n        if (cmd == \"add\" && argc >= 3) {\n            int pri = argc >= 4 ? std::stoi(argv[3]) : 2;\n            mgr.add(argv[2], pri);\n            std::cout << \"Added.\" << std::endl;\n        } else if (cmd == \"list\") {\n            mgr.list();\n        } else if (cmd == \"done\" && argc >= 3) {\n            mgr.complete(std::stoi(argv[2]));\n        } else if (cmd == \"remove\" && argc >= 3) {\n            mgr.remove(std::stoi(argv[2]));\n        } else if (cmd == \"search\" && argc >= 3) {\n            for (auto& t : mgr.search(argv[2])) std::cout << t << std::endl;\n        } else if (cmd == \"stats\") {\n            mgr.stats();\n        } else {\n            std::cout << \"Unknown command.\" << std::endl; return 1;\n        }\n    } catch (const std::exception& e) {\n        std::cerr << \"Error: \" << e.what() << std::endl; return 1;\n    }\n    mgr.save(\"todos.csv\");\n    return 0;\n}"},
    {diff:2,q:"アプリのREADME用のヘルプ文字列を表示する print_usage() 関数を実装してください。",code:"void print_usage(const std::string& prog) {\n    // 各コマンドと引数の説明を整形して出力\n}",answer:"void print_usage(const std::string& prog) {\n    std::cout << \"Usage: \" << prog << \" <command> [options]\n\n\"\n              << \"Commands:\n\"\n              << \"  add <title> [priority]  Add a new todo (priority: 1=high, 3=low)\n\"\n              << \"  list                    List all todos\n\"\n              << \"  done <id>               Mark todo as done\n\"\n              << \"  remove <id>             Remove todo\n\"\n              << \"  search <keyword>        Search todos by title\n\"\n              << \"  stats                   Show statistics\n\"\n              << std::endl;\n}"},
    {diff:3,q:"Todoアプリを拡張して、期限日(due_date)フィールドを追加し、期限切れのタスクを警告表示する機能を実装してください。",code:"// due_date を std::optional<std::string> で持つ\n// 今日の日付と比較して期限切れなら [OVERDUE] を表示",answer:"#include <chrono>\n#include <iomanip>\n#include <sstream>\n\nstruct Todo {\n    // ... 既存フィールド\n    std::optional<std::string> due_date; // \"2026-04-30\" 形式\n};\n\nbool is_overdue(const std::string& due) {\n    auto now = std::chrono::system_clock::now();\n    auto t = std::chrono::system_clock::to_time_t(now);\n    std::tm tm = *std::localtime(&t);\n    std::ostringstream ss;\n    ss << std::put_time(&tm, \"%Y-%m-%d\");\n    return due < ss.str(); // 辞書順比較 (ISO8601なら有効)\n}\n\nstd::ostream& operator<<(std::ostream& os, const Todo& t) {\n    os << \"[\" << t.id << \"] \" << t.title;\n    if (t.due_date && !t.done && is_overdue(*t.due_date))\n        os << \" [OVERDUE: \" << *t.due_date << \"]\";\n    return os;\n}"},

const chapters = [
  {id:"ch1",num:1,title:"プロジェクト設計とTodo構造体",est:"50分",
   goal:"Todoアプリのプロジェクト構成を設計し、Todo構造体とoperator<<を実装できる。emplace_backとpush_backの違いを説明できる。",
   sections:[
     {title:"アプリ設計とプロジェクト構成",body:"本コースでは10章を通して「コマンドラインTodoマネージャー」を段階的に実装します。最終的には ./todo add \"タスク名\" / ./todo list / ./todo done 1 のようなCLIコマンドで動作するアプリを完成させます。\n\nまず設計から始めます。Pythonであれば辞書やリストで素早くデータを扱えますが、C++では型安全性のために構造体(struct)でデータモデルを定義します。これはPythonの dataclass に相当しますが、コンパイル時に型チェックされる点が異なります。\n\nプロジェクトはヘッダーファイル(.h)と実装ファイル(.cpp)に分割します。ヘッダーには宣言のみ、実装ファイルには定義を書く、という分離原則はC++の基本です。今は1ファイルで始めて後章で分割します。",table:T.projectStructure,code:"// main.cpp (初期版: 1ファイル構成)\n#include <iostream>\n#include <vector>\n#include <string>\n#include <algorithm>\n#include <optional>\n\nstruct Todo {\n    int id;\n    std::string title;\n    bool done;\n    int priority; // 1=高, 2=中, 3=低\n\n    Todo(int id, std::string title, int priority = 2)\n        : id(id), title(std::move(title)), done(false), priority(priority) {}\n};\n\nstd::ostream& operator<<(std::ostream& os, const Todo& t) {\n    os << \"[\" << t.id << \"] \" << t.title\n       << \" [P\" << t.priority << \"]\"\n       << \" [\" << (t.done ? \"DONE\" : \"PENDING\") << \"]\";\n    return os;\n}\n\nint main() {\n    std::vector<Todo> todos;\n    todos.emplace_back(1, \"Buy milk\", 1);\n    todos.emplace_back(2, \"Write report\", 2);\n    for (const auto& t : todos) std::cout << t << std::endl;\n    return 0;\n}",afterCode:"`emplace_back` は引数を直接構造体のコンストラクタに転送します（インプレース構築）。`push_back` が一度Todoを構築してからコピー/ムーブするのに対し、emplace_backは余分なコピーを避けられます。"},
     {title:"TodoManagerクラスの骨格",body:"構造体とロジックを分離するためにTodoManagerクラスを作ります。データ(todos配列)とそれを操作するメソッドをひとつのクラスにカプセル化することで、main関数はコマンド振り分けだけに集中できます。これはPythonの「クラスにデータとメソッドをまとめる」設計と同じですが、C++ではアクセス制御が強制されます。\n\n`next_id` を private に持つことで、IDの自動インクリメントをクラス内部に隠蔽します。外部からIDを設定できなくすることで、重複IDの問題を防ぎます。\n\nC++のメンバ変数初期化には初期化子リスト(`: member(value)`)を使うのが効率的です。特に const メンバや参照メンバは初期化子リストでしか初期化できません。クラス内での直接初期化(`int next_id = 1;`)はC++11以降で使えるメンバ初期化子(member initializer)です。",code:"class TodoManager {\n    std::vector<Todo> todos;\n    int next_id = 1; // メンバ初期化子 (C++11)\n\npublic:\n    void add(const std::string& title, int priority = 2) {\n        todos.emplace_back(next_id++, title, priority);\n        std::cout << \"Added [\" << (next_id-1) << \"] \" << title << std::endl;\n    }\n\n    void list() const {\n        if (todos.empty()) { std::cout << \"No todos.\" << std::endl; return; }\n        for (const auto& t : todos) std::cout << t << std::endl;\n    }\n\n    size_t count() const { return todos.size(); }\n};"},
   ]},
  {id:"ch2",num:2,title:"検索・削除・フィルタリング",est:"55分",
   goal:"find_if, remove_if, copy_if を使った検索・削除・フィルタリングを実装できる。erase-removeイディオムを説明し、正しく使える。",
   sections:[
     {title:"erase-removeイディオムと検索",body:"vectorから条件に合う要素を削除するには「erase-removeイディオム」を使います。`std::remove_if` は条件に合う要素を末尾に集め、削除済み領域の先頭イテレータを返します。続けて `erase()` で実際にそのイテレータ以降を削除します。\n\nなぜ2ステップが必要かというと、`std::remove_if` はSTLの汎用アルゴリズムで、コンテナの内部実装を知らないためです。実際の削除はコンテナの `erase()` メソッドで行います。PythonのリストのリストComprehensionで新しいリストを作るのと違い、C++ではインプレースで削除できます。\n\n`std::find_if` は条件に合う最初の要素のイテレータを返します。見つからない場合は `end()` を返すため、必ず `it != end()` をチェックします。",table:T.iteratorPattern,code:"// complete: IDで完了フラグを立てる\nvoid complete(int id) {\n    auto it = std::find_if(todos.begin(), todos.end(),\n        [id](const Todo& t) { return t.id == id; });\n    if (it == todos.end()) {\n        std::cout << \"Todo \" << id << \" not found.\" << std::endl;\n        return;\n    }\n    it->done = true;\n    std::cout << \"Completed: \" << *it << std::endl;\n}\n\n// remove: erase-removeイディオム\nvoid remove(int id) {\n    auto before = todos.size();\n    auto it = std::remove_if(todos.begin(), todos.end(),\n        [id](const Todo& t) { return t.id == id; });\n    todos.erase(it, todos.end());\n    if (todos.size() == before) std::cout << \"Not found.\" << std::endl;\n    else std::cout << \"Removed todo \" << id << std::endl;\n}\n\n// pending: 未完了タスクのみ返す\nstd::vector<Todo> pending() const {\n    std::vector<Todo> result;\n    std::copy_if(todos.begin(), todos.end(), std::back_inserter(result),\n        [](const Todo& t) { return !t.done; });\n    return result;\n}",afterCode:"C++20以降は `std::erase_if(container, pred)` という短縮形が使えます。ただし C++17 環境では従来のイディオムを使います。"},
   ]},
  {id:"ch3",num:3,title:"ソートと統計",est:"50分",
   goal:"std::sort にカスタムコンパレータを渡せる。count_if, accumulate を使って集計処理を実装できる。stable_sort と sort の違いを説明できる。",
   sections:[
     {title:"ソートと集計",body:"`std::sort` はC++のデフォルトソートで、実装はイントロソート（クイックソート + ヒープソート + 挿入ソートのハイブリッド）です。第3引数にコンパレータ(ラムダ)を渡すことでカスタムソートができます。Pythonの `sorted(key=...)` に相当しますが、C++のコンパレータは `(a, b) → bool` で「aがbより前にくるか」を返します。\n\n`stable_sort` は同値要素の相対順序を保持します。例えば優先度でソートして、同じ優先度の中では元の挿入順を保ちたい場合に使います。実装はマージソートベースのためO(n log² n)ですが、安定性が重要な場面で使います。\n\n集計処理は `count_if`（条件カウント）と `accumulate`（累積演算）が基本です。Pythonの `sum()`, `len([x for x in xs if cond])` に相当します。",table:T.sortAlgo,code:"void sort_by_priority() {\n    std::stable_sort(todos.begin(), todos.end(),\n        [](const Todo& a, const Todo& b) { return a.priority < b.priority; });\n}\n\nvoid sort_by_title() {\n    std::sort(todos.begin(), todos.end(),\n        [](const Todo& a, const Todo& b) { return a.title < b.title; });\n}\n\nvoid stats() const {\n    int total = static_cast<int>(todos.size());\n    int done_count = std::count_if(todos.begin(), todos.end(),\n        [](const Todo& t) { return t.done; });\n    double rate = total > 0 ? 100.0 * done_count / total : 0.0;\n    std::cout << \"Total: \" << total\n              << \"  Done: \" << done_count\n              << \"  Pending: \" << (total - done_count)\n              << \"  Rate: \" << std::fixed << std::setprecision(1)\n              << rate << \"%\" << std::endl;\n}\n\nstd::vector<Todo> search(const std::string& keyword) const {\n    std::vector<Todo> result;\n    std::copy_if(todos.begin(), todos.end(), std::back_inserter(result),\n        [&keyword](const Todo& t) {\n            return t.title.find(keyword) != std::string::npos;\n        });\n    return result;\n}",afterCode:"検索はcase-insensitiveにしたい場合、タイトルと検索キーワードを両方 `std::tolower` で変換してから比較します。`std::transform` と `tolower` を組み合わせると実現できます。"},
   ]},
  {id:"ch4",num:4,title:"ファイル永続化 (CSV)",est:"55分",
   goal:"ofstream/ifstream でCSVの読み書きができる。istringstream でCSV行をパースできる。ファイルエラーを適切に処理できる。",
   sections:[
     {title:"CSV読み書きの実装",body:"Todoアプリが終了するたびにデータが消えては困るので、ファイルへの永続化を実装します。フォーマットはCSV（カンマ区切り）を使います。\n\n書き込みは `std::ofstream` を使います。ファイルを開いてCSV行を出力し、スコープを抜けると自動クローズ（RAII）されます。Pythonの `with open(\"f\", \"w\") as f:` に相当しますが、`close()` を明示的に呼ばなくて良い点が便利です。\n\nCSVの読み込みは `std::getline` と `std::istringstream` を組み合わせます。行全体を文字列で読み、それを `istringstream` に渡して `,` 区切りで分解します。`std::stoi`, `std::stod`, `std::stol` でテキストを数値に変換します。",table:T.fileMode,code:"#include <fstream>\n#include <sstream>\n\nvoid save(const std::string& path) const {\n    std::ofstream out(path);\n    if (!out) throw std::runtime_error(\"Cannot open: \" + path);\n    out << \"id,title,done,priority\n\";\n    for (const auto& t : todos) {\n        out << t.id << \",\" << t.title << \",\"\n            << (t.done ? 1 : 0) << \",\" << t.priority << \"\n\";\n    }\n}\n\nvoid load(const std::string& path) {\n    std::ifstream in(path);\n    if (!in) return; // ファイル未存在は初回起動として扱う\n    todos.clear();\n    std::string line;\n    std::getline(in, line); // ヘッダー行スキップ\n    while (std::getline(in, line)) {\n        if (line.empty()) continue;\n        std::istringstream ss(line);\n        std::string tok;\n        Todo t(0, \"\");\n        std::getline(ss, tok, ','); t.id = std::stoi(tok);\n        std::getline(ss, tok, ','); t.title = tok;\n        std::getline(ss, tok, ','); t.done = (tok == \"1\");\n        std::getline(ss, tok, ','); t.priority = std::stoi(tok);\n        todos.push_back(t);\n        if (t.id >= next_id) next_id = t.id + 1;\n    }\n}",afterCode:"タイトルにカンマが含まれる場合はCSVが壊れます。本格的にはタイトルをダブルクォートで囲む処理が必要です。または区切り文字をタブ(\t)にするTSV形式も選択肢です。"},
   ]},
  {id:"ch5",num:5,title:"コマンドライン引数の解析",est:"50分",
   goal:"argc/argv を正しく解析できる。stoi/stod での変換例外を処理できる。フラグ引数(--option)とポジション引数を区別して処理できる。",
   sections:[
     {title:"argcとargvの解析",body:"C++の `main(int argc, char* argv[])` は実行時の引数を受け取ります。`argc` は引数の数（プログラム名を含む）、`argv` は文字列の配列です。Pythonの `sys.argv` と同じ概念ですが、型が `char*` の配列である点が異なります。\n\n文字列から数値への変換は `std::stoi()`（int）、`std::stod()`（double）、`std::stol()`（long）を使います。変換できない場合は `std::invalid_argument` 例外が投げられます。この例外を必ず捕捉してエラーメッセージを出しましょう。\n\n`--flag` スタイルのオプションは `argv` を順に見てプレフィクスが `--` で始まるかチェックします。C++17 の `std::string_view` を使うと効率よく文字列を検査できます。",code:"int main(int argc, char* argv[]) {\n    if (argc < 2) {\n        std::cout << \"Usage: todo <command> [args]\" << std::endl;\n        return 1;\n    }\n\n    TodoManager mgr;\n    mgr.load(\"todos.csv\"); // 起動時に読み込み\n\n    std::string cmd = argv[1];\n\n    try {\n        if (cmd == \"add\" && argc >= 3) {\n            int priority = (argc >= 4) ? std::stoi(argv[3]) : 2;\n            mgr.add(argv[2], priority);\n        } else if (cmd == \"list\") {\n            // オプション解析\n            bool sort_pri = false;\n            for (int i = 2; i < argc; i++) {\n                if (std::string(argv[i]) == \"--priority\") sort_pri = true;\n            }\n            if (sort_pri) mgr.sort_by_priority();\n            mgr.list();\n        } else if (cmd == \"done\" && argc >= 3) {\n            mgr.complete(std::stoi(argv[2]));\n        } else if (cmd == \"remove\" && argc >= 3) {\n            mgr.remove(std::stoi(argv[2]));\n        } else if (cmd == \"search\" && argc >= 3) {\n            auto results = mgr.search(argv[2]);\n            for (const auto& t : results) std::cout << t << std::endl;\n        } else if (cmd == \"stats\") {\n            mgr.stats();\n        } else {\n            std::cerr << \"Unknown command: \" << cmd << std::endl;\n            return 1;\n        }\n    } catch (const std::invalid_argument& e) {\n        std::cerr << \"Error: invalid number\" << std::endl;\n        return 1;\n    } catch (const std::exception& e) {\n        std::cerr << \"Error: \" << e.what() << std::endl;\n        return 1;\n    }\n\n    mgr.save(\"todos.csv\"); // 終了時に保存\n    return 0;\n}",afterCode:"引数解析が複雑になる場合は CLI11 や CLI11 といったヘッダーオンリーのCLIライブラリを使うことが多いです。小規模なら自前実装で十分です。"},
   ]},
  {id:"ch6",num:6,title:"演算子オーバーロード",est:"50分",
   goal:"operator<<, operator<, operator==, operator[] を定義できる。メンバ関数とフレンド関数のどちらで定義すべきかを説明できる。",
   sections:[
     {title:"演算子オーバーロードの設計",body:"C++では `+\", `-`, `<<`, `[]` などの演算子を自分のクラスに対して定義できます。これにより `std::cout << todo` や `manager[0]` のような自然な構文が使えます。Pythonの `__add__`, `__str__`, `__getitem__` に相当します。\n\n`operator<<` と `operator>>` はストリームとの入出力用で、フレンド関数として定義するのが慣習です。なぜなら左辺が `std::ostream`（クラス外の型）だからです。メンバ関数では `todo.operator<<(cout)` という順序になってしまいます。\n\n`operator<` はSTLのソートアルゴリズムが使う比較演算子です。`std::sort` のデフォルトは `operator<` を使うため、これを定義すれば カスタムコンパレータなしでソートできます。",table:T.operatorOverload,code:"// Todo のコンパレータ系演算子\nstruct Todo {\n    int id;\n    std::string title;\n    bool done;\n    int priority;\n\n    // ソート用 (priority昇順)\n    bool operator<(const Todo& other) const {\n        return priority < other.priority;\n    }\n    // 等値比較\n    bool operator==(const Todo& other) const { return id == other.id; }\n    bool operator!=(const Todo& other) const { return !(*this == other); }\n};\n\n// フレンド関数として定義 (クラス外から ostream にアクセス)\nstd::ostream& operator<<(std::ostream& os, const Todo& t) {\n    os << \"[\" << t.id << \"] \" << t.title\n       << \" [P\" << t.priority << \"] [\"\n       << (t.done ? \"DONE\" : \"PENDING\") << \"]\";\n    return os;\n}\n\n// TodoManager に添字演算子\nclass TodoManager {\n    std::vector<Todo> todos;\npublic:\n    Todo& operator[](size_t idx) {\n        if (idx >= todos.size()) throw std::out_of_range(\"Index out of range\");\n        return todos[idx];\n    }\n    const Todo& operator[](size_t idx) const {\n        if (idx >= todos.size()) throw std::out_of_range(\"Index out of range\");\n        return todos[idx];\n    }\n};",afterCode:"C++20 では `operator<=>` (宇宙船演算子) を使うと `<`, `<=`, `>`, `>=`, `==`, `!=` のすべてが一度に定義できます。`auto operator<=>(const Todo&) const = default;` で自動生成も可能です。"},
   ]},
  {id:"ch7",num:7,title:"テンプレートで汎用検索・変換",est:"55分",
   goal:"テンプレートメンバ関数を定義し、任意の条件・変換関数を受け取れる汎用APIを設計できる。std::optionalを戻り値に使って「見つからない」を型安全に表現できる。",
   sections:[
     {title:"汎用テンプレートメンバ関数",body:"TodoManagerに特定フィールドでの検索だけを実装するとAPIが増えすぎます。テンプレートを使って「任意の条件」「任意の変換」を受け取れる汎用メソッドを設計します。\n\nこれはPythonの `list.filter(func)` や `list.map(func)` に相当します。C++ではテンプレートパラメータを使うことで、型安全なまま汎用的なコードが書けます。\n\n`std::optional<T>` を戻り値に使うと「見つかった場合はTを、見つからない場合は nullopt を返す」という意図を型で表現できます。これにより呼び出し側は戻り値が有効かどうかを `if (result)` でチェックできます。例外を使わずに「見つからない」を表現できるため、検索系の関数に適しています。",code:"// 汎用検索 (任意の述語)\ntemplate<typename Pred>\nstd::optional<Todo> find_by(Pred pred) const {\n    auto it = std::find_if(todos.begin(), todos.end(), pred);\n    if (it != todos.end()) return *it;\n    return std::nullopt;\n}\n\n// 汎用変換 (map相当)\ntemplate<typename R, typename F>\nstd::vector<R> transform_todos(F func) const {\n    std::vector<R> result;\n    result.reserve(todos.size());\n    std::transform(todos.begin(), todos.end(),\n                   std::back_inserter(result), func);\n    return result;\n}\n\n// 汎用グループ化\ntemplate<typename K, typename F>\nstd::map<K, std::vector<Todo>> group_by(F key_func) const {\n    std::map<K, std::vector<Todo>> result;\n    for (const auto& t : todos) result[key_func(t)].push_back(t);\n    return result;\n}\n\n// 使用例\nint main() {\n    TodoManager mgr;\n    mgr.add(\"Buy milk\", 1);\n    mgr.add(\"Write report\", 2);\n\n    // IDで検索\n    auto found = mgr.find_by([](const Todo& t){ return t.id == 1; });\n    if (found) std::cout << *found << std::endl;\n\n    // タイトル一覧を取得\n    auto titles = mgr.transform_todos<std::string>(\n        [](const Todo& t){ return t.title; });\n\n    // 優先度でグループ化\n    auto by_pri = mgr.group_by<int>([](const Todo& t){ return t.priority; });\n}",afterCode:"テンプレートメンバ関数の定義はヘッダーに書く必要があります。`.cpp` に分離すると「未定義の参照」エラーになります。"},

  {id:"ch8",num:8,title:"例外処理と堅牢なエラーハンドリング",est:"50分",
   goal:"カスタム例外クラスの階層を設計し、アプリ全体で一貫したエラーハンドリングを実装できる。例外安全なコードを書くための基本原則を説明できる。",
   sections:[
     {title:"カスタム例外クラスの設計",body:"TodoアプリでユーザーがIDを間違えたり、ファイルが読めない場合など様々なエラーが起きます。これらをすべて `std::runtime_error` で投げると、呼び出し側で種類を区別できません。アプリ独自の例外クラス階層を設計することで、エラーの種類に応じた処理が書けます。\n\nPythonでは `class MyError(Exception): pass` で簡単に作れますが、C++でも同様に継承で作ります。`std::exception` か `std::runtime_error` を基底にして、コンストラクタで `what()` のメッセージを設定します。\n\n例外安全性の原則: (1) デストラクタで例外を投げない、(2) RAIIを使う、(3) 例外が発生しうるコードでの状態変更を最小化する。特に `noexcept` をデストラクタとムーブ操作につけることが重要です。",code:"// カスタム例外階層\nclass TodoError : public std::runtime_error {\npublic:\n    explicit TodoError(const std::string& msg)\n        : std::runtime_error(\"TodoError: \" + msg) {}\n};\n\nclass InvalidIdError : public TodoError {\n    int id_;\npublic:\n    explicit InvalidIdError(int id)\n        : TodoError(\"Todo ID \" + std::to_string(id) + \" not found\"), id_(id) {}\n    int id() const noexcept { return id_; }\n};\n\nclass DuplicateTitleError : public TodoError {\npublic:\n    explicit DuplicateTitleError(const std::string& title)\n        : TodoError(\"Title already exists: \" + title) {}\n};\n\nclass StorageError : public TodoError {\npublic:\n    explicit StorageError(const std::string& path)\n        : TodoError(\"File I/O error: \" + path) {}\n};\n\n// add に重複チェック追加\nvoid add(const std::string& title, int priority = 2) {\n    auto dup = std::find_if(todos.begin(), todos.end(),\n        [&title](const Todo& t){ return t.title == title; });\n    if (dup != todos.end()) throw DuplicateTitleError(title);\n    todos.emplace_back(next_id++, title, priority);\n}",afterCode:"main関数の最外部で `catch(const std::exception& e)` を置いて全例外をキャッチし、エラーメッセージを stderr に出力してから exit(1) するパターンが実用的です。"},

  {id:"ch9",num:9,title:"ヘッダー分割とMakefile",est:"55分",

   sections:[
     {title:"ヘッダーと実装の分割",body:"1ファイルで動くアプリができたので、プロジェクトをファイル分割します。C++の慣習では、クラスの「宣言」はヘッダーファイル(.h)に、「定義（実装）」は実装ファイル(.cpp)に書きます。\n\nヘッダーファイルは複数の.cppから `#include` されます。そのままでは同じ宣言が複数回読み込まれてエラーになるため、`#pragma once` か `#ifndef` インクルードガードで多重インクルードを防ぎます。\n\nMakefileを使うと変更したファイルのみ再コンパイルされる差分ビルドが実現します。大きなプロジェクトではビルド時間を大幅に短縮できます。依存関係のルールを正しく記述することが重要です。",table:T.projectStructure,code:"// todo.h\n#pragma once\n#include <string>\n#include <vector>\n#include <optional>\n#include <map>\n#include <iostream>\n#include <stdexcept>\n\nclass TodoError : public std::runtime_error { /* ... */ };\nclass InvalidIdError : public TodoError { /* ... */ };\n\nstruct Todo {\n    int id;\n    std::string title;\n    bool done;\n    int priority;\n    Todo(int id, std::string title, int priority = 2);\n    bool operator<(const Todo& o) const;\n    bool operator==(const Todo& o) const;\n};\nstd::ostream& operator<<(std::ostream& os, const Todo& t);\n\nclass TodoManager {\n    std::vector<Todo> todos;\n    int next_id = 1;\npublic:\n    void add(const std::string& title, int priority = 2);\n    void complete(int id);\n    void remove(int id);\n    void list() const;\n    void save(const std::string& path) const;\n    void load(const std::string& path);\n    void sort_by_priority();\n    std::vector<Todo> pending() const;\n    std::vector<Todo> search(const std::string& kw) const;\n    void stats() const;\n};",afterCode:"テンプレートメンバ関数はヘッダーに定義を書く必要があります（コンパイラがインスタンス化する際に定義が見えている必要があるため）。通常のメンバ関数だけ.cppに移します。"},
   ]},
  {id:"ch10",num:10,title:"完成・拡張・振り返り",est:"60分",
   goal:"Todoアプリの全機能を統合した完全版を実装できる。C++17のstd::filesystem を使いファイル操作を安全に行える。今後の拡張ポイントを自分で設計できる。",
   sections:[
     {title:"完成版の統合と拡張",body:"9章までで実装した全機能（構造体・クラス・検索/削除/ソート・CSV永続化・コマンドライン解析・例外処理・ファイル分割）を統合して完成版を作ります。\n\nC++17の `<filesystem>` を使うとデータファイルのパスをポータブルに扱えます。ホームディレクトリに保存するなど、より実用的なアプリに近づけられます。\n\nアプリを完成させた後は以下の拡張を試してみてください: (1) SQLiteを使ったDB永続化、(2) タグ機能の追加、(3) JSON出力のサポート、(4) ncursesを使ったTUIインターフェース。これらはC++中級課程で扱うテーマです。",code:"// main.cpp (完成版)\n#include <iostream>\n#include <filesystem>\n#include \"todo.h\"\n\nnamespace fs = std::filesystem;\n\nstd::string get_data_path() {\n    // 実行ファイルと同じディレクトリに保存\n    return \"todos.csv\";\n}\n\nint main(int argc, char* argv[]) {\n    TodoManager mgr;\n    std::string data_path = get_data_path();\n    mgr.load(data_path);\n\n    if (argc < 2) {\n        std::cout << \"Usage: todo <add|list|done|remove|search|stats> [args]\" << std::endl;\n        return 1;\n    }\n\n    std::string cmd = argv[1];\n    try {\n        if (cmd == \"add\" && argc >= 3) {\n            int pri = (argc >= 4) ? std::stoi(argv[3]) : 2;\n            mgr.add(argv[2], pri);\n            std::cout << \"Added.\" << std::endl;\n        } else if (cmd == \"list\") {\n            bool sort_flag = false;\n            for (int i = 2; i < argc; i++)\n                if (std::string(argv[i]) == \"--priority\") sort_flag = true;\n            if (sort_flag) mgr.sort_by_priority();\n            mgr.list();\n        } else if (cmd == \"done\" && argc >= 3) {\n            mgr.complete(std::stoi(argv[2]));\n        } else if (cmd == \"remove\" && argc >= 3) {\n            mgr.remove(std::stoi(argv[2]));\n        } else if (cmd == \"search\" && argc >= 3) {\n            for (auto& t : mgr.search(argv[2])) std::cout << t << std::endl;\n        } else if (cmd == \"stats\") {\n            mgr.stats();\n        } else {\n            std::cerr << \"Unknown command: \" << cmd << std::endl; return 1;\n        }\n    } catch (const std::exception& e) {\n        std::cerr << \"Error: \" << e.what() << std::endl; return 1;\n    }\n\n    mgr.save(data_path);\n    return 0;\n}",afterCode:"このTodoアプリを完成させることで、クラス設計・STLコンテナ・ファイルI/O・例外処理・ビルドシステムというC++の基礎を実践できました。次の中級コースではマルチスレッド・ソケット通信・パフォーマンスチューニングを学びます。"},
