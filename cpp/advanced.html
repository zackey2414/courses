    std::vector<GcObject*> heap;
    std::vector<GcObject*> roots;
    void mark(GcObject* obj) {
        if (!obj || obj->marked) return;
        obj->marked = true;
        for (auto* ref : obj->refs) mark(ref);
    }
public:
    template<typename T, typename... Args>
    T* alloc(Args&&... args) {
        auto* obj = new T(std::forward<Args>(args)...);
        heap.push_back(obj);
        return obj;
    }
    void add_root(GcObject* r) { roots.push_back(r); }
    void collect() {
        for (auto* r : roots) mark(r);
        auto it = std::remove_if(heap.begin(), heap.end(),
            [](GcObject* o){ return !o->marked; });
        for (auto jt = it; jt != heap.end(); jt++) delete *jt;
        heap.erase(it, heap.end());
        for (auto* o : heap) o->marked = false;
    }
    size_t heap_size() const { return heap.size(); }
};`},

struct TriColorObject {

    std::vector<TriColorObject*> refs;

    std::vector<TriColorObject*> heap;
    std::queue<TriColorObject*> gray_set;
    std::mutex gc_mutex;

#include <iostream>
template<typename T>
struct Generator {
    struct promise_type {
        T value;
        Generator get_return_object() { return {std::coroutine_handle<promise_type>::from_promise(*this)}; }
        std::suspend_always initial_suspend() { return {}; }
        std::suspend_always final_suspend() noexcept { return {}; }
        std::suspend_always yield_value(T v) { value = v; return {}; }
        void return_void() {}
        void unhandled_exception() { std::terminate(); }
    };
    std::coroutine_handle<promise_type> handle;
    ~Generator() { if(handle) handle.destroy(); }
    bool next() { handle.resume(); return !handle.done(); }
    T value() { return handle.promise().value; }
};
Generator<long long> fibonacci() {
    long long a = 0, b = 1;
    while (true) { co_yield a; auto c = a+b; a=b; b=c; }
}
int main() {
    auto gen = fibonacci();
    for (int i = 0; i < 10 && gen.next(); i++) std::cout << gen.value() << " ";
}`},

#include <functional>
template<typename T>
struct Task {
    struct promise_type {
        T result;
        std::coroutine_handle<> continuation;
        Task get_return_object() { return {std::coroutine_handle<promise_type>::from_promise(*this)}; }
        std::suspend_always initial_suspend() { return {}; }
        auto final_suspend() noexcept {
            struct Awaiter {
                std::coroutine_handle<> cont;
                bool await_ready() const noexcept { return false; }
                auto await_suspend(std::coroutine_handle<>) noexcept { return cont ? cont : std::noop_coroutine(); }
                void await_resume() noexcept {}
            };
            return Awaiter{continuation};
        }
        void return_value(T v) { result = std::move(v); }
        void unhandled_exception() { std::terminate(); }
    };
    std::coroutine_handle<promise_type> handle;

// AVX2を使って8つのfloatを同時に加算

void simd_add(float* a, const float* b, size_t n) {
    size_t i = 0;
    // 8つのfloatを同時処理
    for (; i + 8 <= n; i += 8) {
        __m256 va = _mm256_loadu_ps(a + i);
        __m256 vb = _mm256_loadu_ps(b + i);
        __m256 vr = _mm256_add_ps(va, vb);
        _mm256_storeu_ps(a + i, vr);
    }
    // 残り
    for (; i < n; i++) a[i] += b[i];
}

    {diff:3,q:"カスタムアロケータを使ったobject poolパターンを実装してください (O(1)のalloc/free)。",code:`template<typename T, size_t MaxObjects = 1024>
class ObjectPool {
    // 固定配列 + フリーリストで O(1) 確保/解放
};`,answer:`template<typename T, size_t N = 1024>
class ObjectPool {
    alignas(T) char storage[sizeof(T) * N];
    std::vector<T*> free_list;
public:
    ObjectPool() {
        for (size_t i = 0; i < N; i++)
            free_list.push_back(reinterpret_cast<T*>(storage) + i);
    }
    template<typename... Args>
    T* acquire(Args&&... args) {
        if (free_list.empty()) throw std::bad_alloc();
        T* p = free_list.back(); free_list.pop_back();
        return new(p) T(std::forward<Args>(args)...);
    }
    void release(T* p) {
        p->~T(); // 明示デストラクタ
        free_list.push_back(p);
    }
    size_t available() const { return free_list.size(); }
};`},

// 演算子+,-,*,/,dot,cross,normalize,length を実装`,answer:`#pragma once
#include <cmath>
#include <array>
template<size_t N, typename T = float>
struct Vec {
    std::array<T, N> data{};
    Vec() = default;
    template<typename... Args>
    Vec(Args... args) : data{static_cast<T>(args)...} {}
    T& operator[](size_t i) { return data[i]; }
    const T& operator[](size_t i) const { return data[i]; }
    Vec operator+(const Vec& o) const { Vec r; for(size_t i=0;i<N;i++) r[i]=data[i]+o[i]; return r; }
    Vec operator-(const Vec& o) const { Vec r; for(size_t i=0;i<N;i++) r[i]=data[i]-o[i]; return r; }
    Vec operator*(T s) const { Vec r; for(size_t i=0;i<N;i++) r[i]=data[i]*s; return r; }
    T dot(const Vec& o) const { T r=0; for(size_t i=0;i<N;i++) r+=data[i]*o[i]; return r; }
    T length() const { return std::sqrt(dot(*this)); }
    Vec normalize() const { return *this * (T(1)/length()); }
};
using Vec2 = Vec<2>; using Vec3 = Vec<3>; using Vec4 = Vec<4>;
inline Vec3 cross(const Vec3& a, const Vec3& b) {
    return {a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]};

std::vector<uint8_t> serialize(const T& obj) {
    static_assert(std::is_trivially_copyable_v<T>, "T must be trivially copyable");
    std::vector<uint8_t> buf(sizeof(T));

T deserialize(const std::vector<uint8_t>& data) {
    static_assert(std::is_trivially_copyable_v<T>, "T must be trivially copyable");

// contains, find_first, group_by, zip_with を実装`,answer:`#include <concepts>
#include <ranges>
#include <vector>
#include <map>
namespace algo {
    template<std::ranges::range R, typename T>
    bool contains(const R& range, const T& val)
        requires std::equality_comparable_with<std::ranges::range_value_t<R>, T>
    {
        return std::ranges::find(range, val) != std::ranges::end(range);
    }
    template<std::ranges::range R, typename Pred>
    auto find_first(R&& range, Pred pred)
    {
        auto it = std::ranges::find_if(range, pred);
        return it != std::ranges::end(range)
            ? std::optional{*it}
            : std::nullopt;
    }
    template<std::ranges::range R, typename KeyFn>
    auto group_by(const R& range, KeyFn key_fn) {
        using K = std::invoke_result_t<KeyFn, std::ranges::range_value_t<R>>;
        using V = std::ranges::range_value_t<R>;
        std::map<K, std::vector<V>> result;
        for (auto& e : range) result[key_fn(e)].push_back(e);
        return result;
    }
}`},

     {title:"字句解析 (Lexer)",body:`コンパイラはソースコードを読み取り、機械語に変換するソフトウェアです。処理は大きく「フロントエンド（字句解析→構文解析→意味解析）」と「バックエンド（最適化→コード生成）」に分かれます。\n\n字句解析（Lexer/Tokenizer）はソースコードの文字列をトークン（意味を持つ最小単位）に分解します。例えば \`3 + 4 * 2\` は \`[NUMBER:3, PLUS, NUMBER:4, STAR, NUMBER:2]\` になります。\n\nPythonで実装するとシンプルですが、C++で実装することで実際のコンパイラの動作を深く理解できます。実際のコンパイラ（GCC・Clang・MSVC）もこの原理で動いています。\n\nLLVMはコンパイラバックエンドフレームワークで、多くの言語のコンパイラがLLVMを使っています。C++で書かれており、C++ APIで操作できます。`,table:T.tokenTypes,code:`#include <string>
#include <vector>
#include <stdexcept>
#include <cctype>

enum class TokenType { NUMBER, PLUS, MINUS, STAR, SLASH, LPAREN, RPAREN, END };

struct Token {
    TokenType type;
    double value = 0;
};

class Lexer {
    std::string input;
    size_t pos = 0;
public:
    explicit Lexer(std::string s) : input(std::move(s)) {}

    Token next() {
        while (pos < input.size() && std::isspace(input[pos])) pos++;
        if (pos >= input.size()) return {TokenType::END};
        char c = input[pos++];
        if (std::isdigit(c)) {
            size_t start = pos - 1;
            while (pos < input.size() && (std::isdigit(input[pos]) || input[pos] == '.')) pos++;
            return {TokenType::NUMBER, std::stod(input.substr(start, pos-start))};
        }
        switch(c) {
            case '+': return {TokenType::PLUS};
            case '-': return {TokenType::MINUS};
            case '*': return {TokenType::STAR};
            case '/': return {TokenType::SLASH};
            case '(': return {TokenType::LPAREN};
            case ')': return {TokenType::RPAREN};
            default: throw std::runtime_error(std::string("Unknown: ") + c);
        }
    }

    std::vector<Token> tokenize() {
        std::vector<Token> tokens;
        Token t;
        while ((t = next()).type != TokenType::END) tokens.push_back(t);
        tokens.push_back({TokenType::END});
        return tokens;
    }
};`,afterCode:"実際のコンパイラでは、このトークン列を使って構文解析（パーサー）が行われます。次のセクションで実装します。"},
     {title:"再帰下降パーサーとAST",body:`構文解析（パーサー）はトークン列を受け取り、構文木（AST: Abstract Syntax Tree）を構築します。再帰下降パーサーは、文法規則をそのまま再帰関数として実装するシンプルな手法です。\n\n四則演算の文法は BNF で表すと: \`expr := term (('+' | '-') term)*\`、\`term := factor (('*' | '/') factor)*\`、\`factor := NUMBER | '(' expr ')'\` です。演算子の優先順位（* より + の方が低い）はこの文法の階層で表現されます。\n\nASTはノード（演算子・リテラル）のツリーとして表現します。\`unique_ptr\` でノードの所有権を管理することで、デストラクタが自動的にツリー全体を解放します。`,code:`struct ASTNode {
    char op = 0;   // '+', '-', '*', '/' or 0 (leaf)
    double value = 0;
    std::unique_ptr<ASTNode> left, right;

    static auto leaf(double v) {
        auto n = std::make_unique<ASTNode>();
        n->value = v; return n;
    }
    static auto binary(char op, std::unique_ptr<ASTNode> l, std::unique_ptr<ASTNode> r) {
        auto n = std::make_unique<ASTNode>();
        n->op = op; n->left = std::move(l); n->right = std::move(r); return n;
    }
};

double eval(const ASTNode* n) {
    if (!n->op) return n->value;
    double l = eval(n->left.get()), r = eval(n->right.get());
    switch(n->op) {
        case '+': return l + r; case '-': return l - r;
        case '*': return l * r; case '/': return l / r;
    }
    return 0;
}

// 使用例: eval(parse("3 + 4 * 2")) == 11`,afterCode:"完全なパーサーはtokenize()の結果を受け取り、parse_expr() → parse_term() → parse_factor() を再帰的に呼び出して実装します。演習問題でチャレンジしてください。"},

   sections:[
     {title:"GCアルゴリズムの種類と実装",body:`ガベージコレクタ（GC）はプログラムが明示的に解放しなくてもメモリを自動回収する仕組みです。C++はスマートポインタでRAIIベースのメモリ管理を行いますが、独自のVM（Pythonインタプリタ・Luaランタイムなど）を実装する場合はGCを自前で実装する必要があります。\n\nPythonのメモリ管理はまさにGCを使っています。CPythonは参照カウント+サイクルGCの組み合わせです。参照カウントは即座解放できますがサイクルを検出できません。サイクルGCでサイクルを定期的に回収します。\n\nマーク&スイープは最もシンプルなトレーシングGCです。ルート（グローバル変数・スタック変数）から到達可能なオブジェクトをマークし、マークされていないものを解放します。STW（Stop The World）ポーズが問題になるため、インクリメンタルGCや並行GCが開発されました。`,table:T.gcAlgorithms,code:`#include <vector>
#include <algorithm>
#include <iostream>

struct GcObject {
    bool marked = false;
    std::vector<GcObject*> refs; // このオブジェクトが参照するオブジェクト
    virtual ~GcObject() = default;
    virtual std::string name() const { return "Object"; }
};

class GC {
    std::vector<GcObject*> heap;
    std::vector<GcObject*> roots;

    void mark(GcObject* obj) {
        if (!obj || obj->marked) return;
        obj->marked = true;
        for (auto* ref : obj->refs) mark(ref);
    }

public:
    template<typename T, typename... Args>
    T* alloc(Args&&... args) {
        auto* obj = new T(std::forward<Args>(args)...);
        heap.push_back(obj);
        return obj;
    }

    void add_root(GcObject* r) { roots.push_back(r); }

    size_t collect() {
        for (auto* r : roots) mark(r); // Mark
        auto it = std::remove_if(heap.begin(), heap.end(),
            [](GcObject* o){ return !o->marked; });
        size_t freed = std::distance(it, heap.end());
        for (auto jt = it; jt != heap.end(); ++jt) delete *jt; // Sweep
        heap.erase(it, heap.end());
        for (auto* o : heap) o->marked = false; // リセット
        return freed;
    }

    size_t heap_size() const { return heap.size(); }
};`,afterCode:"世代別GCは「若いオブジェクトほど短命」という観察に基づきます。若い世代（Generation 0）を頻繁にスキャンし、生き残ったオブジェクトを年老いた世代（Generation 1, 2）に昇格させます。Javaや.NETのGCが採用しています。"},

     {title:"C++20コルーチン",body:`コルーチンは「実行を中断・再開できる関数」です。C++20で標準化されました。Pythonの \`yield\` を使ったジェネレータや \`async def\` に相当します。\n\nC++のコルーチンは3つのキーワードで制御します: \`co_yield\`（値を生成して中断）、\`co_await\`（非同期操作の完了を待機）、\`co_return\`（コルーチンを終了）。\n\nコルーチンの返り値型（\`Task<T>\`, \`Generator<T>\` 等）は \`promise_type\` という内部型を持つ必要があります。標準ライブラリには組み込みのコルーチン型がないため（C++23でRanges統合が進行中）、自前で実装するかライブラリ（cppcoro）を使います。\n\nRanges（\`<ranges>\`）はC++20で標準化された遅延評価パイプラインです。\`views::filter\` や \`views::transform\` を \`|\` 演算子でチェーンでき、Pythonのジェネレータ式に近い感覚で書けます。`,table:T.coroutineKeywords,code:`#include <coroutine>
#include <ranges>
#include <vector>
#include <iostream>

// シンプルなジェネレータ
template<typename T>
struct Generator {
    struct promise_type {
        T value_;
        Generator get_return_object() {
            return Generator{std::coroutine_handle<promise_type>::from_promise(*this)};
        }
        std::suspend_always initial_suspend() { return {}; }
        std::suspend_always final_suspend() noexcept { return {}; }
        std::suspend_always yield_value(T v) { value_ = v; return {}; }
        void return_void() {}
        void unhandled_exception() { std::terminate(); }
    };
    std::coroutine_handle<promise_type> handle_;
    ~Generator() { if (handle_) handle_.destroy(); }
    bool next() { handle_.resume(); return !handle_.done(); }
    T& value() { return handle_.promise().value_; }
};

Generator<int> range(int start, int end) {
    for (int i = start; i < end; i++) co_yield i;
}

int main() {
    // コルーチンジェネレータ
    auto gen = range(1, 6);
    while (gen.next()) std::cout << gen.value() << " ";
    std::cout << std::endl;

    // Ranges パイプライン (遅延評価)
    auto result = std::views::iota(1, 21)          // 1..20
        | std::views::filter([](int x){ return x % 2 == 0; }) // 偶数

#include <iostream>
#include <vector>

// コンセプト定義
template<typename T>
concept Addable = requires(T a, T b) { { a + b } -> std::same_as<T>; };

template<typename T>
concept Printable = requires(T t, std::ostream& os) {
    { os << t } -> std::same_as<std::ostream&>;
};

template<typename T>
concept Container = std::ranges::range<T> && requires(T c) {
    typename T::value_type;
    { c.size() } -> std::convertible_to<size_t>;
};

T sum_two(T a, T b) { return a + b; }

void print_container(const C& c) {
    for (const auto& e : c) std::cout << e << " ";
    std::cout << std::endl;
}

// AVX2版 (8 floatを同時処理)
void add_avx2(float* dst, const float* src, size_t n) {
    size_t i = 0;
    for (; i + 8 <= n; i += 8) {
        __m256 va = _mm256_loadu_ps(dst + i); // 256bit = 8 floats ロード

        __m256 vr = _mm256_add_ps(va, vb);    // 8 floats を同時加算

    for (; i < n; i++) dst[i] += src[i]; // 残り
}

     {title:"ヘッダーオンリーライブラリの設計",body:`C++ライブラリの配布形式には「ヘッダーオンリー（header-only）」と「コンパイル済みライブラリ（.a/.so）」があります。ヘッダーオンリーは使用者がコンパイルするため、ビルドシステムの設定が不要で使いやすい反面、コンパイル時間が増加します。\n\nヘッダーオンリーライブラリの実装には \`inline\` キーワードと \`template\` を駆使します。\`inline\` をつけることで複数の翻訳単位にインクルードされても「一つの定義則（ODR）」違反になりません。テンプレートは定義がヘッダーにある必要があります。\n\nfmt, nlohmann/json, Eigen, GLM など多くの著名C++ライブラリがヘッダーオンリーです。APIのバージョン管理、const correctness、noexcept指定、[[nodiscard]]属性など、公開APIの品質を高める原則があります。`,code:`// math_utils.hpp - ヘッダーオンリーライブラリの例
#pragma once
#include <cmath>
#include <type_traits>
#include <stdexcept>

namespace math_utils {

inline namespace v1 {

template<typename T>
concept Arithmetic = std::is_arithmetic_v<T>;

// [[nodiscard]]: 戻り値を無視するとコンパイル警告
template<Arithmetic T>
[[nodiscard]] constexpr T clamp(T val, T lo, T hi) noexcept {
    return val < lo ? lo : val > hi ? hi : val;
}

template<Arithmetic T>
[[nodiscard]] constexpr T lerp(T a, T b, T t) noexcept {
    return a + t * (b - a);
}

// noexcept(false) な操作
template<Arithmetic T>
[[nodiscard]] T safe_sqrt(T x) {
    if (x < 0) throw std::domain_error("sqrt of negative");
    return std::sqrt(x);
}

} // namespace v1
} // namespace math_utils`,afterCode:"公開APIのチェックリスト: (1) [[nodiscard]]で戻り値の無視を検出、(2) noexceptで例外保証を明示、(3) const正確性、(4) ムーブセマンティクス対応、(5) ドキュメント(Doxygen)。"},

   sections:[
     {title:"Polymorphic Memory Resources (PMR)",body:`C++17で導入された \`std::pmr\`（Polymorphic Memory Resources）は、メモリ確保の戦略をランタイムで切り替えられる仕組みです。\`std::pmr::vector<T>\` は \`std::pmr::memory_resource*\` を受け取り、そのリソースからメモリを確保します。\n\nPythonのメモリ管理はインタプリタが完全に制御しますが、C++では開発者がメモリ戦略を選べます。パフォーマンスクリティカルな場面では、GCやヒープ確保のオーバーヘッドを避けるためカスタムメモリリソースを使います。\n\n\`std::pmr::monotonic_buffer_resource\` はスタック上のバッファから一方向に確保するだけで解放はしません（解放はリソース自体を破棄した時に一括で行う）。スコープ内で大量に一時オブジェクトを作る場合に非常に高速です。Arenaアロケータとも呼ばれます。`,code:`#include <memory_resource>
#include <vector>
#include <array>
#include <string>
#include <iostream>

void arena_demo() {
    // 4KBのスタックバッファ
    std::array<std::byte, 4096> stack_buf;

    // スタックバッファからメモリを確保するリソース
    // フォールバック: バッファ不足時は new_delete_resource を使う
    std::pmr::monotonic_buffer_resource pool{
        stack_buf.data(), stack_buf.size(),
        std::pmr::new_delete_resource()
    };

    // ヒープ確保なし! スタックバッファから確保
    std::pmr::vector<std::pmr::string> words{&pool};
    words.emplace_back("hello", &pool);
    words.emplace_back("world", &pool);
    words.emplace_back("C++20", &pool);

    for (auto& w : words) std::cout << w << " ";
    std::cout << std::endl;
    // pool がスコープを抜けると全メモリを一括解放
}

// カスタムリソース: アロケーションをログ
class LoggingResource : public std::pmr::memory_resource {
    std::pmr::memory_resource* upstream_ = std::pmr::get_default_resource();
    size_t total_ = 0;
protected:
    void* do_allocate(size_t bytes, size_t align) override {
        total_ += bytes;
        std::cout << "Allocate " << bytes << " (total=" << total_ << ")\n";
        return upstream_->allocate(bytes, align);
    }
    void do_deallocate(void* p, size_t bytes, size_t align) override {
        total_ -= bytes;
        upstream_->deallocate(p, bytes, align);
    }
    bool do_is_equal(const memory_resource& o) const noexcept override {
        return this == &o;
    }
};`,afterCode:"pmrの主要クラス: (1) `monotonic_buffer_resource` - アリーナ(解放しない)、(2) `synchronized_pool_resource` - スレッドセーフプール、(3) `unsynchronized_pool_resource` - シングルスレッドプール。"},

   sections:[
     {title:"std::filesystemの高度な使用",body:`\`std::filesystem\`（C++17）はOSのファイルシステムをプラットフォーム非依存に操作できるライブラリです。Pythonの \`pathlib\` や \`os.path\` に相当します。\n\nパス操作は \`fs::path\` で行います。\`/\` 演算子でパスを結合できます（Python の \`pathlib.Path\` と同様）。\`stem()\`（拡張子なし名）、\`extension()\`、\`parent_path()\` などのメソッドがあります。\n\nディレクトリの再帰的な走査は \`fs::recursive_directory_iterator\` で行います。エラー処理には2通りの方法があります: (1) 例外版（デフォルト）、(2) \`std::error_code\` を渡す例外なし版。パフォーマンスクリティカルな場面では例外なし版を使います。`,code:`#include <filesystem>
#include <iostream>
#include <fstream>
#include <string>
#include <optional>

namespace fs = std::filesystem;

// ファイルを読んで内容を返す (エラーは optional で)
std::optional<std::string> read_file(const fs::path& path) {
    std::ifstream f(path);
    if (!f) return std::nullopt;
    return std::string{std::istreambuf_iterator<char>(f),
                       std::istreambuf_iterator<char>()};
}

// ディレクトリ内のファイルを拡張子でフィルタ
std::vector<fs::path> find_files(const fs::path& dir, const std::string& ext) {
    std::vector<fs::path> result;
    std::error_code ec; // 例外なし版
    for (auto& entry : fs::recursive_directory_iterator(dir, ec)) {
        if (ec) break; // エラーチェック
        if (entry.is_regular_file() && entry.path().extension() == ext)
            result.push_back(entry.path());
    }
    return result;
}

// ファイルシステム情報
void fs_info(const fs::path& p) {
    auto space = fs::space(p);
    std::cout << "Available: " << space.available / (1024*1024) << " MB" << std::endl;
    std::cout << "Capacity: " << space.capacity / (1024*1024) << " MB" << std::endl;
}`,afterCode:"fs::path は内部でOSのネイティブ文字型（Windowsでは wchar_t）を使います。string()メソッドでUTF-8文字列を取得できます。クロスプラットフォームなパス処理には fs::path が最適です。"},

   sections:[
     {title:"完成度の高いライブラリを設計する",body:`上級コースの総仕上げとして、C++20の機能をすべて駆使した数学ベクトルライブラリを実装します。このライブラリは: コンセプトによる型制約、\`constexpr\` による コンパイル時計算、\`operator<=>\` による比較、Ranges との統合、バイナリシリアライゼーション、Doxygen ドキュメントを含みます。\n\nライブラリを設計する際は「最小インターフェース原則」が重要です。公開するAPIは必要最小限にし、後から追加はできますが削除はABIを壊します。セマンティックバージョニング（semver.org）に従い、APIの変更はメジャーバージョンアップで行います。\n\nこのコースを修了することで、C++17/20の全主要機能を理解し、高品質なライブラリを設計・実装する能力を習得しました。次のステップはオープンソースのC++プロジェクトに貢献することです。`,code:`// vec.hpp - C++20 数学ベクトルライブラリ (完全版)
#pragma once
#include <array>
#include <cmath>
#include <concepts>
#include <iostream>
#include <numeric>
#include <compare>

namespace linalg {

template<size_t N, std::floating_point T = float>
class Vec {
    std::array<T, N> data_{};
public:
    Vec() = default;
    template<typename... Args>
        requires (sizeof...(Args) == N)
    constexpr Vec(Args&&... args) : data_{static_cast<T>(args)...} {}

    constexpr T& operator[](size_t i) { return data_[i]; }
    constexpr const T& operator[](size_t i) const { return data_[i]; }

    constexpr Vec operator+(const Vec& o) const noexcept {
        Vec r; for(size_t i=0;i<N;i++) r[i]=data_[i]+o[i]; return r;
    }
    constexpr Vec operator-(const Vec& o) const noexcept {
        Vec r; for(size_t i=0;i<N;i++) r[i]=data_[i]-o[i]; return r;
    }
    constexpr Vec operator*(T s) const noexcept {
        Vec r; for(size_t i=0;i<N;i++) r[i]=data_[i]*s; return r;
    }
    [[nodiscard]] constexpr T dot(const Vec& o) const noexcept {
        return std::inner_product(data_.begin(), data_.end(), o.data_.begin(), T{0});
    }
    [[nodiscard]] T length() const noexcept { return std::sqrt(dot(*this)); }
    [[nodiscard]] Vec normalize() const { return *this * (T(1) / length()); }
    auto operator<=>(const Vec&) const = default;
};

using Vec2 = Vec<2>; using Vec3 = Vec<3>; using Vec4 = Vec<4>;

inline Vec3 cross(const Vec3& a, const Vec3& b) noexcept {
    return {a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]};
}

template<size_t N, typename T>
std::ostream& operator<<(std::ostream& os, const Vec<N,T>& v) {
    os << "("; for(size_t i=0;i<N;i++){if(i>0)os<<",";os<<v[i];} return os<<")";
}
