      answer: "#include <stdio.h>\n#include <stdlib.h>\n\ntypedef struct Node { int value; struct Node *left, *right; } Node;\n\nNode* new_node(int val) {\n    Node *n = (Node*)malloc(sizeof(Node));\n    n->value=val; n->left=n->right=NULL; return n;\n}\nNode* insert(Node *root, int val) {\n    if (!root) return new_node(val);\n    if (val < root->value) root->left = insert(root->left, val);\n    else if (val > root->value) root->right = insert(root->right, val);\n    return root;\n}\nNode* search(Node *root, int val) {\n    if (!root || root->value==val) return root;\n    return val < root->value ? search(root->left,val) : search(root->right,val);\n}\nvoid inorder(Node *root) {\n    if (!root) return;\n    inorder(root->left); printf(\"%d \", root->value); inorder(root->right);\n}\nvoid free_tree(Node *root) {\n    if (!root) return;\n    free_tree(root->left); free_tree(root->right); free(root);\n}\nint main(void) {\n    Node *root=NULL;\n    int v[]={5,3,7,1,4,6,8};\n    for(int i=0;i<7;i++) root=insert(root,v[i]);\n    inorder(root); printf(\"\\n\");\n    printf(\"search(4): %s\\n\", search(root,4)?\"found\":\"not found\");\n    free_tree(root); return 0;\n}"

      code: "#include <stdio.h>\n#include <string.h>\n#include <stdlib.h>\n\n#define HM_SIZE 64\n\ntypedef struct { char key[64]; int value; int used; } Entry;\ntypedef struct { Entry entries[HM_SIZE]; } HashMap;\n\nvoid hm_init(HashMap *m);\nvoid hm_set(HashMap *m, const char *key, int val);\nint  hm_get(HashMap *m, const char *key, int *val);\n\nint main(void) {\n    HashMap m; hm_init(&m);\n    hm_set(&m, \"apple\", 100);\n    hm_set(&m, \"banana\", 200);\n    int v;\n    if (hm_get(&m, \"apple\", &v)) printf(\"apple=%d\\n\", v);\n    if (!hm_get(&m, \"cherry\", &v)) printf(\"cherry: not found\\n\");\n    return 0;\n}",
      answer: "#include <stdio.h>\n#include <string.h>\n#include <stdlib.h>\n\n#define HM_SIZE 64\ntypedef struct { char key[64]; int value; int used; } Entry;\ntypedef struct { Entry entries[HM_SIZE]; } HashMap;\n\nstatic unsigned fnv_hash(const char *s) {\n    unsigned h = 2166136261u;\n    for (; *s; s++) h = (h ^ (unsigned char)*s) * 16777619u;\n    return h % HM_SIZE;\n}\nvoid hm_init(HashMap *m) { memset(m, 0, sizeof(*m)); }\nvoid hm_set(HashMap *m, const char *key, int val) {\n    unsigned idx = fnv_hash(key);\n    for (int i = 0; i < HM_SIZE; i++) {\n        Entry *e = &m->entries[(idx+i) % HM_SIZE];\n        if (!e->used || strcmp(e->key,key)==0) {\n            strncpy(e->key,key,63); e->value=val; e->used=1; return;\n        }\n    }\n}\nint hm_get(HashMap *m, const char *key, int *val) {\n    unsigned idx = fnv_hash(key);\n    for (int i = 0; i < HM_SIZE; i++) {\n        Entry *e = &m->entries[(idx+i) % HM_SIZE];\n        if (!e->used) return 0;\n        if (strcmp(e->key,key)==0) { *val=e->value; return 1; }\n    }\n    return 0;\n}\nint main(void) {\n    HashMap m; hm_init(&m);\n    hm_set(&m,\"apple\",100); hm_set(&m,\"banana\",200);\n    int v;\n    if(hm_get(&m,\"apple\",&v)) printf(\"apple=%d\\n\",v);\n    if(!hm_get(&m,\"cherry\",&v)) printf(\"cherry: not found\\n\");\n    return 0;\n}"

      answer: "#include <stdio.h>\n#include <stdlib.h>\n#include <string.h>\n\n#define STACK_CAP 32\ntypedef struct { void *items[STACK_CAP]; size_t sizes[STACK_CAP]; int top; } GenStack;\n\nvoid gs_init(GenStack *s) { s->top = -1; }\nvoid gs_push(GenStack *s, const void *data, size_t size) {\n    if (s->top >= STACK_CAP-1) return;\n    s->items[++s->top] = malloc(size);\n    memcpy(s->items[s->top], data, size);\n    s->sizes[s->top] = size;\n}\nint gs_pop(GenStack *s, void *out, size_t *size) {\n    if (s->top < 0) return 0;\n    *size = s->sizes[s->top];\n    memcpy(out, s->items[s->top], *size);\n    free(s->items[s->top--]);\n    return 1;\n}\nvoid gs_free(GenStack *s) { while(s->top>=0) free(s->items[s->top--]); }\n\nint main(void) {\n    GenStack s; gs_init(&s);\n    int n=42; double d=3.14;\n    gs_push(&s,&n,sizeof(int)); gs_push(&s,&d,sizeof(double));\n    double od; size_t sz; gs_pop(&s,&od,&sz); printf(\"double: %f\\n\",od);\n    int oi; gs_pop(&s,&oi,&sz); printf(\"int: %d\\n\",oi);\n    gs_free(&s); return 0;\n}"

      diff: 3,
      q: "簡単なメモリプールアロケータを実装してください。\n・固定サイズブロック（32バイト）のプールを確保\n・pool_alloc() でブロックを取得、pool_free() で返却\n・フリーリストで空きブロックを管理\n\n【使う知識】フリーリスト, メモリ管理, union の活用",
      code: "#include <stdio.h>\n#include <stdlib.h>\n#include <string.h>\n\n#define BLOCK_SIZE 32\n#define POOL_CAPACITY 16\n\ntypedef struct Block { struct Block *next; char data[BLOCK_SIZE]; } Block;\ntypedef struct { Block *free_list; unsigned char pool[POOL_CAPACITY][sizeof(Block)]; int init; } MemPool;\n\nvoid pool_init(MemPool *p);\nvoid* pool_alloc(MemPool *p);\nvoid pool_free(MemPool *p, void *ptr);\n\nint main(void) {\n    MemPool pool; pool_init(&pool);\n    void *a = pool_alloc(&pool);\n    void *b = pool_alloc(&pool);\n    strcpy((char*)a, \"Hello\");\n    strcpy((char*)b, \"World\");\n    printf(\"%s %s\\n\", (char*)a, (char*)b);\n    pool_free(&pool, a);\n    void *c = pool_alloc(&pool); // a のブロックが再利用される\n    printf(\"reused: %p == %p: %d\\n\", a, c, a==c);\n    return 0;\n}",
      answer: "#include <stdio.h>\n#include <stdlib.h>\n#include <string.h>\n\n#define BLOCK_SIZE 32\n#define POOL_CAP 16\n\ntypedef union { void *next; char data[BLOCK_SIZE]; } Block;\n\ntypedef struct {\n    Block pool[POOL_CAP];\n    Block *free_list;\n} MemPool;\n\nvoid pool_init(MemPool *p) {\n    for (int i = 0; i < POOL_CAP-1; i++)\n        p->pool[i].next = &p->pool[i+1];\n    p->pool[POOL_CAP-1].next = NULL;\n    p->free_list = &p->pool[0];\n}\nvoid* pool_alloc(MemPool *p) {\n    if (!p->free_list) return NULL;\n    Block *b = p->free_list;\n    p->free_list = (Block*)b->next;\n    return b->data;\n}\nvoid pool_free(MemPool *p, void *ptr) {\n    Block *b = (Block*)((char*)ptr - offsetof(Block, data));\n    b->next = p->free_list; p->free_list = b;\n}\nint main(void) {\n    MemPool pool; pool_init(&pool);\n    char *a = pool_alloc(&pool);\n    char *b = pool_alloc(&pool);\n    strcpy(a,\"Hello\"); strcpy(b,\"World\");\n    printf(\"%s %s\\n\", a, b);\n    pool_free(&pool, a);\n    char *c = pool_alloc(&pool);\n    printf(\"reused: %d\\n\", a==c);\n    return 0;\n}"

    sections:[
      { title:"二分探索木（BST）の基本", body:"二分探索木は各ノードについて「左の子 < 自分 < 右の子」という不変条件を保つ木構造です。この性質のおかげで探索・挿入・削除が平均O(log n)で行えます。\n\nPythonのdict（ハッシュマップ）は同じ操作が平均O(1)ですが、BSTは「ソート済みの順序でデータを取り出せる」という追加の性質を持ちます。中順巡回（左→自分→右）でソート済みの順序が得られます。", table:T.treeOps, afterTable:"最悪O(n)になるのは、データがソート済みの順で挿入された場合です。この「木の偏り」を防ぐためにAVL木や赤黒木が存在します。STL の map は赤黒木ベースです。"},
      { title:"ヒープと優先度付きキュー", body:"ヒープは「親 >= 子」（最大ヒープ）または「親 <= 子」（最小ヒープ）という条件を保つ完全二分木です。最大値（または最小値）をO(1)で取得でき、挿入・削除はO(log n)です。\n\n配列で実装できるのがヒープの強みです。i番目のノードの左の子は 2i+1、右の子は 2i+2、親は (i-1)/2 という計算でアドレスが求まります。Pythonの heapq モジュールがまさにこれを使っています。", code:"// ヒープの配列表現\n//        0\n//       / \\\n//      1   2\n//     / \\ / \\\n//    3  4 5  6\n// 親: (i-1)/2, 左子: 2i+1, 右子: 2i+2\n\n// 最小ヒープの挿入\nvoid heap_push(int heap[], int *size, int val) {\n    heap[(*size)++] = val;\n    int i = *size - 1;\n    while (i > 0) {\n        int parent = (i-1)/2;\n        if (heap[parent] <= heap[i]) break;\n        int tmp = heap[parent]; heap[parent] = heap[i]; heap[i] = tmp;\n        i = parent;     // sift up\n    }\n}", afterCode:"Pythonの heapq.heappush / heapq.heappop がこの操作に対応します。C++ の std::priority_queue も内部はヒープです。"}

    sections:[
      { title:"プロセスの生成", body:"Unixシステムでプロセスを生成するのは fork() です。fork() を呼ぶと、呼び出しプロセスのほぼ完全なコピーが作られ、2つのプロセスが同じコードの続きから実行されます。戻り値で親（子のPIDが返る）と子（0が返る）を区別します。\n\nPythonの subprocess.Popen が内部でこれを使っています。exec系関数は現在のプロセスイメージを別のプログラムで置き換えます。fork+execの組み合わせで「別のプログラムを子プロセスとして実行する」という最もポータブルなパターンになります。", code:"#include <unistd.h>\n#include <sys/wait.h>\n#include <stdio.h>\n\nint main(void) {\n    pid_t pid = fork();\n    if (pid == 0) {\n        // 子プロセス\n        printf(\"子: PID=%d, 親PID=%d\\n\", getpid(), getppid());\n        _exit(0);  // exitの代わりに_exitを使う（バッファをflushしない）\n    } else {\n        // 親プロセス\n        printf(\"親: PID=%d, 子PID=%d\\n\", getpid(), pid);\n        int status;\n        waitpid(pid, &status, 0);  // 子の終了を待つ\n        printf(\"子の終了コード: %d\\n\", WEXITSTATUS(status));\n    }\n    return 0;\n}", afterCode:"fork の後、子は親のメモリをコピー・オン・ライト（CoW）で共有します。どちらかが書き込みを行った時点で実際のコピーが発生します。このためforkは「メモリをまるごとコピーするから遅い」というのは現代では正確ではありません。"}

    sections:[
      { title:"スレッドとプロセスの違い", body:"プロセスは独立したメモリ空間を持ちますが、スレッドは同じプロセス内のメモリを共有します。Pythonのthreadingモジュールが使うのと同じ概念ですが、CのGIL（Global Interpreter Lock）はなく、本当の並列実行が可能です。\n\nスレッドは生成コストが低く、データ共有が容易な反面、共有データへの同時アクセスに注意が必要です。排他制御（ミューテックス）を正しく使わないとレース条件やデータ破壊が発生します。", table:T.concurrency, afterTable:"デッドロックを避けるには: (1) ロックを常に同じ順序で取得する、(2) ロックを保持している間は他のロックを取得しない、(3) タイムアウト付きのロックを使う、といったパターンがあります。"},
      { title:"mutexによる排他制御", body:"pthread_mutex_t（ミューテックス）はロック機構で、lock/unlockの間に「1スレッドだけ実行可能」なクリティカルセクションを作ります。Pythonの threading.Lock() に対応します。\n\nミューテックスの使用で注意すべきは「ロック中に長い処理をしない」ことです。ロック中は他のスレッドが待機させられるため、パフォーマンスへの影響が大きくなります。クリティカルセクションはできるだけ短くするのが原則です。", code:"#include <pthread.h>\n#include <stdio.h>\n\nstatic long counter = 0;\nstatic pthread_mutex_t mu = PTHREAD_MUTEX_INITIALIZER;\n\nvoid* increment(void *n) {\n    long count = *(long*)n;\n    for (long i = 0; i < count; i++) {\n        pthread_mutex_lock(&mu);   // ロック取得\n        counter++;                 // クリティカルセクション\n        pthread_mutex_unlock(&mu); // ロック解放\n    }\n    return NULL;\n}\n\n// コンパイル: gcc -Wall -pthread prog.c -o prog", afterCode:"ミューテックスなしでcounterをインクリメントすると、複数スレッドが読み取り→加算→書き込みを同時に行い、一部のインクリメントが失われます（レース条件）。-fsanitize=thread（ThreadSanitizer）でレース条件を動的に検出できます。"}
    ]
  },
  { id:"ch7", num:7, title:"ネットワークプログラミング基礎", est:"50分",
    goal:"POSIX ソケットAPI（socket/bind/listen/accept/connect/send/recv）でTCP通信を実装できる。エコーサーバーとクライアントを書けるようになるのがゴール。",
    sections:[
      { title:"ソケットの基本概念", body:"ソケットはネットワーク通信のエンドポイントです。ファイルディスクリプタと同じように整数値で扱われ、read/write の代わりに send/recv を使います。PythonのsocketモジュールはこのPOSIX APIを薄くラップしたものです。\n\nTCPサーバーの流れ: socket()→bind()→listen()→accept()→recv()/send()→close() です。TCPクライアントの流れ: socket()→connect()→send()/recv()→close() です。", code:"// TCPサーバーの骨格\nint srv = socket(AF_INET, SOCK_STREAM, 0);\n\nstruct sockaddr_in addr = {\n    .sin_family = AF_INET,\n    .sin_port   = htons(8080),\n    .sin_addr   = {INADDR_ANY}\n};\nbind(srv, (struct sockaddr*)&addr, sizeof(addr));\nlisten(srv, SOMAXCONN);\n\nint cli = accept(srv, NULL, NULL);  // ブロックして待機\nchar buf[1024]; int n = recv(cli, buf, sizeof(buf)-1, 0);\nbuf[n] = 0;\nprintf(\"受信: %s\\n\", buf);\nsend(cli, buf, n, 0);  // エコーバック\nclose(cli); close(srv);", afterCode:"htons()（host-to-network short）はバイトオーダーをネットワーク標準（ビッグエンディアン）に変換します。異なるCPUアーキテクチャ間でも正しく通信するために必要です。"}
    ]

  { id:"ch8", num:8, title:"デバッグとメモリ安全", est:"40分",
    goal:"gdbの基本的なデバッグ操作（ブレークポイント・ステップ実行・変数表示）を使いこなせる。valgrindでメモリリーク・境界外アクセスを検出・修正できるようになるのがゴール。",
    sections:[
      { title:"gdbでのデバッグ", body:"Pythonにはpdbという対話型デバッガがありますが、Cではgdb（GNU Debugger）を使います。-g フラグでコンパイルするとデバッグ情報が含まれ、gdb でソースを参照しながらデバッグできます。\n\ngdbの基本コマンドを覚えるだけで、printf デバッグより格段に効率的なバグ調査ができます。特にセグメンテーション違反（segfault）の原因特定に威力を発揮します。", code:"# コンパイル（デバッグ情報付き）\ngcc -g -Wall -o prog prog.c\n\n# gdb起動\ngdb ./prog\n\n# よく使うコマンド:\n(gdb) run              # プログラム実行\n(gdb) break main       # main にブレークポイント\n(gdb) break 42         # 42行目にブレークポイント\n(gdb) next             # 次の行へ（関数を飛ばす）\n(gdb) step             # 次の行へ（関数内に入る）\n(gdb) print x          # 変数 x の値を表示\n(gdb) backtrace        # コールスタックを表示\n(gdb) continue         # 次のブレークポイントまで実行\n(gdb) quit             # 終了", afterCode:"segfaultのデバッグ手順: (1) -g でコンパイル (2) gdb ./prog で起動 (3) run で実行 (4) クラッシュしたら backtrace でコールスタック確認 (5) 問題の行にbreakしてステップ実行。"},
      { title:"valgrindによるメモリチェック", body:"valgrindはメモリエラー（リーク・境界外アクセス・未初期化変数の使用・二重free）を動的に検出するツールです。Pythonには同様の問題はGCが多くを防いでくれますが、Cではプログラマの責任です。\n\n--leak-check=full オプションで全メモリリークの詳細を報告します。AddressSanitizer（-fsanitize=address）はvalgrindよりも高速で、CI環境での自動検出に向いています。", code:"# valgrindでメモリチェック\nvalgrind --leak-check=full --show-leak-kinds=all ./prog\n\n# AddressSanitizerでチェック（GCC/Clang）\ngcc -g -fsanitize=address -o prog prog.c\n./prog   # エラー発生時に詳細を表示\n\n# よく見るvalgrindエラー:\n# \"Invalid read of size 4\" → 境界外読み取り\n# \"definitely lost: N bytes\" → メモリリーク\n# \"Invalid free()\" → 二重free", afterCode:"CIパイプラインでは -fsanitize=address,undefined を組み合わせると、アドレスエラーと未定義動作を両方検出できます。"}
    ]
  },
  { id:"ch9", num:9, title:"汎用プログラミング — void*とジェネリクス", est:"40分",
    goal:"void*を使った型消去パターンで「型を問わない」汎用データ構造・関数を実装できる。マクロやfunction-like macroでCにおける簡易ジェネリクスを実現できるのがゴール。",
    sections:[
      { title:"void* による型消去", body:"Cには言語レベルのジェネリクス（C++のテンプレートやRustのジェネリクスに相当するもの）がありません。代わりに void*（型なしポインタ）を使って「どんな型でも受け取れる関数」を作ります。qsort はその典型例です。\n\nトレードオフは「コンパイル時の型安全性が失われる」ことです。void* は任意の型に暗黙変換できてしまうため、誤った型を渡してもコンパイルエラーにならず、実行時に壊れた結果になります。型キャストを正確に行うことが重要です。", code:"// void* を使ったソート済み検索（bsearch）\n#include <stdio.h>\n#include <stdlib.h>\n\nint cmp_int(const void *a, const void *b) {\n    return *(const int*)a - *(const int*)b;\n}\n\nint main(void) {\n    int arr[] = {1,3,5,7,9,11,13};\n    int key = 7, n = 7;\n    qsort(arr, n, sizeof(int), cmp_int);\n    int *found = (int*)bsearch(&key, arr, n, sizeof(int), cmp_int);\n    printf(\"%s\\n\", found ? \"found\" : \"not found\");  // found\n    return 0;\n}", afterCode:"bsearch は標準ライブラリのバイナリサーチです。qsort でソート済みの配列に対して使います。Pythonのbisectモジュールに対応します。"}
    ]
  },
  { id:"ch10", num:10, title:"文字列処理とパーサー実装", est:"45分",
    goal:"C言語での文字列処理（strstr, strtok, sprintf, sscanf）を使いこなせる。状態機械を使って簡易パーサーを実装できるようになるのがゴール。",
    sections:[
      { title:"文字列操作の深掘り", body:"Pythonの豊富な文字列メソッド（split, find, replace, format）に対応するC言語の関数を覚えておきましょう。Pythonと違い、Cの文字列操作はすべて関数呼び出しで、元の文字列は変更されない（新しいバッファに書く）ことが多いです。\n\nstrtok はPythonの split に近い機能ですが、元の文字列を破壊的に変更する点が大きく異なります。スレッドセーフな版として strtok_r（POSIXのみ）があります。", code:"#include <stdio.h>\n#include <string.h>\n\nint main(void) {\n    // strtok: 分割（破壊的）\n    char s[] = \"Alice,Bob,Charlie\";\n    char *tok = strtok(s, \",\");\n    while (tok) {\n        printf(\"token: %s\\n\", tok);\n        tok = strtok(NULL, \",\");  // 2回目以降はNULL\n    }\n\n    // snprintf: 安全なフォーマット\n    char buf[64];\n    snprintf(buf, sizeof(buf), \"Hello, %s! You are %d.\", \"Alice\", 30);\n    printf(\"%s\\n\", buf);\n\n    // strstr: 部分文字列検索\n    const char *text = \"Hello, World!\";\n    const char *p = strstr(text, \"World\");\n    printf(\"Found at offset: %ld\\n\", p - text);  // 7\n    return 0;\n}", afterCode:"sprintf は出力バッファのオーバーフローを防げないため、常に snprintf を使います。Pythonの f文字列に最も近いのが snprintf で、最大バイト数を指定できます。"}
    ]

  { id:"ch11", num:11, title:"パフォーマンスとコンパイラ最適化", est:"45分",
    goal:"コンパイラの最適化フラグ（-O0〜-O3）の効果を理解し、clock()でベンチマークを計測できる。キャッシュ効率・インライン展開・ループアンローリングなどの最適化技法の基礎を把握するのがゴール。",
    sections:[
      { title:"コンパイラ最適化の種類", body:"GCCは -O フラグで最適化レベルを指定します。-O0（なし）から -O3（積極的）まであり、それぞれ異なる最適化が有効になります。一般的には -O2 が「速度と安全性のバランスがよい」として本番環境で使われます。\n\nコンパイラが行う主な最適化: インライン展開（小さな関数の呼び出しをそのまま展開）、不変コードのループ外移動（ループ内で変わらない計算を外に出す）、ベクトル化（ループをSIMD命令で高速化）、デッドコード除去（決して実行されないコードを除去）。", code:"// -O2以降の最適化が効く例\n// コンパイル: gcc -O2 -march=native prog.c -o prog\n\n// インライン展開: static inline を使ってコンパイラを促す\nstatic inline int fast_min(int a, int b) {\n    return a < b ? a : b;  // 関数呼び出しなしに展開される可能性\n}\n\n// restrict: このポインタが指すデータは他のポインタと重ならない（エイリアシング最適化）\nvoid add_arrays(float * restrict dst, const float * restrict src, int n) {\n    for (int i = 0; i < n; i++)\n        dst[i] += src[i];  // ベクトル化しやすくなる\n}", afterCode:"-march=native は実行マシンのCPUに合わせた命令セット（AVX2など）を使います。配布バイナリには使わないでください（古いCPUで動かない可能性があります）。"}
    ]

  { id:"ch12", num:12, title:"メモリアロケータとシステム設計", est:"60分",
    goal:"カスタムメモリアロケータ（プールアロケータ・スラブアロケータ）の設計と実装ができる。malloc/freeのオーバーヘッドを減らす場面とトレードオフを理解するのがゴール。",
    sections:[
      { title:"カスタムアロケータが必要な場面", body:"malloc/freeはシステムコール（brk/mmap）を呼ぶ可能性があり、汎用性ゆえに隠れたコストがあります。高頻度に同じサイズのオブジェクトを確保・解放するアプリケーション（ゲームエンジン・データベース）では、専用のカスタムアロケータで劇的な性能改善が得られます。\n\nプールアロケータは「同じサイズのオブジェクト専用」のアロケータで、フリーリストで空きブロックを管理します。alloc/freeがO(1)で、フラグメンテーションも起きません。Linuxカーネルのslabアロケータが同じ考え方です。", code:"// プールアロケータの核心: フリーリスト\n// 解放されたブロックは空きリストに繋がれる\n// ↓ allocated  ↓ freed  ↓ allocated  ↓ freed\n// [data       ][next→  ][data       ][next→NULL]\n//                  ↑\n//              free_list が指す\n\n// 確保: free_list の先頭を返してリストを縮める\n// 解放: ブロックをfree_listの先頭に追加", afterCode:"スタックアロケータ（線形アロケータ）はさらにシンプルで、単調増加するポインタでメモリを管理し、一括解放（reset）のみ行います。ゲームの1フレーム分のデータ確保などに使われます。"}
