#include <stdlib.h>
#include <string.h>

typedef struct { int id; char title[64]; } Task;
typedef struct { Task *data; int count, capacity; } TaskList;

void init_list(TaskList *list) {
    list->capacity = 4;
    list->data = (Task*)malloc(list->capacity * sizeof(Task));
    list->count = 0;
}

void push(TaskList *list, const char *title) {
    if (list->count >= list->capacity) {
        list->capacity *= 2;
        list->data = (Task*)realloc(list->data, list->capacity * sizeof(Task));
    }
    list->data[list->count].id = list->count + 1;
    strncpy(list->data[list->count].title, title, 63);
    list->count++;
}

void free_list(TaskList *list) { free(list->data); }

    TaskList list; init_list(&list);
    const char *t[] = {"A","B","C","D","E","F"};

    for (int i = 0; i < list.count; i++)

#include <stdlib.h>
#include <string.h>

typedef struct { char title[64]; int done; } Task;
typedef struct Node { Task task; struct Node *next; } Node;

Node* push_back(Node *head, const char *title) {
    Node *n = (Node*)malloc(sizeof(Node));
    strncpy(n->task.title, title, 63); n->task.done = 0; n->next = NULL;
    if (!head) return n;
    Node *p = head; while (p->next) p = p->next;
    p->next = n; return head;
}

void print_all(Node *head) {
    for (Node *p = head; p; p = p->next)
        printf("[%s] %s\\n", p->task.done?"完":"未", p->task.title);
}

void free_all(Node *head) {
    while (head) { Node *t = head->next; free(head); head = t; }
}

int main(void) {
    Node *head = NULL;
    head = push_back(head, "タスクA");
    head = push_back(head, "タスクB");
    head = push_back(head, "タスクC");
    print_all(head); free_all(head);
    return 0;
}`

    if (strcmp(head->task.title, title) == 0) {
        Node *next = head->next; free(head); return next;
    }
    Node *prev = head;

        prev = prev->next;
    if (prev->next) {
        Node *del = prev->next;
        prev->next = del->next;
        free(del);
    }
    return head;
}`

      answer: `#include <stdio.h>
#include <string.h>

#define MAX 10
typedef struct { int id; char title[64]; int done; } Task;

void save_tasks(Task tasks[], int count, const char *filename) {
    FILE *fp = fopen(filename, "w");
    if (!fp) { perror("save"); return; }
    for (int i = 0; i < count; i++)
        fprintf(fp, "%d,%s,%d\\n", tasks[i].id, tasks[i].title, tasks[i].done);
    fclose(fp);
}

int load_tasks(Task tasks[], const char *filename) {
    FILE *fp = fopen(filename, "r");
    if (!fp) return 0;
    int count = 0; char line[128];
    while (fgets(line, sizeof(line), fp) && count < MAX)
        if (sscanf(line, "%d,%63[^,],%d", &tasks[count].id, tasks[count].title, &tasks[count].done) == 3)
            count++;
    fclose(fp); return count;
}

int main(void) {
    Task tasks[MAX]; int count = 0;
    tasks[count++] = (Task){1, "買い物", 0};
    tasks[count++] = (Task){2, "勉強", 1};
    save_tasks(tasks, count, "tasks.csv");
    Task loaded[MAX]; int n = load_tasks(loaded, "tasks.csv");
    for (int i = 0; i < n; i++)
        printf("%d: %s [%d]\\n", loaded[i].id, loaded[i].title, loaded[i].done);
    return 0;

#define STACK_MAX 100

typedef struct {
    int ops[STACK_MAX];   // 操作ID を記録
    int top;              // スタックトップのインデックス
} OpStack;

void stack_init(OpStack *s) { s->top = -1; }
int  stack_empty(const OpStack *s) { return s->top < 0; }
void stack_push(OpStack *s, int op) {
    if (s->top < STACK_MAX - 1) s->ops[++s->top] = op;
}
int stack_pop(OpStack *s) {
    return s->top >= 0 ? s->ops[s->top--] : -1;
}
int stack_peek(const OpStack *s) {
    return s->top >= 0 ? s->ops[s->top] : -1;
}

    stack_init(&history);

    // タスク操作を記録

    stack_push(&history, 2);  // タスク2追加
    stack_push(&history, 3);  // タスク3追加

    goal: "Makefileの基本構文（ターゲット・依存関係・レシピ）を書けるようになる。make / make clean が動くMakefileを作成し、分割コンパイルの依存関係を自動管理できるようになるのがゴール。",
    sections: [
      {
        title: "Makefileの基本",
        body: "Makefileは「何をどのように作るか」を記述したビルドスクリプトです。Python でいえば pyproject.toml や setup.py に近いですが、任意のコマンドを実行できる汎用ビルドツールです。\n\nMakefileの構文は「ターゲット: 依存ファイル」という行の下に「タブ始まりのシェルコマンド」を書きます。make は依存ファイルのタイムスタンプを見て「変更されたファイルに関係するターゲットだけ再ビルド」します。これにより大規模プロジェクトでも変更した部分だけ高速に再ビルドできます。",
        code: `# Makefile（タブインデント必須）

CC      = gcc
CFLAGS  = -Wall -Wextra -std=c17 -g
TARGET  = task_app
SRCS    = main.c task.c
OBJS    = $(SRCS:.c=.o)   # .c を .o に置換

# デフォルトターゲット（make だけで実行）
all: $(TARGET)

# リンク
$(TARGET): $(OBJS)
	$(CC) $(CFLAGS) -o $@ $^

# コンパイル（パターンルール）
%.o: %.c task.h
	$(CC) $(CFLAGS) -c $< -o $@

# 後片付け
clean:
	rm -f $(OBJS) $(TARGET)

# 擬似ターゲット（ファイルではない）
.PHONY: all clean`,

    ]
  }
