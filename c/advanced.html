#include <ctype.h>

static const char *pos;

double expr(void);
double term(void);
double factor(void);

double parse(const char *s) {
    pos = s;
    return expr();
}

int main(void) {
    printf("%.2f\\n", parse("3+4*2"));       // 11.00

    answer: `#include <stdio.h>
#include <stdlib.h>
#include <ctype.h>

static const char *pos;

static void skip_ws(void) { while (isspace((unsigned char)*pos)) pos++; }
static double expr(void);
static double term(void);

static double factor(void) {
    skip_ws();
    if (*pos == '(') { pos++; double v = expr(); skip_ws(); pos++; return v; }
    char *end; double v = strtod(pos, &end); pos = end; return v;
}
static double term(void) {
    double v = factor();
    while (skip_ws(), (*pos=='*'||*pos=='/')) {
        char op = *pos++; double r = factor();
        v = op=='*' ? v*r : v/r;
    }
    return v;
}
static double expr(void) {
    double v = term();
    while (skip_ws(), (*pos=='+'||*pos=='-')) {
        char op = *pos++; double r = term();
        v = op=='+' ? v+r : v-r;
    }
    return v;
}
double parse(const char *s) { pos = s; return expr(); }

int main(void) {
    printf("%.2f\\n", parse("3+4*2"));
    printf("%.2f\\n", parse("(3+4)*2"));
    printf("%.2f\\n", parse("10/2-3"));
    return 0;
}`

    answer: `#include <stdio.h>
#include <string.h>
#include <stdint.h>

#define MEM_SIZE 30000

void bf_run(const char *prog) {
    uint8_t mem[MEM_SIZE]; memset(mem,0,sizeof(mem));
    int dp=0, ip=0, len=(int)strlen(prog);
    while (ip < len) {
        switch (prog[ip]) {
            case '>': dp++; break;
            case '<': dp--; break;
            case '+': mem[dp]++; break;
            case '-': mem[dp]--; break;
            case '.': putchar(mem[dp]); break;
            case ',': mem[dp]=(uint8_t)getchar(); break;
            case '[':
                if (!mem[dp]) {
                    int depth=1;
                    while (depth && ++ip<len)
                        depth += prog[ip]=='[' ? 1 : prog[ip]==']' ? -1 : 0;
                }
                break;
            case ']':
                if (mem[dp]) {
                    int depth=1;
                    while (depth && --ip>=0)
                        depth += prog[ip]==']' ? 1 : prog[ip]=='[' ? -1 : 0;
                }
                break;
        }
        ip++;
    }
}
int main(void) {
    bf_run("++++++++++[>+++++++>++++++++++>+++>+<<<<-]"
           ">++.>+.+++++++..+++.>++.<<+++++++++++++++."
           ">.+++.------.--------.>+.>.");

}`

    answer: `#include <stdio.h>
#include <stdlib.h>
#include <string.h>

typedef struct GCObj { void *data; size_t size; int marked; struct GCObj *next; } GCObj;

static GCObj *heap_list = NULL;
static void  *roots[32]; static int root_count=0;

void* gc_alloc(size_t sz) {
    GCObj *o = malloc(sizeof(GCObj));
    o->data = malloc(sz); o->size=sz; o->marked=0;
    o->next = heap_list; heap_list = o;
    return o->data;
}
void gc_add_root(void *p) { if(root_count<32) roots[root_count++]=p; }

static void mark_obj(void *ptr) {
    for (GCObj *o=heap_list; o; o=o->next)
        if (o->data==ptr) { o->marked=1; break; }
}
void gc_collect(void) {
    // Mark
    for (int i=0;i<root_count;i++) mark_obj(roots[i]);
    // Sweep
    GCObj **p = &heap_list;
    int freed=0;
    while (*p) {
        if (!(*p)->marked) {
            GCObj *dead = *p; *p = dead->next;
            free(dead->data); free(dead); freed++;
        } else { (*p)->marked=0; p=&(*p)->next; }
    }
    printf("[GC] freed %d objects\\n", freed);
}
void gc_shutdown(void) {
    for (GCObj *o=heap_list,*n; o; o=n) { n=o->next; free(o->data); free(o); }
}
int main(void) {
    int *a=gc_alloc(sizeof(int)); *a=42;
    int *b=gc_alloc(sizeof(int)); *b=99;
    gc_add_root(a);
    gc_collect();
    printf("a=%d\\n",*a);
    gc_shutdown(); return 0;
}`

    answer: `#include <stdio.h>
#include <string.h>
#include <stddef.h>

#define POOL_SIZE (64*1024)
static char pool[POOL_SIZE];

typedef struct Block { size_t size; int free; struct Block *next; } Block;
#define HEADER sizeof(Block)

void my_init(void) {
    Block *b = (Block*)pool;
    b->size = POOL_SIZE - HEADER; b->free = 1; b->next = NULL;
}

void* my_malloc(size_t req) {
    Block *best=NULL, *b=(Block*)pool;
    while (b) {
        if (b->free && b->size >= req)
            if (!best || b->size < best->size) best=b;
        b=b->next;
    }
    if (!best) return NULL;
    if (best->size >= req + HEADER + 8) {
        Block *split = (Block*)((char*)best + HEADER + req);
        split->size = best->size - req - HEADER;
        split->free = 1; split->next = best->next;
        best->size = req; best->next = split;
    }
    best->free = 0;
    return (char*)best + HEADER;
}

void my_free(void *ptr) {
    Block *b = (Block*)((char*)ptr - HEADER); b->free = 1;
    // Coalesce
    Block *p = (Block*)pool;
    while (p && p->next) {
        if (p->free && p->next->free) {
            p->size += HEADER + p->next->size; p->next = p->next->next;
        } else p=p->next;
    }
}

void my_dump(void) {
    Block *b=(Block*)pool; int i=0;
    while(b) { printf("[%d] size=%zu %s\\n",i++,(size_t)b->size,b->free?"free":"used"); b=b->next; }
}

void config_load(Config *cfg, const char *filename);
const char* config_get(const Config *cfg, const char *key);

int main(void) {

    answer: `#include <stdio.h>
#include <string.h>
#include <stdlib.h>
#include <ctype.h>

typedef struct { char key[128]; char value[256]; } KVPair;
typedef struct { KVPair pairs[256]; int count; } Config;

static void trim(char *s) {
    char *e = s + strlen(s) - 1;
    while (e>=s && isspace((unsigned char)*e)) *e--=0;
    while (*s && isspace((unsigned char)*s)) memmove(s,s+1,strlen(s));
}

void config_load(Config *cfg, const char *fn) {
    FILE *fp = fopen(fn,"r"); if(!fp) return;
    cfg->count=0;
    char line[512], section[64]="";
    while (fgets(line,sizeof(line),fp)) {
        trim(line);
        if (!*line || *line==';' || *line=='#') continue;
        if (*line=='[') {
            char *e=strchr(line,']'); if(e) *e=0;
            strncpy(section,line+1,sizeof(section)-1);
        } else {
            char *eq=strchr(line,'='); if(!eq) continue;
            *eq=0; trim(line); trim(eq+1);
            if (cfg->count<256) {
                snprintf(cfg->pairs[cfg->count].key,128,"%s.%s",section,line);
                strncpy(cfg->pairs[cfg->count].value,eq+1,255);
                cfg->count++;
            }
        }
    }
    fclose(fp);
}

const char* config_get(const Config *cfg, const char *key) {
    for (int i=0;i<cfg->count;i++)
        if (strcmp(cfg->pairs[i].key,key)==0) return cfg->pairs[i].value;
    return NULL;
}

int main(void) {
    // まずconfig.iniを作成
    FILE *f=fopen("config.ini","w");
    fprintf(f,"[server]\\nhost=localhost\\nport=8080\\n");
    fclose(f);
    Config cfg; config_load(&cfg,"config.ini");
    printf("host=%s\\n",config_get(&cfg,"server.host"));
    printf("port=%s\\n",config_get(&cfg,"server.port"));
    return 0;
}`

    answer: `#include <stdio.h>
#include <string.h>
#include <unistd.h>
#include <arpa/inet.h>
#include <time.h>

#define PORT 8080

void handle_client(int cli) {
    char buf[4096]; int n=recv(cli,buf,sizeof(buf)-1,0); if(n<=0) return;
    buf[n]=0;
    char method[8],path[256];
    sscanf(buf,"%7s %255s",method,path);

    char body[1024], response[2048];
    if (strcmp(path,"/")==0) {
        strcpy(body,"Hello from C HTTP Server!");
    } else if (strcmp(path,"/time")==0) {
        time_t t=time(NULL); char *ts=asctime(localtime(&t)); ts[strlen(ts)-1]=0;
        snprintf(body,sizeof(body),"Current time: %s",ts);
    } else {
        snprintf(response,sizeof(response),"HTTP/1.0 404 Not Found\\r\\nContent-Length:9\\r\\n\\r\\nNot Found");
        send(cli,response,strlen(response),0); return;
    }
    snprintf(response,sizeof(response),
        "HTTP/1.0 200 OK\\r\\nContent-Type: text/plain\\r\\nContent-Length: %zu\\r\\n\\r\\n%s",
        strlen(body),body);
    send(cli,response,strlen(response),0);
}

int main(void) {
    int srv=socket(AF_INET,SOCK_STREAM,0);
    int opt=1; setsockopt(srv,SOL_SOCKET,SO_REUSEADDR,&opt,sizeof(opt));
    struct sockaddr_in addr={AF_INET,htons(PORT),{INADDR_ANY}};
    bind(srv,(struct sockaddr*)&addr,sizeof(addr));
    listen(srv,5);
    printf("http://localhost:%d\\n",PORT);

}`

// strbuf.c

#include <string.h>

struct StrBuf {       // 定義はここだけ（.cファイル）
    char  *data;
    int    len;
    int    cap;
};

StrBuf* strbuf_new(void) {
    StrBuf *sb=malloc(sizeof(StrBuf));
    sb->cap=64; sb->data=malloc(sb->cap); sb->data[0]=0; sb->len=0;
    return sb;
}
void strbuf_append(StrBuf *sb, const char *s) {
    int add=(int)strlen(s);
    if (sb->len+add+1 > sb->cap) {
        while (sb->cap < sb->len+add+1) sb->cap*=2;
        sb->data=realloc(sb->data,sb->cap);
    }
    memcpy(sb->data+sb->len,s,add+1); sb->len+=add;
}
const char* strbuf_get(const StrBuf *sb) { return sb->data; }
int strbuf_len(const StrBuf *sb) { return sb->len; }
void strbuf_free(StrBuf *sb) { free(sb->data); free(sb); }

    sections:[
      { title:"GCの種類とトレードオフ", body:"ガベージコレクターはプログラマが手動でfreeを書かなくてよいようにする自動メモリ管理機構です。Python、Java、GoなどがGCを持ちます。C言語自体はGCを持ちませんが、C言語でGCを実装することでGCの仕組みを深く理解できます。\n\n主なGCの種類: マーク&スイープ（到達不可能なオブジェクトをまとめて回収）、参照カウント（Pythonがこれを使用、循環参照は別途処理）、コピーGC（生きているオブジェクトを別の領域にコピー）、世代別GC（若いオブジェクトを頻繁に回収）。", code:`// マーク&スイープの疑似コード\nvoid gc_collect() {\n    // フェーズ1: マーク\n    for (root : gc_roots)  // ルートから到達可能なオブジェクトを全てマーク\n        mark(root);\n\n    // フェーズ2: スイープ\n    for (obj : all_objects)\n        if (!obj->marked)\n            free(obj);         // 到達不可能 → 解放\n        else\n            obj->marked = false; // マーククリア（次回のため）\n}`, afterCode:"マーク&スイープの「Stop-the-World」（GC中は全スレッドを一時停止する）問題が、Go・JavaなどがConcurrent GCに進化した背景です。"},
      { title:"ルートセットとマーキング", body:"GCのルートセットは「プログラムが直接参照できるオブジェクトの集合」です。グローバル変数、現在のスタックフレームの変数、CPUレジスタなどが含まれます。ルートから到達可能な全オブジェクトを「生きている」と判定し、それ以外は回収します。\n\nCで実装する場合、ルートの追跡は明示的に行う必要があります（コンパイラがスタックのレイアウトを教えてくれないため）。gc_add_root() で手動登録するか、保守的GC（スタック上の全ワードをポインタかもしれないとみなす）を使います。", code:`// 保守的GCの考え方（Boehm GCが採用）\n// スタックポインタからフレームポインタまでの全ワードを\n// 「ポインタかもしれない値」として扱い、\n// GCヒープ内のアドレスであれば参照があると見なす\n\n// 精度は低いが実装が簡単で、既存のCコードに追加できる\n// Boehm GC: gc_malloc() で確保するだけで自動GCが有効になる`, afterCode:"PythonのCPython実装は参照カウント + サイクル検出（mark-and-sweep）のハイブリッドです。参照カウントは即時回収できますが、循環参照（a→b→a）は別途mark-and-sweepで処理します。"}
    ]
  },
  { id:"ch6", num:6, title:"オブジェクト指向をCで模倣", est:"50分",
    goal:"vtable（仮想関数テーブル）パターンでCにポリモーフィズムを実装できる。C++の内部実装を理解し、「C++はCの上に何を追加したのか」を具体的に説明できるようになるのがゴール。",
    sections:[
      { title:"vtableとポリモーフィズム", body:"C++の「仮想関数」は内部では vtable（virtual function table）という関数ポインタの配列で実装されています。クラスの各インスタンスは vtable へのポインタを持ち、仮想関数呼び出し時は vtable 経由で適切な実装が呼ばれます（動的ディスパッチ）。\n\nこれをCで再現することで「C++がCよりどこで遅くなるか」「なぜGoはインターフェースを使うと少し遅くなるのか」が理解できます。vtableのポインタをたどる間接参照が1回余分に発生するためです。", code:`// C++のオブジェクトモデル（概念）\nclass Shape {\npublic:\n    virtual double area() = 0;  // 仮想関数\n};\n// Shapeのインスタンスのメモリレイアウト:\n// [vptr | データフィールド]\n//   ↓\n// vtable: [area実装のアドレス]\n\n// これをCで再現すると:\nstruct Shape { const Vtable *vt; /* データ */ };`, afterCode:"C++の virtual 関数呼び出しは「vptr の参照 + vtable の参照 + 実際の関数ポインタの参照 + 関数実行」の3段階の間接参照です。これが「仮想関数は遅い」と言われる理由ですが、現代のCPUとコンパイラで最適化すると通常は無視できるオーバーヘッドです。"}
    ]
  },
  { id:"ch7", num:7, title:"コルーチンと非同期処理", est:"55min",
    goal:"C言語でコルーチンを実装する主要な方法（setjmp/longjmp, ucontext_t）を理解し、協調的マルチタスクのデモを書ける。Go の goroutine や Python の asyncio が内部で行っていることの概念的な理解がゴール。",
    sections:[
      { title:"コルーチンとは", body:"コルーチンは「途中で処理を中断し、後で再開できる関数」です。PythonのgeneratorやPython 3.5+のasync/awaitがこれを使います。Goのgoroutineはコルーチンのスケジューラー込みの実装です。\n\nスレッドはOSが切り替えますが（プリエンプティブ）、コルーチンはプログラム自身が切り替え点を決めます（協調的）。コンテキストスイッチのコストがスレッドより桁違いに小さいため、多数の並行処理に向いています。", table:T.coroutine, afterTable:"Go の runtime は協調的コルーチンにプリエンプティブなタイマーを組み合わせて「どのgoroutineも長時間CPUを独占できない」ようにしています（Go 1.14以降）。"},
      { title:"setjmp/longjmによるコンテキスト切り替え", body:"setjmp はCPUレジスタ（スタックポインタ・プログラムカウンタ含む）を jmp_buf に保存します。longjmp はその状態に戻ります。コルーチンの実装では、各コルーチンが独自のスタックと jmp_buf を持ち、yield() で現在のコンテキストを保存して別のコルーチンに制御を移します。\n\n完全な実装には独自スタックの確保（mmap または malloc）とスタックポインタの操作が必要で、アセンブリまたは ucontext_t が必要です。setjmp/longjmp だけでは独立したスタックを切り替えられません。", code:`// ucontext_tを使った正しいコルーチン実装\n#include <ucontext.h>\n\nucontext_t main_ctx, coro_ctx;\nchar coro_stack[65536];\n\nvoid coro_fn(void) {\n    printf("コルーチン: ステップ1\\n");\n    swapcontext(&coro_ctx, &main_ctx);  // メインに戻る\n    printf("コルーチン: ステップ2\\n");\n    swapcontext(&coro_ctx, &main_ctx);  // メインに戻る\n}\n\nint main(void) {\n    getcontext(&coro_ctx);\n    coro_ctx.uc_stack.ss_sp = coro_stack;\n    coro_ctx.uc_stack.ss_size = sizeof(coro_stack);\n    coro_ctx.uc_link = &main_ctx;\n    makecontext(&coro_ctx, coro_fn, 0);\n\n    swapcontext(&main_ctx, &coro_ctx);  // コルーチン実行\n    printf("メイン: 再開\\n");\n    swapcontext(&main_ctx, &coro_ctx);  // コルーチン再開\n    printf("メイン: 終了\\n");\n    return 0;\n}`, afterCode:"ucontext_t は macOS でも使えますが非推奨です。macOS では libdill や libcoro などのサードパーティライブラリを使うか、プラットフォーム固有のAPIを使うのが実践的です。"}
    ]
  },
  { id:"ch8", num:8, title:"カスタムメモリアロケータの設計", est:"60分",
    goal:"best-fit、first-fit、バディシステムなど複数の空きブロック選択アルゴリズムの違いを理解し、フラグメンテーションの合体（coalescing）を含む完全なアロケータを実装できることがゴール。",
    sections:[
      { title:"アロケータの設計指針", body:"メモリアロケータの性能評価基準は3つです：速度（malloc/freeの時間）、スペース効率（フラグメンテーションの少なさ）、スレッドセーフ性（複数スレッドからの同時呼び出し）です。これらはしばしばトレードオフになります。\n\nfirst-fit（最初の十分なブロック）は高速ですが外部フラグメンテーションが起きやすい。best-fit（最も小さな十分なブロック）はフラグメンテーションを抑えますが検索が遅い。バディシステムは2の冪乗サイズのブロックで管理し、分割と合体が高速です。", code:`// アロケータアルゴリズムの比較\n// first-fit: フリーリストを先頭から探して最初の合致を使用 → O(n)\n// best-fit:  フリーリスト全体を探して最小合致を使用     → O(n), 無駄が少ない\n// next-fit:  前回の検索を終えた位置から再開              → O(n), キャッシュ効率↑\n// buddy:     2のべき乗サイズで管理、分割/合体が O(log n)`, afterCode:"glibcの malloc は ptmalloc2 というアルゴリズムで、スレッドごとのアリーナ（独立したヒープ）を使ってロック競合を最小化します。"},
      { title:"フラグメンテーションと合体", body:"メモリを確保・解放を繰り返すと、空き領域が細切れになる「フラグメンテーション」が起きます。外部フラグメンテーション（全体の空き容量は十分でも、連続した大きなブロックがない状態）と内部フラグメンテーション（確保したブロックの一部が使われない状態）の2種類があります。\n\n合体（coalescing）は隣接する空きブロックを結合する操作で、外部フラグメンテーションを防ぎます。ブロックヘッダに「前のブロックへの参照」を持たせる（double linked free list）と、O(1)で隣接する空きブロックを見つけて合体できます。", code:`// ブロックヘッダの設計（実際のmalloc実装に近い形）\ntypedef struct Block {\n    size_t        prev_size;  // 前のブロックのサイズ（合体用）\n    size_t        size;       // このブロックのサイズ（+最下位ビットでfreeフラグ）\n    struct Block *fd;         // フリーリストの次\n    struct Block *bk;         // フリーリストの前\n} Block;\n\n// #define IS_FREE(b)  ((b)->size & 1)\n// #define DATA(b)     ((void*)((char*)(b) + sizeof(Block)))`, afterCode:"glibcのmalloc実装（mallocソースコードはglibc-2.x.tar.xzに含まれる）は非常に参考になります。約5000行のCコードで、上記の概念が全て実装されています。"}
    ]
  },
  { id:"ch9", num:9, title:"ELF形式とバイナリ解析", est:"50分",
    goal:"ELF（Executable and Linkable Format）の構造（セクション・セグメント・シンボルテーブル）を理解し、Cで ELFヘッダを読んで情報を表示できるようになる。nm, objdump, readelf の出力を読めることがゴール。",
    sections:[
      { title:"ELFファイルの構造", body:"LinuxのELF（Executable and Linkable Format）はバイナリファイルのフォーマット仕様です。実行ファイル、共有ライブラリ（.so）、オブジェクトファイル（.o）の全てがELF形式です。ELFヘッダにはアーキテクチャ情報・エントリポイント・セクションとセグメントの場所が記録されています。\n\nプログラムが起動する際、OSのローダーがELFを読んでメモリにマップし、動的リンカが必要な共有ライブラリをロードしてから、エントリポイント（通常は_start → main）に制御を渡します。", table:T.linkerScript, afterTable:"nm -D libXxx.so でライブラリがエクスポートするシンボル一覧、objdump -d prog でアセンブリ逆アセンブル、readelf -h prog でELFヘッダ詳細が見えます。"},
      { title:"デバッグ情報とDWARF", body:"gdb でソースコード行番号を参照できるのは、-g フラグでコンパイルされたバイナリに DWARF（Debugging With Attributed Record Formats）形式のデバッグ情報が埋め込まれているためです。DWARF は「機械語アドレスとソースの行番号の対応」「変数のアドレスと型」「コールスタックのフレームレイアウト」などを記述します。\n\nDWARFはELFの .debug_* セクション群に格納されます。strip コマンドでデバッグ情報を削除すると実行ファイルサイズが大幅に減ります。本番配布時は strip したバイナリと、デバッグ用の debug symbols を分離するのが一般的です。", code:`# デバッグ情報の確認\nreadelf --debug-dump=info prog | head -50\n\n# シンボルテーブルの確認\nnm -n prog  # アドレス順\nnm -u prog  # 未定義シンボル（外部ライブラリから来るもの）\n\n# アセンブリの確認\nobjdump -d -M intel prog | head -50  # Intel構文で表示\n\n# セクションサイズ\nsize prog`, afterCode:"perf stat ./prog でCPU使用率・キャッシュミス・分岐予測ミスなどの統計が取れます。パフォーマンスチューニングの出発点として活用できます。"}
    ]
  },
  { id:"ch10", num:10, title:"パーサー実装とDSL設計", est:"60分",
    goal:"設定ファイル（INI/TOML風）のパーサーを実装できる。字句解析→構文解析→データ格納の全工程を実装し、エラーメッセージを丁寧に出せるパーサーを設計できるようになるのがゴール。",
    sections:[
      { title:"INIパーサーの設計", body:"設定ファイルのパーサーは実用的かつ学習に最適な題材です。[section] / key=value という INI 形式を解析するには、行ごとにトークンを識別してセクション名とキー・値を抽出します。\n\nPythonのconfigparserがこれを行います。Cで実装することで「文字列処理の基礎（strstr, sscanf, strtok）」「エラーハンドリング（行番号付きのエラーメッセージ）」「ハッシュマップでの値の格納」を組み合わせた実践的なコードが書けます。", code:`// INIファイル形式の例\n// [server]\n// host = localhost    ; コメントもOK\n// port = 8080\n//\n// [database]\n// url  = postgres://localhost/mydb\n// pool = 10\n\n// パーサーの処理フロー:\n// 1. 1行読む\n// 2. 先頭の空白をスキップ\n// 3. # または ; で始まる行はスキップ（コメント）\n// 4. [ で始まる行はセクション名\n// 5. = を含む行はキー=値\n// 6. ハッシュマップに \"section.key\" → \"value\" で格納`, afterCode:"エラーメッセージに行番号を含めると（例: \"config.ini:5: syntax error: missing '='\"）ユーザーが問題箇所を特定しやすくなります。プロフェッショナルなパーサーは行番号追跡を必ず実装します。"}
    ]
  },
  { id:"ch11", num:11, title:"HTTPサーバーとネットワークアプリ", est:"60min",
    goal:"マルチスレッドのHTTPサーバーを実装できる。HTTPリクエストのパース、レスポンスのフォーマット、クライアントごとのスレッド生成と安全な接続管理ができることがゴール。",
    sections:[
      { title:"HTTPプロトコルの実装", body:"HTTPはテキストベースのプロトコルです。GETリクエストは「GET /path HTTP/1.1\\r\\nHost: example.com\\r\\n\\r\\n」という形式で、ヘッダとボディは「\\r\\n\\r\\n」で区切られます。Cのソケットとsend/recvだけで完全なHTTPサーバーが実装できます。\n\nPythonのhttpサーバー（http.server.HTTPServer）もソケットAPIの上に構築されており、Cの実装を理解すると「Pythonのフレームワークが裏で何をしているか」が明確になります。", code:`// HTTPリクエストの形式\n// GET / HTTP/1.1\\r\\n\n// Host: localhost\\r\\n\n// \\r\\n\n\n// HTTPレスポンスの形式\n// HTTP/1.0 200 OK\\r\\n\n// Content-Type: text/html\\r\\n\n// Content-Length: 12\\r\\n\n// \\r\\n\n// Hello World!\n\n// パース: 最初の行からメソッドとパスを取得\n// sscanf(buf, "%s %s", method, path);`, afterCode:"HTTP/1.1のKeep-Alive（接続の再利用）を実装するには、Content-Lengthでボディの終わりを判定してから次のリクエストを待つ必要があります。このためrecvを単純にループするだけでは不十分で、パーサーがより複雑になります。"},
      { title:"マルチスレッドサーバー", body:"1つのクライアントに処理中は他のクライアントが待たされる単純なサーバーから、acceptしたら新しいスレッドで処理するマルチスレッドサーバーに拡張します。スレッドプール（固定数のワーカースレッドとキューを使う方式）はさらに効率的です。\n\npthread_create でクライアントごとにスレッドを作るシンプルな実装は、同時接続数に比例してスレッドが増えメモリを消費します。実用的なサーバーではepoll（Linux）やkqueue（macOS）による非同期I/Oと少数のスレッドを組み合わせます（nginxやlighttpdが採用）。", code:`// スレッドプールの概念\nvoid* worker(void *arg) {\n    TaskQueue *q = (TaskQueue*)arg;\n    while (1) {\n        int fd = queue_dequeue(q);  // タスク待ち（ブロック）\n        handle_client(fd);\n        close(fd);\n    }\n    return NULL;\n}\n\n// メインスレッド\nfor (int i = 0; i < N_WORKERS; i++)\n    pthread_create(&threads[i], NULL, worker, &queue);\n\nwhile (1) {\n    int cli = accept(srv, NULL, NULL);\n    queue_enqueue(&queue, cli);  // ワーカーに渡す\n}`, afterCode:"非同期I/OはLinuxのepoll, macOSのkqueue, FreeBSDのkqueueを使います。Pythonのasyncioも内部ではselectorsモジュールを通じてこれらのAPIを使用しています。"}
    ]
  },
  { id:"ch12", num:12, title:"ライブラリ設計とAPIデザイン", est:"55min",
    goal:"再利用可能なCライブラリを設計できる。opaque型・エラーコード・リソース管理のAPIを正しく設計し、ユーザーが安全かつ簡単に使えるAPIを提供できることがゴール。",
    sections:[
      { title:"良いAPIの設計原則", body:"ライブラリのAPIは「使いやすく、安全で、将来の変更に耐える」ことが重要です。C言語では特に「リソース所有権の明確化」「エラー伝播の一貫性」「opaque型による実装の隠蔽」が鍵になります。\n\nPythonのwith文（コンテキストマネージャー）に対応するCのパターンは「init→use→cleanup」です。CleanupをGOTO（集中型のクリーンアップ処理）や __attribute__((cleanup)) で自動化するアプローチもあります。", table:T.abiPrinciples, afterTable:"良いAPIの指標: 「正しく使うのが最も簡単」「誤った使い方はコンパイルエラーになる（または即座にクラッシュしてデバッグが簡単）」「リソースリークを起こしにくい」の3点。"},
      { title:"エラーハンドリングパターン", body:"Cには例外がないため、エラー伝播は関数の戻り値とerrnoを使います。標準的なパターンは「成功は0（またはNULL以外のポインタ）、失敗は負の値（またはNULL）」です。エラーコードをenumで定義し、err_to_string() で人間可読なメッセージを提供するとユーザーフレンドリーになります。\n\nGOTOを使ったエラー処理パターン（カーネルコードで多用される）は「複数のリソースを確保してエラー時に全て解放する」処理をスパゲッティにならず書けます。if(err) goto cleanup; という形でエラーチェックを統一します。", code:`// GOTOを使ったリソース管理パターン\nint do_work(const char *path) {\n    int   fd  = -1;\n    void *buf = NULL;\n    int   ret = -1;\n\n    fd = open(path, O_RDONLY);\n    if (fd < 0) { ret = -errno; goto cleanup; }\n\n    buf = malloc(BUF_SIZE);\n    if (!buf) { ret = -ENOMEM; goto cleanup; }\n\n    // ... 実際の処理 ...\n    ret = 0;  // 成功\n\ncleanup:\n    free(buf);\n    if (fd >= 0) close(fd);\n    return ret;\n}`, afterCode:"Linuxカーネルのコードは goto cleanup パターンを徹底的に使っており、エラーハンドリングがとても読みやすくなっています。C言語でgotoを「まともに使う」数少ない正当な用途です。"}
    ]
  }
];
