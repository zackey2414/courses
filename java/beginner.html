  {
    id:"ch1",num:1,title:"Mavenプロジェクト構成とHello CLI",
    goal:"mavenでJavaプロジェクトを新規作成し、Mavenのディレクトリ構造・pom.xml・ビルドライフサイクルを理解して最初のCLI出力を実行できる。",
    sections:[
      {
        title:"Mavenプロジェクトの作成",
        body:"JavaTodoプロジェクトを通じて初級コースを進めます。まずMavenでプロジェクト雛形を生成します。Pythonではvenvやpoetryで仮想環境を作りますが、Javaではビルドツール（Maven/Gradle）がプロジェクト構造・依存管理・ビルドを一括で管理します。\n\nMavenのディレクトリ規約：src/main/java（本番コード）、src/test/java（テストコード）、src/main/resources（設定ファイル等）。pom.xml（Project Object Model）がPythonのpyproject.tomlに相当し、groupId・artifactId・version（GAV座標）でプロジェクトを識別します。\n\nMavenの主要コマンド：mvn compile（コンパイル）、mvn test（テスト実行）、mvn package（JARパッケージ）、mvn clean（ビルド成果物削除）、mvn dependency:tree（依存ツリー表示）。これらのコマンドを組み合わせてビルドパイプラインを構築します。",
        code:"# プロジェクト作成\nmvn archetype:generate \\\n  -DgroupId=com.example.todo \\\n  -DartifactId=javatodo \\\n  -DarchetypeArtifactId=maven-archetype-quickstart \\\n  -DarchetypeVersion=1.4 \\\n  -DinteractiveMode=false\n\ncd javatodo\n\n# ディレクトリ構造\njavatodo/\n├── pom.xml\n└── src/\n    ├── main/\n    │   └── java/com/example/todo/\n    │       └── App.java\n    └── test/\n        └── java/com/example/todo/\n            └── AppTest.java",
        afterCode:"IntelliJ IDEAを使っている場合はFile > New > Project > Maven からGUIで作成できます。pom.xmlを開くとIDEが自動で依存関係をダウンロードします。",
      },
      {
        title:"pom.xmlの設定とmain-classの指定",
        body:"pom.xmlにJava 21のコンパイルターゲット・JUnit 5・picocli・Jacksonを追加します。maven-shade-pluginを使うと依存関係をすべて含んだfat JAR（uber JAR）を作成でき、java -jar javatodo.jar で実行できます。\n\nmaven-shade-pluginのManifest設定でMain-Classを指定することで、JARを直接実行可能にします。これはPythonの if __name__ == \"__main__\": エントリポイントに相当するJavaの慣例です。\n\nJVMのデフォルトエンコーディングをUTF-8に固定するには、JAVA_TOOL_OPTIONS=-Dfile.encoding=UTF-8 環境変数を設定するか、pom.xmlでproject.build.sourceEncoding=UTF-8を指定します（特に日本語を扱う場合に重要）。",
        code:"<!-- pom.xml -->\n<project>\n  <modelVersion>4.0.0</modelVersion>\n  <groupId>com.example.todo</groupId>\n  <artifactId>javatodo</artifactId>\n  <version>1.0-SNAPSHOT</version>\n\n  <properties>\n    <java.version>21</java.version>\n    <maven.compiler.source>21</maven.compiler.source>\n    <maven.compiler.target>21</maven.compiler.target>\n    <project.build.sourceEncoding>UTF-8</project.build.sourceEncoding>\n  </properties>\n\n  <dependencies>\n    <!-- picocli: CLIパーサー -->\n    <dependency>\n      <groupId>info.picocli</groupId>\n      <artifactId>picocli</artifactId>\n      <version>4.7.5</version>\n    </dependency>\n    <!-- Jackson: JSON処理 -->\n    <dependency>\n      <groupId>com.fasterxml.jackson.core</groupId>\n      <artifactId>jackson-databind</artifactId>\n      <version>2.16.1</version>\n    </dependency>\n    <dependency>\n      <groupId>com.fasterxml.jackson.datatype</groupId>\n      <artifactId>jackson-datatype-jsr310</artifactId>\n      <version>2.16.1</version>\n    </dependency>\n    <!-- JUnit 5 -->\n    <dependency>\n      <groupId>org.junit.jupiter</groupId>\n      <artifactId>junit-jupiter</artifactId>\n      <version>5.10.1</version>\n      <scope>test</scope>\n    </dependency>\n  </dependencies>\n\n  <build>\n    <plugins>\n      <!-- fat JARビルド -->\n      <plugin>\n        <groupId>org.apache.maven.plugins</groupId>\n        <artifactId>maven-shade-plugin</artifactId>\n        <version>3.5.1</version>\n        <executions>\n          <execution>\n            <phase>package</phase>\n            <goals><goal>shade</goal></goals>\n            <configuration>\n              <transformers>\n                <transformer implementation=\"org.apache.maven.plugins.shade.resource.ManifestResourceTransformer\">\n                  <mainClass>com.example.todo.Main</mainClass>\n                </transformer>\n              </transformers>\n            </configuration>\n          </execution>\n        </executions>\n      </plugin>\n      <plugin>\n        <groupId>org.apache.maven.plugins</groupId>\n        <artifactId>maven-surefire-plugin</artifactId>\n        <version>3.2.3</version>\n      </plugin>\n    </plugins>\n  </build>\n</project>",
      },
      {
        title:"最初のCLIエントリポイント",
        body:"プロジェクトのエントリポイントとなるMainクラスを作成します。この段階では単純なヘルプ表示とバージョン表示だけを実装し、章を追うごとに機能を追加していきます。\n\npicocliはアノテーションベースのCLIライブラリで、@Command・@Option・@Parametersアノテーションでコマンド構造を宣言的に定義できます。Pythonのargparseやclickに相当しますが、より型安全でサブコマンド構造が組みやすい設計です。\n\n最初はシンプルなバージョン表示とヘルプ表示から始め、次章以降でサブコマンド（add、list、done、delete）を追加します。",
        code:"// src/main/java/com/example/todo/Main.java\npackage com.example.todo;\n\nimport picocli.CommandLine;\nimport picocli.CommandLine.Command;\nimport picocli.CommandLine.Option;\n\n@Command(\n    name = \"todo\",\n    version = \"JavaTodo 1.0\",\n    description = \"シンプルなCLIタスク管理ツール\",\n    mixinStandardHelpOptions = true,  // --help / --version を自動追加\n    subcommands = {\n        CommandLine.HelpCommand.class\n    }\n)\npublic class Main implements Runnable {\n\n    @Override\n    public void run() {\n        // サブコマンドなしで実行されたときはヘルプを表示\n        CommandLine.usage(this, System.out);\n    }\n\n    public static void main(String[] args) {\n        int exitCode = new CommandLine(new Main()).execute(args);\n        System.exit(exitCode);\n    }\n}",
        afterCode:"mvn compile && mvn exec:java -Dexec.mainClass=com.example.todo.Main でコンパイルと実行ができます。mvn package後はjava -jar target/javatodo-1.0-SNAPSHOT.jar --help で実行可能です。",
      },
    ],
    exercises:[
      {stars:1,q:"pom.xmlにSlf4j-simpleのロギング依存（org.slf4j:slf4j-simple:2.0.9）を追加し、MainクラスでLoggerFactory.getLogger(Main.class)を使ってINFOレベルのログ「Application started」を出力してください。",a:`<!-- pom.xmlに追加 -->
<dependency>
    <groupId>org.slf4j</groupId>
    <artifactId>slf4j-simple</artifactId>
    <version>2.0.9</version>
</dependency>

// Main.java
import org.slf4j.Logger;
import org.slf4j.LoggerFactory;

public class Main implements Runnable {
    private static final Logger log = LoggerFactory.getLogger(Main.class);

    @Override
    public void run() {
        log.info("Application started");
        CommandLine.usage(this, System.out);
    }
}`},
      {stars:2,q:"picocliの@Commandに name=\"todo\"、description・version・mixinStandardHelpOptions=trueを設定し、mvn packageでJARをビルドして java -jar target/javatodo-1.0-SNAPSHOT.jar --version を実行したときに「JavaTodo 1.0」と表示されるようにしてください。",a:`@Command(
    name = "todo",
    version = "JavaTodo 1.0",
    description = "シンプルなCLIタスク管理ツール",
    mixinStandardHelpOptions = true
)
public class Main implements Runnable {
    @Override
    public void run() {
        CommandLine.usage(this, System.out);
    }

    public static void main(String[] args) {
        int exitCode = new CommandLine(new Main()).execute(args);
        System.exit(exitCode);
    }
}

// ビルドと実行
// $ mvn package -q
// $ java -jar target/javatodo-1.0-SNAPSHOT.jar --version
// JavaTodo 1.0`},
      {stars:3,q:"@Option(names={\"--name\",\"-n\"}, description=\"Your name\")でString nameフィールドを追加し、todoコマンド実行時にnameが指定されていれば「こんにちは、{name}さん！」、なければ「こんにちは！」と表示するrun()を実装してください。",a:`@Command(name="todo", version="JavaTodo 1.0",
    description="CLIタスク管理ツール", mixinStandardHelpOptions=true)
public class Main implements Runnable {
    @Option(names={"-n","--name"}, description="Your name")
    private String name;

    @Override
    public void run() {
        if (name != null && !name.isBlank()) {
            System.out.println("こんにちは、" + name + "さん！");
        } else {
            System.out.println("こんにちは！");
        }
    }

    public static void main(String[] args) {
        System.exit(new CommandLine(new Main()).execute(args));
    }
}`},
    ],
  },
  {
    id:"ch2",num:2,title:"タスクモデルの設計",
    goal:"RecordとEnumを使ったイミュータブルなTaskモデルを設計し、Jacksonのシリアライズ/デシリアライズに対応させてJSONで保存・読み込みできる。",
    sections:[
      {
        title:"TaskモデルとTaskStatus enum",
        body:"タスク管理アプリの核心となるTaskモデルを設計します。Java 16のrecordはイミュータブルなデータクラスに最適で、equals/hashCode/toStringが自動生成されます。タスクのステータスはenumで型安全に管理します。\n\nPythonのdataclassやTypedDictよりも型が厳密で、コンパイル時に存在しないフィールドへのアクセスや型不一致を検出できます。JacksonはrecordのコンポーネントをJSON ↔ Javaオブジェクト変換できますが、Jackson 2.12以降はrecordをネイティブサポートしています。\n\nUUID（java.util.UUID）はタスクIDの一意識別子として使います。LocalDateTime（java.time）はJava 8以降の標準日時APIで、Jacksonのjackson-datatype-jsr310でシリアライズできます。",
        code:"package com.example.todo.model;\n\nimport com.fasterxml.jackson.annotation.JsonProperty;\nimport java.time.LocalDateTime;\nimport java.util.UUID;\n\npublic enum TaskStatus {\n    TODO, IN_PROGRESS, DONE\n}\n\n// Task record (Java 16+)\npublic record Task(\n    @JsonProperty(\"id\")          UUID id,\n    @JsonProperty(\"title\")       String title,\n    @JsonProperty(\"description\") String description,\n    @JsonProperty(\"status\")      TaskStatus status,\n    @JsonProperty(\"createdAt\")   LocalDateTime createdAt,\n    @JsonProperty(\"doneAt\")      LocalDateTime doneAt\n) {\n    // ファクトリメソッド（新規タスク作成）\n    public static Task create(String title, String description) {\n        return new Task(\n            UUID.randomUUID(),\n            title,\n            description,\n            TaskStatus.TODO,\n            LocalDateTime.now(),\n            null\n        );\n    }\n\n    // 完了にした新しいTaskを返す（イミュータブル）\n    public Task complete() {\n        return new Task(id, title, description, TaskStatus.DONE, createdAt, LocalDateTime.now());\n    }\n\n    // ステータス変更\n    public Task withStatus(TaskStatus newStatus) {\n        return new Task(id, title, description, newStatus, createdAt,\n            newStatus == TaskStatus.DONE ? LocalDateTime.now() : doneAt);\n    }\n\n    // 表示用\n    public String display() {\n        String check = status == TaskStatus.DONE ? \"[✓]\" :\n                       status == TaskStatus.IN_PROGRESS ? \"[~]\" : \"[ ]\";\n        return String.format(\"%s %s - %s (id: %s)\", check, title, description,\n            id.toString().substring(0, 8));\n    }\n}",
        afterCode:"recordはwithメソッドによるコピー生成パターンと相性が良いです。Java 14のrecordはPreviewでしたがJava 16で正式化されました。",
      },
      {
        title:"JacksonによるJSON永続化",
        body:"ObjectMapperはJacksonのコアクラスで、JavaオブジェクトをJSON文字列/ファイルに変換（シリアライズ）し、その逆（デシリアライズ）を行います。PythonのJson.dumps()/json.loads()やpickleに相当しますが、型安全かつ設定が豊富です。\n\njava.time（LocalDateTime等）のシリアライズにはJavaTimeModule（jackson-datatype-jsr310）の登録が必要です。デフォルトではLocalDateTimeを配列でシリアライズするため、WRITE_DATES_AS_TIMESTAMPS=falseでISO-8601文字列形式に変更します。\n\nタスクのリストをJSONファイルに保存・読み込みする TaskRepository クラスを設計します。これでアプリを再起動してもデータが保持されます。",
        code:"package com.example.todo.repository;\n\nimport com.example.todo.model.Task;\nimport com.fasterxml.jackson.core.type.TypeReference;\nimport com.fasterxml.jackson.databind.ObjectMapper;\nimport com.fasterxml.jackson.databind.SerializationFeature;\nimport com.fasterxml.jackson.datatype.jsr310.JavaTimeModule;\nimport java.io.IOException;\nimport java.nio.file.*;\nimport java.util.*;\n\npublic class TaskRepository {\n    private static final ObjectMapper MAPPER = createMapper();\n    private final Path dataFile;\n\n    public TaskRepository() {\n        this(Path.of(System.getProperty(\"user.home\"), \".javatodo\", \"tasks.json\"));\n    }\n\n    public TaskRepository(Path dataFile) {\n        this.dataFile = dataFile;\n    }\n\n    private static ObjectMapper createMapper() {\n        return new ObjectMapper()\n            .registerModule(new JavaTimeModule())\n            .disable(SerializationFeature.WRITE_DATES_AS_TIMESTAMPS)\n            .enable(SerializationFeature.INDENT_OUTPUT);\n    }\n\n    public List<Task> loadAll() throws IOException {\n        if (!Files.exists(dataFile)) return new ArrayList<>();\n        try {\n            return MAPPER.readValue(dataFile.toFile(),\n                new TypeReference<List<Task>>() {});\n        } catch (Exception e) {\n            System.err.println(\"データ読み込みエラー: \" + e.getMessage());\n            return new ArrayList<>();\n        }\n    }\n\n    public void saveAll(List<Task> tasks) throws IOException {\n        Files.createDirectories(dataFile.getParent());\n        MAPPER.writeValue(dataFile.toFile(), tasks);\n    }\n\n    public Path getDataFile() { return dataFile; }\n}",
        afterCode:"ObjectMapperはスレッドセーフで再利用できます。毎回newするのはコストが高いため、staticなシングルトンかDIコンテナで管理するのが実務的です。",
      },
    ],
    exercises:[
      {stars:1,q:"Task recordのdisplay()メソッドを拡張し、createdAtをyyyy-MM-dd HH:mm形式でフォーマットして表示に含めてください。java.time.format.DateTimeFormatterを使ってください。",a:`import java.time.format.DateTimeFormatter;

// Task record内のメソッド
private static final DateTimeFormatter DISPLAY_FMT =
    DateTimeFormatter.ofPattern("yyyy-MM-dd HH:mm");

public String display() {
    String check = status == TaskStatus.DONE ? "[✓]" :
                   status == TaskStatus.IN_PROGRESS ? "[~]" : "[ ]";
    String created = createdAt != null ? createdAt.format(DISPLAY_FMT) : "-";
    return String.format("%s %s - %s [%s] (id: %s)",
        check, title, description, created, id.toString().substring(0, 8));
}`},
      {stars:2,q:"TaskRepositoryのテストクラスを書いてください。@TempDir（JUnit 5）を使って一時ディレクトリにデータを保存し、saveAll()→loadAll()でタスクが正しく永続化されるか検証してください。",a:`import org.junit.jupiter.api.*;
import org.junit.jupiter.api.io.TempDir;
import java.nio.file.*;
import java.util.*;
import static org.junit.jupiter.api.Assertions.*;

class TaskRepositoryTest {
    @TempDir Path tempDir;
    TaskRepository repo;

    @BeforeEach
    void setUp() {
        repo = new TaskRepository(tempDir.resolve("tasks.json"));
    }

    @Test
    void loadAll_whenFileNotExists_returnsEmpty() throws Exception {
        assertTrue(repo.loadAll().isEmpty());
    }

    @Test
    void saveAndLoad_roundtrip() throws Exception {
        var task = Task.create("テスト", "説明");
        repo.saveAll(List.of(task));

        var loaded = repo.loadAll();
        assertEquals(1, loaded.size());
        assertEquals(task.id(), loaded.get(0).id());
        assertEquals(task.title(), loaded.get(0).title());
        assertEquals(TaskStatus.TODO, loaded.get(0).status());
    }
}`},
      {stars:3,q:"TaskRepositoryに findById(UUID id) と findByStatus(TaskStatus status) メソッドを追加してください。両方ともloadAll()でファイルから読み込んだリストをStream APIでフィルタリングして返してください。",a:`public Optional<Task> findById(UUID id) throws IOException {
    return loadAll().stream()
        .filter(t -> t.id().equals(id))
        .findFirst();
}

public List<Task> findByStatus(TaskStatus status) throws IOException {
    return loadAll().stream()
        .filter(t -> t.status() == status)
        .collect(java.util.stream.Collectors.toList());
}`},
    ],
  },
  {
    id:"ch3",num:3,title:"タスク追加サブコマンド（add）",
    goal:"picocliのサブコマンドとして add コマンドを実装し、タイトル・説明をオプションで受け取ってJSONファイルに保存できる。",
    sections:[
      {
        title:"picocliサブコマンドの構造",
        body:"picocliでは@Commandをサブクラス（または別クラス）に付けることでサブコマンドを実現します。PythonのclickではグループとCommandで階層を作りますが、picocliではCommandLine.addSubcommand()またはparentCommand.subcommands属性で宣言します。\n\n各サブコマンドはRunnable（またはCallable<Integer>）を実装します。CommandLineクラスはexecute()時に適切なサブコマンドを選んでrun()/call()を呼びます。親コマンドとサブコマンドは@ParentCommand アノテーションで参照し合えます。\n\n@Specアノテーションとspec.commandLine().getParent()を使うと親コマンドに定義された共通オプション（例：データファイルパス）をサブコマンドから参照できます。",
        code:"package com.example.todo.command;\n\nimport com.example.todo.model.Task;\nimport com.example.todo.repository.TaskRepository;\nimport picocli.CommandLine.Command;\nimport picocli.CommandLine.Option;\nimport picocli.CommandLine.Parameters;\nimport java.io.IOException;\nimport java.util.*;\n\n@Command(\n    name = \"add\",\n    description = \"新しいタスクを追加します\"\n)\npublic class AddCommand implements Runnable {\n\n    @Parameters(index = \"0\", description = \"タスクのタイトル\")\n    private String title;\n\n    @Option(names = {\"-d\", \"--description\"}, description = \"タスクの説明\",\n            defaultValue = \"\")\n    private String description;\n\n    private final TaskRepository repository;\n\n    // DIによるリポジトリ注入（テスト可能）\n    public AddCommand(TaskRepository repository) {\n        this.repository = repository;\n    }\n\n    @Override\n    public void run() {\n        try {\n            List<Task> tasks = new ArrayList<>(repository.loadAll());\n            Task newTask = Task.create(title, description);\n            tasks.add(newTask);\n            repository.saveAll(tasks);\n            System.out.printf(\"✓ タスクを追加しました: %s (id: %s)%n\",\n                newTask.title(), newTask.id().toString().substring(0, 8));\n        } catch (IOException e) {\n            System.err.println(\"エラー: \" + e.getMessage());\n        }\n    }\n}",
        afterCode:"Callableを使うと整数の終了コードを返せます。エラー時に0以外を返してSystem.exit()させるにはCallable<Integer>の実装が便利です。",
      },
      {
        title:"Mainクラスへのサブコマンド登録",
        body:"Mainクラスにサブコマンドを登録します。picocliのfactory機能（IFactory）を使うとサブコマンドのDI（依存注入）が容易になります。テスト時にはモックリポジトリを渡せます。\n\n@Commandのsubcommandsにクラスオブジェクトをリストアップするか、CommandLine#addSubcommand()を使って動的に登録できます。前者はアノテーション駆動で簡潔ですが、コンストラクタ引数を渡せないため、後者かFactory実装が必要です。\n\nCommandLine.IFactory を実装してカスタムインスタンス化を行います。これはシンプルなDIコンテナとして機能します。",
        code:"package com.example.todo;\n\nimport com.example.todo.command.*;\nimport com.example.todo.repository.TaskRepository;\nimport picocli.CommandLine;\nimport picocli.CommandLine.*;\n\n@Command(\n    name = \"todo\",\n    version = \"JavaTodo 1.0\",\n    description = \"シンプルなCLIタスク管理ツール\",\n    mixinStandardHelpOptions = true\n)\npublic class Main implements Runnable {\n\n    @Override\n    public void run() {\n        CommandLine.usage(this, System.out);\n    }\n\n    public static void main(String[] args) {\n        var repo = new TaskRepository();\n\n        // カスタムFactoryでDI\n        CommandLine cmd = new CommandLine(new Main());\n        cmd.addSubcommand(\"add\",    new AddCommand(repo));\n        // 後続章で list, done, delete を追加予定\n\n        int exitCode = cmd.execute(args);\n        System.exit(exitCode);\n    }\n}\n\n// 実行例\n// $ todo add \"買い物\" -d \"牛乳・卵・野菜\"\n// ✓ タスクを追加しました: 買い物 (id: a1b2c3d4)\n//\n// $ todo add \"報告書作成\" --description \"月次レポートを作成する\"\n// ✓ タスクを追加しました: 報告書作成 (id: e5f6a7b8)",
      },
    ],
    exercises:[
      {stars:1,q:"AddCommandに --priority オプション（int型、1〜5、デフォルト3）を追加し、追加時に優先度も表示するよう修正してください。まず Task record に priority フィールドを追加してください。",a:`// Task record に priority を追加
public record Task(
    UUID id, String title, String description,
    TaskStatus status, int priority,
    LocalDateTime createdAt, LocalDateTime doneAt
) {
    public static Task create(String title, String description, int priority) {
        return new Task(UUID.randomUUID(), title, description,
            TaskStatus.TODO, priority, LocalDateTime.now(), null);
    }
    // ...
}

// AddCommand に追加
@Option(names={"-p","--priority"}, description="優先度 1-5", defaultValue="3")
private int priority;

// run() 内
Task newTask = Task.create(title, description, priority);
System.out.printf("✓ タスクを追加しました: %s [優先度:%d] (id: %s)%n",

    sections:[

        body:"listコマンドではすべてのタスクを表示します。--status オプションでフィルタリング、--sort オプションで並び替えが可能です。Pythonのrichlibrary相当の機能をJavaの標準出力で再現します。\n\nStream APIのfilter・sorted・Comparatorを組み合わせて宣言的に操作します。Comparator.comparing()とComparator.thenComparing()でチェーンした複合ソートが可能です。Pythonのsortedにkeyとreverseがあるように、Javaでは.reversed()をチェーンできます。\n\nANSI エスケープコードを使うことでターミナルに色付き出力ができます。ただし環境依存なので、System.getenv(\"TERM\")でチェックするか、シンプルなテキスト表示を選択できるオプションを提供するのが良いプラクティスです。",
        code:"package com.example.todo.command;\n\nimport com.example.todo.model.*;\nimport com.example.todo.repository.TaskRepository;\nimport picocli.CommandLine.*;\nimport java.io.IOException;\nimport java.time.format.DateTimeFormatter;\nimport java.util.*;\nimport java.util.stream.*;\n\n@Command(name=\"list\", description=\"タスク一覧を表示します\", aliases={\"ls\"})\npublic class ListCommand implements Runnable {\n\n    @Option(names={\"-s\",\"--status\"}, description=\"フィルター: TODO/IN_PROGRESS/DONE\")\n    private TaskStatus statusFilter;\n\n    @Option(names={\"--sort\"}, description=\"ソート: created/priority/status\",\n            defaultValue=\"created\")\n    private String sortBy;\n\n    @Option(names={\"--no-color\"}, description=\"色なし出力\")\n    private boolean noColor;\n\n    private final TaskRepository repository;\n\n    public ListCommand(TaskRepository repository) { this.repository = repository; }\n\n    @Override\n    public void run() {\n        try {\n            List<Task> tasks = repository.loadAll();\n            if (tasks.isEmpty()) {\n                System.out.println(\"タスクがありません。 'todo add <タイトル>' で追加してください。\");\n                return;\n            }\n\n            Stream<Task> stream = tasks.stream();\n            if (statusFilter != null) {\n                stream = stream.filter(t -> t.status() == statusFilter);\n            }\n\n            Comparator<Task> cmp = switch (sortBy) {\n                case \"priority\" -> Comparator.comparingInt(Task::priority).reversed();\n                case \"status\"   -> Comparator.comparing(t -> t.status().name());\n                default         -> Comparator.comparing(Task::createdAt);\n            };\n            List<Task> sorted = stream.sorted(cmp).collect(Collectors.toList());\n\n            if (sorted.isEmpty()) {\n                System.out.println(\"該当するタスクがありません。\");\n                return;\n            }\n\n            System.out.printf(\"%-10s %-3s %-30s %-15s %-12s%n\",\n                \"ID\", \"PRI\", \"タイトル\", \"ステータス\", \"作成日時\");\n            System.out.println(\"-\".repeat(75));\n            DateTimeFormatter fmt = DateTimeFormatter.ofPattern(\"MM/dd HH:mm\");\n            for (Task t : sorted) {\n                String statusStr = switch (t.status()) {\n                    case TODO        -> noColor ? \"TODO\"        : \"\u001B[33mTODO\u001B[0m\";\n                    case IN_PROGRESS -> noColor ? \"IN_PROGRESS\" : \"\u001B[34mIN_PROGRESS\u001B[0m\";\n                    case DONE        -> noColor ? \"DONE\"        : \"\u001B[32mDONE\u001B[0m\";\n                };\n                System.out.printf(\"%-10s %-3d %-30s %-24s %-12s%n\",\n                    t.id().toString().substring(0, 8),\n                    t.priority(),\n                    t.title().length() > 28 ? t.title().substring(0, 27) + \"…\" : t.title(),\n                    statusStr,\n                    t.createdAt().format(fmt));\n            }\n            System.out.printf(\"%nTotal: %d件%n\", sorted.size());\n        } catch (IOException e) {\n            System.err.println(\"エラー: \" + e.getMessage());\n        }\n    }\n}",

    sections:[

        title:"DoneCommandとDeleteCommandの実装",
        body:"doneコマンドはIDの先頭8文字を受け取り、対象タスクをDONEステータスに変更します。Taskはrecordでイミュータブルなので、complete()メソッドで新しいインスタンスを生成してリストを置き換えます。\n\nIDの部分一致はStream APIのfilterとstartsWith()で実装します。複数一致した場合はエラーを表示します。deleteコマンドでは誤操作を防ぐため、--forceオプションがない場合は確認プロンプトを表示します。\n\nターミナルからのインタラクティブ入力は java.util.Scanner(System.in) または System.console().readLine() で読み取れます。System.console()はIDEから実行した場合にnullを返すことがあるため、nullチェックが必要です。",
        code:"// DoneCommand.java\n@Command(name=\"done\", description=\"タスクを完了にします\")\npublic class DoneCommand implements Callable<Integer> {\n    @Parameters(index=\"0\", description=\"タスクIDの先頭8文字以上\")\n    private String idPrefix;\n\n    private final TaskRepository repository;\n    public DoneCommand(TaskRepository r) { this.repository = r; }\n\n    @Override\n    public Integer call() {\n        try {\n            var tasks = new ArrayList<>(repository.loadAll());\n            var matches = tasks.stream()\n                .filter(t -> t.id().toString().startsWith(idPrefix))\n                .collect(Collectors.toList());\n\n            if (matches.isEmpty()) {\n                System.err.println(\"エラー: ID「\" + idPrefix + \"」に一致するタスクが見つかりません\");\n                return 1;\n            }\n            if (matches.size() > 1) {\n                System.err.println(\"エラー: 複数のタスクが一致します。IDをより長く指定してください\");\n                matches.forEach(t -> System.err.println(\"  - \" + t.id() + \" \" + t.title()));\n                return 1;\n            }\n\n            Task target = matches.get(0);\n            if (target.status() == TaskStatus.DONE) {\n                System.out.println(\"既に完了済みです: \" + target.title());\n                return 0;\n            }\n\n            Task done = target.complete();\n            tasks.replaceAll(t -> t.id().equals(target.id()) ? done : t);\n            repository.saveAll(tasks);\n            System.out.println(\"✓ 完了: \" + done.title());\n            return 0;\n        } catch (IOException e) {\n            System.err.println(\"エラー: \" + e.getMessage());\n            return 1;\n        }\n    }\n}\n\n// DeleteCommand.java\n@Command(name=\"delete\", description=\"タスクを削除します\", aliases={\"rm\"})\npublic class DeleteCommand implements Callable<Integer> {\n    @Parameters(index=\"0\") private String idPrefix;\n    @Option(names={\"-f\",\"--force\"}, description=\"確認なしで削除\")\n    private boolean force;\n\n    private final TaskRepository repository;\n    public DeleteCommand(TaskRepository r) { this.repository = r; }\n\n    @Override\n    public Integer call() {\n        try {\n            var tasks = new ArrayList<>(repository.loadAll());\n            var match = tasks.stream()\n                .filter(t -> t.id().toString().startsWith(idPrefix))\n                .findFirst();\n\n            if (match.isEmpty()) {\n                System.err.println(\"エラー: 見つかりません: \" + idPrefix);\n                return 1;\n            }\n            Task target = match.get();\n\n            if (!force) {\n                System.out.printf(\"本当に削除しますか？ '%s' [y/N]: \", target.title());\n                String input = new java.util.Scanner(System.in).nextLine().trim();\n                if (!input.equalsIgnoreCase(\"y\")) {\n                    System.out.println(\"キャンセルしました。\");\n                    return 0;\n                }\n            }\n\n            tasks.removeIf(t -> t.id().equals(target.id()));\n            repository.saveAll(tasks);\n            System.out.println(\"✓ 削除: \" + target.title());\n            return 0;\n        } catch (IOException e) {\n            System.err.println(\"エラー: \" + e.getMessage());\n            return 1;\n        }\n    }\n}",

    id:"ch6",num:6,title:"タスク更新と統計表示",
    goal:"updateサブコマンドでタスクを部分更新でき、statsコマンドでステータス別集計・完了率・平均完了時間をStream APIで計算して表示できる。",
    sections:[
      {
        title:"UpdateCommandの実装",
        body:"updateコマンドはIDでタスクを特定し、指定されたオプションのフィールドだけを変更します。全フィールドを変更する必要がある場合は全部指定、一部だけ変えたい場合は変えたいオプションだけ指定します。\n\nJavaではすべてのオプションフィールドにデフォルト値（nullや番兵値）を設定しておき、nullの場合は「変更なし」として扱います。これはHTTP PATCHメソッドの部分更新パターンと同じ考え方です。Pythonではkwargsと**演算子で同様のことができます。\n\nTaskはrecordでイミュータブルなため、フィールドの変更は「変更後の値を持つ新しいインスタンス」を生成することで表現します。この関数型スタイルは並行処理でも安全です。",
        code:"@Command(name=\"update\", description=\"タスクを更新します\")\npublic class UpdateCommand implements Callable<Integer> {\n    @Parameters(index=\"0\") private String idPrefix;\n    @Option(names={\"-t\",\"--title\"}) private String newTitle;\n    @Option(names={\"-d\",\"--description\"}) private String newDescription;\n    @Option(names={\"-p\",\"--priority\"}) private Integer newPriority;\n    @Option(names={\"-s\",\"--status\"}) private TaskStatus newStatus;\n\n    private final TaskRepository repository;\n    public UpdateCommand(TaskRepository r) { this.repository = r; }\n\n    @Override\n    public Integer call() {\n        try {\n            var tasks = new ArrayList<>(repository.loadAll());\n            var match = tasks.stream()\n                .filter(t -> t.id().toString().startsWith(idPrefix))\n                .findFirst();\n            if (match.isEmpty()) {\n                System.err.println(\"見つかりません: \" + idPrefix); return 1;\n            }\n            Task old = match.get();\n            Task updated = new Task(\n                old.id(),\n                newTitle       != null ? newTitle       : old.title(),\n                newDescription != null ? newDescription : old.description(),\n                newStatus      != null ? newStatus      : old.status(),\n                newPriority    != null ? newPriority    : old.priority(),\n                old.createdAt(),\n                (newStatus == TaskStatus.DONE) ? java.time.LocalDateTime.now() : old.doneAt()\n            );\n            tasks.replaceAll(t -> t.id().equals(old.id()) ? updated : t);\n            repository.saveAll(tasks);\n            System.out.println(\"✓ 更新: \" + updated.title());\n            return 0;\n        } catch (java.io.IOException e) {\n            System.err.println(e.getMessage()); return 1;\n        }\n    }\n}",

      {
        title:"statsコマンド – Stream APIによる集計",
        body:"統計コマンドでは保存された全タスクを集計して表示します。Stream APIのcollect(Collectors.groupingBy())とcollect(Collectors.counting())で効率的にカウントを集計できます。\n\n完了率は completed / total * 100.0、平均完了時間はDoneタスクのcreatedAt〜doneAt差をDuration.between()で計算します。OptionalDoubleのifPresentOrElse()を使うと値がない場合のフォールバックも簡潔に書けます。\n\nこの章で実装するStatsCommandはPythonのcollections.Counterに相当する集計パターンをJavaのStream APIで実装する好例です。",
        code:"@Command(name=\"stats\", description=\"タスク統計を表示します\")\npublic class StatsCommand implements Runnable {\n    private final TaskRepository repository;\n    public StatsCommand(TaskRepository r) { this.repository = r; }\n\n    @Override\n    public void run() {\n        try {\n            var tasks = repository.loadAll();\n            if (tasks.isEmpty()) { System.out.println(\"タスクがありません\"); return; }\n\n            // ステータス別カウント\n            var byStat = tasks.stream()\n                .collect(java.util.stream.Collectors.groupingBy(\n                    Task::status, java.util.stream.Collectors.counting()));\n\n            long total = tasks.size();\n            long done  = byStat.getOrDefault(TaskStatus.DONE, 0L);\n            long inPrg = byStat.getOrDefault(TaskStatus.IN_PROGRESS, 0L);\n            long todo  = byStat.getOrDefault(TaskStatus.TODO, 0L);\n\n            System.out.println(\"=== タスク統計 ===\");\n            System.out.printf(\"合計: %d件%n\", total);\n            System.out.printf(\"TODO:        %d件%n\", todo);\n            System.out.printf(\"IN_PROGRESS: %d件%n\", inPrg);\n            System.out.printf(\"DONE:        %d件%n\", done);\n            System.out.printf(\"完了率: %.1f%%%n\", (double) done / total * 100);\n\n            // 平均完了時間\n            tasks.stream()\n                .filter(t -> t.status() == TaskStatus.DONE && t.doneAt() != null)\n                .mapToLong(t -> java.time.Duration.between(t.createdAt(), t.doneAt()).toMinutes())\n                .average()\n                .ifPresent(avg -> System.out.printf(\"平均完了時間: %.0f分%n\", avg));\n\n            // 優先度別統計\n            System.out.println(\"\n=== 優先度別 ===\");\n            tasks.stream()\n                .collect(java.util.stream.Collectors.groupingBy(\n                    Task::priority, java.util.TreeMap::new,\n                    java.util.stream.Collectors.counting()))\n                .forEach((p, c) -> System.out.printf(\"優先度%d: %d件%n\", p, c));\n        } catch (java.io.IOException e) {\n            System.err.println(e.getMessage());\n        }\n    }\n}",

    goal:"~/.javatodo/config.propertiesで設定を管理し、SLF4J+Logbackでログレベル別のロギングを実装できる。",
    sections:[
      {
        title:"設定管理クラスの実装",
        body:"アプリケーションの設定（データファイルパス・デフォルト優先度・カラー表示の有無）を~/.javatodo/config.propertiesで管理します。java.util.Propertiesを使ったシンプルな設定クラスを実装します。\n\n設定値には型変換が必要なので（Propertiesはすべての値をStringで扱う）、getInt/getBooleanなどのヘルパーメソッドを用意します。デフォルト値はハードコードするか、propertiesファイル内のデフォルトPropertiesインスタンスとして渡せます。\n\n環境変数でも設定を上書きできるようにすると12-factor app（クラウドネイティブアプリのベストプラクティス）に沿った設計になります。System.getenv()は環境変数を取得し、nullでない場合に設定値を上書きします。",
        code:"package com.example.todo.config;\n\nimport java.io.*;\nimport java.nio.file.*;\nimport java.util.Properties;\n\npublic class AppConfig {\n    private static final Path CONFIG_DIR  =\n        Path.of(System.getProperty(\"user.home\"), \".javatodo\");\n    private static final Path CONFIG_FILE = CONFIG_DIR.resolve(\"config.properties\");\n\n    private final Properties props;\n\n    public AppConfig() throws IOException {\n        this.props = new Properties();\n        // デフォルト値\n        props.setProperty(\"data.file\",       CONFIG_DIR.resolve(\"tasks.json\").toString());\n        props.setProperty(\"default.priority\",\"3\");\n        props.setProperty(\"color.output\",    \"true\");\n        props.setProperty(\"max.title.length\",\"100\");\n\n        if (Files.exists(CONFIG_FILE)) {\n            try (var in = Files.newInputStream(CONFIG_FILE)) {\n                props.load(in);\n            }\n        }\n\n        // 環境変数で上書き\n        String envData = System.getenv(\"JAVATODO_DATA\");\n        if (envData != null) props.setProperty(\"data.file\", envData);\n    }\n\n    public String get(String key)           { return props.getProperty(key); }\n    public int    getInt(String key)        { return Integer.parseInt(props.getProperty(key)); }\n    public boolean getBoolean(String key)   { return Boolean.parseBoolean(props.getProperty(key)); }\n    public Path   getDataFilePath()         { return Path.of(get(\"data.file\")); }\n    public int    getDefaultPriority()      { return getInt(\"default.priority\"); }\n    public boolean isColorOutput()          { return getBoolean(\"color.output\"); }\n\n    public void set(String key, String value) throws IOException {\n        props.setProperty(key, value);\n        save();\n    }\n\n    private void save() throws IOException {\n        Files.createDirectories(CONFIG_DIR);\n        try (var out = Files.newOutputStream(CONFIG_FILE)) {\n            props.store(out, \"JavaTodo Configuration\");\n        }\n    }\n}",
        afterCode:"設定クラスのシングルトン化や読み込みのキャッシュを検討してください。テスト時は@TempDirで設定ディレクトリを差し替えられるようにコンストラクタでPATHを受け取れるようにすると良い設計です。",

      {
        title:"SLF4J+Logbackによるログ",
        body:"Javaのロギングにはjava.util.logging（JUL）・Log4j2・Logbackなどがあります。実務ではSLF4J（ファサードAPI）+Logback（実装）の組み合わせが最も広く使われており、PythonのloggingモジュールをベースにしたStructured Loggingに相当します。\n\nSLF4Jを使うことで実装（Logback/Log4j2）を差し替えても呼び出し元のコードを変えなくて済みます。LoggerFactory.getLogger(ClassName.class)でロガーを取得し、log.debug/info/warn/error()でログを出力します。プレースホルダー{}を使うと文字列連結が不要で、DEBUG以下のログが無効なら計算自体がスキップされ効率的です。\n\nlogback.xml（src/main/resources/に配置）でログ出力先（コンソール・ファイル）・フォーマット・ログレベルを設定します。",
        code:"<!-- pom.xmlに追加 -->\n<dependency>\n  <groupId>ch.qos.logback</groupId>\n  <artifactId>logback-classic</artifactId>\n  <version>1.4.14</version>\n</dependency>\n\n<!-- src/main/resources/logback.xml -->\n<configuration>\n  <appender name=\"CONSOLE\" class=\"ch.qos.logback.core.ConsoleAppender\">\n    <target>System.err</target>\n    <encoder>\n      <pattern>%d{HH:mm:ss} [%level] %logger{20} - %msg%n</pattern>\n    </encoder>\n  </appender>\n\n  <appender name=\"FILE\" class=\"ch.qos.logback.core.rolling.RollingFileAppender\">\n    <file>\${user.home}/.javatodo/app.log</file>\n    <rollingPolicy class=\"ch.qos.logback.core.rolling.TimeBasedRollingPolicy\">\n      <fileNamePattern>\${user.home}/.javatodo/app.%d{yyyy-MM-dd}.log</fileNamePattern>\n      <maxHistory>7</maxHistory>\n    </rollingPolicy>\n    <encoder>\n      <pattern>%d{yyyy-MM-dd HH:mm:ss} [%level] %logger - %msg%n</pattern>\n    </encoder>\n  </appender>\n\n  <root level=\"INFO\">\n    <appender-ref ref=\"FILE\"/>\n  </root>\n</configuration>\n\n// Javaコード\nimport org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\n\npublic class TaskRepository {\n    private static final Logger log = LoggerFactory.getLogger(TaskRepository.class);\n\n    public void saveAll(List<Task> tasks) throws IOException {\n        log.debug(\"Saving {} tasks to {}\", tasks.size(), dataFile);\n        Files.createDirectories(dataFile.getParent());\n        MAPPER.writeValue(dataFile.toFile(), tasks);\n        log.info(\"Saved {} tasks\", tasks.size());\n    }\n}",

    id:"ch8",num:8,title:"CSV/Markdownエクスポート",
    goal:"exportサブコマンドでCSV・Markdown形式にタスクをエクスポートでき、インターフェースとStrategyパターンを使った拡張可能な設計ができる。",
    sections:[
      {
        title:"ExporterインターフェースとStrategyパターン",
        body:"エクスポート機能を複数フォーマット（CSV・Markdown・JSON）に対応させるため、Strategyパターンを使います。ExporterインターフェースにexportTasks(List<Task>, Path)を定義し、CsvExporter・MarkdownExporterが実装します。\n\nStrategyパターンはアルゴリズムをカプセル化してランタイムに切り替えられるようにするデザインパターンです。PythonではCallableや辞書で関数を差し替えることで実現できますが、Javaでは型安全なインターフェースで明示的に設計します。\n\nCSV出力はRFC 4180に従い、フィールドにコンマ・ダブルクォート・改行が含まれる場合はダブルクォートで囲みエスケープします。Apache Commons CSVなどのライブラリを使うのが安全ですが、ここではStringBuilderで手実装します。",
        code:"// Exporterインターフェース\npackage com.example.todo.export;\n\nimport com.example.todo.model.Task;\nimport java.io.IOException;\nimport java.nio.file.Path;\nimport java.util.List;\n\npublic interface Exporter {\n    String format();  // \"csv\", \"markdown\", etc.\n    void export(List<Task> tasks, Path output) throws IOException;\n}\n\n// CsvExporter\npublic class CsvExporter implements Exporter {\n    @Override public String format() { return \"csv\"; }\n\n    @Override\n    public void export(List<Task> tasks, Path output) throws IOException {\n        var sb = new StringBuilder();\n        sb.append(\"id,title,description,status,priority,createdAt,doneAt\\n\");\n        for (Task t : tasks) {\n            sb.append(escapeCsv(t.id().toString())).append(\",\");\n            sb.append(escapeCsv(t.title())).append(\",\");\n            sb.append(escapeCsv(t.description())).append(\",\");\n            sb.append(t.status()).append(\",\");\n            sb.append(t.priority()).append(\",\");\n            sb.append(t.createdAt()).append(\",\");\n            sb.append(t.doneAt() != null ? t.doneAt() : \"\").append(\"\\n\");\n        }\n        java.nio.file.Files.writeString(output, sb.toString());\n    }\n\n    private String escapeCsv(String s) {\n        if (s == null) return \"\";\n        if (s.contains(\",\") || s.contains(\"\"\") || s.contains(\"\\n\")) {\n            return \"\"\" + s.replace(\"\"\", \"\"\"\") + \"\"\";\n        }\n        return s;\n    }\n}\n\n// MarkdownExporter\npublic class MarkdownExporter implements Exporter {\n    @Override public String format() { return \"markdown\"; }\n\n    @Override\n    public void export(List<Task> tasks, Path output) throws IOException {\n        var sb = new StringBuilder(\"# タスク一覧\\n\\n\");\n        sb.append(\"| ID | タイトル | ステータス | 優先度 | 作成日 |\\n\");\n        sb.append(\"|---|---|---|---|---|\\n\");\n        var fmt = java.time.format.DateTimeFormatter.ofPattern(\"yyyy-MM-dd\");\n        for (Task t : tasks) {\n            sb.append(String.format(\"| %s | %s | %s | %d | %s |%n\",\n                t.id().toString().substring(0, 8),\n                t.title().replace(\"|\", \"\\\\|\"),\n                t.status(), t.priority(),\n                t.createdAt().format(fmt)));\n        }\n        java.nio.file.Files.writeString(output, sb.toString());\n    }\n}\n\n// ExportCommand\n@Command(name=\"export\", description=\"タスクをエクスポートします\")\npublic class ExportCommand implements Callable<Integer> {\n    @Option(names={\"-f\",\"--format\"}, defaultValue=\"csv\",\n            description=\"フォーマット: csv/markdown\")\n    private String format;\n\n    @Option(names={\"-o\",\"--output\"}, required=true)\n    private Path output;\n\n    private final TaskRepository repository;\n    public ExportCommand(TaskRepository r) { this.repository = r; }\n\n    @Override\n    public Integer call() throws Exception {\n        var exporters = Map.of(\n            \"csv\",      (Exporter) new CsvExporter(),\n            \"markdown\", new MarkdownExporter()\n        );\n        Exporter exporter = exporters.get(format.toLowerCase());\n        if (exporter == null) {\n            System.err.println(\"未対応フォーマット: \" + format); return 1;\n        }\n        var tasks = repository.loadAll();\n        exporter.export(tasks, output);\n        System.out.printf(\"✓ %d件を %s に出力: %s%n\", tasks.size(), format, output);\n        return 0;\n    }\n}",
      },
    ],

  {
    id:"ch9",num:9,title:"並行処理とバッチインポート",
    goal:"ExecutorServiceとCompletableFutureを使った並行処理を理解し、複数CSVファイルの並行インポートを実装できる。",
    sections:[
      {
        title:"Javaの並行処理モデル",
        body:"Javaの並行処理はThread、ExecutorService、CompletableFuture（Java 8+）、Virtual Thread（Java 21）という段階的な進化を遂げています。PythonのasyncioやThreadPoolExecutorに相当しますが、Javaは真のマルチスレッドで複数コアを並列利用できます（PythonはGILで制約）。\n\nExecutorServiceはスレッドプールを管理し、タスクを非同期に実行します。Executors.newFixedThreadPool(n)でn個のスレッドプールを作成できます。CompletableFutureはPromise/Futureパターンを実装し、非同期処理のチェーンや結合を可能にします。\n\nJava 21の仮想スレッド（Virtual Thread）は軽量スレッドで、数百万のスレッドを作成できます。Executors.newVirtualThreadPerTaskExecutor()で仮想スレッドプールを作成でき、ブロッキングI/O操作でも効率的に並行処理ができます。",
        code:"import java.util.concurrent.*;\nimport java.util.concurrent.atomic.AtomicInteger;\n\npublic class ConcurrencyDemo {\n    public static void main(String[] args) throws Exception {\n        // 固定スレッドプール\n        ExecutorService executor = Executors.newFixedThreadPool(4);\n\n        // Callable<T> をsubmit→Future<T>で非同期結果を取得\n        Future<Integer> future = executor.submit(() -> {\n            Thread.sleep(100);\n            return 42;\n        });\n        System.out.println(\"結果: \" + future.get());  // ブロッキング\n\n        // CompletableFuture（ノンブロッキングチェーン）\n        CompletableFuture<String> cf = CompletableFuture\n            .supplyAsync(() -> \"Hello\", executor)\n            .thenApply(s -> s + \", Java 21!\")\n            .thenApply(String::toUpperCase);\n        System.out.println(cf.get());  // HELLO, JAVA 21!\n\n        // 複数の非同期タスクを並行実行して結合\n        var f1 = CompletableFuture.supplyAsync(() -> 10, executor);\n        var f2 = CompletableFuture.supplyAsync(() -> 20, executor);\n        var f3 = CompletableFuture.supplyAsync(() -> 30, executor);\n        int sum = CompletableFuture.allOf(f1, f2, f3)\n            .thenApply(v -> f1.join() + f2.join() + f3.join())\n            .get();\n        System.out.println(\"合計: \" + sum);  // 60\n\n        // Java 21 仮想スレッド\n        try (var vte = Executors.newVirtualThreadPerTaskExecutor()) {\n            var tasks = java.util.stream.IntStream.range(0, 1000)\n                .mapToObj(i -> CompletableFuture.runAsync(\n                    () -> System.out.println(\"Virtual: \" + i), vte))\n                .toArray(CompletableFuture[]::new);\n            CompletableFuture.allOf(tasks).get();\n        }\n\n        executor.shutdown();\n        executor.awaitTermination(5, TimeUnit.SECONDS);\n    }\n}",
        afterCode:"スレッドプールは必ずshutdown()してください。try-with-resourcesではExecutorServiceはAutoCloseableではないため、shutdownNow()をfinallyかtry-with-resources互換ラッパーで呼ぶ必要があります（Java 19以降はAutoCloseableを実装）。",
      },
      {
        title:"並行CSVインポート",
        body:"importサブコマンドでは複数のCSVファイルを並行して読み込み、タスクをマージします。CompletableFuture.supplyAsync()で各ファイルの読み込みを並行実行し、allOf()ですべて完了を待ちます。\n\nデータ競合（Race Condition）を防ぐため、各スレッドは独立したリストを返し、メインスレッドでmergeします。AtomicIntegerは複数スレッドから安全にカウントを更新できる原子変数です。Pythonのthread-safe counterに相当しますが、Javaでは言語レベルでより細かい制御ができます。\n\nタスクの重複（同一UUID）を避けるため、インポート時にIDを再生成するか、既存タスクとIDの衝突をチェックしてスキップします。",
        code:"@Command(name=\"import\", description=\"CSVファイルからタスクをインポートします\")\npublic class ImportCommand implements Callable<Integer> {\n    @Parameters(arity=\"1..*\", description=\"インポートするCSVファイルパス\")\n    private List<Path> csvFiles;\n\n    @Option(names={\"--skip-duplicates\"}, defaultValue=\"true\")\n    private boolean skipDuplicates;\n\n    private final TaskRepository repository;\n    public ImportCommand(TaskRepository r) { this.repository = r; }\n\n    @Override\n    public Integer call() throws Exception {\n        var existing = new ArrayList<>(repository.loadAll());\n        var existingIds = existing.stream()\n            .map(Task::id).collect(java.util.stream.Collectors.toSet());\n\n        var executor = Executors.newVirtualThreadPerTaskExecutor();\n        var importedCount = new AtomicInteger(0);\n        var skippedCount  = new AtomicInteger(0);\n\n        // 各ファイルを並行読み込み\n        List<CompletableFuture<List<Task>>> futures = csvFiles.stream()\n            .map(file -> CompletableFuture.supplyAsync(\n                () -> parseCsv(file), executor))\n            .collect(java.util.stream.Collectors.toList());\n\n        List<Task> allImported = new ArrayList<>();\n        for (var f : futures) {\n            var tasks = f.get();\n            for (Task t : tasks) {\n                if (skipDuplicates && existingIds.contains(t.id())) {\n                    skippedCount.incrementAndGet(); continue;\n                }\n                allImported.add(t);\n                existingIds.add(t.id());\n                importedCount.incrementAndGet();\n            }\n        }\n\n        existing.addAll(allImported);\n        repository.saveAll(existing);\n        executor.shutdown();\n\n        System.out.printf(\"✓ インポート: %d件、スキップ: %d件%n\",\n            importedCount.get(), skippedCount.get());\n        return 0;\n    }\n\n    private List<Task> parseCsv(Path file) {\n        // CSVパース実装（省略）\n        return List.of();\n    }\n}",
      },

      {stars:2,q:"AtomicIntegerを使って、10スレッドが各100回インクリメントするCounterをExecutorServiceで実装してください。最終値が1000になることをアサートしてください。",a:`import java.util.concurrent.*;
import java.util.concurrent.atomic.*;
import static org.junit.jupiter.api.Assertions.*;

public class AtomicTest {
    @Test
    void atomicIncrement_noRaceCondition() throws Exception {
        AtomicInteger counter = new AtomicInteger(0);
        ExecutorService exec = Executors.newFixedThreadPool(10);
        CountDownLatch latch = new CountDownLatch(10);

        for (int i = 0; i < 10; i++) {
            exec.submit(() -> {
                for (int j = 0; j < 100; j++) counter.incrementAndGet();
                latch.countDown();
            });
        }
        latch.await(5, TimeUnit.SECONDS);
        exec.shutdown();
        assertEquals(1000, counter.get());
    }
}`},
      {stars:3,q:"CompletableFuture.allOf()を使って5つのURLからコンテンツ長を並行フェッチ（実際にはThread.sleep(random)で模擬）し、完了順ではなく全部完了後にまとめて結果を表示するプログラムを書いてください。",a:`import java.util.concurrent.*;
import java.util.*;
import java.util.stream.*;

public class ParallelFetch {
    record FetchResult(String url, long contentLength, long elapsedMs) {}

    public static void main(String[] args) throws Exception {
        var urls = List.of("url1","url2","url3","url4","url5");
        var rand = new Random();
        var exec = Executors.newVirtualThreadPerTaskExecutor();

        List<CompletableFuture<FetchResult>> futures = urls.stream()
            .map(url -> CompletableFuture.supplyAsync(() -> {
                long start = System.currentTimeMillis();
                try { Thread.sleep(rand.nextInt(300) + 50); }
                catch (InterruptedException e) { Thread.currentThread().interrupt(); }
                long elapsed = System.currentTimeMillis() - start;
                return new FetchResult(url, rand.nextLong(1024, 10240), elapsed);
            }, exec))
            .collect(Collectors.toList());

        CompletableFuture.allOf(futures.toArray(new CompletableFuture[0])).get();

        futures.stream().map(CompletableFuture::join)

      const path = 'target/surefire-reports';

        fs.readdirSync(path)

            const content = fs.readFileSync(\`\${path}/\${f}\`, 'utf8');
            const m = content.match(/Tests run: (\\d+).*, Failures: (\\d+)/);
