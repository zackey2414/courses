public List<Map<String, Object>> searchProducts(
    @RequestParam(required = false) String category,
    @RequestParam(defaultValue = "0") int minPrice,
    @RequestParam(defaultValue = "999999") int maxPrice) {

    List<Map<String, Object>> allProducts = List.of(
        Map.of("name", "ノートPC", "category", "electronics", "price", 80000),
        Map.of("name", "マウス", "category", "electronics", "price", 3000),
        Map.of("name", "デスク", "category", "furniture", "price", 50000)
    );

    return allProducts.stream()
        .filter(p -> category == null || category.equals(p.get("category")))
        .filter(p -> (int)p.get("price") >= minPrice)
        .filter(p -> (int)p.get("price") <= maxPrice)
        .collect(java.util.stream.Collectors.toList());
}`

public record ProductDto(Long id, String name, int price) {}

// ProductController.java
@RestController
@RequestMapping("/api/v1/products")
public class ProductController {
    private final Map<Long, ProductDto> store = new ConcurrentHashMap<>();
    private final AtomicLong seq = new AtomicLong(1);

    @GetMapping
    public List<ProductDto> list() {
        return new ArrayList<>(store.values());
    }

    @GetMapping("/{id}")
    public ResponseEntity<ProductDto> get(@PathVariable Long id) {
        ProductDto p = store.get(id);
        return p != null ? ResponseEntity.ok(p) : ResponseEntity.notFound().build();
    }

    @PostMapping
    public ResponseEntity<ProductDto> create(@RequestBody ProductDto dto) {
        long id = seq.getAndIncrement();
        ProductDto saved = new ProductDto(id, dto.name(), dto.price());
        store.put(id, saved);
        return ResponseEntity.status(HttpStatus.CREATED).body(saved);
    }

    @PutMapping("/{id}")
    public ResponseEntity<ProductDto> update(
            @PathVariable Long id, @RequestBody ProductDto dto) {
        if (!store.containsKey(id)) return ResponseEntity.notFound().build();
        ProductDto updated = new ProductDto(id, dto.name(), dto.price());
        store.put(id, updated);
        return ResponseEntity.ok(updated);
    }

    @DeleteMapping("/{id}")
    public ResponseEntity<Void> delete(@PathVariable Long id) {
        if (store.remove(id) == null) return ResponseEntity.notFound().build();
        return ResponseEntity.noContent().build();
    }
}`

      answer: `// ErrorResponse.java
public record ErrorResponse(
    int status,
    String message,
    Map<String, String> fieldErrors
) {}

// GlobalExceptionHandler.java
@ControllerAdvice
public class GlobalExceptionHandler {

    @ExceptionHandler(MethodArgumentNotValidException.class)
    public ResponseEntity<ErrorResponse> handleValidation(
            MethodArgumentNotValidException ex) {
        Map<String, String> errors = new LinkedHashMap<>();
        ex.getBindingResult().getFieldErrors().forEach(err ->
            errors.put(err.getField(), err.getDefaultMessage())
        );
        ErrorResponse body = new ErrorResponse(400, "バリデーションエラー", errors);
        return ResponseEntity.badRequest().body(body);
    }

    @ExceptionHandler(NoSuchElementException.class)
    public ResponseEntity<ErrorResponse> handleNotFound(NoSuchElementException ex) {
        ErrorResponse body = new ErrorResponse(404, ex.getMessage(), Map.of());
        return ResponseEntity.status(404).body(body);
    }
}`

@Documented
@Constraint(validatedBy = PostalCodeValidator.class)
@Target({ ElementType.FIELD })
@Retention(RetentionPolicy.RUNTIME)
public @interface ValidPostalCode {
    String message() default "郵便番号の形式が正しくありません（例: 123-4567）";
    Class<?>[] groups() default {};
    Class<? extends Payload>[] payload() default {};
}

// PostalCodeValidator.java
public class PostalCodeValidator
        implements ConstraintValidator<ValidPostalCode, String> {
    private static final Pattern PATTERN =
        Pattern.compile("^\\d{3}-?\\d{4}$");

    @Override
    public boolean isValid(String value, ConstraintValidatorContext ctx) {
        if (value == null) return true; // @NotNullと組み合わせる
        return PATTERN.matcher(value).matches();
    }
}

// AddressRequest.java
public class AddressRequest {
    @ValidPostalCode
    private String postalCode;
    private String address;
}`

      answer: `@Service
public class OrderService {
    private final OrderRepository orderRepository;

    public OrderService(OrderRepository orderRepository) {
        this.orderRepository = orderRepository;
    }

    @Transactional
    public Order createOrder(List<OrderItemRequest> itemRequests) {
        Order order = new Order();

        for (OrderItemRequest req : itemRequests) {
            if (req.quantity() <= 0) {
                throw new IllegalArgumentException(
                    "在庫不足または数量不正: " + req.productName()
                );
            }
            OrderItem item = new OrderItem();
            item.setProductName(req.productName());
            item.setQuantity(req.quantity());
            item.setUnitPrice(req.unitPrice());
            order.addItem(item);
        }

        return orderRepository.save(order); // cascadeでitemsも保存
    }
}
