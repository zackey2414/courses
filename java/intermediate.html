        title: "Spring Cacheとパフォーマンス最適化",
        body: "Webアプリのボトルネックのほとんどはデータベースアクセスです。Spring Cacheは@Cacheable・@CachePut・@CacheEvictアノテーションでメソッドの結果をキャッシュし、同じ引数で呼ばれた場合はDBアクセスをスキップします。Pythonで言えばfunctools.lru_cacheやRedis-pyでの手動キャッシュに対応しますが、Springではアノテーション1つでDB呼び出しを透過的にキャッシュできます。\n\nキャッシュの種類は用途によって選びます。単一インスタンスの場合はCaffeineキャッシュ（高性能なインメモリキャッシュ）、複数インスタンスのクラスター環境ではRedisを使った分散キャッシュを選択します。Spring Cacheは実装を差し替えやすい抽象レイヤーになっているため、application.propertiesで「spring.cache.type=redis」と変更するだけで切り替えられます。\n\nキャッシュの無効化戦略は「TTL（有効期限）ベース」か「イベントドリブン（データ更新時に明示的に削除）」のどちらかです。TTLベースは実装がシンプルですが古いデータを一定時間返す可能性があります。イベントドリブン（@CacheEvict）はデータの一貫性を保てますが、すべての更新パスで漏れなく呼ぶ必要があります。",
        code: "// CacheConfig.java（Caffeineキャッシュ設定）\n@Configuration\n@EnableCaching\npublic class CacheConfig {\n    @Bean\n    public CacheManager cacheManager() {\n        CaffeineCacheManager manager = new CaffeineCacheManager();\n        manager.setCaffeine(Caffeine.newBuilder()\n            .maximumSize(1000)\n            .expireAfterWrite(10, TimeUnit.MINUTES)\n            .recordStats());  // キャッシュ統計を記録\n        return manager;\n    }\n}\n\n// ProductService.java\n@Service\npublic class ProductService {\n\n    @Cacheable(value = \"products\", key = \"#id\", unless = \"#result == null\")\n    public ProductDto findById(Long id) {\n        return productRepository.findById(id)\n            .map(mapper::toDto)\n            .orElse(null);\n    }\n\n    @Cacheable(value = \"productList\", key = \"#category + '_' + #pageable.pageNumber\")\n    public Page<ProductDto> findByCategory(String category, Pageable pageable) {\n        return productRepository.findByCategory(category, pageable).map(mapper::toDto);\n    }\n\n    @CachePut(value = \"products\", key = \"#result.id\")\n    @CacheEvict(value = \"productList\", allEntries = true)\n    public ProductDto update(Long id, ProductRequest req) {\n        Product p = productRepository.findById(id).orElseThrow();\n        p.setName(req.name());\n        p.setPrice(req.price());\n        return mapper.toDto(productRepository.save(p));\n    }\n}",

        code: "// アプリ起動時のJVMオプション例（本番推奨設定）\n// java -server \\\n//   -Xms512m -Xmx2g \\\n//   -XX:+UseZGC \\\n//   -XX:+HeapDumpOnOutOfMemoryError \\\n//   -XX:HeapDumpPath=/var/log/app/oom-\$(date +%Y%m%d%H%M%S).hprof \\\n//   -XX:StartFlightRecording=filename=/var/log/app/flight.jfr,duration=60s \\\n//   -jar app.jar\n\n// HealthIndicator でJVM情報をActuatorに公開\n@Component\npublic class JvmHealthIndicator implements HealthIndicator {\n    @Override\n    public Health health() {\n        Runtime rt = Runtime.getRuntime();\n        long usedMB  = (rt.totalMemory() - rt.freeMemory()) / 1024 / 1024;\n        long maxMB   = rt.maxMemory() / 1024 / 1024;\n        double ratio = (double) usedMB / maxMB;\n\n        Health.Builder builder = ratio > 0.9 ? Health.down() : Health.up();\n        return builder\n            .withDetail(\"heap.used\", usedMB + \" MB\")\n            .withDetail(\"heap.max\",  maxMB  + \" MB\")\n            .withDetail(\"heap.ratio\", String.format(\"%.1f%%\", ratio * 100))\n            .withDetail(\"threads\", Thread.activeCount())\n            .build();\n    }\n}",
