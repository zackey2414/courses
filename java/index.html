        title:"Java誕生の背景と設計哲学",
        body:`JavaはSun Microsystems（現Oracle）が1995年にリリースしたプログラミング言語です。「Write Once, Run Anywhere（一度書けばどこでも動く）」をスローガンに、JVM（Java Virtual Machine）という仮想マシン上でバイトコードを実行することでプラットフォーム非依存性を実現しました。

Pythonが動的型付け・インタープリタ実行を採用しているのに対し、Javaは静的型付け・コンパイル言語です。コードを書いたらまずJavaコンパイラ（javac）でバイトコード（.classファイル）にコンパイルし、そのバイトコードをJVM上で実行します。この二段階プロセスにより、コンパイル時に多くのエラーを検出でき、実行時の型安全性が保証されます。

Javaはオブジェクト指向を言語の中心に据えており、「すべてはオブジェクト」という思想のもと設計されています（プリミティブ型は例外）。現在はJava 21（LTS）が最新の長期サポート版で、パターンマッチング・仮想スレッド（Project Loom）・レコード・sealed classなどのモダンな機能が多数追加されています。`,
        table:{headers:["項目","Python","Java"],rows:[

          ["実行ファイル","なし（.pyそのまま）",".classバイトコード"],

        afterTable:"JVMにはJust-In-Time（JIT）コンパイラが組み込まれており、ホットスポット（頻繁に実行されるコード）を実行時にネイティブコードにコンパイルします。これによりJavaはインタープリタ言語より大幅に高速で、長時間稼働サーバーでは特にパフォーマンスが向上します。",

インストール後、環境変数 JAVA_HOME にJDKのパスを設定し、PATH に $JAVA_HOME/bin を追加します。ターミナルで java -version と javac -version を実行して確認してください。IDEはIntelliJ IDEA（業界標準）またはVS Code（Java Extension Pack）が推奨です。

// コンパイルと実行

        afterCode:"Java 11以降はソースファイルを直接 java HelloWorld.java で実行できます（単一ファイルの場合）。ただし実務ではMaven/Gradleを使ったビルドシステムを利用します。",

        title:"Javaのディレクトリ構造とパッケージ",
        body:`Javaではクラスをパッケージ（package）で整理します。パッケージはディレクトリ構造と対応しており、com.example.app パッケージのクラスは src/com/example/app/ ディレクトリに置きます。

パッケージ名は通常、ドメインを逆順にした命名規則（逆DNS記法）を使います（例: com.mycompany.myapp）。別パッケージのクラスを使うにはimport文で宣言します。java.lang（String, Systemなど）は自動インポートされます。

アクセス修飾子はpublic（どこからでも）、protected（同パッケージ・サブクラス）、（なし：package-private, 同パッケージのみ）、private（同クラスのみ）の4種類です。Pythonにはアクセス制御がありませんが、Javaでは厳密に制御できます。`,

    sections:[
      {
        title:"プリミティブ型と参照型",
        body:`Javaの型は大きくプリミティブ型（primitive type）と参照型（reference type）の二種類に分かれます。プリミティブ型はスタック上に値が直接格納され、参照型はヒープ上のオブジェクトへの参照をスタックに持ちます。

プリミティブ型は8種類：boolean（true/false）、byte（-128〜127）、short（-32768〜32767）、int（-2^31〜2^31-1）、long（-2^63〜2^63-1）、float（32bit浮動小数）、double（64bit浮動小数）、char（16bit Unicode文字）です。Pythonにはこの概念がなく、すべてオブジェクトです。

参照型はString・配列・クラス・インターフェースなどすべてのオブジェクトです。プリミティブ型にはそれに対応するラッパークラス（Integer, Double, Boolean等）が存在し、ジェネリクスやコレクションで必要になります。Java 5以降のオートボクシング/アンボクシングにより、int ↔ Integer の変換は自動で行われます。`,
        table:{headers:["プリミティブ","サイズ","ラッパークラス","デフォルト値"],rows:[

        title:"型変換と文字列操作",
        body:`Javaでは型変換に暗黙的変換（widening conversion）と明示的変換（narrowing conversion, キャスト）があります。小さい型から大きい型への変換は自動（int→long→double）ですが、逆は精度を失う可能性があるためキャストが必要です。

文字列（String）はJavaで最もよく使うクラスです。Javaの文字列はイミュータブル（変更不可）で、文字列連結の繰り返しには StringBuilder を使うのが効率的です。String はオブジェクトなので == ではなく equals() で内容比較します。Pythonの == はJavaの equals() に相当します。

Java 15以降ではテキストブロック（"""..."""）がサポートされ、複数行文字列をPythonと同様に書けます。Java 21ではStringTemplates（プレビュー）も登場しています。`,
        code:`public class TypesDemo {
    public static void main(String[] args) {
        // 暗黙的変換（widening）
        int i = 42;
        long l = i;       // int → long 自動変換
        double d = i;     // int → double 自動変換

        // 明示的キャスト（narrowing）
        double pi = 3.14159;
        int truncated = (int) pi;  // 小数点以下切り捨て → 3

        // 文字列変換

        System.out.println(hello.contains("Java")); // true
        System.out.println(hello.replace("Java", "World")); // Hello, World!
        System.out.println(hello.substring(7, 11)); // Java
        String[] parts = hello.split(", ");         // ["Hello", "Java!"]

        // StringBuilder（効率的な文字列構築）

        for (int k = 0; k < 5; k++) {
            sb.append(k).append(", ");
        }
        System.out.println(sb.toString()); // 0, 1, 2, 3, 4,

        // テキストブロック（Java 15+）
        String json = """
                {
                    "name": "Java",
                    "version": 21
                }
                """;
    }
}`,
        afterCode:"文字列の == 比較はオブジェクト参照の比較であり、内容が同じでもfalseになる場合があります（文字列プールの例外を除く）。必ず equals() または equalsIgnoreCase() を使ってください。",
      },
      {
        title:"配列と数値演算",
        body:`Javaの配列は固定長で、宣言時に型と要素数を指定します。Python のリストのような動的なサイズ変更はできません（動的配列はArrayListを使う）。多次元配列も定義可能で、実際は配列の配列です。

数値演算では整数同士の除算は整数になる点に注意（Python3 では // が整数除算）。また、Javaの % 演算子は負の数で異なる結果になります（Pythonの % は常に正）。数学関数は java.lang.Math クラスで提供されます。

Java 21では配列操作に加え、Arrays クラスや java.util.stream を使ったモダンな操作が可能です。`,
        code:`import java.util.Arrays;

public class ArraysDemo {
    public static void main(String[] args) {
        // 配列宣言と初期化
        int[] nums = {1, 2, 3, 4, 5};
        String[] names = new String[3];  // nullで初期化
        names[0] = "Alice";
        names[1] = "Bob";
        names[2] = "Charlie";

      {
        title:"if文とswitch式",
        body:`Javaのif文はPythonと似ていますが、条件式は必ず()で囲み、ブロックは{}で記述します。三項演算子も使えます。Java 14以降ではswitch式（switch expression）が導入され、従来のswitch文より簡潔で安全です。

従来のswitch文はfall-through（意図しない次のcaseへの落下）が問題でしたが、switch式では -> 構文でfall-throughを防ぎ、値を返すことが可能です。Java 21ではパターンマッチングのswitch（JEP 441）が正式化され、型のパターンやguard条件（when）が使えます。

Java 16以降のinstanceof パターンマッチングを使うと、型チェックとキャストを同時に行えます。Python の isinstance() に相当しますが、変数に直接バインドできる点が強力です。`,
        code:`public class ControlDemo {
    public static void main(String[] args) {
        // 従来のif-else
        int score = 75;
        if (score >= 90) {
            System.out.println("A");
        } else if (score >= 70) {
            System.out.println("B");
        } else {
            System.out.println("C");
        }

        // 三項演算子
        String result = score >= 70 ? "合格" : "不合格";

        // switch式（Java 14+）
        int day = 3;
        String dayName = switch (day) {
            case 1 -> "Monday";
            case 2 -> "Tuesday";
            case 3 -> "Wednesday";
            case 4, 5 -> "Thursday or Friday";
            default -> "Weekend";
        };

        // switch式 with yield（複数行）
        String grade = switch (score / 10) {
            case 10, 9 -> "A";
            case 8 -> "B";
            case 7 -> "C";
            default -> {
                System.out.println("scoring: " + score);
                yield "D";  // yieldで値を返す
            }
        };

        // パターンマッチング instanceof（Java 16+）
        Object obj = "Hello";
        if (obj instanceof String s) {  // sにキャスト済みでバインド
            System.out.println(s.toUpperCase());  // キャスト不要！
        }

        // switch でのパターンマッチング（Java 21）
        Object shape = 42.0;
        String desc = switch (shape) {
            case Integer i -> "整数: " + i;
            case Double d  -> "小数: " + d;
            case String s when s.isEmpty() -> "空文字列";
            case String s  -> "文字列: " + s;
            default        -> "その他";
        };
    }
}`,

ネストしたループではラベル付きbreak/continueが使えます。これはPythonにない機能で、外側のループを指定して抜けることができます。ただし、ネストを深くするより早期returnやメソッド分割が推奨されます。

Java 8以降ではIteratorやfor-eachの代わりにStreamのforEachメソッドも広く使われます。ただしStreamのforEachは並列処理のための副作用処理には適さない場合があるため、可読性を考慮して選択します。`,
        code:`public class LoopDemo {
    public static void main(String[] args) {
        // 基本for文
        for (int i = 0; i < 5; i++) {
            System.out.print(i + " ");  // 0 1 2 3 4
        }

        // while文
        int count = 0;
        while (count < 3) {
            System.out.println("count=" + count++);
        }

        // do-while（最低1回実行）
        int x = 10;
        do {
            System.out.println(x);
            x--;
        } while (x > 10);  // falseでも1回実行される

        // 拡張for文（for-each）
        int[] arr = {10, 20, 30, 40, 50};
        for (int val : arr) {
            System.out.print(val + " ");
        }

        // ラベル付きbreak
        outer:
        for (int i = 0; i < 3; i++) {
            for (int j = 0; j < 3; j++) {
                if (i == 1 && j == 1) {
                    break outer;  // 外側のループを終了
                }
                System.out.printf("(%d,%d) ", i, j);
            }
        }
        // 出力: (0,0) (0,1) (0,2) (1,0)

public record Point(double x, double y) {
    // コンパクトコンストラクタ（バリデーション追加）

        if (Double.isNaN(x) || Double.isNaN(y)) {
            throw new IllegalArgumentException("NaN不可");

    public double distanceTo(Point other) {
        double dx = this.x - other.x;
        double dy = this.y - other.y;
        return Math.sqrt(dx * dx + dy * dy);
    }

    public Point translate(double dx, double dy) {
        return new Point(x + dx, y + dy);  // 新しいインスタンスを返す
    }
}

    }
}`,

型イレイジャ（Type Erasure）はJavaジェネリクスの重要な特性で、コンパイル後は型パラメータが消去されます。これによりList<String>とList<Integer>は実行時に同じList型になります。これがinstanceof List<String>が書けない理由です。`,

public class Box<T> {
    private T value;

    public Box(T value) { this.value = value; }
    public T get() { return value; }
    public <U> Box<U> map(java.util.function.Function<T,U> f) {
        return new Box<>(f.apply(value));
    }

    @Override
    public String toString() { return "Box[" + value + "]"; }
}

// 境界付き型パラメータ
public class Statistics {
    // T は Number のサブタイプかつ Comparable を実装
    public static <T extends Number & Comparable<T>> T max(List<T> list) {
        if (list.isEmpty()) throw new NoSuchElementException();
        T max = list.get(0);
        for (T val : list) {
            if (val.compareTo(max) > 0) max = val;
        }
        return max;
    }

    // ワイルドカード（? extends Number: 共変）
    public static double sum(List<? extends Number> list) {
        return list.stream().mapToDouble(Number::doubleValue).sum();
    }
}

        body:`Javaでよく使われる設定ファイル形式はプロパティファイル（.properties）とJSONまたはYAMLです。java.util.Propertiesクラスでキー=値形式のプロパティファイルを読み書きできます。

プロパティファイルはJavaの歴史的な設定形式で、アプリケーション設定・国際化（i18n）・環境別設定によく使われます。ResourceBundleクラスを使うと多言語対応の文字列リソースを管理できます。

モダンなアプリケーションではJackson（JSON）やSnakeYAML（YAML）ライブラリを使うことが多いですが、外部ライブラリなしで使えるPropertiesは軽量設定に便利です。`,
        code:`import java.util.Properties;
import java.io.*;
import java.nio.file.*;

public class PropertiesDemo {
    public static void main(String[] args) throws IOException {
        // プロパティファイルへの書き込み
        Properties props = new Properties();
        props.setProperty("app.name", "MyApp");
        props.setProperty("app.version", "1.0.0");
        props.setProperty("db.url", "jdbc:postgresql://localhost/mydb");
        props.setProperty("db.pool.size", "10");

        Path propsFile = Path.of("config.properties");
        try (var out = Files.newOutputStream(propsFile)) {
            props.store(out, "Application Configuration");
        }

        // プロパティファイルの読み込み
        Properties loaded = new Properties();
        try (var in = Files.newInputStream(propsFile)) {
            loaded.load(in);
        }

        String appName = loaded.getProperty("app.name", "Unknown");
        int poolSize = Integer.parseInt(loaded.getProperty("db.pool.size", "5"));
        System.out.println("App: " + appName + ", Pool: " + poolSize);

        // システムプロパティ・環境変数
        String javaHome = System.getProperty("java.home");
        String path = System.getenv("PATH");
        System.out.println("JAVA_HOME: " + javaHome);

        // クリーンアップ
        Files.deleteIfExists(propsFile);
    }
}`,

import java.io.IOException;

public class FileStats {
    public static void main(String[] args) throws IOException {
        if (args.length < 1) {

      {stars:2,q:"指定ディレクトリ内の全.javaファイルをFiles.walk()で再帰的に探索し、ファイル名と行数をMapに格納して返すメソッドを実装してください。",a:`import java.nio.file.*;
import java.io.IOException;
import java.util.*;
import java.util.stream.*;

public class JavaFileFinder {
    public static Map<String, Long> findJavaFiles(Path dir) throws IOException {
        try (var walk = Files.walk(dir)) {
            return walk
                .filter(p -> p.toString().endsWith(".java"))
                .filter(Files::isRegularFile)
                .collect(Collectors.toMap(
                    p -> p.getFileName().toString(),
                    p -> {
                        try { return (long) Files.readAllLines(p).size(); }
                        catch (IOException e) { return -1L; }
                    }
                ));
        }
    }

    public static void main(String[] args) throws IOException {
        findJavaFiles(Path.of(".")).forEach((name, lines) ->
            System.out.printf("%s: %d行%n", name, lines));
    }
}`},
      {stars:3,q:"CSVファイル（ヘッダーあり: name,age,city）を読み込み、年齢が指定値以上の行だけをフィルタリングして別のCSVファイルに書き出すプログラムをStream APIとFiles.readAllLines/writeStringで実装してください。",a:`import java.nio.file.*;
import java.io.IOException;
import java.util.*;
import java.util.stream.*;

public class CsvFilter {
    public static void filter(Path input, Path output, int minAge) throws IOException {
        var lines = Files.readAllLines(input);
        if (lines.isEmpty()) return;

        String header = lines.get(0);
        String filtered = lines.stream()
            .skip(1)
            .filter(line -> {
                String[] parts = line.split(",");
                if (parts.length < 2) return false;
                try { return Integer.parseInt(parts[1].trim()) >= minAge; }
                catch (NumberFormatException e) { return false; }
            })
            .collect(Collectors.joining("\\n", header + "\\n", "\\n"));

        Files.writeString(output, filtered);
    }

    public static void main(String[] args) throws IOException {
        // テスト用CSV作成
        Files.writeString(Path.of("people.csv"),
            "name,age,city\\nAlice,30,Tokyo\\nBob,22,Osaka\\nCharlie,35,Tokyo\\n");
        filter(Path.of("people.csv"), Path.of("filtered.csv"), 30);
        System.out.println(Files.readString(Path.of("filtered.csv")));
        Files.deleteIfExists(Path.of("people.csv"));
        Files.deleteIfExists(Path.of("filtered.csv"));
    }
}`},

        body:`JUnit 5（Jupiter）はJavaの標準テストフレームワークです。Pythonのpytestに相当し、アノテーションでテストを定義します。@Test・@BeforeEach・@AfterEach・@BeforeAll・@AfterAll・@Disabled・@ParameterizedTestなどがあります。

アサーションはAssertions.assertEquals()・assertThrows()・assertAll()等を使います。assertAll()でまとめてアサーションでき、一部失敗しても全部実行されます。Mockito（モックライブラリ）と組み合わせることで、依存関係のない単体テストが書けます。

現代のJava開発ではテスト駆動開発（TDD）やBDDスタイルも普及しており、AssertJ（流暢なアサーション）やTestcontainers（Dockerベースの統合テスト）も広く使われています。`,
        code:`import org.junit.jupiter.api.*;
import org.junit.jupiter.params.ParameterizedTest;
import org.junit.jupiter.params.provider.*;
import static org.junit.jupiter.api.Assertions.*;

class BankAccountTest {
    private BankAccount account;

    @BeforeEach
    void setUp() {
        account = new BankAccount("Alice", 1000.0);
    }

    @Test
    @DisplayName("入金で残高が増える")
    void deposit_increasesBalance() {
        account.deposit(500.0);
        assertEquals(1500.0, account.getBalance(), 0.001);
    }

    @Test
    void withdraw_withSufficientBalance_succeeds() {
        assertTrue(account.withdraw(500.0));
        assertEquals(500.0, account.getBalance());
    }

    @Test
    void withdraw_withInsufficientBalance_fails() {
        assertFalse(account.withdraw(2000.0));
        assertEquals(1000.0, account.getBalance()); // 変化なし
    }

    @Test
    void deposit_negativeAmount_throwsException() {
        assertThrows(IllegalArgumentException.class,
            () -> account.deposit(-100.0));
    }

    @ParameterizedTest
    @ValueSource(doubles = {100, 200, 500, 999})
    void withdraw_validAmounts(double amount) {
        assertTrue(account.withdraw(amount));
    }

    @Test
    void multipleAssertions() {
        account.deposit(200.0);
        assertAll(
            () -> assertEquals(1200.0, account.getBalance()),
            () -> assertEquals("Alice", account.getOwner()),
            () -> assertTrue(account.getBalance() > 0)
        );
    }
}`,

        title:"Java 9 モジュールシステム（Jigsaw）",
        body:`Java 9で導入されたモジュールシステム（Project Jigsaw）は、パッケージの可視性をより細かく制御する仕組みです。module-info.javaファイルにモジュールが何を提供し（exports）何を必要とするか（requires）を宣言します。

モジュールシステムはカプセル化の強化、循環依存の排除、JREの軽量化（JEPで必要なモジュールだけをjlinkで固める）を目的としています。ただし既存のクラスパスベースのアプリケーションとの互換性も保たれており、無名モジュール（unnamed module）として従来通り動作します。

実務では多くのアプリケーションがモジュールシステムを使わずクラスパスで動かしていますが、ライブラリ設計やJVM配布物の軽量化では重要な概念です。`,
        code:`// module-info.java (src/main/java/ 直下)
module com.example.app {
    requires java.net.http;          // JDKモジュールの依存
    requires java.logging;
    requires com.google.gson;        // サードパーティモジュール

    exports com.example.app.api;     // 公開するパッケージ
    exports com.example.app.model;
    // com.example.app.internal は外から見えない

    opens com.example.app.model to com.google.gson;  // リフレクション許可
}

// モジュール情報の確認
// $ java --list-modules
// $ java --describe-module java.base

// jlinkで最小JRE作成
// $ jlink --module-path mods --add-modules com.example.app \\
//         --output myapp-runtime --launcher myapp=com.example.app/com.example.app.Main`,

public class Calculator {
    public int add(int a, int b)      { return a + b; }
    public int subtract(int a, int b) { return a - b; }
    public int multiply(int a, int b) { return a * b; }
    public double divide(int a, int b) {
        if (b == 0) throw new ArithmeticException("ゼロ除算");
        return (double) a / b;
    }
}

// CalculatorTest.java
import org.junit.jupiter.api.*;
import org.junit.jupiter.params.*;
import org.junit.jupiter.params.provider.*;
import static org.junit.jupiter.api.Assertions.*;

class CalculatorTest {
    Calculator calc = new Calculator();

    @Test
    void divideByZero_throwsArithmeticException() {
        var ex = assertThrows(ArithmeticException.class, () -> calc.divide(10, 0));
        assertEquals("ゼロ除算", ex.getMessage());
    }

    @ParameterizedTest
    @CsvSource({"10,2,5.0", "9,3,3.0", "7,2,3.5"})
    void divide_validInputs(int a, int b, double expected) {
        assertEquals(expected, calc.divide(a, b), 0.001);
    }

    @Test
    void multipleOperations() {
        assertAll(
            () -> assertEquals(5,  calc.add(2, 3)),
            () -> assertEquals(1,  calc.subtract(3, 2)),
            () -> assertEquals(6,  calc.multiply(2, 3)),
            () -> assertEquals(2.5, calc.divide(5, 2), 0.001)
        );
    }
}`},
