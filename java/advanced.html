public class AsyncDemo {
    public static void main(String[] args) throws Exception {
        CompletableFuture<String> f1 = CompletableFuture.supplyAsync(() -> {

public class VirtualThreadDemo {
    static void fakeHttpCall(int id) throws InterruptedException {
        Thread.sleep(100); // I/O待ちをシミュレート
    }

    public static void main(String[] args) throws Exception {
        int tasks = 10_000;

        // --- Virtual Threads (Java 21) ---
        long start = System.currentTimeMillis();
        try (var executor = Executors.newVirtualThreadPerTaskExecutor()) {
            var futures = new java.util.ArrayList<Future<?>>();
            for (int i = 0; i < tasks; i++) {
                int id = i;
                futures.add(executor.submit(() -> { fakeHttpCall(id); return null; }));
            }
            for (var f : futures) f.get();
        }
        System.out.printf("Virtual Threads: %dms%n",
            System.currentTimeMillis() - start);

        // 従来: new Thread(() -> ...).start() では10,000スレッドは困難
        // Platform Thread版は Executors.newFixedThreadPool(200) 等で上限を設ける必要がある
    }
}`

import java.time.Duration;

public class MonoChain {
    static Mono<String> fetchUser(int id) {
        return Mono.just("user-" + id).delayElement(Duration.ofMillis(50));
    }
    static Mono<String> fetchProfile(String userId) {
        if (userId.endsWith("0")) return Mono.error(new RuntimeException("プロフィール取得失敗"));
        return Mono.just("Profile[" + userId + "]");
    }

    public static void main(String[] args) {
        String result = fetchUser(42)
            .flatMap(MonoChain::fetchProfile)
            .onErrorReturn("ゲスト")
            .block();
        System.out.println("結果: " + result);
    }
}`

public record Email(String value) {
    public Email {
        if (value == null || !value.matches("^[\\w.+\\-]+@[\\w\\-]+\\.[a-z]{2,}$"))
            throw new IllegalArgumentException("不正なメールアドレス: " + value);
        value = value.toLowerCase();
    }
    public String domain() { return value.substring(value.indexOf('@') + 1); }
}

// Money.java
public record Money(long amount, String currency) {
    public Money {
        if (amount < 0) throw new IllegalArgumentException("金額は0以上");
        if (currency == null || currency.length() != 3) throw new IllegalArgumentException("通貨コードは3文字");
    }
    public Money add(Money other) {
        if (!currency.equals(other.currency)) throw new IllegalArgumentException("通貨が異なる");
        return new Money(amount + other.amount, currency);
    }
    public Money subtract(Money other) {
        if (!currency.equals(other.currency)) throw new IllegalArgumentException("通貨が異なる");
        if (amount < other.amount) throw new IllegalArgumentException("残高不足");
        return new Money(amount - other.amount, currency);
    }
}`

@State(Scope.Thread)
@Warmup(iterations = 3, time = 1)
@Measurement(iterations = 5, time = 1)
@Fork(1)
public class StringBenchmark {
    private final int N = 100;

    @Benchmark
    public String concat() {
        String s = "";
        for (int i = 0; i < N; i++) s += i;
        return s;
    }

    @Benchmark
    public String builder() {
        StringBuilder sb = new StringBuilder();
        for (int i = 0; i < N; i++) sb.append(i);

    React.createElement("div", { style: { display: "flex", justifyContent: "space-between", marginTop: 20, gap: 10 } },
      ch > 0
        ? React.createElement("button", {
            onClick: () => { setCh(ch - 1); window.scrollTo(0, 0); },
            style: { flex: 1, padding: "12px 16px", border: "1px solid #d1d5db", borderRadius: 10, background: "#fff", cursor: "pointer", fontWeight: 600, fontSize: 13, color: "#6b7280" }
          }, "← Ch.", chapters[ch - 1].num)
        : React.createElement("div", { style: { flex: 1 } }),
      ch < chapters.length - 1
        ? React.createElement("button", {
            onClick: () => { setCh(ch + 1); window.scrollTo(0, 0); },
            style: { flex: 1, padding: "12px 16px", border: "none", borderRadius: 10, background: "linear-gradient(135deg,#6366f1,#8b5cf6)", cursor: "pointer", fontWeight: 700, fontSize: 13, color: "#fff" }
          }, "Ch.", chapters[ch + 1].num, " →")
        : React.createElement("a", {
            href: "../index.html",
            style: { flex: 1, padding: "12px 16px", borderRadius: 10, background: "linear-gradient(135deg,#22c55e,#16a34a)", color: "#fff", fontWeight: 700, fontSize: 13, textAlign: "center", textDecoration: "none" }
          }, "🎉 コース完了！")
    ),

    /* Footer */
    React.createElement("p", { style: { textAlign: "center", fontSize: 11, color: "#9ca3af", marginTop: 20 } },
      "docs.spring.io ・ openjdk.java.net ・ Java 21 時点 ・ 2026年4月時点"
    )

  ));
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(JavaAdvancedCourse));
  </script>
