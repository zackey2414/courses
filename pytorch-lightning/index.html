        self.model = nn.Sequential(

        x, y = batch
        loss = F.cross_entropy(self(x), y)
        self.log("train_loss", loss, prog_bar=True)
        return loss

    def validation_step(self, batch, batch_idx):
        x, y = batch
        logits = self(x)
        loss = F.cross_entropy(logits, y)
        preds = logits.argmax(dim=1)
        acc = (preds == y).float().mean()
        self.validation_step_outputs.append({"val_loss": loss, "val_acc": acc})
        return loss

    def on_validation_epoch_end(self):
        avg_loss = torch.stack([x["val_loss"] for x in self.validation_step_outputs]).mean()
        avg_acc = torch.stack([x["val_acc"] for x in self.validation_step_outputs]).mean()
        self.log("val_loss", avg_loss, prog_bar=True)
        self.log("val_acc", avg_acc, prog_bar=True)

    def configure_optimizers(self):
        return torch.optim.Adam(self.parameters(), lr=1e-3)`

import torch
import torch.nn as nn
import torch.nn.functional as F

class ModelWithScheduler(L.LightningModule):
    def __init__(self, lr=1e-3):
        super().__init__()
        self.save_hyperparameters()
        self.net = nn.Sequential(
            nn.Linear(784, 256), nn.ReLU(),
            nn.Dropout(0.2),
            nn.Linear(256, 10)

    def forward(self, x):

    def training_step(self, batch, batch_idx):
        x, y = batch
        loss = F.cross_entropy(self(x), y)
        self.log("train_loss", loss, prog_bar=True)
        # 現在の学習率もログに記録
        sch = self.lr_schedulers()
        if sch is not None:
            self.log("lr", sch.get_last_lr()[0], prog_bar=True)
        return loss

    def configure_optimizers(self):
        optimizer = torch.optim.Adam(self.parameters(), lr=self.hparams.lr)
        scheduler = torch.optim.lr_scheduler.CosineAnnealingLR(
            optimizer, T_max=10
        )
        return {

    answer: `import lightning as L
from torch.utils.data import DataLoader, random_split
from torchvision import datasets, transforms

class MNISTDataModule(L.LightningDataModule):
    def __init__(self, data_dir="./data", batch_size=64, num_workers=4):
        super().__init__()
        self.save_hyperparameters()
        self.transform = transforms.Compose([
            transforms.ToTensor(),
            transforms.Normalize((0.1307,), (0.3081,))
        ])

    def prepare_data(self):
        # 1プロセスだけで実行（ダウンロードのみ）
        datasets.MNIST(self.hparams.data_dir, train=True, download=True)
        datasets.MNIST(self.hparams.data_dir, train=False, download=True)

    def setup(self, stage=None):
        if stage == "fit" or stage is None:
            full = datasets.MNIST(
                self.hparams.data_dir, train=True, transform=self.transform
            )
            self.train_ds, self.val_ds = random_split(full, [50000, 10000])
        if stage == "test" or stage is None:
            self.test_ds = datasets.MNIST(
                self.hparams.data_dir, train=False, transform=self.transform
            )

    def train_dataloader(self):
        return DataLoader(self.train_ds, batch_size=self.hparams.batch_size,
                          shuffle=True, num_workers=self.hparams.num_workers)

    def val_dataloader(self):
        return DataLoader(self.val_ds, batch_size=self.hparams.batch_size,
                          num_workers=self.hparams.num_workers)

    def test_dataloader(self):
        return DataLoader(self.test_ds, batch_size=self.hparams.batch_size,
                          num_workers=self.hparams.num_workers)`
