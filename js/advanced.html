  #pool = [];
  #size;

  constructor(size = 1000) {
    this.#size = size;
    for (let i = 0; i < size; i++) {
      this.#pool.push({ x: 0, y: 0 }); // 事前確保
    }
  }

  acquire(x = 0, y = 0) {
    const p = this.#pool.pop();
    if (!p) return { x, y }; // プール枯渇時はフォールバック
    p.x = x; p.y = y;
    return p;
  }

  release(p) {
    if (this.#pool.length < this.#size) {
      this.#pool.push(p); // 使い終わったら返却

  }

    body: "Tree Shaking とは、バンドラが import されていないコードをビルド成果物から除外する最適化です。ESM の静的 import/export 構文はビルド時に解析できるため Tree Shaking が効きますが、CJS の require() は動的なため除外できません。ライブラリを Tree-Shakeable にするには、ESM 形式で配布し、named export のみを使い、副作用（side effects）を最小化することが重要です。\n\npackage.json の exports フィールドを使うと、import（ESM）と require（CJS）で異なるファイルを提供できます。これにより Node.js・バンドラ・TypeScript のどの環境からも適切な形式のファイルが読み込まれます。tsup は TypeScript プロジェクトを ESM + CJS + 型定義の3点セットで出力できるツールで、設定が最小限で済むため現在最も人気のライブラリビルドツールです。",
    table: T.npmPublish,
    afterTable: "sideEffects: false を package.json に追加すると、バンドラに「このパッケージのどのファイルも副作用がない」と伝えられます。これにより import されていないファイルを丸ごと Tree Shaking できます。CSS のインポートやポリフィルのような副作用があるファイルは sideEffects 配列に明示してください。"

{
  "compilerOptions": {
    "allowJs": true,

    "strict": true,
