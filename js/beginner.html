    answer: `// src/TodoStore.js
import { loadTodos, saveTodos } from './storage.js';

export class TodoStore {
  #todos = [];

  async init() {
    this.#todos = await loadTodos();
    return this;
  }

  #nextId() {
    if (this.#todos.length === 0) return 1;
    return Math.max(...this.#todos.map(t => t.id)) + 1;
  }

  async add(title) {
    const todo = {
      id: this.#nextId(),
      title,
      done: false,
      createdAt: new Date().toISOString()
    };
    this.#todos.push(todo);
    await saveTodos(this.#todos);
    return todo;
  }

  async remove(id) {
    const idx = this.#todos.findIndex(t => t.id === id);
    if (idx === -1) throw new Error(\`Todo id=\${id} not found\`);
    const [removed] = this.#todos.splice(idx, 1);
    await saveTodos(this.#todos);
    return removed;
  }

  async toggle(id) {
    const todo = this.#todos.find(t => t.id === id);
    if (!todo) throw new Error(\`Todo id=\${id} not found\`);
    todo.done = !todo.done;
    await saveTodos(this.#todos);
    return todo;
  }

  list() {
    return [...this.#todos];
  }
}`

  }

    });

    }
