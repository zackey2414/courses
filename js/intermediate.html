     code:`// 10000件のアイテムリストを効率よく表示\n// Intersection Observer を活用`,
     answer:`// シンプルな仮想スクロール実装\nfunction setupVirtualScroll(container, items, renderItem, itemHeight=40) {\n  const visible = Math.ceil(container.clientHeight / itemHeight) + 2;\n  let offset = 0;\n  function render() {\n    container.style.position = "relative";\n    container.style.height = items.length * itemHeight + "px";\n    const fragment = document.createDocumentFragment();\n    for (let i = offset; i < Math.min(offset+visible, items.length); i++) {\n      const el = renderItem(items[i]);\n      el.style.cssText = \`position:absolute;top:\${i*itemHeight}px;width:100%\`;\n      fragment.appendChild(el);\n    }\n    container.innerHTML = "";\n    container.appendChild(fragment);\n  }\n  container.addEventListener("scroll", () => {\n    offset = Math.floor(container.scrollTop / itemHeight);\n    render();\n  });\n  render();\n}`},

     answer:`// worker.js\nself.onmessage = e => {\n  const result = e.data.map(n => n * n); // 重い処理の例\n  self.postMessage(result);\n};\n\n// main.js\nfunction runInWorker(data) {\n  return new Promise((resolve, reject) => {\n    const w = new Worker("worker.js");\n    w.onmessage = e => { resolve(e.data); w.terminate(); };\n    w.onerror  = e => { reject(e); w.terminate(); };\n    w.postMessage(data);\n  });\n}\nconst result = await runInWorker([1,2,3,4,5]);\nconsole.log(result); // [1,4,9,16,25]`},

const chapters = [
  {id:"ch1",num:1,title:"クロージャと実行コンテキスト",est:"55分",
   goal:"実行コンテキスト・スコープチェーン・ホイスティングのしくみを内部から理解する。クロージャを使ったメモ化・カリー化・部分適用を実装でき、関数型プログラミングの基礎パターンを説明できるようになる。",
   sections:[
    {title:"実行コンテキストとスコープチェーンの深掘り",
     body:`JavaScriptエンジンはコードを実行するとき「実行コンテキスト」を作成します。グローバルコンテキストは1つだけ存在し、関数が呼ばれるたびに新しい関数実行コンテキストがコールスタックにプッシュされます。Pythonのフレームオブジェクトに相当する概念です。\n\n各実行コンテキストは「変数環境（Variable Environment）」「レキシカル環境（Lexical Environment）」「thisバインディング」を持ちます。レキシカル環境は外側のスコープへの参照（Outer Reference）を持ち、この連鎖がスコープチェーンを形成します。変数の参照は内側から外側へスコープチェーンを辿って解決されます。\n\nホイスティングとは、宣言がスコープの先頭に巻き上げられる動作です。varの宣言は先頭に移動し初期値はundefinedになります。一方letとconstも巻き上げられますが初期化されないため、宣言前にアクセスするとTemporal Dead Zone（TDZ）エラーが発生します。これがvarとlet/constの実務上最も重要な差異の一つです。`,
     code:`// スコープチェーンの確認
let globalVar = "グローバル";
function outer() {
  let outerVar = "アウター";
  function inner() {
    let innerVar = "インナー";
    // スコープチェーンを辿って参照
    console.log(innerVar);  // "インナー"（自身）
    console.log(outerVar);  // "アウター"（外側）
    console.log(globalVar); // "グローバル"（さらに外側）
  }
  inner();
}
outer();

// TDZ（Temporal Dead Zone）
try {
  console.log(x); // ReferenceError: TDZ
  let x = 10;
} catch(e) { console.log(e.constructor.name); }`,
     afterCode:"実行コンテキストはブラウザDevToolsのCall Stackパネルで視覚的に確認できます。ブレークポイントを設定してステップ実行すると、スコープチェーンがScopeパネルに表示され、変数の解決過程を追えます。"},
    {title:"カリー化・部分適用・関数合成",
     body:`カリー化とは、複数の引数を取る関数を「1引数ずつ受け取る関数の連鎖」に変換するテクニックです。Pythonのfunctools.partialと目的は似ていますが、JSのカリー化はアロー関数のチェーンで自然に表現できます。\n\n部分適用は関数の一部の引数を固定して新しい関数を作ることです。カリー化と混同されることがありますが、部分適用は任意の数の引数を固定でき、残りの引数を後から渡せます。Reactのイベントハンドラでidを固定するなど実務でよく現れるパターンです。\n\n関数合成（compose/pipe）は複数の関数を連結して新しい関数を作るパターンです。pipe(f, g, h)(x)はh(g(f(x)))を意味します。データ変換パイプラインを読みやすく記述でき、RxJSやFP-TSなどのライブラリでも中心的な概念となっています。`,
     code:`// カリー化
const curry = fn => {
  const arity = fn.length;
  return function curried(...args) {
    if (args.length >= arity) return fn(...args);
    return (...more) => curried(...args, ...more);
  };
};
const add = curry((a, b, c) => a + b + c);
console.log(add(1)(2)(3));  // 6
console.log(add(1, 2)(3));  // 6

// 部分適用
const multiply = (factor) => (n) => n * factor;
const double = multiply(2);
const triple = multiply(3);
console.log([1,2,3].map(double)); // [2,4,6]

// 関数合成（pipe）
const pipe = (...fns) => x => fns.reduce((v, f) => f(v), x);
const process = pipe(
  x => x * 2,
  x => x + 1,
  x => x.toString()
);
console.log(process(5)); // "11"`,
     afterCode:"カリー化は「引数の不完全な適用を遅延する」ための道具です。Reactでは onClick={handleClick(item.id)} のように書きたくなりますが、これは毎レンダーで新しい関数を生成します。useCallbackと組み合わせるか、データ属性に格納するパターンのほうがパフォーマンスに優れます。"},
  ]},
  {id:"ch2",num:2,title:"プロトタイプチェーンとOOP",est:"55分",
   goal:"JSのプロトタイプベース継承の内部構造を理解し、クラス構文との対応を説明できる。Mixinパターン・SOLID原則をJSで実践でき、Object.create・Object.definePropertyを使った高度なオブジェクト操作ができるようになる。",
   sections:[
    {title:"プロトタイプチェーンの内部構造",
     body:`すべてのJavaScriptオブジェクトは[[Prototype]]（内部スロット）を持ち、これがプロトタイプチェーンを形成します。プロパティを参照するとき、オブジェクト自身に見つからなければ[[Prototype]]を辿り、nullに達するまで検索が続きます。これがPythonのMROに相当します。\n\nclassキーワードはこの仕組みの上に乗ったシンタックスシュガーです。class Animalは関数であり、Animal.prototypeにメソッドが定義されます。new Animal()で作ったオブジェクトの[[Prototype]]はAnimal.prototypeを指します。Object.getPrototypeOf()でチェーンを調べられます。\n\nObject.definePropertyを使うと、enumerable・writable・configurableフラグを細かく制御できます。読み取り専用プロパティや、for...inで列挙されないプロパティを作ることが可能で、ライブラリの内部実装でよく使われます。`,
     code:`function Animal(name) { this.name = name; }
Animal.prototype.speak = function() {
  return this.name + "が鳴く";
};

const dog = new Animal("ポチ");
console.log(dog.speak()); // "ポチが鳴く"
console.log(Object.getPrototypeOf(dog) === Animal.prototype); // true

// プロパティ記述子
Object.defineProperty(dog, "id", {
  value: 42,
  writable: false,    // 変更不可
  enumerable: false,  // for...in で非表示
  configurable: false // 削除・再定義不可
});
console.log(dog.id); // 42
dog.id = 99;         // silently ignored（use strict なら TypeError）`,
     afterCode:"Object.freeze()はオブジェクトの全プロパティをconfigurable: false, writable: falseにします。シャローフリーズであるため、ネストしたオブジェクトは凍結されません。ディープフリーズが必要な場合は再帰的にObject.freeze()を適用する必要があります。"},
    {title:"Mixinパターンと合成によるOOP",
     body:`Mixinは複数のオブジェクトのメソッドを一つのクラスに混ぜ込むパターンで、多重継承の代替として使われます。Pythonには多重継承がありますが、JSの単一継承チェーンではMixinが実用的な解決策です。\n\nObject.assign(Target.prototype, MixinA, MixinB)でメソッドを追加できます。ただし同名のメソッドは後から適用したMixinで上書きされるため、衝突に注意が必要です。Symbolを使ったメソッド名で衝突を避けることもできます。\n\n「継承より合成（Composition over Inheritance）」はOOPの設計原則の一つです。深い継承ツリーは変更の影響が広範囲に及びますが、合成では必要な機能を持つオブジェクトを組み合わせるため変更範囲が限定されます。Reactがクラスコンポーネントからフックへ移行した動機の一つもこの原則にあります。`,
     code:`// Mixin の実装
const Serializable = {
  toJSON() { return JSON.stringify(Object.assign({}, this)); },
  toString() { return this.constructor.name + ":" + this.toJSON(); }
};
const Validatable = {
  validate() {
    for (const [key, rule] of Object.entries(this.rules || {})) {
      if (!rule(this[key])) throw new Error(\`\${key} is invalid\`);
    }
    return true;
  }
};

class User {
  constructor(name, age) {
    this.name = name; this.age = age;
    this.rules = {
      name: v => typeof v === "string" && v.length > 0,
      age:  v => Number.isInteger(v) && v >= 0
    };
  }
}
Object.assign(User.prototype, Serializable, Validatable);

const u = new User("Alice", 30);
console.log(u.toJSON());    // '{"name":"Alice","age":30,...}'
console.log(u.validate());  // true`,
     afterCode:"実務ではクラスベースのMixinよりもフック（React Hooks）やコンポジション関数（Vue Composables）のような「関数を返す関数」パターンが好まれています。これはテストのしやすさとthisの問題を避けられるためです。"},

   sections:[
    {title:"イテレータプロトコルとジェネレータ",
     body:`JavaScriptのイテレータプロトコルは「next()メソッドを持ち、{value, done}を返すオブジェクト」を規定します。このプロトコルに従うオブジェクトはfor...of・スプレッド・分割代入で使えます。Pythonの__iter__/__next__に対応します。\n\nジェネレータ関数（function*）はyieldで値を一つずつ生成します。Pythonのジェネレータと概念的に同じですが、JSのジェネレータはyieldに値を渡すことができ（双方向通信）、return値も持てます。\n\n遅延評価（lazy evaluation）は大量データを一度にメモリに乗せず、必要な時だけ計算する手法です。例えば10億件のデータストリームを処理する際、配列に全件格納せずジェネレータで1件ずつ処理することでメモリ使用量を劇的に削減できます。Node.jsのStreamとも相性が良い設計です。`,
     code:`// ジェネレータの基本
function* range(start, end, step=1) {
  for (let i = start; i <= end; i += step) yield i;
}
console.log([...range(1, 10, 2)]); // [1,3,5,7,9]

// 双方向通信（yieldへの値渡し）
function* calculator() {
  let result = 0;
  while (true) {
    const input = yield result;
    if (input === null) break;
    result += input;
  }
  return result;
}
const calc = calculator();
calc.next();     // 起動
calc.next(10);   // {value:10, done:false}
calc.next(20);   // {value:30, done:false}
console.log(calc.next(null)); // {value:30, done:true}`,
     afterCode:"非同期ジェネレータ（async function*）を使うと、非同期データソース（APIページネーション・ファイル読み込み等）を for await...of でストリーム処理できます。Node.jsのReadable Streamと組み合わせて大容量ファイルの行ごと処理に活用されます。"},
    {title:"Symbol とメタプログラミング",
     body:`SymbolはES6で導入された一意の識別子を作るプリミティブ型です。Symbol('foo')で作ったSymbolは同じラベルを使っても別のSymbolになります。これを使ってオブジェクトに「衝突しない」プロパティを追加できます。\n\nよく知られているWell-Known Symbolが組み込みの動作をカスタマイズするために使われます。Symbol.iteratorで反復可能にし、Symbol.toPrimitiveで型変換動作を制御し、Symbol.hasInstanceでinstanceofの動作を変更できます。Pythonの__dunder__メソッドに相当します。\n\nProxyはオブジェクトへのあらゆる操作（get・set・deleteProperty等）を傍受するトラップを定義できます。バリデーション・ロギング・リアクティブシステムの構築に使われます。Vue.jsはProxy+Reflectを使ってリアクティビティを実装しています。`,
     code:`// Symbol による衝突なしプロパティ
const id = Symbol("id");
const user = { name: "Alice", [id]: 12345 };
console.log(user[id]);     // 12345
console.log(Object.keys(user)); // ["name"] ← Symbol は含まれない

// Symbol.toPrimitive でカスタム変換
class Temperature {
  constructor(celsius) { this.celsius = celsius; }
  [Symbol.toPrimitive](hint) {
    if (hint === "number") return this.celsius;
    if (hint === "string") return \`\${this.celsius}°C\`;
    return this.celsius;
  }
}
const temp = new Temperature(25);
console.log(+temp);     // 25（number hint）
console.log(\`\${temp}\`); // "25°C"（string hint）

// Proxy でバリデーション
const validator = new Proxy({}, {
  set(target, key, value) {
    if (key === "age" && typeof value !== "number") throw new TypeError("age must be number");
    target[key] = value;
    return true;
  }
});
validator.age = 30; // OK
// validator.age = "abc"; // TypeError`,
     afterCode:"ReflectオブジェクトはProxyのトラップと1対1に対応するメソッドを持ちます。Proxyのトラップ内でReflect.get(target, key)のように使うと、デフォルト動作を保ちつつ副作用を追加できます。Reflectを使わずにtarget[key]と書くと、循環参照のリスクがあります。"},
  ]},
  {id:"ch4",num:4,title:"非同期深掘り（Event Loop・Web Workers）",est:"60分",
   goal:"MacroTask/MicroTaskキューの優先順位を理解し、Event Loopの実行順序を予測できる。Web Workerでマルチスレッド処理を実装し、SharedArrayBufferとAtomicsを使ったスレッド間通信の基礎が理解できるようになる。",
   sections:[
    {title:"Event Loopの詳細とマイクロタスク/マクロタスク",
     body:`JavaScriptのEvent Loopは「コールスタックが空になったらキューからタスクを取り出して実行する」ループです。このタスクには優先度があり、マイクロタスクキュー（Promise.then・queueMicrotask）がマクロタスクキュー（setTimeout・setInterval・I/O）より必ず先に処理されます。\n\n一つのマクロタスクが終わると、マイクロタスクキューが空になるまで全てのマイクロタスクが実行されます。これがPromise.thenがsetTimeout(fn,0)より先に実行される理由です。Pythonのasyncioのイベントループとは設計が異なり、JSはブラウザのレンダリングと同じスレッドで動作するため、長時間ブロックするとUIが固まります。\n\nqueueMicrotask()関数を使うとPromiseを作らずにマイクロタスクをスケジュールできます。requestAnimationFrame()はブラウザの次の描画フレームの前にコールバックを実行し、アニメーションのタイミング制御に最適です。scheduler.postTask()（Chrome）はタスクに優先度を付ける新しいAPIです。`,
     code:`// 実行順序の確認
console.log("1: 同期開始");

setTimeout(() => console.log("5: setTimeout(0)"), 0);
setTimeout(() => console.log("6: setTimeout(100)"), 100);

Promise.resolve()
  .then(() => console.log("3: Promise 1"))
  .then(() => console.log("4: Promise 2"));

queueMicrotask(() => console.log("2: queueMicrotask"));

console.log("1b: 同期終了");
// 出力順: 1 → 1b → 2 → 3 → 4 → 5 → 6

// requestAnimationFrame（ブラウザのみ）
function animate(timestamp) {
  // 60fps なら約16ms ごとに呼ばれる
  element.style.transform = \`translateX(\${timestamp * 0.1 % 300}px)\`;
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);`,
     afterCode:"長時間の同期処理（ソート・暗号化等）はメインスレッドをブロックしUIを固まらせます。こうした処理はWeb Workerに移すか、チャンクに分けてsetTimeoutでyieldするチャンキングパターンで分散させます。"},
    {title:"Web WorkerとSharedArrayBuffer",
     body:`Web WorkerはブラウザのバックグラウンドスレッドでJSを実行する仕組みです。メインスレッドとWorkerはpostMessage/onmessageで通信しますが、データはシリアライズされてコピーされるため参照の共有はできません（Transferable Objectsを除く）。Pythonのmultiprocessingに概念が近く、GILがない分データコピーが必要です。\n\n大量データのコピーを避けるにはTransferable Objects（ArrayBuffer等）を使います。postMessage(data, [data.buffer])とするとデータの所有権がWorkerに移転し（元は使用不可）、コピーなしで渡せます。\n\nSharedArrayBufferは複数のスレッドで同じメモリ領域を共有します。Atomicsオブジェクトはアトミック操作（競合しない読み書き）を提供し、ロック・セマフォの実装に使えます。セキュリティ上の理由から、SharedArrayBufferを使うにはCross-Origin Isolation（COOP/COEPヘッダー）が必要です。`,
     code:`// メインスレッド
const worker = new Worker("worker.js");

// データ送受信
worker.postMessage({type: "COMPUTE", data: [1,2,3,4,5]});
worker.onmessage = e => console.log("結果:", e.data);
worker.onerror = e => console.error("Workerエラー:", e);

// Transferable で高速コピーなし転送
const buffer = new ArrayBuffer(1024 * 1024); // 1MB
worker.postMessage(buffer, [buffer]); // 所有権転送
// この後 buffer は使用不可（detached）

// worker.js の内容
/*
self.onmessage = e => {
  if (e.data.type === "COMPUTE") {
    const result = e.data.data.map(n => n ** 2);
    self.postMessage(result);
  }
};
*/`,
     afterCode:"SharedArrayBufferはSpectre脆弱性対策のため2018年に一時無効化され、現在はCross-Origin IsolationヘッダーによるSite Isolation設定が必須です。サーバー側でCross-Origin-Opener-Policy: same-originとCross-Origin-Embedder-Policy: require-corpを設定してください。"},
  ]},
  {id:"ch5",num:5,title:"テスト（Jest・Testing Library）",est:"55分",
   goal:"Jest でユニットテスト・モックを書き、Testing Library で UI コンポーネントをユーザー視点でテストできる。テストカバレッジを計測し、TDD のリズムで開発できるようになる。",
   sections:[
    {title:"Jest によるユニットテストとモック",
     body:`Jestはメタ（旧Facebook）が開発したJSテストフレームワークで、設定不要で使い始められる「batteries included」なツールです。describe・test（またはit）・expectを使ったBDDスタイルのテストを書けます。PytestのようにテストファイルはJestが自動検出します。\n\nモック（mock）は依存関係（APIコール・ファイルI/O等）を偽の実装に置き換えてテストを独立させる技法です。jest.fn()でモック関数を作り、mockReturnValue・mockResolvedValue・mockImplementationで振る舞いを定義します。jest.spyOn()を使うと実際のモジュールの特定メソッドだけをモックできます。\n\nカバレッジは「どの行・分岐がテストで実行されたか」を計測します。jest --coverage で生成されるレポートのBranch Coverageが重要で、if/else の両方の経路をテストすることを示します。100%を目指すより、重要なビジネスロジックを確実にカバーする方針が実務では合理的です。`,
     code:`// calculate.test.js
import { add, divide } from "./math.js";

describe("math utilities", () => {
  test("add: 正の整数", () => {
    expect(add(2, 3)).toBe(5);
  });
  test("add: 負の数", () => {
    expect(add(-1, 1)).toBe(0);
  });
  test("divide: ゼロ除算", () => {
    expect(() => divide(1, 0)).toThrow("Division by zero");
  });
});

// 非同期テスト
import { fetchUser } from "./api.js";
jest.mock("./api.js"); // モジュール全体をモック

test("fetchUser", async () => {
  fetchUser.mockResolvedValue({name: "Alice"});
  const user = await fetchUser(1);
  expect(user.name).toBe("Alice");
  expect(fetchUser).toHaveBeenCalledWith(1);
});`,
     afterCode:"beforeEach・afterEach・beforeAll・afterAllでテストのセットアップとクリーンアップを管理します。各テストが独立した状態で実行されるよう、グローバルな状態は必ずbeforeEachでリセットしてください。"},
    {title:"Testing Library によるUIテスト",
     body:`Testing Libraryは「ユーザーがどのようにアプリを使うか」に焦点を当てたUIテストライブラリです。DOM要素をCSSクラスやIDではなく、テキスト・ラベル・ロールで検索することで、実装の詳細に依存しないテストが書けます。Pythonのplaywrightやseleniumに近い目的を持ちますが、jsdomを使ってブラウザなしで動作します。\n\ngetByRole・getByText・getByLabelTextが推奨クエリで、これらはアクセシビリティツリーを参照するためスクリーンリーダーとの互換性も確認できます。getBy系はマッチしないとエラー、queryBy系はnullを返します。waitFor・findBy系は非同期に要素が現れるまで待機します。\n\nuserEventはブラウザのインタラクション（クリック・タイピング・フォーカス）をより忠実にシミュレートします。fireEventより高水準で、実際のユーザー操作に近いテストが書けるため、Testing Library公式も userEvent を推奨しています。`,
     code:`// Counter.test.jsx（Reactコンポーネントの例）
import { render, screen } from "@testing-library/react";
import userEvent from "@testing-library/user-event";
import Counter from "./Counter";

test("ボタンクリックでカウントが増加する", async () => {
  const user = userEvent.setup();
  render(<Counter initialCount={0} />);

  // ユーザー視点でクエリ
  const countDisplay = screen.getByRole("status");
  const incrementBtn = screen.getByRole("button", {name: /increment/i});

  expect(countDisplay).toHaveTextContent("0");
  await user.click(incrementBtn);
  expect(countDisplay).toHaveTextContent("1");
  await user.click(incrementBtn);
  expect(countDisplay).toHaveTextContent("2");
});

test("フォーム送信", async () => {
  const user = userEvent.setup();
  const onSubmit = jest.fn();
  render(<LoginForm onSubmit={onSubmit} />);
  await user.type(screen.getByLabelText("メール"), "test@example.com");
  await user.click(screen.getByRole("button", {name: "ログイン"}));
  expect(onSubmit).toHaveBeenCalledWith({email: "test@example.com"});
});`,
     afterCode:"Storybookと組み合わせると、コンポーネントのビジュアル確認とインタラクションテストを一体管理できます。Storybook 7以降はinteractions addonでTesting Libraryのテストをストーリー内で実行できます。"},
  ]},
  {id:"ch6",num:6,title:"モジュールバンドラー（Vite・esbuild）",est:"50分",
   goal:"Viteでプロジェクトをセットアップし、HMR・プロキシ・環境変数を設定できる。esbuildのAPIとViteのプラグイン機構を理解し、カスタムビルドパイプラインを構築できるようになる。",
   sections:[
    {title:"Viteの仕組みとプロジェクト設定",
     body:`Viteは「ネイティブESモジュール」を開発時にそのままブラウザに提供することで、Webpackのような事前バンドルを不要にし、起動を劇的に高速化したビルドツールです。依存パッケージはesbuildで事前バンドル（prebundle）し、アプリコードはオンデマンドで変換します。\n\nHMR（Hot Module Replacement）は変更されたモジュールだけをブラウザに送信してページリロードなしに反映します。Viteのファイルベースのルーティングと組み合わせると、変更から反映まで数十ミリ秒以下の開発体験が得られます。Webpackと比べて設定が少なく、Pythonのuvicornのように「すぐ動く」を重視した設計思想です。\n\nビルド時にはRollupがコードをバンドルします。manualChunksでコード分割を制御し、不要なpolyfillを除外するためのtargetを指定します。tree-shakingで未使用コードが自動除去され、本番バンドルを最小化できます。`,
     code:`// vite.config.ts
import { defineConfig, loadEnv } from "vite";
import react from "@vitejs/plugin-react";

export default defineConfig(({ mode }) => {
  const env = loadEnv(mode, process.cwd());
  return {
    plugins: [react()],
    resolve: {
      alias: { "@": "/src" }
    },
    server: {
      proxy: {
        "/api": {
          target: env.VITE_API_URL || "http://localhost:3000",
          changeOrigin: true,
          rewrite: path => path.replace(/^\\/api/, "")
        }
      }
    },
    build: {
      target: "es2020",
      rollupOptions: {
        output: {
          manualChunks: {
            vendor: ["react", "react-dom"],
            utils:  ["lodash-es", "date-fns"]
          }
        }
      }
    }
  };
});`,
     afterCode:"環境変数はVITE_プレフィックスが付いたものだけがクライアントコードに公開されます（import.meta.env.VITE_XXXX）。APIキーなど秘密情報はVITE_を付けず、サーバーサイドだけで使うようにしてください。"},
    {title:"esbuildのAPIとViteプラグイン開発",
     body:`esbuildはGoで書かれた超高速なバンドラーで、Viteの開発時prebundleにも使われています。JavaScriptのAPIを通じてプログラマブルに使えます。Pythonのサブプロセスとして実行するより、JSのAPIを使うほうが設定の柔軟性が高く、ウォッチモード・インクリメンタルビルドも簡単に実現できます。\n\nViteプラグインはRollupプラグインのAPIを拡張したものです。transform・load・resolveId・buildStartなどのフックを実装してカスタムファイル変換を追加できます。例えばsvgをReactコンポーネントに変換する@svgr/webpack的な処理や、i18nの静的解析などがプラグインとして実装されます。\n\nesbuildのtransformAPIは単一ファイルのTypeScript/JSX変換に使いやすく、CLIスクリプトや小規模な変換タスクに最適です。bundleAPIより起動が速く、CIでの軽量な変換処理に向いています。`,
     code:`// build.mjs（esbuild API）
import * as esbuild from "esbuild";

await esbuild.build({
  entryPoints: ["src/index.ts"],
  bundle: true,
  format: "esm",
  platform: "browser",
  target: ["es2020"],
  outdir: "dist",
  sourcemap: true,
  minify: true,
  splitting: true,      // コード分割（esm のみ）
  chunkNames: "[name]-[hash]",
  metafile: true,
});

// Vite カスタムプラグイン
function myPlugin() {
  return {
    name: "my-plugin",
    transform(code, id) {
      if (id.endsWith(".txt")) {
        return { code: \`export default \${JSON.stringify(code)}\` };
      }
    },
    resolveId(id) {
      if (id === "virtual:config") return id;
    },
    load(id) {
      if (id === "virtual:config") return \`export const VERSION = "1.0.0"\`;
    }
  };
}`,
     afterCode:"esbuildはTypeScript型検査を行いません（型情報を無視して変換だけ行う）。CIでは別途tsc --noEmitを実行して型エラーをチェックする2段階構成が標準的です。"},
  ]},
  {id:"ch7",num:7,title:"セキュリティ（XSS・CSRF・CSP）",est:"55分",
   goal:"XSS・CSRF・インジェクション攻撃の仕組みを理解し、DOMPurify・SameSiteCookie・CSPヘッダーを使った防御を実装できる。セキュリティレビューのチェックリストを使ってコードレビューができるようになる。",
   sections:[
    {title:"XSSとCSRF攻撃と防御",
     body:`XSS（Cross-Site Scripting）は攻撃者が悪意あるスクリプトをページに挿入する攻撃です。ユーザーが入力した内容をinnerHTMLで挿入するコードは脆弱です。<script>alert(1)<\/script>や<img onerror=\"悪意ある処理\">が典型例です。Pythonのテンプレートエンジン（Jinja2）は自動エスケープでこれを防ぎますが、JSはデフォルトで無防備です。\n\n防御策：textContentを使う（自動エスケープ）、どうしてもHTMLを挿入したい場合はDOMPurifyでsanitizeする、Content-Security-Policyヘッダーでインラインスクリプトを禁止します。HttpOnlyクッキーを使うとJSからクッキーを読めなくなるため、XSSによるセッションハイジャックを防げます。\n\nCSRF（Cross-Site Request Forgery）は他サイトから被害者のセッションを使ってリクエストを送る攻撃です。SameSite=Strict/LaxのクッキーはCSRFの主要な防御策です。追加でCSRFトークン（フォームに埋め込む秘密値）を検証することでより強固になります。PythonのDjango・Flaskにも組み込みCSRF保護があります。`,
     code:`// XSS 脆弱なコード
function vulnerable(input) {
  document.getElementById("out").innerHTML = input; // 危険！
}

// XSS 安全なコード
function safe(input) {
  document.getElementById("out").textContent = input; // OK
}

// DOMPurify でHTMLを許可しつつサニタイズ
import DOMPurify from "dompurify";
function safeHTML(html) {
  return DOMPurify.sanitize(html, {
    ALLOWED_TAGS: ["b","i","a","p","br"],
    ALLOWED_ATTR: ["href"]
  });
}
element.innerHTML = safeHTML(userHtml);

// CSRFトークンをヘッダーに付与
async function apiPost(url, data) {
  const token = document.cookie.match(/csrf=([^;]+)/)?.[1];
  return fetch(url, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-CSRF-Token": token
    },
    body: JSON.stringify(data)
  });
}`,
     afterCode:"eval()・innerHTML・document.write()・setTimeout(文字列, ...)はXSSのリスクがあります。ESLintのno-eval・no-innerHTMLルール（eslint-plugin-security）で機械的に検出できます。"},
    {title:"CSP・SRI・セキュリティヘッダー",
     body:`CSP（Content Security Policy）はブラウザに対して「このページでは何のリソースを読み込んでよいか」を指示するHTTPヘッダーです。スクリプトの読み込み元・実行元・インライン実行の可否を細かく制御でき、XSSの影響を大幅に限定できます。\n\nSRI（Subresource Integrity）はCDNから読み込むリソースのハッシュを検証し、改ざんされたライブラリが読み込まれることを防ぎます。<script integrity=\"sha384-...\">のように書きます。CDNが侵害されてもSRIが通らなければスクリプトは実行されません。\n\nその他重要なセキュリティヘッダー：Strict-Transport-Security（HTTPS強制）・X-Frame-Options（クリックジャッキング防止）・X-Content-Type-Options（MIMEスニッフィング防止）・Referrer-Policy（リファラー情報の制御）は最低限設定すべきです。Helmetsというライブラリ（Express用）はこれらをまとめて設定できます。`,
     code:`// Express での包括的なセキュリティヘッダー設定
import express from "express";
import helmet from "helmet";

const app = express();

// Helmet でセキュリティヘッダーを一括設定
app.use(helmet({
  contentSecurityPolicy: {
    directives: {
      defaultSrc: ["'self'"],
      scriptSrc:  ["'self'", "https://cdnjs.cloudflare.com"],
      styleSrc:   ["'self'", "https://fonts.googleapis.com"],
      imgSrc:     ["'self'", "data:", "https:"],
      connectSrc: ["'self'", "https://api.example.com"],
      fontSrc:    ["https://fonts.gstatic.com"],
      objectSrc:  ["'none'"],
      upgradeInsecureRequests: []
    }
  },
  hsts: { maxAge: 31536000, includeSubDomains: true },
}));

// SameSite Cookie
app.use(session({
  secret: process.env.SESSION_SECRET,
  cookie: { sameSite: "strict", httpOnly: true, secure: true }
}));`,

  {id:"ch8",num:8,title:"パフォーマンス最適化",est:"55分",
   goal:"Lighthouseでボトルネックを特定し、コード分割・遅延読み込み・仮想スクロール・メモ化でLCPとFIDを改善できる。PerformanceAPIで計測し、WebVitalsを基準にした最適化ができるようになる。",
   sections:[
    {title:"計測とCore Web Vitals",
     body:`パフォーマンス最適化の鉄則は「推測するな、計測せよ」です。ブラウザのPerformance APIはナビゲーション・リソース・ペイントの詳細なタイムラインを提供します。LCP（Largest Contentful Paint）・FID（First Input Delay）・CLS（Cumulative Layout Shift）はGoogleのCore Web Vitalsと呼ばれ、検索ランキングにも影響します。\n\nLighthouse（DevTools・CLIどちらでも使用可能）はLCP・TBT・CLSなどを自動計測してアドバイスを提供します。Performance MonitorパネルはリアルタイムでCPU使用率・ヒープサイズを表示します。PythonのcProfileに相当するのがFlame Chartで、どの関数に時間がかかっているかを視覚化します。\n\nweb-vitalsライブラリを使うと実際のユーザーのコア指標を収集できます（Lab Dataではなく実ユーザーのReal User Monitoring）。これをAnalyticsやDatadogに送信してダッシュボード化することで、デプロイの前後でパフォーマンスの回帰を検知できます。`,
     code:`// Performance API での計測
performance.mark("start-operation");
// ... 重い処理 ...
performance.mark("end-operation");
performance.measure("operation", "start-operation", "end-operation");

const entries = performance.getEntriesByName("operation");
console.log(entries[0].duration + "ms");

// Web Vitals 収集
import { onLCP, onFID, onCLS } from "web-vitals";
function sendToAnalytics({name, value, id}) {
  fetch("/analytics", {
    method: "POST",
    body: JSON.stringify({metric: name, value, id}),
    keepalive: true
  });
}
onLCP(sendToAnalytics);
onFID(sendToAnalytics);
onCLS(sendToAnalytics);`,
     afterCode:"LighthouseはCI（GitHub Actions等）で自動実行できます。lighthouse-ci（lhci autorun）をCIに組み込み、スコアが閾値を下回ったらPRをブロックするゲートを設定することで、パフォーマンスの継続的な維持が可能です。"},
    {title:"コード分割・遅延読み込み・メモ化",
     body:`コード分割（Code Splitting）はバンドルを複数のチャンクに分割し、必要なときだけ読み込む技法です。ルートベースの分割が最も効果的で、React.lazy+Suspenseまたはルーターの組み込み機能で実装します。初期ロードに含まれるJSを減らすことでTTI（Time to Interactive）が改善します。\n\n画像・コンポーネント・モジュールの遅延読み込みはIntersection Observer APIで実装できます。<img loading=\"lazy\">はブラウザネイティブの遅延読み込みで設定不要です。重いチャートライブラリなどは、ユーザーが対象の要素に近づいたときだけ動的importでロードします。\n\nメモ化はPythonのfunctools.lru_cacheに対応します。Reactではusememo・useCallbackでコンポーネント内の計算結果や関数参照をキャッシュします。ただしメモ化自体にも計算コストがあるため、プロファイリングで実際にボトルネックになっている箇所にだけ適用することが重要です。`,
     code:`// React.lazy でコンポーネントを遅延読み込み
import { lazy, Suspense } from "react";
const HeavyChart = lazy(() => import("./HeavyChart"));

function App() {
  return (
    <Suspense fallback={<div>読み込み中...</div>}>
      <HeavyChart />
    </Suspense>
  );
}

// Intersection Observer で遅延読み込み
function LazyImage({ src, alt }) {
  const ref = useRef();
  const [loaded, setLoaded] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) { setLoaded(true); obs.disconnect(); }
    });
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return React.createElement("img", {
    ref, src: loaded ? src : undefined, alt,
    style:{minHeight:200, background:"#f3f4f6"}
  });
}`,
