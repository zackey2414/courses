  const cache = new Map(); // クロージャ内に閉じ込める
  return function(...args) {
    const key = JSON.stringify(args);
    if (cache.has(key)) {
      return cache.get(key);
    }
    const result = fn.apply(this, args);
    cache.set(key, result);
    return result;
  };
}

const multiply = (a) => (b) => a * b;

console.log(double(5));  // 10
console.log(multiply(3)(4));  // 12

// 汎用カリー化（クロージャで引数を蓄積）
function curry(fn) {
  return function curried(...args) {
    if (args.length >= fn.length) {
      // 必要な引数が揃ったら実行
      return fn.apply(this, args);
    }
    // まだ足りないので新しい関数を返す（引数を閉じ込める）
    return function(...moreArgs) {

  };

  toJSON() {
    return JSON.stringify(this);
  }
  static fromJSON(json) {
    const data = JSON.parse(json);
    const instance = new this();
    return Object.assign(instance, data);
  }
};

const Validatable = (Base) => class extends Base {
  validate() {
    const rules = this.validationRules?.() ?? [];
    const errors = rules
      .filter(({ check }) => !check(this))
      .map(({ message }) => message);
    if (errors.length > 0) throw new Error(errors.join(', '));
    return true;
  }
};

class User extends Serializable(Validatable(class {})) {

    answer: `class Range {
  constructor(start, end, step = 1) {
    this.start = start;
    this.end = end;
    this.step = step;
  }

  [Symbol.iterator]() {
    let current = this.start;
    const { end, step } = this;
    return {
      next() {
        if (current <= end) {
          const value = current;
          current += step;
          return { value, done: false };
        }
        return { value: undefined, done: true };
      }
    };
  }
}

  const [open, setOpen] = useState(false);
  const stars = '⭐'.repeat(ex.diff);
  return React.createElement('div', {
    style: {
      border: '1.5px solid #ddd6fe', borderRadius: '12px',
      marginBottom: '16px', overflow: 'hidden'
    }
  },
    React.createElement('div', {
      style: {
        background: '#f5f3ff', padding: '14px 18px',
        display: 'flex', alignItems: 'center', gap: '10px'
      }
    },
      React.createElement('span', {
        style: { fontSize: '13px', color: '#7c3aed', fontWeight: 700 }
      }, stars),
      React.createElement('span', {
        style: { fontSize: '14px', whiteSpace: 'pre-wrap', flex: 1 }
      }, ex.q)
    ),
    React.createElement('div', { style: { padding: '0 18px 4px' } },
      React.createElement(Code, { code: ex.code })
    ),
    React.createElement('div', { style: { padding: '0 18px 14px' } },
      React.createElement('button', {
        onClick: () => setOpen(o => !o),
        style: {
          background: open ? '#7c3aed' : '#ede9fe', color: open ? '#fff' : '#4c1d95',
          border: 'none', borderRadius: '8px', padding: '7px 16px',
          cursor: 'pointer', fontSize: '13px', fontWeight: 600, transition: 'all 0.15s'
        }
      }, open ? '▲ 回答を隠す' : '▼ 回答を見る'),
      open && React.createElement(Code, { code: ex.answer })
    )
  );
}

function Section({ sec, chId }) {
  const [open, setOpen] = useState(false);
  return React.createElement('div', {
    style: {
      border: '1px solid #e5e7eb', borderRadius: '12px',
      marginBottom: '10px', overflow: 'hidden'
    }
  },
    React.createElement('button', {
      onClick: () => setOpen(o => !o),
      style: {
        width: '100%', textAlign: 'left', background: open ? '#f5f3ff' : '#fff',
        border: 'none', padding: '14px 20px',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        cursor: 'pointer', fontSize: '15px', fontWeight: 700, color: '#1e1b4b',
        transition: 'background 0.15s'
      }
    },
      React.createElement('span', null, sec.title),
      React.createElement('span', {
        style: {
          fontSize: '18px', color: '#7c3aed',
          transform: open ? 'rotate(180deg)' : 'none', transition: 'transform 0.2s'
        }
      }, '▾')
    ),
    open && React.createElement('div', { style: { padding: '6px 24px 20px' } },
      React.createElement('p', {
        style: {
          fontSize: '14.5px', lineHeight: '1.85', color: '#374151',
          whiteSpace: 'pre-wrap', margin: '12px 0'
        }
      }, sec.body),
      sec.table && React.createElement(DataTable, { data: sec.table }),
      sec.afterTable && React.createElement('p', {
        style: {
          fontSize: '13.5px', lineHeight: '1.8', color: '#6b7280',
          background: '#faf5ff', borderLeft: '3px solid #8b5cf6',
          padding: '10px 14px', borderRadius: '0 8px 8px 0', margin: '8px 0 16px'
        }
      }, sec.afterTable),
      sec.code && React.createElement(Code, { code: sec.code }),
      sec.afterCode && React.createElement('p', {
        style: {
          fontSize: '13.5px', lineHeight: '1.8', color: '#6b7280',
          background: '#faf5ff', borderLeft: '3px solid #8b5cf6',
          padding: '10px 14px', borderRadius: '0 8px 8px 0', margin: '8px 0'
        }
      }, sec.afterCode)
    )
  );
}

/* ── Main App ── */
function JSIntermediateCourse() {
  const [currentChIdx, setCurrentChIdx] = useState(0);
  const ch = chapters[currentChIdx];
  const exList = EX[ch.id] || [];
  const isFirst = currentChIdx === 0;
  const isLast = currentChIdx === chapters.length - 1;

  return React.createElement('div', {
    style: { background: 'linear-gradient(135deg,#f8f7ff 0%,#f3e8ff 100%)', minHeight: '100vh' }
  },
    /* Hero */
    React.createElement('div', {
      style: {
        background: 'linear-gradient(135deg,#4f46e5 0%,#7c3aed 50%,#9333ea 100%)',
        color: '#fff', padding: '60px 20px 48px', textAlign: 'center'
      }
    },
      React.createElement('div', { style: { maxWidth: 800, margin: '0 auto' } },
        React.createElement('div', {
          style: {
            display: 'inline-block', background: 'rgba(255,255,255,0.2)',
            borderRadius: '20px', padding: '4px 14px', fontSize: '12px',
            fontWeight: 700, letterSpacing: '1px', marginBottom: '16px'
          }
        }, 'JavaScript 中級コース'),
        React.createElement('h1', {
          style: { fontSize: 'clamp(26px,5vw,44px)', fontWeight: 900, margin: '0 0 14px' }
        }, 'JavaScript 中級'),
        React.createElement('p', {
          style: { fontSize: '15px', opacity: 0.9, lineHeight: 1.7, margin: '0 0 24px' }
        }, '初級コースで Node.js と Express の基礎を身に付けた後、このコースでは JavaScript 言語そのものの深みを探求します。非同期処理の真髄・クロージャ・プロトタイプ・ジェネレータ・関数型プログラミング・テスト・ビルドツールを習得し、コードの「なぜ」を理解した上で設計できるエンジニアを目指します。Python との類似点・相違点を意識しながら学ぶことで、両言語の強みを使い分けられる実力を養います。'),
        React.createElement('div', {
          style: { display: 'flex', justifyContent: 'center', gap: '24px', flexWrap: 'wrap' }
        },
          [['📚', `${chapters.length} 章`], ['✏️', `${Object.values(EX).flat().length} 演習`], ['⏱', '約7時間']].map(([icon, label]) =>
            React.createElement('div', {
              key: label,
              style: {
                background: 'rgba(255,255,255,0.18)', borderRadius: '10px',
                padding: '8px 20px', fontSize: '14px', fontWeight: 700
              }
            }, `${icon} ${label}`)
          )
        )
      )
    ),

    /* Chapter Nav */
    React.createElement('div', {
      style: {
        maxWidth: 1100, margin: '0 auto', padding: '24px 20px 0'
      }
    },
      React.createElement('div', {
        style: {
          display: 'flex', gap: '8px', flexWrap: 'wrap', marginBottom: '24px'
        }
      },
        chapters.map((c, i) => React.createElement('button', {
          key: c.id,
          onClick: () => setCurrentChIdx(i),
          style: {
            padding: '7px 14px', borderRadius: '20px', border: '1.5px solid',
            borderColor: i === currentChIdx ? '#7c3aed' : '#ddd6fe',
            background: i === currentChIdx ? '#7c3aed' : '#fff',
            color: i === currentChIdx ? '#fff' : '#4c1d95',
            cursor: 'pointer', fontSize: '13px', fontWeight: 600,
            transition: 'all 0.15s'
          }
        }, `${c.num}. ${c.title}`))
      ),

      /* Chapter Card */
      React.createElement('div', {
        style: {
          background: '#fff', borderRadius: '16px',
          boxShadow: '0 2px 20px rgba(99,102,241,0.08)', padding: '32px 28px', marginBottom: '24px'
        }
      },
        React.createElement('div', {
          style: { display: 'flex', alignItems: 'flex-start', gap: '16px', marginBottom: '20px' }
        },
          React.createElement('div', {
            style: {
              width: 44, height: 44, borderRadius: '12px', flexShrink: 0,
              background: 'linear-gradient(135deg,#6366f1,#8b5cf6)',
              color: '#fff', display: 'flex', alignItems: 'center',
              justifyContent: 'center', fontWeight: 900, fontSize: '18px'
            }
          }, ch.num),
          React.createElement('div', { style: { flex: 1 } },
            React.createElement('h2', {
              style: { fontSize: '22px', fontWeight: 800, color: '#1e1b4b', margin: '0 0 4px' }
            }, ch.title),
            React.createElement('span', {
              style: {
                fontSize: '12px', background: '#ede9fe', color: '#6d28d9',
                borderRadius: '6px', padding: '2px 10px', fontWeight: 600
              }
            }, `⏱ ${ch.est}`)
          )
        ),

        /* Goal Block */
        React.createElement('div', {
          style: {
            background: 'linear-gradient(135deg,#f5f3ff,#ede9fe)',
            border: '1.5px solid #c4b5fd', borderRadius: '12px',
            padding: '14px 18px', marginBottom: '24px'
          }
        },
          React.createElement('div', {
            style: { fontSize: '12px', fontWeight: 800, color: '#5b21b6', marginBottom: '6px' }
          }, '🎯 この章のゴール'),
          React.createElement('p', {
            style: { fontSize: '14px', lineHeight: '1.75', color: '#3b1b8e', margin: 0 }
          }, ch.goal)
        ),

        /* Sections */
        ch.sections.map((sec, si) =>
          React.createElement(Section, { key: `${ch.id}-s${si}`, sec, chId: ch.id })
        ),

        /* Exercises */
        exList.length > 0 && React.createElement('div', { style: { marginTop: '28px' } },
          React.createElement('h3', {
            style: {
              fontSize: '17px', fontWeight: 800, color: '#1e1b4b',
              margin: '0 0 16px', display: 'flex', alignItems: 'center', gap: '8px'
            }
          }, '✏️ 演習問題'),
          exList.map((ex, ei) =>
            React.createElement(Exercise, { key: `${ch.id}-ex${ei}`, ex, chId: ch.id })
          )
        ),

        /* Chapter Nav Buttons */
        React.createElement('div', {
          style: {
            display: 'flex', justifyContent: 'space-between',
            marginTop: '32px', gap: '12px'
          }
        },
          React.createElement('button', {
            onClick: () => { if (!isFirst) setCurrentChIdx(i => i - 1); },
            disabled: isFirst,
            style: {
              padding: '10px 24px', borderRadius: '10px',
              border: '1.5px solid #ddd6fe',
              background: isFirst ? '#f5f3ff' : '#fff',
              color: isFirst ? '#a78bfa' : '#4c1d95',
              cursor: isFirst ? 'default' : 'pointer',
              fontWeight: 600, fontSize: '14px', transition: 'all 0.15s'
            }
          }, '← 前の章'),
          isLast
            ? React.createElement('a', {
                href: '../index.html',
                style: {
                  padding: '10px 24px', borderRadius: '10px',
                  background: 'linear-gradient(135deg,#6366f1,#7c3aed)',
                  color: '#fff', textDecoration: 'none',
                  fontWeight: 700, fontSize: '14px', display: 'inline-flex',
                  alignItems: 'center', gap: '6px'
                }
              }, '🎓 コース完了 — ホームへ')
            : React.createElement('button', {
                onClick: () => setCurrentChIdx(i => i + 1),
                style: {
                  padding: '10px 24px', borderRadius: '10px',
                  background: 'linear-gradient(135deg,#6366f1,#7c3aed)',
                  color: '#fff', border: 'none',
                  cursor: 'pointer', fontWeight: 700, fontSize: '14px',
                  transition: 'all 0.15s'
                }
              }, '次の章 →')
        )
      ),

      /* Footer */
      React.createElement('footer', {
        style: {
          textAlign: 'center', padding: '24px', fontSize: '12px', color: '#9ca3af'
        }
      }, 'developer.mozilla.org ・ ECMAScript 2024 時点')
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(JSIntermediateCourse)
);
  </script>
</body>
