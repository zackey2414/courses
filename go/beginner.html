import (

)

func getDataPath() (string, error) {
    base := os.Getenv("XDG_DATA_HOME")
    if base == "" {
        home, err := os.UserHomeDir()
        if err != nil { return "", err }
        base = filepath.Join(home, ".local", "share")
    }
    dir := filepath.Join(base, "todo")
    if err := os.MkdirAll(dir, 0755); err != nil { return "", err }
    return filepath.Join(dir, "todos.json"), nil

import (
    "fmt"
    "net/http"
    "sync"
    "time"
)

func fetchAll(urls []string) map[string]time.Duration {
    var mu sync.Mutex
    results := make(map[string]time.Duration)
    var wg sync.WaitGroup

    for _, url := range urls {
        wg.Add(1)
        go func(u string) {
            defer wg.Done()
            start := time.Now()
            resp, err := http.Get(u)
            if err == nil { resp.Body.Close() }
            mu.Lock()
            results[u] = time.Since(start)
            mu.Unlock()
        }(url)
    }
    wg.Wait()
    return results
}`},

import (
    "context"
    "fmt"
    "os"
    "os/signal"
    "syscall"
    "time"
)

func worker(ctx context.Context) {
    for {
        select {
        case <-ctx.Done():
            fmt.Println("worker stopped")
            return
        default:
            fmt.Println("working...")
            time.Sleep(500 * time.Millisecond)
        }
    }
}

func main() {
    ctx, cancel := context.WithCancel(context.Background())
    go worker(ctx)

    sig := make(chan os.Signal, 1)
    signal.Notify(sig, syscall.SIGINT, syscall.SIGTERM)
    <-sig
    fmt.Println("shutting down...")
    cancel()
    time.Sleep(100 * time.Millisecond)
}`},

import (
    "encoding/json"
    "errors"
    "fmt"
    "os"
    "path/filepath"

func getDataPath() (string, error) {
    dir, err := os.UserCacheDir() // OS別キャッシュディレクトリ
    if err != nil { return "", fmt.Errorf("cache dir: %w", err) }
    todoDir := filepath.Join(dir, "todo-cli")
    if err := os.MkdirAll(todoDir, 0755); err != nil {
        return "", fmt.Errorf("mkdir: %w", err)
    }
    return filepath.Join(todoDir, "todos.json"), nil
}

func Load(path string) ([]Todo, error) {
    b, err := os.ReadFile(path)
    if err != nil {
        if errors.Is(err, os.ErrNotExist) { return []Todo{}, nil }
        return nil, fmt.Errorf("read: %w", err)
    }
    var todos []Todo
    if err := json.Unmarshal(b, &todos); err != nil {
        return nil, fmt.Errorf("parse: %w", err)
    }
    return todos, nil
}

func Save(path string, todos []Todo) error {
    b, err := json.MarshalIndent(todos, "", "  ")
    if err != nil { return fmt.Errorf("marshal: %w", err) }
    return os.WriteFile(path, b, 0644)
}`,

Go 1.21以降はslices.SortFuncやslices.FilterFuncが標準ライブラリに含まれていますが、sort.Sliceを理解することが基本です。sort.SliceはPythonのsorted(key=...)に対応し、比較関数を渡します。strings.ToLowerとstrings.Containsを組み合わせた大文字小文字を区別しない検索はWebアプリでもよく使うパターンです。`,

import (
    "sort"
    "strings"
)

func (l *TodoList) FilterByStatus(done bool) []Todo {
    var result []Todo
    for _, t := range l.todos {
        if t.Done == done { result = append(result, t) }
    }
    return result
}

func (l *TodoList) SortBy(field string) {
    switch field {
    case "priority":
        sort.Slice(l.todos, func(i, j int) bool {
            return l.todos[i].Priority > l.todos[j].Priority // 高い優先度が先
        })
    case "created":
        sort.Slice(l.todos, func(i, j int) bool {
            return l.todos[i].CreatedAt.Before(l.todos[j].CreatedAt)
        })
    }
}

func (l *TodoList) Search(keyword string) []Todo {
    kw := strings.ToLower(keyword)
    var result []Todo
    for _, t := range l.todos {
        if strings.Contains(strings.ToLower(t.Title), kw) {
            result = append(result, t)
        }
    }
    return result
}`,
afterCode:`Goのslicesパッケージ（1.21+）ではslices.SortFunc(l.todos, func(a, b Todo) int { return cmp.Compare(a.Priority, b.Priority) })と書けます。cmp.Compareはint・string等の比較に使えるジェネリクス関数です。`},

{title:"美しいCLI出力",
body:`CLIツールの出力は人間が読みやすいテーブル形式とプログラムが処理しやすいJSON形式の両方に対応するのが実務的です。text/tabwriterはタブを使ったカラム揃えを行うGoの標準ライブラリです。Pythonのtabulate・rich.tableに相当しますが、追加ライブラリなしで使えます。

ANSIエスケープコードで色付き出力が可能ですが、ファイルにリダイレクトされた場合（os.Stdout.Stat()でパイプ確認）は色をオフにするのが礼儀です。github.com/fatih/colorクレートはこの判定を自動で行います。`,
code:`package main

import (
    "encoding/json"
    "fmt"
    "os"
    "text/tabwriter"
)

func printTable(todos []Todo) {
    w := tabwriter.NewWriter(os.Stdout, 0, 0, 2, ' ', tabwriter.StripEscape)
    defer w.Flush()

    fmt.Fprintln(w, "ID\tStatus\tPriority\tTitle\tCreated")
    fmt.Fprintln(w, strings.Repeat("-", 60))
    for _, t := range todos {
        status := "[ ]"
        if t.Done { status = "[x]" }
        fmt.Fprintf(w, "%d\t%s\t%s\t%s\t%s\n",
            t.ID, status, t.Priority,
            t.Title, t.CreatedAt.Format("2006-01-02"),
        )
    }
}

func Print(todos []Todo, format string) error {
    switch format {
    case "json":
        return json.NewEncoder(os.Stdout).Encode(todos)
    case "table":
        printTable(todos)
        return nil
    default:
        return fmt.Errorf("unknown format: %s", format)
    }
}`,
afterCode:`Goの日付フォーマットはPythonのstrftimeと異なり、Goでは参照時刻（2006-01-02 15:04:05 MST）の表現で指定します。これはGoの設計者が選んだ独特のアプローチです。`},

body:`Todoアプリにtodo serveコマンドを追加してRESTful APIを提供します。同じビジネスロジック（TodoList）をCLIとAPIの両方で再利用できるのがGoの設計の強みです。net/httpだけで基本的なAPIを構築でき、実務プロジェクトではgithub.com/go-chi/chi等のルーターを追加します。

ミドルウェアはhttp.Handler（ServeHTTP(w, r)を持つインターフェース）を受け取りhttp.Handlerを返す関数として実装します。ロギング・認証・CORS等の横断的関心事をミドルウェアとして分離することで、ハンドラのコードが本来の処理に集中できます。`,

import (
    "encoding/json"
    "fmt"
    "log/slog"
    "net/http"
    "strconv"
    "strings"
    "time"
)

type API struct{ list *TodoList }

func NewAPI(l *TodoList) *API { return &API{list: l} }

func (a *API) ServeHTTP(w http.ResponseWriter, r *http.Request) {
    // /todos または /todos/{id}
    parts := strings.Split(strings.Trim(r.URL.Path, "/"), "/")
    switch {
    case len(parts) == 1 && parts[0] == "todos":
        a.handleTodos(w, r)
    case len(parts) == 2 && parts[0] == "todos":
        id, err := strconv.Atoi(parts[1])
        if err != nil { http.Error(w, "invalid id", http.StatusBadRequest); return }
        a.handleTodo(w, r, id)
    default:
        http.NotFound(w, r)
    }
}`,
afterCode:`実務ではgithub.com/go-chi/chiを使うとパスパラメータの抽出が chi.URLParam(r, "id")で書けます。net/httpはルーティング機能が貧弱なため、chi・gin・echo等のルーターを採用するのが一般的です。`},

net/http/httptestはHTTPハンドラをテストするための標準ライブラリです。実際のTCPサーバーを起動せずにHandlerを直接呼び出せるため、テストが高速で決定論的です。Pythonのflaskのtest_clientに相当しますが、標準ライブラリに含まれています。`,

import (

func TestAPICreateTodo(t *testing.T) {
    list := NewTodoList()
    api := NewAPI(list)

    tests := []struct {
        name    string
        body    map[string]any
        wantCode int
    }{
        {"valid", map[string]any{"title": "test"}, http.StatusCreated},
        {"empty title", map[string]any{"title": ""}, http.StatusBadRequest},
        {"no title", map[string]any{}, http.StatusBadRequest},
    }

    for _, tc := range tests {
        t.Run(tc.name, func(t *testing.T) {
            b, _ := json.Marshal(tc.body)
            req := httptest.NewRequest(http.MethodPost, "/todos", bytes.NewReader(b))
            req.Header.Set("Content-Type", "application/json")
            rec := httptest.NewRecorder()
            api.ServeHTTP(rec, req)

{title:"Todoアプリへの並行処理の組み込み",
body:`Todoアプリにtodo sync コマンドを追加し、複数のAPIエンドポイントから並行してTodoを取得・マージする機能を実装します。同期的に実行すると複数のHTTPリクエストがシリアルになりますが、goroutineで並列化するとN倍の高速化が期待できます。

worker poolパターンはgoroutineの数を制限しつつ大量のタスクを処理する設計パターンです。semaphoreチャネル（make(chan struct{}, N)）を使ってN個のgoroutineが同時実行されるよう制限します。PythonのThreadPoolExecutorのmax_workersに相当する制御が、Goではチャネルだけで実現できます。`,
table:T.goroutinePatterns,
code:`package main

import (
    "context"
    "net/http"
    "sync"
    "time"
)

type FetchResult struct {
    URL   string
    Todos []Todo
    Err   error
}

func fetchWithContext(ctx context.Context, url string) FetchResult {
    req, err := http.NewRequestWithContext(ctx, http.MethodGet, url, nil)
    if err != nil { return FetchResult{URL: url, Err: err} }

    resp, err := http.DefaultClient.Do(req)
    if err != nil { return FetchResult{URL: url, Err: err} }
    defer resp.Body.Close()

    var todos []Todo
    if err := json.NewDecoder(resp.Body).Decode(&todos); err != nil {
        return FetchResult{URL: url, Err: err}
    }
    return FetchResult{URL: url, Todos: todos}
}

func fetchAll(ctx context.Context, urls []string, maxWorkers int) []FetchResult {
    results := make([]FetchResult, len(urls))
    sem := make(chan struct{}, maxWorkers)
    var wg sync.WaitGroup

    for i, url := range urls {

{id:"ch9",num:9,title:"ビルドとリリース",est:"55分",
goal:"Makefile・goreleaser・GitHub Actionsを使ってCI/CDパイプラインを構築できる。クロスプラットフォームバイナリを配布できる。",
sections:[
{title:"GoアプリケーションのCI/CD",
body:`Goのシングルバイナリという特性を活かして、Linux・macOS・Windowsの各アーキテクチャ向けバイナリを一つのCIで自動生成できます。goreleaserはGitHubリリースへのバイナリアップロード・チェックサム計算・Homebrewフォーミュラ更新まで自動化します。

ldflags -X でビルド時に変数を埋め込む技法は、バイナリにバージョン番号・コミットハッシュを埋め込む際に使います。go build -ldflags="-X main.Version=v1.0.0"とすると、main.Versionが"v1.0.0"になります。Pythonの__version__変数に相当するパターンです。`,
table:T.buildRelease,
code:`// main.go にバージョン情報を埋め込む
package main

import (
    "fmt"
    "github.com/spf13/cobra"
)

// ビルド時に -ldflags "-X main.Version=v1.0.0" で設定
var (
    Version = "dev"
    Commit  = "none"
    Date    = "unknown"
)

var versionCmd = &cobra.Command{
    Use:   "version",
    Short: "Print version information",
    Run: func(cmd *cobra.Command, args []string) {
        fmt.Printf("todo-cli %s (commit: %s, built: %s)\n", Version, Commit, Date)
    },
}`,
afterCode:`go install でローカルにインストールできます。go install github.com/yourname/todo-cli@latest でGitHubから直接インストールもできます。goreleaserのbrewタップ機能を使うとbrew install yourname/tap/todo-cliでも配布できます。`},
]},
{id:"ch10",num:10,title:"設定管理とロギング・完成",est:"55分",
goal:"viperで設定ファイル管理、log/slogで構造化ログを実装できる。Todoアプリの全機能を統合した完成版を仕上げられる。",
sections:[
{title:"設定管理とログ",
body:`本番アプリにはフラグだけでなく設定ファイルと環境変数の両方に対応した設定管理が必要です。viperはcobra + 設定ファイル（YAML/JSON/TOML） + 環境変数を統合して管理できるライブラリで、12-Factor Appの原則に沿った設計が可能です。

Go 1.21以降ではlog/slogが標準ライブラリに加わり、構造化ログが標準で書けます。キー・値のペアでログを出力することで、Elasticsearch・Loki・CloudWatch Logsでの検索が大幅に効率化されます。Pythonのloguru・structlogに相当する機能です。`,
table:T.configPattern,
afterTable:`環境変数のサポートはviper.AutomaticEnv()と viper.SetEnvPrefix("TODO")で自動的に有効になります。TODO_PORT環境変数がport設定に対応します。Dockerコンテナでの設定に便利です。`},
{title:"アプリ完成と振り返り",
body:`10章を通じてtodo-cliを段階的に構築しました。最終的なアプリはcobra + viper + log/slog + encoding/json + net/httpを組み合わせた本番レベルの設計になっています。このアプリの設計パターンは実務のGoプロジェクトの縮小版として、そのまま応用できます。

Pythonのスクリプトと比べて初期の実装量は多いですが、型安全性・クロスプラットフォーム・シングルバイナリ・高い並行性という明確な利点があります。次の中級コースではより大規模なGoアプリケーションの設計パターン・データベース連携・マイクロサービスを学びます。`,
code:`// 完成版のmain.goの全体像
package main

import (
    "log/slog"
    "os"
)

func main() {
    // 構造化ロガーの設定
    handler := slog.NewJSONHandler(os.Stdout, &slog.HandlerOptions{
        Level: slog.LevelInfo,
    })
    slog.SetDefault(slog.New(handler))

    // データパスの解決
    path, err := getDataPath()
    if err != nil {
        slog.Error("failed to get data path", "error", err)
        os.Exit(1)
    }

    // Todoリストの読み込み
    todos, err := Load(path)
    if err != nil {
        slog.Error("failed to load todos", "error", err)
        os.Exit(1)
    }

    list := &TodoList{todos: todos}

    // コマンド実行
    if err := Execute(list, path); err != nil {
        slog.Error("command failed", "error", err)
        os.Exit(1)
    }
}`,

]},
];
