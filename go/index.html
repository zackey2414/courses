code:"package main\n\nimport (\n    \"fmt\"\n    \"sort\"\n    \"strings\"\n)\n\nfunc wordCount(s string) map[string]int {\n    // ここに書く\n}\n\nfunc main() {\n    wc := wordCount(\"go is great and go is fast\")\n    keys := make([]string, 0, len(wc))\n    for k := range wc { keys = append(keys, k) }\n    sort.Strings(keys)\n    for _, k := range keys {\n        fmt.Printf(\"%s: %d\n\", k, wc[k])\n    }\n}",
answer:"package main\n\nimport (\n    \"fmt\"\n    \"sort\"\n    \"strings\"\n)\n\nfunc wordCount(s string) map[string]int {\n    counts := make(map[string]int)\n    for _, w := range strings.Fields(s) {\n        counts[w]++\n    }\n    return counts\n}\n\nfunc main() {\n    wc := wordCount(\"go is great and go is fast\")\n    keys := make([]string, 0, len(wc))\n    for k := range wc { keys = append(keys, k) }\n    sort.Strings(keys)\n    for _, k := range keys {\n        fmt.Printf(\"%s: %d\n\", k, wc[k])\n    }\n}"},

code:"package main\n\nimport \"fmt\"\n\ntype Person struct {\n    Name string\n    Age  int\n}\n\n// Greet: 値レシーバ。\"Hi, I'm <Name>!\" を返す\n// HaveBirthday: ポインタレシーバ。Ageを1増やす\n\nfunc main() {\n    p := Person{Name: \"Alice\", Age: 30}\n    fmt.Println(p.Greet())\n    p.HaveBirthday()\n    fmt.Println(p.Age) // 31\n}",
answer:"package main\n\nimport \"fmt\"\n\ntype Person struct {\n    Name string\n    Age  int\n}\n\nfunc (p Person) Greet() string {\n    return \"Hi, I'm \" + p.Name + \"!\"\n}\n\nfunc (p *Person) HaveBirthday() {\n    p.Age++\n}\n\nfunc main() {\n    p := Person{Name: \"Alice\", Age: 30}\n    fmt.Println(p.Greet())\n    p.HaveBirthday()\n    fmt.Println(p.Age) // 31\n}"},

  {diff:1,q:"Shapeインターフェース（Area() float64）を定義し、CircleとRectangleで実装して面積を出力するprintArea関数を書け。",
code:"package main\n\nimport (\n    \"fmt\"\n    \"math\"\n)\n\ntype Shape interface {\n    Area() float64\n}\n\ntype Circle struct{ R float64 }\ntype Rectangle struct{ W, H float64 }\n\n// Area()を実装\n\nfunc printArea(s Shape) {\n    fmt.Printf(\"%.2f\n\", s.Area())\n}\n\nfunc main() {\n    printArea(Circle{5})\n    printArea(Rectangle{3, 4})\n}",
answer:"package main\n\nimport (\n    \"fmt\"\n    \"math\"\n)\n\ntype Shape interface {\n    Area() float64\n}\n\ntype Circle struct{ R float64 }\ntype Rectangle struct{ W, H float64 }\n\nfunc (c Circle) Area() float64    { return math.Pi * c.R * c.R }\nfunc (r Rectangle) Area() float64 { return r.W * r.H }\n\nfunc printArea(s Shape) {\n    fmt.Printf(\"%.2f\n\", s.Area())\n}\n\nfunc main() {\n    printArea(Circle{5})\n    printArea(Rectangle{3, 4})\n}"},
  {diff:2,q:"型スイッチを使い、any型の引数がint/string/bool/[]intかを判定して内容を出力するdescribe関数を書け。",
code:"package main\n\nimport \"fmt\"\n\nfunc describe(i any) {\n    // switch v := i.(type) を使う\n}\n\nfunc main() {\n    describe(42)\n    describe(\"hello\")\n    describe(true)\n    describe([]int{1, 2, 3})\n    describe(3.14)\n}",
answer:"package main\n\nimport \"fmt\"\n\nfunc describe(i any) {\n    switch v := i.(type) {\n    case int:\n        fmt.Printf(\"int: %d\n\", v)\n    case string:\n        fmt.Printf(\"string: %q\n\", v)\n    case bool:\n        fmt.Printf(\"bool: %v\n\", v)\n    case []int:\n        fmt.Printf(\"[]int: %v\n\", v)\n    default:\n        fmt.Printf(\"unknown: %T = %v\n\", v, v)\n    }\n}\n\nfunc main() {\n    describe(42)\n    describe(\"hello\")\n    describe(true)\n    describe([]int{1, 2, 3})\n    describe(3.14)\n}"},

code:"package main\n\nimport (\n    \"errors\"\n    \"fmt\"\n)\n\nvar ErrNotFound = errors.New(\"not found\")\n\nfunc findItem(id int) error {\n    if id <= 0 {\n        return fmt.Errorf(\"findItem(%d): %w\", id, ErrNotFound)\n    }\n    return nil\n}\n\nfunc main() {\n    err := findItem(-1)\n    fmt.Println(err)\n    fmt.Println(errors.Is(err, ErrNotFound)) // ここに書く\n}",
answer:"package main\n\nimport (\n    \"errors\"\n    \"fmt\"\n)\n\nvar ErrNotFound = errors.New(\"not found\")\n\nfunc findItem(id int) error {\n    if id <= 0 {\n        return fmt.Errorf(\"findItem(%d): %w\", id, ErrNotFound)\n    }\n    return nil\n}\n\nfunc main() {\n    err := findItem(-1)\n    fmt.Println(err)                         // findItem(-1): not found\n    fmt.Println(errors.Is(err, ErrNotFound)) // true\n}"},
  {diff:2,q:"ValidationError型（Field, Message フィールド）を定義し、errors.AsでValidationErrorとして取り出すコードを書け。",
code:"package main\n\nimport (\n    \"errors\"\n    \"fmt\"\n)\n\ntype ValidationError struct {\n    Field   string\n    Message string\n}\n\nfunc (e *ValidationError) Error() string {\n    return fmt.Sprintf(\"%s: %s\", e.Field, e.Message)\n}\n\nfunc validate(age int) error {\n    if age < 0 {\n        return fmt.Errorf(\"validate: %w\", &ValidationError{\n            Field:   \"age\",\n            Message: \"must be >= 0\",\n        })\n    }\n    return nil\n}\n\nfunc main() {\n    err := validate(-5)\n    var ve *ValidationError\n    if errors.As(err, &ve) {\n        fmt.Printf(\"field=%s msg=%s\n\", ve.Field, ve.Message)\n    }\n}",

code:"package main\n\nimport (\n    \"fmt\"\n    \"sync\"\n    \"time\"\n)\n\nfunc worker(id int, wg *sync.WaitGroup) {\n    defer wg.Done()\n    time.Sleep(10 * time.Millisecond)\n    fmt.Printf(\"worker %d done\n\", id)\n}\n\nfunc main() {\n    var wg sync.WaitGroup\n    // 3つのgoroutineをgo文で起動\n    wg.Wait()\n    fmt.Println(\"all done\")\n}",
answer:"package main\n\nimport (\n    \"fmt\"\n    \"sync\"\n    \"time\"\n)\n\nfunc worker(id int, wg *sync.WaitGroup) {\n    defer wg.Done()\n    time.Sleep(10 * time.Millisecond)\n    fmt.Printf(\"worker %d done\n\", id)\n}\n\nfunc main() {\n    var wg sync.WaitGroup\n    for i := 1; i <= 3; i++ {\n        wg.Add(1)\n        go worker(i, &wg)\n    }\n    wg.Wait()\n    fmt.Println(\"all done\")\n}"},

code:"package main\n\nimport (\n    \"fmt\"\n    \"time\"\n)\n\nfunc main() {\n    ch1 := make(chan string, 1)\n    ch2 := make(chan string, 1)\n\n    go func() { time.Sleep(20*time.Millisecond); ch1 <- \"from ch1\" }()\n    go func() { time.Sleep(10*time.Millisecond); ch2 <- \"from ch2\" }()\n\n    // selectで両方受け取る（2回ループ）\n}",
answer:"package main\n\nimport (\n    \"fmt\"\n    \"time\"\n)\n\nfunc main() {\n    ch1 := make(chan string, 1)\n    ch2 := make(chan string, 1)\n\n    go func() { time.Sleep(20 * time.Millisecond); ch1 <- \"from ch1\" }()\n    go func() { time.Sleep(10 * time.Millisecond); ch2 <- \"from ch2\" }()\n\n    for i := 0; i < 2; i++ {\n        select {\n        case msg := <-ch1:\n            fmt.Println(msg)\n        case msg := <-ch2:\n            fmt.Println(msg)\n        case <-time.After(500 * time.Millisecond):\n            fmt.Println(\"timeout\")\n        }\n    }\n}"},

const chapters = [
{id:"ch1",num:1,title:"Goとは・開発環境",est:"60分",
goal:"Goとは何か、なぜGoogleが作ったのかを説明できる。Goの設計思想（シンプル・高速・並行）を3つ説明できる。go mod init / go run / go build / go fmt の各コマンドの役割を理解し使えるようになる。Hello Worldプログラムの全行（package / import / func main / fmt.Println）の意味を正確に説明できる。",
sections:[
{title:"Goとは何か — 誕生の背景",
body:"Go（別名Golang）は、2009年にGoogleのRobert Griesemer、Rob Pike、Ken Thompsonの3名によって開発され、オープンソースとして公開されたプログラミング言語です。Googleでは数百万行規模のC++コードベースを数千人のエンジニアが共同で開発していましたが、コンパイル時間が数十分以上かかる、依存関係が複雑すぎる、新人がコードを読めないといった問題が深刻化していました。Goはこれらの問題を根本から解決するために、「シンプルさ」を最優先の設計原則として生まれた言語です。\n\nPythonを書いてきた方にとって、Goは「Pythonの書きやすさとC言語の実行速度の中間」を狙った言語と考えるとイメージしやすいでしょう。Pythonのように動的にオブジェクトを扱うのではなく、コンパイル時に型を全てチェックします。しかしC++のように複雑なテンプレートや継承階層はなく、覚えるべきキーワードは25個だけです。Pythonが「素早くプロトタイプを作る」のに優れている一方、Goは「本番環境で安定して高速に動くサーバーやCLIツールを作る」のに優れています。\n\nGoが特に広く使われている分野は、Webサーバー（バックエンドAPI）、コマンドラインツール、DevOpsツール（Docker、Kubernetes、Terraform）、マイクロサービスです。これらの分野でGoが選ばれる理由は、高速な起動時間、低メモリ消費、シングルバイナリでのデプロイの容易さ、そして言語レベルで組み込まれた並行処理機能にあります。"},
{title:"GoとPython・他言語との比較",
body:"Goを学ぶにあたって、Pythonとの違いを最初に整理しておくと理解がスムーズです。最も大きな違いは「型システム」です。Pythonでは x = 10 と書いた後に x = \"hello\" と別の型の値を代入できますが、Goでは一度 int 型として宣言した変数に文字列を代入するとコンパイルエラーになります。この静的型付けにより、実行前に多くのバグを検出できます。\n\nもう一つの大きな違いはエラー処理です。Pythonでは try/except で例外をキャッチしますが、Goでは関数が結果とエラーの2つの値を返し、呼び出し側が if err != nil で明示的にチェックします。最初は冗長に感じるかもしれませんが、「このコードはどこでエラーが起きうるか」が一目でわかるため、大規模プロジェクトでは保守性が高まります。また、Goにはコードフォーマッタ go fmt が標準で付属しており、チーム全体のコードスタイルが自動的に統一されます。Pythonの Black や autopep8 に相当しますが、Goでは言語公式ツールとして最初から組み込まれている点が異なります。",
table:T.vsOthers,
afterTable:"この比較表を見ると、GoはPythonとRustの中間的な位置にあることがわかります。Pythonほど自由ではありませんが、Rustほど厳格でもありません。Goの最大の実用上の強みは、シングルバイナリでのデプロイです。go build を実行するだけで、依存ライブラリを全て含んだ実行バイナリが1ファイルで生成されます。Pythonのようにvirtualenvを構築して依存パッケージをインストールする必要がなく、そのバイナリをそのままサーバーやDockerイメージに配置するだけで動きます。"},
{title:"開発環境のセットアップ",
body:"Goの開発環境の構築は非常にシンプルです。go.dev/dl にアクセスし、お使いのOS（Windows / macOS / Linux）に対応したインストーラをダウンロードして実行するだけです。macOSの場合は Homebrew で brew install go と実行する方法もあります。インストールが完了すると、ターミナルで go version と入力してバージョン番号が表示されることを確認してください。\n\nPythonでは pip（パッケージ管理）、black（フォーマッタ）、pytest（テストランナー）、pyinstaller（バイナリ化）といった複数のツールを別途インストールする必要がありましたが、Goではこれら全てが go コマンド1つに集約されています。go run（実行）、go build（ビルド）、go test（テスト）、go fmt（フォーマット）、go vet（静的解析）など、開発に必要な全てのツールが最初から使えます。エディタとしてはVSCodeに Go 拡張機能をインストールするのが最も手軽です。保存のたびに自動フォーマットが走り、型エラーもリアルタイムで表示されます。\n\nGoのプロジェクトを始めるには、まずモジュールの初期化が必要です。任意のディレクトリで go mod init モジュール名 を実行すると、go.mod ファイルが生成されます。このファイルはPythonの requirements.txt や pyproject.toml に相当し、プロジェクトが依存する外部パッケージとGoのバージョンを管理します。以下のコマンドでプロジェクトを開始できます。",
code:"# ターミナルでの操作手順\n\n# 1. プロジェクト用ディレクトリを作成\nmkdir hello-go\ncd hello-go\n\n# 2. Goモジュールを初期化（go.modが生成される）\n#    モジュール名は通常 github.com/ユーザー名/プロジェクト名 の形式\ngo mod init example.com/hello-go\n\n# 3. main.go ファイルを作成（次のセクションで中身を書きます）\n\n# 4. プログラムをコンパイルせずに直接実行（開発中に便利）\ngo run main.go\n\n# 5. バイナリファイルを生成（本番デプロイ用）\ngo build -o hello\n\n# 6. 生成されたバイナリを直接実行\n./hello",
afterCode:"go run はコンパイルと実行を一度に行うため開発中に便利ですが、毎回コンパイルが走ります。go build で生成したバイナリは直接実行でき、コンパイル済みのため起動が非常に高速です。本番環境やCI/CDでは go build を使い、ローカルでの動作確認には go run を使うのが一般的です。"},
{title:"goコマンド一覧",
body:"Goの開発ではほぼ全ての操作を go コマンドで行います。以下に、最もよく使うコマンドを紹介します。Pythonでは pip install、python -m pytest、black . など複数の異なるコマンドを使い分けていましたが、Goでは go の後にサブコマンドを指定するだけで全てが完結します。\n\n特に重要なのは go fmt です。Goのコミュニティでは「コードスタイルの議論に時間を使わない」という文化があり、go fmt がGoの公式スタイルに自動整形します。インデントはタブ、波括弧の位置、import の順序など全てが統一されます。チームメンバー全員が同じフォーマッタを使うため、コードレビューでスタイルの指摘が一切なくなります。go vet は go fmt とは別のツールで、コード中の論理的な問題（Printfのフォーマット文字列と引数の不一致など）を検出します。",
table:T.goTools,
afterTable:"go test は Go に標準で組み込まれたテストランナーです。Pythonでは pytest を別途インストールする必要がありましたが、Goでは最初から使えます。_test.go で終わるファイルにテスト関数を書くだけで、go test ./... で全テストが実行されます。テストの書き方は後の章で詳しく扱います。"},
{title:"Hello World — 全行の解説",
body:"いよいよ最初のGoプログラムを書きましょう。先ほど作成したプロジェクトのディレクトリに main.go というファイルを作成し、以下のコードを記述します。Pythonでは print(\"Hello\") の1行で済みましたが、Goでは3つの要素（package宣言、import、func main）が必要です。一見すると記述量が増えたように見えますが、それぞれの要素が明確な役割を持っており、コードが大規模になったときにプロジェクトの構造を整理する基盤となります。\n\nまず package main は「このファイルは main パッケージに属する」ことを宣言しています。Goのプログラムは必ず1つ以上のパッケージで構成され、実行可能なバイナリのエントリーポイントは必ず main パッケージの中にある main 関数です。Pythonの if __name__ == \"__main__\": に相当しますが、Goではパッケージ名で役割が決まります。次に import \"fmt\" は、標準ライブラリの fmt パッケージを読み込んでいます。fmt はフォーマット付き入出力（Formatted I/O）の略で、Pythonの print() や f-string に相当する機能を提供します。\n\nfunc main() はプログラムのエントリーポイント（起動時に最初に呼ばれる関数）です。Pythonではファイルのトップレベルに書いたコードがそのまま実行されますが、Goでは必ず main 関数の中に処理を書きます。fmt.Println は「Print line」の略で、引数を出力した後に改行を付けます。Pythonの print() とほぼ同じ動作です。パッケージ名.関数名（fmt.Println）の形式で関数を呼ぶのがGoの基本です。",
code:"// main.go — 最初のGoプログラム\n\npackage main          // ① このファイルはmainパッケージに属する\n                      //    mainパッケージ = 実行可能バイナリのエントリーポイント\n\nimport \"fmt\"          // ② 標準ライブラリのfmtパッケージを読み込む\n                      //    fmt = Formatted I/O（フォーマット付き入出力）\n                      //    Pythonの print() に相当する機能を提供\n\nfunc main() {         // ③ エントリーポイント関数\n                      //    Goプログラムはここから実行が始まる\n                      //    Pythonの if __name__ == \"__main__\": に相当\n\n    fmt.Println(\"Hello, Gopher!\")   // 文字列を出力して改行\n                                     // Pythonの print(\"Hello, Gopher!\") と同じ\n\n    fmt.Printf(\"Go version: %s\\n\", \"1.22\")  // フォーマット付き出力\n                                              // Pythonの print(f\"Go version: {'1.22'}\") に相当\n                                              // %s = 文字列, %d = 整数, %f = 浮動小数点\n\n    fmt.Println(\"整数:\", 42, \"真偽値:\", true)  // 複数の値をスペース区切りで出力\n                                                // Pythonの print(\"整数:\", 42, \"真偽値:\", True) と同じ\n}",
afterCode:"このプログラムを go run main.go で実行すると、3行の出力が得られます。Goで非常に重要なルールが2つあります。1つ目は「未使用のimportはコンパイルエラーになる」ことです。import \"fmt\" と書いておきながら fmt を一度も使わなければビルドが通りません。2つ目は「未使用の変数もコンパイルエラーになる」ことです。x := 10 と宣言して x を一度も使わなければエラーです。Pythonでは警告すら出ませんが、Goは不要なコードを残すことを許しません。これは大規模なコードベースをクリーンに保つための設計上の判断です。"},
{title:"fmt パッケージの基本的な出力関数",
body:"fmt パッケージには複数の出力関数があり、場面に応じて使い分けます。最もよく使うのは fmt.Println（改行付き出力）と fmt.Printf（フォーマット付き出力）の2つです。Pythonでは print() 関数1つで全ての出力を行い、フォーマットには f-string を使いますが、Goでは用途に応じて関数を選びます。\n\nfmt.Printf のフォーマット指定子（verb）は、C言語の printf と同じ書式です。%s は文字列、%d は整数、%f は浮動小数点数、%v は任意の型の値をデフォルト書式で出力、%T は値の型名を出力します。Pythonの f\"{x}\" に相当するのが fmt.Sprintf(\"%d\", x) で、これは文字列を返す関数です（画面には出力しません）。デバッグ時に変数の型と値を確認するには fmt.Printf(\"%T: %v\\n\", x, x) が便利です。\n\nfmt.Print は改行なしの出力、fmt.Println は引数をスペースで区切って末尾に改行を付ける出力です。fmt.Sprint / fmt.Sprintf / fmt.Sprintln はそれぞれ対応する関数の「文字列を返す版」で、出力せずに文字列として変数に格納したいときに使います。エラーメッセージの構築などでよく使われます。",
code:"package main\n\nimport \"fmt\"\n\nfunc main() {\n    name := \"Gopher\"\n    age := 3\n    pi := 3.14159\n\n    // Println: 引数をスペースで区切り、末尾に改行を付けて出力\n    fmt.Println(\"名前:\", name, \"年齢:\", age)\n    // 出力: 名前: Gopher 年齢: 3\n\n    // Printf: フォーマット指定子を使った出力（改行は自分で書く）\n    fmt.Printf(\"名前=%s 年齢=%d 円周率=%.2f\\n\", name, age, pi)\n    // 出力: 名前=Gopher 年齢=3 円周率=3.14\n\n    // %v: 任意の型をデフォルト書式で出力\n    fmt.Printf(\"値: %v\\n\", []int{1, 2, 3})\n    // 出力: 値: [1 2 3]\n\n    // %T: 型名を出力（デバッグに便利）\n    fmt.Printf(\"型: %T\\n\", age)\n    // 出力: 型: int\n\n    // Sprintf: 出力せず文字列として返す\n    msg := fmt.Sprintf(\"%sは%d歳です\", name, age)\n    fmt.Println(msg)\n    // 出力: Gopherは3歳です\n}",
afterCode:"fmt.Printf で改行を出力するには \\n を文字列中に含める必要があります。fmt.Println は自動で改行を付けますが、fmt.Printf は付けません。この違いはPythonの print() と sys.stdout.write() の関係に似ています。フォーマット指定子と引数の数が一致しない場合、go vet が警告を出してくれます。"},
]},

sections:[
{title:"変数宣言：var と :=",
body:"Goには変数宣言の方法が複数ありますが、基本は2種類です。var キーワードによる明示的宣言と、:=（短縮宣言、ショートバリアブル宣言）です。Pythonでは x = 10 と書くだけで変数が作られ、型を指定する必要はありませんでした。Goでも型推論は強力で x := 10 と書けばコンパイラが自動的に int 型と判断しますが、一度宣言された変数の型は以降変更できません。これがGoの静的型付けの基本です。\n\n:= と var の最も重要な使い分けルールは、:= は関数の内部でしか使えないということです。ファイルのトップレベル（パッケージレベル）で変数を宣言する場合は必ず var を使います。これは「グローバルな状態は明示的に宣言すべきだ」というGoの設計思想を反映しています。関数内では短くて読みやすい := が圧倒的に多用されます。実務のGoコードでは、関数内の変数宣言の8〜9割が := で書かれると言ってよいでしょう。\n\nもう一つ重要なルールは、宣言した変数は必ず使わなければならないことです。Pythonでは使わない変数を宣言しても何も起きませんが、Goでは未使用の変数がコンパイルエラーになります。これは「不要なコードを残さない」という強い方針で、大規模プロジェクトでコードの品質を保つために有効です。不要な変数を削除し忘れることがなくなります。",
table:T.varDecl,
afterTable:"この表を見て迷ったら、次のルールを覚えてください。関数内では := を使い、パッケージレベルでは var を使う。型を明示したい場合だけ var x int = 10 の形式を使う。この3つのルールだけでほとんどの場面をカバーできます。",
code:"package main\n\nimport \"fmt\"\n\n// パッケージレベル（関数の外）は var のみ使える\n// ここで := を使うとコンパイルエラーになる\nvar version = \"1.0.0\"       // 型推論で string になる\nvar maxRetries int = 3      // 型を明示的に指定\n\nfunc main() {\n    // 関数内では := が主役\n    name := \"Gopher\"        // string型と推論\n    age := 3                // int型と推論\n\n    // var で宣言すると「ゼロ値」で初期化される\n    // ゼロ値とは、その型のデフォルト値のこと\n    var count int            // 0 で初期化\n    var label string         // \"\"（空文字列）で初期化\n    var active bool          // false で初期化\n    fmt.Println(count, label, active) // 0  false\n\n    // 複数の変数を一度に宣言\n    x, y := 10, 20\n    fmt.Println(name, age, x+y)  // Gopher 3 30\n    fmt.Println(version, maxRetries)\n\n    // var をブロックでまとめて宣言することもできる\n    var (\n        width  = 100\n        height = 200\n    )\n    fmt.Println(width, height)\n}",
afterCode:"Pythonでは変数に何度でも異なる型の値を代入できます（x = 10 の後に x = \"hello\" と書ける）が、Goでは不可能です。age := 3 の後に age = \"three\" と書くとコンパイルエラーになります。この制約は不便に感じるかもしれませんが、大規模なコードベースで「この変数には何が入っているか」が常に保証されるため、バグの予防と可読性の向上に大きく貢献します。"},
{title:"ゼロ値 — GoのNoneに相当する概念",
body:"Goでは全ての変数が宣言時に自動的に「ゼロ値」で初期化されます。数値型は0、文字列型は空文字列\"\"、真偽値型はfalse、ポインタ・スライス・マップ・チャネル・インターフェースはnilです。Pythonでは初期化せずに変数を使おうとすると NameError が発生しますが、Goでは宣言した時点で必ず有効な値が入っています。\n\nこの設計には明確な理由があります。C言語では未初期化の変数にはメモリ上のゴミデータが入っており、予測不能な動作の原因になっていました。Goは「全ての変数は安全なデフォルト値を持つ」という方針を取ることで、未初期化変数によるバグを完全に排除しています。Pythonの None に最も近いのはGoのゼロ値ですが、ゼロ値は型ごとに異なる有効な値である点が None とは異なります。int のゼロ値は0という有効な整数ですし、string のゼロ値は\"\"という有効な空文字列です。\n\nこのゼロ値の仕組みは実務で非常に便利です。例えば、マップの値としてintを使うカウンター（counts[word]++）では、存在しないキーにアクセスしてもゼロ値0が返されるため、初期化処理を書く必要がありません。Pythonで defaultdict(int) を使うのと同じことが、Goでは追加のインポートなしに実現できます。",
code:"package main\n\nimport \"fmt\"\n\nfunc main() {\n    // 全ての型にゼロ値がある\n    var i int        // ゼロ値: 0\n    var f float64    // ゼロ値: 0.0（内部的には0）\n    var s string     // ゼロ値: \"\"（空文字列）\n    var b bool       // ゼロ値: false\n    var p *int       // ゼロ値: nil（ポインタ型）\n\n    fmt.Printf(\"int: %d\\n\", i)         // 0\n    fmt.Printf(\"float64: %f\\n\", f)     // 0.000000\n    fmt.Printf(\"string: %q\\n\", s)      // \"\"（%qは引用符付き出力）\n    fmt.Printf(\"bool: %t\\n\", b)        // false\n    fmt.Printf(\"pointer: %v\\n\", p)     // <nil>\n\n    // ゼロ値の実用例: カウンター\n    // マップの値が存在しないキーにアクセスすると\n    // 値型のゼロ値が返される\n    counts := make(map[string]int)\n    words := []string{\"go\", \"is\", \"great\", \"go\", \"is\", \"fast\"}\n    for _, w := range words {\n        counts[w]++ // 初回アクセスでもゼロ値0に+1で正しく動く\n    }\n    fmt.Println(counts) // map[fast:1 go:2 great:1 is:2]\n}",
afterCode:"Pythonでは if x is None: でNoneチェックをしますが、Goでは if p == nil でnilチェックを行います。ただし nil はポインタ・スライス・マップ・チャネル・インターフェース・関数型にのみ使える値で、int や string にはありません。int型の変数に「値が未設定」であることを示したい場合は *int（ポインタ）を使い、nilで「未設定」を表現するパターンがあります。"},
{title:"基本型・数値型のサイズ",
body:"Goには豊富な数値型があります。整数型は int、int8、int16、int32、int64 と、それぞれに対応する符号なし版 uint、uint8 などが存在します。Pythonの整数は任意精度（メモリが許す限りいくらでも大きくなる）ですが、Goの整数はビット幅が固定されています。int型はプラットフォームに依存し、64bitOSでは64bit、32bitOSでは32bitになります。日常的なコードでは int を使えば十分で、データのシリアライズやバイナリプロトコルなど、ビット幅を厳密に制御する必要がある場面でのみ int32 や int64 を明示します。\n\nfloat32 と float64 の2つの浮動小数点型があります。Pythonの float は内部的に64bit（C言語のdouble）ですが、Goでは明示的に精度を選択します。科学計算やほとんどの用途では float64 を使ってください。float32 はGPU計算や画像処理など、メモリ効率が重要な場面で使います。bool型は true/false の2値で、Pythonの True/False に相当しますが、先頭が小文字である点に注意してください。\n\nbyte と rune は特別な型エイリアスです。byte は uint8 の別名で、バイナリデータやASCII文字の操作に使います。rune は int32 の別名で、Unicodeコードポイント（1文字）を表します。Pythonでは文字列中の1文字は常にUnicode文字ですが、Goの文字列はUTF-8エンコードされたバイト列であり、日本語のような非ASCII文字を正しく扱うにはruneが必要です。for range でGoの文字列を反復すると、自動的にrune単位でデコードされます。",
table:T.basicTypes,
afterTable:"この表で「ゼロ値」列に注目してください。全ての型に安全なデフォルト値があります。string のゼロ値が nil ではなく空文字列 \"\" であることは、Pythonの None とは異なる重要なポイントです。"},
{title:"明示的型変換 — Goが暗黙変換を禁止する理由",
body:"Goには暗黙の型変換（implicit type conversion）が一切ありません。Pythonでは 1 + 1.5 と書くと自動的に整数1がfloat 1.0に変換されて計算されますが、Goでは int 型の変数と float64 型の変数を直接足し算するとコンパイルエラーになります。必ず明示的に型変換関数を呼ぶ必要があります。\n\nこの設計は「暗黙の変換による予期しないデータの損失を防ぐ」ためです。例えば、int64 の大きな値を int32 に代入すると、上位ビットが切り捨てられて全く異なる値になります。Pythonではこのような問題が起きません（整数は任意精度）が、固定ビット幅の型を持つ言語では深刻なバグの原因になります。Goは変換を明示的に書かせることで、開発者に「この変換で精度が落ちる可能性がある」ことを自覚させます。\n\n文字列と数値の変換には特に注意が必要です。string(65) はASCII 65番の文字 \"A\" を返しますが、文字列 \"65\" を得るには strconv.Itoa(65) を使います。これはPythonの str(65) に相当しますが、関数名が異なるので覚えておく必要があります。逆に文字列から数値への変換は strconv.Atoi(\"65\") で、戻り値はエラーとの多値返却になります。",
code:"package main\n\nimport (\n    \"fmt\"\n    \"strconv\"\n    \"math\"\n)\n\nfunc main() {\n    // int と float64 の型変換\n    x := 100            // int\n    y := 3.14           // float64\n    // z := x + y       // コンパイルエラー！ 型が異なる\n    z := float64(x) + y // 明示的にfloat64に変換してから加算\n    fmt.Println(z)      // 103.14\n\n    // float64 → int は小数点以下が切り捨てられる\n    pi := 3.99\n    n := int(pi)         // 3（切り捨て、四捨五入ではない）\n    fmt.Println(n)       // 3\n\n    // math.Round で四捨五入してから変換\n    rounded := int(math.Round(pi))\n    fmt.Println(rounded) // 4\n\n    // byte と rune\n    ch := 'A'            // rune（int32の別名）\n    fmt.Printf(\"文字: %c, コード: %d\\n\", ch, ch)  // 文字: A, コード: 65\n\n    // Unicodeのrune（日本語など）\n    kanji := 'あ'\n    fmt.Printf(\"文字: %c, コード: %d\\n\", kanji, kanji)  // 文字: あ, コード: 12354\n\n    // 文字列 ↔ 数値 の変換（strconvパッケージ）\n    // 数値 → 文字列\n    s1 := strconv.Itoa(42)     // \"42\" （Pythonの str(42) に相当）\n    s2 := string(65)           // \"A\"  （注意! 数字の文字列\"65\"ではない）\n    fmt.Println(s1, s2)        // 42 A\n\n    // 文字列 → 数値（エラーも返す多値返却）\n    num, err := strconv.Atoi(\"123\")\n    if err != nil {\n        fmt.Println(\"変換エラー:\", err)\n    } else {\n        fmt.Println(\"変換結果:\", num) // 123\n    }\n}",
afterCode:"型変換の記述は T(v) の形式です。float64(x) で int を float64 に、int(f) で float64 を int に変換します。ただし int(f) は小数点以下を「切り捨て」であり、「四捨五入」ではありません。四捨五入が必要な場合は math.Round を組み合わせてください。strconv パッケージの関数名は覚えにくいですが、Itoa = Integer to ASCII、Atoi = ASCII to Integer と覚えると忘れにくくなります。"},
]},

{id:"ch3",num:3,title:"定数・iota・関数",est:"60分",
goal:"constとiotaで列挙型を定義できる。iotaのリセットルールとビットフラグパターンを理解する。func宣言・多値返却・名前付き戻り値・可変長引数・クロージャを全て書ける。GoとPythonの関数の違い（多値返却 vs 例外、型シグネチャ）を説明できる。",
sections:[
{title:"定数（const） — 変更不可の値を宣言する",
body:"定数はconstキーワードで宣言します。変数（var / :=）と異なり、定数はコンパイル時に値が確定し、プログラムの実行中に変更されることはありません。Pythonでは定数を表すために「大文字のスネークケース」（MAX_RETRIES = 3）という命名規則を使いますが、これは単なる慣習であり、実行時に MAX_RETRIES = 999 と上書きすることが可能です。Goのconstは言語レベルで不変性を保証するため、誤って値を変更するバグを根本的に防げます。\n\nGoの定数にできるのは数値（整数・浮動小数点数）、文字列、真偽値のリテラルだけです。スライスやマップ、構造体は定数にできません。これは「コンパイル時に完全に評価できる値」だけを定数として認めるという厳格な方針によるものです。Pythonではタプルやfrozensetなど多様な不変オブジェクトがありますが、Goの定数はより限定的です。定数の重要な特徴として「型なし定数（untyped constant）」があります。const x = 10 と書くと、この10は特定の型に束縛されず、int にも float64 にも使える柔軟な定数になります。\n\n複数の定数をまとめて宣言する場合は、const ブロック（括弧で囲む形式）を使います。この形式は次に紹介する iota と組み合わせることで真価を発揮します。",
code:"package main\n\nimport \"fmt\"\n\n// 単独の定数宣言\nconst pi = 3.14159265358979    // 型なし定数（float64にもfloat32にも使える）\nconst appName string = \"MyApp\"  // 型付き定数（string型に固定）\n\n// constブロックで複数の定数をまとめて宣言\nconst (\n    maxRetries = 3\n    timeout    = 30  // 秒\n    baseURL    = \"https://api.example.com\"\n)\n\nfunc main() {\n    fmt.Println(pi)        // 3.14159265358979\n    fmt.Println(appName)   // MyApp\n    fmt.Println(maxRetries, timeout)\n\n    // 型なし定数は文脈に応じて型が決まる\n    var f32 float32 = pi   // float32として使える\n    var f64 float64 = pi   // float64としても使える\n    fmt.Println(f32, f64)\n\n    // 定数は再代入できない\n    // pi = 3.0  // コンパイルエラー: cannot assign to pi\n}",
afterCode:"Pythonの MAX_RETRIES = 3 は実行時に変更可能な単なる変数ですが、Goの const maxRetries = 3 はコンパイラが不変性を保証します。大規模プロジェクトでは「この値は絶対に変わらない」ことが型レベルで保証されていることが、コードの信頼性を高めます。"},
{title:"iota — 連番定数の自動生成",
body:"iota はGoの const ブロック内でのみ使える特別な識別子で、0から自動的にインクリメントされます。Pythonで列挙型を作るには from enum import Enum をインポートして Enum クラスを継承する必要がありますが、Goでは iota を使うだけでシンプルに連番定数を定義できます。iota は const ブロックを新しく開くたびに0にリセットされるため、複数のconst ブロックで独立した連番を持つことができます。\n\niota が特に威力を発揮するのが「ビットフラグ」パターンです。1 << iota と書くと、1, 2, 4, 8, 16... とビットごとに異なるフラグ値が生成されます。ファイルのパーミッション（読み取り・書き込み・実行）やユーザーの権限管理など、複数の状態を組み合わせて表現する場面でよく使われます。Pythonの Flag（enum.Flag）に相当しますが、Goではビット演算子 |（OR）、&（AND）で直接操作します。\n\niota には他にも便利なパターンがあります。最初の値を _ = iota でスキップしたり、iota + 1 で1始まりの連番にしたり、iota * 100 で100刻みの値を生成したりできます。const ブロック内の各行で iota の値が1ずつ増えるという単純なルールさえ覚えておけば、あらゆるパターンに応用できます。",
table:T.constIota,
afterTable:"iotaのパターンは一見すると魔法のように見えますが、ルールは非常にシンプルです。constブロックの最初の行でiota=0、次の行でiota=1、その次でiota=2...と増えていくだけです。各行の式が省略されると、前の行の式がそのまま繰り返されます。",
code:"package main\n\nimport \"fmt\"\n\n// 曜日の列挙型（typeで新しい型を定義）\ntype Weekday int\n\nconst (\n    Sunday    Weekday = iota  // iota=0 → Sunday=0\n    Monday                    // iota=1 → Monday=1（前行の式が繰り返される）\n    Tuesday                   // iota=2 → Tuesday=2\n    Wednesday                 // iota=3\n    Thursday                  // iota=4\n    Friday                    // iota=5\n    Saturday                  // iota=6\n)\n\n// ビットフラグ（権限設定などに使う）\ntype Permission uint\n\nconst (\n    Read    Permission = 1 << iota  // 1 << 0 = 1  (0b001)\n    Write                           // 1 << 1 = 2  (0b010)\n    Execute                         // 1 << 2 = 4  (0b100)\n)\n\n// 別のconstブロック → iotaは0にリセットされる\ntype Color int\n\nconst (\n    Red   Color = iota  // 0（リセットされている）\n    Green               // 1\n    Blue                // 2\n)\n\nfunc main() {\n    fmt.Println(Sunday, Monday, Saturday) // 0 1 6\n\n    // ビット演算でフラグを組み合わせる\n    perm := Read | Write          // 0b001 | 0b010 = 0b011 = 3\n    fmt.Println(perm)             // 3\n    fmt.Println(perm&Read != 0)   // true（読み取り権限あり）\n    fmt.Println(perm&Execute != 0) // false（実行権限なし）\n\n    // フラグの追加と削除\n    perm = perm | Execute         // 実行権限を追加\n    fmt.Println(perm)             // 7 (0b111)\n    perm = perm &^ Write          // 書き込み権限を削除（&^はビットクリア演算子）\n    fmt.Println(perm)             // 5 (0b101)\n}",
afterCode:"type Weekday int のように新しい型を定義することで、単なる整数ではなく「曜日を表す型」として使えます。func schedule(day Weekday) のように引数の型を Weekday にすると、schedule(42) のような無効な値を渡すとコンパイル時に型の不一致として検出されやすくなります。Pythonの enum.Enum ほど厳密な型安全ではありませんが、コードの意図を明確にする効果があります。"},
{title:"関数の基本 — 宣言と多値返却",
body:"Goの関数は func キーワードで宣言します。Pythonの def に相当しますが、大きな違いが2つあります。第一に、引数と戻り値の型を明示する必要があります。Pythonでは def add(a, b): と型なしで書けますが、Goでは func add(a, b int) int と全ての型を書きます。これにより、関数のシグネチャを見るだけで「何を受け取って何を返すか」が一目でわかります。型アノテーション（type hint）を使えばPythonでも同様のことができますが、Pythonの型ヒントは任意であり強制されません。\n\nGoの関数で最も特徴的なのは多値返却（Multiple Return Values）です。関数は複数の値を同時に返すことができ、最も一般的なパターンは (結果, エラー) の2つを返すことです。例えば result, err := divide(10, 0) のように受け取り、if err != nil でエラーをチェックします。Pythonでは try/except で例外をキャッチしますが、Goのこのパターンでは「エラーが起きうる場所」が関数シグネチャから明白になります。エラーチェックを書き忘れるとコンパイラが警告を出す（未使用変数エラー）ため、エラー処理の漏れを防げます。\n\nGoには「名前付き戻り値」という機能もあります。戻り値に名前を付けると、関数内でその名前を変数として使え、return 文で値を省略（naked return）できます。短い関数では可読性が上がりますが、長い関数では naked return を避け、明示的に return sum, product と書く方が読みやすいとされています。",
table:T.funcFeatures,
afterTable:"この表の「関数は第一級値」という特徴は特に重要です。Pythonと同様に、Goの関数は変数に代入したり、別の関数の引数として渡したりできます。これはクロージャ・コールバック・ミドルウェアパターンなど、多くの場面で活用されます。",
code:"package main\n\nimport (\n    \"errors\"\n    \"fmt\"\n)\n\n// 基本的な関数: 引数と戻り値の型を明示\nfunc add(a, b int) int {\n    return a + b\n}\n\n// 多値返却: 結果とエラーを同時に返す（Goで最も重要なパターン）\nfunc divide(a, b float64) (float64, error) {\n    if b == 0 {\n        return 0, errors.New(\"ゼロで除算できません\")\n    }\n    return a / b, nil  // nil = エラーなし\n}\n\n// 名前付き戻り値: 戻り値に名前を付ける\nfunc addMul(a, b int) (sum int, product int) {\n    sum = a + b       // 名前付き戻り値は変数として使える\n    product = a * b\n    return            // naked return（名前付き戻り値を自動的に返す）\n}\n\nfunc main() {\n    fmt.Println(add(3, 4))  // 7\n\n    // 多値返却の受け取り方\n    result, err := divide(10, 3)\n    if err != nil {\n        fmt.Println(\"エラー:\", err)\n    } else {\n        fmt.Printf(\"結果: %.4f\\n\", result)  // 結果: 3.3333\n    }\n\n    // エラーになるケース\n    _, err = divide(10, 0)\n    if err != nil {\n        fmt.Println(\"エラー:\", err)  // エラー: ゼロで除算できません\n    }\n\n    // 名前付き戻り値\n    s, p := addMul(3, 4)\n    fmt.Println(s, p)  // 7 12\n}",
afterCode:"多値返却で不要な値がある場合は _ (ブランク識別子) で受け捨てます。例えば _, err := divide(10, 3) のように結果を無視してエラーだけチェックすることができます。Pythonでも _ = some_func() と慣習的に使いますが、Goでは _ は言語仕様として「値を捨てる」ために定義された特別な識別子です。"},
{title:"可変長引数・クロージャ・関数を値として扱う",
body:"可変長引数は ... を使って、任意の個数の引数を受け取る関数を定義する機能です。Pythonの *args に相当します。func sum(nums ...int) と書くと、nums は関数内で []int（intのスライス）として扱われます。呼び出し側は sum(1, 2, 3) のように個々の値を渡すことも、既存のスライスを sum(mySlice...) のように展開して渡すこともできます。Pythonで func(*args) として受け取り、func(*my_list) で展開するのと同じパターンです。\n\nクロージャは外側のスコープの変数を「閉じ込めて」参照し続ける関数です。概念はPythonのクロージャと全く同じですが、重要な違いがあります。Pythonでは外側の変数を変更するために nonlocal キーワードが必要でしたが、Goでは宣言なしに外側の変数を読み書きできます。クロージャは「状態を持つ関数」を作りたい場面でよく使います。例えばカウンター、フィルター関数の生成、goroutineへの値の受け渡し（後の章で学習）などが典型的な用途です。\n\nGoの関数はPythonと同様に「第一級値（first-class value）」です。変数に代入したり、別の関数の引数として渡したり、関数から関数を返したりできます。型としては func(int, int) int のように、引数と戻り値の型で関数型が表現されます。HTTPサーバーのミドルウェアやイベントハンドラなど、コールバックパターンで頻繁に使われます。",
code:"package main\n\nimport \"fmt\"\n\n// 可変長引数: ...で任意個数を受け取る\n// nums は関数内で []int（スライス）として扱われる\nfunc sum(nums ...int) int {\n    total := 0\n    for _, n := range nums {\n        total += n\n    }\n    return total\n}\n\n// クロージャ: 外側の変数をキャプチャする関数を返す\nfunc makeCounter() func() int {\n    count := 0  // この変数はクロージャにキャプチャされる\n    return func() int {\n        count++      // 外側のcountを直接変更できる（nonlocal不要）\n        return count\n    }\n}\n\n// 関数を引数として受け取る（高階関数）\nfunc applyToAll(nums []int, fn func(int) int) []int {\n    result := make([]int, len(nums))\n    for i, n := range nums {\n        result[i] = fn(n)\n    }\n    return result\n}\n\nfunc main() {\n    // 可変長引数: 個別に渡す\n    fmt.Println(sum(1, 2, 3, 4, 5))  // 15\n    fmt.Println(sum(10, 20))          // 30\n\n    // スライスを展開して渡す（Pythonの *args に相当）\n    nums := []int{1, 2, 3}\n    fmt.Println(sum(nums...))         // 6\n\n    // クロージャ: 呼び出すたびにカウントが増える\n    counter := makeCounter()\n    fmt.Println(counter())  // 1\n    fmt.Println(counter())  // 2\n    fmt.Println(counter())  // 3\n\n    // 独立したカウンターを作れる\n    counter2 := makeCounter()\n    fmt.Println(counter2()) // 1（独立した状態）\n\n    // 関数を引数に渡す（高階関数）\n    doubled := applyToAll([]int{1, 2, 3}, func(n int) int {\n        return n * 2\n    })\n    fmt.Println(doubled)  // [2 4 6]\n\n    // 無名関数を変数に代入\n    greet := func(name string) string {\n        return \"Hello, \" + name + \"!\"\n    }\n    fmt.Println(greet(\"Gopher\"))  // Hello, Gopher!\n}",
afterCode:"クロージャを goroutine（後の章で学習）と組み合わせる場合、ループ変数のキャプチャに注意が必要です。for i := 0; i < 3; i++ { go func() { fmt.Println(i) }() } と書くと、全ての goroutine が同じ変数 i を参照してしまい、期待通りに動きません。Go 1.22以降ではこの問題は解消されましたが、それ以前のバージョンでは go func(n int) { fmt.Println(n) }(i) のように引数で渡すのが安全なパターンです。"},
]},

{id:"ch4",num:4,title:"制御構文",est:"45分",
goal:"GoにはwhileがなくforだけでWhile・無限ループ・range反復を表現できることを実証できる。ifの初期化文・switchのfall through不要・deferのLIFO順を説明できる。",
sections:[
{title:"for・if・switch",
body:"Goにはwhileキーワードが存在しません。ループは全てforで書きます。for i := 0; i < n; i++ は通常のforループ、for cond {} はwhile相当、for {} は無限ループ、for i, v := range s はPythonのenumerate()相当です。これだけ覚えればGoのループは全て書けます。\n\nswitchはPythonのmatch文やif-elifに相当しますが、重要な違いがあります。Goのswitchはデフォルトでbreakされるためfall throughがなく、caseにマッチしたら自動的に処理が終わります。これはCやJavaのswitchと逆で、誤って次のcaseに落ちるバグを防ぎます。明示的に次のcaseに落としたい場合はfallthroughキーワードを使います。ifには初期化文を書けるため、スコープを関数内に限定した変数を持てます。",
table:T.controlFlow,
code:"package main\n\nimport (\n    \"fmt\"\n    \"strings\"\n)\n\nfunc grade(score int) string {\n    switch {\n    case score >= 90:\n        return \"A\"\n    case score >= 75:\n        return \"B\"\n    case score >= 60:\n        return \"C\"\n    default:\n        return \"F\"\n    }\n}\n\nfunc main() {\n    // for range で文字列（Unicodeコードポイント単位）\n    for i, r := range \"Go言語\" {\n        fmt.Printf(\"index=%d char=%c\n\", i, r)\n    }\n\n    // if 初期化文: スコープを限定\n    langs := []string{\"Go\", \"Python\", \"Rust\"}\n    if idx := strings.Index(strings.Join(langs, \",\"), \"Go\"); idx >= 0 {\n        fmt.Println(\"Go found at index:\", idx)\n    }\n\n    fmt.Println(grade(92), grade(70), grade(50))\n}",
afterCode:"for range でmapを反復する場合、keyとvalueの両方が取れます。valueが不要な場合は for k := range m、keyが不要な場合は for _, v := range m と書きます。Pythonのfor k, v in d.items()と概念は同じです。"},
{title:"defer・panic・recover",
body:"deferは「関数が終了する直前に実行する処理」を予約する構文です。ファイルのClose・ロックの解除・ログ出力など、「必ず後始末をしたい」処理に使います。Pythonのfinallyブロックやwithステートメントのcontextmanagerに相当します。複数のdeferが積まれた場合はLIFO（後入れ先出し）順で実行されます。\n\npanicはGoの「処理が続行不能な状態」を表す仕組みで、Pythonの例外に相当します。しかしGoの慣用ではpanicを使わず、errorを戻り値として返すことが推奨されます。panicを使うのは初期化失敗など本当に回復不能な場合のみです。recoverはdeferの中でpanicを受け取り正常終了に変換できますが、HTTPサーバーのmiddlewareなど限られた場所での使用に留めてください。",
code:"package main\n\nimport \"fmt\"\n\nfunc readFile(path string) error {\n    fmt.Println(\"opening:\", path)\n    // 実際は os.Open(path) だが擬似コードとして示す\n    defer fmt.Println(\"closing:\", path) // 何があっても必ずClose\n    fmt.Println(\"reading:\", path)\n    return nil\n}\n\nfunc withMultipleDefers() {\n    defer fmt.Println(\"defer 1（最後に実行）\")\n    defer fmt.Println(\"defer 2\")\n    defer fmt.Println(\"defer 3（最初に実行）\")\n    fmt.Println(\"本体\")\n}\n\nfunc main() {\n    readFile(\"data.txt\")\n    fmt.Println(\"---\")\n    withMultipleDefers()\n}",
afterCode:"deferの引数は宣言した時点で評価されます。defer fmt.Println(x) と書いた場合、deferが積まれた時点のxの値がキャプチャされます。後でxを変更しても無視されます。関数本体の最新の変数値を使いたい場合はdefer func() { fmt.Println(x) }() のように無名関数でラップします。"},
]},

{id:"ch5",num:5,title:"ポインタ",est:"50分",
goal:"&と*の意味を正確に説明できる。値渡しとポインタ渡しの違いを示せる。nilポインタの危険性とチェック方法を説明できる。なぜGoにポインタがあるかをPythonと比較して説明できる。",
sections:[
{title:"ポインタとは何か・&と*",
body:"ポインタとは「変数が格納されているメモリのアドレス」を値として持つ変数です。Pythonではオブジェクトは全て参照型なので、ポインタを意識することはありませんでした。しかしGoではint・bool・struct等の値型は関数に渡すとコピーが作られます。このコピーを関数内で変更しても元の変数には影響しません。\n\n「関数から元の変数を変更したい」「大きな構造体のコピーコストを避けたい」場合にポインタを使います。& 演算子は変数のアドレスを取得し、* 演算子はポインタが指すアドレスの値を取り出します（デリファレンス）。Pythonのミュータブルなオブジェクト（リスト・辞書）を関数に渡したときの参照セマンティクスを、Goでは明示的にポインタで表現する、というイメージが近いです。",
table:T.pointerBasics,
code:"package main\n\nimport \"fmt\"\n\n// 値渡し: nのコピーを受け取るので元は変わらない\nfunc doubleVal(n int) {\n    n *= 2\n}\n\n// ポインタ渡し: 元の変数を変更できる\nfunc doublePtr(p *int) {\n    *p *= 2 // デリファレンスして値を変更\n}\n\nfunc main() {\n    x := 10\n\n    doubleVal(x)\n    fmt.Println(\"After doubleVal:\", x) // 10（変わらない）\n\n    doublePtr(&x) // &でアドレスを渡す\n    fmt.Println(\"After doublePtr:\", x) // 20（変わった）\n\n    // ポインタの宣言と操作\n    p := &x\n    fmt.Println(\"address:\", p)  // 0xc0000...（アドレス）\n    fmt.Println(\"value:\", *p)   // 20\n    *p = 99\n    fmt.Println(\"x after *p=99:\", x) // 99\n}",
afterCode:"Goのポインタはポインタ演算（p++等）ができません。C言語のような危険な操作ができない安全なポインタです。また、GoにはGarbage Collection（GC）があるため、ポインタで指されているメモリは自動的に管理され、解放忘れによるメモリリークのリスクが大幅に低減されています。"},
{title:"nilポインタ・newキーワード・Pythonとの違い",
body:"ポインタのゼロ値はnilです。nilポインタをデリファレンス（*p）しようとするとpanicが発生します。これはPythonのNoneErrorに相当する実行時クラッシュです。ポインタを使う際は必ずnilチェックをするクセをつけましょう。\n\nnew(T)はT型のゼロ値を確保し、そのポインタを返す組み込み関数です。&T{}の短縮形として使えます。Pythonでは全てのオブジェクトが参照型なのでポインタを意識する必要がありませんでしたが、Goでは「この変数は共有が必要か？」を設計段階で意識します。これにより関数のインターフェースが明確になり、「副作用があるか」が呼び出しコードを見ただけで判断できます。",
code:"package main\n\nimport \"fmt\"\n\nfunc safeDereference(p *int) (int, bool) {\n    if p == nil {\n        return 0, false\n    }\n    return *p, true\n}\n\n// newで初期化\nfunc newCounter() *int {\n    p := new(int) // ゼロ値0で初期化されたintのポインタ\n    return p\n}\n\nfunc main() {\n    // nilポインタのチェック\n    var p *int\n    val, ok := safeDereference(p)\n    fmt.Println(val, ok) // 0 false\n\n    x := 42\n    val, ok = safeDereference(&x)\n    fmt.Println(val, ok) // 42 true\n\n    // new の使い方\n    counter := newCounter()\n    *counter = 5\n    fmt.Println(*counter) // 5\n}",
afterCode:"構造体のポインタは &MyStruct{} で作るのが一般的です。new(MyStruct) と同じですが、フィールドの初期化と同時に書けるため &MyStruct{Name: \"Alice\"} の形式がよく使われます。"},
]},

{id:"ch6",num:6,title:"配列・スライス",est:"55分",
goal:"固定長配列と動的スライスの違いを説明できる。make/append/copy/スライシングを正しく使える。lenとcapの違い、capが不足したときの内部動作を説明できる。",
sections:[
{title:"配列とスライスの基礎",
body:"Goの配列は固定長で値型です。var a [3]int と宣言した配列の長さは変更できません。配列を関数に渡すとコピーが生まれます。Pythonにはこの概念はなく、全てのリストが動的かつ参照型です。実務のGoコードで配列を直接使うことは少なく、通常はスライスを使います。\n\nスライスは「配列への参照・長さ・容量」の3つを持つ軽量なデータ構造です。Pythonのリストに最も近い存在ですが、スライスはその内部で別に確保された配列を参照しています。make([]int, len, cap)で長さとキャパシティを指定できます。容量（cap）が足りなくなるとGoのランタイムが自動的に大きい配列を確保し、内容をコピーします。",
table:T.sliceInternals,
code:"package main\n\nimport \"fmt\"\n\nfunc main() {\n    // 配列（固定長・値型）\n    arr := [3]int{10, 20, 30}\n    copy := arr            // 配列のコピー\n    copy[0] = 99\n    fmt.Println(arr[0])    // 10（変わらない）\n\n    // スライス（動的・参照型）\n    s := []int{1, 2, 3}\n    t := s                 // 同じ配列を参照\n    t[0] = 99\n    fmt.Println(s[0])      // 99（共有されている）\n\n    // make でキャパシティを指定\n    nums := make([]int, 0, 5) // len=0, cap=5\n    fmt.Printf(\"len=%d cap=%d\n\", len(nums), cap(nums))\n    for i := 1; i <= 6; i++ {\n        nums = append(nums, i)\n        fmt.Printf(\"len=%d cap=%d\n\", len(nums), cap(nums))\n        // cap超えた時点で容量が自動拡張される\n    }\n}",
afterCode:"スライスが別のスライスへのサブスライスである場合（s2 := s[1:3]）、両者は同じ内部配列を共有します。s2を変更するとsにも影響します。完全に独立したコピーが欲しい場合は copy(dst, src) を使います。"},
{title:"append・copy・スライス操作",
body:"appendはスライスに要素を追加し、新しいスライスを返します。Pythonのlist.append()と異なり、appendの戻り値を必ず受け取って変数に再代入する必要があります。s = append(s, x) のパターンを忘れないでください。\n\nスライス操作でよく使うパターンを覚えておくと実務で役立ちます。先頭要素の削除は s = s[1:]、特定インデックスの削除は s = append(s[:i], s[i+1:]...)、2つのスライスの結合は append(s1, s2...) です。2次元スライスは [][]int で表現し、Pythonのリスト内包表記で作るネストリストと同じ用途で使います。",
table:T.sliceOps,
code:"package main\n\nimport \"fmt\"\n\nfunc main() {\n    s := []int{1, 2, 3, 4, 5}\n\n    // スライシング\n    fmt.Println(s[1:3])   // [2 3]\n    fmt.Println(s[:2])    // [1 2]\n    fmt.Println(s[3:])    // [4 5]\n\n    // copy でディープコピー\n    dst := make([]int, len(s))\n    copy(dst, s)\n    dst[0] = 99\n    fmt.Println(s[0], dst[0]) // 1, 99（独立）\n\n    // 要素削除（インデックス2を削除）\n    i := 2\n    s = append(s[:i], s[i+1:]...)\n    fmt.Println(s) // [1 2 4 5]\n\n    // 2つのスライスを結合\n    a := []int{1, 2}\n    b := []int{3, 4}\n    c := append(a, b...)\n    fmt.Println(c) // [1 2 3 4]\n}",
afterCode:"append(s[:i], s[i+1:]...) は元のスライスを変更します。オリジナルを保持したい場合は先にcopyを取ってから操作してください。また、append後の元スライス（a）がどう変化するかは容量によって異なるため、結合後は新しい変数cを使うのが安全です。"},
]},

{id:"ch7",num:7,title:"マップと構造体",est:"50分",
goal:"mapのCRUD・comma ok・deleteを使いこなせる。struct定義・埋め込み・値レシーバとポインタレシーバを説明し正しく使い分けられる。",
sections:[
{title:"マップ（map）",
body:"マップはGoの組み込みハッシュテーブルです。make(map[K]V)で初期化します。重要な注意点はnilマップへの書き込みがpanicになることです。var m map[string]int と宣言しただけではm == nil の状態で、m[\"key\"] = 1 を実行するとクラッシュします。必ずmakeで初期化してから使ってください。\n\nPythonの辞書と大きく異なるのは「型が静的に固定されること」と「キーの順序が保証されないこと」です。Pythonの辞書は3.7以降で挿入順を保持しますが、Goのmapは反復のたびにランダムな順序になります（仕様で保証されていない）。順序が必要な場合はキーのスライスを取り出してsortしてから反復します。",
table:T.mapOps,
code:"package main\n\nimport (\n    \"fmt\"\n    \"sort\"\n)\n\nfunc main() {\n    // 初期化\n    scores := map[string]int{\n        \"Alice\": 92,\n        \"Bob\":   85,\n    }\n    // または: scores := make(map[string]int)\n\n    // 追加・更新\n    scores[\"Charlie\"] = 78\n    scores[\"Alice\"] = 95 // 上書き\n\n    // comma ok で存在確認\n    if v, ok := scores[\"Dave\"]; ok {\n        fmt.Println(\"Dave:\", v)\n    } else {\n        fmt.Println(\"Dave: not found\")\n    }\n\n    // 削除\n    delete(scores, \"Bob\")\n\n    // 順序保証のある反復\n    keys := make([]string, 0, len(scores))\n    for k := range scores { keys = append(keys, k) }\n    sort.Strings(keys)\n    for _, k := range keys {\n        fmt.Printf(\"%s: %d\n\", k, scores[k])\n    }\n}",
afterCode:"マップの値型にスライスを使う map[string][]int では、存在しないキーへのアクセスは nil スライスを返します。counts[word] = append(counts[word], val) と書くと、初回アクセス時は nil スライスに append され正しく動作します。このパターンはグルーピングやカウンタによく使われます。"},
{title:"構造体（struct）とメソッド",
body:"Goにはclassがありません。代わりにstructとメソッドを組み合わせてオブジェクト指向的な設計を行います。Pythonのclassと比べると継承機能がなく、代わりに「埋め込み（embedding）」でコードを再利用します。この単純さがGoのコードを予測しやすくします。\n\nメソッドには値レシーバとポインタレシーバの2種類があります。値レシーバは構造体のコピーで動作し元の値を変更しません。ポインタレシーバは元の値を変更でき、大きな構造体のコピーコストも避けられます。Pythonのself（常に参照渡し）に相当するのがポインタレシーバです。同一の型に対しては値レシーバとポインタレシーバを混在させず統一することが推奨されます。",
table:T.structFeatures,
code:"package main\n\nimport \"fmt\"\n\ntype Point struct {\n    X, Y float64\n}\n\n// 値レシーバ: Pointのコピーを操作\nfunc (p Point) String() string {\n    return fmt.Sprintf(\"(%.1f, %.1f)\", p.X, p.Y)\n}\n\n// ポインタレシーバ: 元のPointを変更\nfunc (p *Point) Translate(dx, dy float64) {\n    p.X += dx\n    p.Y += dy\n}\n\n// 埋め込み\ntype ColorPoint struct {\n    Point  // Pointのフィールド・メソッドが昇格\n    Color string\n}\n\nfunc main() {\n    pt := Point{1.0, 2.0}\n    fmt.Println(pt)        // (1.0, 2.0) ← String()が自動呼ばれる\n\n    pt.Translate(3, 4)\n    fmt.Println(pt)        // (4.0, 6.0)\n\n    cp := ColorPoint{Point: Point{0, 0}, Color: \"red\"}\n    cp.Translate(1, 1)     // 昇格したメソッドを直接呼べる\n    fmt.Println(cp.String(), cp.Color) // (1.0, 1.0) red\n}",
afterCode:"埋め込みは継承ではありません。Pythonのsuper()に相当するものはなく、埋め込んだ型のメソッドを「借りて」使うコンポジションです。インターフェースの実装（次章）と組み合わせることで、柔軟な設計が可能になります。"},
]},

{id:"ch8",num:8,title:"インターフェース",est:"55分",
goal:"インターフェースが暗黙的に実装されることを説明できる。型アサーション・型スイッチを正しく書ける。io.Reader/io.Writerの設計思想を説明できる。",
sections:[
{title:"暗黙的実装と型アサーション",
body:"Goのインターフェースは暗黙的に実装されます。interfaceが要求するメソッドを全て持つ型は、宣言なしに自動的にそのインターフェースを満たします。Pythonでクラスを定義してABCを継承したりProtocolを指定したりする必要がないのと似ていますが、GoではコンパイラがCheckします。これにより既存の型が後から別のインターフェースに対応させられる柔軟性があります。\n\n型アサーション（v, ok := i.(Type)）はインターフェース型の値から具体的な型の値を取り出します。Pythonのisinstance()チェックに相当しますが、Goでは同時に値の取り出しも行います。型スイッチ（switch v := i.(type)）は複数の型で場合分けするときに使い、Pythonのif isinstance(x, int): elif isinstance(x, str):... よりも可読性が高いパターンです。",
table:T.ifaceBasics,
code:"package main\n\nimport (\n    \"fmt\"\n    \"math\"\n)\n\ntype Shape interface {\n    Area() float64\n}\n\ntype Circle struct{ R float64 }\ntype Rect   struct{ W, H float64 }\n\nfunc (c Circle) Area() float64 { return math.Pi * c.R * c.R }\nfunc (r Rect) Area() float64   { return r.W * r.H }\n\nfunc printInfo(s Shape) {\n    fmt.Printf(\"area=%.2f\", s.Area())\n    // 型アサーションで具体的な型を取得\n    if c, ok := s.(Circle); ok {\n        fmt.Printf(\" radius=%.1f\", c.R)\n    }\n    fmt.Println()\n}\n\nfunc describe(i any) string {\n    switch v := i.(type) {\n    case int:    return fmt.Sprintf(\"int(%d)\", v)\n    case string: return fmt.Sprintf(\"string(%q)\", v)\n    case Circle: return fmt.Sprintf(\"circle(r=%.1f)\", v.R)\n    default:     return fmt.Sprintf(\"unknown(%T)\", v)\n    }\n}\n\nfunc main() {\n    shapes := []Shape{Circle{5}, Rect{3, 4}}\n    for _, s := range shapes { printInfo(s) }\n\n    fmt.Println(describe(42))\n    fmt.Println(describe(\"Go\"))\n    fmt.Println(describe(Circle{3}))\n}",
afterCode:"インターフェースをポインタで受け取る（*Shape）のは基本的に誤りです。インターフェース自体がすでに内部にポインタを持つ参照型です。var s Shape = &Circle{5} のように、実装型のポインタをインターフェース変数に代入するのが正しいパターンです。"},
{title:"io.Reader / io.Writerとインターフェース設計",
body:"Goの標準ライブラリは io.Reader（Read(p []byte) (n int, err error)）と io.Writer（Write(p []byte) (n int, err error)）という2つの単純なインターフェースを核として設計されています。ファイル・ネットワーク・バッファ・テスト用のバイト列など、あらゆるI/O対象がこのインターフェースを実装しています。\n\nこの設計のメリットは「どこから読むか・どこに書くか」を問わず同じ関数で処理できる汎用性です。例えばjson.NewDecoder(r io.Reader)はファイルからでもHTTPレスポンスからでもJSONを読めます。Pythonのfile-like objectのコンセプトに近いですが、Goでは型システムによってコンパイル時に検証されます。自分でライブラリを設計する際もio.Reader/io.Writerを受け取る形にすることで、テスト容易性と汎用性が飛躍的に上がります。",
code:"package main\n\nimport (\n    \"bytes\"\n    \"fmt\"\n    \"io\"\n    \"strings\"\n)\n\n// io.Readerを受け取る汎用関数（ファイルでもStringでも動く）\nfunc countBytes(r io.Reader) (int, error) {\n    buf := make([]byte, 32)\n    total := 0\n    for {\n        n, err := r.Read(buf)\n        total += n\n        if err == io.EOF { break }\n        if err != nil    { return total, err }\n    }\n    return total, nil\n}\n\nfunc main() {\n    // strings.NewReader: 文字列をio.Readerとして扱う\n    sr := strings.NewReader(\"Hello, Go!\")\n    n, _ := countBytes(sr)\n    fmt.Println(\"string bytes:\", n) // 10\n\n    // bytes.Buffer: io.Reader兼io.Writer\n    var buf bytes.Buffer\n    fmt.Fprintf(&buf, \"value=%d\", 42) // io.Writerとして書き込み\n    fmt.Println(buf.String())         // \"value=42\"\n    n, _ = countBytes(&buf)\n    fmt.Println(\"buffer bytes:\", n)   // 8\n}",
afterCode:"fmt.Fprintf・io.Copy・bufio.NewReaderなど標準ライブラリの関数の多くがio.Reader/io.Writerを引数に取ります。自分の型でこれらのインターフェースを実装するだけで、標準ライブラリの全てのユーティリティがそのまま使えるようになります。"},
]},

{id:"ch9",num:9,title:"エラー処理",est:"50分",
goal:"Goのエラー処理が例外ではなく戻り値である理由を説明できる。fmt.Errorf(%w)でラップし、errors.Is/errors.Asで取り出せる。カスタムエラー型を定義して使える。",
sections:[
{title:"errorインターフェースとラップ",
body:"Goではエラーを例外（try/catch）ではなく、関数の戻り値として返します。errorはError() stringメソッドを持つインターフェースです。関数は (result T, err error) の形で値とエラーを同時に返し、呼び出し側が if err != nil { } で明示的にチェックします。Pythonのtry/exceptに慣れた方には冗長に見えるかもしれませんが、「エラーは通常の制御フローの一部」という考え方で、処理漏れをコンパイラが検出できる設計です。\n\nGo 1.13以降は fmt.Errorf(\"context: %w\", err) でエラーを「ラップ」するのが推奨パターンです。%w でラップされたエラーは errors.Is / errors.As でチェーンを辿って検査できます。Pythonのexception chainingに相当しますが、エラーが生じた場所と理由を積み重ねてコンテキストを豊かにする目的で使います。",
table:T.errorPattern,
code:"package main\n\nimport (\n    \"errors\"\n    \"fmt\"\n)\n\nvar ErrNotFound = errors.New(\"not found\")\nvar ErrPermission = errors.New(\"permission denied\")\n\nfunc getUser(id int) (string, error) {\n    if id == 0 {\n        return \"\", fmt.Errorf(\"getUser(%d): %w\", id, ErrNotFound)\n    }\n    if id < 0 {\n        return \"\", fmt.Errorf(\"getUser(%d): %w\", id, ErrPermission)\n    }\n    return \"Alice\", nil\n}\n\nfunc main() {\n    _, err := getUser(0)\n    fmt.Println(err) // getUser(0): not found\n\n    // errors.Is: ラップされていても検出できる\n    fmt.Println(errors.Is(err, ErrNotFound))   // true\n    fmt.Println(errors.Is(err, ErrPermission)) // false\n}",
afterCode:"errors.New と fmt.Errorf(\"... %w\", err) の使い分け: sentinelエラー（特定の状態を表す定数的なエラー）はerrors.Newで定義し、コンテキストを付けてラップするときにfmt.Errorfを使います。errsに何もコンテキストを加えない場合はreturn errとそのまま返せばよいです。"},
{title:"カスタムエラー型",
body:"エラーにフィールド（HTTPステータスコード・フィールド名・リトライ情報など）を持たせたい場合はカスタムエラー型を定義します。構造体にError() stringメソッドを実装するだけでerrorインターフェースを満たします。errors.As(err, &target)で特定のカスタムエラー型として取り出し、フィールドにアクセスできます。\n\nカスタムエラー型はWebAPI・バリデーション・データベース操作など、エラーの詳細情報を呼び出し側に伝える必要がある場面で有効です。Pythonのカスタム例外クラスに相当しますが、Goではerrors.Asで型安全に取り出せる点が異なります。errors.Is（同値比較）とerrors.As（型による取り出し）を状況に応じて使い分けてください。",
code:"package main\n\nimport (\n    \"errors\"\n    \"fmt\"\n)\n\n// HTTPエラーを表すカスタム型\ntype HTTPError struct {\n    Code    int\n    Message string\n}\n\nfunc (e *HTTPError) Error() string {\n    return fmt.Sprintf(\"HTTP %d: %s\", e.Code, e.Message)\n}\n\nfunc fetch(url string) error {\n    // 404を返す例\n    return fmt.Errorf(\"fetch(%s): %w\", url,\n        &HTTPError{Code: 404, Message: \"not found\"})\n}\n\nfunc main() {\n    err := fetch(\"/users/99\")\n    fmt.Println(err)\n\n    var he *HTTPError\n    if errors.As(err, &he) {\n        fmt.Printf(\"status=%d msg=%s\n\", he.Code, he.Message)\n        if he.Code == 404 {\n            fmt.Println(\"→ リソースが存在しません\")\n        }\n    }\n}",
afterCode:"errors.Asはポインタのポインタを渡します。var he *HTTPError; errors.As(err, &he) と書くと、errのチェーンを辿って*HTTPError型のエラーが見つかればheにセットします。これによりラップ済みのエラーも透過的に処理できます。"},
]},

{id:"ch10",num:10,title:"goroutine・channel",est:"60分",
goal:"go文でgoroutineを起動しsync.WaitGroupで完了を待てる。make(chan T)でchannelを作りデータを送受信できる。selectで複数channelを待機できる。PythonのasyncioとGoの並行処理の違いを説明できる。",
sections:[
{title:"goroutineとsync.WaitGroup",
body:"goroutineはGoのランタイムが管理する軽量スレッドです。go func() と書くだけで新しいgoroutineを起動できます。OSスレッドが約1MBのスタックを消費するのに対し、goroutineは初期4〜8KBと軽量で、数万〜数百万のgoroutineを同時に走らせることが現実的です。\n\nPythonのasyncioコルーチンと比べると、goroutineは await を書かなくてよく、マルチコアを使った真の並列実行が可能です。asyncioがシングルスレッドで協調的に動くのに対し、GoのランタイムはM:N方式でgoroutineをOSスレッドに効率的にマッピングします。sync.WaitGroupはgoroutineの完了を待つための同期プリミティブです。Add(n)でカウントを増やし、Done()で1減らし、Wait()で0になるまでブロックします。",
table:T.goroutineVsAsync,
code:"package main\n\nimport (\n    \"fmt\"\n    \"sync\"\n    \"time\"\n)\n\nfunc worker(id int, wg *sync.WaitGroup) {\n    defer wg.Done()\n    time.Sleep(10 * time.Millisecond)\n    fmt.Printf(\"worker %d finished\n\", id)\n}\n\nfunc main() {\n    var wg sync.WaitGroup\n\n    for i := 1; i <= 5; i++ {\n        wg.Add(1)\n        go worker(i, &wg)\n    }\n\n    wg.Wait() // 全goroutineの完了を待つ\n    fmt.Println(\"all workers done\")\n}",
afterCode:"goroutineの中で共有変数を変更する場合はデータ競合（data race）に注意が必要です。go test -race でデータ競合を検出できます。共有データを安全に扱うにはsync.Mutex（排他ロック）・sync/atomic（アトミック操作）・channel（通信による共有の回避）のいずれかを使います。"},
{title:"channel と select",
body:"channelはgoroutine間の安全なデータ受け渡しパイプです。make(chan T)でアンバッファードchannelを作ります。アンバッファードchannelは送信と受信が同時に起こるまで両方がブロックします。make(chan T, n)でバッファードchannelを作ると、バッファが空になるまで送信がブロックしません。Pythonのasyncio.Queueに相当しますが、Goでは <- 演算子で直感的に操作できます。\n\nselectはchannel版のswitchで、複数のchannelのどれかが準備完了になるまで待機します。time.After(d)と組み合わせるとタイムアウト処理が簡潔に書けます。channelをcloseすると、受信側でrangeループが終了し、<-chのok値がfalseになります。goroutineに終了を伝えるdone channelパターンも重要な慣用表現です。",
code:"package main\n\nimport (\n    \"fmt\"\n    \"time\"\n)\n\nfunc producer(out chan<- int, n int) {\n    for i := 0; i < n; i++ {\n        out <- i\n    }\n    close(out) // 送信完了を通知\n}\n\nfunc main() {\n    ch := make(chan int, 5)\n    go producer(ch, 5)\n\n    // close されるまでrangeで受信\n    for v := range ch {\n        fmt.Println(\"received:\", v)\n    }\n\n    // select でタイムアウト付き待機\n    ch1 := make(chan string, 1)\n    ch2 := make(chan string, 1)\n    go func() { time.Sleep(20*time.Millisecond); ch1 <- \"one\" }()\n    go func() { time.Sleep(40*time.Millisecond); ch2 <- \"two\" }()\n\n    for i := 0; i < 2; i++ {\n        select {\n        case msg := <-ch1:\n            fmt.Println(\"ch1:\", msg)\n        case msg := <-ch2:\n            fmt.Println(\"ch2:\", msg)\n        case <-time.After(100 * time.Millisecond):\n            fmt.Println(\"timeout\")\n        }\n    }\n}",
afterCode:"closeしたchannelに送信するとpanicになります。送信側がcloseし、受信側はcloseを検出してループを終了するのが基本パターンです。goroutineのリークを防ぐには、goroutineが必ず終了するよう設計することが重要です。done := make(chan struct{}); close(done) で複数のgoroutineに一斉に終了シグナルを送るパターンはGoの重要な慣用表現です。"},
]},
];
