sections:[
{title:"Goの設計思想",
body:`Goは2009年にGoogleが公開したオープンソース言語で、大規模なソフトウェア開発に伴う複雑さを排除することを目的に設計されました。シンプルで学習しやすい文法、高速コンパイル、組み込みの並行処理サポートが三大特徴です。

Pythonと比べると、Goは静的型付けで明示的なエラー処理を好む文化があります。例外（try/except）はなく、関数はエラー値を戻り値として返すのが慣用です。「明示的は暗示的より良い」というGoの哲学はPythonのZenとも共鳴しています。Pythonがユーザー領域での生産性を最大化するのに対し、Goはサーバーサイドの本番環境での信頼性と性能を優先しています。`,
table:T.vsOthers,
afterTable:`Goの最大の特徴はシングルバイナリでのデプロイです。go build one command でOS・アーキテクチャに最適化されたバイナリが生成され、Dockerイメージをscratch（空）ベースにすることでセキュリティとサイズを最小化できます。`},
{title:"基本文法と変数",
body:`Goでは変数宣言に:=(短縮宣言)とvar両方が使えます。:=は関数内で型推論が効くため多用されます。varは関数外（パッケージレベル）の宣言で必要です。Pythonと同様に型推論が強力ですが、一度宣言した変数の型は変更できません。

定数はconstで宣言し、iotaで連続する整数定数を生成できます。iotaはconstブロック内で0から自動インクリメントされ、フラグや列挙型の定義に便利です。PythonのEnumクラスに相当しますが、言語組込みのシンプルな機能として提供されています。`,
table:T.basicTypes,
code:`package main

import "fmt"

// パッケージレベル定数
const Pi = 3.14159

// iota で列挙型風の定数
type Color int
const (
    Red Color = iota // 0
    Green            // 1
    Blue             // 2
)

func main() {
    // 短縮宣言
    name := "Gopher"
    age  := 10

    // 明示的型宣言
    var score float64 = 99.5

    fmt.Println(name, age, score)
    fmt.Println(Pi, Red, Green, Blue)
}`,
afterCode:`未使用変数はコンパイルエラーになります。これは「書いたコードは全て意味を持つべき」というGoの厳格な設計方針です。Pythonでは未使用変数は警告のみですが、Goではビルドが通りません。`},
]},

goal:"for・if・switch・deferを使いこなせる。Goにはwhileがなくforだけで全てのループを表現できることを理解する。",
sections:[
{title:"for・if・switch",
body:`Goにはwhileキーワードがありません。for一つで全てのループを表現します。for i := 0; i < n; i++は通常のforループ、for condition {}はwhileループ、for {}は無限ループです。Pythonのfor-inに相当するのはfor range構文です。

switchはbreakなしでcase終了後に次のcaseに落ちないため（Pythonのif-elifに相当）、fallthrough キーワードで明示的に次に落とす設計です。switch { case ...: }の形式は複数条件のif-elifよりも可読性が高い場面があります。`,
table:T.controlFlow,
code:`package main

import "fmt"

func classify(n int) string {
    switch {
    case n < 0:
        return "negative"
    case n == 0:
        return "zero"
    case n < 10:
        return "small"
    default:
        return "large"
    }
}

func main() {
    // forでwhileを表現
    i := 0
    for i < 5 {
        fmt.Print(i, " ")
        i++
    }
    fmt.Println()

    // for range
    for i, ch := range "Go言語" {
        fmt.Printf("%d:%c ", i, ch)
    }
    fmt.Println()

    fmt.Println(classify(-3), classify(0), classify(7))

{title:"defer・panic・recover",
body:`deferは関数終了時（return後）に実行される文で、ファイルのクローズ・ロックの解除・ログ出力等のクリーンアップに使います。PythonのfinallyやcontextManagerのwith文に相当しますが、より軽量に書けます。deferはLIFO（後入れ先出し）順で実行されます。

panicはランタイムエラーを発生させる組込み関数で、Pythonの例外に相当します。recoverはdeferで呼ぶことでpanicをキャッチできます。ただしGoの慣用コードではpanicを避け、明示的なerror返却を好みます。panicはプログラムが継続不可能な場合（初期化失敗等）にのみ使います。`,

import "fmt"

func safeDiv(a, b int) (result int, err error) {
    defer func() {
        if r := recover(); r != nil {
            err = fmt.Errorf("recovered: %v", r)
        }
    }()
    return a / b, nil // b==0でpanic
}

    fmt.Println(result, err)

}`,

{title:"配列とスライス",
body:`Goの配列は固定長で値型です（コピーが渡される）。実務では可変長のスライスを使います。スライスは配列への参照・長さ・容量の3要素から成る軽量なデータ構造で、make([]T, len, cap)で作ります。Pythonのリストに最も近い存在ですが、固定型である点が異なります。

append(s, x)はスライスに要素を追加し、新しいスライスを返します。容量が足りなくなると内部で新しい配列が割り当てられます。Pythonのlist.append()が元のリストを変更するのと異なり、Goではappendの戻り値を必ず受け取る必要があります（s = append(s, x)）。`,

afterTable:`copy(dst, src)は min(len(dst), len(src)) 要素をコピーします。スライスのディープコピーには make+copy パターンを使います。スライス同士を比較するにはreflect.DeepEqual()かfor rangeで要素比較が必要です（==演算子では比較できません）。`},
{title:"マップ",
body:`マップはGoの組込みハッシュテーブルで、make(map[K]V)で初期化します。nilマップへの書き込みはpanicになるため注意が必要です（宣言だけではnilになる）。Pythonのdictと同様ですが、キーと値の型が静的に固定されます。

マップは参照型なので、関数に渡してもコピーが発生せずに変更が共有されます。rangeで反復する際の順序は毎回ランダムで、仕様上保証されていません。順序を保証したい場合はキーのスライスをソートしてからアクセスするか、ordered-mapライブラリを使います。`,

code:`package main

import (
    "fmt"
    "sort"
)

func main() {
    // マップの作成と操作
    scores := make(map[string]int)
    scores["Alice"] = 95
    scores["Bob"] = 87

    // 存在確認
    if v, ok := scores["Charlie"]; ok {
        fmt.Println("found:", v)
    } else {
        fmt.Println("Charlie not found")
    }

    // 順序保証のある反復
    keys := make([]string, 0, len(scores))
    for k := range scores { keys = append(keys, k) }
    sort.Strings(keys)
    for _, k := range keys {
        fmt.Printf("%s: %d\n", k, scores[k])
    }
}`,

goal:"struct・メソッド・埋め込みを使ってオブジェクト指向的な設計ができる。値レシーバとポインタレシーバの違いを説明できる。",
sections:[
{title:"structとメソッド",
body:`Goにはclassがありません。代わりにstructとメソッドを組み合わせてオブジェクト指向的な設計を実現します。Pythonのclassと比べると継承はなく、代わりに「埋め込み（embedding）」で機能の再利用を行います。この制約がGoのコードを予測しやすくシンプルに保つ大きな要因です。

メソッドには値レシーバ（func (s MyStruct) Method()）とポインタレシーバ（func (s *MyStruct) Method()）があります。値レシーバはコピーを操作し元の値は変更しません。ポインタレシーバは元の値を変更でき、大きな構造体のコピーコストも避けられます。Pythonのself（常に参照）に相当するのはポインタレシーバです。`,
table:T.structFeatures,
code:`package main

import "fmt"

type Rectangle struct {
    Width, Height float64
}

// 値レシーバ: 計算のみ
func (r Rectangle) Area() float64   { return r.Width * r.Height }
func (r Rectangle) Perimeter() float64 { return 2 * (r.Width + r.Height) }

// ポインタレシーバ: 変更あり
func (r *Rectangle) Scale(factor float64) {
    r.Width *= factor
    r.Height *= factor
}

func main() {
    rect := Rectangle{Width: 3, Height: 4}
    fmt.Printf("Area: %.1f, Perimeter: %.1f\n", rect.Area(), rect.Perimeter())
    rect.Scale(2)
    fmt.Printf("After scale: %.1f x %.1f\n", rect.Width, rect.Height)
}`,
afterCode:`一般的な指針: 構造体を変更するメソッドはポインタレシーバ、大きな構造体は常にポインタレシーバ、小さな不変な構造体（Pointなど）は値レシーバが適切です。同一型のメソッドは統一することが推奨されます。`},
{title:"埋め込みとコンポジション",
body:`Goは継承の代わりに埋め込み（embedding）でコードを再利用します。型を構造体のフィールドとして（名前なしで）埋め込むと、その型のメソッドが昇格（promote）されて直接呼べるようになります。Pythonの多重継承より予測しやすく、「継承より合成」というモダンな設計原則を強制する言語機能です。

埋め込まれた型の同名メソッドは外側の型でオーバーライドできます。内側のメソッドには型名経由（d.Animal.Speak()）でアクセス可能で、Pythonのsuper()に相当します。埋め込みは実装の再利用であって多態性（polymorphism）とは別概念です。多態性にはインターフェースを使います。`,
code:`package main

import "fmt"

type Logger struct{ prefix string }
func (l Logger) Log(msg string) { fmt.Printf("[%s] %s\n", l.prefix, msg) }

type Server struct {
    Logger          // LoggerのメソッドがServerに昇格
    Addr string
}

func (s *Server) Start() {
    s.Log("starting server on " + s.Addr) // Logger.Logを直接呼べる
}

func main() {
    s := Server{
        Logger: Logger{prefix: "SERVER"},
        Addr:   "localhost:8080",
    }
    s.Start()
    s.Log("server ready") // Logを直接呼べる
}`,
afterCode:`インターフェースの暗黙的実装と埋め込みを組み合わせることで、Goでは柔軟なコンポジション設計が可能です。io.Writer・io.Readerを埋め込んでカスタムI/O型を作るパターンは標準ライブラリで頻繁に使われています。`},
]},
{id:"ch5",num:5,title:"インターフェース",est:"55分",
goal:"インターフェースの暗黙的実装を理解し、多態的な設計ができる。型アサーション・型スイッチを使いこなせる。",
sections:[
{title:"暗黙的インターフェース実装",
body:`Goのインターフェースは暗黙的に実装されます。interfaceが要求するメソッドを持つ型は自動的にそのインターフェースを満たします。Pythonでclassを定義してABCを継承しないといけない点と異なり、Goでは実装の宣言が不要です。これにより既存の型が後から新しいインターフェースに対応できるため、非常に柔軟な設計が可能です。

fmt.Stringer（String() stringメソッドを持つインターフェース）を実装すると、fmt.Println等が自動的にString()を呼びます。io.Writer・io.Readerも同様に単一メソッドのインターフェースで、これらを受け取る関数に様々な型を渡せます。Pythonのダックタイピングをコンパイル時に検証する仕組みとも言えます。`,
table:T.interfaceBasics,
code:`package main

import (
    "fmt"
    "math"
)

// インターフェース定義
type Shape interface {
    Area() float64
    Perimeter() float64
}

type Circle struct{ R float64 }
type Rect struct{ W, H float64 }

func (c Circle) Area() float64      { return math.Pi * c.R * c.R }
func (c Circle) Perimeter() float64 { return 2 * math.Pi * c.R }
func (r Rect) Area() float64        { return r.W * r.H }
func (r Rect) Perimeter() float64   { return 2 * (r.W + r.H) }

func printShape(s Shape) {
    fmt.Printf("Area: %.2f, Perimeter: %.2f\n", s.Area(), s.Perimeter())
}

func main() {
    shapes := []Shape{Circle{5}, Rect{3, 4}}
    for _, s := range shapes {
        printShape(s)
    }
}`,
afterCode:`インターフェースをポインタで渡す（*MyInterface）のは基本的に誤りです。インターフェース自体が既に参照型（内部にポインタ）を持つため、var s Shape = &myStruct{} のように実装型のポインタをインターフェース変数に代入するのが正しいパターンです。`},
]},
{id:"ch6",num:6,title:"エラーハンドリング",est:"50分",
goal:"Goのエラー処理の慣用パターンをマスターし、fmt.Errorf・errors.Is・errors.Asを使いこなせる。カスタムエラー型を定義できる。",
sections:[
{title:"Goのエラーパターン",
body:`Goでは例外（try/catch/throw）の代わりに関数がerror型の値を最後の戻り値として返す慣用があります。呼び出し側はif err != nil {}でエラーを確認します。Pythonの例外処理とは対照的ですが、「エラーは通常の戻り値」という考え方は、制御フローを明示的にしエラーの処理漏れを防ぐ効果があります。

fmt.Errorf("context: %w", err)でエラーをラップし、errors.Is / errors.Asでラップチェーンを辿って比較できます。1.13以降の推奨パターンです。Pythonのexception chainingに相当しますが、より明示的です。ラップすることでエラーの発生場所・理由のコンテキストを積み重ねられます。`,
table:T.errorPattern,
afterTable:`エラーに構造情報を持たせるにはカスタムエラー型を定義します。HTTPステータスコード・フィールド名・リトライ情報等を持つエラー型を作り、errors.Asで取り出すパターンはWebサービス開発の標準手法です。`},
]},
{id:"ch7",num:7,title:"並行処理: goroutine・channel",est:"60分",
goal:"goroutineとchannelで並行プログラムを書ける。WaitGroup・select・バッファードchannelを使いこなせる。",
sections:[
{title:"goroutineとchannel",
body:`goroutineはGoのランタイムが管理する軽量スレッドで、1つ数KBしか消費しません（OSスレッドは約1MB）。go func()と書くだけで起動でき、数万〜数百万のgoroutineを同時に起動できます。Pythonのasyncioコルーチンに概念は近いですが、Goはマルチスレッドで本当に並列実行されます。

channelは型安全な通信パイプで、goroutine間のデータ転送に使います。make(chan T)でアンバッファード（送受信が同期）、make(chan T, n)でバッファードチャネルを作れます。Pythonのqueue.Queueに相当しますが、言語組込みの構文（<-）でスムーズに操作できます。`,
table:T.goroutineBasics,
code:`package main

import (
    "fmt"
    "sync"
    "sync/atomic"
)

func main() {
    var counter int64
    var wg sync.WaitGroup

    for i := 0; i < 100; i++ {
        wg.Add(1)
        go func() {
            defer wg.Done()
            atomic.AddInt64(&counter, 1) // アトミック操作で競合回避
        }()
    }
    wg.Wait()
    fmt.Println("counter:", counter) // 100
}`,
afterCode:`Mutexの代わりにatomic操作はカウンタ等の単純な操作に最適です。複雑な構造体を複数フィールドにまたがって更新する場合はsync.Mutexを使います。go raceフラグ（go test -race）でデータ競合を検出できます。`},
]},
{id:"ch8",num:8,title:"標準ライブラリとファイル操作",est:"55分",
goal:"encoding/json・os・bufio・strings・sortを使いこなせる。ファイルの読み書きをGoらしく実装できる。",
sections:[
{title:"JSON操作とファイルI/O",
body:`Goの標準ライブラリは充実しており、Webサービス開発に必要な機能の多くがサードパーティなしで揃います。encoding/jsonはPythonのjsonモジュールに相当し、struct + json tag でシリアライゼーションを制御します。json.Marshalでエンコード、json.Unmarshalでデコードが基本パターンです。

ファイル操作はos.Open（読み込み）・os.Create（新規作成/上書き）・os.OpenFile（フラグ指定）で行います。io.Reader・io.Writerインターフェースを通じてbufio.Scannerや io.ReadAll等のユーティリティと組み合わせられます。PythonのwithステートメントはGoではdefer f.Close()で代替します。`,
table:T.stdPackages,
code:`package main

import (
    "bufio"
    "encoding/json"
    "fmt"
    "os"
    "strings"
)

type Config struct {
    Host string \`json:"host"\`
    Port int    \`json:"port"\`
}

func main() {
    // JSONエンコード/デコード
    cfg := Config{Host: "localhost", Port: 8080}
    b, _ := json.Marshal(cfg)
    fmt.Println(string(b))

    var cfg2 Config
    json.Unmarshal(b, &cfg2)
    fmt.Println(cfg2.Host, cfg2.Port)

    // 文字列操作
    s := "  Hello, Go World!  "
    fmt.Println(strings.TrimSpace(s))
    fmt.Println(strings.Contains(s, "Go"))
    fmt.Println(strings.ReplaceAll(s, "Go", "Python"))

    // 標準入力をラインスキャン（テスト時はos.Stdinを使う）
    _ = bufio.NewScanner(os.Stdin)
}`,
afterCode:`json.Decoderを使うとjson.Unmarshalより大きなJSONファイルをストリーミングで処理できます。os.ReadFileはioutil.ReadFileの後継（Go 1.16以降）で、ファイル全体を[]byteとして読みます。大きなファイルはbufio.Scannerで行単位に処理するのが効率的です。`},
]},
{id:"ch9",num:9,title:"HTTPサーバーとテスト",est:"60分",
goal:"net/httpでHTTPサーバーを構築し、contextでキャンセル・タイムアウトを制御できる。testingパッケージでテーブル駆動テストを書ける。",
sections:[
{title:"net/httpによるWebサーバー",
body:`GoはWebサーバーが標準ライブラリだけで構築できます。net/http.HandleFuncでルートにハンドラを登録し、http.ListenAndServeでサーバーを起動します。Pythonのflask/FastAPIと比べると低レベルですが、追加ライブラリが不要なため学習・デプロイが単純です。本番環境ではgithub.com/go-chi/chi等のルーターライブラリを使うことが多いです。

contextパッケージはキャンセル・タイムアウト・デッドライン・リクエストスコープの値を goroutineに伝播させる標準的な仕組みです。外部APIの呼び出し・データベースクエリには必ずcontextを渡す習慣をつけてください。HTTPリクエストのr.Contextを下位の呼び出しに渡すことで、クライアントが切断したときに自動的にキャンセルが伝播します。`,
code:`package main

import (
    "context"
    "encoding/json"
    "fmt"
    "log"
    "net/http"
    "time"
)

type Response struct {
    Message string \`json:"message"\`
    Time    string \`json:"time"\`
}

func helloHandler(w http.ResponseWriter, r *http.Request) {
    // Contextでタイムアウト（デモ用）
    _, cancel := context.WithTimeout(r.Context(), 5*time.Second)
    defer cancel()

    resp := Response{
        Message: "Hello, Go!",
        Time:    time.Now().Format(time.RFC3339),
    }
    w.Header().Set("Content-Type", "application/json")
    json.NewEncoder(w).Encode(resp)
}

func main() {
    http.HandleFunc("/hello", helloHandler)
    fmt.Println("server on :8080")
    log.Fatal(http.ListenAndServe(":8080", nil))
}`,
afterCode:`log.Fatalはエラー時にos.Exit(1)を呼ぶため、テストコードでは使わないでください。本番では構造化ログ（log/slogパッケージ、Go 1.21以降）を使うことを推奨します。`},
{title:"テスト",
body:`Goのテストは標準パッケージtestingで行い、go testコマンドで実行します。テーブル駆動テスト（table-driven tests）が慣用パターンで、入力・期待値のペアをスライスで定義してforで回します。Pythonのpytest parametrizeに相当しますが、シンプルで言語組込みです。

net/http/httptestパッケージを使うとHTTPハンドラを実際のサーバーなしにテストできます。httptest.NewRecorderでレスポンスを捕捉し、httptest.NewRequestでリクエストを作成します。Pythonのflaskテストクライアントに相当する機能が標準ライブラリに含まれています。`,
code:`package main

import (
    "net/http"
    "net/http/httptest"
    "testing"
)

func TestHelloHandler(t *testing.T) {
    req := httptest.NewRequest(http.MethodGet, "/hello", nil)
    rec := httptest.NewRecorder()

    helloHandler(rec, req)

    if rec.Code != http.StatusOK {
        t.Errorf("got %d, want %d", rec.Code, http.StatusOK)
    }
    if ct := rec.Header().Get("Content-Type"); ct != "application/json" {
        t.Errorf("content-type: got %s", ct)
    }
}`,
afterCode:`go test ./...で全パッケージのテストを実行、go test -v -runで特定のテストを実行、go test -coverでカバレッジを確認できます。CI/CDでは必ずgo test -race ./...でデータ競合を検出するようにしてください。`},
]},
{id:"ch10",num:10,title:"モジュールシステムとジェネリクス",est:"55分",
goal:"go modulesで依存管理ができる。Go 1.18のジェネリクスを使った型安全な汎用関数を書ける。sync.Poolの使い方を理解する。",
sections:[
{title:"Go Modules",
body:`Go Modulesはgo 1.11で導入された公式依存管理システムです。go mod init でgo.modを作成し、go get でパッケージを追加します。go.sumはチェックサムファイルでビルドの再現性を保証します。Pythonのpoetry/pip + requirements.txtに相当しますが、言語に組み込まれているため統一されたツールチェーンを使えます。

go mod tidyは使用されていない依存を削除し必要なものを追加します。vendorディレクトリにサードパーティを同梱することもできます（go mod vendor）。Go Proxyが全パッケージをキャッシュするため、ネットワーク障害に強いです。`,
code:`# go.mod の例
# module myapp
#
# go 1.22
#
# require (
#     github.com/gin-gonic/gin v1.9.1
#     golang.org/x/exp v0.0.0-20240119181146-7d7e7d659f9e
# )
#
# よく使うコマンド:
# go mod init <module-name>   : モジュール初期化
# go get <package>            : パッケージ追加
# go mod tidy                 : 未使用依存削除
# go mod vendor               : vendor/ディレクトリに同梱
# go list -m all              : 全依存を一覧表示`,
afterCode:`Private repositoryを使う場合はGOPRIVATEかGONOSUMDB環境変数で設定します。Goのバージョン管理はgvmやasdfで行えます。チームで統一されたGoバージョンを使うにはgo.toolchainを指定してください（Go 1.21以降）。`},
{title:"ジェネリクス（型パラメータ）",
body:`Go 1.18でジェネリクスが導入され、型安全な汎用関数・型を定義できるようになりました。func Func[T constraint](x T) T のように型パラメータを[]で宣言します。constraintはインターフェースで表現し、~intのような型セットも使えます。

ジェネリクスが導入される前は interface{}（any）を使っていましたが、型アサーションが必要でランタイムエラーの危険がありました。ジェネリクスにより型安全なコンテナ・アルゴリズムが書けます。Pythonのジェネリクス（typing.Generic）とは異なりコンパイル時に完全に型チェックされます。`,
code:`package main

import (
    "fmt"
    "golang.org/x/exp/constraints"
)

// ジェネリクス関数
func Map[T, U any](s []T, f func(T) U) []U {
    result := make([]U, len(s))
    for i, v := range s { result[i] = f(v) }
    return result
}

func Filter[T any](s []T, f func(T) bool) []T {
    var result []T
    for _, v := range s {
        if f(v) { result = append(result, v) }
    }
    return result
}

func Reduce[T, U any](s []T, init U, f func(U, T) U) U {
    acc := init
    for _, v := range s { acc = f(acc, v) }
    return acc
}

func main() {
    nums := []int{1, 2, 3, 4, 5}
    doubled := Map(nums, func(n int) int { return n * 2 })
    evens := Filter(nums, func(n int) bool { return n%2 == 0 })
    sum := Reduce(nums, 0, func(acc, n int) int { return acc + n })
    fmt.Println(doubled, evens, sum)
}`,
afterCode:`golang.org/x/exp/slicesとgolang.org/x/exp/mapsパッケージにジェネリクスを使った便利関数が集まっています。Go 1.21以降はslices・mapsパッケージが標準ライブラリに統合されました。`},
]},
];

function DataTable({t}) {
  if (!t) return null;
  return (
    <div>
      {t.cap && <div className="table-caption">{t.cap}</div>}
      <table>
        <thead><tr>{t.h.map((h,i)=><th key={i}>{h}</th>)}</tr></thead>
        <tbody>{t.r.map((row,i)=><tr key={i}>{row.map((c,j)=><td key={j}>{c}</td>)}</tr>)}</tbody>
      </table>
    </div>
  );
}

function CodeBlock({code}) {
  if (!code) return null;
  return <pre><code>{code}</code></pre>;
}

function Exercise({ex}) {
  const [open, setOpen] = useState(false);
  const [ansOpen, setAnsOpen] = useState(false);
  const stars = Array.from({length:3},(_,i)=>(
    <span key={i} className={i<ex.diff?"star":"star empty"}>★</span>
  ));
  return (
    <div className="exercise">
      <div className="exercise-header" onClick={()=>{setOpen(!open);setAnsOpen(false);}}>
        <div className="diff">{stars}</div>
        <div className="exercise-q">{ex.q}</div>
        <span>{open?"▲":"▼"}</span>
      </div>
      {open && (
        <div className="exercise-body open">
          <CodeBlock code={ex.code}/>
          <button className="answer-toggle" onClick={()=>setAnsOpen(!ansOpen)}>
            {ansOpen?"解答を隠す":"解答を見る"}
          </button>
          {ansOpen && <div className="answer-block open"><CodeBlock code={ex.answer}/></div>}
        </div>
      )}
    </div>
  );
}

function Section({s}) {
  return (
    <div className="section">
      <h3>{s.title}</h3>
      {s.body && s.body.split('\n\n').map((p,i)=><p key={i}>{p}</p>)}
      {s.table && <DataTable t={s.table}/>}
      {s.afterTable && <p>{s.afterTable}</p>}
      {s.code && <CodeBlock code={s.code}/>}
      {s.afterCode && <p>{s.afterCode}</p>}
    </div>
  );
}

function App() {
  const [cur, setCur] = useState(0);
  const [openCh, setOpenCh] = useState(null);
  const ch = chapters[cur];
  const exList = EX[ch.id] || [];

  useEffect(()=>{ setOpenCh(null); }, [cur]);

  return (
    <div>
      <header className="header">
        <a href="../index.html">🏠 ホーム</a>
        <span>›</span>
        <span>Go 入門</span>
      </header>

      <div className="hero">
        <h1>Go 入門コース</h1>
        <div className="subtitle">シンプルで高速な並行処理言語の全体像</div>
        <div className="meta">
          <span>全10章</span>
          <span>演習30問</span>
          <span>Go 1.22</span>
        </div>
        <div className="desc">
          Pythonエンジニアを対象に、Goの設計思想から基本文法・コレクション・インターフェース・goroutine・net/http・テスト・ジェネリクスまで体系的に学びます。このコースを修了すると、シンプルなCLIツールやHTTPサーバーをGoで自力で書けるようになります。
        </div>
      </div>

      <div className="nav-tabs">
        {chapters.map((c,i)=>(
          <button key={c.id} className={`nav-tab${cur===i?" active":""}`} onClick={()=>setCur(i)}>
            Ch{c.num}
          </button>
        ))}
      </div>

      <div className="content">
        <div className="chapter" key={ch.id}>
          <div className="chapter-header" onClick={()=>setOpenCh(openCh===ch.id?null:ch.id)}>
            <div className="chapter-num">{ch.num}</div>
            <div className="chapter-title">{ch.title}</div>
            <div className="chapter-est">⏱ {ch.est}</div>
            <div className={`chapter-arrow${openCh===ch.id?" open":""}`}>▼</div>
          </div>
          {openCh===ch.id && (
            <div className="chapter-body open">
              <div className="goal-block">
                <h4>🎯 この章のゴール</h4>
                <p>{ch.goal}</p>
              </div>
              {ch.sections.map((s,i)=><Section key={i} s={s}/>)}
              {exList.length>0 && (
                <div className="exercises">
                  <h4>演習問題</h4>
                  {exList.map((ex,i)=><Exercise key={i} ex={ex}/>)}
                </div>
              )}
            </div>
          )}
        </div>

        <div className="chapter-nav">
          <button className="nav-btn" onClick={()=>setCur(c=>c-1)} disabled={cur===0}>← 前の章</button>
          <span style={{color:"#005577",fontSize:".9rem"}}>第{ch.num}章 / 全{chapters.length}章</span>
          <button className="nav-btn" onClick={()=>setCur(c=>c+1)} disabled={cur===chapters.length-1}>次の章 →</button>
        </div>

        {cur===chapters.length-1 && (
          <div className="complete-banner">
            <h2>🎉 入門コース完了!</h2>
            <p>Go の基礎を習得しました。次は初級コースでCLIアプリを構築しましょう。</p>
            <a href="beginner.html" className="home-btn">初級コースへ →</a>
          </div>
        )}
      </div>

      <footer>
        Go 1.22 (2024-02リリース) 準拠 · go1.22 / go mod 基準 · 2026年4月時点
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
