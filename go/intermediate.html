    "net/http"
    "strings"
    "github.com/golang-jwt/jwt/v5"
)

func authMiddleware(secret []byte) func(http.Handler) http.Handler {
    return func(next http.Handler) http.Handler {
        return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
            // Authorizationヘッダを解析してJWT検証
        })

    return func(next http.Handler) http.Handler {
        return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
            header := r.Header.Get("Authorization")
            if !strings.HasPrefix(header, "Bearer ") {
                http.Error(w, "unauthorized", http.StatusUnauthorized)
                return
            }
            tokenStr := strings.TrimPrefix(header, "Bearer ")
            _, err := jwt.Parse(tokenStr, func(t *jwt.Token) (any, error) {
                return secret, nil
            })
            if err != nil {
                http.Error(w, "invalid token", http.StatusUnauthorized)
                return
            }
            next.ServeHTTP(w, r)
        })
    }
}`},

            panic(err)
        }
    }()

    sig := make(chan os.Signal, 1)
    signal.Notify(sig, syscall.SIGTERM, syscall.SIGINT)
    <-sig

    }
}`},

  {diff:1,q:"Goのリフレクションを使ってJSON tagからフィールドマッピングを動的に行うシリアライザの概念コードを書け。",code:`func marshalWithTags(v any) (map[string]any, error) {
    // reflectでstructのjsonタグを読む
}`,answer:`func marshalWithTags(v any) (map[string]any, error) {
    result := make(map[string]any)
    val := reflect.ValueOf(v)
    typ := reflect.TypeOf(v)
    if val.Kind() == reflect.Ptr {
        val = val.Elem()
        typ = typ.Elem()
    }
    for i := 0; i < typ.NumField(); i++ {
        field := typ.Field(i)
        tag := field.Tag.Get("json")
        name := strings.Split(tag, ",")[0]
        if name == "" { name = field.Name }
        if name == "-" { continue }
        result[name] = val.Field(i).Interface()
    }
    return result, nil
}`},

    r.Use(middleware.RealIP)
    r.Use(middleware.Logger)

        r.Use(authMiddleware(jwtSecret))
        r.Route("/api/v1", func(r chi.Router) {
            r.Get("/users", listUsers)
            r.Post("/users", createUser)
            r.Route("/users/{id}", func(r chi.Router) {

ConfigMapとSecretで設定を外部化することで、同じDockerイメージを開発・ステージング・本番で使えます。Secretはbase64エンコードされますが暗号化ではないため、本番ではKubernetes SecretsをVaultやAWS Secrets Managerと組み合わせます。`,
table:T.k8sDeploy,
code:`# kubectl コマンド早見表
# kubectl apply -f deployment.yaml       : デプロイ
# kubectl get pods                       : Pod一覧
# kubectl logs -f pod/myapp-xxx          : ログ確認
# kubectl exec -it pod/myapp-xxx -- sh  : シェル接続
# kubectl port-forward svc/myapp 8080:80 : ローカルアクセス
# kubectl rollout status deployment/myapp : ロールアウト確認
# kubectl rollout undo deployment/myapp  : ロールバック`,
afterCode:`Helmはkubernetesマニフェストのパッケージマネージャです。helm install myapp ./chartで複数のyamlをまとめてデプロイできます。本番Kubernetes環境ではHelmかKustomizeの使用を推奨します。`},
]},
{id:"ch7",num:7,title:"並行処理パターン: errgroup・rate limiter",est:"65分",
goal:"errgroup・rate.Limiter・NATSを使った高度な並行処理を実装できる。並行バグ（deadlock・data race）を検出できる。",
sections:[
{title:"並行処理の高度なパターン",
body:`golang.org/x/sync/errgroupは複数のgoroutineを並列実行し、いずれかが失敗した場合に全てをキャンセルするパターンをシンプルに実装します。contextと組み合わせることでタイムアウト・キャンセルも自動的に伝播します。PythonのasyncioのgatherとTaskGroupの組み合わせに相当します。

golang.org/x/time/rateのrate.Limiterはトークンバケットアルゴリズムによるレート制限を実装します。API呼び出しの速度制限・スロットリング実装に使えます。Wait()は指定レートを超えた場合にスリープして自動調整します。`,
table:T.channelPatterns,
afterTable:`go test -race はデータ競合を検出する最重要ツールです。CIでは必ずgo test -race ./...を実行してください。deadlockはchannel操作・Mutex取得の順序を常に同一にすることで防げます。`},
]},
{id:"ch8",num:8,title:"パフォーマンスチューニング",est:"65分",
goal:"pprofとbenchmarkで性能ボトルネックを特定できる。sync.Pool・バッファ再利用・GC制御で性能を改善できる。",
sections:[
{title:"Goのパフォーマンスの計測と改善",
body:`Goは既に高速ですが、不必要なメモリ割り当てとGC圧力が性能の主な障壁です。sync.Poolでオブジェクトを再利用し、strings.Builderでバッファを積み上げ、スライスのcapacityを事前確保することが効果的です。

benchmarkとpprof（特にheapプロファイル・allocsプロファイル）でホットスポットを特定してから最適化するのが鉄則です。推測による最適化は時間の無駄です。go test -bench=. -benchmem -cpuprofileでCPUプロファイルを取り、go tool pprofで分析します。`,
table:T.perfTopics,
code:`// プロファイル駆動の最適化例
// Before: 毎回allocate
func bad() string {
    result := ""
    for i := 0; i < 100; i++ {
        result += fmt.Sprintf("item %d\n", i)
    }
    return result
}

// After: Builderで1回のalloc
func good() string {
    var sb strings.Builder
    sb.Grow(1000) // 事前にキャパシティを確保
    for i := 0; i < 100; i++ {
        fmt.Fprintf(&sb, "item %d\n", i)
    }
    return sb.String()
}`,
afterCode:`go test -bench=Good -benchmem で改善効果を数値で確認できます。B/op（1操作のバイト数）とallocs/op（1操作のアロケーション数）が減少すれば成功です。`},
]},
{id:"ch9",num:9,title:"コード生成とリフレクション",est:"65分",
goal:"go generate・stringer・wire等のコード生成ツールを使える。reflectで動的な型操作を実装できる。",
sections:[
{title:"コード生成の活用",
body:`Goはマクロや動的な言語機能の代わりに、コード生成（go generate）を多用します。stringer・moq・wire・swaggergenなどのツールがgo:generateコメントから呼び出されてコードを自動生成します。Pythonのデコレータが実行時に変換を行うのに対し、Goはコンパイル前に変換して型安全を保ちます。

wireはGoogleが開発するDI（依存性注入）ツールで、ProviderとInjectorの定義からwire_gen.goを自動生成します。コンパイル時にDIグラフが解決されるためランタイムエラーがなく、PythonのFastAPIのDependency Injectionより型安全です。`,
code:`// go generateとwireの組み合わせ
//go:generate wire

//go:build wireinject

package main

import "github.com/google/wire"

func InitializeApp() *App {
    wire.Build(
        NewConfig,
        NewDB,
        NewRepository,
        NewService,
        NewApp,
    )
    return nil // wireが実際のコードを生成
}`,
afterTable:`reflectは強力ですが遅く、型安全でもないため多用は避けます。JSONのマーシャリング・ORMのスキャニング等、フレームワーク内部でのみ使うのが理想です。コード生成で解決できる場合はそちらを優先してください。`},
]},
{id:"ch10",num:10,title:"マイクロサービス設計",est:"70分",
goal:"マイクロサービスの基本コンポーネント（サービスディスカバリ・メッセージキュー・分散トレーシング）を説明できる。contextの伝播を正しく実装できる。",
sections:[
{title:"マイクロサービスアーキテクチャ",
body:`マイクロサービスは大きなモノリスを独立してデプロイ可能な小さなサービスに分割するアーキテクチャです。Goはコンパイルが速く・バイナリが小さく・並行処理が得意なため、マイクロサービスに非常に向いています。KubernetesのコントロールプレーンがGoで書かれているのはその証左です。

サービス間通信には同期（gRPC・REST）と非同期（NATS・Kafka）があります。非同期メッセージングはサービス間の結合を緩くし、バックプレッシャーや耐障害性を向上させます。contextを全ての関数に伝播させることでリクエストのキャンセル・タイムアウトがサービス全体に伝わります。`,
table:T.microservices,
afterTable:`サービスメッシュ（Istio・Linkerd）を使うとアプリコードの変更なしにmTLS・トレーシング・サーキットブレーカーが実現できます。ただし複雑性とオーバーヘッドが増すため、サービス数が少ない段階では導入を急がないことを推奨します。`},
]},
{id:"ch11",num:11,title:"ツールチェーンとエコシステム",est:"60分",
goal:"golangci-lint・govulncheck・go mod管理を使ってコード品質を管理できる。Goの主要エコシステムツールを説明できる。",
sections:[
{title:"Goのツールチェーン",
body:`Goはツールチェーンが充実しており、コード品質・セキュリティ・依存管理を一貫して管理できます。golangci-lintは多数のlinterを集約して高速実行するツールで、CIに組み込むことで一貫したコードスタイルを維持できます。PythonのflakE8・mypy・banditを一つのツールで統合したようなものです。

govulncheckはGoモジュールの依存関係に既知の脆弱性がないかをチェックします。go.sumに登録された依存のバイナリ解析を行い、実際にコードから呼ばれている脆弱な関数のみを報告するため誤検知が少ないです。`,
code:`# Goツールチェーン早見表
go fmt ./...         # コードフォーマット
go vet ./...         # 静的解析（基本）
golangci-lint run    # 多数のlinterを一括実行
govulncheck ./...    # 脆弱性チェック
go test -race ./...  # テスト + データ競合検出
go test -cover ./... # カバレッジ計測
go mod tidy          # 依存整理
go mod verify        # チェックサム検証
go build ./...       # 全パッケージをビルド確認
go doc -http=:6060   # ドキュメントサーバー`,
afterCode:`golangci-lintの設定は.golangci.yaml（またはtoml/json）で管理します。CIではgolangci-lint run --timeout=5mとタイムアウトを指定してください。定期的にgolangci-lintのバージョンを更新して新しいlinterを取り込みましょう。`},
]},
{id:"ch12",num:12,title:"実務設計パターンとアーキテクチャ",est:"65分",
goal:"Goの実務的な設計パターン（リポジトリパターン・クリーンアーキテクチャ）を説明できる。大規模プロジェクトのパッケージ設計ができる。",
sections:[
{title:"Goのアーキテクチャパターン",
body:`大規模Goプロジェクトではリポジトリパターン（Repository Pattern）が広く使われます。Domain（ビジネスロジック）・Repository（データアクセスインターフェース）・Infra（実装）を分離することで、テスト時にモックに差し替えやすくなります。Pythonのsqlalchemy sessionを依存注入するパターンに近いです。

クリーンアーキテクチャはDomain → Usecase → Interface → Infrastructureの依存方向を内側に一方向に保つ設計原則です。Goのinterfaceを使えばこの設計が自然に実現できます。パッケージ設計はcmd（エントリポイント）・internal（非公開）・domain・infra等を責務で分割するのが実務的です。`,
code:`// リポジトリパターンの例
package domain

// インターフェース定義（Domainレイヤ）
type UserRepository interface {
    FindByID(ctx context.Context, id int64) (*User, error)
    Save(ctx context.Context, user *User) error
    Delete(ctx context.Context, id int64) error
}

// ---

package infra

// PostgreSQL実装（Infraレイヤ）
type pgUserRepository struct{ pool *pgxpool.Pool }

func NewPgUserRepository(pool *pgxpool.Pool) domain.UserRepository {
    return &pgUserRepository{pool: pool}
}

func (r *pgUserRepository) FindByID(ctx context.Context, id int64) (*domain.User, error) {
    var u domain.User
    err := r.pool.QueryRow(ctx, "SELECT id, name, email FROM users WHERE id=$1", id).
        Scan(&u.ID, &u.Name, &u.Email)
    if err != nil { return nil, err }
    return &u, nil
}`,
afterCode:`テスト時はpgUserRepositoryの代わりにモック実装を注入することで、DBなしで高速なユニットテストが書けます。testifyのmockやmoqで自動生成されたモックを使うのが実務的です。上級コースではプロダクションレベルのGoサービスの全体設計を学びます。`},
]},
];
