     answer:`import torch

def evaluate(model, loader, criterion, device):
    model.eval()
    total_loss = 0.0
    correct = 0
    total = 0
    with torch.no_grad():
        for X_batch, y_batch in loader:
            X_batch, y_batch = X_batch.to(device), y_batch.to(device)
            y_pred = model(X_batch)
            loss = criterion(y_pred, y_batch)
            total_loss += loss.item()
            preds = y_pred.argmax(dim=1)
            correct += (preds == y_batch).sum().item()
            total += len(y_batch)
    return total_loss / len(loader), correct / total`}

テンソルの作成方法はいくつかあります。torch.tensor()はリストやNumPy配列からコピーして作成します。torch.zeros()・torch.ones()・torch.randn()・torch.rand()は特定のパターンで初期化されたテンソルを作ります。from_numpy()はNumPy配列とメモリを共有するゼロコピーの変換です（one側を変更するともう一方も変わります）。

dtypeの管理が重要です。PyTorchのデフォルトは浮動小数点数がtorch.float32（32ビット）、整数がtorch.int64です。ニューラルネットワークの計算は通常float32で行いますが、GPUメモリ節約のためにfloat16・bfloat16も使われます。`,

# 様々な作成方法
t1 = torch.tensor([1.0, 2.0, 3.0])           # リストから
t2 = torch.zeros(3, 4)                        # ゼロ行列 (3x4)
t3 = torch.randn(2, 3, dtype=torch.float32)   # 正規乱数
t4 = torch.arange(0, 10, step=2)              # [0,2,4,6,8]

# NumPyとの変換
arr = np.array([1, 2, 3], dtype=np.float32)
t5 = torch.from_numpy(arr)  # ゼロコピー（メモリ共有）
t6 = t3.numpy()             # → NumPy (CPUテンソルのみ)

# 基本情報
print(t3.shape)    # torch.Size([2, 3])
print(t3.dtype)    # torch.float32
print(t3.device)   # cpu`,

     {title:"形状変換とブロードキャスト", body:`形状変換はDeep Learningで最も頻繁に行う操作の一つです。view()とreshape()は形状を変更します。view()はメモリが連続している必要がある（contiguous）のに対し、reshape()は必要ならコピーを作ります。permute()は次元の順序を変え、unsqueeze()・squeeze()は次元を追加・削除します。

ブロードキャストはNumPyのルールと同じです。形状が異なるテンソル同士の演算で、小さい方を自動的に拡張します。(3, 1)と(1, 4)の加算は(3, 4)になります。Pythonのスカラーとリストの混在計算に似ていますが、次元が合わないとエラーになります。

einsum（アインシュタイン記法）を使うと行列乗算・縮約・転置などを統一的に書けます。例えばtorch.einsum('ij,jk->ik', A, B)は行列積です。Pythonのリスト内包表記が複雑なループを1行で書けるように、einsumは複雑なテンソル演算を明示的に記述します。`,
      code:`import torch

t = torch.randn(2, 3, 4)

# 形状変換
t_flat = t.view(2, -1)         # (2, 12): -1は自動計算
t_perm = t.permute(0, 2, 1)   # (2, 4, 3): 次元入れ替え
t_uns = t.unsqueeze(0)         # (1, 2, 3, 4): 先頭に次元追加
t_sq = t_uns.squeeze(0)        # (2, 3, 4): 次元1を削除

# ブロードキャスト
a = torch.randn(3, 1)   # (3, 1)
b = torch.randn(1, 4)   # (1, 4)
c = a + b               # (3, 4): 自動拡張

# einsum
A = torch.randn(2, 3)
B = torch.randn(3, 4)
C = torch.einsum('ij,jk->ik', A, B)  # 行列積 (2, 4)
print(C.shape)  # torch.Size([2, 4])`,

     {title:"計算グラフとrequires_grad", body:`PyTorchのAutogradは動的計算グラフを使います。requires_grad=Trueのテンソルが計算に絡むと、その操作の履歴が計算グラフとして記録されます。backward()を呼ぶと逆伝播でこのグラフを遡り、各パラメータの勾配を計算します。TensorFlowの静的グラフと違い、Pythonのデバッガーで普通にステップ実行できます。

勾配は各テンソルの.gradプロパティに蓄積されます。これはミニバッチ学習において、複数のbackward()呼び出しにわたって勾配を蓄積したい場合に有用です。ただし通常の訓練ループでは毎回optimizer.zero_grad()で勾配をリセットします。これを忘れると勾配が積み重なって誤った更新が起きます。

torch.no_grad()コンテキストマネージャーは計算グラフの記録を無効にします。推論時・評価時・転移学習でパラメータを固定する場合に使います。これによりメモリ使用量が減り、計算も速くなります。Pythonのcontextlib.suppress()に似た使い方です。`,
      code:`import torch

# 基本的な自動微分
x = torch.tensor(2.0, requires_grad=True)
w = torch.tensor(3.0, requires_grad=True)
b = torch.tensor(1.0, requires_grad=True)

y = w * x + b       # y = 3*2 + 1 = 7
loss = y ** 2       # loss = 49

loss.backward()     # 逆伝播

print(f"dy/dw = {w.grad}")  # dy/dw = 2*y*x = 2*7*2 = 28
print(f"dy/dx = {x.grad}")  # dy/dx = 2*y*w = 2*7*3 = 42
print(f"dy/db = {b.grad}")  # dy/db = 2*y*1 = 14

# 勾配のリセット
w.grad.zero_()  # インプレース操作でゼロ化`,
      afterCode:"勾配のリセットはoptimizer.zero_grad()で行います。これはmodel.parameters()の全パラメータのgradをゼロにします。PyTorch 1.7以降はzero_grad(set_to_none=True)が推奨されており、メモリ効率が改善されます。"},
     {title:"勾配の詳細：retain_graph・grad_fn", body:`backward()はデフォルトでは一度しか呼べません。計算グラフは逆伝播後にメモリ解放されるためです。retain_graph=Trueを渡すとグラフが保持され、2回以上backward()できます。GAN（敵対的生成ネットワーク）や複数損失の組み合わせでこの機能が必要になります。

各テンソルのgrad_fnプロパティは、そのテンソルを生成した操作（AddBackward・MulBackward等）を示します。PyTorchが計算グラフを辿る際に使います。デバッグ時にgrad_fnを確認することで、どの操作が勾配を持つかを追跡できます。

x = torch.randn(3, requires_grad=True)

# 複数回backward (retain_graph=True)
y = (x ** 2).sum()
y.backward(retain_graph=True)
grad_1 = x.grad.clone()

x.grad.zero_()
y.backward()  # 2回目のbackward
grad_2 = x.grad.clone()

print(torch.allclose(grad_1, grad_2))  # True: 同じ勾配

# autograd.grad: 明示的な偏微分
x = torch.randn(4, requires_grad=True)
loss = (x ** 3).sum()
grads = torch.autograd.grad(loss, x)
print(grads[0])  # 3 * x^2
# grad_fn の確認
z = x * 2 + 1
print(z.grad_fn)  # <AddBackward0 object>`,

  {id:"ch3", num:3, title:"nn.Module・モデル定義", est:"50分",
   goal:"nn.Moduleを継承してニューラルネットワークを定義し、パラメータの管理・モデルの保存・転移学習の基本ができる。",
   sections:[
     {title:"nn.Moduleの仕組みと層の定義", body:`nn.ModuleはPyTorchのすべてのニューラルネットワーク層の基底クラスです。__init__でnn.Linear・nn.Conv2d・nn.BatchNorm1dなどのサブモジュールを定義し、forward()で計算の流れを記述します。Pythonのクラス継承と同じ構文ですが、PyTorchが自動的にパラメータ管理・デバイス転送・シリアライズを処理します。

self.fc = nn.Linear(in, out)のようにnn.Moduleのサブモジュールを属性として代入すると、そのパラメータがmodel.parameters()に自動的に登録されます。Pythonの普通のリストでサブモジュールを持つとパラメータが登録されないため、nn.ModuleList・nn.ModuleDict・nn.ParameterListを使います。

forward()メソッドはモデルの순伝播を定義します。モデルを関数として呼び出す（output = model(input)）とforward()が実行されます。Pythonの__call__がオーバーライドされており、フック（register_forward_hook・register_backward_hook）なども透過的に実行されます。`,
      code:`import torch
import torch.nn as nn
import torch.nn.functional as F

class ConvNet(nn.Module):
    def __init__(self, num_classes=10):
        super().__init__()
        self.features = nn.Sequential(
            nn.Conv2d(1, 32, kernel_size=3, padding=1),
            nn.BatchNorm2d(32),
            nn.ReLU(inplace=True),
            nn.MaxPool2d(2, 2),
            nn.Conv2d(32, 64, kernel_size=3, padding=1),
            nn.ReLU(inplace=True),
            nn.MaxPool2d(2, 2),
        )
        self.classifier = nn.Sequential(
            nn.Dropout(0.5),
            nn.Linear(64 * 7 * 7, 256),
            nn.ReLU(inplace=True),
            nn.Linear(256, num_classes),
        )

    def forward(self, x):
        x = self.features(x)      # (N, 64, 7, 7)
        x = x.flatten(1)          # (N, 64*7*7)
        x = self.classifier(x)    # (N, 10)
        return x`,
      afterCode:"nn.ReLU(inplace=True)はinplaceで計算し、中間テンソルのメモリを節約します。ただし一部の操作（retain_graphとの組み合わせ）でエラーになることがあるので注意が必要です。"},
     {title:"転移学習とファインチューニング", body:`転移学習は事前学習済みモデルの重みを再利用して、少ないデータと計算リソースで高精度のモデルを作る技術です。Pythonのライブラリを再利用するのと同じ発想で、ImageNetで学習した特徴抽出器をそのまま使い、最終層だけを自分のタスク用に訓練します。

torchvisionのresnet18・efficientnet・vit等の事前学習済みモデルはweights=...pretrainedパラメータで読み込めます。特徴抽出の場合は全層をフリーズ（requires_grad=False）して最終層のみ訓練します。ファインチューニングでは全層を低い学習率で訓練します。

layer freezeとunfreezeをエポックごとに段階的に行うGradual Unfreezeingは実務でよく使われるテクニックです。最初は最終層のみ訓練し、徐々に前の層も学習対象に加えることで、特徴抽出器の破壊を防ぎながら効率よく学習できます。`,
      code:`import torch
import torch.nn as nn
import torchvision.models as models

# 事前学習済みResNet18を読み込む
model = models.resnet18(weights=models.ResNet18_Weights.IMAGENET1K_V1)

# 特徴抽出: 全層をフリーズ
for param in model.parameters():
    param.requires_grad = False

# 最終層のみ置き換えて訓練可能にする
num_features = model.fc.in_features
model.fc = nn.Linear(num_features, 5)  # 5クラス分類

# 確認: 訓練可能なパラメータのみ表示
trainable = [(n, p.shape) for n, p in model.named_parameters()
             if p.requires_grad]
print(f"訓練可能層: {[n for n, _ in trainable]}")

# オプティマイザは訓練可能パラメータのみに適用
optimizer = torch.optim.Adam(
    filter(lambda p: p.requires_grad, model.parameters()),
    lr=1e-3
)`,
      afterCode:"転移学習は医療画像・衛星画像・製造業の不良品検出など、学習データが少ない産業アプリケーションで特に有効です。imagenetで学習した低次元の特徴（エッジ・テクスチャ）は多くのドメインで汎用的に使えます。"}

  {id:"ch4", num:4, title:"損失関数・最適化", est:"50分",
   goal:"タスクに合わせた損失関数を選択し、SGD・Adam・学習率スケジューラを組み合わせた最適化を実装できる。勾配クリッピングも使える。",
   sections:[
     {title:"損失関数の種類と選択", body:`損失関数はモデルの予測と正解の「ずれ」を数値化します。タスクによって適切な損失関数が異なります。回帰問題にはMSE（Mean Squared Error）・MAE（Mean Absolute Error）、2値分類にはBCEWithLogitsLoss、多クラス分類にはCrossEntropyLossを使います。

CrossEntropyLossはソフトマックスと負の対数尤度損失を一つにまとめたものです。モデルの出力（logits）を直接受け取るため、forward()でsoftmaxを適用しないのが通常です。nn.functional.cross_entropy()も同じですが、関数として使えます。Pythonでいえばクラスと関数で同じ機能を提供している関係です。

カスタム損失関数はnn.Moduleまたは関数として実装します。テンソル演算だけで書けばautogradが自動的に勾配を計算します。Focal Loss（クラス不均衡対策）・Dice Loss（セグメンテーション用）など、標準外の損失関数は自前で実装する必要があります。`,
      code:`import torch
import torch.nn as nn
import torch.nn.functional as F

# 標準的な損失関数
criterion_reg = nn.MSELoss()         # 回帰
criterion_cls = nn.CrossEntropyLoss() # 多クラス分類
criterion_bin = nn.BCEWithLogitsLoss() # 2値分類

# 使用例
logits = torch.randn(8, 10)   # バッチ8、クラス10
labels = torch.randint(0, 10, (8,))
loss = criterion_cls(logits, labels)

# カスタム損失関数: Focal Loss
class FocalLoss(nn.Module):
    def __init__(self, gamma=2.0, alpha=0.25):
        super().__init__()
        self.gamma = gamma
        self.alpha = alpha

    def forward(self, logits, targets):
        ce_loss = F.cross_entropy(logits, targets, reduction='none')
        pt = torch.exp(-ce_loss)  # 予測確率
        focal_loss = self.alpha * (1 - pt) ** self.gamma * ce_loss
        return focal_loss.mean()`,
      afterCode:"CrossEntropyLossはlabel_smoothing引数（PyTorch 1.10+）をサポートしています。label_smoothing=0.1にすると過信を防いで汎化性能が改善することがあります。Transformerモデルの学習でよく使われます。"},
     {title:"オプティマイザと学習率スケジューラ", body:`オプティマイザはパラメータを更新するアルゴリズムです。SGDは最もシンプルで、learning_rate×gradientだけパラメータを動かします。Adam（Adaptive Moment Estimation）は勾配の1次モーメント（平均）と2次モーメント（分散）を使って学習率を自動調整します。大半のディープラーニングタスクでAdam（またはAdamW）が使われます。

学習率スケジューラは訓練の進行に合わせて学習率を変化させます。StepLR（Nエポックごとに半減）・CosineAnnealingLR（コサイン関数で減衰）・OneCycleLR（ウォームアップ→最大値→減衰）が代表的です。特にOneCycleLRはSGDと組み合わせると高速な収束と良い汎化性能が得られます（Super-Convergenceと呼ばれる現象）。

AdamWはAdamの重み減衰（L2正則化）を修正したバージョンです。通常のAdamの実装では重み減衰とモーメントの計算が絡み合いますが、AdamWでは分離して適用します。TransformerモデルではAdamWが標準的に使われます。`,
      code:`import torch
import torch.optim as optim
import torch.optim.lr_scheduler as lr_scheduler

model = ConvNet()

# AdamWオプティマイザ（Transformerの標準）
optimizer = optim.AdamW(
    model.parameters(),
    lr=1e-3,
    weight_decay=1e-4,  # L2正則化
    betas=(0.9, 0.999)
)

# OneCycleLRスケジューラ
steps_per_epoch = 100
total_epochs = 30
scheduler = lr_scheduler.OneCycleLR(
    optimizer,
    max_lr=1e-2,
    steps_per_epoch=steps_per_epoch,
    epochs=total_epochs,
    pct_start=0.3,  # ウォームアップ割合
)

# 勾配クリッピング (exploding gradient対策)
for epoch in range(total_epochs):
    for X_batch, y_batch in loader:
        optimizer.zero_grad()
        loss = criterion(model(X_batch), y_batch)
        loss.backward()
        torch.nn.utils.clip_grad_norm_(model.parameters(), max_norm=1.0)
        optimizer.step()
        scheduler.step()  # OneCycleLRはバッチごとにstep`,
      afterCode:"勾配クリッピング（clip_grad_norm_）はRNN・Transformerで勾配爆発を防ぐために重要です。max_norm=1.0が一般的なデフォルト値です。コンテンツLossが急激に増加する場合は勾配クリッピングを疑ってください。"}
   ]},
  {id:"ch5", num:5, title:"DataLoader・Dataset", est:"50分",
   goal:"Datasetを実装してDataLoaderで効率的にデータを供給し、前処理・拡張・サンプリングを設定できる。",
   sections:[
     {title:"DatasetとDataLoaderの設計", body:`Datasetは__len__と__getitem__を実装する抽象クラスです。__getitem__(idx)はインデックスを受け取り（サンプル, ラベル）のタプルを返します。ファイルシステム上の画像・CSVファイル・データベースなど、どんなデータソースでも統一インターフェースで扱えます。Pythonのイテレータプロトコル（__iter__・__next__）に似た概念です。

DataLoaderはDatasetをラップして、バッチの作成・シャッフル・並列読み込みを自動化します。num_workers>0を設定するとマルチプロセスで前処理を並列実行し、GPUの待機時間を削減します。pin_memory=TrueはCPUメモリをピン留めしてGPUへの転送を高速化します。

collate_fnを指定すると、可変長データ（異なる長さのテキスト・画像）のバッチ作成をカスタマイズできます。自然言語処理でのパディング・パッキングはここで行います。torch.nn.utils.rnn.pad_sequenceを使うと可変長シーケンスのパディングが簡単です。`,
      code:`import torch
from torch.utils.data import Dataset, DataLoader, random_split
from pathlib import Path
from PIL import Image
import torchvision.transforms as T

class ImageFolderDataset(Dataset):
    """ディレクトリ構造からクラスを自動検出するデータセット"""
    def __init__(self, root: str, transform=None):
        self.root = Path(root)
        self.classes = sorted([d.name for d in self.root.iterdir()
                               if d.is_dir()])
        self.class_to_idx = {c: i for i, c in enumerate(self.classes)}
        self.samples = [
            (p, self.class_to_idx[p.parent.name])
            for c in self.classes
            for p in (self.root / c).glob('*.jpg')
        ]
        self.transform = transform

    def __len__(self): return len(self.samples)

    def __getitem__(self, idx):
        path, label = self.samples[idx]
        image = Image.open(path).convert('RGB')
        if self.transform:
            image = self.transform(image)
        return image, label`,

     {title:"データ拡張とWeightedSampler", body:`データ拡張（Augmentation）は訓練データを人工的に増やして過学習を防ぐ技術です。画像では反転・回転・クロップ・輝度変換・ガウシアンノイズなどを訓練時のみ適用します。torchvisionのtransformsモジュールが標準的に使われ、Albumentationsライブラリはより多くの拡張とAlbumentations専用の高速変換を提供します。

クラス不均衡（少数クラスがある）場合はWeightedRandomSamplerでバランスよくサンプリングします。各サンプルに重みを付けることで、少数クラスがより多くサンプリングされます。PythonのrandomモジュールのChoicesのweightに相当します。

v2（torchvision.transforms.v2）はPyTorch 0.15以降の推奨APIです。バウンディングボックスやセグメンテーションマスクとの一貫した変換をサポートし、物体検出・セグメンテーションのデータ拡張が容易になります。`,

import torchvision.transforms.v2 as T

# 訓練用拡張

    T.RandomResizedCrop(224, scale=(0.8, 1.0)),
    T.RandomHorizontalFlip(p=0.5),
    T.ColorJitter(brightness=0.4, contrast=0.4, saturation=0.4, hue=0.1),

    T.ToDtype(torch.float32, scale=True),  # [0,255] → [0,1]

  {id:"ch6", num:6, title:"訓練ループ", est:"50分",
   goal:"完全な訓練ループ（train/eval分岐・早期終了・checkpointing）を実装し、グラフィカルにロスと精度を追跡できる。",
   sections:[
     {title:"完全な訓練ループの実装", body:`Pytorchの訓練ループには定形パターンがあります。エポックのループ内で、訓練フェーズ（model.train()）と検証フェーズ（model.eval()）を切り替えます。model.train()はDropoutをオンにしBatchNormを訓練モードにします。model.eval()はDropoutをオフにBatchNormを推論モードにします。この切り替えを忘れると再現性のない結果になります。

Early Stopping（早期終了）は検証損失が一定エポック改善しなければ訓練を止めます。過学習を防ぎ、計算時間を節約します。patienceパラメータで「何エポック待つか」を設定します。PythonのContext Managerのような設計で、改善がなければraise StopTrainingのような仕組みです。

Checkpointingは定期的にモデルの重みをファイルに保存します。最良の検証損失を持つモデルを保存しておき、訓練後に読み込みます。モデルだけでなく、optimizer・scheduler・epoch番号も保存すると訓練を途中から再開できます。`,
      code:`import torch
import torch.nn as nn

def full_training_loop(model, train_loader, val_loader, num_epochs=50,
                       patience=5, save_path='best_model.pth'):
    device = 'cuda' if torch.cuda.is_available() else 'cpu'
    model.to(device)
    criterion = nn.CrossEntropyLoss()
    optimizer = torch.optim.AdamW(model.parameters(), lr=1e-3)

    best_val_loss = float('inf')
    no_improve_count = 0

    for epoch in range(num_epochs):
        # 訓練フェーズ
        model.train()
        train_loss = 0.0
        for X, y in train_loader:
            X, y = X.to(device), y.to(device)
            optimizer.zero_grad()
            loss = criterion(model(X), y)
            loss.backward()
            optimizer.step()
            train_loss += loss.item()

        # 検証フェーズ
        model.eval()
        val_loss = 0.0
        with torch.no_grad():
            for X, y in val_loader:
                X, y = X.to(device), y.to(device)
                val_loss += criterion(model(X), y).item()

        val_loss /= len(val_loader)
        print(f"Epoch {epoch+1}: train={train_loss/len(train_loader):.4f} val={val_loss:.4f}")

        if val_loss < best_val_loss:
            best_val_loss = val_loss
            torch.save(model.state_dict(), save_path)
            no_improve_count = 0
        else:
            no_improve_count += 1
            if no_improve_count >= patience:
                print(f"Early stopping at epoch {epoch+1}")
                break`,
      afterCode:"torch.cuda.is_available()でGPUの有無を確認します。Apple Siliconの場合はtorch.backends.mps.is_available()でMPSデバイスを確認します。device = 'cuda' if torch.cuda.is_available() else 'mps' if torch.backends.mps.is_available() else 'cpu'という条件分岐が完全な対応です。"},
     {title:"Mixed Precision訓練とGradient Accumulation", body:`Mixed Precision訓練はfloat32とfloat16を混在させてGPUメモリを削減し計算を高速化します。torch.cuda.amp（Automatic Mixed Precision）を使います。GradScalerはfloat16で勾配がアンダーフロー（ゼロになる）するのを防ぐためスケーリングを行います。Nvidiaは最新GPU（Ampere以降）でbfloat16の使用を推奨しています。

Gradient Accumulationは大きなバッチサイズをGPUメモリ内に収まる小さなバッチに分割して計算し、複数バッチ分の勾配を蓄積してから1回の更新を行います。有効バッチサイズ=バッチサイズ×蓄積ステップ数です。GPUメモリが少ない環境で大きなバッチサイズを模倣できます。

これらの技術を組み合わせることで、コンシューマーGPUでも大規模モデルの訓練が可能になります。HuggingFaceのTrainerやPyTorch Lightningはこれらを自動的に管理します。`,
      code:`import torch
from torch.cuda.amp import autocast, GradScaler

def train_with_amp(model, loader, optimizer, accumulation_steps=4):
    device = 'cuda'
    scaler = GradScaler()   # 勾配スケーリング
    model.train()
    optimizer.zero_grad()

    for step, (X, y) in enumerate(loader):
        X, y = X.to(device), y.to(device)

        # autocastでfloat16計算
        with autocast(device_type='cuda', dtype=torch.float16):
            logits = model(X)
            loss = criterion(logits, y)
            loss = loss / accumulation_steps  # 勾配を正規化

        scaler.scale(loss).backward()

        # accumulation_steps毎に更新
        if (step + 1) % accumulation_steps == 0:
            scaler.unscale_(optimizer)
            torch.nn.utils.clip_grad_norm_(model.parameters(), 1.0)
            scaler.step(optimizer)
            scaler.update()
            optimizer.zero_grad()`,
      afterCode:"GradScalerのscale・unscale_・update()のセットは必ずセットで使います。unscale_後にclip_grad_norm_を使うことで、スケーリング後の実際の勾配サイズに対してクリッピングが適用されます。"}
   ]},
  {id:"ch7", num:7, title:"モデル保存・読み込み", est:"40分",
   goal:"state_dictを使ったモデルの保存・読み込み・チェックポイント管理ができる。TorchScriptとONNXエクスポートの基本を理解できる。",
   sections:[
     {title:"state_dictとチェックポイント管理", body:`PyTorchでモデルを保存する方法は2種類あります。torch.save(model, path)でモデルオブジェクト全体を保存する方法と、torch.save(model.state_dict(), path)でパラメータ辞書のみを保存する方法です。後者が推奨で、クラス定義があれば別環境でも読み込め、PickleのバージョンやPythonのバージョン依存が少なくなります。

フルチェックポイントはモデルだけでなく、optimizer・scheduler・epoch・最良スコアも保存します。これにより中断した訓練を完全に再開できます。Pythonのpickleでオブジェクトを丸ごと保存するのと同じ考え方で、dict{}に必要なものをまとめてtorch.saveします。

セキュリティ上の注意点として、torch.load()はデフォルトで任意のPythonコードを実行できるpickleを使います。信頼できないソースのモデルファイルを読み込む場合はweights_only=Trueを使います。これはモデルのstate_dictのみを読み込み、任意のPythonオブジェクトの実行を防ぎます。`,
      code:`import torch

# フルチェックポイントの保存
def save_checkpoint(model, optimizer, scheduler, epoch, val_loss, path):
    checkpoint = {
        'epoch': epoch,
        'model_state_dict': model.state_dict(),
        'optimizer_state_dict': optimizer.state_dict(),
        'scheduler_state_dict': scheduler.state_dict() if scheduler else None,
        'val_loss': val_loss,
    }
    torch.save(checkpoint, path)
    print(f"Checkpoint saved: epoch={epoch}, val_loss={val_loss:.4f}")

def load_checkpoint(path, model, optimizer=None, scheduler=None):
    checkpoint = torch.load(path, map_location='cpu', weights_only=False)
    model.load_state_dict(checkpoint['model_state_dict'])
    if optimizer and checkpoint.get('optimizer_state_dict'):
        optimizer.load_state_dict(checkpoint['optimizer_state_dict'])
    if scheduler and checkpoint.get('scheduler_state_dict'):
        scheduler.load_state_dict(checkpoint['scheduler_state_dict'])
    return checkpoint['epoch'], checkpoint['val_loss']`,
      afterCode:"map_location='cpu'を指定すると、GPUで訓練したモデルをCPU環境で読み込めます。本番環境がCPUの場合に重要です。逆にCPUで保存したモデルをGPUに転送するにはmodel.to('cuda')を使います。"},
     {title:"TorchScriptとONNXエクスポート", body:`TorchScriptはPyTorchモデルをPythonから独立した形式で保存します。C++・Java・Rust等のPythonが使えない環境でも実行でき、本番デプロイ・モバイル（TorchMobile）に使います。torch.jit.script()はPythonのコードを解析してTorchScriptに変換し、torch.jit.trace()は入力を追跡して変換します。

ONNXはOpen Neural Network Exchangeの略で、フレームワーク間でモデルを交換する標準形式です。PyTorchからONNXにエクスポートし、ONNX RuntimeやTensorRT・CoreMLで推論できます。MLをプロダクションに乗せる場合、Python不要の高速推論エンジンを使うためにONNXが重要になります。

量子化はモデルのfloat32重みをint8に変換してモデルサイズを約4分の1にする技術です。PyTorchはPost-Training Quantization（PTQ）とQuantization-Aware Training（QAT）をサポートします。エッジデバイス・モバイルデプロイでメモリと速度が重要な場合に使います。`,
      code:`import torch

model = ConvNet()
model.eval()

# TorchScript: torch.jit.trace（動的制御フローなしモデル向け）
dummy_input = torch.randn(1, 1, 28, 28)
traced = torch.jit.trace(model, dummy_input)
traced.save('model_traced.pt')

# TorchScript: torch.jit.script（if文・forループがあるモデル向け）
scripted = torch.jit.script(model)
scripted.save('model_scripted.pt')

# ONNXエクスポート
torch.onnx.export(
    model,
    dummy_input,
    'model.onnx',
    input_names=['input'],
    output_names=['output'],
    dynamic_axes={'input': {0: 'batch_size'}, 'output': {0: 'batch_size'}},
    opset_version=17,
)
print("ONNXエクスポート完了")

# 検証: onnxruntimeで確認
# import onnxruntime as ort
# sess = ort.InferenceSession('model.onnx')
# result = sess.run(None, {'input': dummy_input.numpy()})`,
      afterCode:"dynamic_axesで指定した次元は動的になり、バッチサイズが変わっても同じONNXモデルを使えます。エクスポート時のopset_versionはデプロイ先のONNX Runtimeのバージョンと合わせます。"}
   ]},
  {id:"ch8", num:8, title:"TensorBoard可視化", est:"40分",
   goal:"TensorBoardで訓練ロス・精度・モデルグラフ・特徴マップを可視化し、ハイパーパラメータチューニングにHParamsを使える。",
   sections:[
     {title:"SummaryWriterによる基本的な可視化", body:`TensorBoardはGoogle Brain（現Google DeepMind）が開発した訓練の可視化ツールです。PyTorchのtorch.utils.tensorboard.SummaryWriterを使ってログを記録し、tensorboard --logdirコマンドでブラウザから確認します。Pythonのloggingモジュールのように、必要なデータをコードの随所に記録します。

add_scalar()でスカラー値（損失・精度・学習率）を記録します。第1引数はタグ名（スラッシュで階層化できます）、第2引数は値、第3引数はステップ（x軸）です。同じタグに複数の値を記録すると折れ線グラフになります。TensorFlowのtf.summaryと同じAPIです。

add_images()で画像バッチを記録できます。誤分類されたサンプルを可視化したり、データ拡張の結果を確認したりするのに便利です。add_embedding()はt-SNEやPCAを使って高次元特徴量を2D/3Dに次元削減して可視化します。クラスターの分離具合でモデルの特徴抽出の質を評価できます。`,
      code:`from torch.utils.tensorboard import SummaryWriter
import torch
import torch.nn as nn

# ログディレクトリはrun名を含めると管理しやすい
writer = SummaryWriter('runs/resnet18_lr1e3_bs32')

# 訓練ループ内での記録
global_step = 0
for epoch in range(num_epochs):
    for X, y in train_loader:
        loss = train_step(X, y)
        writer.add_scalar('Loss/train', loss, global_step)
        global_step += 1

    val_loss, val_acc = validate()
    writer.add_scalar('Loss/val', val_loss, epoch)
    writer.add_scalar('Accuracy/val', val_acc, epoch)

    # 学習率の記録
    current_lr = optimizer.param_groups[0]['lr']
    writer.add_scalar('Learning Rate', current_lr, epoch)

    # モデルパラメータのヒストグラム
    for name, param in model.named_parameters():
        writer.add_histogram(f'Parameters/{name}', param.data, epoch)

writer.close()
# tensorboard --logdir=runs --port=6006`,

     {title:"HParamsとモデルグラフの可視化", body:`HParams（ハイパーパラメータ）のTrackingはTensorBoardで実験を組織的に管理します。各実験のハイパーパラメータ（学習率・バッチサイズ・モデルアーキテクチャ）と結果（最終精度・損失）を記録し、表形式で比較できます。Pythonのdict比較やスプレッドシートで実験管理するより格段に見やすくなります。

モデルグラフの可視化にはadd_graph()を使います。ダミー入力を渡すとモデルの計算グラフ（トポロジー）がTensorBoard上で確認できます。各層の接続・形状を視覚的に確認でき、設計ミスの発見に役立ちます。

Pytorchの代替可視化ツールとしてWandb（Weights & Biases）・MLflow・Neptune.aiがあります。これらはクラウドベースでチーム共有が容易で、本番機械学習の実験管理に広く使われます。TensorBoardよりリッチな機能（モデルバージョン管理・コード記録・Artifactsなど）を持ちます。`,

# グリッドサーチ
