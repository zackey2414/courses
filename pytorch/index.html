  sections: [{

  sections: [{
    title: "state_dict による保存・読み込み",
    body: "PyTorch で推奨されるモデル保存方法は、モデルのパラメータ（state_dict）のみを保存する方式です。torch.save(model.state_dict(), path) で保存し、model.load_state_dict(torch.load(path)) で復元します。\n\nこの方法では、読み込み時に同じモデル定義クラスが必要です。モデルの構造はコードで定義し、パラメータ（重み）だけをファイルに保存するという分離により、モデル構造の変更に柔軟に対応できます。\n\ntorch.save(model, path) でモデル全体を保存することもできますが、これは pickle に依存するため、Python のバージョンやモジュールの配置が変わると読み込めなくなるリスクがあります。state_dict 方式を標準として使い、全体保存は避けるのがベストプラクティスです。",

    afterCode: "ポイント: load_state_dict に strict=False を渡すと、キーが一部不一致でもエラーにならずに読み込めます。転移学習で一部のレイヤーだけ事前学習済みの重みを使いたい場合に便利です。"
  }, {
    title: "チェックポイント",
    body: "長時間の学習を行う場合、途中経過を保存して学習を再開できるようにすることが重要です。チェックポイントにはモデルのパラメータだけでなく、オプティマイザの状態（モーメンタムのバッファなど）、現在のエポック、最良の精度などを含めます。\n\nGPU で学習したモデルを CPU で読み込む場合は torch.load(path, map_location='cpu') を指定します。逆に CPU で保存したモデルを GPU で読み込む場合は map_location='cuda' とするか、読み込み後に model.to(device) します。\n\nベストモデル（検証精度が最高のエポック）を別途保存しておくのも定石です。学習を最後まで走らせた後、最終エポックのモデルよりもベストモデルの方が汎化性能が高いことはよくあります。",
    code: `import torch\nimport torch.nn as nn\nimport torch.optim as optim\n\ndef save_checkpoint(model, optimizer, epoch, loss, path):\n    torch.save({\n        "epoch": epoch,\n        "model_state_dict": model.state_dict(),\n        "optimizer_state_dict": optimizer.state_dict(),\n        "loss": loss,\n    }, path)\n\ndef load_checkpoint(model, optimizer, path, device="cpu"):\n    checkpoint = torch.load(path, map_location=device)\n    model.load_state_dict(checkpoint["model_state_dict"])\n    optimizer.load_state_dict(checkpoint["optimizer_state_dict"])\n    return checkpoint["epoch"], checkpoint["loss"]\n\n# 使い方\nmodel = nn.Linear(10, 5)\noptimizer = optim.Adam(model.parameters())\nsave_checkpoint(model, optimizer, epoch=10, loss=0.05, path="ckpt.pth")\n\n# 復元\nmodel2 = nn.Linear(10, 5)\nopt2 = optim.Adam(model2.parameters())\nepoch, loss = load_checkpoint(model2, opt2, "ckpt.pth")\nprint(f"再開: epoch={epoch}, loss={loss}")`,

    title: "TorchScript と ONNX",
    body: "学習済みモデルを Python 以外の環境で使いたい場合、TorchScript または ONNX 形式にエクスポートします。TorchScript は PyTorch 独自の中間表現で、C++ ランタイム（LibTorch）やモバイル（PyTorch Mobile）から直接実行できます。\n\ntorch.jit.script(model) はモデルの forward メソッドを解析して TorchScript に変換します。Python の if 文やループも対応していますが、全ての Python 構文が変換できるわけではありません。動的な Python 機能を使っている場合は torch.jit.trace(model, example_input) の方が確実です。trace は実際にデータを通して計算グラフを記録する方式で、制御フローは固定されます。\n\nONNX（Open Neural Network Exchange）は、フレームワーク間でモデルを交換するための標準形式です。PyTorch → ONNX にエクスポートすれば、ONNX Runtime, TensorRT, CoreML など多様な推論エンジンで実行できます。本番環境でのデプロイでは ONNX + ONNX Runtime の組み合わせが高速かつポータブルです。",

  }]
