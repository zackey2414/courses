torch.manual_seed(42)
x = torch.linspace(0, 1, 20)
y_true = 2 * x + 1 + 0.1 * torch.randn(20)

w = torch.randn(1, requires_grad=True)
b = torch.randn(1, requires_grad=True)

lr = 0.1

for step in range(10):
    # 予測
    y_pred = w * x + b

    # MSE損失
    loss = ((y_pred - y_true) ** 2).mean()

    # 勾配をゼロに
    if w.grad is not None:
        w.grad.zero_()
    if b.grad is not None:
        b.grad.zero_()

    # 逆伝播
    loss.backward()

    # パラメータ更新（勾配降下）
    with torch.no_grad():
        w -= lr * w.grad
        b -= lr * b.grad

    if step % 2 == 0:
        print(f"Step {step}: loss={loss.item():.4f}, w={w.item():.3f}, b={b.item():.3f}")

import torch.nn as nn

class ResBlock(nn.Module):
    def __init__(self, in_features, out_features, dropout=0.1):
        super().__init__()
        self.main = nn.Sequential(
            nn.Linear(in_features, out_features),
            nn.BatchNorm1d(out_features),
            nn.ReLU(),
            nn.Dropout(dropout),
            nn.Linear(out_features, out_features),
            nn.BatchNorm1d(out_features),
        )
        # 次元が違う場合は射影
        if in_features != out_features:
            self.shortcut = nn.Linear(in_features, out_features)
        else:
            self.shortcut = nn.Identity()
        self.relu = nn.ReLU()

    def forward(self, x):
        return self.relu(self.main(x) + self.shortcut(x))

import torch.nn as nn
import torch.optim as optim

def train_one_epoch(model, loader, criterion, optimizer, device):
    model.train()
    total_loss = 0
    correct = 0
    total = 0

    for images, labels in loader:
        images, labels = images.to(device), labels.to(device)
        images = images.view(images.size(0), -1)

        # 順伝播
        outputs = model(images)
        loss = criterion(outputs, labels)

        # 逆伝播
        optimizer.zero_grad()
        loss.backward()
        optimizer.step()

        # 統計
        total_loss += loss.item()
        preds = outputs.argmax(dim=1)
        correct += (preds == labels).sum().item()
        total += labels.size(0)

    return total_loss / len(loader), correct / total

    def __init__(self, patience=5, min_delta=1e-4):
        self.patience = patience
        self.min_delta = min_delta
        self.best_loss = float('inf')
        self.counter = 0

    def __call__(self, val_loss):
        if val_loss < self.best_loss - self.min_delta:
            self.best_loss = val_loss
            self.counter = 0
            return False  # 続行
        else:
            self.counter += 1
            if self.counter >= self.patience:

import torch.nn as nn

class MnistCNN(nn.Module):
    def __init__(self):
        super().__init__()
        self.block1 = nn.Sequential(
            nn.Conv2d(1, 32, kernel_size=3, padding=1),
            nn.BatchNorm2d(32),
            nn.ReLU(),
            nn.MaxPool2d(2, 2),
        )
        self.block2 = nn.Sequential(
            nn.Conv2d(32, 64, kernel_size=3, padding=1),
            nn.BatchNorm2d(64),
            nn.ReLU(),
            nn.MaxPool2d(2, 2),
        )
        self.classifier = nn.Sequential(
            nn.Flatten(),
            nn.Linear(64 * 7 * 7, 128),
            nn.ReLU(),
            nn.Dropout(0.5),
            nn.Linear(128, 10),
        )

    def forward(self, x):
        x = self.block1(x)
        x = self.block2(x)
        x = self.classifier(x)
        return x

model = MnistCNN()
print(model)
total = sum(p.numel() for p in model.parameters())

import torch.nn.functional as F
from torchvision import transforms

# MNISTの推論用transform
infer_transform = transforms.Compose([
    transforms.Grayscale(),
    transforms.Resize((28, 28)),
    transforms.ToTensor(),
    transforms.Normalize((0.1307,), (0.3081,))
])

def predict(model, image, device='cpu'):
    """PIL画像1枚を推論"""
    model.eval()
    x = infer_transform(image).unsqueeze(0).to(device)  # (1,1,28,28)
    with torch.no_grad():
        logits = model(x)
        probs = F.softmax(logits, dim=1)
        pred_class = probs.argmax(dim=1).item()
        confidence = probs.max().item()
    return pred_class, confidence

def predict_batch(model, images, device='cpu'):
    """PIL画像リストをバッチ推論"""
    model.eval()
    tensors = torch.stack([infer_transform(img) for img in images]).to(device)
    with torch.no_grad():
        logits = model(tensors)
        probs = F.softmax(logits, dim=1)
        pred_classes = probs.argmax(dim=1).tolist()
        confidences = probs.max(dim=1).values.tolist()
    return list(zip(pred_classes, confidences))

def confusion_matrix_torch(model, loader, num_classes, device):
    matrix = torch.zeros(num_classes, num_classes, dtype=torch.long)
    model.eval()
    with torch.no_grad():
        for images, labels in loader:
            images, labels = images.to(device), labels.to(device)
            images_flat = images.view(images.size(0), -1)
            preds = model(images_flat).argmax(dim=1)
            for t, p in zip(labels, preds):
                matrix[t.item(), p.item()] += 1
    return matrix

   code:`import torch

def class_metrics(cm):
    # cm: (C, C) の混同行列テンソル
    # returns: precision, recall, f1 それぞれ (C,) のテンソル
    pass`,
   answer:`import torch

def class_metrics(cm):
    """混同行列からPrecision/Recall/F1を計算"""
    # cm[i, j] = 正解i, 予測j の件数
    tp = cm.diag().float()
    fp = cm.sum(dim=0).float() - tp  # 各列合計 - 対角
    fn = cm.sum(dim=1).float() - tp  # 各行合計 - 対角

    precision = tp / (tp + fp + 1e-8)
    recall    = tp / (tp + fn + 1e-8)
    f1        = 2 * precision * recall / (precision + recall + 1e-8)

    return precision, recall, f1

# ダミーで動作確認
cm = torch.tensor([
    [50,  2,  1],
    [ 3, 45,  2],
    [ 1,  1, 48],
])
precision, recall, f1 = class_metrics(cm)
for i in range(3):
    print(f"Class {i}: P={precision[i]:.3f}, R={recall[i]:.3f}, F1={f1[i]:.3f}")

macro_f1 = f1.mean()
print(f"Macro F1: {macro_f1:.3f}")`},

import matplotlib
matplotlib.use('Agg')
import matplotlib.pyplot as plt

def collect_misclassified(model, loader, device, max_samples=20):
    model.eval()
    samples = []
    with torch.no_grad():
        for images, labels in loader:
            images, labels = images.to(device), labels.to(device)
            flat = images.view(images.size(0), -1)
            preds = model(flat).argmax(dim=1)
            mask = preds != labels
            wrong_imgs   = images[mask].cpu()
            wrong_labels = labels[mask].cpu()
            wrong_preds  = preds[mask].cpu()
            for img, true, pred in zip(wrong_imgs, wrong_labels, wrong_preds):
                samples.append((img, true.item(), pred.item()))
                if len(samples) >= max_samples:
                    return samples
    return samples

def plot_misclassified(samples, filepath="misclassified.png"):
    n = len(samples)
    cols = 5
    rows = (n + cols - 1) // cols
    fig, axes = plt.subplots(rows, cols, figsize=(cols*2, rows*2.2))
    axes = axes.flatten()
    for i, (img, true, pred) in enumerate(samples):
        axes[i].imshow(img.squeeze(), cmap='gray')
        axes[i].set_title(f"T:{true} P:{pred}", color='red', fontsize=9)
        axes[i].axis('off')
    for j in range(i+1, len(axes)):
        axes[j].axis('off')
    plt.suptitle("Misclassified Samples", fontsize=12)
    plt.tight_layout()
    plt.savefig(filepath, dpi=100)
    print(f"Saved to {filepath}")

# 使用例
# samples = collect_misclassified(model, val_loader, device, max_samples=20)

{id:"ch3", num:3, title:"自動微分（Autograd）", est:"55分",
 goal:"requires_grad・backward()・grad属性の仕組みを理解し、計算グラフとは何かを説明できる。「なぜ微分が学習に必要なのか」を直感的に説明でき、torch.no_grad()の使いどころを把握している。",
 sections:[
  {title:"なぜ微分が必要か：損失の山を下る",
   body:`機械学習の本質は「モデルのパラメータ（重み）を、予測誤差が最小になるように調整すること」です。このとき「どの方向にパラメータを動かせば誤差が減るか」を教えてくれるのが「勾配（gradient）」、すなわち微分です。

直感的なイメージとして、損失関数を「山の高さ」、パラメータを「あなたの位置」と考えてみてください。目標は「山の最も低い谷（損失最小点）に辿り着くこと」です。微分は「今いる場所で、どの方向が下り坂か」を教えてくれます。勾配の逆方向にパラメータを動かし続けることで、少しずつ谷に近づいていきます。これが「勾配降下法（Gradient Descent）」です。

ニューラルネットは数百万個のパラメータを持つため、全ての偏微分を手計算することは不可能です。そこでPyTorchのAutogradが活躍します。計算グラフを記録しながら順方向の計算を行い、.backward()を1回呼ぶだけで連鎖律（chain rule）を使って全パラメータの勾配を自動計算します。これが「誤差逆伝播法（Backpropagation）」の自動実装です。`,
   code:`import torch

# シンプルな例: y = x^2, dy/dx = 2x
x = torch.tensor(3.0, requires_grad=True)
y = x ** 2
print(f"y = {y.item()}")   # 9.0

# 逆伝播で勾配計算
y.backward()
print(f"dy/dx = {x.grad.item()}")  # 6.0 = 2*3

# 計算グラフの確認
x2 = torch.tensor(2.0, requires_grad=True)
z = x2 * 3 + 5
print(f"z.grad_fn: {z.grad_fn}")  # MulBackward0等が表示される`,
   afterCode:"requires_grad=Trueをつけたテンソルへの全ての演算は、計算グラフとして記録されます。grad_fn属性がNoneでないテンソルは「計算グラフの一部」であることを示しています。"},
  {title:"backward()とgradの仕組み",
   body:`backward()を呼ぶと、計算グラフを辿って全てのrequires_grad=Trueなテンソルの.grad属性に勾配が蓄積されます。「蓄積」という点が重要で、backward()を複数回呼ぶと勾配が加算されてしまいます。このため、学習ループではoptimizer.zero_grad()（または手動でgrad.zero_()）を毎ステップ呼ぶ必要があります。

中間の計算結果（中間テンソル）の勾配は通常保持されません。リーフノード（requires_grad=Trueで直接作ったテンソル）の.gradだけが自動的に設定されます。中間テンソルの勾配が必要な場合は.retain_grad()を事前に呼びます。

多変数の場合は、backward()の引数にgradient（勾配の初期値）を渡せます。スカラー以外のテンソルでbackward()を呼ぶ場合はこれが必要です。実際の学習では損失はスカラーになるよう設計されているため、引数なしのloss.backward()が標準パターンです。`,
   code:`import torch

w = torch.tensor(2.0, requires_grad=True)
b = torch.tensor(1.0, requires_grad=True)

# 学習ループの模擬
for step in range(3):
    # 順伝播
    x = torch.tensor(3.0)
    y_pred = w * x + b
    loss = (y_pred - 10.0) ** 2  # 目標値: 10

    # 重要: backward前にgradをクリア
    if w.grad is not None:
        w.grad.zero_()
    if b.grad is not None:
        b.grad.zero_()

    loss.backward()
    print(f"Step {step}: loss={loss.item():.3f}, w.grad={w.grad.item():.3f}, b.grad={b.grad.item():.3f}")

    # パラメータ更新
    with torch.no_grad():
        w -= 0.01 * w.grad
        b -= 0.01 * b.grad`,
   afterCode:"勾配のゼロクリアを忘れることはPyTorchの最も一般的なバグの一つです。なぜなく、PyTorchはデフォルトで勾配を「累積」するからです。これは意図的な設計で、RNNなど一部のユースケースで累積が必要になるためです。"},
  {title:"torch.no_grad()と推論時の最適化",
   body:`評価（推論）時には勾配計算が不要です。torch.no_grad()コンテキストマネージャを使うと、ブロック内の全演算で計算グラフの構築がスキップされます。これにより、メモリ使用量が大幅に削減され（中間テンソルを保持しないため）、計算速度も向上します。

評価時に必ず守るべき2つのことがあります：①model.eval()を呼ぶこと（BatchNormとDropoutの動作を評価モードに切り替える）、②torch.no_grad()ブロック内で推論すること（不要な計算グラフを作らない）。この2つはセットで使います。

@torch.no_grad()デコレータを関数に付けることもできます。推論専用の関数に付けると、その関数の呼び出し全体でno_gradが有効になります。また、torch.inference_mode()はno_gradよりさらに強い最適化で、ビュー操作なども制限されますが推論速度がわずかに速くなります。`,
   code:`import torch
import torch.nn as nn

model = nn.Linear(10, 2)

# 悪い例: 推論時もグラフを構築してしまう
x = torch.randn(32, 10)
# out = model(x)  # メモリ無駄遣い

# 良い例: 推論時はno_gradを使う
model.eval()
with torch.no_grad():
    out = model(x)
    print("Output shape:", out.shape)
    print("requires_grad:", out.requires_grad)  # False

# デコレータ版
@torch.no_grad()
def predict(model, x):
    model.eval()
    return model(x)

result = predict(model, x)
print("Decorator version:", result.shape)`,
   afterCode:"メモリリークのよくある原因の一つが、推論ループでno_gradを使い忘れること。大量の画像を推論する際にGPUメモリが溢れるなら、まずno_gradを忘れていないか確認してください。"},
]},

{id:"ch4", num:4, title:"ニューラルネットワークの基礎（nn.Module）", est:"55分",
 goal:"nn.Moduleを継承したカスタムモデルを実装できる。nn.Linear/ReLU/Sequential/Dropout/BatchNormの役割を説明でき、forward()の実装とパラメータの確認ができるようになる。",
 sections:[
  {title:"nn.Moduleの設計思想",
   body:`PyTorchのすべてのニューラルネットワーク構成要素はnn.Module（torch.nn.Module）を基底クラスとして構築されています。自分でモデルを作るときも、このクラスを継承するのが基本パターンです。

nn.Moduleの重要な特性として、「子モジュールの自動登録」があります。__init__でself.layerのようにnn.Moduleのサブクラスを代入すると、それが子モジュールとして自動的に登録されます。model.parameters()を呼ぶと、すべての子モジュールのパラメータが再帰的に収集されます。これがオプティマイザに渡すパラメータです。

Scikit-learnのestimatorとの比較で言えば、fit()に相当するのが学習ループ（後の章で実装）、predict()に相当するのがmodel(x)（forward()の呼び出し）です。ただしPyTorchはより低レベルで、損失計算・勾配計算・パラメータ更新を自分で書く必要があります。その代わり、どんな複雑なアーキテクチャも実装できる柔軟性があります。`,
   code:`import torch
import torch.nn as nn

class MyModel(nn.Module):

{id:"ch5", num:5, title:"データセットとDataLoader", est:"50分",

 sections:[
  {title:"Datasetクラスの設計",
   body:`PyTorchのデータパイプラインはDatasetとDataLoaderの2層構造です。Datasetは「n番目のデータを返す」責務を持ち、DataLoaderは「それをバッチにまとめてシャッフル・並列読み込みする」責務を持ちます。

カスタムDatasetを実装するには、torch.utils.data.Datasetを継承して__len__（データセットの総サンプル数を返す）と__getitem__（インデックスを受け取りデータを返す）を実装するだけです。PythonのIterableプロトコルに慣れていれば、同じ考え方です。

__getitem__でやることは「インデックスに対応するデータを読んで、前処理してテンソルで返す」です。画像の場合はPIL.ImageをToTensor()でテンソルに変換します。テキストなどの場合は独自のエンコードを行います。DataLoaderが複数の__getitem__呼び出し結果をcollate_fn（デフォルトはtorch.stack）でバッチにまとめます。`,
   code:`import torch
from torch.utils.data import Dataset, DataLoader
import numpy as np

class IrisDataset(Dataset):
    """シンプルなカスタムDatasetの例"""
    def __init__(self, features, labels, transform=None):
        self.features = torch.tensor(features, dtype=torch.float32)
        self.labels   = torch.tensor(labels, dtype=torch.long)
        self.transform = transform

    def __len__(self):
        return len(self.features)

    def __getitem__(self, idx):
        x = self.features[idx]
        y = self.labels[idx]
        if self.transform:
            x = self.transform(x)
        return x, y

# ダミーデータで動作確認
np.random.seed(0)
X = np.random.randn(150, 4).astype(np.float32)
y = np.random.randint(0, 3, 150)

dataset = IrisDataset(X, y)
print(f"Dataset size: {len(dataset)}")
sample_x, sample_y = dataset[0]
print(f"Sample: x.shape={sample_x.shape}, y={sample_y}")`,
   afterCode:"__getitem__は各ワーカープロセスで並列に呼ばれます。そのため、スレッドセーフでない操作（Pythonのリストへの書き込みなど）をここで行うと問題が起きます。データ読み込みはできる限り純粋関数的に書きましょう。"},
  {title:"DataLoaderの設定とMNIST",
   body:`DataLoaderのパラメータで最も重要なのはbatch_size・shuffle・num_workersです。batch_sizeは一度に処理するサンプル数で、GPU搭載の場合は64〜512が一般的です。shuffleはエポックごとにデータ順序をランダム化するかどうかで、訓練時はTrue、評価時はFalseが原則です。

num_workersはデータ読み込みに使う並列プロセス数です。0はメインプロセスのみ（同期）、2〜4は一般的な設定です。Windows環境やJupyterではnum_workers=0が安定します。Colabでは2〜4が推奨されます。pin_memory=TrueはCPU→GPU転送を高速化するオプションで、GPU使用時に有効です。

torchvision.datasets.MNISTは学習データ60,000枚と評価データ10,000枚を提供します。downloadパラメータをTrueにすると自動ダウンロードされます。transformパラメータには前処理パイプラインを渡します。通常はtransforms.ToTensor()（PIL画像→[0,1]のfloat32テンソル）とtransforms.Normalize()（平均・標準偏差で標準化）を組み合わせます。`,
   code:`import torch
from torchvision import datasets, transforms
from torch.utils.data import DataLoader, random_split

MNIST_MEAN = (0.1307,)
MNIST_STD  = (0.3081,)

transform = transforms.Compose([
    transforms.ToTensor(),                        # PIL→テンソル、[0,255]→[0,1]
    transforms.Normalize(MNIST_MEAN, MNIST_STD),  # 標準化
])

train_ds = datasets.MNIST('./data', train=True,  download=True, transform=transform)
test_ds  = datasets.MNIST('./data', train=False, download=True, transform=transform)

# 訓練セットをさらにtrain/valに分割

train_size = len(train_ds) - val_size
train_ds, val_ds = random_split(train_ds, [train_size, val_size])

train_loader = DataLoader(train_ds, batch_size=64, shuffle=True,  num_workers=2, pin_memory=True)

test_loader  = DataLoader(test_ds,  batch_size=256, shuffle=False, num_workers=2)

print(f"Train: {len(train_ds)}, Val: {len(val_ds)}, Test: {len(test_ds)}")

  {title:"データ拡張（Data Augmentation）",
   body:`データ拡張は訓練時のみ適用する変換で、モデルの汎化性能を向上させます。MNIST程度のシンプルなデータセットでは大きな効果はありませんが、実用的な画像分類ではデータ拡張が精度の大きな差を生みます。

torchvisionが提供する拡張変換には、ランダム水平反転（RandomHorizontalFlip）、ランダムクロップ（RandomCrop）、色調変換（ColorJitter）、回転（RandomRotation）などがあります。これらを組み合わせることで、実質的に訓練データを数倍に増やしたような効果が得られます。

注意点として、データ拡張は訓練データにのみ適用します。評価・テスト時は同じ入力に対して決定論的な出力が必要なため、Resize・ToTensor・Normalizeのみを行います。訓練用と評価用で別のtransformオブジェクトを作るのが標準的なパターンです。`,

{id:"ch6", num:6, title:"損失関数とオプティマイザ", est:"55分",
 goal:"CrossEntropyLoss・MSELoss・BCEWithLogitsLossの数式と使いどころを説明できる。SGD・Adam・AdamWの違いを理解し、学習率の設定と重み減衰の意味を把握している。",
 sections:[
  {title:"損失関数の選択",
   body:`損失関数（コスト関数）はモデルの予測と正解がどれだけ違うかを数値化するものです。この値を最小化するようにパラメータを更新することが機械学習の目標です。

多クラス分類には CrossEntropyLoss を使います。内部的に LogSoftmax と NLLLoss を組み合わせており、数値的に安定した実装になっています。重要なのは「モデルの出力はlogits（生のスコア）であり、SoftmaxやSigmoidをforwardの最後に付けてはいけない」という点です。CrossEntropyLossが内部でSoftmaxを処理するため、二重適用になってしまいます。

回帰問題にはMSELoss（平均二乗誤差）が標準的ですが、外れ値に弱いという欠点があります。SmoothL1Loss（Huber損失）はMSEとMAEの折衷で、小さな誤差にはMSE、大きな誤差にはMAEのように振る舞い、外れ値に強いです。物体検出（バウンディングボックス回帰）でよく使われます。`,
   table: T.lossFunc,
   afterTable:"CrossEntropyLossに渡すラベルはtorch.long（int64）である必要があります。float32を渡すとエラーになります。また入力logitsは(N, C)の形状で、ラベルは(N,)の形状が標準です。"},
  {title:"オプティマイザの仕組みと選択",
   body:`オプティマイザは勾配を使ってパラメータを更新するアルゴリズムです。最もシンプルなSGD（確率的勾配降下法）は「パラメータ = パラメータ - 学習率 × 勾配」という式で動きます。モーメンタム付きSGD（momentum=0.9）は過去の更新方向を記憶して加速し、局所最適にはまりにくくなります。

Adamは「各パラメータに適応した学習率を使う」という点で革新的でした。頻繁に更新されるパラメータは学習率を下げ、あまり更新されないパラメータは学習率を上げます。これにより、学習率の手動調整が少なくて済みます。AdamWはAdamの重み減衰（L2正則化）の実装バグを修正したもので、現在の標準です。

学習率は最重要ハイパーパラメータです。大きすぎると発散し、小さすぎると収束が遅い。一般的な初期値はSGDで0.01〜0.1、Adamで1e-3（0.001）です。学習率スケジューラ（後述）で学習の進行に合わせて学習率を変化させることが多いです。`,
   table: T.optimizers,
   afterTable:"「どのオプティマイザを選べばいいか」という質問への答えは：まずAdamW(lr=1e-3)を試してください。うまくいかない場合にSGD+モーメンタムを試します。Transformerはほぼ必ずAdamWです。ResNetなどCVモデルはSGD+モーメンタム+コサイン減衰が多いです。"},
  {title:"重み減衰と正則化",
   body:`過学習（overfitting）を防ぐテクニックの一つが「重み減衰（weight decay）」です。L2正則化とも呼ばれ、損失関数にパラメータの二乗和を加えることで、パラメータが大きくなりすぎることを抑制します。AdamWのwdに指定します。一般的な値は1e-4〜1e-2です。

なぜAdamWとAdamで差があるのか。Adamの元の実装では、weight decayは勾配に加算される形で実装されていました（「decoupled」でない）。これはアダプティブな学習率と干渉して期待通りの正則化効果が出ません。AdamWは重み減衰をパラメータ更新の後にデカップルドで適用するため、本来の意図通りに動作します。

学習率スケジューラも重要です。定番はCosineAnnealingLR（コサイン型に学習率を下げていく）とStepLR（一定エポックごとに学習率をγ倍する）です。学習の最終段階で学習率を下げると、モデルがよりきれいな最適点に収束しやすくなります。`,
   code:`import torch
import torch.nn as nn
import torch.optim as optim
from torch.optim.lr_scheduler import CosineAnnealingLR, StepLR

model = nn.Sequential(nn.Linear(784, 256), nn.ReLU(), nn.Linear(256, 10))

# AdamW + weight decay
optimizer = optim.AdamW(
    model.parameters(),
    lr=1e-3,
    weight_decay=1e-4,  # L2正則化の強さ
    betas=(0.9, 0.999),  # モーメンタム係数（デフォルト）
)

# コサインアニーリングスケジューラ（20エポックで最低学習率1e-6へ）
scheduler = CosineAnnealingLR(optimizer, T_max=20, eta_min=1e-6)

# 擬似ループ
for epoch in range(5):
    # ... train ...
    scheduler.step()  # エポック終了後に呼ぶ
    print(f"Epoch {epoch+1}, lr={scheduler.get_last_lr()[0]:.6f}")`,
   afterCode:"scheduler.step()を呼ぶタイミングはスケジューラによって異なります。CosineAnnealingLRやStepLRはエポック終了後、ReduceLROnPlateauはeval後にval_lossを渡して呼びます。PyTorch 1.4以降はoptimizer.step()の後にscheduler.step()を呼ぶのが正しい順序です。"},
]},

{id:"ch7", num:7, title:"学習ループの実装", est:"55分",
 goal:"MNISTのMLPを0から訓練できる完全な学習ループを実装できる。train/eval モードの切り替え・ミニバッチ学習・エポック管理・Early Stoppingを理解し、MNISTで97%以上のval accを達成できる。",
 sections:[
  {title:"train()とeval()モードの重要性",
   body:`PyTorchのモデルには「訓練モード」と「評価モード」の2つがあります。model.train()とmodel.eval()で切り替えます。デフォルトは訓練モードです。

この切り替えが影響するレイヤーは主に2つ：DropoutとBatchNorm です。Dropoutは訓練時にランダムにニューロンをゼロにしますが、評価時は全ニューロンを有効にし（スケーリングで調整）ます。BatchNormは訓練時にバッチの統計（平均・分散）を使い、評価時には訓練中に蓄積した移動平均を使います。

よくあるバグは「評価時にmodel.eval()を呼び忘れる」ことです。するとDropoutが有効のままなので、同じ入力に対して毎回異なる出力が返ります。これは精度の測定を不安定にし、デバッグを困難にします。学習ループの構造として「訓練フェーズはmodel.train()の後・評価フェーズはmodel.eval()の後」を徹底しましょう。`,
   code:`import torch
import torch.nn as nn

model = nn.Sequential(
    nn.Linear(784, 256),
    nn.ReLU(),
    nn.Dropout(0.5),
    nn.Linear(256, 10)
)

x = torch.randn(1, 784)

# 訓練モード: Dropoutが有効
model.train()
out1 = model(x)
out2 = model(x)
print("Train mode (should differ):", torch.allclose(out1, out2))  # False

# 評価モード: Dropoutが無効
model.eval()
with torch.no_grad():
    out3 = model(x)
    out4 = model(x)
print("Eval mode (should match):", torch.allclose(out3, out4))  # True`,
   afterCode:"一つのモデルインスタンスをトレーニングと推論で使い回す場合、都度モードを切り替えてください。複数のモデルを使う場合は、評価対象のモデルのみeval()を呼ぶことに注意します。"},
  {title:"完全な学習ループの実装",
   body:`実践的な学習ループは「エポックループ」→「バッチループ」→「loss計算」→「backward」→「optimizer更新」のサイクルで構成されます。毎エポックの訓練が終わったら評価を行い、損失とaccuracyをログします。

optimizer.zero_grad()は backward() の前に必ず呼びます（順序は意外と重要で、zero_grad → forward → loss計算 → backward → step が正しい順番）。バッチの画像をMLPに渡す前に view() でフラット化することも忘れずに。

訓練の進捗をモニタリングするには、各エポックの平均損失（total_loss / len(loader)）とaccuracy（correct / total）を追跡します。訓練損失が下がっているのに検証損失が上がり始めたら、過学習のサインです。`,
   code:`import torch
import torch.nn as nn
import torch.optim as optim
from torchvision import datasets, transforms
from torch.utils.data import DataLoader, random_split

device = torch.device("cuda" if torch.cuda.is_available() else "cpu")

# データ準備
transform = transforms.Compose([transforms.ToTensor(), transforms.Normalize((0.1307,), (0.3081,))])
full_train = datasets.MNIST('./data', train=True, download=True, transform=transform)
test_ds    = datasets.MNIST('./data', train=False, download=True, transform=transform)
train_ds, val_ds = torch.utils.data.random_split(full_train, [55000, 5000])

train_loader = DataLoader(train_ds, batch_size=128, shuffle=True)
val_loader   = DataLoader(val_ds,   batch_size=256, shuffle=False)

# モデル定義
model = nn.Sequential(
    nn.Linear(784, 256), nn.BatchNorm1d(256), nn.ReLU(), nn.Dropout(0.3),
    nn.Linear(256, 128), nn.ReLU(),
    nn.Linear(128, 10)
).to(device)

optimizer = optim.Adam(model.parameters(), lr=1e-3)
criterion = nn.CrossEntropyLoss()

def run_epoch(loader, training=True):
    model.train() if training else model.eval()
    total_loss, correct, total = 0, 0, 0
    ctx = torch.enable_grad() if training else torch.no_grad()
    with ctx:
        for imgs, labels in loader:
            imgs, labels = imgs.to(device), labels.to(device)
            imgs = imgs.view(imgs.size(0), -1)
            out = model(imgs)
            loss = criterion(out, labels)
            if training:
                optimizer.zero_grad(); loss.backward(); optimizer.step()
            total_loss += loss.item()
            correct += (out.argmax(1) == labels).sum().item()
            total += labels.size(0)
    return total_loss / len(loader), correct / total

for epoch in range(1, 11):
    tr_loss, tr_acc = run_epoch(train_loader, training=True)
    va_loss, va_acc = run_epoch(val_loader,   training=False)
    print(f"Ep{epoch:2d}: train={tr_acc:.4f} val={va_acc:.4f} vloss={va_loss:.4f}")`,
   afterCode:"このMLPでMNISTは97〜98%のval accに達します。次の章でCNNに切り替えると99%以上を安定して達成できます。学習ループの構造はMLPでもCNNでも変わりません。"},
  {title:"学習曲線と過学習の診断",
   body:`学習曲線（訓練損失と検証損失のエポックごとの推移グラフ）は、モデルの状態を診断する最重要ツールです。「訓練損失が下がり続け、検証損失も同様に下がる」なら正常な学習です。「訓練損失は下がるが検証損失が途中から上昇する」なら過学習（overfitting）です。

過学習への対処法は主に4つです。①Dropoutを追加・強化する（p=0.3〜0.5）。②weight decayを強くする（1e-3〜1e-2）。③データ拡張で訓練データを仮想的に増やす。④Early Stoppingで検証損失が改善しなくなった時点で学習を止める。

逆に「訓練損失も検証損失も高い（両方下がらない）」場合は過小適合（underfitting）です。モデルが小さすぎる・学習率が小さすぎる・エポック数が少なすぎることが原因です。この場合はモデルを大きくするか、学習率を上げるか、学習を続けます。`,

{id:"ch8", num:8, title:"CNN（畳み込みニューラルネットワーク）", est:"60分",
 goal:"nn.Conv2dとnn.MaxPool2dの動作を説明でき、「特徴マップ」の直感的な意味を理解できる。MNIST用のCNNを実装し、MLPより高い精度（99%以上）を達成できる。",
 sections:[
  {title:"畳み込みの直感的な理解",
   body:`全結合層（MLP）は入力の全ピクセルを全ニューロンに接続します。28×28=784次元の入力に256ニューロンの層をつなぐだけで200,704個の重みが必要です。画像が大きくなるほど爆発的にパラメータが増え、「隣接するピクセルには空間的な関連性がある」という画像の特性を一切考慮していません。

畳み込み（Convolution）は「フィルター（カーネル）」と呼ばれる小さな行列（例：3×3）を入力画像の上をスライドさせながら適用します。フィルターが「エッジ検出」を学習すれば、画像全体のエッジを検出できます。同じフィルターを全位置で共有するため（重み共有）、パラメータ数が大幅に削減されます。

畳み込みレイヤーの出力を「特徴マップ（Feature Map）」と呼びます。1つのフィルターが1つの特徴マップを生成します。nn.Conv2d(1, 32, 3)は「1チャンネルの入力から32種類のフィルターを学習し、32個の特徴マップを出力する」という意味です。浅い層では「エッジ・コーナー」などの低レベル特徴、深い層では「数字の曲線・直線の組み合わせ」などの高レベル特徴を学習します。`,
   table: T.cnnLayers,
   afterTable:"padding=1はkernel_size=3のとき「入力と出力の空間サイズを同じにする」設定です。padding = kernel_size // 2 という公式で覚えておきましょう。"},
  {title:"プーリングとCNNのアーキテクチャ",
   body:`MaxPooling（最大プーリング）は一定の領域（通常2×2）の中の最大値を取り出すことで、特徴マップのサイズを半分にします。これによりパラメータ数と計算量を削減しつつ、「多少位置がずれても同じ特徴を検出できる」平行移動不変性を高めます。

CNNの標準的なアーキテクチャは「[Conv→BN→ReLU→Pool] × N → Flatten → [Linear→ReLU] × M → Linear(出力層)」という構成です。PoolingでHとWを段階的に圧縮しながら、チャンネル数（特徴の種類）は増やしていきます。

BatchNorm2d（2次元バッチ正規化）をConvの後に挿入すると学習が安定します。具体的には学習率を大きくできるようになり、収束が速くなります。「Conv→BatchNorm→ReLU」の順が標準的ですが、「Conv→ReLU→BatchNorm」やPreActivation（BN→ReLU→Conv）を使う論文もあります。実装時はどの順番を採用したかを明記しておくことが重要です。`,
   code:`import torch
import torch.nn as nn

class MnistCNN(nn.Module):
    def __init__(self):
        super().__init__()
        # ブロック1: (1, 28, 28) → (32, 14, 14)
        self.block1 = nn.Sequential(
            nn.Conv2d(1, 32, kernel_size=3, padding=1),  # → (32,28,28)
            nn.BatchNorm2d(32),
            nn.ReLU(),
            nn.MaxPool2d(2, 2),                           # → (32,14,14)
        )
        # ブロック2: (32, 14, 14) → (64, 7, 7)
        self.block2 = nn.Sequential(
            nn.Conv2d(32, 64, kernel_size=3, padding=1), # → (64,14,14)
            nn.BatchNorm2d(64),
            nn.ReLU(),
            nn.MaxPool2d(2, 2),                           # → (64,7,7)
        )
        # 分類器
        self.classifier = nn.Sequential(
            nn.Flatten(),             # → 64*7*7 = 3136
            nn.Linear(3136, 128),
            nn.ReLU(),
            nn.Dropout(0.5),
            nn.Linear(128, 10),
        )

    def forward(self, x):
        x = self.block1(x)
        x = self.block2(x)
        return self.classifier(x)

cnn = MnistCNN()
print(f"Params: {sum(p.numel() for p in cnn.parameters()):,}")  # ~約423K
x = torch.randn(8, 1, 28, 28)
print("Output shape:", cnn(x).shape)  # (8, 10)`,
   afterCode:"MLPでは784×256+256=200,960個の重みが第1層だけで必要でしたが、CNNでは3×3×1×32=288個の重みで28×28全体の特徴を抽出できます。これが「CNNは画像に対して効率的」な理由です。"},
  {title:"MNISTでCNNを学習・評価",
   body:`前の章で実装した学習ループをCNNで使うには、入力のflatten処理を取り除くだけです。MLPではimgs.view(batch, -1)でフラット化していましたが、CNNは(batch, channel, height, width)の4次元テンソルをそのまま受け取ります。

CNNはMLPと比べてパラメータ数が少ないにもかかわらず、MNISTで99%以上の精度を達成します。これは畳み込みの重み共有と局所受容野が「画像の空間構造」を効率よく捉えているためです。

実際に試してみると、MLPが97〜98%で頭打ちになるのに対して、CNNは数エポックで99%を超えることがわかります。さらにデータ拡張（RandomRotation等）を加えると、テスト精度99.3〜99.5%程度まで到達できます。これがMNISTにおけるCNNの実力の目安です。`,
   code:`import torch
import torch.nn as nn
import torch.optim as optim
from torchvision import datasets, transforms
from torch.utils.data import DataLoader

device = torch.device("cuda" if torch.cuda.is_available() else "cpu")

transform = transforms.Compose([
    transforms.RandomRotation(5),
    transforms.ToTensor(),
    transforms.Normalize((0.1307,), (0.3081,)),
])
val_transform = transforms.Compose([
    transforms.ToTensor(), transforms.Normalize((0.1307,), (0.3081,))
])

train_ds = datasets.MNIST('./data', train=True,  download=True, transform=transform)
val_ds   = datasets.MNIST('./data', train=False, download=True, transform=val_transform)
train_loader = DataLoader(train_ds, batch_size=128, shuffle=True, num_workers=2)
val_loader   = DataLoader(val_ds,   batch_size=256, shuffle=False)

model = MnistCNN().to(device)
optimizer = optim.Adam(model.parameters(), lr=1e-3)
criterion = nn.CrossEntropyLoss()
scheduler = optim.lr_scheduler.CosineAnnealingLR(optimizer, T_max=10)

for epoch in range(1, 11):
    model.train()
    correct, total = 0, 0
    for imgs, labels in train_loader:
        imgs, labels = imgs.to(device), labels.to(device)
        out = model(imgs)  # imgs はそのまま4次元
        loss = criterion(out, labels)
        optimizer.zero_grad(); loss.backward(); optimizer.step()
        correct += (out.argmax(1) == labels).sum().item(); total += labels.size(0)

    model.eval()
    v_correct, v_total = 0, 0
    with torch.no_grad():
        for imgs, labels in val_loader:
            imgs, labels = imgs.to(device), labels.to(device)
            preds = model(imgs).argmax(1)
            v_correct += (preds == labels).sum().item(); v_total += labels.size(0)

    scheduler.step()
    print(f"Ep{epoch:2d}: train={correct/total:.4f}  val={v_correct/v_total:.4f}")`,
   afterCode:"この設定で通常10エポックでval acc 99.1〜99.3%に到達します。GPUなら2〜3分、CPUでも20分程度で学習完了します。モデルを保存して次の章で活用します。"},
]},

{id:"ch9", num:9, title:"モデルの保存と読み込み", est:"45分",

 sections:[
  {title:"state_dictとモデルの保存",
   body:`PyTorchでモデルを保存する方法は主に2つあります。①state_dictのみを保存する方法（推奨）と、②モデルオブジェクトごとPickleで保存する方法です。推奨されるのはstate_dictのみの保存です。

state_dictはモデルの全パラメータ（重みとバイアス）をOrderedDictとして保持するオブジェクトです。torch.save(model.state_dict(), "model.pth")で.pthまたは.ptファイルとして保存します。読み込み時はmodel.load_state_dict(torch.load("model.pth"))で適用します。

モデルオブジェクトごと保存するtorch.save(model, "model.pt")は、Pickleを使うためモデルクラスの定義が同じPATHにある必要があります。モデルのコードを変更すると読み込めなくなるため、本番環境では使わない方が無難です。state_dictならアーキテクチャを別ファイルで定義していても読み込めます。`,

  {title:"チェックポイントと学習の再開",
   body:`長時間の学習では、途中でクラッシュしたり停止する可能性があります。チェックポイント（checkpoint）はモデルの重みだけでなく、オプティマイザの状態・エポック番号・損失なども一緒に保存することで、学習を途中から再開できるようにする仕組みです。

オプティマイザの状態（optimizer.state_dict()）には現在のモーメンタム・適応学習率などが含まれます。これを保存しないと、再開時に学習がリセットされてしまいます（パラメータは正しく復元されてもオプティマイザの記憶が失われる）。

チェックポイントはエポックごと、または「best model」（検証精度が最高のモデル）のみを保存する2つの戦略があります。実務ではbest modelのみ保存する方が容量を節約できます。定期保存と組み合わせる場合は、最新N個のチェックポイントだけ残すローテーション機能を実装することがあります。`,
   code:`import torch

def save_checkpoint(model, optimizer, epoch, val_loss, filepath):
    torch.save({
        'epoch': epoch,
        'model_state_dict': model.state_dict(),
        'optimizer_state_dict': optimizer.state_dict(),
        'val_loss': val_loss,
    }, filepath)
    print(f"[Checkpoint] Saved epoch={epoch}, val_loss={val_loss:.4f}")

def load_checkpoint(model, optimizer, filepath, device='cpu'):
    ckpt = torch.load(filepath, map_location=device)
    model.load_state_dict(ckpt['model_state_dict'])
    optimizer.load_state_dict(ckpt['optimizer_state_dict'])
    return ckpt['epoch'], ckpt['val_loss']

# Best model の保存パターン
best_val_loss = float('inf')
for epoch in range(10):
    # ... 訓練・評価 ...
    val_loss = 0.1  # ダミー
    if val_loss < best_val_loss:
        best_val_loss = val_loss
        save_checkpoint(model, optimizer, epoch, val_loss, "best_model.pth")
        print(f"  -> New best model saved!")`,
   afterCode:"Colabで学習する場合、セッションが切れるとローカルファイルが消えます。Google Driveにマウントして保存するか、学習終了後すぐにダウンロードするクセをつけましょう。"},
  {title:"推論パイプラインの実装",
   body:`学習済みモデルを使う推論パイプラインは「入力前処理 → テンソル変換 → デバイス転送 → モデル推論 → 後処理」の流れです。これを1つの関数にまとめると、Webアプリやバッチ処理で使いやすくなります。

単一サンプルの推論では unsqueeze(0) でバッチ次元を追加することを忘れずに。モデルはバッチ入力を前提としているため、(C, H, W)の画像は(1, C, H, W)に変換してから渡します。

torch.jit.script（TorchScript）やtorch.onnx.exportを使うと、Pythonに依存しない形式でモデルをエクスポートできます。TorchScriptはC++ランタイムで動作し、ONNXはTensorRTやONNX Runtimeで推論を高速化できます。これらは上級コースで扱います。`,
   code:`import torch
import torch.nn.functional as F
from torchvision import transforms
from PIL import Image

# 推論用の変換パイプライン
infer_tf = transforms.Compose([
    transforms.Grayscale(),
    transforms.Resize((28, 28)),
    transforms.ToTensor(),
    transforms.Normalize((0.1307,), (0.3081,)),
])

def predict_single(model, image_path, device='cpu'):
    """画像ファイルパスからMNIST数字を予測"""
    model.eval()
    img = Image.open(image_path)
    x = infer_tf(img).unsqueeze(0).to(device)  # (1,1,28,28)

    with torch.no_grad():
        logits = model(x)
        probs = F.softmax(logits, dim=1)
        pred = probs.argmax(dim=1).item()
        conf = probs.max().item()

    return {
        'prediction': pred,
        'confidence': conf,
        'all_probs': {i: probs[0, i].item() for i in range(10)}
    }

# 使用例
# result = predict_single(model, "digit.png", device)
# print(f"Predicted: {result['prediction']} ({result['confidence']:.1%})")`,
   afterCode:"実務の推論APIでは、複数画像をバッチにまとめて一度に推論するバッチ推論が基本です。1枚ずつ推論するより、バッチサイズ分まとめてGPUに送ることでスループットが大幅に向上します（GPUの並列計算能力を活かすため）。"},

{id:"ch10", num:10, title:"評価と可視化", est:"50分",
 goal:"Accuracy・Precision・Recall・F1スコアと混同行列を計算・解釈できる。matplotlibを使って損失曲線と誤分類サンプルを可視化でき、モデルの問題点を定量的に把握できるようになる。",
 sections:[
  {title:"分類モデルの評価指標",
   body:`Accuracy（正答率）は最も直感的な指標ですが、クラス不均衡なデータセットでは誤解を招きます。例えば99%が「正常」で1%が「異常」なデータでは、「全て正常と予測する」だけでAccuracy 99%になります。Precision・Recall・F1スコアを組み合わせて評価することが重要です。

Precision（適合率）は「正と予測したうちの、本当に正の割合」です。スパムフィルタでいえば「スパムと判定したメールのうち、実際にスパムの割合」。Precisionが低いと正常なメールをスパムと誤判定します。Recall（再現率）は「本当に正のうち、正と予測できた割合」で、スパムフィルタでは「実際のスパムのうち、検出できた割合」。Recallが低いとスパムを見逃します。

F1スコアはPrecisionとRecallの調和平均で、両方のバランスを評価します。医療診断のように「見逃し（False Negative）を最小化したい」場合はRecallを重視、「誤報（False Positive）を最小化したい」場合はPrecisionを重視します。`,
   table: T.evalMetrics,
   afterTable:"MNISTのように10クラスあって各クラスのサンプル数が均等なデータでは、Accuracyだけでも十分な評価になります。Precision/Recall/F1はクラス不均衡・二値分類でより重要になります。"},
  {title:"混同行列の計算と解釈",
   body:`混同行列（Confusion Matrix）はC×Cの行列で（Cはクラス数）、(i, j)の要素が「正解クラスi, 予測クラスj」のサンプル数を示します。対角要素が正解、非対角要素が誤分類です。

MNISTの混同行列を見ると、例えば「正解は4だが9と予測」や「正解は7だが1と予測」のような特定の誤分類パターンが見えてきます。これはモデルの弱点を発見する重要な手がかりです。「9が4に似ている」と感じるのは人間も同様で、モデルの混乱はある意味「人間的」といえます。

scikit-learnのconfusion_matrixやseabornのheatmapを使うと綺麗な可視化ができますが、PyTorchのみで実装する場合も可能です。行インデックスが正解ラベル、列インデックスが予測ラベルになるよう注意してください。`,
   code:`import torch
import matplotlib
matplotlib.use('Agg')
import matplotlib.pyplot as plt
import numpy as np

def compute_confusion_matrix(model, loader, num_classes, device):
    cm = torch.zeros(num_classes, num_classes, dtype=torch.long)
    model.eval()
    with torch.no_grad():
        for imgs, labels in loader:
            imgs, labels = imgs.to(device), labels.to(device)
            preds = model(imgs).argmax(dim=1)
            for t, p in zip(labels.cpu(), preds.cpu()):
                cm[t, p] += 1
    return cm

def plot_confusion_matrix(cm, filepath="confusion_matrix.png"):
    cm_np = cm.numpy()
    fig, ax = plt.subplots(figsize=(10, 8))
    im = ax.imshow(cm_np, interpolation='nearest', cmap='Blues')
    plt.colorbar(im)
    ax.set_xticks(range(10)); ax.set_yticks(range(10))
    ax.set_xlabel('Predicted'); ax.set_ylabel('True')
    ax.set_title('Confusion Matrix')
    thresh = cm_np.max() / 2
    for i in range(10):
        for j in range(10):
            ax.text(j, i, str(cm_np[i, j]),
                    ha="center", va="center",
                    color="white" if cm_np[i, j] > thresh else "black",
                    fontsize=8)
    plt.tight_layout()
    plt.savefig(filepath, dpi=100)
    print(f"Saved: {filepath}")

# 使用例
# cm = compute_confusion_matrix(model, val_loader, 10, device)
# plot_confusion_matrix(cm)
# per_class_acc = cm.diag().float() / cm.sum(dim=1).float()
# for i, a in enumerate(per_class_acc):

   body:`誤分類されたサンプルを実際に目で確認することは、モデル改善の最も直接的なフィードバックです。「なぜこの画像を間違えたのか」を見ることで、データの質の問題（汚れた画像・ラベルミス）やモデルの学習不足・苦手パターンを発見できます。

import matplotlib
matplotlib.use('Agg')
import matplotlib.pyplot as plt

def visualize_misclassified(model, loader, device, max_n=20, filepath="errors.png"):
    model.eval()
    errors = []
    with torch.no_grad():
        for imgs, labels in loader:
            imgs_d, labels_d = imgs.to(device), labels.to(device)
            preds = model(imgs_d).argmax(dim=1)
            mask = (preds != labels_d)
            for img, t, p in zip(imgs[mask].cpu(), labels[mask].cpu(), preds[mask].cpu()):
                errors.append((img, t.item(), p.item()))
                if len(errors) >= max_n:
                    break
            if len(errors) >= max_n:
                break

    cols = 5
    rows = (len(errors) + cols - 1) // cols
    fig, axes = plt.subplots(rows, cols, figsize=(cols*2, rows*2.5))
    axes = axes.flatten()

    for i, (img, true, pred) in enumerate(errors):
        axes[i].imshow(img.squeeze(), cmap='gray')
        axes[i].set_title(f"T:{true} → P:{pred}", color='red', fontsize=9)
        axes[i].axis('off')
    for j in range(i+1, len(axes)):
        axes[j].axis('off')

    plt.suptitle(f"Misclassified Samples ({len(errors)} shown)", fontsize=11)
    plt.tight_layout()
    plt.savefig(filepath, dpi=100)
    print(f"Saved misclassified samples to {filepath}")

/* ─── UI Components ─── */

      fontSize:12.5,padding:"10px 14px",textAlign:"left",borderBottom:"2px solid #a5b4fc",

  )), React.createElement("tbody", null,
