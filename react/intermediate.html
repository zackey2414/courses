// action type を定義し、reducer 関数を実装する

    answer: `type Action =
  | { type: 'INCREMENT' }
  | { type: 'DECREMENT' }
  | { type: 'SET_STEP'; payload: number }
  | { type: 'RESET' };

interface State { count: number; step: number; }

function reducer(state: State, action: Action): State {
  switch (action.type) {
    case 'INCREMENT': return { ...state, count: state.count + state.step };
    case 'DECREMENT': return { ...state, count: state.count - state.step };
    case 'SET_STEP':  return { ...state, step: action.payload };
    case 'RESET':     return { count: 0, step: state.step };
    default:          return state;
  }
}

function Counter() {
  const [state, dispatch] = React.useReducer(reducer, { count: 0, step: 1 });
  return (
    <div>
      <p>count: {state.count} (step: {state.step})</p>
      <button onClick={() => dispatch({ type: 'DECREMENT' })}>-</button>
      <button onClick={() => dispatch({ type: 'INCREMENT' })}>+</button>
      <input type="number" value={state.step}
        onChange={e => dispatch({ type: 'SET_STEP', payload: +e.target.value })} />
      <button onClick={() => dispatch({ type: 'RESET' })}>Reset</button>
    </div>
  );
}`

    answer: `function useLocalStorage(key, initialValue) {
  const [value, setValue] = React.useState(() => {
    try {
      const item = window.localStorage.getItem(key);
      return item !== null ? JSON.parse(item) : initialValue;
    } catch {
      return initialValue;
    }
  });

  const setStoredValue = React.useCallback((newValue) => {
    setValue(newValue);
    try {
      window.localStorage.setItem(key, JSON.stringify(newValue));
    } catch (e) {
      console.error('localStorage write error:', e);
    }
  }, [key]);

  return [value, setStoredValue];
}

    />
  );

  const [state, setState] = React.useState({
    data: null, loading: true, error: null
  });

  React.useEffect(() => {
    if (!url) return;
    const controller = new AbortController();
    setState({ data: null, loading: true, error: null });

    fetch(url, { signal: controller.signal })
      .then(res => {
        if (!res.ok) throw new Error(\`HTTP \${res.status}\`);
        return res.json();
      })
      .then(data => setState({ data, loading: false, error: null }))
      .catch(err => {
        if (err.name === 'AbortError') return; // アンマウント時は無視
        setState({ data: null, loading: false, error: err.message });
      });

    return () => controller.abort();
  }, [url]);

  return state;
}

      .then(data => setState({ data, loading: false, error: null }))

    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title: text, completed: false, userId: 1 }),
  });
  return res.json();
}

function TodoForm() {
  const queryClient = useQueryClient();
  const [text, setText] = React.useState('');

  const mutation = useMutation({
    mutationFn: createTodo,
    onMutate: async (newText) => {
      // 進行中のフェッチをキャンセル
      await queryClient.cancelQueries({ queryKey: ['todos'] });
      // 現在のキャッシュを保存（ロールバック用）
      const previous = queryClient.getQueryData(['todos']);
      // キャッシュを楽観的に更新
      queryClient.setQueryData(['todos'], old => [
        ...(old ?? []),
        { id: Date.now(), title: newText, completed: false }
      ]);
      return { previous }; // context として渡す
    },
    onError: (_err, _vars, context) => {
      // エラー時はロールバック
      queryClient.setQueryData(['todos'], context.previous);
    },
    onSettled: () => {
      // 成功・失敗どちらでも再フェッチして整合性を担保
      queryClient.invalidateQueries({ queryKey: ['todos'] });
    },
  });

  return (
    <form onSubmit={e => { e.preventDefault(); mutation.mutate(text); setText(''); }}>
      <input value={text} onChange={e => setText(e.target.value)} />
      <button type="submit" disabled={mutation.isPending}>
        {mutation.isPending ? '送信中...' : '追加'}
      </button>
    </form>
  );
}`
