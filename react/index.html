const { useState } = React;

const EX = {
  ch1: [
    {diff:1, q:"次のJSXのclass属性をJSX正式記法に直してください。\n\n<div class=\"box\">Hello</div>",
     code:"function Box() {\n  return <div class=\"box\">Hello</div>;\n}",
     answer:"function Box() {\n  return <div className=\"box\">Hello</div>;\n  // class → className に変更\n}"},
    {diff:1, q:"次のコードには複数のJSXエラーがあります。正しく修正してください。",
     code:"function Profile() {\n  return (\n    <h1>プロフィール</h1>\n    <p>名前: 太郎</p>\n  );\n}",
     answer:"function Profile() {\n  return (\n    <>  {/* フラグメントで1つのルート要素にまとめる */}\n      <h1>プロフィール</h1>\n      <p>名前: 太郎</p>\n    </>\n  );\n}\n// JSXは必ず1つのルート要素を返す必要がある"},
    {diff:2, q:"Greetingコンポーネントを作成し、nameプロップを受け取って「こんにちは、{name}さん！」と表示してください。",
     code:"function Greeting(props) {\n  // ここを実装\n}",
     answer:"function Greeting(props) {\n  return <p>こんにちは、{props.name}さん！</p>;\n}\n// <Greeting name=\"太郎\" /> → こんにちは、太郎さん！"},
    {diff:2, q:"現在の時刻を表示するClockコンポーネントを作成してください。new Date().toLocaleTimeString('ja-JP')で時刻文字列を取得できます。",
     code:"function Clock() {\n  // 現在の時刻を表示するコンポーネント\n}",
     answer:"function Clock() {\n  const time = new Date().toLocaleTimeString('ja-JP');\n  return (\n    <div>\n      <p>現在の時刻: {time}</p>\n    </div>\n  );\n}"}
  ],
  ch2: [
    {diff:1, q:"Buttonコンポーネントを作り、クリック時にアラートを表示してください。",
     code:"function Button() {\n  // クリックでアラート\n}",
     answer:"function Button() {\n  return (\n    <button onClick={() => alert('クリックされました')}>\n      押す\n    </button>\n  );\n}"},
    {diff:1, q:"Profileコンポーネントを作成し、name（文字列）とage（数値）のpropsを受け取って表示してください。デフォルトのageは20とします。",
     code:"function Profile(/* propsを受け取る */) {\n  // nameとageを表示\n}",
     answer:"function Profile({ name, age = 20 }) {\n  return (\n    <div>\n      <h3>{name}</h3>\n      <p>年齢: {age}歳</p>\n    </div>\n  );\n}\n// <Profile name=\"太郎\" /> → 年齢: 20歳（デフォルト値）\n// <Profile name=\"花子\" age={25} /> → 年齢: 25歳"},
    {diff:2, q:"childrenプロップを使って、Cardコンポーネントの中身を外から渡せるようにしてください。",
     code:"function Card(props) {\n  return <div className=\"card\">{/* children */}</div>;\n}",
     answer:"function Card(props) {\n  return <div className=\"card\">{props.children}</div>;\n}\n// <Card><p>内容</p></Card> で使用"},
    {diff:2, q:"ボタンをクリックすると、クリックされた回数がアラートで表示されるコンポーネントを作ってください。（ヒント: この段階ではletで変数を使いますが、次章でuseStateに置き換えます）",
     code:"function ClickCounter() {\n  // クリック回数を管理して表示\n}",
     answer:"function ClickCounter() {\n  let count = 0; // 注意: この方法ではUIは更新されない\n  function handleClick() {\n    count += 1;\n    alert('クリック回数: ' + count);\n  }\n  return <button onClick={handleClick}>クリック: {count}</button>;\n}\n// 表示は0のままだがalertは正しくカウントされる\n// → これがuseState（次章）が必要な理由"}
  ],
  ch3: [
    {diff:1, q:"useStateを使い、ボタンを押すたびにカウントが1増えるカウンターを作ってください。",
     code:"function Counter() {\n  // stateを定義して+1ボタンを返す\n}",
     answer:"function Counter() {\n  const [count, setCount] = useState(0);\n  return (\n    <div>\n      <p>{count}</p>\n      <button onClick={() => setCount(count + 1)}>+1</button>\n    </div>\n  );\n}"},
    {diff:1, q:"テキスト入力フォームを作り、入力値をリアルタイムで<p>タグに表示してください。",
     code:"function TextForm() {\n  // inputの値をstateで管理\n}",
     answer:"function TextForm() {\n  const [value, setValue] = useState('');\n  return (\n    <div>\n      <input value={value} onChange={e => setValue(e.target.value)} />\n      <p>{value}</p>\n    </div>\n  );\n}"},
    {diff:2, q:"true/falseを切り替えるトグルボタンを作ってください。ONのときは緑、OFFのときは赤で表示してください。",
     code:"function Toggle() {\n  // booleanのstateで切り替え\n}",
     answer:"function Toggle() {\n  const [isOn, setIsOn] = useState(false);\n  return (\n    <button\n      onClick={() => setIsOn(prev => !prev)}\n      style={{\n        background: isOn ? '#22c55e' : '#ef4444',\n        color: '#fff',\n        padding: '8px 16px',\n        border: 'none',\n        borderRadius: 4\n      }}>\n      {isOn ? 'ON' : 'OFF'}\n    </button>\n  );\n}"},
    {diff:2, q:"名前とメールアドレスの2フィールドを持つフォームを制御コンポーネントで作り、両方入力済みのときだけ送信ボタンを有効にしてください。",
     code:"function ContactForm() {\n  // オブジェクトのstateで複数フィールドを管理\n}",
     answer:"function ContactForm() {\n  const [form, setForm] = useState({ name: '', email: '' });\n  const update = e =>\n    setForm(prev => ({ ...prev, [e.target.name]: e.target.value }));\n  const valid = form.name.length > 0 && form.email.includes('@');\n  return (\n    <form onSubmit={e => { e.preventDefault(); alert(JSON.stringify(form)); }}>\n      <input name=\"name\" value={form.name} onChange={update}\n        placeholder=\"名前\" />\n      <input name=\"email\" value={form.email} onChange={update}\n        placeholder=\"メール\" />\n      <button disabled={!valid} type=\"submit\">送信</button>\n    </form>\n  );\n}"}
  ],
  ch4: [
    {diff:1, q:"useEffectを使って、コンポーネントがマウントされたときだけconsole.logするコードを書いてください。",
     code:"function MyComponent() {\n  // マウント時だけログ\n  return <div>コンポーネント</div>;\n}",
     answer:"function MyComponent() {\n  React.useEffect(() => {\n    console.log('マウントされました');\n  }, []); // 空の依存配列 = マウント時のみ\n  return <div>コンポーネント</div>;\n}"},
    {diff:2, q:"useEffectでfetchし、https://jsonplaceholder.typicode.com/todos/1 からtitleを取得して表示してください。",
     code:"function Todo() {\n  const [title, setTitle] = useState('');\n  // useEffectでfetch\n  return <p>{title}</p>;\n}",
     answer:"function Todo() {\n  const [title, setTitle] = useState('');\n  React.useEffect(() => {\n    fetch('https://jsonplaceholder.typicode.com/todos/1')\n      .then(r => r.json())\n      .then(data => setTitle(data.title));\n  }, []);\n  return <p>{title}</p>;\n}"}
  ],
  ch5: [
    {diff:1, q:"createContextとuseContextを使い、テーマ（'light'/'dark'）をグローバルに共有するコードを書いてください。",
     code:"const ThemeContext = React.createContext('light');\nfunction App() { /* Providerで包む */ }\nfunction Child() { /* useContextで取得して表示 */ }",
     answer:"const ThemeContext = React.createContext('light');\nfunction App() {\n  return (\n    <ThemeContext.Provider value=\"dark\">\n      <Child />\n    </ThemeContext.Provider>\n  );\n}\nfunction Child() {\n  const theme = React.useContext(ThemeContext);\n  return <p>テーマ: {theme}</p>;\n}"},
    {diff:2, q:"useReducerを使って、increment/decrementアクションを持つカウンターを実装してください。",
     code:"function reducer(state, action) {\n  // increment / decrement\n}\nfunction Counter() { /* useReducer */ }",
     answer:"function reducer(state, action) {\n  switch (action.type) {\n    case 'increment': return { count: state.count + 1 };\n    case 'decrement': return { count: state.count - 1 };\n    default: return state;\n  }\n}\nfunction Counter() {\n  const [state, dispatch] = React.useReducer(reducer, { count: 0 });\n  return (\n    <div>\n      <button onClick={() => dispatch({type:'decrement'})}>-</button>\n      <span>{state.count}</span>\n      <button onClick={() => dispatch({type:'increment'})}>+</button>\n    </div>\n  );\n}"}
  ],
  ch6: [
    {diff:1, q:"React RouterのLinkコンポーネントを使って、/homeと/aboutへのナビゲーションを作ってください。",
     code:"// import { Link } from 'react-router-dom';\nfunction Nav() {\n  // /home と /about へのLink\n}",
     answer:"import { Link } from 'react-router-dom';\nfunction Nav() {\n  return (\n    <nav>\n      <Link to=\"/home\">ホーム</Link>\n      <Link to=\"/about\">アバウト</Link>\n    </nav>\n  );\n}"},
    {diff:2, q:"useParamsを使って、/users/:idのidパラメータをURLから取得して表示してください。",
     code:"// import { useParams } from 'react-router-dom';\nfunction UserPage() {\n  // idを取得して表示\n}",
     answer:"import { useParams } from 'react-router-dom';\nfunction UserPage() {\n  const { id } = useParams();\n  return <p>ユーザーID: {id}</p>;\n}"}
  ],
  ch7: [
    {diff:1, q:"カスタムフック useCounter を作り、count・increment・resetを返してください。",
     code:"function useCounter(initial = 0) {\n  // count, increment, reset を返す\n}",
     answer:"function useCounter(initial = 0) {\n  const [count, setCount] = useState(initial);\n  const increment = () => setCount(c => c + 1);\n  const reset = () => setCount(initial);\n  return { count, increment, reset };\n}"},
    {diff:2, q:"Presentationalコンポーネント（UserCardView）とContainerコンポーネント（UserCardContainer）を分離して実装してください。",
     code:"function UserCardView({ name, email }) { /* 表示だけ */ }\nfunction UserCardContainer({ userId }) { /* データ取得 */ }",
     answer:"function UserCardView({ name, email }) {\n  return <div><b>{name}</b><p>{email}</p></div>;\n}\nfunction UserCardContainer({ userId }) {\n  const [user, setUser] = useState(null);\n  React.useEffect(() => {\n    fetch(`/api/users/\${userId}`)\n      .then(r => r.json()).then(setUser);\n  }, [userId]);\n  if (!user) return <p>Loading...</p>;\n  return <UserCardView name={user.name} email={user.email} />;\n}"}
  ],
  ch8: [
    {diff:1, q:"React.memoを使って、propsが変わらない限り再レンダリングしないコンポーネントを作ってください。",
     code:"// React.memoでラップ\nfunction ExpensiveItem({ label }) {\n  return <li>{label}</li>;\n}",
     answer:"const ExpensiveItem = React.memo(function ExpensiveItem({ label }) {\n  console.log('レンダリング:', label);\n  return <li>{label}</li>;\n});\n// propsが同じなら再レンダリングされない"},
    {diff:2, q:"useCallbackを使って、子コンポーネントに渡すハンドラ関数をメモ化してください。",
     code:"function Parent() {\n  const [count, setCount] = useState(0);\n  const handleClick = /* useCallbackでメモ化 */;\n  return <Child onClick={handleClick} />;\n}",
     answer:"function Parent() {\n  const [count, setCount] = useState(0);\n  const handleClick = React.useCallback(() => {\n    setCount(c => c + 1);\n  }, []); // 依存なし: 関数は再生成されない\n  return <Child onClick={handleClick} />;\n}"}
  ],
};

const chapters = [
  {id:"ch1", num:1, title:"Reactとは何か・環境構築・はじめてのコンポーネント", est:"90分",
   goal:"Reactが何であるかを理解し、Viteで開発環境を構築し、JSXの構文ルールを把握して関数コンポーネントを自分で定義・使用できるようになる。",
   sections:[
     {title:"Reactとは何か — なぜFacebookが作ったのか", body:"Reactは、Facebook（現Meta）が2013年にオープンソースとして公開したJavaScriptのUIライブラリです。当時のFacebookは、ニュースフィード・チャット・通知など画面上の多くの要素がリアルタイムに更新される複雑なWebアプリを運用していました。従来のjQuery中心の開発では、DOMの手動操作が煩雑になり、UIの整合性を保つのが極めて困難でした。Reactはこの問題を「コンポーネント」と「仮想DOM」という2つの仕組みで解決しました。\n\nPython開発者にとって馴染みのある例で説明すると、FlaskやDjangoではサーバー側でHTMLを組み立ててブラウザに送ります。ブラウザはそのHTMLを表示するだけです。しかしReactでは、ブラウザ側（クライアント側）でJavaScriptがUIを動的に構築・更新します。つまり、サーバーはデータだけを返し、UIの構築はすべてブラウザ内のReactが担当します。これが「シングルページアプリケーション（SPA）」と呼ばれるアーキテクチャです。\n\nReactの「仮想DOM」とは、画面に表示されているHTML要素のコピーをメモリ上に保持する仕組みです。状態が変わったとき、Reactはまず仮想DOM上で差分を計算し、実際のDOMには変更があった部分だけを反映します。Pythonで例えると、辞書の差分を計算して変更があったキーだけを更新するようなものです。これにより、大量の要素があっても効率的にUIを更新できます。"},
     {title:"コンポーネント指向のUI設計とは", body:"Reactの最も重要な概念は「コンポーネント」です。コンポーネントとは、UIを構成する再利用可能な部品のことです。Webページ全体を1つの大きなHTMLで書くのではなく、ヘッダー・サイドバー・ボタン・カードなどの小さな部品に分割し、それらを組み合わせてページを構築します。\n\nPythonのTkinterで例えると、Button、Label、Frameなどのウィジェットを組み合わせてGUIを構築するのに似ています。ただしReactのコンポーネントは見た目だけでなく、ロジック（クリック時の処理など）も一緒に持てるという点で、より強力です。Flaskのテンプレートで言えば、Jinja2のマクロやインクルードに近いですが、Reactのコンポーネントは自分自身の状態を持てるため、動的なUIの構築に適しています。\n\nコンポーネント指向の利点は3つあります。第一に「再利用性」です。一度作ったボタンコンポーネントをアプリ全体で何度でも使えます。第二に「保守性」です。バグが出たときに影響範囲が1つのコンポーネントに限定されます。第三に「分業」です。チーム開発で異なるメンバーが異なるコンポーネントを同時に開発できます。"},
     {title:"開発環境の構築 — Viteを使ったプロジェクト作成", body:"Reactの開発環境を構築するには、まずNode.jsが必要です。Node.jsはブラウザの外でJavaScriptを実行するための環境で、Pythonの処理系に相当します。Node.jsにはnpmというパッケージマネージャが付属しており、これはPythonのpipに相当します。Node.jsの公式サイト（nodejs.org）からLTS版をインストールしてください。\n\nプロジェクトの作成にはVite（ヴィート）というビルドツールを使います。以前はcreate-react-appが主流でしたが、現在は速度と柔軟性に優れるViteが推奨されています。ターミナルで以下のコマンドを実行するだけで、Reactプロジェクトの雛形が自動生成されます。Pythonでいえば、`django-admin startproject` や `flask init` に相当する操作です。\n\n生成されたプロジェクトにはいくつかの重要なファイルがあります。`package.json`はPythonの`requirements.txt`に相当し、依存パッケージを管理します。`src/main.jsx`がアプリのエントリーポイントで、`src/App.jsx`がメインのコンポーネントです。`index.html`はReactアプリが挿入される骨格のHTMLファイルです。",
      code:"# ターミナルで実行するコマンド\n# 1. Node.jsがインストール済みか確認\nnode --version    # v18以上を推奨\nnpm --version     # npmのバージョン確認\n\n# 2. Viteでプロジェクトを作成\nnpm create vite@latest my-react-app -- --template react\n\n# 3. プロジェクトに移動して依存パッケージをインストール\ncd my-react-app\nnpm install       # pip install -r requirements.txt に相当\n\n# 4. 開発サーバーを起動\nnpm run dev       # python manage.py runserver に相当\n# → http://localhost:5173 で開発中のアプリが表示される",
      afterCode:"npm run devを実行すると開発サーバーが起動し、ファイルを保存するたびにブラウザが自動的に更新されます（ホットリロード）。Pythonのflask run --debugの自動リロード機能と同じ感覚で開発できます。Ctrl+Cでサーバーを停止できます。"},
     {title:"プロジェクト構造の理解", body:"Viteで生成されたプロジェクトのディレクトリ構造を理解しましょう。Pythonプロジェクトと対比しながら説明します。`node_modules/`フォルダはPythonの仮想環境（venv）内のsite-packagesに相当し、インストールされた全パッケージが格納されます。このフォルダは非常に大きくなるため、`.gitignore`に含めてGitにはコミットしません。\n\n`src/`フォルダがアプリケーションのソースコードを置く場所です。Pythonプロジェクトで`app/`や`src/`ディレクトリにコードを置くのと同じです。`src/main.jsx`はエントリーポイントで、Pythonの`if __name__ == '__main__':`に相当します。このファイルでReactアプリをHTMLのDOM要素にマウント（接続）します。\n\n`src/App.jsx`がアプリのルートコンポーネントです。ここから他のコンポーネントを読み込んで組み合わせていきます。`.jsx`拡張子はJSXを含むJavaScriptファイルを意味します。`public/`フォルダには画像やアイコンなど、ビルド時にそのままコピーされる静的ファイルを置きます。Djangoの`static/`ディレクトリに相当します。",
      code:"// プロジェクト構造（Viteで生成）\n//\n// my-react-app/\n// ├── node_modules/      ← 依存パッケージ（venvのsite-packages相当）\n// ├── public/            ← 静的ファイル（Djangoのstatic/相当）\n// │   └── vite.svg\n// ├── src/               ← ソースコード本体\n// │   ├── main.jsx       ← エントリーポイント（if __name__相当）\n// │   ├── App.jsx        ← ルートコンポーネント\n// │   ├── App.css        ← スタイル\n// │   └── index.css      ← グローバルスタイル\n// ├── index.html         ← 骨格HTML（<div id=\"root\">がある）\n// ├── package.json       ← 依存管理（requirements.txt相当）\n// ├── vite.config.js     ← Vite設定\n// └── .gitignore\n\n// src/main.jsx の中身（エントリーポイント）\nimport React from 'react';\nimport ReactDOM from 'react-dom/client';\nimport App from './App';  // App.jsxをインポート\n\n// HTMLのid=\"root\"の要素にReactアプリを接続（マウント）\nReactDOM.createRoot(document.getElementById('root')).render(\n  <React.StrictMode>\n    <App />\n  </React.StrictMode>\n);",
      afterCode:"React.StrictModeは開発時に潜在的な問題を検出するためのラッパーです。本番環境では影響しません。Pythonの-Wオプション（警告表示）に近い役割です。import文はPythonのimportと同じ概念ですが、JavaScriptでは相対パスに./を付ける必要があります。"},
     {title:"JSXとは何か — JavaScriptの中にHTMLを書く", body:"JSXはJavaScript XMLの略で、JavaScriptの中にHTMLに似た構文を書けるようにするReactの記法です。見た目はHTMLそのものに見えますが、実際にはJavaScriptの構文拡張であり、ビルド時にReact.createElement()という関数呼び出しに自動変換されます。つまりJSXは「糖衣構文（シンタックスシュガー）」であり、HTMLとは別物です。\n\nPythonで例えると、Flaskで使うJinja2テンプレートに近い概念ですが、大きな違いがあります。Jinja2ではHTMLファイルの中にPythonの式を{% %}や{{ }}で埋め込みますが、JSXではJavaScriptファイルの中にHTMLライクな構文を直接書きます。つまりロジックとUIが同じファイルに共存するのです。これにより、エディタの補完・型チェック・リファクタリングがUIのコードにも適用でき、開発効率が大幅に向上します。\n\nJSXにはHTMLと異なるルールがいくつかあります。HTMLのclass属性はJavaScriptの予約語classと衝突するため、classNameと書きます。同様にfor属性はhtmlForになります。JavaScriptの式を埋め込むには{}（波括弧）で囲みます。そして、コンポーネントが返すJSXは必ず1つのルート要素で囲む必要があります。複数の要素を返したい場合は<div>で囲むか、空のタグ<>（フラグメント）を使います。",
      code:"// JSXの基本ルールを1つずつ確認\nfunction Hello() {\n  // JavaScriptの変数を宣言（Pythonのname = \"World\"と同じ）\n  const name = \"World\";\n  // 日付を取得（Pythonのdatetime.now()に相当）\n  const today = new Date().toLocaleDateString('ja-JP');\n\n  // return文でJSXを返す\n  // ルール1: classではなくclassNameを使う\n  // ルール2: {}の中にJavaScriptの式を書ける\n  // ルール3: 全体を1つの要素（ここでは<div>）で囲む\n  return (\n    <div className=\"greeting\">\n      <h1>Hello, {name}!</h1>\n      <p>今日は{today}です</p>\n      {/* ルール4: 条件付き表示は&&演算子で */}\n      {name === \"World\" && <small>Reactへようこそ</small>}\n      {/* ルール5: if-elseの代わりに三項演算子を使う */}\n      {name.length > 3 ? <p>長い名前ですね</p> : <p>短い名前ですね</p>}\n    </div>\n  );\n}\n\n// Pythonで同等のことをする場合（Flaskのテンプレート）:\n// <div class=\"greeting\">\n//   <h1>Hello, {{ name }}!</h1>\n//   {% if name == \"World\" %}<small>...</small>{% endif %}\n// </div>",
      afterCode:"JSX内の{}はPythonのf-stringの{}と同じ感覚で使えますが、文（if文やfor文）は書けず、式（値を返すもの）だけが書ける点に注意してください。条件分岐にはif文の代わりに三項演算子（条件 ? 真の値 : 偽の値）や&&演算子を使います。コメントは{/* コメント */}の形式です。"},
     {title:"はじめての関数コンポーネント — 1行ずつ理解する", body:"Reactのコンポーネントは「JSXを返す関数」です。Pythonの関数と同じくfunctionキーワードで定義しますが、1つだけ絶対のルールがあります。関数名は必ず大文字で始めなければなりません。Reactはタグ名が小文字（divやpなど）ならHTML要素として、大文字（AppやButtonなど）ならコンポーネントとして処理します。\n\n現代のReactでは「関数コンポーネント」が主流で、古い「クラスコンポーネント」はほぼ使われません。Pythonに例えると、以前はclassを使って定義していたものが、関数（def）で定義するスタイルに変わったようなものです。関数コンポーネントはシンプルで理解しやすく、後で学ぶ「フック」という機能と相性が良いため、React公式も関数コンポーネントを推奨しています。\n\nコンポーネントを使うときは、HTMLタグのように<コンポーネント名 />と書きます。同じコンポーネントを何度使っても、それぞれが独立して動作します。Pythonの関数を何度呼んでもそれぞれの呼び出しが独立しているのと同じです。これがコンポーネントの「再利用性」の本質です。",
      code:"// 関数コンポーネントの定義 — 1行ずつ解説\n\n// function: コンポーネント（=関数）を定義するキーワード\n// Greeting: コンポーネント名。必ず大文字で始める\n// (): 引数（後の章で「props」として学びます）\nfunction Greeting() {\n  // return: このコンポーネントが画面に表示するJSXを返す\n  // Pythonのreturnと同じだが、JSXを返す\n  return (\n    // 1つのルート要素で囲む（ここでは<div>）\n    <div>\n      <h1>こんにちは、React！</h1>\n      <p>これは私の最初のコンポーネントです。</p>\n    </div>\n  );\n}\n\n// Pythonで例えると:\n// def greeting():\n//     return \"<div><h1>こんにちは</h1></div>\"\n\n// コンポーネントの使い方 — HTMLタグのように書く\nfunction App() {\n  return (\n    <div>\n      {/* Greetingコンポーネントを3回使う */}\n      {/* それぞれが独立した「部品」として動作する */}\n      <Greeting />\n      <Greeting />\n      <Greeting />\n    </div>\n  );\n}\n\n// exportでファイル外から使えるようにする\n// Pythonでモジュールの関数を公開するのと同じ考え方\nexport default App;",
      afterCode:"export defaultはPythonの__all__に近い概念で、このファイルからインポートされるデフォルトのコンポーネントを指定します。別ファイルからimport App from './App'のように読み込めます。<Greeting />の最後の/は自己閉じタグを意味し、中身を持たないコンポーネントに使います。"},
     {title:"コンポーネントにデータを渡す準備 — style属性とJSXの式", body:"コンポーネントを使いこなすために、JSXのstyle属性の書き方を理解しておきましょう。HTMLではstyle=\"background-color: red\"のように文字列で書きますが、JSXではstyle={{ backgroundColor: 'red' }}のようにJavaScriptオブジェクトで書きます。二重の波括弧は、外側がJSXの式埋め込み{}、内側がJavaScriptのオブジェクトリテラル{}です。\n\nCSSプロパティ名はキャメルケース（camelCase）に変換します。background-colorはbackgroundColor、font-sizeはfontSizeになります。Pythonでは辞書のキーにハイフンを含められますが（{'background-color': 'red'}）、JavaScriptのオブジェクトではハイフンが引き算演算子と解釈されるため、キャメルケースを使います。数値はピクセル（px）が自動で付きます。\n\nReactでは、コンポーネントをファイルごとに分割してexport/importで管理するのが一般的です。これはPythonのモジュールシステムと同じ考え方です。ただしPythonがファイル（モジュール）単位で管理するのに対し、Reactではコンポーネント単位で設計を考えます。1ファイルに複数の小さなコンポーネントを書くこともあります。",
      code:"// コンポーネントにスタイルを適用する例\nfunction Badge({ label, color }) {\n  // styleはオブジェクトで指定する\n  // Pythonの辞書 {'background': color} に相当\n  return (\n    <span style={{\n      background: color,       // 背景色\n      color: '#fff',           // 文字色\n      padding: '2px 8px',      // 内側の余白（文字列で単位つき）\n      borderRadius: 4,         // 角丸（数値 → 自動で4pxになる）\n      fontSize: 12             // 文字サイズ（12px）\n    }}>\n      {label}\n    </span>\n  );\n}\n\n// 同じBadgeコンポーネントを異なるデータで3回使う\n// Pythonで print_badge(\"React\", \"#61dafb\") を3回呼ぶのと同じ\nfunction App() {\n  return (\n    <div>\n      <Badge label=\"React\" color=\"#61dafb\" />\n      <Badge label=\"JSX\" color=\"#f0db4f\" />\n      <Badge label=\"JavaScript\" color=\"#f7df1e\" />\n    </div>\n  );\n}",
      afterCode:"Badgeコンポーネントの引数{ label, color }は次の章で学ぶ「props」の分割代入です。ここではlabelとcolorという2つのデータを外から受け取って表示しています。同じコンポーネントに異なるデータを渡すことで、見た目は統一しつつ中身を変えられます。これがコンポーネントの「再利用性」です。"}
   ]},
  {id:"ch2", num:2, title:"Props・イベント処理", est:"75分",
   goal:"propsを通じてコンポーネントにデータを渡す方法を完全に理解し、onClickなどのイベントハンドラを設定してインタラクティブなUIを作れるようになる。",
   sections:[
     {title:"Propsとは何か — コンポーネントへのデータの渡し方", body:"PropsはPropertiesの略で、コンポーネントに外からデータを渡す仕組みです。Pythonの関数引数と全く同じ概念です。Pythonでdef greet(name):と書いてname引数を受け取るように、Reactのコンポーネントでもfunction Greeting({ name })と書いてnameを受け取ります。ただしReactでは、すべてのpropsが1つのオブジェクトとしてまとめて渡され、分割代入で取り出すのが慣習です。\n\nPropsを渡す側（親コンポーネント）は、HTMLの属性のようにkey=valueの形式でデータを指定します。文字列は\"...\"で、数値やオブジェクトなどJavaScriptの式は{...}で渡します。例えば<Greeting name=\"太郎\" age={20} />のように書きます。Pythonでgreet(name=\"太郎\", age=20)と呼ぶのと同じ感覚です。\n\npropsの最も重要なルールは「読み取り専用」であることです。コンポーネントは受け取ったpropsを絶対に変更してはいけません。Pythonで関数が引数を直接変更するのが推奨されないのと同じ理由で、データの流れを予測可能に保つためです。もしUIを変化させたいなら、次の章で学ぶ「state（状態）」を使います。",
      code:"// Propsの基本 — Pythonの関数引数と比較\n\n// Python: def greeting(name, age):\n//             print(f\"こんにちは、{name}さん（{age}歳）\")\n\n// React: 引数はオブジェクトとして受け取り、分割代入で展開する\nfunction Greeting({ name, age }) {\n  return (\n    <div>\n      <h2>こんにちは、{name}さん！</h2>\n      <p>年齢: {age}歳</p>\n    </div>\n  );\n}\n\n// Propsを渡す側（親コンポーネント）\nfunction App() {\n  // Python: greeting(name=\"太郎\", age=20) に相当\n  return (\n    <div>\n      <Greeting name=\"太郎\" age={20} />\n      <Greeting name=\"花子\" age={25} />\n      {/* 同じコンポーネントに異なるデータを渡す */}\n    </div>\n  );\n}\n\n// 分割代入を使わない書き方も可能（propsオブジェクトを直接使用）\nfunction Greeting2(props) {\n  return <p>{props.name}さん、{props.age}歳</p>;\n}",
      afterCode:"分割代入とは{ name, age }のようにオブジェクトからプロパティを取り出す構文で、Pythonにはない機能です。props.nameと書く代わりに、引数部分で展開して直接nameとして使えるようにするショートカットです。"},
     {title:"単方向データフローとデフォルト値", body:"Reactには「単方向データフロー（One-Way Data Flow）」という設計原則があります。データは必ず親コンポーネントから子コンポーネントへ、一方向にだけ流れます。子は親のデータを直接変更できません。Pythonで例えると、関数がグローバル変数を直接書き換えるのではなく、戻り値で結果を返すのが良い設計とされるのと同じ発想です。\n\nこの仕組みのおかげで、データがどこで変更されたかを追跡しやすくなります。バグが発生したときに「このデータは誰が変更したのか？」を調べるのが容易です。双方向バインディング（Vue.jsのv-model等）と比べるとコード量はやや増えますが、大規模アプリでの保守性が圧倒的に高くなります。\n\npropsにはデフォルト値を設定できます。Pythonのdef func(x=10):と同じように、function Component({ color = 'blue' })と書きます。親がそのpropを渡さなかった場合にデフォルト値が使われます。また、propsには文字列・数値・配列・オブジェクト・関数など、あらゆるJavaScriptの値を渡せます。関数を渡すパターンは、イベント処理で頻繁に使います。",
      code:"// デフォルト値の設定\n// Python: def alert_box(message, level=\"info\"):\nfunction AlertBox({ message, level = \"info\" }) {\n  // levelに応じて色を変える\n  const colors = {\n    info: { bg: '#dbeafe', border: '#3b82f6', text: '#1e40af' },\n    warning: { bg: '#fef3c7', border: '#f59e0b', text: '#92400e' },\n    error: { bg: '#fee2e2', border: '#ef4444', text: '#991b1b' }\n  };\n  const c = colors[level] || colors.info;\n\n  return (\n    <div style={{\n      background: c.bg,\n      border: '1px solid ' + c.border,\n      color: c.text,\n      padding: '12px 16px',\n      borderRadius: 8,\n      marginBottom: 8\n    }}>\n      <strong>{level.toUpperCase()}</strong>: {message}\n    </div>\n  );\n}\n\nfunction App() {\n  return (\n    <div>\n      <AlertBox message=\"情報メッセージです\" />\n      {/* levelを省略 → デフォルトの\"info\"が使われる */}\n      <AlertBox message=\"注意してください\" level=\"warning\" />\n      <AlertBox message=\"エラーが発生しました\" level=\"error\" />\n    </div>\n  );\n}",
      afterCode:"Pythonの辞書dict.get(key, default)と同じように、propsのデフォルト値は「渡されなかった場合の安全策」です。TypeScriptを導入すれば、propsの型を厳密に定義でき、間違ったデータ型を渡したときにエディタが警告してくれます。"},
     {title:"childrenプロップ — コンポーネントの中身を外から渡す", body:"Reactにはchildrenという特殊なpropがあります。コンポーネントのJSXタグを開きタグ・閉じタグの形式で書いたとき、その間に書いた要素が自動的にchildrenプロップとして渡されます。Pythonのコンテキストマネージャー（withブロック）やHTMLの<div>...</div>の中身を受け取る仕組みと考えてください。\n\nchildrenを使うと、「レイアウトを提供するコンポーネント」と「中身のコンテンツ」を分離できます。例えば、カードの枠線・影・パディングだけを定義するCardコンポーネントを作り、中身は使う側が自由に決められます。これはPythonのデコレータに似た発想で、共通の処理（見た目）を外側に、個別の処理（中身）を内側に分離します。\n\nchildrenには文字列・JSX要素・複数の要素など、何でも渡せます。Reactのコンポーネント設計では、childrenを活用することで柔軟で再利用性の高い「ラッパーコンポーネント」を作れます。UIライブラリ（Material-UI、Chakra UIなど）のコンポーネントは、ほぼすべてがchildrenを受け取る設計になっています。",
      code:"// childrenを使ったカードコンポーネント\nfunction Card({ title, children, variant = 'default' }) {\n  const bg = variant === 'primary' ? '#eef2ff' : '#f9fafb';\n  const border = variant === 'primary' ? '#6366f1' : '#e5e7eb';\n  return (\n    <div style={{\n      background: bg, padding: 16, borderRadius: 8,\n      border: '1px solid ' + border, marginBottom: 12\n    }}>\n      <h3 style={{ marginBottom: 8 }}>{title}</h3>\n      {/* children: タグの間に書かれた要素がここに入る */}\n      <div>{children}</div>\n    </div>\n  );\n}\n\nfunction App() {\n  return (\n    <div>\n      {/* Cardタグの間に書いた内容がchildrenになる */}\n      <Card title=\"ようこそ\" variant=\"primary\">\n        <p>Reactの世界へ！</p>\n        <p>childrenで中身を自由に変えられます。</p>\n      </Card>\n      <Card title=\"注意事項\">\n        <ul>\n          <li>propsは読み取り専用です</li>\n          <li>データは親から子へ流れます</li>\n        </ul>\n      </Card>\n    </div>\n  );\n}",
      afterCode:"childrenは通常のpropと同じで、{ children }として分割代入で取り出します。自己閉じタグ<Card />ではchildrenはundefined（渡されない）になります。childrenの有無で表示を切り替えたい場合は、{children && <div>{children}</div>}のように書きます。"},
     {title:"イベントハンドラの基本 — ユーザー操作に反応する", body:"Reactのイベント処理は、Pythonのイベント駆動プログラミングと同じ概念です。TkinterでButton(command=my_function)とコールバック関数を渡すように、Reactでも<button onClick={myFunction}>のように関数を渡します。HTMLのonclick=\"...\"とは異なり、文字列ではなくJavaScriptの関数参照を渡す点が重要です。\n\nイベント名はキャメルケースで書きます。HTMLのonclickはReactではonClick、onchangeはonChange、onsubmitはonSubmitになります。これはJavaScriptの命名規則に合わせたものです。Pythonはスネークケース（on_click）を使いますが、JavaScriptの文化ではキャメルケースが標準です。\n\nイベントハンドラには2つの書き方があります。1つ目はコンポーネント内に関数を定義してその名前を渡す方法、2つ目はJSX内にアロー関数（=>）を直接書く方法です。アロー関数はPythonのlambda式に似ていますが、複数行のコードも書ける点が異なります。シンプルな処理ならアロー関数、複雑な処理なら名前付き関数を使い分けるのが良いでしょう。",
      code:"// イベントハンドラの2つの書き方\nfunction EventDemo() {\n  // 方法1: 名前付き関数を定義して渡す（複雑な処理向き）\n  // Python: def handle_click(): のようなもの\n  function handleClick() {\n    alert('ボタンがクリックされました！');\n  }\n\n  // 方法2: アロー関数を直接書く（シンプルな処理向き）\n  // Python: lambda: print(\"clicked\") に近い\n  return (\n    <div>\n      {/* 名前付き関数を渡す — ()は付けない！ */}\n      <button onClick={handleClick}>方法1: 名前付き関数</button>\n\n      {/* アロー関数を直接書く */}\n      <button onClick={() => alert('アロー関数！')}>方法2: アロー関数</button>\n\n      {/* よくある間違い: ()を付けると即座に実行されてしまう */}\n      {/* NG: onClick={handleClick()} ← レンダリング時に実行される */}\n      {/* OK: onClick={handleClick}   ← クリック時に実行される */}\n    </div>\n  );\n}",
      afterCode:"onClick={handleClick}とonClick={handleClick()}の違いは重要です。前者は「関数への参照を渡す」で正しく、後者は「関数を即座に実行してその戻り値を渡す」で意図と異なります。Pythonでbutton.config(command=func)とbutton.config(command=func())の違いと同じです。"},
     {title:"イベントオブジェクトとフォームの送信処理", body:"イベントハンドラの関数には、自動的にイベントオブジェクト（通常eまたはeventと命名）が引数として渡されます。これはTkinterやPygameのeventオブジェクトと同じ概念で、「何が起きたか」の詳細情報を含んでいます。input要素の値はe.target.valueで取得でき、フォーム要素の各フィールドにはe.target.フィールド名.valueでアクセスできます。\n\nReactのイベントオブジェクトは「合成イベント（SyntheticEvent）」と呼ばれ、ブラウザ間の差異を吸収するラッパーです。IE、Chrome、Firefox等で異なるイベントAPIを統一してくれるため、開発者はブラウザの違いを気にせずコードが書けます。Pythonで言えば、osモジュールがOS間の違いを吸収するのと同じ役割です。\n\nフォームの送信処理ではe.preventDefault()が必須です。HTMLのフォームはデフォルトでsubmit時にページ全体をリロードしますが、React（SPA）ではページリロードを防ぎ、JavaScript側で送信処理を行います。FlaskやDjangoではサーバーがフォーム送信を処理しますが、ReactではクライアントサイドのJavaScriptが処理し、必要に応じてAPIにデータを送ります。",
      code:"// フォーム送信の処理 — Flaskのroute処理と比較\n// Flask: @app.route('/login', methods=['POST'])\n//        def login(): username = request.form['username']\n\nfunction LoginForm() {\n  // handleSubmitはフォーム送信時に呼ばれる関数\n  // Pythonのdef handle_submit(event):に相当\n  function handleSubmit(e) {\n    e.preventDefault(); // ページリロードを防ぐ（SPA必須）\n    // e.target はフォーム要素自体\n    const form = e.target;\n    // name属性で各フィールドにアクセス\n    const username = form.username.value;\n    const password = form.password.value;\n    alert('ユーザー名: ' + username);\n    // 実際のアプリでは、ここでAPIにfetchでデータを送信する\n  }\n\n  return (\n    <form onSubmit={handleSubmit}>\n      <div style={{ marginBottom: 8 }}>\n        <input\n          name=\"username\"\n          placeholder=\"ユーザー名\"\n          style={{ padding: '4px 8px' }}\n        />\n      </div>\n      <div style={{ marginBottom: 8 }}>\n        <input\n          name=\"password\"\n          type=\"password\"\n          placeholder=\"パスワード\"\n          style={{ padding: '4px 8px' }}\n        />\n      </div>\n      <button type=\"submit\">ログイン</button>\n    </form>\n  );\n}",
      afterCode:"type=\"submit\"のボタンをクリックするか、フォーム内でEnterキーを押すとonSubmitイベントが発火します。e.preventDefault()を書き忘れるとページがリロードされ、Reactの状態がすべてリセットされてしまいます。次の章ではstateを使って、入力値をReactで完全に管理する「制御コンポーネント」パターンを学びます。"}
   ]},
  {id:"ch3", num:3, title:"useState・状態管理・フォーム", est:"90分",
   goal:"useStateフックの仕組みを完全に理解し、コンポーネントのローカル状態を管理できる。制御コンポーネントパターンを使ったフォームを実装できる。",
   sections:[
     {title:"なぜ「状態（State）」が必要なのか", body:"前章の最後の演習で、let count = 0としてクリック回数を管理しようとしましたが、UIの表示が更新されない問題に気づいたはずです。これはReactの根本的な仕組みに関係しています。Reactのコンポーネントは「関数」であり、UIを更新するには関数を再度呼び出す（=再レンダリングする）必要があります。普通の変数（letやconst）は、再レンダリングのたびに初期値にリセットされてしまいます。\n\nPythonで例えると、def counter():という関数の中にcount = 0と書いた場合、関数を呼ぶたびにcountは0に戻ります。関数呼び出しをまたいで値を保持するには、Pythonではグローバル変数やクラスのインスタンス変数（self.count）を使います。Reactではこの目的のために「State（状態）」という専用の仕組みが用意されています。\n\nStateはReactが内部で管理する特別な変数です。Stateの値が変わると、Reactは自動的にコンポーネントを再レンダリングし、画面に最新の値を反映します。つまりStateは「変数の値を変える + 画面を更新する」という2つの処理をセットで行ってくれるのです。これがReactのリアクティブ（反応的）な性質であり、ライブラリ名の由来です。",
      code:"// 普通の変数では画面が更新されない例\nfunction BrokenCounter() {\n  let count = 0; // 再レンダリングのたびに0にリセットされる\n  return (\n    <div>\n      <p>カウント: {count}</p>\n      {/* ボタンを押してもcountは増えるが画面は変わらない */}\n      <button onClick={() => { count += 1; console.log(count); }}>\n        +1（壊れている）\n      </button>\n    </div>\n  );\n}\n\n// Python で例えると:\n// def broken_counter():\n//     count = 0       # 呼ぶたびに0にリセット\n//     count += 1\n//     return count    # 常に1を返す\n//\n// class WorkingCounter:   # クラスならインスタンス変数で保持\n//     def __init__(self):\n//         self.count = 0\n//     def increment(self):\n//         self.count += 1  # 呼び出しをまたいで保持される",
      afterCode:"console.log(count)でブラウザの開発者ツール（F12で開ける）のConsoleタブを見ると、値は増えていることが確認できます。しかしReactは変数の変更を検知できないため、画面の再描画は行われません。この問題を解決するのが次に学ぶuseStateです。"},
     {title:"useStateフックの基礎 — 宣言・取得・更新", body:"useStateはReactの「フック（Hook）」の中で最も基本的で最も重要なものです。フックとは、関数コンポーネントに状態やライフサイクル機能を追加するための特殊な関数で、名前が必ずuseで始まります。Pythonにはフックに直接対応する概念はありませんが、デコレータが関数に追加機能を与えるのと似た発想です。\n\nuseState(初期値)を呼ぶと、[現在の値, 更新関数]という2要素の配列が返されます。これをconst [count, setCount] = useState(0)のように分割代入で受け取ります。countが現在の値、setCountが値を更新する関数です。setCount(新しい値)を呼ぶと、Reactはcountの値を更新し、コンポーネントを自動的に再レンダリングします。\n\n重要なルールとして、stateの更新は直接代入ではなく、必ず更新関数（setCountなど）を通して行います。count = 5のように直接代入してもReactは変更を検知できず、画面は更新されません。Pythonのプロパティ（@property）のsetterに似た仕組みで、「値を変更する」と「画面を更新する」が連動しています。",
      code:"// useStateの基本的な使い方\nfunction Counter() {\n  // useState(0) → 初期値0でstateを作成\n  // count: 現在の値（最初は0）\n  // setCount: 値を更新する関数\n  // Python: self.count = 0 に相当\n  const [count, setCount] = useState(0);\n\n  return (\n    <div style={{ textAlign: 'center', padding: 20 }}>\n      <p style={{ fontSize: 48 }}>{count}</p>\n      {/* setCount(新しい値) で更新 → 自動的に画面も更新される */}\n      <button onClick={() => setCount(count + 1)}>+1</button>\n      <button onClick={() => setCount(count - 1)}>-1</button>\n      <button onClick={() => setCount(0)}>リセット</button>\n    </div>\n  );\n}\n\n// 複数のstateを持つことも可能\nfunction UserForm() {\n  const [name, setName] = useState('');     // 文字列のstate\n  const [age, setAge] = useState(0);        // 数値のstate\n  const [isAdmin, setIsAdmin] = useState(false); // 真偽値のstate\n  // それぞれが独立したstateとして管理される\n  return <p>{name} ({age}歳)</p>;\n}",
      afterCode:"useStateは1つのコンポーネント内で何度でも呼べます。それぞれのuseStateは独立したstateを管理します。命名規則として、stateの名前がfooなら更新関数はsetFooとするのが慣習です。"},
     {title:"stateの更新と関数形式 — 非同期更新を安全に行う", body:"stateの更新には「値を直接渡す方法」と「関数を渡す方法」の2種類があります。setCount(count + 1)は値を直接渡す方法で、setCount(c => c + 1)は関数を渡す方法です。前者は「今のcountの値に1を加える」、後者は「前の値（c）を受け取って1を加える」という意味です。\n\nなぜ関数形式が必要なのでしょうか。Reactのstate更新は非同期です。setCountを呼んでも、その場でcountの値が変わるわけではありません。1つのイベントハンドラ内でsetCountを2回呼んでも、countは古い値のままなので、期待通りに動きません。Pythonでcount += 1を2回書けば確実に2増えますが、ReactではsetCount(count + 1)を2回書いても1しか増えません。関数形式のsetCount(c => c + 1)を使えば、確実に前の値に基づいた更新ができます。\n\nオブジェクトや配列のstateを更新するときは特に注意が必要です。Reactは変更を「参照の同一性」で検出します。つまり、オブジェクトの中身を変えただけでは新しいオブジェクトとは認識されません。必ずスプレッド構文（...）で新しいオブジェクトを作ってからsetStateに渡します。Pythonのcopy()やdeepcopy()でコピーを作ってから変更するのと同じ発想です。",
      code:"// state更新の注意点\nfunction UpdateDemo() {\n  const [count, setCount] = useState(0);\n  const [user, setUser] = useState({ name: '太郎', age: 20 });\n  const [items, setItems] = useState(['A', 'B', 'C']);\n\n  // NG: 値を直接渡す方式で2回呼んでも1しか増えない\n  function addTwiceBroken() {\n    setCount(count + 1); // count=0 → 0+1=1\n    setCount(count + 1); // count=まだ0 → 0+1=1（同じ結果）\n  }\n\n  // OK: 関数形式なら確実に2回増える\n  function addTwiceCorrect() {\n    setCount(c => c + 1); // 前の値(0) → 0+1=1\n    setCount(c => c + 1); // 前の値(1) → 1+1=2\n  }\n\n  // オブジェクトのstate更新 — スプレッド構文でコピーしてから変更\n  // Python: new_user = {**user, 'age': 21} に近い\n  function updateAge() {\n    setUser(prev => ({ ...prev, age: prev.age + 1 }));\n    // NG: user.age = 21; setUser(user); ← 同じ参照なので検知されない\n  }\n\n  // 配列のstate更新 — 新しい配列を作る\n  function addItem() {\n    setItems(prev => [...prev, 'D']); // Python: items + ['D'] に相当\n    // NG: items.push('D'); setItems(items); ← 同じ参照\n  }\n\n  return (\n    <div>\n      <p>カウント: {count}</p>\n      <button onClick={addTwiceCorrect}>+2（正しい方法）</button>\n      <p>{user.name} ({user.age}歳)</p>\n      <button onClick={updateAge}>年齢+1</button>\n    </div>\n  );\n}",
      afterCode:"Pythonではリストのappendやpopで元のリストを変更（ミュータブル操作）しますが、Reactでは元の配列を変更せず、新しい配列を作って渡す（イミュータブル操作）のが鉄則です。filter、map、スプレッド構文（[...array, newItem]）を使って新しい配列を生成しましょう。"},
     {title:"実践: 信号機コンポーネントでstateを体感する", body:"ここまで学んだuseStateの知識を使って、実際に動く信号機コンポーネントを作ってみましょう。ボタンを押すたびに赤→緑→黄→赤...と信号の色が切り替わります。stateとして現在の色を保持し、ボタンのonClickで次の色に更新します。\n\nこの例では、オブジェクトを使って「現在の色→次の色」のマッピングを定義しています。Pythonの辞書と全く同じ使い方です。また、setColor(c => next[c])は関数形式の更新で、「前の色（c）を受け取って、それに対応する次の色を返す」という処理です。\n\n注目してほしいのは、UIの描画ロジックがどれだけシンプルかという点です。colorというstateが変わると、Reactが自動的にコンポーネントを再実行し、新しい色に対応したJSXを返します。開発者は「現在のstateに基づいてUIを記述する」だけで、「前のUIをどう変更するか」を考える必要がありません。これがReactの宣言的UIの本質です。",
      code:"// 信号機コンポーネント — stateの実践例\nfunction TrafficLight() {\n  // state: 現在の信号の色（初期値は'red'）\n  const [color, setColor] = useState('red');\n\n  // 色の遷移マップ（Pythonの辞書と同じ）\n  const next = { red: 'green', green: 'yellow', yellow: 'red' };\n  // 色名から実際のCSSカラーへのマッピング\n  const colorMap = {\n    red: '#ef4444', green: '#22c55e', yellow: '#f59e0b'\n  };\n  // 日本語表示用\n  const nameMap = { red: '赤（止まれ）', green: '青（進め）', yellow: '黄（注意）' };\n\n  return (\n    <div style={{ textAlign: 'center', padding: 20 }}>\n      {/* 丸い信号灯 — colorが変わると自動的に色が変わる */}\n      <div style={{\n        width: 80, height: 80, borderRadius: '50%',\n        background: colorMap[color],\n        margin: '0 auto 16px',\n        boxShadow: '0 0 20px ' + colorMap[color],\n        transition: 'all 0.3s ease' // CSS transition で滑らかに変化\n      }} />\n      {/* ボタンを押すと色が遷移する */}\n      <button onClick={() => setColor(c => next[c])}\n        style={{ padding: '8px 24px', fontSize: 16 }}>\n        次の色へ\n      </button>\n      <p style={{ marginTop: 8, fontSize: 18 }}>現在: {nameMap[color]}</p>\n    </div>\n  );\n}",
      afterCode:"transition: 'all 0.3s ease' というCSS指定により、色の変化がアニメーション付きで滑らかに表示されます。CSSのtransitionプロパティは、要素のスタイルが変わったときにアニメーションを適用する仕組みで、Reactの状態変化と非常に相性が良いです。"},
     {title:"制御コンポーネント — Reactでフォームを管理する", body:"HTMLのフォーム要素（input、textarea、selectなど）は、もともと自分自身の内部状態を持っています。ユーザーがテキストを入力すると、input要素が内部でその値を管理します。しかしReactでは、フォームの値もstateで管理する「制御コンポーネント（Controlled Component）」パターンを使うのが標準です。\n\n制御コンポーネントでは、input要素のvalue属性にstateをバインドし、onChangeイベントでstateを更新します。つまり、ユーザーがキーを押す→onChangeが発火→setStateで値を更新→Reactが再レンダリング→inputのvalueが更新される、という流れです。Pythonで例えると、TkinterのStringVar()でEntry widgetの値を管理するのに似ています。\n\nこの一見回りくどいパターンの利点は、フォームの値をReact側で完全に制御できることです。入力値のリアルタイムバリデーション、入力文字数のカウント、特定の文字のフィルタリング、送信ボタンの有効/無効切り替えなど、あらゆるフォーム操作をJavaScriptで自在に実装できます。",
      code:"// 制御コンポーネントの基本パターン\n// Python(Tkinter)で例えると:\n//   var = tk.StringVar()\n//   entry = tk.Entry(root, textvariable=var)\n//   var.get()  → 値の取得\n//   var.set()  → 値の設定\n\nfunction TextInput() {\n  // state: 入力値を管理\n  const [text, setText] = useState('');\n\n  return (\n    <div>\n      <input\n        value={text}              // stateの値を表示\n        onChange={e => setText(e.target.value)} // 入力のたびにstate更新\n        placeholder=\"何か入力してください\"\n      />\n      {/* リアルタイムで入力値と文字数を表示 */}\n      <p>入力値: {text}</p>\n      <p>文字数: {text.length}</p>\n      {text.length > 10 && (\n        <p style={{ color: 'red' }}>10文字を超えています！</p>\n      )}\n    </div>\n  );\n}",
      afterCode:"e.target.valueはイベントが発生した要素（input）のvalueプロパティを取得します。Pythonのevent.widget.get()に相当します。onChangeはキーを押すたびに発火するので、リアルタイムの入力チェックが可能です。"},
     {title:"複数フィールドのフォーム管理", body:"複数のフィールドを持つフォームでは、各フィールドに個別のuseStateを用意する方法もありますが、フィールド数が多いとコードが煩雑になります。そこで、stateをオブジェクトにまとめ、1つの汎用的なonChangeハンドラで全フィールドを処理するパターンがよく使われます。\n\nこのパターンのポイントは、input要素のname属性とJavaScriptの「計算プロパティ名（Computed Property Name）」を組み合わせることです。[e.target.name]: e.target.valueと書くと、name属性の値をキーとしてオブジェクトを更新できます。PythonではPython 3.5以降の辞書のアンパック{**dict, key: value}に近い操作です。\n\nフォームのバリデーションも、stateから直接計算できます。validという変数で送信ボタンの有効/無効を制御し、ユーザーに即座にフィードバックを返します。Djangoのフォームバリデーション（form.is_valid()）がサーバー側で行われるのに対し、Reactの制御コンポーネントではクライアント側でリアルタイムにバリデーションできるのが大きな利点です。",
      code:"// 複数フィールドのフォーム管理\nfunction SignupForm() {\n  // フォーム全体をオブジェクトで管理\n  // Python: form = {'name': '', 'email': '', 'password': ''}\n  const [form, setForm] = useState({ name: '', email: '', password: '' });\n\n  // 汎用ハンドラ: name属性を使ってどのフィールドかを判定\n  const update = e =>\n    setForm(prev => ({\n      ...prev,                    // 既存のフィールドをコピー（Pythonの**prev）\n      [e.target.name]: e.target.value  // 変更されたフィールドだけ更新\n    }));\n\n  // バリデーション: stateから直接計算\n  const valid = form.name.length > 0\n    && form.email.includes('@')\n    && form.password.length >= 8;\n\n  return (\n    <form onSubmit={e => {\n      e.preventDefault();\n      alert(JSON.stringify(form, null, 2));\n    }}>\n      <div style={{ marginBottom: 8 }}>\n        <input name=\"name\" value={form.name} onChange={update}\n          placeholder=\"名前\" />\n        {form.name.length === 0 && <small style={{color:'red'}}> 必須</small>}\n      </div>\n      <div style={{ marginBottom: 8 }}>\n        <input name=\"email\" value={form.email} onChange={update}\n          placeholder=\"メール\" type=\"email\" />\n        {form.email && !form.email.includes('@') &&\n          <small style={{color:'red'}}> 有効なメールアドレスを入力</small>}\n      </div>\n      <div style={{ marginBottom: 8 }}>\n        <input name=\"password\" value={form.password} onChange={update}\n          placeholder=\"パスワード（8文字以上）\" type=\"password\" />\n        {form.password && form.password.length < 8 &&\n          <small style={{color:'red'}}> 8文字以上必要です</small>}\n      </div>\n      <button disabled={!valid} type=\"submit\"\n        style={{ opacity: valid ? 1 : 0.5 }}>\n        アカウント作成\n      </button>\n    </form>\n  );\n}",
      afterCode:"disabled={!valid}でボタンの有効/無効を制御し、opacity: valid ? 1 : 0.5で見た目も変えています。これにより、ユーザーは「何が不足しているか」をリアルタイムで把握でき、UX（ユーザー体験）が大幅に向上します。本番アプリでは、サーバー側のバリデーションも必ず併用してください。"}
   ]},
  {id:"ch4", num:4, title:"useEffect・副作用", est:"50分",
   goal:"useEffectで副作用（データフェッチ・タイマー・DOM操作）を管理し、クリーンアップ関数を正しく設定できる。",
   sections:[
     {title:"useEffectの依存配列とクリーンアップ", body:"useEffectはコンポーネントのレンダリング後に実行される副作用を管理するフックです。第2引数の依存配列が重要で、空配列[]ならマウント時のみ、省略すると毎レンダリング後、値を入れるとその値が変化したときに実行されます。\n\nPythonでいえばFlaskのafter_requestやDjangoのシグナルに近い概念ですが、Reactではコンポーネント単位でライフサイクルを管理します。依存配列を正しく設定しないと無限ループや古い値の参照（クロージャの問題）が起きます。\n\nuseEffectはクリーンアップ関数を返せます。コンポーネントのアンマウント時や次のエフェクト実行前に呼ばれます。タイマーのクリア、WebSocketの切断、購読の解除などに使います。クリーンアップを忘れるとメモリリークの原因になります。",
      code:"function Timer() {\n  const [seconds, setSeconds] = useState(0);\n\n  useEffect(() => {\n    const id = setInterval(() => {\n      setSeconds(s => s + 1); // 関数形式で安全に更新\n    }, 1000);\n\n    return () => clearInterval(id); // クリーンアップ\n  }, []); // マウント時に1回だけ開始\n\n  const fmt = s => `\${Math.floor(s/60)}:\${String(s%60).padStart(2,'0')}`;\n  return <p>経過時間: {fmt(seconds)}</p>;\n}",
      afterCode:"クリーンアップ関数を忘れると、コンポーネントが消えても裏でタイマーが走り続けるメモリリークが発生します。React 18のStrictModeでは開発時にuseEffectが2回実行されるので、クリーンアップが重要です。"},
     {title:"データフェッチとローディング状態の管理", body:"useEffectでAPIからデータを取得するのはReact開発の基本パターンです。ローディング状態・エラー状態・データ状態を別々のstateで管理します。Pythonのrequestsライブラリで同期的にデータを取るのと違い、JavaScriptは非同期（Promise/async-await）でネットワーク通信します。\n\nuseEffect内でasync関数を直接使うことはできません（useEffect自体がPromiseを返せないため）。代わりに、内部でasync関数を定義して即時実行するパターンを使います。\n\nAbortControllerを使えば、コンポーネントがアンマウントされたタイミングでfetchをキャンセルできます。これはPythonのスレッドキャンセルに相当し、不要なネットワークリクエストを防ぎます。",
      code:"function UserList() {\n  const [users, setUsers] = useState([]);\n  const [loading, setLoading] = useState(true);\n  const [error, setError] = useState(null);\n\n  useEffect(() => {\n    const controller = new AbortController();\n    fetch('https://jsonplaceholder.typicode.com/users',\n      { signal: controller.signal })\n      .then(r => r.json())\n      .then(data => { setUsers(data); setLoading(false); })\n      .catch(err => {\n        if (err.name !== 'AbortError') setError(err.message);\n      });\n    return () => controller.abort();\n  }, []);\n\n  if (loading) return <p>読み込み中...</p>;\n  if (error) return <p>エラー: {error}</p>;\n  return <ul>{users.map(u => <li key={u.id}>{u.name}</li>)}</ul>;\n}",
      afterCode:"key propsはリストのレンダリングに必須です。Reactがどの要素が変わったかを効率的に追跡するために使います。配列のindexをkeyにするとソート時に問題が起きやすいので、ユニークなIDを使いましょう。"}
   ]},
  {id:"ch5", num:5, title:"Context・グローバル状態", est:"50分",
   goal:"React ContextとuseReducerを組み合わせてグローバル状態を管理し、Propsのバケツリレーを解消できる。",
   sections:[
     {title:"Contextの作成と活用", body:"ContextはコンポーネントツリーをまたいでデータをPropなしに共有する仕組みです。認証情報・テーマ・言語設定など、多くのコンポーネントで必要になるデータに使います。Pythonのグローバル変数に近いですが、Reactでは値が変わると購読しているコンポーネントだけが再レンダリングされます。\n\ncreateContextで作成したContextオブジェクトにはProviderコンポーネントが付属します。Providerのvalueプロップに渡した値が、ツリー下部のuseContextフックで取得できます。PythonのFlaskでいえばapp.config[]のような設定共有の仕組みです。\n\nContextを使いすぎるとコンポーネントの独立性が下がります。本当にグローバルに必要なデータに限定し、ローカルなデータはPropsで渡す設計が望ましいです。カスタムフックでuseContextをラップすると使いやすくなります。",
      code:"const ThemeContext = React.createContext('light');\n\nfunction ThemeProvider({ children }) {\n  const [theme, setTheme] = useState('light');\n  return (\n    <ThemeContext.Provider value={{ theme, setTheme }}>\n      {children}\n    </ThemeContext.Provider>\n  );\n}\n\nfunction ThemedButton() {\n  const { theme, setTheme } = React.useContext(ThemeContext);\n  return (\n    <button\n      style={{\n        background: theme === 'dark' ? '#1e1b4b' : '#fff',\n        color: theme === 'dark' ? '#fff' : '#1e1b4b',\n        padding: '8px 16px', borderRadius: 8, border: '1px solid #d1d5db'\n      }}\n      onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')}>\n      テーマ切替（現在: {theme}）\n    </button>\n  );\n}",
      afterCode:"カスタムフックにContextの取得をラップするのがベストプラクティスです。例: function useTheme() { return React.useContext(ThemeContext); } これにより実装詳細が隠蔽され、将来的にContextを別の仕組みに変えやすくなります。"},
     {title:"useReducerで状態ロジックを整理する", body:"useReducerはuseStateの強化版で、複雑な状態遷移をReducer関数で管理します。ReduxやPythonのeventemitterに似た発想で、「現在の状態」と「アクション」を受け取り「新しい状態」を返す純粋関数を書きます。\n\nuseStateと違い、状態更新ロジックをコンポーネントの外に切り出せます。これによりユニットテストが書きやすくなります。Pythonで関数型プログラミングをするときの発想と親和性が高く、副作用を排除した純粋な変換関数として書けます。\n\nContextとuseReducerを組み合わせると、Reduxに近いグローバル状態管理が実現できます。小中規模のアプリならこの組み合わせで十分なことが多く、外部ライブラリが不要な場合があります。",
      code:"function cartReducer(state, action) {\n  switch (action.type) {\n    case 'ADD':\n      return { ...state, items: [...state.items, action.item] };\n    case 'REMOVE':\n      return { ...state,\n        items: state.items.filter(i => i.id !== action.id) };\n    case 'CLEAR':\n      return { items: [] };\n    default:\n      return state;\n  }\n}\n\nfunction Cart() {\n  const [state, dispatch] = React.useReducer(cartReducer, { items: [] });\n  return (\n    <div>\n      <button onClick={() =>\n        dispatch({ type:'ADD', item:{id: Date.now(), name:'商品'} })}>\n        追加\n      </button>\n      <button onClick={() => dispatch({ type:'CLEAR' })}>クリア</button>\n      <p>{state.items.length}個</p>\n    </div>\n  );\n}",
      afterCode:"Reducerは純粋関数でなければなりません。副作用（fetch・setTimeoutなど）をReducer内に書かないでください。副作用はdispatch後のuseEffectで処理します。これがFluxアーキテクチャの基本原則です。"}
   ]},
  {id:"ch6", num:6, title:"React Router", est:"50分",
   goal:"React Routerを使って複数ページのSPAを作成し、URLパラメータ・ネストルート・プログラム的ナビゲーションを実装できる。",
   sections:[
     {title:"BrowserRouterとRouteの設定", body:"React RouterはReactのSPAにルーティング機能を追加するライブラリです。URLが変わってもページ全体をリロードせず、対応するコンポーネントだけを切り替えます。DjangoのURLconf（urls.py）やFlaskの@app.routeに相当しますが、クライアント側で動作します。\n\nv6からAPIが大きく変わりました。<Routes>と<Route>を組み合わせてルーティングテーブルを定義します。path=\"*\"でワイルドカード（404ページ）を設定できます。Pythonのファイルシステムでいえばディレクトリ構造に近い感覚でルートを設計します。\n\n<Link>コンポーネントは<a>タグをラップしてSPAナビゲーションを実現します。href属性ではなくto属性を使います。普通の<a>タグを使うとページ全体がリロードされてReactのstateが全て消えてしまいます。",
      code:"// npm install react-router-dom\nimport { BrowserRouter, Routes, Route, Link } from 'react-router-dom';\n\nfunction App() {\n  return (\n    <BrowserRouter>\n      <nav style={{ display:'flex', gap:16, padding:12, background:'#f9fafb' }}>\n        <Link to=\"/\">ホーム</Link>\n        <Link to=\"/about\">アバウト</Link>\n        <Link to=\"/users/42\">ユーザー42</Link>\n      </nav>\n      <Routes>\n        <Route path=\"/\" element={<Home />} />\n        <Route path=\"/about\" element={<About />} />\n        <Route path=\"/users/:id\" element={<UserPage />} />\n        <Route path=\"*\" element={<NotFound />} />\n      </Routes>\n    </BrowserRouter>\n  );\n}",
      afterCode:"React Router v6では<Switch>が<Routes>に変わりました。v5から移行する場合は注意が必要です。<NavLink>コンポーネントを使うとアクティブなリンクにCSSクラスを自動付与できます。"},
     {title:"useNavigate・useParamsの活用", body:"useParamsフックはURLの:idのような動的セグメントを取得します。useNavigateはプログラム的にページ遷移します。Pythonのrequestオブジェクトからパスパラメータを取得したり、redirect()でリダイレクトしたりする操作に対応します。\n\nuseLocationフックで現在のURLパス・クエリ文字列・stateを取得できます。ログイン後のリダイレクト先を記憶する場合などに使います。useSearchParamsはURLSearchParams APIをラップし、クエリパラメータをstateのように操作できます。\n\nネストされたルートでは<Outlet />コンポーネントを使って子ルートのコンポーネントをレンダリングします。Djangoのテンプレート継承と似た感覚で、共通レイアウトを親ルートに置けます。",
      code:"import { useNavigate, useParams, useSearchParams } from 'react-router-dom';\n\nfunction UserPage() {\n  const { id } = useParams();\n  const [params] = useSearchParams();\n  const navigate = useNavigate();\n  const tab = params.get('tab') || 'profile';\n\n  return (\n    <div style={{ padding: 20 }}>\n      <h2>ユーザー #{id}</h2>\n      <p>タブ: {tab}</p>\n      <button onClick={() => navigate(-1)}>← 戻る</button>\n      <button onClick={() => navigate('/users')} style={{ marginLeft: 8 }}>\n        一覧へ\n      </button>\n    </div>\n  );\n}",
      afterCode:"navigate(-1)はブラウザの「戻る」ボタンと同じです。navigate('/path', { replace: true })を使うと履歴に追加せずに遷移できます。ログイン後のリダイレクトなどに便利です。"}
   ]},
  {id:"ch7", num:7, title:"コンポーネント設計パターン", est:"55分",
   goal:"カスタムフック・Compound Components・Container/Presentationalパターンを理解し、再利用性の高いコンポーネントを設計できる。",
   sections:[
     {title:"カスタムフックで処理を共有する", body:"カスタムフックは複数のコンポーネントで共通するロジックを再利用するための仕組みです。useDで始まる名前の関数として定義し、内部でuseStateやuseEffectなどの組み込みフックを使います。Pythonのミックスインやユーティリティ関数に相当しますが、フックの状態はコンポーネントごとに独立しています。\n\nカスタムフックを使うと、コンポーネントからロジックを分離してテストしやすくなります。例えばuseFetchは汎用的なデータ取得ロジックをカプセル化し、どのコンポーネントでも再利用できます。\n\nPythonのクラスで__init__にロジックを集めるのとは逆に、Reactではコンポーネントをシンプルに保ち、ロジックをカスタムフックに切り出します。これにより単一責任の原則を守りやすくなります。",
      code:"function useFetch(url) {\n  const [data, setData] = useState(null);\n  const [loading, setLoading] = useState(true);\n  const [error, setError] = useState(null);\n\n  useEffect(() => {\n    setLoading(true);\n    setError(null);\n    fetch(url)\n      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })\n      .then(d => { setData(d); setLoading(false); })\n      .catch(e => { setError(e.message); setLoading(false); });\n  }, [url]); // urlが変わると再フェッチ\n\n  return { data, loading, error };\n}\n\n// 使用例\nfunction Posts() {\n  const { data, loading, error } = useFetch('/api/posts');\n  if (loading) return <p>読み込み中...</p>;\n  if (error) return <p>エラー: {error}</p>;\n  return <ul>{data.map(p => <li key={p.id}>{p.title}</li>)}</ul>;\n}",
      afterCode:"useFetchのurlが変わると自動的に再フェッチされます。これはuseEffectの依存配列にurlを入れているためです。同じカスタムフックを複数のコンポーネントで使っても、状態は各コンポーネントで独立しています。"},
     {title:"Compound Componentsパターン", body:"Compound Componentsは親コンポーネントと子コンポーネントが状態を暗黙的に共有するパターンです。HTMLのselect/optionやtable/tr/tdのように、コンポーネントがセットで機能します。外部からの使いやすいAPIを設計しながら、内部の実装詳細を隠蔽できます。\n\n実装にはContextを使います。親コンポーネントがContextでstateと更新関数を提供し、子コンポーネントがそれを消費します。Pythonでいえばコンテキストマネージャーのwithブロックが近い概念です。\n\nこのパターンはUIライブラリ（React Aria、Headless UIなど）で広く使われています。アクセシビリティ属性の管理や、複雑なインタラクションの実装に特に効果的です。",
      code:"const TabsCtx = React.createContext(null);\n\nfunction Tabs({ children, defaultTab }) {\n  const [active, setActive] = useState(defaultTab);\n  return (\n    <TabsCtx.Provider value={{ active, setActive }}>\n      <div>{children}</div>\n    </TabsCtx.Provider>\n  );\n}\n\nTabs.Tab = function Tab({ id, children }) {\n  const { active, setActive } = React.useContext(TabsCtx);\n  return (\n    <button\n      style={{ fontWeight: active === id ? 700 : 400,\n               borderBottom: active === id ? '2px solid #6366f1' : 'none' }}\n      onClick={() => setActive(id)}>\n      {children}\n    </button>\n  );\n};\n\n// 使用: <Tabs defaultTab=\"a\"><Tabs.Tab id=\"a\">A</Tabs.Tab></Tabs>",
      afterCode:"Tabs.Tabのように親のコンポーネントにプロパティとして子コンポーネントを付けるパターンはJavaScriptのオブジェクトの特性を活かしており、名前空間をきれいに保ちながら関連コンポーネントをまとめられます。"}
   ]},
  {id:"ch8", num:8, title:"パフォーマンス最適化", est:"55分",
   goal:"React.memo・useMemo・useCallbackを使って不要な再レンダリングを防ぎ、コード分割でバンドルサイズを削減できる。",
   sections:[
     {title:"React.memo・useMemo・useCallback", body:"Reactはstateやpropsが変わるたびにコンポーネントを再レンダリングします。ほとんどの場合これは問題ありませんが、重い計算やサブコンポーネントが多い場合は最適化が必要です。\n\nReact.memoは関数コンポーネントをラップし、propsが変わらない限り再レンダリングをスキップします。PythonのlruCacheに似た発想で、同じ入力なら同じ出力をキャッシュします。ただし浅い比較（shallow compare）なのでオブジェクトや配列には注意が必要です。\n\nuseMemoは重い計算結果をメモ化し、useCallbackは関数をメモ化します。子コンポーネントにReact.memoを使っている場合、親から渡す関数をuseCallbackでメモ化しないとpropsが毎回変わってしまい最適化が無効になります。",
      code:"const ItemList = React.memo(function ItemList({ items, onRemove }) {\n  console.log('ItemList レンダリング');\n  return (\n    <ul>\n      {items.map(item => (\n        <li key={item.id}>\n          {item.name}\n          <button onClick={() => onRemove(item.id)}>削除</button>\n        </li>\n      ))}\n    </ul>\n  );\n});\n\nfunction App() {\n  const [items, setItems] = useState([{id:1,name:'A'},{id:2,name:'B'}]);\n  const [count, setCount] = useState(0);\n  const handleRemove = React.useCallback(id => {\n    setItems(prev => prev.filter(i => i.id !== id));\n  }, []); // 依存なし: 関数参照が安定する\n  return (\n    <div>\n      <button onClick={() => setCount(c => c+1)}>カウント: {count}</button>\n      <ItemList items={items} onRemove={handleRemove} />\n    </div>\n  );\n}",
      afterCode:"最適化はまず計測してから行いましょう。React Developer Toolsのプロファイラーで実際のボトルネックを特定してから対処するのがベストです。早すぎる最適化はコードを複雑にするだけです。"},
     {title:"コード分割とlazy loading", body:"大規模なReactアプリでは、全コンポーネントを最初に読み込むと初期ロードが遅くなります。React.lazyとSuspenseを使ってコンポーネントを遅延読み込みすることで、初期バンドルサイズを削減できます。\n\nReact.lazyはdynamic importを使い、コンポーネントが最初にレンダリングされる時点でそのJSファイルを読み込みます。SuspenseのfallbackにローディングUIを指定します。これはPythonの遅延インポートに相当する概念です。\n\nReact RouterとReact.lazyを組み合わせると、ルートごとにコードを分割できます。ユーザーがそのページに初めてアクセスしたとき初めてコードが読み込まれるので、多くのページを持つアプリで特に効果的です。",
      code:"// 遅延読み込み: 初回アクセス時にJSを取得\nconst AdminPage = React.lazy(() => import('./AdminPage'));\nconst Dashboard = React.lazy(() => import('./Dashboard'));\n\nfunction ErrorBoundary({ children }) {\n  // エラーをキャッチする（クラスコンポーネントが必要）\n  return children;\n}\n\nfunction App() {\n  return (\n    <BrowserRouter>\n      <React.Suspense fallback={\n        <div style={{ padding: 20 }}>読み込み中...</div>\n      }>\n        <Routes>\n          <Route path=\"/admin\" element={<AdminPage />} />\n          <Route path=\"/dashboard\" element={<Dashboard />} />\n        </Routes>\n      </React.Suspense>\n    </BrowserRouter>\n  );\n}",
      afterCode:"Suspenseのfallbackはローディングスピナーなど、UXを損なわないものを使いましょう。Viteではコードの分割は自動的に最適化されるため、import()を書くだけで本番ビルドでも適切に分割されます。"}
   ]},
];
