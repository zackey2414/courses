const chapters = [
  {id:"ch1", num:1, title:"JSX・コンポーネント入門", est:"45分",
   goal:"JSXの構文ルールを理解し、関数コンポーネントを自分で定義・使用できる。HTMLとJSXの違いを説明できる。",
   sections:[
     {title:"JSXとは何か", body:`JSXはJavaScript XMLの略で、JavaScriptの中にHTMLに似た構文を書けるようにするReactの記法です。Pythonのテンプレートエンジン（Jinja2など）に似ていますが、JSXはあくまでJavaScriptの構文拡張であり、最終的にはReact.createElement()呼び出しに変換されます。

JSXを使う最大の理由は、UIの構造をコードと同じ場所に書けることです。Pythonのf-stringでHTMLを組み立てる場合と違い、JSXはエディタの補完・型チェックが効き、ロジックとUIが密に連携できます。

JSXにはいくつかのルールがあります。class属性はclassNameに、for属性はhtmlForに変える必要があります。JavaScriptの式は{}で囲み、コンポーネントは必ず1つのルート要素（または<>フラグメント）を返す必要があります。`,
      code:`// JSXの基本
function Hello() {
  const name = "World";
  const today = new Date().toLocaleDateString('ja-JP');
  return (
    <div className="greeting">
      <h1>Hello, {name}!</h1>
      <p>今日は{today}です</p>
      {name === "World" && <small>Reactへようこそ</small>}
    </div>
  );
}`,
      afterCode:"JSX内の{}はJavaScript式を評価します。if文の代わりに三項演算子（? :）や&&演算子を使います。Pythonの{% if %}テンプレートタグとは異なり、JSは式ベースです。"},
     {title:"関数コンポーネントの定義と再利用", body:`Reactのコンポーネントは、JSXを返す関数です。現代のReactでは関数コンポーネントが主流で、クラスコンポーネントはほぼ使われません。関数名は必ず大文字始まりにします。これによりReactはHTML要素（小文字）とコンポーネント（大文字）を区別します。

コンポーネントは再利用可能なUIの部品です。Pythonで関数を定義して何度も呼び出すように、ReactではJSXタグとしてコンポーネントを呼び出します。同じコンポーネントを複数回使えば、それぞれ独立したインスタンスとして動作します。

大規模なアプリでは、コンポーネントをファイルに分割してexport/importします。これはPythonのモジュールシステムと同じ考え方です。ただしファイル単位でなくコンポーネント単位が設計の基本となります。`,
      code:`function Badge({ label, color }) {
  return (
    <span style={{
      background: color,

      borderRadius: 4,
      fontSize: 12
    }}>
      {label}
    </span>
  );
}

function App() {
  return (
    <div>
      <Badge label="React" color="#61dafb" />
      <Badge label="JSX" color="#f0db4f" />

}`,
      afterCode:"styleプロパティはオブジェクトを受け取ります。CSSのbackground-colorはキャメルケースのbackgroundColorになります。数値はpxが省略でき、文字列の場合は単位を明記します。"}
   ]},
  {id:"ch2", num:2, title:"Props・イベント処理", est:"45分",
   goal:"propsを通じてコンポーネントにデータを渡し、onClickなどのイベントハンドラを設定してインタラクティブなUIを作れる。",
   sections:[
     {title:"Propsの仕組みと単方向データフロー", body:`PropsはPropertiesの略で、コンポーネントに外から渡すデータです。Pythonの関数引数に相当しますが、Reactでは常にオブジェクトとして渡され、分割代入で取り出すのが慣習です。

Propsは読み取り専用です。コンポーネントは受け取ったpropsを直接変更できません。これはPythonの関数が引数を直接変更しないのと同じ思想で、データの流れを予測可能にするためです。この「単方向データフロー」がReactの核心的な設計原則です。親から子へデータが流れ、子は親にイベントを通知することで間接的に状態を変えます。

childrenという特殊なプロップを使うと、コンポーネントのJSXタグの中に書いた要素を受け取れます。これはPythonのコンテキストマネージャーのwithブロックに相当する感覚です。`,
      code:`function Card({ title, children, variant = 'default' }) {

  const border = variant === 'primary' ? '#6366f1' : '#e5e7eb';
  return (
    <div style={{
      background: bg, padding: 16, borderRadius: 8,
      border: '1px solid ' + border
    }}>
      <h3 style={{ marginBottom: 8 }}>{title}</h3>
      <div>{children}</div>
    </div>
  );
}

function App() {
  return (
    <Card title="ようこそ" variant="primary">
      <p>Reactの世界へ！</p>
    </Card>
  );
}`,
      afterCode:"デフォルト値はvariant = 'default'のように関数引数で指定できます。Pythonのデフォルト引数と同じ構文です。PropTypesまたはTypeScriptを使うとプロップの型検査ができます。"},
     {title:"イベントハンドラの設定", body:`Reactのイベント処理はHTMLのonclick属性に似ていますが、キャメルケース（onClick）で書き、関数を文字列ではなく関数参照で渡します。Pythonでコールバック関数を引数に渡す感覚と同じです。

イベントオブジェクトはeやeventという引数で受け取れます。input要素の値はe.target.valueで取得します。Pythonのwxやtkinterのイベントオブジェクトと概念は同じですが、React（=ブラウザDOM）のAPIに合わせた合成イベント（SyntheticEvent）です。

フォームの送信はonSubmitで処理し、e.preventDefault()でページリロードを防ぎます。SPA（シングルページアプリ）ではページ全体のリロードを防ぐことが重要です。`,
      code:`function LoginForm() {
  function handleSubmit(e) {
    e.preventDefault(); // ページリロードを防ぐ
    const form = e.target;
    const username = form.username.value;
    alert('ユーザー名: ' + username);
  }

  return (
    <form onSubmit={handleSubmit}>
      <input
        name="username"
        placeholder="ユーザー名"
        style={{ marginRight: 8 }}
      />
      <button type="submit">ログイン</button>
    </form>
  );
}`,
      afterCode:"e.preventDefault()はHTMLフォームのデフォルト動作（ページ遷移）を防ぎます。SPAではこれが必須です。インラインアロー関数（onClick={() => fn()}）は毎レンダリングで新しい関数が生成されますが、シンプルな用途では問題ありません。"}
   ]},
  {id:"ch3", num:3, title:"useState・フォーム", est:"50分",
   goal:"useStateフックでコンポーネントのローカル状態を管理し、制御コンポーネントを使ったフォームを実装できる。",
   sections:[
     {title:"useStateフックの基礎", body:`useStateはReactのフックの中で最も基本的なものです。コンポーネントに「状態（State）」を持たせます。Pythonのクラス変数に相当しますが、Reactではstateが変更されると自動的に再レンダリングが発生します。

useStateの戻り値は[現在の値, 更新関数]の配列です。更新関数を呼ぶとReactがコンポーネントを再レンダリングし、UIが最新の値を反映します。直接変数を書き換えても再レンダリングは起きません。これがPythonとの大きな違いです。

状態の更新は非同期です。前の値に基づいて更新するときはsetCount(c => c + 1)のように関数形式を使うのが安全です。これはPythonの+=と異なり、スレッドセーフな非同期更新のパターンです。`,
      code:`function TrafficLight() {
  const [color, setColor] = useState('red');
  const next = { red: 'green', green: 'yellow', yellow: 'red' };
  const colorMap = {
    red: '#ef4444', green: '#22c55e', yellow: '#f59e0b'
  };
  return (
    <div style={{ textAlign: 'center', padding: 20 }}>
      <div style={{
        width: 60, height: 60, borderRadius: '50%',
        background: colorMap[color], margin: '0 auto 12px'
      }} />
      <button onClick={() => setColor(c => next[c])}>
        次へ
      </button>
      <p>現在: {color}</p>
    </div>
  );
}`,
      afterCode:"オブジェクトのstateを更新するときは必ずスプレッド構文でコピーしてください: setState(prev => ({ ...prev, key: value }))。直接変更したオブジェクトをsetStateに渡してもReactは変化を検知できません。"},
     {title:"制御コンポーネントとフォーム管理", body:`Reactでは、フォームの入力値をstateで管理する「制御コンポーネント」パターンを使います。input要素のvalueプロップにstateをバインドし、onChangeでstateを更新します。HTMLの素のformと違い、Reactがフォームの唯一の真実の源（Single Source of Truth）となります。

制御コンポーネントにより、バリデーション、フォーマット、条件付き送信ボタンの有効化などをReact側で一元管理できます。Pythonのweb frameworkでいえば、フォームバリデーションをビュー関数内で行うのに相当します。

複数フィールドを持つフォームでは、stateをオブジェクトにして、nameプロップを使った汎用ハンドラを作るとコードがすっきりします。[e.target.name]のような計算プロパティ名はES2015の構文です。`,
      code:`function SignupForm() {
  const [form, setForm] = useState({ name: '', email: '' });
  const update = e =>
    setForm(prev => ({ ...prev, [e.target.name]: e.target.value }));
  const valid = form.name.length > 0 && form.email.includes('@');

  return (
    <form onSubmit={e => {
      e.preventDefault();
      alert(JSON.stringify(form));
    }}>
      <div>
        <input name="name" value={form.name} onChange={update}
          placeholder="名前" />
      </div>
      <div>
        <input name="email" value={form.email} onChange={update}
          placeholder="メールアドレス" />
      </div>
      <button disabled={!valid} type="submit">送信</button>
    </form>
  );
}`,
      afterCode:"validが false のとき送信ボタンをdisabledにすることでUXが向上します。HTML5のrequired属性でもバリデーションできますが、制御コンポーネントならReact側で完全制御できます。"}
   ]},
  {id:"ch4", num:4, title:"useEffect・副作用", est:"50分",
   goal:"useEffectで副作用（データフェッチ・タイマー・DOM操作）を管理し、クリーンアップ関数を正しく設定できる。",
   sections:[
     {title:"useEffectの依存配列とクリーンアップ", body:`useEffectはコンポーネントのレンダリング後に実行される副作用を管理するフックです。第2引数の依存配列が重要で、空配列[]ならマウント時のみ、省略すると毎レンダリング後、値を入れるとその値が変化したときに実行されます。

PythonでいえばFlaskのafter_requestやDjangoのシグナルに近い概念ですが、Reactではコンポーネント単位でライフサイクルを管理します。依存配列を正しく設定しないと無限ループや古い値の参照（クロージャの問題）が起きます。

useEffectはクリーンアップ関数を返せます。コンポーネントのアンマウント時や次のエフェクト実行前に呼ばれます。タイマーのクリア、WebSocketの切断、購読の解除などに使います。クリーンアップを忘れるとメモリリークの原因になります。`,
      code:`function Timer() {
  const [seconds, setSeconds] = useState(0);

  useEffect(() => {
    const id = setInterval(() => {
      setSeconds(s => s + 1); // 関数形式で安全に更新
    }, 1000);

    return () => clearInterval(id); // クリーンアップ
  }, []); // マウント時に1回だけ開始

  const fmt = s => \`\${Math.floor(s/60)}:\${String(s%60).padStart(2,'0')}\`;
  return <p>経過時間: {fmt(seconds)}</p>;
}`,

     {title:"データフェッチとローディング状態の管理", body:`useEffectでAPIからデータを取得するのはReact開発の基本パターンです。ローディング状態・エラー状態・データ状態を別々のstateで管理します。Pythonのrequestsライブラリで同期的にデータを取るのと違い、JavaScriptは非同期（Promise/async-await）でネットワーク通信します。

useEffect内でasync関数を直接使うことはできません（useEffect自体がPromiseを返せないため）。代わりに、内部でasync関数を定義して即時実行するパターンを使います。

AbortControllerを使えば、コンポーネントがアンマウントされたタイミングでfetchをキャンセルできます。これはPythonのスレッドキャンセルに相当し、不要なネットワークリクエストを防ぎます。`,
      code:`function UserList() {
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  useEffect(() => {
    const controller = new AbortController();
    fetch('https://jsonplaceholder.typicode.com/users',
      { signal: controller.signal })
      .then(r => r.json())
      .then(data => { setUsers(data); setLoading(false); })
      .catch(err => {
        if (err.name !== 'AbortError') setError(err.message);
      });
    return () => controller.abort();
  }, []);

  if (loading) return <p>読み込み中...</p>;
  if (error) return <p>エラー: {error}</p>;
  return <ul>{users.map(u => <li key={u.id}>{u.name}</li>)}</ul>;
}`,

  {id:"ch5", num:5, title:"Context・グローバル状態", est:"50分",
   goal:"React ContextとuseReducerを組み合わせてグローバル状態を管理し、Propsのバケツリレーを解消できる。",
   sections:[
     {title:"Contextの作成と活用", body:`ContextはコンポーネントツリーをまたいでデータをPropなしに共有する仕組みです。認証情報・テーマ・言語設定など、多くのコンポーネントで必要になるデータに使います。Pythonのグローバル変数に近いですが、Reactでは値が変わると購読しているコンポーネントだけが再レンダリングされます。

createContextで作成したContextオブジェクトにはProviderコンポーネントが付属します。Providerのvalueプロップに渡した値が、ツリー下部のuseContextフックで取得できます。PythonのFlaskでいえばapp.config[]のような設定共有の仕組みです。

Contextを使いすぎるとコンポーネントの独立性が下がります。本当にグローバルに必要なデータに限定し、ローカルなデータはPropsで渡す設計が望ましいです。カスタムフックでuseContextをラップすると使いやすくなります。`,
      code:`const ThemeContext = React.createContext('light');

      afterCode:"カスタムフックにContextの取得をラップするのがベストプラクティスです。例: function useTheme() { return React.useContext(ThemeContext); } これにより実装詳細が隠蔽され、将来的にContextを別の仕組みに変えやすくなります。"},
     {title:"useReducerで状態ロジックを整理する", body:`useReducerはuseStateの強化版で、複雑な状態遷移をReducer関数で管理します。ReduxやPythonのeventemitterに似た発想で、「現在の状態」と「アクション」を受け取り「新しい状態」を返す純粋関数を書きます。

useStateと違い、状態更新ロジックをコンポーネントの外に切り出せます。これによりユニットテストが書きやすくなります。Pythonで関数型プログラミングをするときの発想と親和性が高く、副作用を排除した純粋な変換関数として書けます。

ContextとuseReducerを組み合わせると、Reduxに近いグローバル状態管理が実現できます。小中規模のアプリならこの組み合わせで十分なことが多く、外部ライブラリが不要な場合があります。`,
      code:`function cartReducer(state, action) {
  switch (action.type) {
    case 'ADD':
      return { ...state, items: [...state.items, action.item] };
    case 'REMOVE':
      return { ...state,
        items: state.items.filter(i => i.id !== action.id) };
    case 'CLEAR':
      return { items: [] };
    default:
      return state;
  }
}

function Cart() {
  const [state, dispatch] = React.useReducer(cartReducer, { items: [] });
  return (
    <div>
      <button onClick={() =>
        dispatch({ type:'ADD', item:{id: Date.now(), name:'商品'} })}>
        追加
      </button>
      <button onClick={() => dispatch({ type:'CLEAR' })}>クリア</button>
      <p>{state.items.length}個</p>
    </div>
  );
}`,
      afterCode:"Reducerは純粋関数でなければなりません。副作用（fetch・setTimeoutなど）をReducer内に書かないでください。副作用はdispatch後のuseEffectで処理します。これがFluxアーキテクチャの基本原則です。"}

     {title:"useNavigate・useParamsの活用", body:`useParamsフックはURLの:idのような動的セグメントを取得します。useNavigateはプログラム的にページ遷移します。Pythonのrequestオブジェクトからパスパラメータを取得したり、redirect()でリダイレクトしたりする操作に対応します。

  {id:"ch7", num:7, title:"コンポーネント設計パターン", est:"55分",
   goal:"カスタムフック・Compound Components・Container/Presentationalパターンを理解し、再利用性の高いコンポーネントを設計できる。",
   sections:[
     {title:"カスタムフックで処理を共有する", body:`カスタムフックは複数のコンポーネントで共通するロジックを再利用するための仕組みです。useDで始まる名前の関数として定義し、内部でuseStateやuseEffectなどの組み込みフックを使います。Pythonのミックスインやユーティリティ関数に相当しますが、フックの状態はコンポーネントごとに独立しています。

カスタムフックを使うと、コンポーネントからロジックを分離してテストしやすくなります。例えばuseFetchは汎用的なデータ取得ロジックをカプセル化し、どのコンポーネントでも再利用できます。

Pythonのクラスで__init__にロジックを集めるのとは逆に、Reactではコンポーネントをシンプルに保ち、ロジックをカスタムフックに切り出します。これにより単一責任の原則を守りやすくなります。`,
      code:`function useFetch(url) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  useEffect(() => {
    setLoading(true);
    setError(null);
    fetch(url)
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(d => { setData(d); setLoading(false); })
      .catch(e => { setError(e.message); setLoading(false); });
  }, [url]); // urlが変わると再フェッチ

  return { data, loading, error };
}

// 使用例
function Posts() {
  const { data, loading, error } = useFetch('/api/posts');
  if (loading) return <p>読み込み中...</p>;
  if (error) return <p>エラー: {error}</p>;
  return <ul>{data.map(p => <li key={p.id}>{p.title}</li>)}</ul>;
}`,
      afterCode:"useFetchのurlが変わると自動的に再フェッチされます。これはuseEffectの依存配列にurlを入れているためです。同じカスタムフックを複数のコンポーネントで使っても、状態は各コンポーネントで独立しています。"},
     {title:"Compound Componentsパターン", body:`Compound Componentsは親コンポーネントと子コンポーネントが状態を暗黙的に共有するパターンです。HTMLのselect/optionやtable/tr/tdのように、コンポーネントがセットで機能します。外部からの使いやすいAPIを設計しながら、内部の実装詳細を隠蔽できます。

実装にはContextを使います。親コンポーネントがContextでstateと更新関数を提供し、子コンポーネントがそれを消費します。Pythonでいえばコンテキストマネージャーのwithブロックが近い概念です。

このパターンはUIライブラリ（React Aria、Headless UIなど）で広く使われています。アクセシビリティ属性の管理や、複雑なインタラクションの実装に特に効果的です。`,
      code:`const TabsCtx = React.createContext(null);

  );
}

Tabs.Tab = function Tab({ id, children }) {

  return (
    <button
      style={{ fontWeight: active === id ? 700 : 400,

};

// 使用: <Tabs defaultTab="a"><Tabs.Tab id="a">A</Tabs.Tab></Tabs>`,

   sections:[
     {title:"React.memo・useMemo・useCallback", body:`Reactはstateやpropsが変わるたびにコンポーネントを再レンダリングします。ほとんどの場合これは問題ありませんが、重い計算やサブコンポーネントが多い場合は最適化が必要です。

React.memoは関数コンポーネントをラップし、propsが変わらない限り再レンダリングをスキップします。PythonのlruCacheに似た発想で、同じ入力なら同じ出力をキャッシュします。ただし浅い比較（shallow compare）なのでオブジェクトや配列には注意が必要です。

useMemoは重い計算結果をメモ化し、useCallbackは関数をメモ化します。子コンポーネントにReact.memoを使っている場合、親から渡す関数をuseCallbackでメモ化しないとpropsが毎回変わってしまい最適化が無効になります。`,
      code:`const ItemList = React.memo(function ItemList({ items, onRemove }) {

     {title:"コード分割とlazy loading", body:`大規模なReactアプリでは、全コンポーネントを最初に読み込むと初期ロードが遅くなります。React.lazyとSuspenseを使ってコンポーネントを遅延読み込みすることで、初期バンドルサイズを削減できます。

React.lazyはdynamic importを使い、コンポーネントが最初にレンダリングされる時点でそのJSファイルを読み込みます。SuspenseのfallbackにローディングUIを指定します。これはPythonの遅延インポートに相当する概念です。

React RouterとReact.lazyを組み合わせると、ルートごとにコードを分割できます。ユーザーがそのページに初めてアクセスしたとき初めてコードが読み込まれるので、多くのページを持つアプリで特に効果的です。`,
      code:`// 遅延読み込み: 初回アクセス時にJSを取得
const AdminPage = React.lazy(() => import('./AdminPage'));
const Dashboard = React.lazy(() => import('./Dashboard'));

function ErrorBoundary({ children }) {
  // エラーをキャッチする（クラスコンポーネントが必要）
  return children;
}

function App() {
  return (
    <BrowserRouter>
      <React.Suspense fallback={
        <div style={{ padding: 20 }}>読み込み中...</div>
      }>
        <Routes>
          <Route path="/admin" element={<AdminPage />} />
          <Route path="/dashboard" element={<Dashboard />} />
        </Routes>
      </React.Suspense>
    </BrowserRouter>
  );
}`,
      afterCode:"Suspenseのfallbackはローディングスピナーなど、UXを損なわないものを使いましょう。Viteではコードの分割は自動的に最適化されるため、import()を書くだけで本番ビルドでも適切に分割されます。"}
   ]},
];

          React.createElement("span", {style:{background:"#f59e0b",color:"#fff",fontWeight:800,fontSize:13,padding:"4px 14px",borderRadius:8}}, "🏋️ 演習問題"),
          React.createElement("span", {style:{fontSize:13,color:"#92400e"}}, "易しい順に", exercises.length, "問")
        ),
        exercises.map((ex,i) => React.createElement(Exercise, {key:ch+"-"+i, ex, idx:i}))
      ),
      React.createElement("div", {style:{display:"flex",justifyContent:"space-between",marginTop:20,gap:10}},
        ch>0 ? React.createElement("button", {onClick:()=>{setCh(ch-1);window.scrollTo(0,0);}, style:{flex:1,padding:"12px 16px",border:"1px solid #d1d5db",borderRadius:10,background:"#fff",cursor:"pointer",fontWeight:600,fontSize:13,color:"#6b7280"}}, "← Ch.", chapters[ch-1].num) : React.createElement("div", {style:{flex:1}}),
        ch<chapters.length-1 ? React.createElement("button", {onClick:()=>{setCh(ch+1);window.scrollTo(0,0);}, style:{flex:1,padding:"12px 16px",border:"none",borderRadius:10,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",cursor:"pointer",fontWeight:700,fontSize:13,color:"#fff"}}, "Ch.", chapters[ch+1].num, " →")
        : React.createElement("a", {href:"../index.html", style:{flex:1,padding:"12px 16px",borderRadius:10,background:"linear-gradient(135deg,#22c55e,#16a34a)",color:"#fff",fontWeight:700,fontSize:13,textAlign:"center",textDecoration:"none"}}, "🎉 コース完了！")
      ),
      React.createElement("p", {style:{textAlign:"center",fontSize:11,color:"#9ca3af",marginTop:20}}, "react.dev ・ React 19 時点")
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(ReactIntroCourse));
  </script>
