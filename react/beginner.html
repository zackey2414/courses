    answer: `import { useState, useMemo } from 'react';

type Filter = 'all' | 'active' | 'done';

interface Todo {
  id: string;
  text: string;
  done: boolean;
}

function App() {
  const [todos, setTodos] = useState<Todo[]>([]);
  const [filter, setFilter] = useState<Filter>('all');

  const toggleTodo = (id: string) => {
    setTodos(prev =>
      prev.map(t => t.id === id ? { ...t, done: !t.done } : t)
    );
  };

  const deleteTodo = (id: string) => {
    setTodos(prev => prev.filter(t => t.id !== id));
  };

  const filteredTodos = useMemo(() => {
    switch (filter) {
      case 'active': return todos.filter(t => !t.done);
      case 'done': return todos.filter(t => t.done);
      default: return todos;
    }
  }, [todos, filter]);

  return (
    <div>
      <div>
        {(['all', 'active', 'done'] as Filter[]).map(f => (
          <button key={f} onClick={() => setFilter(f)}
            style={{ fontWeight: filter === f ? 'bold' : 'normal' }}>
            {f === 'all' ? 'すべて' : f === 'active' ? '未完了' : '完了'}
          </button>
        ))}
      </div>
      <ul>
        {filteredTodos.map(t => (
          <li key={t.id}>
            <input type="checkbox" checked={t.done}
              onChange={() => toggleTodo(t.id)} />
            <span style={{textDecoration: t.done ? 'line-through' : 'none'}}>
              {t.text}
            </span>
            <button onClick={() => deleteTodo(t.id)}>削除</button>
          </li>
        ))}
      </ul>
    </div>
  );
}`

    answer: `import { useState, useRef, useEffect } from 'react';

interface Todo {
  id: string; text: string; done: boolean;
}

interface TodoItemProps {
  todo: Todo;
  onToggle: (id: string) => void;
  onDelete: (id: string) => void;
  onUpdate: (id: string, text: string) => void;
}

function TodoItem({ todo, onToggle, onDelete, onUpdate }: TodoItemProps) {
  const [editing, setEditing] = useState(false);
  const [editText, setEditText] = useState(todo.text);
  const inputRef = useRef<HTMLInputElement>(null);

  useEffect(() => {
    if (editing) inputRef.current?.focus();
  }, [editing]);

  const handleKeyDown = (e: React.KeyboardEvent) => {
    if (e.key === 'Enter') {
      if (editText.trim()) {
        onUpdate(todo.id, editText.trim());
        setEditing(false);
      }
    } else if (e.key === 'Escape') {
      setEditText(todo.text);
      setEditing(false);
    }
  };

  return (
    <li>
      <input type="checkbox" checked={todo.done}
        onChange={() => onToggle(todo.id)} />
      {editing ? (
        <input ref={inputRef} value={editText}
          onChange={e => setEditText(e.target.value)}
          onKeyDown={handleKeyDown}
          onBlur={() => { setEditText(todo.text); setEditing(false); }}
        />
      ) : (
        <span onDoubleClick={() => setEditing(true)}
          style={{textDecoration: todo.done ? 'line-through' : 'none'}}>
          {todo.text}
        </span>
      )}
      <button onClick={() => onDelete(todo.id)}>削除</button>
    </li>
  );
}`

interface FormData {
  text: string;
}

interface AddFormProps {
  onAdd: (text: string) => void;
}

export function AddForm({ onAdd }: AddFormProps) {
  const { register, handleSubmit, reset, formState: { errors } } = useForm<FormData>();

  const onSubmit = (data: FormData) => {
    onAdd(data.text.trim());
    reset();
  };

  return (
    <form onSubmit={handleSubmit(onSubmit)}>
      <input
        {...register('text', {
          required: 'Todoを入力してください',
          minLength: { value: 2, message: '2文字以上入力してください' }
        })}
        placeholder="新しいTodo..."
      />
      {errors.text && <p style={{color:'red'}}>{errors.text.message}</p>}
      <button type="submit">追加</button>
    </form>
  );
}`

type Filter = 'all' | 'active' | 'done';

interface Todo { id: string; text: string; done: boolean; }

export function useFilter(todos: Todo[]) {
  const [filter, setFilter] = useState<Filter>('all');

  const filteredTodos = useMemo(() => {
    switch (filter) {

    answer: `import { useState, useEffect } from 'react';

export function useDebounce<T>(value: T, delay: number = 300): T {
  const [debouncedValue, setDebouncedValue] = useState<T>(value);

  useEffect(() => {
    const timer = setTimeout(() => {
      setDebouncedValue(value);
    }, delay);

    return () => clearTimeout(timer);
  }, [value, delay]);

  return debouncedValue;
}

// 使い方: Todo検索
function TodoSearch({ todos }: { todos: Todo[] }) {
  const [query, setQuery] = useState('');
  const debouncedQuery = useDebounce(query, 300);

  const results = useMemo(
    () => todos.filter(t =>
      t.text.toLowerCase().includes(debouncedQuery.toLowerCase())
    ),
    [todos, debouncedQuery]
  );

  return (
    <div>
      <input value={query} onChange={e => setQuery(e.target.value)}
        placeholder="検索..." />
      <ul>{results.map(t => <li key={t.id}>{t.text}</li>)}</ul>
    </div>
  );
}`

import { useState, useEffect } from 'react';

export function useDebounce<T>(value: T, delay = 300): T {
  const [debounced, setDebounced] = useState<T>(value);

  useEffect(() => {
    // delay ミリ秒後に値を確定
    const timer = setTimeout(() => setDebounced(value), delay);
    // 新しい値が来たら前のタイマーをキャンセル
    return () => clearTimeout(timer);
  }, [value, delay]);

  return debounced;
}

  const debouncedQuery = useDebounce(query, 300);

      t.text.toLowerCase().includes(debouncedQuery.toLowerCase())

    [todos, debouncedQuery]
  );

      <p>{results.length}件ヒット</p>

  );

    body: "React は state や props が変わるとコンポーネントを「再レンダリング」します。ここで言う「レンダリング」は DOM の更新ではなく、コンポーネント関数の再実行（JSX の再生成）です。生成された新しい JSX と前回の JSX を比較し（差分検出 = reconciliation）、実際に変わった部分だけ DOM を更新します。\n\n重要なポイントは、「親が再レンダリングされると子も再レンダリングされる」という React のデフォルト動作です。たとえ子コンポーネントの props が変わっていなくても、親が setState を呼べば子のコンポーネント関数も再実行されます。これが不要な再レンダリングの原因です。\n\nただし、不要な再レンダリング = パフォーマンス問題ではありません。React の差分検出は非常に高速で、数十個程度のコンポーネントの再レンダリングは問題になりません。最適化は「実測して遅い場合にだけ」行うべきで、早すぎる最適化はコードの複雑さを不必要に増やします。",

    afterCode: "ポイント: 開発モードでの計測結果は本番よりも遅くなります。正確なパフォーマンスを計測するには、npm run build + npm run preview で本番ビルドの Profiler を使いましょう。React DevTools は本番ビルドでも Profiler が使えるオプションがあります。"
