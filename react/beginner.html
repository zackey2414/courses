  {id:"ch1", num:1, title:"Vite環境構築・初めてのコンポーネント", est:"45分",

     {title:"Viteとは・プロジェクト作成", body:`ViteはEvan You（Vue.jsの作者）が開発した次世代フロントエンドビルドツールです。webpackと比べてESモジュールをネイティブに活用するため、開発サーバーの起動が数秒で完了し、ホットモジュールリプレイスメント（HMR）も瞬時に反映されます。Pythonでいえば、uvとfastAPIの組み合わせのような開発体験の改善です。

create-react-appは2023年に非推奨となり、現在のReact公式ドキュメントではViteやNext.jsが推奨されています。本コースではシンプルなSPAとしてViteを使います。npm create vite@latestコマンドでReact + JavaScriptテンプレートを選択するだけで環境が整います。

プロジェクト構成はsrc/にコンポーネント、public/に静的ファイルを置くのが基本です。Pythonのプロジェクト構造（src/とtests/を分ける）と同じような考え方で、役割ごとにフォルダを分けます。`,

npm install -D @testing-library/react @testing-library/user-event vitest`,

     {title:"コンポーネントをファイルに分割する", body:`Reactでは1ファイルに1コンポーネントが基本です。コンポーネントはexport defaultまたは名前付きexportでエクスポートし、使う側でimportします。Pythonのfrom module import ClassNameと同じ構文です。

src/components/ディレクトリを作ってコンポーネントをまとめるのが一般的なプロジェクト構造です。機能ごとにディレクトリを分けるFeature-basedディレクトリ構造も人気があります。Todoアプリでは、components/, store/, hooks/のように役割で分けます。

index.jsをディレクトリに置いてコンポーネントをre-exportすると、import { TodoItem } from './components'のようにきれいにインポートできます。Pythonの__init__.pyとほぼ同じ役割です。`,

  {id:"ch2", num:2, title:"Props・useState・Todo一覧表示", est:"45分",
   goal:"propsとuseStateを使ってTodoリストを状態管理し、追加・完了切り替え・削除の基本操作を実装できる。",
   sections:[
     {title:"TodoリストのState設計", body:`Todoアプリの状態設計は重要です。各Todoはid・text・completedフィールドを持つオブジェクトにします。idには一意の値（Date.now()やuuid）を使います。Pythonのデータクラス（@dataclass）に相当する構造です。

useStateで配列を管理するとき、Pythonのリストのように直接push()やsplice()を使ってはいけません。Reactは参照が変わったことで変更を検知するため、必ず新しい配列を返す操作（filter・map・spread）を使います。

Todoの追加は[...prev, newItem]、削除はprev.filter(t => t.id !== id)、更新はprev.map(t => t.id === id ? {...t, key: val} : t)のパターンで覚えましょう。これらはReact開発で最頻出の操作です。`,
      code:`function useTodos() {
  const [todos, setTodos] = useState([
    { id: 1, text: '牛乳を買う', completed: false },
    { id: 2, text: '本を読む', completed: true },
  ]);

  const addTodo = text =>
    setTodos(prev => [...prev, { id: Date.now(), text, completed: false }]);
  const toggleTodo = id =>
    setTodos(prev => prev.map(t =>
      t.id === id ? { ...t, completed: !t.completed } : t));
  const deleteTodo = id =>
    setTodos(prev => prev.filter(t => t.id !== id));

  return { todos, addTodo, toggleTodo, deleteTodo };
}`,
      afterCode:"カスタムフック useTodos にロジックをまとめることで、App.jsxをシンプルに保てます。このパターンは後でZustandに移行するときも移行しやすい設計です。"},
     {title:"フィルタリングとソートの実装", body:`Todoアプリでは「全て」「未完了」「完了済み」のフィルタリングが必要です。フィルタの状態をuseStateで管理し、表示するTodoをuseMemoで計算します。Pythonのリスト内包表記でフィルタするのと同じロジックで、書き方がJavaScriptになるだけです。

useMemoを使うのは、filteredTodosの計算コストを考慮してではなく、依存配列を明示するためです。todosやfilterが変わったときだけ再計算し、無関係なstateの変更では再計算しません。

ソート機能はtodosのコピーを作ってsort()します。Pythonのsorted()と同様、元の配列は変更しないようにします。JavaScriptのsort()は破壊的（インプレース）なので、[...todos].sort(...)と展開してから使います。`,
      code:`function TodoApp() {
  const { todos, addTodo, toggleTodo, deleteTodo } = useTodos();
  const [filter, setFilter] = useState('all'); // 'all'|'active'|'done'

  const filtered = React.useMemo(() => {
    if (filter === 'active') return todos.filter(t => !t.completed);
    if (filter === 'done') return todos.filter(t => t.completed);
    return todos;
  }, [todos, filter]);

  return (
    <div>
      <div>
        {['all','active','done'].map(f => (
          <button key={f} onClick={() => setFilter(f)}
            style={{ fontWeight: filter===f ? 700 : 400 }}>
            {f}
          </button>
        ))}
      </div>
      <p>{filtered.length}件表示中</p>
    </div>
  );
}`,

バリデーションはonChangeでリアルタイムに行うか、onSubmitで送信時に行うかを選べます。UX的には、一度フォーカスが当たったフィールドに対してonBlurでバリデーションするのが一般的です。Pythonのweb frameworkのフォームバリデーションとは異なり、クライアント側でリアルタイムにフィードバックできます。

エラーメッセージはstateで管理し、フィールドごとにエラー内容を保持するオブジェクトにします: const [errors, setErrors] = useState({})。バリデーション関数はロジックを分離してテストしやすくします。`,
      code:`function validate(text) {
  if (!text.trim()) return '内容を入力してください';
  if (text.length > 50) return '50文字以内で入力してください';
  if (text.trim().length < 2) return '2文字以上入力してください';
  return null; // null = エラーなし
}

function AddTodoForm({ onAdd }) {
  const [text, setText] = useState('');
  const [touched, setTouched] = useState(false);
  const error = touched ? validate(text) : null;

  const handleSubmit = e => {
    e.preventDefault();
    setTouched(true);
    if (validate(text)) return;
    onAdd(text.trim());
    setText('');
    setTouched(false);
  };

  return (
    <form onSubmit={handleSubmit}>
      <input value={text} onChange={e => setText(e.target.value)}
        onBlur={() => setTouched(true)}
        style={{ borderColor: error ? '#ef4444' : '#d1d5db' }} />
      {error && <p style={{ color: '#ef4444', fontSize: 12 }}>{error}</p>}
      <button type="submit">追加</button>
    </form>
  );
}`,

     {title:"React Hook Formの導入", body:`手動バリデーションは学習に有益ですが、実務ではReact Hook Form（RHF）が広く使われています。RHFは非制御コンポーネントを使うため、入力のたびに再レンダリングが起きず、パフォーマンスが優れています。Pythonのweb frameworkでいえば、WTFormsやpydanticに相当します。

useForm()フックからregister・handleSubmit・formState: { errors }を取得します。registerで各フィールドのバリデーションルールを設定し、handleSubmitがバリデーション通過後のコールバックを呼びます。

zodと組み合わせるとより強力なスキーマバリデーションができます。@hookform/resolversパッケージでzodスキーマをRHFと繋ぎます。Pythonのpydanticモデルと同じようにスキーマを定義して入力値を検証できます。`,

  {id:"ch4", num:4, title:"useMemo・useCallback", est:"45分",
   goal:"useMemoで重い計算をメモ化し、useCallbackで関数参照を安定させてReact.memoと組み合わせた最適化ができる。",
   sections:[
     {title:"useMemoで計算コストを削減する", body:`useMemoは計算結果をキャッシュします。第2引数の依存配列に含まれる値が変わったときだけ再計算します。Pythonのfunctools.lru_cacheに似ていますが、コンポーネントのレンダリングサイクルに合わせて動作します。

TodoアプリでuseMemoが活躍する場面はフィルタリングや統計情報の計算です。todosが100件あって毎回フィルタ計算するより、todosかfilterが変わったときだけ再計算する方が効率的です。ただし、useMemo自体もオーバーヘッドがあるので、本当に重い計算にだけ使いましょう。

Pythonのリスト内包表記をそのままJavaScriptのfilter・mapに置き換えるだけでほぼ同じことができます。filter(lambda t: not t.completed, todos) → todos.filter(t => !t.completed)という対応関係です。`,
      code:`function useTodoStats(todos) {
  return React.useMemo(() => {
    const total = todos.length;
    const done = todos.filter(t => t.completed).length;
    const active = total - done;
    const percent = total > 0 ? Math.round((done / total) * 100) : 0;
    return { total, done, active, percent };
  }, [todos]); // todosが変わったときだけ再計算
}

function StatsBar({ todos }) {
  const { total, done, active, percent } = useTodoStats(todos);
  return (
    <div>
      <p>全{total}件 / 完了{done}件 / 未完了{active}件</p>
      <div style={{ background:'#e5e7eb', borderRadius:4, height:8 }}>
        <div style={{ background:'#6366f1', width:percent+'%', height:'100%', borderRadius:4 }} />
      </div>
    </div>
  );
}`,
      afterCode:"useMemoの依存配列にtodosを含めているのは、todosが変わったときだけ再計算するためです。空配列にすると最初の計算結果を使い続けてしまいます。"},
     {title:"useCallbackとReact.memoの組み合わせ", body:`useCallbackは関数をメモ化します。コンポーネントが再レンダリングされるたびに新しい関数が作成されますが、useCallbackを使うと依存配列が変わらない限り同じ関数参照を返します。

これはReact.memoと組み合わせることで意味を持ちます。React.memoはpropsの浅い比較（===）で再レンダリングをスキップしますが、毎回新しい関数が渡されるとpropsが変わったと判断されてスキップできません。useCallbackで関数を安定させることで、React.memoの最適化が効くようになります。

Pythonで同じ処理を何度も定義し直す無駄をなくすように、JavaScriptでも参照を安定させることで不要な計算を省きます。ただし、useCallbackの使いすぎはコードを複雑にするので、まずはプロファイラーで問題を確認してから使いましょう。`,
      code:`const TodoItem = React.memo(function TodoItem({ todo, onToggle, onDelete }) {
  console.log('TodoItem render:', todo.id);
  return (
    <li style={{ display:'flex', gap:8, padding:'4px 0' }}>
      <input type="checkbox" checked={todo.completed}
        onChange={() => onToggle(todo.id)} />
      <span style={{ flex:1,
        textDecoration: todo.completed ? 'line-through' : 'none' }}>
        {todo.text}
      </span>
      <button onClick={() => onDelete(todo.id)}>削除</button>
    </li>
  );
});

function TodoApp() {
  const { todos, toggleTodo, deleteTodo } = useTodos();
  // useCallbackで関数参照を安定させる
  const handleToggle = React.useCallback(id => toggleTodo(id), [toggleTodo]);
  const handleDelete = React.useCallback(id => deleteTodo(id), [deleteTodo]);
  return (
    <ul>
      {todos.map(t =>
        <TodoItem key={t.id} todo={t}
          onToggle={handleToggle} onDelete={handleDelete} />
      )}
    </ul>
  );
}`,
      afterCode:"React Developer Toolsのプロファイラーで「Highlight updates when components render」をオンにすると、どのコンポーネントが再レンダリングされているか視覚的に確認できます。"}

  {id:"ch5", num:5, title:"Zustand状態管理", est:"50分",
   goal:"ZustandでグローバルなTodo状態を管理し、複数コンポーネントからストアを参照・更新できる。",
   sections:[
     {title:"Zustandの基本とストア設計", body:`ZustandはReduxより大幅にシンプルなグローバル状態管理ライブラリです。Providerが不要で、create()関数でストアを定義するだけで使えます。Pythonのsingletonパターンに近く、アプリ全体で一つのストアを共有します。

Zustandのストアは状態（state）とアクション（関数）を同じオブジェクトに定義します。setを使って部分的に状態を更新でき、immerプラグインを使うとドラフト状態を直接変更するような書き方もできます。これはPythonでクラスのメソッドとして操作を定義するのと同じ感覚です。

TodoアプリをuseStateからZustandに移行するメリットは、状態をどのコンポーネントからでも直接参照・更新できることです。Props経由でバケツリレーする必要がなくなります。`,
      code:`import { create } from 'zustand';

const useTodoStore = create(set => ({

     {title:"Zustand devtoolsとpersist", body:`Zustandにはmiddlewareがあり、devtoolsをオンにするとRedux DevToolsでstoreの変化を追えます。persistを使うとlocalStorageに自動保存され、ページリロード後も状態が維持されます。Pythonのshelveやpickleでデータを永続化するのに相当します。

本番環境での状態管理ではZustandだけでなく、TanStack Query（旧React Query）を組み合わせてサーバー状態（APIから取得したデータ）とクライアント状態（UIの状態）を分離するアーキテクチャが現在の主流です。`,
      code:`import { create } from 'zustand';

  {id:"ch6", num:6, title:"APIとuseEffect", est:"50分",
   goal:"useEffectとfetchを使ってAPIからデータを取得し、ローディング・エラー状態を適切に処理できる。TanStack Queryの基本を理解できる。",
   sections:[
     {title:"APIフェッチのパターン", body:`実際のアプリではTodoデータをAPIから取得します。useEffectとfetchの組み合わせはReactの基本パターンで、ローディング・エラー・成功の3状態を管理します。Pythonのrequests.get()で同期的にデータを取るのと違い、JavaScriptは非同期処理でUIをブロックしません。

競合状態（race condition）に注意が必要です。複数のリクエストが同時に走ると、古いリクエストの結果が最後に来ることがあります。AbortControllerでリクエストをキャンセルするか、後述のTanStack Queryを使うことで自動的に対処できます。

エラーハンドリングは必須です。HTTPステータスが200番台でなければr.ok===falseになりますが、fetchはこれをthrowしないので自分でチェックします。ネットワークエラーの場合だけcatchに入ります。`,
      code:`function useTodosFromAPI() {
  const [todos, setTodos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  useEffect(() => {
    const controller = new AbortController();
    setLoading(true);

    fetch('https://jsonplaceholder.typicode.com/todos?_limit=10',
      { signal: controller.signal })
      .then(r => {
        if (!r.ok) throw new Error('サーバーエラー: ' + r.status);
        return r.json();
      })
      .then(data => {
        setTodos(data.map(d => ({ id:d.id, text:d.title, completed:d.completed })));
        setLoading(false);
      })
      .catch(err => {
        if (err.name !== 'AbortError') {
          setError(err.message);
          setLoading(false);
        }
      });

    return () => controller.abort();
  }, []);

  return { todos, loading, error };
}`,
      afterCode:"AbortControllerのabort()はReact 18のStrictMode（開発時に2回エフェクトが実行される）でも正しく動作します。クリーンアップ関数にabortを置くことが重要です。"},
     {title:"TanStack Queryでデータフェッチを楽にする", body:`TanStack Query（旧React Query）はサーバー状態の管理に特化したライブラリです。キャッシュ・バックグラウンド再フェッチ・ローディング状態・エラー状態を自動で管理します。Pythonのhttpxとキャッシュライブラリを組み合わせたようなものですが、React向けに最適化されています。

useQueryフックにqueryKeyとqueryFnを渡すだけで、フェッチ・キャッシュ・ローディング状態が全て管理されます。同じqueryKeyのデータは自動的にキャッシュされ、別のコンポーネントから参照しても余分なリクエストが発生しません。

useMutationフックでPOST・PUT・DELETEリクエストを行い、成功時にキャッシュを更新（invalidateQueries）します。これにより、データの変更後に自動的に再フェッチされ、UIが常に最新になります。`,
      code:`// npm install @tanstack/react-query
import { useQuery, useMutation, useQueryClient } from '@tanstack/react-query';

const fetchTodos = () =>
  fetch('https://jsonplaceholder.typicode.com/todos?_limit=5')
    .then(r => r.json());

function TodoList() {
  const { data: todos, isLoading, error } = useQuery({
    queryKey: ['todos'],
    queryFn: fetchTodos,
    staleTime: 1000 * 60, // 1分間はキャッシュを使う
  });

  if (isLoading) return <p>読み込み中...</p>;
  if (error) return <p>エラー: {error.message}</p>;

  return (
    <ul>
      {todos.map(t => <li key={t.id}>{t.title}</li>)}
    </ul>
  );
}`,
      afterCode:"TanStack Queryは内部でキャッシュを管理しており、ウィンドウのフォーカス復帰時に自動でデータを再フェッチします（refetchOnWindowFocus）。ユーザーが別のタブから戻ったときに最新データが表示されます。"}
   ]},

     {title:"ユーザーインタラクションのテスト", body:`@testing-library/user-eventを使うと、クリック・テキスト入力・フォーカスなどのユーザー操作をシミュレートできます。fireEventよりも実際のブラウザの動作に近く、イベントの順序（focus→input→change）を正しく再現します。
