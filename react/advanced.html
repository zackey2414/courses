    diff: 3,
    q: "startTransition を使って、重い検索フィルタリングの UI をノンブロッキングにするコードを書いてください。\nユーザーの入力は即座に反映し、フィルタリング結果は Transition 優先度で更新すること。",
    code: "// 10000件のリストをフィルタリングするコンポーネント\n// 入力ごとに全件スキャンするため重い\nimport { useState } from 'react';\n\nconst items = Array.from({ length: 10000 }, (_, i) => 'Item ' + i);\n\nfunction HeavyList({ query }: { query: string }) {\n  const filtered = items.filter(i => i.includes(query));\n  return <ul>{filtered.map(i => <li key={i}>{i}</li>)}</ul>;\n}\n\nexport function SearchPage() {\n  const [q, setQ] = useState('');\n  // ここを改善してください\n  return (\n    <div>\n      <input value={q} onChange={e => setQ(e.target.value)} />\n      <HeavyList query={q} />\n    </div>\n  );\n}",
    answer: "import { useState, startTransition, useTransition } from 'react';\n\nconst items = Array.from({ length: 10000 }, (_, i) => 'Item ' + i);\n\nfunction HeavyList({ query }: { query: string }) {\n  const filtered = items.filter(i => i.includes(query));\n  return <ul>{filtered.map(i => <li key={i}>{i}</li>)}</ul>;\n}\n\nexport function SearchPage() {\n  const [inputValue, setInputValue] = useState('');\n  const [query, setQuery] = useState('');\n  const [isPending, startT] = useTransition();\n\n  const handleChange = (e: React.ChangeEvent<HTMLInputElement>) => {\n    // 入力値は SyncLane で即座に更新（ブロックしない）\n    setInputValue(e.target.value);\n    // フィルタリング用クエリは TransitionLane で更新（中断可能）\n    startT(() => setQuery(e.target.value));\n  };\n\n  return (\n    <div>\n      <input value={inputValue} onChange={handleChange} />\n      {isPending && <span>フィルタリング中...</span>}\n      <HeavyList query={query} />\n    </div>\n  );\n}"

    code: "// 以下のコードのうち、React Compiler が最適化できない箇所はどこか？\n// 修正版も書くこと。\n\n// 例1\nfunction Component({ items }) {\n  const sorted = items;\n  sorted.sort(); // ← ?\n  return <ul>{sorted.map(i => <li key={i}>{i}</li>)}</ul>;\n}\n\n// 例2\nlet outsideVar = 0;\nfunction Counter() {\n  outsideVar++; // ← ?\n  return <p>{outsideVar}</p>;\n}",
    answer: "// 例1の問題: 引数を直接 .sort() で破壊的変更している\n// → コンポーネントは純粋関数でなければならない（同じ入力 → 同じ出力）\n// 修正: スプレッドでコピーしてからソート\nfunction Component({ items }: { items: string[] }) {\n  const sorted = [...items].sort();\n  return <ul>{sorted.map(i => <li key={i}>{i}</li>)}</ul>;\n}\n\n// 例2の問題: モジュールスコープの変数を副作用として変更している\n// → render のたびに outsideVar が変わり、純粋性が壊れる\n// 修正: useState を使う\nfunction Counter() {\n  const [count, setCount] = React.useState(0);\n  return (\n    <div>\n      <p>{count}</p>\n      <button onClick={() => setCount(c => c + 1)}>+1</button>\n    </div>\n  );\n}\n\n// React Compiler セットアップ（babel.config.js）:\n// module.exports = {\n//   plugins: [['babel-plugin-react-compiler', {}]]\n// };"

    code: "// 導入前（手動メモ化が必要だったコード）\nfunction UserList({ users, onSelect }) {\n  const sortedUsers = useMemo(\n    () => [...users].sort((a, b) => a.name.localeCompare(b.name)),\n    [users]\n  );\n  const handleSelect = useCallback(\n    (id: string) => onSelect(id),\n    [onSelect]\n  );\n  return (\n    <ul>\n      {sortedUsers.map(u => (\n        <li key={u.id} onClick={() => handleSelect(u.id)}>{u.name}</li>\n      ))}\n    </ul>\n  );\n}",
    answer: "// 導入後（コンパイラが自動で最適化）\nfunction UserList({ users, onSelect }: { users: User[]; onSelect: (id: string) => void }) {\n  // useMemo/useCallback を書かなくてよい\n  // コンパイラが自動でメモ化コードを挿入する\n  const sortedUsers = [...users].sort((a, b) => a.name.localeCompare(b.name));\n  return (\n    <ul>\n      {sortedUsers.map(u => (\n        <li key={u.id} onClick={() => onSelect(u.id)}>{u.name}</li>\n      ))}\n    </ul>\n  );\n}\n\n// 手動メモ化が依然として必要なケース:\n// 「外部ライブラリの参照同一性を要求する場合」\n// 例: react-virtualized の rowRenderer は毎回同じ参照を期待する\n// コンパイラはローカルスコープ内の最適化のみ行うため、\n// 外部 API との契約（referential equality の保証）は手動で行う必要がある。\nconst rowRenderer = useCallback(({ index, key, style }) => (\n  <div key={key} style={style}>{items[index]}</div>\n), [items]);"

    code: "// React 19 の use() フックを使って以下を実装:\n// 1. fetchUser(id) が返す Promise を use() で読み取る UserCard\n// 2. Suspense で ローディング UI を提供\n// 3. ErrorBoundary でエラーをキャッチ\n\nasync function fetchUser(id: string): Promise<{ name: string; email: string }> {\n  const res = await fetch('/api/users/' + id);\n  if (!res.ok) throw new Error('User not found');\n  return res.json();\n}",
    answer: "import { use, Suspense } from 'react';\n\n// use() は Suspense と統合: Promise が pending の間は throw する\nfunction UserCard({ promise }: { promise: Promise<{ name: string; email: string }> }) {\n  const user = use(promise); // pending → Suspense, reject → ErrorBoundary\n  return (\n    <div>\n      <h2>{user.name}</h2>\n      <p>{user.email}</p>\n    </div>\n  );\n}\n\n// ErrorBoundary（クラスコンポーネントが必要）\nclass ErrorBoundary extends React.Component<\n  { fallback: React.ReactNode; children: React.ReactNode },\n  { error: Error | null }\n> {\n  state = { error: null };\n  static getDerivedStateFromError(e: Error) { return { error: e }; }\n  render() {\n    if (this.state.error) {\n      return <div>エラー: {this.state.error.message}</div>;\n    }\n    return this.props.children;\n  }\n}\n\nfunction App() {\n  const userPromise = fetchUser('42');\n  return (\n    <ErrorBoundary fallback={<p>読み込みに失敗しました</p>}>\n      <Suspense fallback={<p>読み込み中...</p>}>\n        <UserCard promise={userPromise} />\n      </Suspense>\n    </ErrorBoundary>\n  );\n}"
  }, {

    code: "// Next.js 15 / React 19 環境を想定\n// Todo を追加する Server Function と、\n// それを使うクライアントコンポーネントを実装してください",
    answer: "// actions.ts（サーバ側）\n'use server';\n\nexport async function addTodo(\n  prevState: { todos: string[]; error: string | null },\n  formData: FormData\n) {\n  const text = formData.get('text') as string;\n  if (!text?.trim()) return { ...prevState, error: '入力してください' };\n  // DB 保存など（省略）\n  await new Promise(r => setTimeout(r, 500)); // 擬似的な遅延\n  return { todos: [...prevState.todos, text.trim()], error: null };\n}\n\n// TodoForm.tsx（クライアント側）\n'use client';\nimport { useActionState, useOptimistic } from 'react';\nimport { addTodo } from './actions';\n\nconst initialState = { todos: [] as string[], error: null as string | null };\n\nexport function TodoForm() {\n  const [state, dispatch, isPending] = useActionState(addTodo, initialState);\n  const [optimisticTodos, addOptimistic] = useOptimistic(\n    state.todos,\n    (prev, text: string) => [...prev, text + ' (保存中...)']\n  );\n\n  return (\n    <form action={(fd) => { addOptimistic(fd.get('text') as string); dispatch(fd); }}>\n      <input name=\"text\" placeholder=\"新しいTodo\" />\n      <button type=\"submit\" disabled={isPending}>追加</button>\n      {state.error && <p>{state.error}</p>}\n      <ul>{optimisticTodos.map((t, i) => <li key={i}>{t}</li>)}</ul>\n    </form>\n  );\n}"
  }],

    diff: 2,
    q: "react-reconciler を使って、コンソールに出力するだけのカスタムレンダラーを実装してください。\ncreateInstance と appendChild を中心に、最小限の hostConfig を実装すること。",
    code: "// npm install react-reconciler\n// 以下の hostConfig を完成させてください\nimport Reconciler from 'react-reconciler';\n\nconst hostConfig = {\n  // createInstance: ホスト環境のノードを作成\n  // appendChild: 子を親に追加\n  // ... 他のメソッド\n};\n\nconst renderer = Reconciler(hostConfig);",
    answer: "import Reconciler from 'react-reconciler';\nimport { DefaultEventPriority } from 'react-reconciler/constants';\n\n// コンソールに文字列を出力するだけのカスタムレンダラー\ntype Instance = { type: string; props: Record<string, unknown>; children: Instance[] };\ntype Container = { children: Instance[] };\n\nconst hostConfig: Reconciler.HostConfig<\n  string, Record<string, unknown>, Container, Instance,\n  string, unknown, unknown, unknown, null, unknown, unknown, unknown, unknown\n> = {\n  createInstance(type, props) {\n    const instance: Instance = { type, props, children: [] };\n    console.log('[create]', type, props);\n    return instance;\n  },\n  createTextInstance(text) {\n    console.log('[text]', text);\n    return text;\n  },\n  appendChildToContainer(container, child) { container.children.push(child as Instance); },\n  appendChild(parent, child) { (parent as Instance).children.push(child as Instance); },\n  appendInitialChild(parent, child) { (parent as Instance).children.push(child as Instance); },\n  removeChild(parent, child) {\n    const p = parent as Instance;\n    p.children = p.children.filter(c => c !== child);\n  },\n  commitUpdate(instance, _updatePayload, _type, _prev, next) {\n    console.log('[update]', (instance as Instance).type, next);\n    Object.assign((instance as Instance).props, next);\n  },\n  finalizeInitialChildren: () => false,\n  prepareUpdate: () => ({}),\n  shouldSetTextContent: () => false,\n  getRootHostContext: () => null,\n  getChildHostContext: (ctx) => ctx,\n  getPublicInstance: (i) => i,\n  prepareForCommit: () => null,\n  resetAfterCommit: () => {},\n  getCurrentEventPriority: () => DefaultEventPriority,\n  getInstanceFromNode: () => null,\n  beforeActiveInstanceBlur: () => {},\n  afterActiveInstanceBlur: () => {},\n  prepareScopeUpdate: () => {},\n  getInstanceFromScope: () => null,\n  detachDeletedInstance: () => {},\n  supportsMutation: true,\n  supportsPersistence: false,\n  supportsHydration: false,\n  isPrimaryRenderer: true,\n  scheduleTimeout: setTimeout,\n  cancelTimeout: clearTimeout,\n  noTimeout: -1,\n};\n\nconst renderer = Reconciler(hostConfig);\nconst container: Container = { children: [] };\nconst root = renderer.createContainer(container, 0, null, false, null, '', {}, null);\n\n// 使い方:\n// renderer.updateContainer(React.createElement('div', {}, 'Hello'), root, null, null);\n// console.log(JSON.stringify(container, null, 2));"

    diff: 3,
    q: "React Three Fiber のしくみを説明し、カスタムレンダラーが Three.js のシーングラフをどのように操作するかを示すコード例を書いてください。",
    code: "// React Three Fiber を使って回転するボックスを描画するコード\n// @react-three/fiber の Canvas と useFrame を使用",
    answer: "// React Three Fiber の仕組み:\n// 1. react-reconciler の hostConfig で THREE.Mesh などを createInstance で生成\n// 2. <mesh /> という JSX が THREE.Mesh の new をラップ\n// 3. props の変更が THREE オブジェクトのプロパティに自動的に反映される\n// 4. useFrame は requestAnimationFrame ループ内でコールバックを実行\n\nimport { Canvas, useFrame } from '@react-three/fiber';\nimport { useRef } from 'react';\nimport * as THREE from 'three';\n\nfunction RotatingBox() {\n  const meshRef = useRef<THREE.Mesh>(null);\n\n  // アニメーションループ: react-reconciler の commit とは独立\n  useFrame((_state, delta) => {\n    if (meshRef.current) {\n      meshRef.current.rotation.x += delta;\n      meshRef.current.rotation.y += delta * 0.5;\n    }\n  });\n\n  return (\n    // <mesh> は THREE.Mesh を作成、<boxGeometry> は THREE.BoxGeometry を作成\n    // react-three-fiber の hostConfig.createInstance が new THREE[type]() を呼ぶ\n    <mesh ref={meshRef}>\n      <boxGeometry args={[1, 1, 1]} />\n      <meshStandardMaterial color=\"hotpink\" />\n    </mesh>\n  );\n}\n\nexport function Scene() {\n  return (\n    <Canvas>\n      <ambientLight intensity={0.5} />\n      <pointLight position={[10, 10, 10]} />\n      <RotatingBox />\n    </Canvas>\n  );\n}\n\n// カスタムレンダラーとの関係:\n// Canvas の内部では ReactDOM ではなく R3F のカスタムレンダラーが動作。\n// <mesh> → hostConfig.createInstance('mesh', props) → new THREE.Mesh()\n// props 変更 → hostConfig.commitUpdate → mesh.position.set(...) など"
  }],

    code: "// Node.js + Express での SSR サーバ\n// renderToPipeableStream を使って\n// 段階的にHTMLをストリーミングする実装",
    answer: "import express from 'express';\nimport { renderToPipeableStream } from 'react-dom/server';\nimport { createElement } from 'react';\nimport App from './App';\n\nconst app = express();\n\napp.get('*', (req, res) => {\n  res.setHeader('Content-Type', 'text/html');\n\n  const { pipe, abort } = renderToPipeableStream(\n    createElement(App),\n    {\n      // ブラウザ側の JS バンドル\n      bootstrapScripts: ['/client.js'],\n\n      // 最初のシェル（Suspense の外側）が準備できたら配信開始\n      onShellReady() {\n        res.statusCode = 200;\n        pipe(res); // Node.js の Stream にパイプ\n      },\n\n      // Suspense の中身が解決するたびに追加の HTML チャンクが送信される\n      // → TTFB（最初のバイト到達）が短縮される\n      onError(err) {\n        console.error(err);\n        res.statusCode = 500;\n      },\n    }\n  );\n\n  // タイムアウト時に中断\n  setTimeout(() => abort(), 10000);\n});\n\n// Streaming SSR の利点:\n// - 最初の HTML 断片をすぐに送信 → TTFB 短縮\n// - ユーザーは全データ揃う前にページを見始められる\n// - サーバのメモリ効率向上（全 HTML をバッファしない）\n\n// Selective Hydration が解決すること:\n// - 従来の SSR: 全コンポーネントの hydration が完了するまでインタラクション不可\n// - Selective Hydration: ユーザーがクリックした部分を優先して hydration\n// - Suspense 境界ごとに独立して hydrate → 重い部分が軽い部分を妨げない\napp.listen(3000);"

    code: "// next.config.js で experimental.ppr: true を有効化した状態で\n// 商品詳細ページを PPR で実装してください\n// - 商品情報（静的）: ビルド時に生成\n// - ユーザー固有コンテンツ（動的）: リクエスト時に生成",
    answer: "// next.config.js\n// module.exports = { experimental: { ppr: true } };\n\n// app/products/[id]/page.tsx\nimport { Suspense } from 'react';\n\n// 静的部分: ビルド時に生成（CDN でキャッシュ可能）\nasync function ProductInfo({ id }: { id: string }) {\n  const product = await fetch('https://api.example.com/products/' + id, {\n    next: { revalidate: 3600 } // ISR: 1時間ごとに再生成\n  }).then(r => r.json());\n  return (\n    <div>\n      <h1>{product.name}</h1>\n      <p>{product.description}</p>\n      <p>¥{product.price.toLocaleString()}</p>\n    </div>\n  );\n}\n\n// 動的部分: リクエストごとに生成（cookies/headers に依存）\nasync function UserSpecificContent({ productId }: { productId: string }) {\n  const { cookies } = await import('next/headers');\n  const token = cookies().get('token')?.value;\n  // ユーザーのカート状態や在庫をリクエスト時に取得\n  const inventory = await fetch('https://api.example.com/inventory/' + productId, {\n    headers: { Authorization: 'Bearer ' + token },\n    cache: 'no-store' // キャッシュしない（動的）\n  }).then(r => r.json());\n  return <p>在庫: {inventory.count}個</p>;\n}\n\n// PPR: 静的シェルを先に配信し、動的コンテンツを Suspense で遅延\nexport default function ProductPage({ params }: { params: { id: string } }) {\n  return (\n    <div>\n      {/* 静的: ビルド時に HTML として埋め込まれる */}\n      <ProductInfo id={params.id} />\n      {/* 動的: ストリーミングで後から流し込む */}\n      <Suspense fallback={<p>在庫確認中...</p>}>\n        <UserSpecificContent productId={params.id} />\n      </Suspense>\n    </div>\n  );\n}"

    q: "Polymorphic Component（as プロップ）パターンを TypeScript で型安全に実装してください。\n<Button as='a'> とした場合に href が必須になるなど、as の型に応じて props が変わることを保証すること。",
    code: "// Box コンポーネントを型安全な Polymorphic Component として実装\n// <Box as=\"button\"> → button の props が使える\n// <Box as=\"a\"> → href など a タグの props が使える\n// デフォルトは div",
    answer: "import React from 'react';\n\n// ポリモーフィックコンポーネントの型定義\ntype AsProp<C extends React.ElementType> = { as?: C };\n\ntype PropsToOmit<C extends React.ElementType, P> = keyof (AsProp<C> & P);\n\ntype PolymorphicComponentProp<\n  C extends React.ElementType,\n  Props = Record<string, never>\n> = React.PropsWithChildren<Props & AsProp<C>> &\n  Omit<React.ComponentPropsWithoutRef<C>, PropsToOmit<C, Props>>;\n\ntype PolymorphicComponentPropWithRef<\n  C extends React.ElementType,\n  Props = Record<string, never>\n> = PolymorphicComponentProp<C, Props> & { ref?: React.ComponentPropsWithRef<C>['ref'] };\n\n// Box コンポーネント固有の props\ntype BoxOwnProps = { color?: 'primary' | 'secondary' };\n\ntype BoxProps<C extends React.ElementType> = PolymorphicComponentPropWithRef<C, BoxOwnProps>;\n\nfunction Box<C extends React.ElementType = 'div'>({\n  as,\n  color,\n  children,\n  ...rest\n}: BoxProps<C>) {\n  const Component = as || 'div';\n  const style = { color: color === 'primary' ? '#6366f1' : undefined };\n  return React.createElement(Component, { style, ...rest }, children);\n}\n\n// 使用例:\n// <Box>デフォルト div</Box>\n// <Box as=\"button\" onClick={...}>ボタン</Box>\n// <Box as=\"a\" href=\"/home\">リンク（href が型チェックされる）</Box>\n// <Box as=\"a\">← href がないので TypeScript が警告（任意属性のため警告止まり）</Box>"

    q: "Radix UI の Slot コンポーネントのしくみを説明し、asChild パターンを再現した簡易実装を書いてください。",
    code: "// Radix UI の asChild:\n// <Button asChild><a href=\"/home\">ホーム</a></Button>\n// → a タグに Button のスタイル・イベントをマージ\n// これを可能にする Slot コンポーネントを実装してください",
    answer: "import React from 'react';\n\n// Slot: children の要素に自身の props をマージして返す\nfunction Slot({ children, ...props }: React.HTMLAttributes<HTMLElement> & { children?: React.ReactNode }) {\n  if (!React.isValidElement(children)) return null;\n\n  // children の props と Slot の props をマージ\n  // onClick などのイベントハンドラは両方呼ばれるように合成\n  const mergedProps = mergeProps(props, children.props);\n  return React.cloneElement(children, mergedProps);\n}\n\nfunction mergeProps(\n  slotProps: Record<string, unknown>,\n  childProps: Record<string, unknown>\n): Record<string, unknown> {\n  const merged = { ...childProps };\n  for (const key in slotProps) {\n    const sp = slotProps[key];\n    const cp = childProps[key];\n    if (typeof sp === 'function' && typeof cp === 'function') {\n      // イベントハンドラは両方実行\n      merged[key] = (...args: unknown[]) => { sp(...args); cp(...args); };\n    } else {\n      // それ以外は Slot 側を優先\n      merged[key] = sp ?? cp;\n    }\n  }\n  return merged;\n}\n\n// asChild 対応ボタン\nfunction Button({ asChild, children, ...props }:\n  React.ButtonHTMLAttributes<HTMLButtonElement> & { asChild?: boolean }) {\n  const style = { background: '#6366f1', color: '#fff', padding: '8px 16px', borderRadius: 8, border: 'none', cursor: 'pointer' };\n  if (asChild) {\n    return React.createElement(Slot, { style, ...props }, children);\n  }\n  return React.createElement('button', { style, ...props }, children);\n}\n\n// 使い方:\n// <Button asChild><a href=\"/home\">ホームへ</a></Button>\n// → <a href=\"/home\" style={buttonStyle}>ホームへ</a> が生成される"

    code: "// 任意の型 T のリストを表示・選択できるコンポーネント\n// T は id: string と label: string を持つことを制約とする\n// 使用例:\n// <Select items={users} selectedId={id} onSelect={setId} />\n// <Select items={products} selectedId={id} onSelect={setId} />",
    answer: "import React from 'react';\n\n// ベース型制約\ninterface HasIdAndLabel { id: string; label: string; }\n\n// Generic コンポーネントの型定義\ninterface SelectProps<T extends HasIdAndLabel> {\n  items: T[];\n  selectedId: string | null;\n  onSelect: (item: T) => void;\n  renderItem?: (item: T) => React.ReactNode;\n}\n\n// 関数宣言形式で Generic コンポーネントを定義\nfunction Select<T extends HasIdAndLabel>({\n  items,\n  selectedId,\n  onSelect,\n  renderItem,\n}: SelectProps<T>) {\n  return (\n    <ul style={{ listStyle: 'none', padding: 0 }}>\n      {items.map(item => (\n        <li\n          key={item.id}\n          onClick={() => onSelect(item)}\n          style={{\n            padding: '8px 12px',\n            cursor: 'pointer',\n            background: item.id === selectedId ? '#eef2ff' : '#fff',\n            fontWeight: item.id === selectedId ? 700 : 400,\n            borderRadius: 6,\n          }}\n        >\n          {renderItem ? renderItem(item) : item.label}\n        </li>\n      ))}\n    </ul>\n  );\n}\n\n// 使用例（型安全）:\ninterface User extends HasIdAndLabel { email: string; }\n\nconst users: User[] = [\n  { id: '1', label: '田中太郎', email: 'tanaka@example.com' },\n  { id: '2', label: '鈴木花子', email: 'suzuki@example.com' },\n];\n\nfunction App() {\n  const [selectedId, setSelectedId] = React.useState<string | null>(null);\n  return (\n    <Select\n      items={users}\n      selectedId={selectedId}\n      onSelect={(u) => setSelectedId(u.id)} // u は User 型として推論される\n      renderItem={(u) => <span>{u.label} — {u.email}</span>}\n    />\n  );\n}"

    code: "// Modal コンポーネントに以下の2つのバリアントを実装:\n// 1. confirm: onConfirm, onCancel, confirmText が必須\n// 2. info: onClose が必須、confirmText は不要\n// バリアント間で誤った props を渡したときに型エラーになること",
    answer: "import React from 'react';\n\n// Discriminated Union で props を定義\ntype ConfirmModalProps = {\n  variant: 'confirm';\n  title: string;\n  message: string;\n  confirmText: string;\n  cancelText?: string;\n  onConfirm: () => void;\n  onCancel: () => void;\n};\n\ntype InfoModalProps = {\n  variant: 'info';\n  title: string;\n  message: string;\n  onClose: () => void;\n  // confirmText や onConfirm は存在しない\n};\n\ntype ModalProps = ConfirmModalProps | InfoModalProps;\n\nfunction Modal(props: ModalProps) {\n  const overlayStyle: React.CSSProperties = {\n    position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)',\n    display: 'flex', alignItems: 'center', justifyContent: 'center',\n  };\n  const boxStyle: React.CSSProperties = {\n    background: '#fff', borderRadius: 12, padding: 24,\n    minWidth: 320, maxWidth: 480,\n  };\n\n  return (\n    <div style={overlayStyle}>\n      <div style={boxStyle}>\n        <h2 style={{ marginBottom: 8 }}>{props.title}</h2>\n        <p style={{ marginBottom: 16, color: '#374151' }}>{props.message}</p>\n        {props.variant === 'confirm' ? (\n          <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>\n            <button onClick={props.onCancel}>{props.cancelText ?? 'キャンセル'}</button>\n            <button onClick={props.onConfirm}\n              style={{ background: '#6366f1', color: '#fff', border: 'none',\n                padding: '8px 16px', borderRadius: 8 }}>\n              {props.confirmText}\n            </button>\n          </div>\n        ) : (\n          <div style={{ textAlign: 'right' }}>\n            <button onClick={props.onClose}>閉じる</button>\n          </div>\n        )}\n      </div>\n    </div>\n  );\n}\n\n// 使用例:\n// <Modal variant=\"confirm\" title=\"削除確認\" message=\"本当に削除しますか？\"\n//   confirmText=\"削除\" onConfirm={handleDelete} onCancel={handleCancel} />\n// <Modal variant=\"info\" title=\"完了\" message=\"保存しました\" onClose={handleClose} />\n// <Modal variant=\"info\" onConfirm={...} />  ← 型エラー: variant=\"info\" に onConfirm は不要"

    body: "React の更新処理は2つのフェーズに分かれます。render phase（reconciliation）はコンポーネント関数を実行して新しい Fiber ツリーを構築し、前後の差分（Effect リスト）を計算する段階です。この段階は純粋であることが求められ、中断・再開・破棄が可能です。Strict Mode が開発時に effect を2回実行するのも、render phase の冪等性を検証するためです。\n\ncommit phase は算出した Effect リストを実際の DOM に適用する段階で、同期的かつ中断不可です。3つのサブフェーズがあり、before mutation（DOM 変更前の読み取り）→ mutation（DOM の実際の変更）→ layout（useLayoutEffect の実行）の順で行われます。useEffect は commit phase の後、非同期で実行されます。Python の ORM で言えば、render phase がクエリの構築で、commit phase がトランザクション内での実行に相当します。",
    code: "// render phase と commit phase の違いを確認するコード\nfunction Example() {\n  // render phase（再実行される可能性あり）\n  console.log('render phase: コンポーネント関数実行');\n\n  React.useEffect(() => {\n    // commit phase 後（非同期）\n    console.log('useEffect: DOM 更新後（非同期）');\n    return () => console.log('useEffect cleanup');\n  });\n\n  React.useLayoutEffect(() => {\n    // commit phase 中（同期）\n    console.log('useLayoutEffect: DOM 更新直後（同期）');\n    return () => console.log('useLayoutEffect cleanup');\n  });\n\n  return <div>Example</div>;\n}",

  sections: [{

    body: "React Compiler（旧称 React Forget）は、React コンポーネントとフックのコードを静的解析し、自動的にメモ化コードを挿入するコンパイラです。これまで開発者が手動で書いていた useMemo や useCallback を、コンパイラが最適なタイミングで自動的に挿入するようになります。React 19 と同時にオープンソースとして公開されました。\n\nコンパイラが動作する前提条件は「React のルールに従っていること」です。特に重要なのは純粋性（同じ入力には同じ出力）と、props/state/context 以外の外部値を render 中に変更しないことです。これらのルールを守っているコードは、コンパイラが確実に最適化できます。Python の型ヒントと同様に、ルールを守ることでツールの恩恵を最大限に受けられます。",

    title: "コンパイラの制約とデバッグ",
    body: "React Compiler が最適化できない主なパターンは「純粋性の違反」です。props を直接変更する（ミューテーション）、モジュールスコープの変数を render 中に変更する、Date.now() や Math.random() を依存なしで使う、などが代表例です。これらは Python で言えば、純粋関数の中でグローバル変数を書き換えるようなコードに相当します。\n\nコンパイラがどのようにコードを最適化したかは、React DevTools の「Memo（✓）」バッジで確認できます。最適化されたコンポーネントにはバッジが表示されます。コンパイラが最適化を諦めた箇所（bailout）は、eslint-plugin-react-compiler の警告として表示されます。コンパイラを使うことで、かえって最適化の「なぜ」を理解しやすくなる面もあります。",
    code: "// babel.config.js（React Compiler の設定）\nmodule.exports = {\n  plugins: [\n    ['babel-plugin-react-compiler', {\n      // 特定ファイルだけ有効化（段階的導入）\n      sources: (filename) => filename.includes('/src/components/'),\n      // 厳格モード（最適化できないとエラー）\n      // compilationMode: 'strict',\n    }],\n  ],\n};\n\n// 最適化されるコード（純粋）\nfunction PureComponent({ items }: { items: string[] }) {\n  // コンパイラが自動で useMemo 相当のコードを挿入\n  const sorted = [...items].sort();\n  return <ul>{sorted.map(i => <li key={i}>{i}</li>)}</ul>;\n}\n\n// 最適化されないコード（純粋性違反）\nfunction ImpureComponent({ items }: { items: string[] }) {\n  items.sort(); // ← props を直接変更！コンパイラがbailout\n  return <ul>{items.map(i => <li key={i}>{i}</li>)}</ul>;\n}",

    body: "TypeScript 4.9 で導入された satisfies 演算子は、「型チェックは行うが型を広げない」という特性を持ちます。as 型アサーションは型チェックをスキップするリスクがあり、明示的な型注釈は型を広げてしまい推論情報が失われますが、satisfies はその中間です。コンポーネントライブラリのバリアント定義やルート定義など、「型制約を満たしつつ詳細な型推論を保ちたい」場面で力を発揮します。\n\n具体的には、テーマトークンのオブジェクトや API エンドポイントのマップを satisfies で定義すると、文字列リテラル型として推論されながら、型制約（全てのトークンが string であること）も保証できます。Python の TypedDict に近い概念で、辞書の値を型で制約しつつ具体的な値を保持します。",
