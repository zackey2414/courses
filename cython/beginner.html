      answer: "# particle_system.pyx\nimport cython\nfrom libc.math cimport sqrt\nimport numpy as np\n\ncdef class ParticleSystem:\n    cdef double[:, ::1] positions   # (n, 2)\n    cdef double[:, ::1] velocities  # (n, 2)\n    cdef double[::1] masses         # (n,)\n    cdef int n\n    cdef double softening\n\n    def __init__(self, int n, double softening=0.01, int seed=42):\n        self.n = n\n        self.softening = softening\n        rng = np.random.default_rng(seed)\n        self.positions = np.ascontiguousarray(\n            rng.random((n, 2), dtype=np.float64)\n        )\n        self.velocities = np.zeros((n, 2), dtype=np.float64)\n        self.masses = np.ascontiguousarray(\n            rng.random(n, dtype=np.float64) + 0.1\n        )\n\n    @cython.boundscheck(False)\n    @cython.wraparound(False)\n    cdef void _compute_step(self, double dt):\n        \"\"\"1ステップの計算（全て C レベル）\"\"\"\n        cdef int i, j\n        cdef double dx, dy, r, f, fx, fy\n        forces_np = np.zeros((self.n, 2), dtype=np.float64)\n        cdef double[:, ::1] forces = forces_np\n\n        for i in range(self.n):\n            for j in range(i + 1, self.n):\n                dx = self.positions[j, 0] - self.positions[i, 0]\n                dy = self.positions[j, 1] - self.positions[i, 1]\n                r = sqrt(dx*dx + dy*dy + self.softening*self.softening)\n                f = self.masses[i] * self.masses[j] / (r * r * r)\n                fx = f * dx\n                fy = f * dy\n                forces[i, 0] += fx\n                forces[i, 1] += fy\n                forces[j, 0] -= fx\n                forces[j, 1] -= fy\n\n        for i in range(self.n):\n            self.velocities[i, 0] += forces[i, 0] / self.masses[i] * dt\n            self.velocities[i, 1] += forces[i, 1] / self.masses[i] * dt\n            self.positions[i, 0] += self.velocities[i, 0] * dt\n            self.positions[i, 1] += self.velocities[i, 1] * dt\n\n    def simulate(self, int steps, double dt=0.001):\       answer: "# nbody_parallel.pyx\nimport cython\nfrom cython.parallel import prange\nfrom libc.math cimport sqrt\nimport numpy as np\n\n@cython.boundscheck(False)\n@cython.wraparound(False)\ndef step_parallel(double[:, ::1] positions,\n                  double[:, ::1] velocities,\n                  double[::1] masses,\n                  double dt=0.001,\n                  double softening=0.01):\n    \"\"\"prange で並列化した step 関数\"\"\"\n    cdef int n = positions.shape[0]\n    cdef int i, j\n    cdef double dx, dy, r, f, fx, fy\n\n    # 各粒子ごとに独立した力を計算（レースコンディション回避）\n    # 方法: 対称性を使わず、各 i について全 j を走査\n    # 計算量は2倍になるが、並列化の利得が上回る\n    forces_np = np.zeros((n, 2), dtype=np.float64)\n    cdef double[:, ::1] forces = forces_np\n\n    for i in prange(n, nogil=True, schedule=\"dynamic\"):\n        for j in range(n):\n            if i == j:\n                continue\n            dx = positions[j, 0] - positions[i, 0]\n            dy = positions[j, 1] - positions[i, 1]\n            r = sqrt(dx*dx + dy*dy + softening*softening)\n            f = masses[i] * masses[j] / (r * r * r)\n            # forces[i] は i スレッドのみが書き込む → 競合なし\n            forces[i, 0] = forces[i, 0] + f * dx\n            forces[i, 1] = forces[i, 1] + f * dy\n\n    # 位置・速度の更新（独立なので安全に並列化）\n    for i in prange(n, nogil=True):\n        velocities[i, 0] = velocities[i, 0] + forces[i, 0] / masses[i] * dt\n        velocities[i, 1] = velocities[i, 1] + forces[i, 1] / masses[i] * dt\n        positions[i, 0] = positions[i, 0] + velocities[i, 0] * dt\n        positions[i, 1] = positions[i, 1] + velocities[i, 1] * dt\n\n# === 並列化のポイント ===\n# 1. 対称性トリック（i<j）は使わない\n#    → forces[j] への書き込みが競合するため\n# 2. 代わりに各 i が全 j を走査する\n#    → forces[i] は粒子 i のスレッドだけが書き込む\n# 3. schedule=\"dynamic\" で負荷の偏りに対応\n# 4. 計算量は O(n^2)（定数倍は増えるが並列化で補う）"

ic\"):\n        temp = 0.0\n        for j in range(work_sizes[i]):\n            temp = temp + sqrt(<double>j)\n        total = total + temp\n    return total\n\n# --- bench_schedule.py ---\nimport numpy as np\nimport timeit\nfrom schedule_bench import *\n\n# 均一負荷テスト\narr = np.random.rand(10_000_000)\nfor name, func in [(\"static\", uniform_static),\n                   (\"dynamic\", uniform_dynamic),\n                   (\"guided\", uniform_guided)]:\n    t = timeit.timeit(lambda: func(arr), number=20)\n    print(f\"均一 {name:10s}: {t:.4f}秒\")\n\n# 不均一負荷テスト（要素ごとに作業量が違う）\nwork = np.array([i * 100 for i in range(1000)], dtype=np.intc)\nfor name, func in [(\"static\", variable_static),\n                   (\"dynamic\", variable_dynamic)]:\n    t = timeit.timeit(lambda: func(work), number=20)\n    print(f\"不均一 {name:10s}: {t:.4f}秒\")\n\n# 期待結果:\n# 均一負荷: static が最速（分配オーバーヘッドが最小）\n# 不均一負荷: dynamic が最速（遅いタスクを他スレッドが補う）"

ng = np.random.default_rng(42)\n    pos = rng.random((50, 2))\n    vel = np.zeros((50, 2))\n    mass = rng.random(50) + 0.1\n    for _ in range(10):\n        step(pos, vel, mass)\n    print(f\"最終位置の平均: ({pos[:,0].mean():.4f}, {pos[:,1].mean():.4f})\")"

        body: "このコースでは、重力で相互作用する N 個の粒子の運動をシミュレートする「N体問題」を題材にします。まず純粋な Python で動くプロトタイプを作り、それを章を追うごとに Cython で高速化していきます。最終的には数百倍の速度向上を達成し、パッケージとして配布できる状態まで仕上げます。\n\nN体シミュレーションは天体力学やゲーム物理でよく使われる古典的な問題です。全粒子ペアについて重力を計算するため計算量は O(n²) となり、Python のような動的型付け言語では粒子数が増えるとすぐに性能の壁にぶつかります。しかし計算の本質は単純な算術ループなので、Cython で静的型を与えれば劇的に高速化できます。この特性が、Cython の学習題材として最適な理由です。\n\nまずはプロファイリングから始めましょう。最適化において最も重要なのは「測定してから改善する」という原則です。闇雲にコードを書き換えても、ボトルネックでない箇所を最適化しては意味がありません。",
        code: "# nbody_pure.py — 純粋 Python による N体シミュレーション\nimport math\nimport random\n\ndef compute_force(m1, m2, dx, dy, softening=0.01):\n    \"\"\"2粒子間の重力ベクトルを計算する\"\"\"\n    r = math.sqrt(dx*dx + dy*dy + softening*softening)\n    f = (m1 * m2) / (r * r * r)\n    return f * dx, f * dy\n\ndef step(positions, velocities, masses, dt=0.001, softening=0.01):\n    \"\"\"1タイムステップ分の力の計算と位置更新\"\"\"\n    n = len(positions)\n    forces = [[0.0, 0.0] for _ in range(n)]\n    # 全ペアの力を計算（O(n²)）\n    for i in range(n):\n        for j in range(i + 1, n):\n            dx = positions[j][0] - positions[i][0]\n            dy = positions[j][1] - positions[i][1]\n            fx, fy = compute_force(masses[i], masses[j], dx, dy, softening)\n            forces[i][0] += fx;  forces[i][1] += fy\n            forces[j][0] -= fx;  forces[j][1] -= fy\n    # 速度と位置を更新\n    for i in range(n):\n        velocities[i][0] += forces[i][0] / masses[i] * dt\n        velocities[i][1] += forces[i][1] / masses[i] * dt\n        positions[i][0] += velocities[i][0] * dt\n        positions[i][1] += velocities[i][1] * dt\n\ndef run_simulation(n_particles=100, n_steps=100):\n    \"\"\"シミュレーション全体を実行する\"\"\"\n    random.seed(42)\n    positions = [[random.random(), random.random()] for _ in range(n_particles)]\n    velocities = [[0.0, 0.0] for _ in range(n_particles)]\n    masses = [random.random() + 0.1 for _ in range(n_particles)]\n    for _ in range(n_steps):\n        step(positions, velocities, masses)\n    return positions\n\nif __name__ == \"__main__\":\n    result = run_simulation()\n    print(f\"完了: {len(result)} 粒子\")",

        body: "Cython パッケージの配布には、現代的なパッケージングツールの知識が必要です。PEP 621 で標準化された pyproject.toml を使い、ビルドシステム・プロジェクトメタデータ・依存関係を一元管理します。Cython の場合、ビルド時に Cython と NumPy（ヘッダー用）が必要なため、build-system.requires にこれらを含めます。\n\nsetup.py は Cython 拡張モジュールのビルド手順を定義するためにまだ必要です。pyproject.toml の [build-system] で setuptools をバックエンドに指定し、setup.py で Extension と cythonize を設定します。将来的には Meson や scikit-build-core などの代替バックエンドも選択肢になりますが、現時点では setuptools + Cython.Build が最も実績のある組み合わせです。\n\nソース配布（sdist）には .pyx ファイルと .pxd ファイルを含める必要があります。MANIFEST.in でこれらを明示的に指定します。生成された .c ファイルを含めるかどうかは方針次第ですが、含めるとインストール時に Cython が不要になる利点があります。",
        code: "# === pyproject.toml ===\n[build-system]\nrequires = [\n    \"setuptools>=68.0\",\n    \"Cython>=3.0\",\n    \"numpy>=1.24\",\n]\nbuild-backend = \"setuptools.build_meta\"\n\n[project]\nname = \"nbody-sim\"\nversion = \"0.1.0\"\ndescription = \"Cython で高速化した N 体シミュレーション\"\nreadme = \"README.md\"\nrequires-python = \">=3.9\"\nlicense = {text = \"MIT\"}\nauthors = [\n    {name = \"Your Name\", email = \"you@example.com\"},\n]\ndependencies = [\n    \"numpy>=1.24\",\n]\n\n[project.optional-dependencies]\ndev = [\n    \"pytest>=7.0\",\n    \"line-profiler>=4.0\",\n    \"cython>=3.0\",\n    \"build\",\n]\n\n[tool.setuptools.packages.find]\nwhere = [\"src\"]\n\n# === MANIFEST.in ===\n# recursive-include src *.pyx *.pxd *.py\n# include pyproject.toml setup.py\n# include README.md LICENSE",
        afterCode: "pyproject.toml の requires-python は対応する Python バージョンの下限を示します。Cython 3.x は Python 3.8 以降をサポートしますが、NumPy の最新版が Python 3.9 以降を要求するため、>=3.9 が実用的な下限です。",

      {
        title: "setup.py と wheel のビルド",
        body: "setup.py では Extension オブジェクトで各 .pyx ファイルのコンパイル設定を定義します。複数のモジュールがある場合はリストで渡し、OpenMP が必要なモジュールには extra_compile_args と extra_link_args を個別に設定します。cythonize の compiler_directives でプロジェクト全体のデフォルトディレクティブを指定できます。\n\nwheel（ホイール）はコンパイル済みの配布形式で、インストール時にビルドが不要です。Cython パッケージは C 拡張を含むため、プラットフォームごとに異なる wheel が必要です。python -m build --wheel でビルドできますが、これは現在のプラットフォーム用の wheel しか作れません。\n\n複数プラットフォーム向けの wheel を自動ビルドするには cibuildwheel を使います。このツールは Docker コンテナ（Linux）やネイティブ環境（macOS/Windows）を使って、各プラットフォーム・各 Python バージョン向けの wheel を自動生成します。CI/CD パイプラインに組み込むのが一般的です。",
        code: "# === setup.py（複数モジュール対応）===\nimport os\nimport sys\nfrom setuptools import setup, Extension\nfrom Cython.Build import cythonize\nimport numpy as np\n\n# OpenMP フラグの判定\nif sys.platform == \"win32\":\n    omp = {\"compile\": [\"/openmp\"], \"link\": []}\nelif sys.platform == \"darwin\":\n    omp = {\n        \"compile\": [\"-Xpreprocessor\", \"-fopenmp\"],\n        \"link\": [\"-lomp\"]\n    }\nelse:\n    omp = {\"compile\": [\"-fopenmp\"], \"link\": [\"-fopenmp\"]}\n\ncommon_include = [np.get_include()]\n\nextensions = [\n    # 通常のモジュール\n    Extension(\n        \"nbody_sim.physics\",\n        [\"src/nbody_sim/physics.pyx\"],\n        include_dirs=common_include,\n    ),\n    Extension(\n        \"nbody_sim.system\",\n        [\"src/nbody_sim/system.pyx\"],\n        include_dirs=common_include,\n    ),\n    # OpenMP 対応モジュール\n    Extension(\n        \"nbody_sim.parallel\",\n        [\"src/nbody_sim/parallel.pyx\"],\n        include_dirs=common_include,\n        extra_compile_args=omp[\"compile\"],\n        extra_link_args=omp[\"link\"],\n    ),\n]\n\nsetup(\n    ext_modules=cythonize(\n        extensions,\n        compiler_directives={\n            \"language_level\": \"3\",\n            \"boundscheck\": False,\n            \"wraparound\": False,\n        },\n        annotate=True,\n    ),\n)\n\n# === ビルドコマンド ===\n# 開発用: pip install -e \".[dev]\"\n# wheel:  python -m build --wheel\n# sdist:  python -m build --sdist",

        title: "CI/CD パイプラインと PyPI 公開",
        body: "GitHub Actions を使って、プッシュやタグ作成をトリガーにテスト・ビルド・公開を自動化します。典型的なパイプラインは3つのジョブで構成されます。test ジョブで複数の Python バージョンでテストを実行し、build-wheels ジョブで cibuildwheel を使って各プラットフォームの wheel を生成し、publish ジョブで PyPI にアップロードします。\n\ncibuildwheel は Linux では manylinux Docker イメージ内でビルドすることで、glibc の互換性を保証します。macOS と Windows ではネイティブ環境でビルドします。CIBW_BUILD 環境変数で対象の Python バージョンとプラットフォームを指定し、CIBW_BEFORE_BUILD で Cython と NumPy のインストールを行います。\n\nPyPI への公開は Trusted Publishing（OIDC）を使うのが現代のベストプラクティスです。API トークンをシークレットに保存する従来の方式よりも安全で、GitHub リポジトリと PyPI プロジェクトを直接紐付けられます。タグ（v0.1.0 など）をプッシュしたときだけ publish ジョブが実行されるよう、if: startsWith(github.ref, 'refs/tags/v') で条件を付けます。",
        code: "# === .github/workflows/ci.yml ===\nname: CI/CD\n\non:\n  push:\n    branches: [main]\n    tags: [\"v*\"]\n  pull_request:\n    branches: [main]\n\njobs:\n  test:\n    runs-on: ubuntu-latest\n    strategy:\n      matrix:\n        python-version: [\"3.9\", \"3.10\", \"3.11\", \"3.12\"]\n    steps:\n      - uses: actions/checkout@v4\n      - uses: actions/setup-python@v5\n        with:\n          python-version: ${{ matrix.python-version }}\n      - run: pip install -e \".[dev]\"\n      - run: pytest tests/ -v\n\n  build-wheels:\n    needs: test\n    runs-on: ${{ matrix.os }}\n    strategy:\n      matrix:\n        os: [ubuntu-latest, macos-latest, windows-latest]\n    steps:\n      - uses: actions/checkout@v4\n      - uses: actions/setup-python@v5\n        with:\n          python-version: \"3.11\"\n      - run: pip install cibuildwheel==2.21.3\n      - run: cibuildwheel --output-dir wheelhouse\n        env:\n          CIBW_BUILD: \"cp39-* cp310-* cp311-* cp312-*\"\n          CIBW_SKIP: \"*-musllinux_*\"\n          CIBW_BEFORE_BUILD: \"pip install numpy cython\"\n          CIBW_TEST_COMMAND: \"pytest {project}/tests -v\"\n          CIBW_TEST_REQUIRES: \"pytest numpy\"\n      - uses: actions/upload-artifact@v4\n        with:\n          name: wheels-${{ matrix.os }}\n          path: wheelhouse/*.whl\n\n  publish:\n    needs: build-wheels\n    runs-on: ubuntu-latest\n    if: startsWith(github.ref, 'refs/tags/v')\n    permissions:\n      id-token: write\n    steps:\n      - uses: actions/download-artifact@v4\n        with:\n          path: dist/\n          merge-multiple: true\n      - uses: pypa/gh-action-pypi-publish@release/v1",
