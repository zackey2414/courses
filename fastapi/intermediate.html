    build: ./user_service
    environment:
      DATABASE_URL: postgresql+asyncpg://user:pass@db/users

  order-service:
    build: ./order_service
    environment:
      DATABASE_URL: postgresql+asyncpg://user:pass@db/orders

  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: pass`,
        afterCode: "docker-compose up --build で全サービスを一括起動できます。本番ではKubernetesへの移行を見据えて、各サービスのDockerfileをマルチステージビルドで最適化しておくと移行コストが下がります。"
      },
      {
        title: "httpxを使ったサービス間通信",
        body: "FastAPIサービスが別のマイクロサービスと通信するには、httpxのAsyncClientを使います。アプリのlifespan（起動・終了）でクライアントを1つ生成してapp.stateに保持し、Dependsで各エンドポイントに渡すことでコネクション再利用ができ、効率的です。\n\nサービス間通信では障害を前提に設計します。タイムアウト・リトライ・フォールバックを必ず実装し、依存サービスが落ちてもクライアントへの影響を最小化する設計が重要です。HTTPXにはリトライはありませんが、tenacityライブラリと組み合わせると宣言的に書けます。",
        code: `import httpx
from fastapi import FastAPI, Depends, HTTPException
from contextlib import asynccontextmanager

@asynccontextmanager
async def lifespan(app: FastAPI):
    app.state.client = httpx.AsyncClient(
        base_url="http://user-service",
        timeout=httpx.Timeout(connect=2.0, read=5.0, write=5.0, pool=2.0)
    )
    yield
    await app.state.client.aclose()

app = FastAPI(lifespan=lifespan)

async def get_http_client():
    return app.state.client

@app.get("/orders/{order_id}/user")
async def get_order_user(
    order_id: int,
    client: httpx.AsyncClient = Depends(get_http_client)
):
    try:
        resp = await client.get(f"/users/{order_id}")
        resp.raise_for_status()
        return resp.json()
    except httpx.TimeoutException:
        raise HTTPException(503, "User service unavailable")
    except httpx.HTTPStatusError as e:
        raise HTTPException(e.response.status_code, "Upstream error")`,
        afterCode: "lifespan を使うことでアプリ起動・終了時の処理を明示的に管理できます。on_event(\"startup\") は非推奨になっているため、新しいコードでは lifespan を使いましょう。コース修了後はぜひ本番環境でこれらのパターンを試してみてください。"
      }
    ]
  }
];
