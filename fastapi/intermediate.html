from datetime import datetime, timedelta, timezone
from fastapi import Depends, HTTPException, status
from fastapi.security import OAuth2PasswordBearer

SECRET_KEY = "your-secret-key"
ALGORITHM = "HS256"
oauth2_scheme = OAuth2PasswordBearer(tokenUrl="/auth/token")

def create_access_token(sub: str, expires_min: int = 30) -> str:
    payload = {
        "sub": sub,
        "exp": datetime.now(timezone.utc) + timedelta(minutes=expires_min),
        "iat": datetime.now(timezone.utc),
    }
    return jwt.encode(payload, SECRET_KEY, algorithm=ALGORITHM)

async def get_current_user(token: str = Depends(oauth2_scheme)):
    creds_exc = HTTPException(
        status_code=status.HTTP_401_UNAUTHORIZED,
        detail="認証情報が無効です",
        headers={"WWW-Authenticate": "Bearer"},
    )
    try:
        payload = jwt.decode(token, SECRET_KEY, algorithms=[ALGORITHM])
        sub: str = payload.get("sub")
        if sub is None:
            raise creds_exc
        return sub
    except jwt.ExpiredSignatureError:
        raise HTTPException(status_code=401, detail="トークンの有効期限切れ")
    except jwt.InvalidTokenError:
        raise creds_exc`

    answer: `from sqlalchemy.ext.asyncio import AsyncSession
from sqlalchemy import select
from app.models.todo import Todo

class TodoRepository:
    def __init__(self, session: AsyncSession):
        self.session = session

    async def get_by_id(self, todo_id: int) -> Todo | None:
        return await self.session.get(Todo, todo_id)

    async def get_all(self) -> list[Todo]:
        result = await self.session.execute(select(Todo))
        return list(result.scalars().all())

    async def create(self, title: str, description: str | None) -> Todo:
        todo = Todo(title=title, description=description)
        self.session.add(todo)
        await self.session.flush()
        await self.session.refresh(todo)
        return todo

    async def delete(self, todo_id: int) -> bool:
        todo = await self.get_by_id(todo_id)
        if todo is None:
            return False
        await self.session.delete(todo)
        return True`

from starlette.middleware.base import BaseHTTPMiddleware
from starlette.responses import Response
import uuid

app = FastAPI()

class RequestIDMiddleware(BaseHTTPMiddleware):
    async def dispatch(
        self, request: Request, call_next
    ) -> Response:
        request_id = request.headers.get(
            "X-Request-ID", str(uuid.uuid4())
        )
        response = await call_next(request)

    }, React.createElement("code", null, code))
  );
}

function Exercise({ ex, chId }) {
  const [open, setOpen] = useState(false);
  const stars = "⭐".repeat(ex.diff);
  return React.createElement("div", {
    style: {
      border: "1px solid #e9d5ff", borderRadius: "12px",
      marginBottom: "16px", background: "#fdf4ff", overflow: "hidden"
    }
  },
    React.createElement("div", { style: { padding: "16px 20px" } },
      React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: "12px" } },
        React.createElement("div", { style: { flex: 1 } },
          React.createElement("div", { style: { fontSize: "13px", color: "#7c3aed", fontWeight: 700, marginBottom: "6px" } }, stars),
          React.createElement("pre", {
            style: {
              whiteSpace: "pre-wrap", fontSize: "13.5px", lineHeight: 1.7,
              color: "#374151", fontFamily: "'Noto Sans JP', sans-serif", margin: 0
            }
          }, ex.q)
        )
      ),
      ex.code && React.createElement(Code, { code: ex.code })
    ),
    React.createElement("div", { style: { borderTop: "1px solid #e9d5ff" } },
      React.createElement("button", {
        onClick: () => setOpen(!open),
        style: {
          width: "100%", padding: "12px 20px", background: "none",
          border: "none", textAlign: "left", cursor: "pointer",
          color: "#7c3aed", fontWeight: 600, fontSize: "13px",
          display: "flex", alignItems: "center", gap: "6px"
        }
      }, open ? "▼ 解答を閉じる" : "▶ 解答を見る"),
      open && React.createElement("div", { style: { padding: "0 20px 16px" } },
        React.createElement(Code, { code: ex.answer })
      )
    )
  );
}

function Section({ sec, chId }) {
  const [open, setOpen] = useState(false);
  return React.createElement("div", {
    style: {
      border: "1px solid #e5e7eb", borderRadius: "12px",
      marginBottom: "12px", background: "#fff", overflow: "hidden"
    }
  },
    React.createElement("button", {
      onClick: () => setOpen(!open),
      style: {
        width: "100%", padding: "16px 20px", background: "none",
        border: "none", textAlign: "left", cursor: "pointer",
        display: "flex", justifyContent: "space-between", alignItems: "center"
      }
    },
      React.createElement("span", { style: { fontWeight: 700, fontSize: "15px", color: "#1e1b4b" } }, sec.title),
      React.createElement("span", { style: { color: "#6366f1", fontSize: "18px" } }, open ? "−" : "+")
    ),
    open && React.createElement("div", { style: { padding: "0 20px 20px", borderTop: "1px solid #f3f4f6" } },
      sec.body && sec.body.split("\n\n").map((p, i) =>
        React.createElement("p", {
          key: i,
          style: { fontSize: "14px", lineHeight: 1.85, color: "#374151", marginTop: "14px" }
        }, p)
      ),
      sec.table && React.createElement(DataTable, { tableKey: sec.table }),
      sec.afterTable && React.createElement("p", {
        style: {
          fontSize: "13.5px", lineHeight: 1.8, color: "#4b5563",
          background: "#f0fdf4", borderLeft: "3px solid #22c55e",
          padding: "10px 14px", borderRadius: "0 8px 8px 0", marginTop: "12px"
        }
      }, sec.afterTable),
      sec.code && React.createElement(Code, { code: sec.code }),
      sec.afterCode && React.createElement("p", {
        style: {
          fontSize: "13.5px", lineHeight: 1.8, color: "#4b5563",
          background: "#eff6ff", borderLeft: "3px solid #3b82f6",
          padding: "10px 14px", borderRadius: "0 8px 8px 0", marginTop: "12px"
        }
      }, sec.afterCode)
    )
  );
}

/* ── Main App ── */
function FastAPIIntermediateCourse() {
  const [chIdx, setChIdx] = useState(0);
  const ch = chapters[chIdx];
  const totalChapters = chapters.length;
  const totalExercises = Object.values(EX).reduce((s, arr) => s + arr.length, 0);

  const goTo = (i) => {
    setChIdx(i);
    window.scrollTo({ top: 0, behavior: "smooth" });

  return React.createElement("div", { style: { background: "linear-gradient(135deg,#f5f3ff 0%,#ede9fe 50%,#ddd6fe 100%)", minHeight: "100vh" } },
    React.createElement("div", { style: { padding: "40px 20px 80px" } },

      /* Hero */
      React.createElement("div", {
        style: {
          textAlign: "center", marginBottom: "48px", padding: "52px 24px",

        React.createElement("div", { style: { display: "flex", gap: "24px", justifyContent: "center", flexWrap: "wrap" } },

            ["📚", `${totalChapters} 章`],
            ["🏋️", `${totalExercises} 演習`],
            ["⏱️", "約 7.5 時間"]

              key: label,

                background: "rgba(255,255,255,0.18)", borderRadius: "12px",
                padding: "12px 22px", fontWeight: 700, fontSize: "15px"
              }
            }, `${icon} ${label}`)

        )

      /* Chapter nav */
      React.createElement("div", {
        style: { display: "flex", gap: "8px", flexWrap: "wrap", marginBottom: "32px", justifyContent: "center" }

        chapters.map((c, i) =>
          React.createElement("button", {
            key: c.id,
            onClick: () => goTo(i),
            style: {
              padding: "8px 16px", borderRadius: "20px", border: "none",
              cursor: "pointer", fontWeight: 600, fontSize: "13px",
              background: i === chIdx ? "linear-gradient(90deg,#6366f1,#8b5cf6)" : "rgba(255,255,255,0.7)",
              color: i === chIdx ? "#fff" : "#6b7280",
              boxShadow: i === chIdx ? "0 4px 12px rgba(99,102,241,0.3)" : "none",
              transition: "all 0.15s"

      ),

      React.createElement("div", { style: { background: "rgba(255,255,255,0.85)", borderRadius: "20px", padding: "32px", boxShadow: "0 8px 32px rgba(99,102,241,0.1)", marginBottom: "32px" } },
        React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: "12px", marginBottom: "20px" } },

            React.createElement("h2", { style: { fontSize: "clamp(20px,3vw,28px)", fontWeight: 900, color: "#1e1b4b" } }, ch.title)

          React.createElement("p", { style: { fontSize: "14px", lineHeight: 1.8, color: "#4b5563" } }, ch.goal)
        ),

        /* Sections */
        React.createElement("div", { style: { marginBottom: "32px" } },
          ch.sections.map((sec, i) =>
            React.createElement(Section, { key: `${ch.id}-sec-${i}`, sec, chId: ch.id })

      React.createElement("div", { style: { display: "flex", justifyContent: "space-between", gap: "12px" } },

        chIdx < totalChapters - 1

root.render(React.createElement(FastAPIIntermediateCourse));
