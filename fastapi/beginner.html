    answer: "from sqlalchemy import select\nfrom sqlalchemy.ext.asyncio import AsyncSession\nfrom app.models.todo import Todo\nfrom app.schemas.todo import TodoCreate, TodoUpdate\n\nclass TodoRepository:\n    def __init__(self, session: AsyncSession):\n        self.session = session\n\n    async def create(self, data: TodoCreate) -> Todo:\n        todo = Todo(**data.model_dump())\n        self.session.add(todo)\n        await self.session.flush()\n        await self.session.refresh(todo)\n        return todo\n\n    async def get_by_id(self, todo_id: int) -> Todo | None:\n        stmt = select(Todo).where(Todo.id == todo_id)\n        result = await self.session.execute(stmt)\n        return result.scalar_one_or_none()\n\n    async def list_all(self) -> list[Todo]:\n        stmt = select(Todo).order_by(Todo.created_at.desc())\n        result = await self.session.execute(stmt)\n        return list(result.scalars().all())\n\n    async def update(\n        self, todo_id: int, data: TodoUpdate\n    ) -> Todo | None:\n        todo = await self.get_by_id(todo_id)\n        if todo is None:\n            return None\n        for key, val in data.model_dump(\n            exclude_unset=True\n        ).items():\n            setattr(todo, key, val)\n        await self.session.flush()\n        await self.session.refresh(todo)\n        return todo\n\n    async def delete(self, todo_id: int) -> bool:\n        todo = await self.get_by_id(todo_id)\n        if todo is None:\n            return False\n        await self.session.delete(todo)\n        await self.session.flush()\n        return True"

    code: "# GET /todos?sort_by=created_at&order=desc\n# レスポンス: { items: [...], total: 50, ... }",
    answer: "from enum import Enum\nfrom pydantic import BaseModel\nfrom fastapi import APIRouter, Depends, Query\nfrom sqlalchemy import select, func, asc, desc\nfrom sqlalchemy.ext.asyncio import AsyncSession\n\nclass SortOrder(str, Enum):\n    asc = \"asc\"\n    desc = \"desc\"\n\nclass PaginatedResponse(BaseModel):\n    items: list[TodoResponse]\n    total: int\n    skip: int\n    limit: int\n    has_next: bool\n\n    model_config = {\"from_attributes\": True}\n\n@router.get(\"\", response_model=PaginatedResponse)\nasync def list_todos(\n    skip: int = Query(default=0, ge=0),\n    limit: int = Query(default=20, ge=1, le=100),\n    sort_by: str = Query(default=\"created_at\"),\n    order: SortOrder = Query(default=SortOrder.desc),\n    db: AsyncSession = Depends(get_db),\n):\n    # 総件数\n    count_stmt = select(func.count(Todo.id))\n    total = (await db.execute(count_stmt)).scalar()\n\n    # ソート\n    col = getattr(Todo, sort_by, Todo.created_at)\n    order_func = desc if order == SortOrder.desc else asc\n\n    stmt = (\n        select(Todo)\n        .order_by(order_func(col))\n        .offset(skip)\n        .limit(limit)\n    )\n    result = await db.execute(stmt)\n    items = list(result.scalars().all())\n\n    return PaginatedResponse(\n        items=items,\n        total=total,\n        skip=skip,\n        limit=limit,\n        has_next=(skip + limit) < total,\n    )"

    answer: "# app/core/logging.py\nimport structlog\n\ndef setup_logging():\n    structlog.configure(\n        processors=[\n            structlog.contextvars.merge_contextvars,\n            structlog.processors.add_log_level,\n            structlog.processors.TimeStamper(\n                fmt=\"iso\"\n            ),\n            structlog.dev.ConsoleRenderer(),\n        ],\n        logger_factory=structlog.PrintLoggerFactory(),\n    )\n\n# app/middleware/logging.py\nimport time\nimport uuid\nfrom starlette.middleware.base import (\n    BaseHTTPMiddleware\n)\nfrom starlette.requests import Request\nimport structlog\n\nlogger = structlog.get_logger()\n\nclass LoggingMiddleware(BaseHTTPMiddleware):\n    async def dispatch(self, request: Request, call_next):\n        request_id = str(uuid.uuid4())[:8]\n        structlog.contextvars.clear_contextvars()\n        structlog.contextvars.bind_contextvars(\n            request_id=request_id\n        )\n\n        start = time.perf_counter()\n        response = await call_next(request)\n        elapsed = time.perf_counter() - start\n\n        await logger.ainfo(\n            \"request\",\n            method=request.method,\n            path=str(request.url.path),\n            status=response.status_code,\n            duration_ms=round(elapsed * 1000, 2),\n        )\n        response.headers[\"X-Request-ID\"] = request_id\n        return response\n\n# app/main.py での登録:\n# from app.core.logging import setup_logging\n# from app.middleware.logging import LoggingMiddleware\n# setup_logging()\n# app.add_middleware(LoggingMiddleware)"

  sections: [{

    title: "非同期エンジンとセッション管理",
    body: "FastAPI は非同期フレームワークなので、SQLAlchemy も非同期で使うのが自然です。create_async_engine で非同期エンジンを作り、async_sessionmaker でセッションファクトリを構成します。\n\nセッション管理で最も重要なのは「リクエストごとにセッションを作り、処理が終わったら確実に閉じる」ことです。Python のジェネレータ（yield）を使った依存関数でこれを実現します。yield の前でセッションを返し、yield の後で後処理（コミットまたはロールバック）を行います。\n\nこの get_db パターンは FastAPI の事実上の標準で、ほぼ全ての FastAPI + SQLAlchemy プロジェクトで同じ形が採用されています。try-except-finally でエラー時のロールバックを確実に行うのがポイントです。",
    code: "# app/db/session.py\nfrom sqlalchemy.ext.asyncio import (\n    create_async_engine,\n    async_sessionmaker,\n    AsyncSession,\n)\nfrom typing import AsyncGenerator\nfrom app.core.config import settings\n\nengine = create_async_engine(\n    settings.DATABASE_URL,\n    echo=settings.DEBUG,  # SQL文をログ出力\n    pool_size=5,          # 接続プールサイズ\n    max_overflow=10,      # 最大超過接続数\n)\n\nasync_session = async_sessionmaker(\n    engine,\n    class_=AsyncSession,\n    expire_on_commit=False,  # commit後も属性アクセス可\n)\n\nasync def get_db() -> AsyncGenerator[AsyncSession, None]:\n    async with async_session() as session:\n        try:\n            yield session\n            await session.commit()\n        except Exception:\n            await session.rollback()\n            raise",

    body: "SQLAlchemy 2.0 では、従来の session.query(User).filter(...) スタイルから select(User).where(...) スタイルに変わりました。SQL 文を Python のオブジェクトとして組み立てる「ステートメント構築」のアプローチです。\n\n新しい select() スタイルは SQL の SELECT 文に近い見た目をしていて、SQL に慣れている人には直感的です。また、ステートメントオブジェクトは実行前にいくらでも条件を追加できるので、動的なクエリ構築（検索条件の有無で WHERE 句を変える等）にも適しています。\n\n結果の取り出し方も変わっています。scalar_one_or_none() は「1 件 or None」、scalars().all() は「複数件のリスト」というのが基本の使い分けです。",
    code: "from sqlalchemy import select\nfrom sqlalchemy.ext.asyncio import AsyncSession\nfrom app.models.todo import Todo\n\n# 全件取得\nstmt = select(Todo).order_by(Todo.created_at.desc())\nresult = await session.execute(stmt)\ntodos = result.scalars().all()\n\n# 1件取得\nstmt = select(Todo).where(Todo.id == todo_id)\nresult = await session.execute(stmt)\ntodo = result.scalar_one_or_none()  # None or Todo\n\n# 条件付き取得\nstmt = (\n    select(Todo)\n    .where(Todo.is_done == False)\n    .order_by(Todo.created_at.desc())\n    .offset(0)\n    .limit(20)\n)\n\n# 作成\ntodo = Todo(title=\"New\", description=\"...\")\nsession.add(todo)\nawait session.flush()       # DBに反映（IDが付く）\nawait session.refresh(todo) # 最新の値を再読込",

    body: "データベースのスキーマ変更（テーブル追加、カラム変更など）を安全に管理するのが Alembic の役割です。Django の makemigrations / migrate に相当する機能ですが、SQLAlchemy のモデルを直接解析して差分を検出する autogenerate が便利です。\n\nalembic revision --autogenerate を実行すると、現在の DB スキーマと SQLAlchemy モデルの差分を検出し、マイグレーションスクリプトを自動生成します。生成されたスクリプトは必ず目視で確認してください。autogenerate は完璧ではなく、カラム名の変更をドロップ＋追加と誤認するケースがあります。\n\nマイグレーションファイルはバージョン管理（Git）にコミットします。これにより、チームメンバー全員が同じスキーマ変更を再現でき、本番環境へのデプロイ時にも自動的にマイグレーションが適用されます。",

}, {
  id: "ch4",
  num: 4,
  title: "リポジトリパターンとサービス層",
  est: "5時間",
  goal: "ルーター（HTTP 層）・サービス（ビジネスロジック層）・リポジトリ（データアクセス層）の 3 層に責務を分離する設計パターンを理解する。FastAPI の Depends を使ってこれらを注入し、テスタブルでメンテナンスしやすいコード構成を実現できる状態がゴール。",
  sections: [{
    title: "なぜ層を分離するのか",
    body: "小さなプロジェクトでは、ルーターの中に直接 DB アクセスや条件分岐を書いても問題なく動きます。しかしプロジェクトが成長すると、いくつかの問題が顕在化します。\n\n1つ目は「テストの困難さ」です。ルーター関数の中に DB アクセスが直接書いてあると、テスト時にも実際のデータベースが必要になります。2つ目は「ロジックの重複」です。同じ「Todo が存在するか確認して 404 を返す」というコードが、GET / PATCH / DELETE の 3 箇所に重複することになります。3つ目は「変更の影響範囲」です。DB のクエリを変更したいだけなのに、ルーター全体をテストし直す必要が出てきます。\n\n層を分離することで、各層を独立してテスト・変更できるようになります。これはクリーンアーキテクチャや六角形アーキテクチャと呼ばれる設計の基本思想です。",
    table: T.diPatterns,
    afterTable: "このコースではリポジトリパターンを採用します。データアクセスの詳細（SQL の書き方）をリポジトリに閉じ込め、サービス層はビジネスロジック（存在チェック、権限チェック等）に集中し、ルーターは HTTP のリクエスト/レスポンスの変換だけを担当します。"
  }, {
    title: "リポジトリパターン",
    body: "リポジトリは「データアクセスの窓口」です。SQLAlchemy のセッションを受け取り、CRUD 操作を提供します。ルーターやサービス層は「どんな SQL が発行されているか」を知る必要がなく、リポジトリの公開メソッド（create, get_by_id, list_all, update, delete）だけを使います。\n\nこの抽象化の最大のメリットは「DB の実装を差し替えられる」ことです。テスト時にはインメモリのフェイクリポジトリを使い、本番では PostgreSQL のリポジトリを使う、という切り替えが可能になります。また、将来的に SQLAlchemy から別の ORM に移行する場合も、影響はリポジトリ層だけに留まります。\n\nリポジトリは HTTPException を raise しません。「見つからなかった」は None を返すだけで、404 を返す判断はサービス層の責務です。この境界を守ることで、リポジトリを HTTP 以外のコンテキスト（CLI ツール、バッチ処理など）でも再利用できます。",
    code: "# app/repositories/todo.py\nfrom sqlalchemy import select\nfrom sqlalchemy.ext.asyncio import AsyncSession\nfrom app.models.todo import Todo\nfrom app.schemas.todo import TodoCreate, TodoUpdate\n\nclass TodoRepository:\n    def __init__(self, session: AsyncSession):\n        self.session = session\n\n    async def create(self, data: TodoCreate) -> Todo:\n        todo = Todo(**data.model_dump())\n        self.session.add(todo)\n        await self.session.flush()\n        await self.session.refresh(todo)\n        return todo\n\n    async def get_by_id(\n        self, todo_id: int\n    ) -> Todo | None:\n        stmt = select(Todo).where(Todo.id == todo_id)\n        result = await self.session.execute(stmt)\n        return result.scalar_one_or_none()\n\n    async def delete(self, todo_id: int) -> bool:\n        todo = await self.get_by_id(todo_id)\n        if todo is None:\n            return False\n        await self.session.delete(todo)\n        await self.session.flush()\n        return True",
    afterCode: "ポイント: リポジトリは SQLAlchemy 固有のコードだけを含みます。HTTPException やステータスコードはリポジトリに書かないでください。"
  }, {
    title: "サービス層",
    body: "サービス層はビジネスロジックを集約する場所です。「この Todo は存在するか？」「このユーザはこの Todo を操作する権限があるか？」といった判断をここで行います。\n\nサービス層が HTTPException を raise するのは許容されます（FastAPI のコンテキストで使う前提だから）。ただし、より厳密にしたい場合はカスタム例外を raise し、ルーター層で HTTPException に変換するアプローチもあります。これは第 7 章で詳しく扱います。\n\nサービス層を設けることで、複数のルーターから同じロジックを再利用できるようになります。例えば「Todo の存在確認 → 404 送出」のロジックは、GET / PATCH / DELETE の全てで必要ですが、サービスの get_or_404 メソッド 1 箇所に集約できます。",
    code: "# app/services/todo.py\nfrom fastapi import HTTPException, status\nfrom app.repositories.todo import TodoRepository\nfrom app.schemas.todo import TodoCreate, TodoUpdate\n\nclass TodoService:\n    def __init__(self, repo: TodoRepository):\n        self.repo = repo\n\n    async def create(self, data: TodoCreate):\n        return await self.repo.create(data)\n\n    async def get_or_404(self, todo_id: int):\n        todo = await self.repo.get_by_id(todo_id)\n        if todo is None:\n            raise HTTPException(\n                status_code=status.HTTP_404_NOT_FOUND,\n                detail=f\"Todo {todo_id} not found\"\n            )\n        return todo\n\n    async def delete(self, todo_id: int):\n        deleted = await self.repo.delete(todo_id)\n        if not deleted:\n            raise HTTPException(\n                status_code=status.HTTP_404_NOT_FOUND,\n                detail=f\"Todo {todo_id} not found\"\n            )",
    afterCode: "ポイント: サービスはリポジトリに依存し、ルーターはサービスに依存します。依存の方向は常に「外側 → 内側」で、内側が外側を知ることはありません。"
  }, {
    title: "FastAPI の Depends による依存性注入",
    body: "FastAPI の Depends() は依存性注入（DI）の仕組みです。関数やクラスのインスタンスを、呼び出し時に自動的に組み立てて渡してくれます。\n\nDI のメリットは「組み立て方を変えればテスト用の実装に差し替えられる」ことです。app.dependency_overrides を使えば、テスト時に get_db を「テスト用 DB セッションを返す関数」に差し替えるだけで、プロダクションコードを一切変更せずにテストできます。\n\nDepends のチェーン（get_db → get_todo_repo → get_todo_service）を構築することで、各層の組み立てを FastAPI に任せられます。ルーター関数は「TodoService を受け取る」という宣言だけで済み、セッションやリポジトリの生成コードを書く必要がありません。",
    code: "# app/dependencies.py\nfrom fastapi import Depends\nfrom sqlalchemy.ext.asyncio import AsyncSession\nfrom app.db.session import get_db\nfrom app.repositories.todo import TodoRepository\nfrom app.services.todo import TodoService\n\ndef get_todo_repo(\n    db: AsyncSession = Depends(get_db)\n) -> TodoRepository:\n    return TodoRepository(db)\n\ndef get_todo_service(\n    repo: TodoRepository = Depends(get_todo_repo)\n) -> TodoService:\n    return TodoService(repo)\n\n# ルーターでの使用\n@router.get(\"/{todo_id}\")\nasync def get_todo(\n    todo_id: int,\n    service: TodoService = Depends(get_todo_service)\n):\n    return await service.get_or_404(todo_id)",
    afterCode: "ミニ演習: Depends チェーンの流れを紙に書いてみましょう。リクエスト → get_todo_service → get_todo_repo → get_db → AsyncSession。各関数が何を受け取り、何を返すか、矢印で繋いでみてください。"
  }, {
    title: "リファクタリング後のルーター",
    body: "サービス層とリポジトリ層を導入すると、ルーターは驚くほどシンプルになります。各エンドポイントは「リクエストを受け取る → サービスに委譲する → 結果を返す」という 3 ステップだけになり、ビジネスロジックもデータアクセスも含みません。\n\nこの「薄いルーター」パターンは、コードレビューの効率を大幅に上げます。ルーターを見れば API のインターフェース（URL, メソッド, 入出力の型）が分かり、サービスを見ればビジネスルールが分かり、リポジトリを見れば DB アクセスの詳細が分かる、という役割分担が明確になるからです。\n\n大規模プロジェクトでは、この分離がチーム開発を円滑にします。フロントエンドエンジニアはルーターだけ読めば API の仕様が分かり、バックエンドエンジニアはサービス層のビジネスロジックに集中できます。",
    code: "# app/routers/todos.py（リファクタリング後）\nfrom fastapi import APIRouter, Depends, status\nfrom app.schemas.todo import (\n    TodoCreate, TodoUpdate, TodoResponse\n)\nfrom app.services.todo import TodoService\nfrom app.dependencies import get_todo_service\n\nrouter = APIRouter(prefix=\"/todos\", tags=[\"todos\"])\n\n@router.post(\n    \"\", response_model=TodoResponse,\n    status_code=status.HTTP_201_CREATED\n)\nasync def create_todo(\n    body: TodoCreate,\n    svc: TodoService = Depends(get_todo_service)\n):\n    return await svc.create(body)\n\n@router.get(\"/{todo_id}\", response_model=TodoResponse)\nasync def get_todo(\n    todo_id: int,\n    svc: TodoService = Depends(get_todo_service)\n):\n    return await svc.get_or_404(todo_id)",
    afterCode: "ポイント: ルーターの各関数は 2〜3 行で完結しています。これが「薄いルーター」の理想形です。ロジックの変更はサービス層で、クエリの変更はリポジトリ層で行い、ルーターは触る必要がありません。"
  }]
}, {
  id: "ch5",
  num: 5,
  title: "認証実装",
  est: "6時間",
  goal: "ユーザ登録・ログイン・JWT トークンによる認証の一連のフローを実装できるようになる。パスワードのハッシュ化（bcrypt）、JWT の生成・検証、OAuth2PasswordBearer による認証済みユーザの取得を Depends で行えるようになるのがゴール。Todo をユーザに紐づけ、他人の Todo は操作できないようにする認可ロジックまで実装する。",
  sections: [{
    title: "パスワードのハッシュ化",
    body: "ユーザのパスワードをデータベースに平文で保存するのは、セキュリティ上の最悪の選択です。DB が流出した時点で全ユーザのパスワードが露出し、他のサービスでも同じパスワードを使い回しているユーザは連鎖的に被害を受けます。\n\nパスワードは必ずハッシュ化（一方向の変換）してから保存します。ハッシュ化とは、元のデータから固定長の値を生成する不可逆な処理で、ハッシュ値から元のパスワードを復元することはできません。ログイン時は「入力されたパスワードをハッシュ化し、DB のハッシュ値と比較する」ことで認証を行います。\n\nbcrypt はハッシュ化アルゴリズムの中で最も広く使われている方式の一つです。ソルト（ランダムな付加値）を自動的に生成してハッシュに含めるため、同じパスワードでもハッシュ値が毎回異なります。これによりレインボーテーブル攻撃（事前計算された辞書による逆引き）を防げます。",
    table: T.passwordHashComparison,
    code: "# app/core/security.py\nfrom passlib.context import CryptContext\n\npwd_context = CryptContext(\n    schemes=[\"bcrypt\"], deprecated=\"auto\"\n)\n\ndef hash_password(password: str) -> str:\n    return pwd_context.hash(password)\n\ndef verify_password(\n    plain: str, hashed: str\n) -> bool:\n    return pwd_context.verify(plain, hashed)\n\n# 使用例\nhashed = hash_password(\"my_password\")\n# → \"$2b$12$...\" (60文字のハッシュ)\nverify_password(\"my_password\", hashed)  # True\nverify_password(\"wrong\", hashed)        # False",
    afterCode: "ポイント: passlib の CryptContext は deprecated=\"auto\" を設定すると、将来的により安全なアルゴリズムが追加された際に自動的に移行してくれます。"
  }, {
    title: "JWT（JSON Web Token）の仕組み",

    code: "# app/routers/auth.py\nfrom fastapi import APIRouter, Depends, HTTPException\nfrom fastapi.security import OAuth2PasswordRequestForm\nfrom sqlalchemy.ext.asyncio import AsyncSession\nfrom sqlalchemy import select\nfrom app.db.session import get_db\nfrom app.models.user import User\nfrom app.schemas.user import UserCreate, UserResponse\nfrom app.core.security import (\n    hash_password, verify_password,\n    create_access_token\n)\n\nrouter = APIRouter(prefix=\"/auth\", tags=[\"auth\"])\n\n@router.post(\"/register\", response_model=UserResponse,\n             status_code=201)\nasync def register(\n    body: UserCreate,\n    db: AsyncSession = Depends(get_db)\n):\n    # 重複チェック\n    stmt = select(User).where(User.email == body.email)\n    existing = (await db.execute(stmt)).scalar_one_or_none()\n    if existing:\n        raise HTTPException(400, \"Email already registered\")\n    user = User(\n        email=body.email,\n        hashed_password=hash_password(body.password)\n    )\n    db.add(user)\n    await db.flush()\n    await db.refresh(user)\n    return user\n\n@router.post(\"/login\")\nasync def login(\n    form: OAuth2PasswordRequestForm = Depends(),\n    db: AsyncSession = Depends(get_db)\n):\n    stmt = select(User).where(\n        User.email == form.username\n    )\n    user = (await db.execute(stmt)).scalar_one_or_none()\n    if not user or not verify_password(\n        form.password, user.hashed_password\n    ):\n        raise HTTPException(401, \"Invalid credentials\")\n    token = create_access_token(\n        {\"sub\": str(user.id)}\n    )\n    return {\n        \"access_token\": token,\n        \"token_type\": \"bearer\"\n    }",

    code: "# app/dependencies.py\nfrom fastapi import Depends, HTTPException, status\nfrom fastapi.security import OAuth2PasswordBearer\nfrom app.core.security import decode_access_token\n\noauth2_scheme = OAuth2PasswordBearer(\n    tokenUrl=\"/auth/login\"\n)\n\nasync def get_current_user(\n    token: str = Depends(oauth2_scheme),\n    db: AsyncSession = Depends(get_db)\n) -> User:\n    payload = decode_access_token(token)\n    user_id = payload.get(\"sub\")\n    if user_id is None:\n        raise HTTPException(\n            status_code=status.HTTP_401_UNAUTHORIZED,\n            detail=\"Invalid token\",\n            headers={\"WWW-Authenticate\": \"Bearer\"}\n        )\n    # DBからユーザ取得\n    user = await db.get(User, int(user_id))\n    if user is None:\n        raise HTTPException(401, \"User not found\")\n    return user\n\n# エンドポイントでの使用\n@router.get(\"/me\")\nasync def get_me(\n    user: User = Depends(get_current_user)\n):\n    return user",

    title: "基本のページネーション実装",
    body: "offset/limit 方式のページネーションは、SQL の OFFSET と LIMIT をそのまま使います。SQLAlchemy の .offset() と .limit() メソッドで実現でき、実装はシンプルです。\n\n注意点として、offset が大きくなると DB のパフォーマンスが劣化します（OFFSET 10000 は最初の 10000 件をスキップするために読み込む必要がある）。大量データを扱う場合はカーソルベースのページネーション（WHERE id > last_id）を検討しますが、初級段階では offset/limit で十分です。\n\nQuery() の ge（greater than or equal）や le（less than or equal）でバリデーションを付けておけば、不正なパラメータを早期に弾けます。",
    code: "from fastapi import APIRouter, Depends, Query\nfrom sqlalchemy import select, func\nfrom sqlalchemy.ext.asyncio import AsyncSession\n\n@router.get(\"\")\nasync def list_todos(\n    skip: int = Query(default=0, ge=0),\n    limit: int = Query(default=20, ge=1, le=100),\n    db: AsyncSession = Depends(get_db),\n):\n    # 総件数\n    count_stmt = select(func.count(Todo.id))\n    total = (await db.execute(count_stmt)).scalar()\n\n    # データ取得\n    stmt = (\n        select(Todo)\n        .offset(skip)\n        .limit(limit)\n        .order_by(Todo.created_at.desc())\n    )\n    result = await db.execute(stmt)\n    items = list(result.scalars().all())\n\n    return {\n        \"items\": items,\n        \"total\": total,\n        \"skip\": skip,\n        \"limit\": limit,\n        \"has_next\": (skip + limit) < total,\n    }",

    title: "キーワード検索とフィルタ",
    body: "検索とフィルタは API の使い勝手を大きく左右する機能です。キーワード検索は LIKE 句（部分一致）で実装するのが一般的で、SQLAlchemy では .ilike() メソッド（大文字小文字を区別しない LIKE）を使います。\n\nフィルタは「条件に合うデータだけを返す」機能で、is_done=true で完了済みの Todo だけを取得する、といった使い方をします。フィルタパラメータは Optional にして、指定されなければ条件を付けない、というのが基本パターンです。\n\n動的にクエリを組み立てるときは、最初に select(Todo) のベースクエリを作り、条件がある場合だけ .where() を追加していく方法が読みやすくなります。",
    code: "from sqlalchemy import or_\n\n@router.get(\"\")\nasync def list_todos(\n    q: str | None = Query(default=None,\n        description=\"キーワード検索\"),\n    is_done: bool | None = Query(default=None,\n        description=\"完了状態フィルタ\"),\n    skip: int = Query(default=0, ge=0),\n    limit: int = Query(default=20, ge=1, le=100),\n    db: AsyncSession = Depends(get_db),\n):\n    stmt = select(Todo)\n\n    # キーワード検索\n    if q is not None:\n        pattern = f\"%{q}%\"\n        stmt = stmt.where(\n            or_(\n                Todo.title.ilike(pattern),\n                Todo.description.ilike(pattern),\n            )\n        )\n\n    # フィルタ\n    if is_done is not None:\n        stmt = stmt.where(Todo.is_done == is_done)\n\n    stmt = stmt.offset(skip).limit(limit)\n    result = await db.execute(stmt)\n    return list(result.scalars().all())",

    code: "from enum import Enum\nfrom pydantic import BaseModel\n\nclass SortOrder(str, Enum):\n    asc = \"asc\"\n    desc = \"desc\"\n\nclass PaginatedResponse(BaseModel):\n    items: list[TodoResponse]\n    total: int\n    skip: int\n    limit: int\n    has_next: bool\n\n@router.get(\"\", response_model=PaginatedResponse)\nasync def list_todos(\n    sort_by: str = Query(default=\"created_at\"),\n    order: SortOrder = Query(default=SortOrder.desc),\n    skip: int = Query(default=0, ge=0),\n    limit: int = Query(default=20, ge=1, le=100),\n    db: AsyncSession = Depends(get_db),\n):\n    # ソートフィールドの検証\n    allowed = {\"created_at\", \"title\", \"is_done\"}\n    if sort_by not in allowed:\n        sort_by = \"created_at\"\n\n    col = getattr(Todo, sort_by)\n    order_func = desc if order == SortOrder.desc else asc\n\n    stmt = select(Todo).order_by(order_func(col))\n    # ... offset, limit, count は省略",

  sections: [{
    title: "カスタム例外と exception_handler",
    body: "HTTPException を直接 raise するのは手軽ですが、サービス層やリポジトリ層で HTTP の概念（ステータスコード）を扱うのは設計上の問題があります。サービス層は「ビジネスロジック」に集中すべきで、「HTTP 404 を返す」という判断は本来 HTTP 層の責務です。\n\nカスタム例外クラスを使うアプローチでは、サービス層は TodoNotFoundError という業務例外を raise し、FastAPI の exception_handler がそれを 404 レスポンスに変換します。これにより、サービス層のコードから HTTP の知識が排除され、CLI ツールやバッチ処理でも同じサービスを使えるようになります。\n\nexception_handler はデコレータで登録します。例外クラスごとに異なるハンドラを登録でき、レスポンスの形式（JSON のキー名やステータスコード）を一元管理できます。",
    code: "# app/exceptions.py\nclass AppError(Exception):\n    \"\"\"アプリケーション共通の基底例外\"\"\"\n    pass\n\nclass NotFoundError(AppError):\n    def __init__(self, resource: str, id: int):\n        self.resource = resource\n        self.id = id\n        super().__init__(\n            f\"{resource} {id} not found\"\n        )\n\nclass AlreadyExistsError(AppError):\n    def __init__(self, resource: str, field: str):\n        self.resource = resource\n        self.field = field\n\n# app/main.py\n@app.exception_handler(NotFoundError)\nasync def not_found_handler(request, exc):\n    return JSONResponse(\n        status_code=404,\n        content={\n            \"error\": \"not_found\",\n            \"resource\": exc.resource,\n            \"id\": exc.id,\n            \"detail\": str(exc),\n        }\n    )\n\n@app.exception_handler(AlreadyExistsError)\nasync def already_exists_handler(request, exc):\n    return JSONResponse(\n        status_code=409,\n        content={\n            \"error\": \"already_exists\",\n            \"resource\": exc.resource,\n            \"field\": exc.field,\n        }\n    )",

    code: "from fastapi.exceptions import RequestValidationError\n\n@app.exception_handler(RequestValidationError)\nasync def validation_handler(request, exc):\n    errors = []\n    for err in exc.errors():\n        field = \" -> \".join(\n            str(x) for x in err[\"loc\"]\n        )\n        errors.append({\n            \"field\": field,\n            \"message\": err[\"msg\"],\n            \"type\": err[\"type\"],\n        })\n    return JSONResponse(\n        status_code=422,\n        content={\n            \"error\": \"validation_error\",\n            \"detail\": errors,\n        }\n    )\n\n# 500 エラーのキャッチ\n@app.exception_handler(Exception)\nasync def internal_error_handler(request, exc):\n    logger.error(\"unhandled\", exc_info=exc)\n    return JSONResponse(\n        status_code=500,\n        content={\n            \"error\": \"internal_server_error\",\n            \"detail\": \"An unexpected error occurred\"\n        }\n    )",

    table: T.logLevels,
    code: "# app/core/logging.py\nimport structlog\n\ndef setup_logging(json_logs: bool = False):\n    processors = [\n        structlog.contextvars.merge_contextvars,\n        structlog.processors.add_log_level,\n        structlog.processors.TimeStamper(fmt=\"iso\"),\n    ]\n    if json_logs:\n        processors.append(\n            structlog.processors.JSONRenderer()\n        )\n    else:\n        processors.append(\n            structlog.dev.ConsoleRenderer()\n        )\n    structlog.configure(\n        processors=processors,\n        logger_factory=structlog.PrintLoggerFactory(),\n    )\n\n# 使用例\nimport structlog\nlogger = structlog.get_logger()\n\nawait logger.ainfo(\n    \"todo_created\",\n    todo_id=42,\n    user_id=1,\n    title=\"Buy milk\"\n)\n# → 2026-04-14T10:00:00 [info] todo_created\n#    todo_id=42 user_id=1 title=\"Buy milk\"",

    title: "ロギングミドルウェア",
    body: "リクエストごとにログを自動出力するミドルウェアを作ることで、アクセスログの記録漏れを防ぎます。Starlette の BaseHTTPMiddleware を継承して dispatch メソッドを実装するのが基本パターンです。\n\nミドルウェアではリクエスト開始時に request_id を生成し、contextvars に設定します。これにより、そのリクエスト内で出力される全てのログに request_id が含まれるようになります。処理完了時には所要時間も記録し、パフォーマンスの監視に役立てます。\n\nレスポンスヘッダーに X-Request-ID を含めることで、フロントエンドからも問い合わせ時にリクエストを特定できるようになります。",
    code: "# app/middleware/logging.py\nimport time, uuid\nfrom starlette.middleware.base import BaseHTTPMiddleware\nimport structlog\n\nlogger = structlog.get_logger()\n\nclass LoggingMiddleware(BaseHTTPMiddleware):\n    async def dispatch(self, request, call_next):\n        request_id = str(uuid.uuid4())[:8]\n        structlog.contextvars.clear_contextvars()\n        structlog.contextvars.bind_contextvars(\n            request_id=request_id\n        )\n\n        start = time.perf_counter()\n        response = await call_next(request)\n        elapsed = time.perf_counter() - start\n\n        await logger.ainfo(\n            \"request\",\n            method=request.method,\n            path=str(request.url.path),\n            status=response.status_code,\n            duration_ms=round(elapsed * 1000, 2),\n        )\n        response.headers[\"X-Request-ID\"] = request_id\n        return response\n\n# app/main.py での登録\nfrom app.middleware.logging import LoggingMiddleware\napp.add_middleware(LoggingMiddleware)",
    afterCode: "ミニ演習: ミドルウェアを追加した状態で API を数回呼び出し、ログに request_id と処理時間が出力されることを確認してみましょう。"
