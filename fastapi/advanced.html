     answer:`from starlette.middleware.base import BaseHTTPMiddleware
from collections import defaultdict
import time

class RateLimitMiddleware(BaseHTTPMiddleware):
    def __init__(self, app, max_requests=60, window=60):
        super().__init__(app)
        self.max_requests = max_requests
        self.window = window
        self.requests: dict[str, list[float]] = defaultdict(list)

    async def dispatch(self, request, call_next):
        ip = request.client.host
        now = time.time()
        # 古いリクエストを削除
        self.requests[ip] = [t for t in self.requests[ip] if now - t < self.window]
        if len(self.requests[ip]) >= self.max_requests:
            from starlette.responses import JSONResponse
            return JSONResponse({"detail":"Rate limit exceeded"}, status_code=429)
        self.requests[ip].append(now)
        return await call_next(request)`}

T = TypeVar('T')

class Container:
    def register_singleton(self, interface: Type[T], factory: Callable[[], T]) -> None: ...
    def register_transient(self, interface: Type[T], factory: Callable[[], T]) -> None: ...

     answer:`class Container:
    def __init__(self):
        self._singletons: dict = {}
        self._transients: dict = {}
        self._instances: dict = {}

    def register_singleton(self, interface, factory):
        self._singletons[interface] = factory

    def register_transient(self, interface, factory):
        self._transients[interface] = factory

    def resolve(self, interface):
        if interface in self._singletons:
            if interface not in self._instances:
                self._instances[interface] = self._singletons[interface]()
            return self._instances[interface]
        if interface in self._transients:
            return self._transients[interface]()
        raise KeyError(f"Not registered: {interface}")

from starlette.middleware.base import BaseHTTPMiddleware
from starlette.responses import PlainTextResponse

class ProfilingMiddleware(BaseHTTPMiddleware):
    def __init__(self, app, profile_path="/profile"):
        super().__init__(app)
        self.profile_path = profile_path

    async def dispatch(self, request, call_next):
        if not request.url.path.startswith(self.profile_path):
            return await call_next(request)
        profiler = cProfile.Profile()
        profiler.enable()
        response = await call_next(request)
        profiler.disable()

     {title:"ASGIプロトコルの仕組み", body:`ASGIはAsynchronous Server Gateway Interfaceの略で、Pythonの非同期Webサーバーとアプリケーション間の標準インターフェースです。古いWSGIと違い、WebSocket・HTTP/2・SSEなど非同期接続を標準でサポートします。FastAPIはASGIアプリケーションであり、その下にStarletteが、さらにその下にuvicornがあります。

ASGIアプリはasync def app(scope, receive, send)というシグネチャを持つ非同期関数または呼び出し可能オブジェクトです。scopeは接続の情報（HTTP/WebSocket・パス・メソッド・ヘッダーなど）を持つ辞書です。receiveはクライアントからのイベントを受け取るコルーチン、sendはクライアントへイベントを送るコルーチンです。

FastAPIのRouterやミドルウェアは全てこの三要素を抽象化したラッパーです。uvicornはHTTPリクエストをASGIのscope・receive・sendに変換してFastAPIに渡します。低レベルを理解することで、パフォーマンスの問題やデバッグが格段に楽になります。`,
      code:`# 生のASGIアプリ実装
import json

async def simple_app(scope, receive, send):
    """HTTPのみ対応する最小ASGIアプリ"""
    if scope["type"] != "http":
        return

    # リクエストボディを受け取る
    body = b""
    while True:
        event = await receive()
        body += event.get("body", b"")
        if not event.get("more_body", False):
            break

    # レスポンスを送る
    path = scope["path"]
    response_data = {"path": path, "method": scope["method"]}
    response_body = json.dumps(response_data).encode()

    await send({
        "type": "http.response.start",
        "status": 200,
        "headers": [
            [b"content-type", b"application/json"],
            [b"content-length", str(len(response_body)).encode()],
        ],
    })
    await send({
        "type": "http.response.body",
        "body": response_body,
    })`,
      afterCode:"uvicornで生のASGIアプリを起動: uvicorn app:simple_app --reload。FastAPIはこのsimple_appと全く同じインターフェースを実装したクラスです。"},
     {title:"Starletteミドルウェアスタック", body:`Starletteのミドルウェアはオニオンアーキテクチャで動作します。リクエストは外側から内側に向かってミドルウェアを通過し、レスポンスは内側から外側に向かって戻ります。app.add_middleware()で追加した順の逆順で実行されます。

BaseHTTPMiddlewareはASGIミドルウェアを簡単に書けるヘルパークラスです。ただし、すべてのリクエストボディをメモリにバッファリングするためStreamingResponseとの相性が悪いという既知の問題があります。パフォーマンスが重要な場合は生のASGIミドルウェア（__init__・__call__を持つクラス）を書きます。

ミドルウェアの追加順序に注意してください。後からadd_middleware()したものが外側（先に実行）になります。認証ミドルウェアはレートリミットより内側に置き、認証前にレートリミットを行う設計が一般的です。`,
      code:`from starlette.middleware.base import BaseHTTPMiddleware
from starlette.types import ASGIApp, Receive, Scope, Send
import time, logging

# 方法1: BaseHTTPMiddleware（シンプルだが制限あり）
class TimingMiddleware(BaseHTTPMiddleware):
    async def dispatch(self, request, call_next):
        start = time.perf_counter()
        response = await call_next(request)
        elapsed = time.perf_counter() - start
        response.headers["X-Process-Time"] = f"{elapsed:.3f}s"
        return response

# 方法2: 生のASGIミドルウェア（高パフォーマンス）
class RawTimingMiddleware:
    def __init__(self, app: ASGIApp):
        self.app = app

    async def __call__(self, scope: Scope, receive: Receive, send: Send):
        if scope["type"] == "http":
            start = time.perf_counter()
            async def send_wrapper(message):
                if message["type"] == "http.response.start":
                    elapsed = time.perf_counter() - start
                    headers = list(message.get("headers", []))
                    headers.append([b"x-process-time", f"{elapsed:.3f}s".encode()])
                    message = {**message, "headers": headers}
                await send(message)
            await self.app(scope, receive, send_wrapper)
        else:
            await self.app(scope, receive, send)`,

  {id:"ch2", num:2, title:"CQRSパターンとイベントソーシング", est:"70分",
   goal:"CQRSのコマンド・クエリ分離の原則を理解し、イベントソーシングでシステムの状態変化を永続化できる。集約ルートとドメインイベントを実装できる。",
   sections:[
     {title:"CQRSの設計と実装", body:`CQRS（Command Query Responsibility Segregation）はコマンド（状態変更）とクエリ（参照）を分離するアーキテクチャパターンです。Djangoのビュー関数が読み書き両方を担当するのとは対照的に、CQRSではコマンド用のライトモデルとクエリ用のリードモデルを完全に分離します。

コマンドは「何をしたいか」を表すデータ構造です。CreateOrderCommand・UpdateUserCommandのように命令形で名付けます。コマンドハンドラはコマンドを受け取りビジネスロジックを実行してドメインイベントを発行します。Pythonのdataclassがコマンドの定義に最適です。

クエリはリードモデルから効率的にデータを取得します。ライトモデルとは別のデータストア（例: Elasticsearchやリードレプリカ）を使うこともあります。FastAPIではコマンド用のPOST/PUT/DELETEエンドポイントとクエリ用のGETエンドポイントをRouter単位で分離します。`,
      code:`from dataclasses import dataclass, field
from typing import Protocol
import uuid, datetime

# コマンド定義
@dataclass
class CreateOrderCommand:
    user_id: str
    items: list[dict]
    command_id: str = field(default_factory=lambda: str(uuid.uuid4()))

# ドメインイベント
@dataclass
class OrderCreatedEvent:
    aggregate_id: str
    user_id: str
    items: list[dict]
    occurred_at: datetime.datetime = field(
        default_factory=datetime.datetime.utcnow)

# コマンドバス
class CommandBus:
    def __init__(self):
        self._handlers: dict = {}

    def register(self, command_type, handler):
        self._handlers[command_type] = handler

    async def dispatch(self, command):
        handler = self._handlers.get(type(command))
        if not handler:
            raise ValueError(f"No handler for {type(command)}")
        return await handler(command)`,
      afterCode:"CommandBusはMediatrパターンの実装です。Pythonライブラリではpyfastcqrsやpymediatorが同様の機能を提供します。DIコンテナと組み合わせると依存性の管理が容易になります。"},
     {title:"イベントソーシングの実装", body:`イベントソーシングは、システムの状態をデータベースに直接保存するのではなく、状態変化のイベントをシーケンシャルに保存するパターンです。Pythonのgitリポジトリがコミット履歴を保持するのと同じ発想です。「現在の状態」はイベントを最初から再生（リプレイ）することで復元できます。

集約（Aggregate）はドメインオブジェクトの一貫性の境界です。OrderAggregate内でOrderCreated・ItemAdded・OrderCancelledなどのイベントを発行し、それを基に状態を構築します。外から直接フィールドを変更するのではなく、必ずコマンドメソッドを通じて変更します。

スナップショットは最適化技術で、全イベントを最初から再生するコストを削減します。例えば1000イベントを500イベントごとにスナップショットを取れば、最大で500イベントのリプレイで済みます。`,
      code:`from dataclasses import dataclass, field
from typing import Any
import json

@dataclass
class Order:
    """注文集約"""
    id: str
    user_id: str
    items: list[dict] = field(default_factory=list)
    status: str = "pending"
    _events: list = field(default_factory=list, repr=False)

    @classmethod
    def create(cls, user_id: str, items: list[dict]) -> "Order":
        order = cls(id=str(uuid.uuid4()), user_id=user_id)
        event = OrderCreatedEvent(
            aggregate_id=order.id, user_id=user_id, items=items)
        order._apply(event)
        order._events.append(event)
        return order

    def cancel(self):
        if self.status != "pending":
            raise ValueError("キャンセルできるのはpending状態のみです")
        event = {"type": "OrderCancelled", "aggregate_id": self.id}
        self._apply(event)
        self._events.append(event)

    def _apply(self, event):
        if isinstance(event, OrderCreatedEvent):
            self.items = event.items
            self.status = "pending"
        elif isinstance(event, dict) and event["type"] == "OrderCancelled":
            self.status = "cancelled"

    def pop_events(self) -> list:
        events, self._events = self._events, []
        return events`,
      afterCode:"pop_events()で未コミットのイベントを取り出してイベントストアに保存します。集約はイベントを自分で管理し、外部から直接stateを変更できないようにすることが重要です。"}
   ]},

FastAPIのlifespan（コンテキストマネージャー形式のstartup/shutdown）を使ってKafkaの接続管理をします。yieldの前がstartup、後がshutdownです。プロデューサーとコンシューマーをapp.stateに格納することで、依存性注入を通じてエンドポイントから参照できます。

from aiokafka import AIOKafkaProducer, AIOKafkaConsumer

import asyncio, json

@asynccontextmanager
async def lifespan(app: FastAPI):
    # プロデューサー起動
    producer = AIOKafkaProducer(
        bootstrap_servers='localhost:9092',
        value_serializer=lambda v: json.dumps(v).encode('utf-8'),
        key_serializer=lambda k: k.encode('utf-8') if k else None,
    )
    await producer.start()
    app.state.producer = producer

    # コンシューマータスクをバックグラウンドで起動

    yield

    await producer.stop()

async def consume_events(app: FastAPI):

     {title:"デッドレターキューと再試行ロジック", body:`メッセージ処理は必ず失敗する可能性があります。外部APIの障害・データ不整合・バグなどで処理できなかったメッセージをデッドレターキュー（DLQ）に送り、後で調査・再処理できるようにします。これはPythonのCeleryのtask_rejectsルーティングに相当します。

再試行ロジックは指数バックオフを使います。最初の失敗後1秒、次は2秒、4秒と待ち時間を増やします。Kafkaには組み込みの再試行機能はないため、自前で実装します。失敗カウンタをメッセージのヘッダーに埋め込み、最大試行回数に達したらDLQに送ります。

テナシティ（tenacity）ライブラリを使うと再試行ロジックをシンプルに書けます。@retry(wait=wait_exponential(), stop=stop_after_attempt(3))のデコレータで宣言的に設定できます。`,
      code:`import asyncio
from tenacity import retry, wait_exponential, stop_after_attempt, RetryError

MAX_RETRIES = 3

async def handle_with_retry(producer, message: dict, topic: str = "order-events"):
    """再試行付きメッセージ処理"""
    retry_count = message.get("_retry_count", 0)

    try:
        await process_message(message)
    except Exception as e:
        if retry_count >= MAX_RETRIES:
            # 最大試行回数超過 → DLQへ
            dlq_message = {
                **message,
                "_error": str(e),
                "_failed_at": datetime.datetime.utcnow().isoformat(),
                "_original_topic": topic,
            }
            await producer.send(f"{topic}-dlq", dlq_message)
            print(f"DLQに送信: {dlq_message}")
            return

        # 再試行: 指数バックオフ
        wait_seconds = 2 ** retry_count
        await asyncio.sleep(wait_seconds)
        retry_message = {**message, "_retry_count": retry_count + 1}
        await producer.send(topic, retry_message)
        print(f"再試行 {retry_count + 1}/{MAX_RETRIES}: {wait_seconds}秒後")`,
      afterCode:"DLQのメッセージは監視ツールで定期的に確認し、根本原因を修正後に再処理（replay）します。Kafkaのメッセージ保持期間内であれば、オフセットを巻き戻して再処理することもできます。"}
   ]},

FastAPI側でもキューイングを実装できます。asyncio.Queueを使ってリクエストを貯め、バックグラウンドワーカーがバッチとして処理します。リクエストごとにFutureを作成し、処理完了時にresult()をセットして待機している呼び出し元に結果を返します。

GPUサーバーへのリクエストは同時実行数を制限することが重要です。asyncio.Semaphoreで制限しないとGPUメモリが枯渇します。一般的にGPUサーバー1台あたり4〜8の同時推論リクエストが目安です。`,
      code:`import asyncio
from dataclasses import dataclass

@dataclass
class BatchRequest:
    instances: list
    future: asyncio.Future

BATCH_SIZE = 32
BATCH_TIMEOUT = 0.01  # 10ms

class BatchProcessor:
    def __init__(self):
        self._queue: asyncio.Queue[BatchRequest] = asyncio.Queue()
        self._task: asyncio.Task | None = None

    async def start(self):
        self._task = asyncio.create_task(self._batch_loop())

    async def predict(self, instances: list) -> list:
        future = asyncio.get_event_loop().create_future()
        await self._queue.put(BatchRequest(instances, future))
        return await future

    async def _batch_loop(self):
        while True:
            batch: list[BatchRequest] = []
            try:
                req = await asyncio.wait_for(self._queue.get(), BATCH_TIMEOUT)
                batch.append(req)
                while len(batch) < BATCH_SIZE:
                    try:
                        req = self._queue.get_nowait()
                        batch.append(req)
                    except asyncio.QueueEmpty:
                        break
            except asyncio.TimeoutError:
                continue
            if batch:
                all_instances = [i for r in batch for i in r.instances]
                results = await self._run_inference(all_instances)
                # 各リクエストに結果を返す
                idx = 0
                for req in batch:
                    n = len(req.instances)
                    req.future.set_result(results[idx:idx+n])
                    idx += n`,
      afterCode:"Dynamic Batchingにより、個別リクエストの低レイテンシとGPUの高スループットを両立できます。BATCH_TIMEOUTを短くするとレイテンシが改善し、長くするとスループットが向上します。"}

     {title:"サーキットブレーカーとサービスヘルス管理", body:`サーキットブレーカーは外部サービス（DB・API）の障害を検知し、障害中のリクエストを即座に失敗させるパターンです。障害が伝播してシステム全体がダウンするカスケード障害を防ぎます。Pythonのpycircuitbreakerまたはtenacityで実装できます。

サーキットブレーカーには3つの状態があります。CLOSEDは正常状態で全リクエストを通します。OPENは障害状態で全リクエストを即座に拒否します（fallbackを返す）。HALF_OPENは回復を試みる状態で、一部のリクエストを通して成否を確認します。

FastAPIの/healthエンドポイントでDB・Redis・外部APIの疎通を確認するヘルスチェックを実装します。Kubernetes LivenessProbe・ReadinessProbeでこのエンドポイントを監視すれば、障害時に自動的にポッドを再起動・切り離しできます。`,
      code:`from enum import Enum
import asyncio, time

class CircuitState(Enum):
    CLOSED = "closed"
    OPEN = "open"
    HALF_OPEN = "half_open"

class CircuitBreaker:
    def __init__(self, failure_threshold=5, recovery_timeout=30.0):
        self.failure_threshold = failure_threshold
        self.recovery_timeout = recovery_timeout
        self.failure_count = 0
        self.last_failure_time = 0.0
        self.state = CircuitState.CLOSED

    async def call(self, func, *args, **kwargs):
        if self.state == CircuitState.OPEN:
            if time.time() - self.last_failure_time > self.recovery_timeout:
                self.state = CircuitState.HALF_OPEN
            else:
                raise Exception("Circuit breaker is OPEN")

        try:
            result = await func(*args, **kwargs)
            if self.state == CircuitState.HALF_OPEN:
                self.state = CircuitState.CLOSED
                self.failure_count = 0
            return result
        except Exception as e:
            self.failure_count += 1
            self.last_failure_time = time.time()
            if self.failure_count >= self.failure_threshold:
                self.state = CircuitState.OPEN
            raise`,

OpenTelemetryミドルウェアを使うとDistributed Tracingが実現できます。各リクエストにtrace-idを付与し、Jaeger・Zipkin・Datadogでリクエストが複数のサービスをまたいでどう流れるかを可視化できます。Pythonのlogging.setLogRecordFactory()でtrace-idをログに自動付与すると、ログとトレースを相関させられます。

      code:`from starlette.types import ASGIApp, Scope, Receive, Send
import time, logging, uuid

logger = logging.getLogger(__name__)

class ObservabilityMiddleware:
    """リクエストID・ロギング・メトリクスを統合したミドルウェア"""
    def __init__(self, app: ASGIApp):
        self.app = app
        self._request_count = 0
        self._error_count = 0

    async def __call__(self, scope: Scope, receive: Receive, send: Send):
        if scope["type"] != "http":
            await self.app(scope, receive, send)
            return

        request_id = str(uuid.uuid4())
        start_time = time.perf_counter()
        self._request_count += 1
        status_code = 200

        async def send_wrapper(message):
            nonlocal status_code
            if message["type"] == "http.response.start":
                status_code = message["status"]
                if status_code >= 500:
                    self._error_count += 1
                headers = list(message.get("headers", []))
                headers.append([b"x-request-id", request_id.encode()])
                message = {**message, "headers": headers}
            await send(message)

        try:
            await self.app(scope, receive, send_wrapper)
        finally:
            elapsed = time.perf_counter() - start_time
            path = scope.get("path", "")
            method = scope.get("method", "")
            logger.info(f"{method} {path} {status_code} {elapsed:.3f}s [{request_id}]")`,

Pythonのentry_points（setuptools）を使うと、外部パッケージとしてプラグインを配布できます。pip install my-fastapi-pluginするだけでアプリが機能を検出・登録します。大規模なFastAPIフレームワークであるLitestarはこのアプローチを採用しています。

      code:`from abc import ABC, abstractmethod
from fastapi import FastAPI, APIRouter
from typing import Sequence

class FastAPIPlugin(ABC):
    """プラグインの基底クラス"""
    @property
    @abstractmethod
    def name(self) -> str: ...

    def get_router(self) -> APIRouter | None:
        return None

    async def on_startup(self, app: FastAPI) -> None:
        pass

    async def on_shutdown(self, app: FastAPI) -> None:
        pass

class PluginRegistry:
    def __init__(self):
        self._plugins: list[FastAPIPlugin] = []

    def register(self, plugin: FastAPIPlugin) -> "PluginRegistry":
        self._plugins.append(plugin)
        return self  # メソッドチェーン用

    def apply(self, app: FastAPI) -> None:
        for plugin in self._plugins:
            router = plugin.get_router()
            if router:

        # lifespanにフックを追加
        original_lifespan = app.router.lifespan_context
        # ... lifespanのラップ処理

registry = PluginRegistry()`,
