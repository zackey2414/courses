async def publish_outbox(session, producer):

        OutboxEvent.published == False

import joblib
from fastapi import APIRouter, HTTPException

router = APIRouter(prefix="/models", tags=["ml"])

class ModelRegistry:
    def __init__(self):
        self._models: dict[str, object] = {}
        self._active: str | None = None
        self._lock = asyncio.Lock()

    async def load(self, version: str, path: str):
        import asyncio
        loop = asyncio.get_event_loop()
        model = await loop.run_in_executor(
            None, joblib.load, path
        )

import uuid
import structlog
from opentelemetry import trace
from starlette.middleware.base import BaseHTTPMiddleware

structlog.configure(
    processors=[
        structlog.contextvars.merge_contextvars,
        structlog.processors.add_log_level,
        structlog.processors.TimeStamper(fmt="iso"),
        structlog.processors.JSONRenderer(),
    ],
)

logger = structlog.get_logger()

class ObservabilityMiddleware(BaseHTTPMiddleware):
    async def dispatch(self, request, call_next):
        request_id = str(uuid.uuid4())[:8]
        span = trace.get_current_span()
        trace_id = format(
            span.get_span_context().trace_id, "032x"
        )
        structlog.contextvars.clear_contextvars()
        structlog.contextvars.bind_contextvars(
            request_id=request_id,
            trace_id=trace_id,
        )
        start = time.perf_counter()
        response = await call_next(request)
        elapsed = time.perf_counter() - start
        logger.info(
            "request",
            method=request.method,
            path=request.url.path,
            status=response.status_code,
            duration_ms=round(elapsed * 1000, 2),
        )
        return response`

import signal
from contextlib import asynccontextmanager
from fastapi import FastAPI

shutdown_event = asyncio.Event()

def handle_sigterm(*args):
    shutdown_event.set()

@asynccontextmanager
async def lifespan(app: FastAPI):
    loop = asyncio.get_event_loop()
    loop.add_signal_handler(signal.SIGTERM, handle_sigterm)
    yield
    # SIGTERMを受信したら最大30秒待機
    try:
        await asyncio.wait_for(
            shutdown_event.wait(), timeout=30.0
        )
    except asyncio.TimeoutError:
        pass

app = FastAPI(lifespan=lifespan)

@app.get("/health/live")
def liveness():
    return {"status": "alive"}

@app.get("/health/ready")
async def readiness():
    if shutdown_event.is_set():
        from fastapi import HTTPException
        raise HTTPException(503, "shutting down")
    return {"status": "ready"}`
