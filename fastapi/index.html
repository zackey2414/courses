    body: "FastAPI は 2018 年に Sebastián Ramírez 氏がリリースした Python の Web フレームワークです。名前の通り「速い API 開発」を標榜しており、その速さには 2 つの意味があります。1 つは開発速度（型ヒントを書くだけでバリデーションとドキュメント生成が自動化される）、もう 1 つは実行速度（ASGI + Starlette 基盤で Node.js や Go に匹敵するスループットを出す）です。\n\nPython の Web フレームワークと言えば Flask と Django が二大巨頭ですが、どちらも WSGI（同期）ベースで設計されており、非同期 I/O への対応は後付けです。FastAPI は最初から ASGI（非同期対応のサーバインタフェース）を前提に設計されているため、WebSocket や HTTP/2、大量の同時接続を自然に扱えます。Python を使ったことはあるが Web フレームワークは初めてという方にとって、FastAPI は最も現代的で学びやすい入口になるでしょう。\n\nもう 1 つの大きな特徴は、Python 3.5 以降で導入された型ヒント（type hints）を全面的に活用している点です。関数の引数に int や str といった型注釈を付けるだけで、FastAPI がリクエストパラメータの型変換・バリデーション・OpenAPI ドキュメント生成を自動的に行います。Flask では手動で request.args.get() してバリデーションも自分で書く必要がありましたが、FastAPI ではその大部分が不要になります。",

    title: "ASGI と Starlette — 裏側の仕組みを理解する",
    body: "Web API を動かすには、クライアントからの HTTP リクエストを受け取って Python のコードに渡す「仲介役」が必要です。この仲介役のインタフェース仕様が WSGI や ASGI です。WSGI（Web Server Gateway Interface）は長年 Python Web 開発の標準でしたが、1 リクエスト = 1 スレッドで処理するため、I/O 待ち（データベースへの問い合わせや外部 API の呼び出しなど）が多い API では効率が悪くなります。ASGI（Asynchronous Server Gateway Interface）はその非同期版で、async/await をネイティブに扱えるため、1 プロセスで数千の同時接続をさばくことが可能です。\n\nFastAPI は内部で Starlette というマイクロフレームワークをベースに構築されています。ルーティング（どの URL にアクセスされたらどの関数を呼ぶか）、ミドルウェア、WebSocket、静的ファイル配信といった低レイヤーの機能は全て Starlette が担当し、FastAPI はその上に型ヒント駆動のバリデーション、依存性注入、自動ドキュメント生成を載せています。\n\nこの二層構造のおかげで、パフォーマンスは Starlette 直書きとほぼ同等でありながら、開発者は宣言的で読みやすいコードを書けます。Flask で言えば Werkzeug が裏方を担当しているのと同じ関係です。初めのうちは ASGI や Starlette の詳細を深く理解する必要はありません。「FastAPI は非同期対応の高速な基盤の上に構築されている」という点だけ押さえておきましょう。",

    code: "# 1. 仮想環境の作成と有効化\npython -m venv venv\nsource venv/bin/activate    # Windows: venv\\Scripts\\activate\n\n# 2. FastAPI と Uvicorn のインストール\npip install \"fastapi[standard]\"\n\n# 3. 最小限のアプリケーション (main.py) を作成\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\n@app.get(\"/\")\ndef read_root():\n    return {\"message\": \"Hello, FastAPI!\"}\n\n# 4. サーバを起動\n# uvicorn main:app --reload\n#   main  → ファイル名（main.py）\n#   app   → FastAPI インスタンスの変数名\n#   --reload → ファイル変更時に自動再起動",

    body: "FastAPI のエンドポイント関数は def（通常の関数）でも async def（非同期関数）でも定義できます。Python スクリプトしか書いたことがない方にとって async/await は馴染みがないかもしれませんが、ここでは「なぜ存在するのか」だけ押さえておけば十分です。\n\nWeb API は同時に多くのクライアントからリクエストを受けます。あるリクエストでデータベースの応答を 100 ミリ秒待っている間、他のリクエストの処理を進められれば効率的です。async def で定義した関数は、await で I/O 待ちをしている間に他のリクエストを処理できます。def で定義した関数は従来通りスレッドで処理されるため、既存の同期ライブラリ（requests など）をそのまま使えます。\n\nこの時点ではどちらを使うべきか迷う必要はありません。迷ったら def を使いましょう。FastAPI は def の関数もスレッドプールで安全に実行してくれるので、パフォーマンス上の問題は起きません。非同期の詳細は第 6 章で改めて解説します。",

    code: "from fastapi import FastAPI\n\napp = FastAPI()\n\n# 型ヒントだけで自動パース + バリデーション + ドキュメント生成\n@app.get(\"/items/{item_id}\")\ndef read_item(item_id: int, q: str | None = None):\n    # item_id は URL から取得され、自動的に int に変換される\n    # q はクエリパラメータで、省略可能（None がデフォルト）\n    return {\"item_id\": item_id, \"q\": q}\n\n# 試してみよう:\n# GET /items/42       → {\"item_id\": 42, \"q\": null}     ← 正常\n# GET /items/42?q=abc → {\"item_id\": 42, \"q\": \"abc\"}    ← 正常\n# GET /items/abc      → 422 エラー（int に変換できない）← 自動拒否\n\n# Flask で同じことをする場合（比較）\n# @app.route(\"/items/<item_id>\")\n# def read_item(item_id):\n#     try:\n#         item_id = int(item_id)\n#     except ValueError:\n#         abort(400)\n#     q = request.args.get(\"q\")\n#     return jsonify({\"item_id\": item_id, \"q\": q})",

    code: "from fastapi import FastAPI\n\napp = FastAPI()\n\n# インメモリのダミーデータベース\nitems = {}\ncounter = 0\n\n# GET /items → 商品一覧を取得\n@app.get(\"/items\")\ndef list_items():\n    return list(items.values())\n\n# POST /items → 新しい商品を作成\n@app.post(\"/items\")\ndef create_item(name: str, price: float):\n    global counter\n    counter += 1\n    items[counter] = {\"id\": counter, \"name\": name, \"price\": price}\n    return items[counter]\n\n# PUT /items/{item_id} → 商品を更新\n@app.put(\"/items/{item_id}\")\ndef update_item(item_id: int, name: str, price: float):\n    items[item_id] = {\"id\": item_id, \"name\": name, \"price\": price}\n    return items[item_id]\n\n# DELETE /items/{item_id} → 商品を削除\n@app.delete(\"/items/{item_id}\")\ndef delete_item(item_id: int):\n    del items[item_id]\n    return {\"message\": \"deleted\"}",

    title: "パスパラメータ — URL の一部でデータを受け取る",
    body: "パスパラメータは URL の一部としてデータを受け取る方法です。たとえば「ID が 42 のユーザーの情報を取得したい」場合、URL を /users/42 のように構成します。FastAPI ではパスの中に {user_id} のように波括弧で変数を定義し、関数の引数名を同じ名前にするだけで、自動的にその部分の値が引数に渡されます。\n\nここで重要なのが型ヒントの役割です。関数の引数に user_id: int と型注釈を付けると、FastAPI は URL から取得した文字列 \"42\" を自動的に整数 42 に変換してくれます。もし /users/abc のように整数に変換できない値が来た場合、FastAPI は自動的に 422 エラー（バリデーションエラー）を返し、「このパラメータは整数でなければならない」という分かりやすいエラーメッセージをクライアントに伝えます。Python スクリプトなら int() で変換して ValueError をキャッチする処理を自分で書く必要がありますが、FastAPI では型ヒントを付けるだけで全て自動化されます。\n\n複数のパスパラメータを組み合わせることも可能で、/users/{user_id}/items/{item_id} のように階層的なリソース構造を表現できます。これは「ユーザー 1 が持つアイテム 3」のような関係性を URL で表現する RESTful 設計の基本パターンです。",
    code: "from fastapi import FastAPI\n\napp = FastAPI()\n\n# 基本のパスパラメータ\n# GET /users/42 → user_id に 42 が入る\n@app.get(\"/users/{user_id}\")\ndef read_user(user_id: int):\n    return {\"user_id\": user_id}\n\n# 複数パスパラメータ\n# GET /users/1/items/3 → user_id=1, item_id=3\n@app.get(\"/users/{user_id}/items/{item_id}\")\ndef read_user_item(user_id: int, item_id: int):\n    return {\"user_id\": user_id, \"item_id\": item_id}\n\n# ★重要: 固定パスと変数パスの順序\n# /users/me を先に定義しないと、\"me\" が user_id として解釈されてしまう\n@app.get(\"/users/me\")       # ← 固定パスを先に定義\ndef read_current_user():\n    return {\"user\": \"current user info\"}\n\n@app.get(\"/users/{user_id}\")  # ← 変数パスは後に定義\ndef read_user_by_id(user_id: int):\n    return {\"user_id\": user_id}\n\n# 型ヒントで自動バリデーション\n# GET /users/42   → OK: {\"user_id\": 42}\n# GET /users/abc  → 422 エラー: int に変換できない",
    afterCode: "注意: /users/me と /users/{user_id} のように固定パスと変数パスが競合する場合、固定パスを先に定義する必要があります。Python のコードは上から順に評価されるため、順序を間違えると me が user_id として解釈され、int に変換できないためエラーになってしまいます。"
  }, {
    title: "クエリパラメータ — URL の?以降でオプション指定",
    body: "クエリパラメータは URL の ? 以降に付くパラメータで、/items?skip=0&limit=10 のような形式です。ブラウザで Google 検索すると URL に ?q=検索ワード と付くのを見たことがあるかもしれません。あれがクエリパラメータです。パスパラメータが「どのリソースか」を指定するのに対し、クエリパラメータは「どういう条件で絞り込むか」「何件表示するか」といったオプション指定に使います。\n\nFastAPI ではパスに含まれない関数引数が自動的にクエリパラメータとして扱われます。引数にデフォルト値を設定すれば省略可能になり、str | None = None のように書けば「指定しなくてもよいパラメータ」になります。Flask では request.args.get('skip', default=0, type=int) と書く必要があり、型変換・デフォルト値・None チェックを手動で行う必要がありましたが、FastAPI では関数シグネチャだけで全てが表現されます。Swagger UI にもパラメータの型・デフォルト値・必須/任意の区別が自動的に反映されます。\n\nクエリパラメータは主に一覧取得時のフィルタリング・ソート・ページネーション（ページ送り）に使われます。RESTful 設計では、リソースの識別にはパスパラメータ、オプショナルな修飾にはクエリパラメータ、という使い分けが定石です。たとえば「ユーザー 42 の投稿一覧を新しい順に 10 件取得」なら GET /users/42/posts?sort=newest&limit=10 のようになります。",
    table: T.paramTypes,
    afterTable: "補足: ヘッダーと Cookie もパラメータの一種ですが、使う頻度は低いため後の章で解説します。まずはパスパラメータ・クエリパラメータ・リクエストボディの 3 つをしっかり押さえましょう。",
    code: "from fastapi import FastAPI, Query\n\napp = FastAPI()\n\n# 基本のクエリパラメータ\n# GET /items?skip=0&limit=5 → skip=0, limit=5\n# GET /items → skip=0, limit=10（デフォルト値が使われる）\n@app.get(\"/items\")\ndef read_items(\n    skip: int = 0,                          # デフォルト値あり → 省略可能\n    limit: int = Query(default=10, le=100),  # Query() で最大値100の制約を追加\n    q: str | None = None                    # None許容 → 省略可能\n):\n    results = {\"skip\": skip, \"limit\": limit}\n    if q:\n        results[\"q\"] = q\n    return results\n\n# Query() でバリデーションルールを追加する例\n# GET /search?keyword=python&page=2\n@app.get(\"/search\")\ndef search(\n    keyword: str = Query(..., min_length=1, max_length=50),  # ... = 必須\n    page: int = Query(default=1, ge=1)                       # 1以上\n):\n    return {\"keyword\": keyword, \"page\": page}\n\n# ★ パスパラメータとクエリパラメータの自動判別\n# パスに含まれる → パスパラメータ\n# パスに含まれない → クエリパラメータ\n@app.get(\"/users/{user_id}/posts\")\ndef read_user_posts(\n    user_id: int,           # パスに含まれる → パスパラメータ\n    sort: str = \"newest\",   # パスに含まれない → クエリパラメータ\n    limit: int = 10         # パスに含まれない → クエリパラメータ\n):\n    return {\"user_id\": user_id, \"sort\": sort, \"limit\": limit}",
    afterCode: "ポイント: Query(...) の ... は Python の Ellipsis リテラルで、FastAPI では「必須パラメータ」を意味します。デフォルト値を設定しない場合はクエリパラメータが必須になり、省略すると 422 エラーが返ります。Query(default=10) のように明示的に書くほうが可読性は高くなります。"
  }, {
    title: "リクエストボディ — JSON でデータを送る",
    body: "GET リクエストでは URL にパラメータを含めてデータを渡しますが、新しいデータを作成（POST）したり更新（PUT）したりする場合は、送るデータ量が多くなるため URL には収まりません。そこでリクエストボディを使います。リクエストボディとは、HTTP リクエストの「本体」にあたる部分で、JSON 形式でデータを格納して送信します。Python の辞書を json.dumps() で文字列にしたものと思ってください。\n\nFastAPI では Pydantic モデル（BaseModel を継承したクラス）を引数の型として指定するだけで、JSON ボディの自動パース・バリデーションが行われます。Pydantic モデルは Python のクラス定義そのもので、各フィールドの名前と型を宣言します。Flask では request.get_json() で辞書を取得し、各フィールドの存在チェックと型チェックを手動で行うのが一般的でしたが、FastAPI + Pydantic ではこの手間が完全に不要になります。Pydantic の詳細は次章で解説しますが、ここでは「クラス定義が入力バリデーションのルールになる」ことだけ覚えておいてください。\n\nパスパラメータ・クエリパラメータ・リクエストボディは 1 つのエンドポイントで同時に使えます。FastAPI は引数の型と位置から自動的にどこからデータを取るかを判定します。パスに含まれる名前はパスパラメータ、Pydantic モデル型はリクエストボディ、それ以外はクエリパラメータです。このルールさえ覚えれば混乱しません。",
    code: "from fastapi import FastAPI\nfrom pydantic import BaseModel\n\napp = FastAPI()\n\n# Pydantic モデルでリクエストボディの形を定義\nclass Item(BaseModel):\n    name: str                      # 必須: 文字列\n    price: float                   # 必須: 数値\n    description: str | None = None  # 省略可能: 文字列 or None\n\n# POST /items にJSON ボディを送ると自動的にパースされる\n# リクエスト例: {\"name\": \"りんご\", \"price\": 150}\n@app.post(\"/items\")\ndef create_item(item: Item):\n    # item.name, item.price でアクセスできる\n    return {\"created\": item.name, \"price\": item.price}\n\n# ★ ボディ + パスパラメータ + クエリパラメータの組み合わせ\n# PUT /items/42?importance=5 にJSON ボディ {\"name\": \"バナナ\", \"price\": 200} を送信\n@app.put(\"/items/{item_id}\")\ndef update_item(\n    item_id: int,           # パスに含まれる → パスパラメータ\n    item: Item,              # Pydantic モデル → リクエストボディ\n    importance: int = 0      # それ以外 → クエリパラメータ\n):\n    return {\n        \"item_id\": item_id,\n        \"item\": item,\n        \"importance\": importance\n    }\n\n# 判定ルールまとめ:\n# 1. パスの {} に含まれる名前 → パスパラメータ\n# 2. Pydantic BaseModel 型 → リクエストボディ（JSON）\n# 3. それ以外（int, str など）→ クエリパラメータ",
    afterCode: "ミニ演習: /docs の Swagger UI で POST /items を試してみましょう。「Try it out」を押すと、リクエストボディの入力欄が表示されます。{\"name\": \"テスト\", \"price\": 100} を入力して「Execute」を押し、レスポンスを確認してみてください。name を省略したり、price に文字列を入れたりすると、どんなエラーが返るかも確認しましょう。"
  }]
}, {

  title: "Pydanticモデルとバリデーション",
  est: "70分",
  goal: "FastAPI のバリデーション基盤である Pydantic v2 の BaseModel を自在に使いこなせるようになる。Field によるフィールド制約、model_validator によるモデル全体のバリデーション、ネストされたモデル構造の定義、そして入力用・出力用モデルの使い分けまでを習得するのがゴール。",
  sections: [{
    title: "Pydantic とは — なぜ必要なのか",
    body: "Web API を作るとき、クライアントから送られてくるデータが「正しい形式かどうか」を検証する必要があります。たとえば年齢フィールドに \"abc\" という文字列が送られてきたり、メールアドレスの形式でない値が来たりすることは日常茶飯事です。Python スクリプトなら自分で入力を制御できますが、Web API は外部からのリクエストを受け付けるため、「何が送られてくるか分からない」前提で防御的にコードを書く必要があります。\n\nPydantic は Python の型ヒントを使ってデータの検証（バリデーション）と変換を行うライブラリです。FastAPI はこの Pydantic を全面的に採用しており、リクエストボディの解析、レスポンスの整形、設定ファイルの読み込みなど、あらゆる場面でデータバリデーションの基盤として機能しています。Pydantic のクラスを 1 つ定義するだけで、「スキーマ定義（どんなフィールドがあるか）」「バリデーション（値が正しいか）」「ドキュメント生成（API ドキュメントにスキーマを表示）」の 3 つが一度に実現されます。\n\nPydantic v2（2023 年リリース）は Rust で書かれたコアエンジンを持ち、v1 比で 5〜50 倍の高速化を実現しています。FastAPI 0.100 以降は Pydantic v2 をネイティブサポートしており、本コースでも v2 の記法を使います。ネット上には v1 の書き方（.dict() や @validator）が残っていますが、v2 の新しい書き方（.model_dump() や @field_validator）を使うようにしてください。",
    code: "from pydantic import BaseModel, Field\n\n# Pydantic モデルの定義 = Python のクラス定義\nclass User(BaseModel):\n    name: str              # 必須: 文字列\n    age: int               # 必須: 整数\n    email: str | None = None  # 省略可能: 文字列 or None\n\n# インスタンス作成時に自動バリデーション\nuser = User(name=\"太郎\", age=25)         # OK\n# user = User(name=\"太郎\", age=\"abc\")    # ValidationError（int に変換不可）\n\n# Python の辞書から生成（API のリクエストボディはこの形で届く）\nuser = User.model_validate({\"name\": \"太郎\", \"age\": 25})\n\n# JSON 文字列から生成\nuser = User.model_validate_json('{\"name\": \"太郎\", \"age\": 25}')\n\n# Pydantic モデルを辞書・JSON に変換（レスポンスとして返すとき）\nprint(user.model_dump())       # {\"name\": \"太郎\", \"age\": 25, \"email\": None}\nprint(user.model_dump_json())  # '{\"name\":\"太郎\",\"age\":25,\"email\":null}'\n\n# フィールドへのアクセス（通常の Python オブジェクトと同じ）\nprint(user.name)   # \"太郎\"\nprint(user.age)    # 25",
    afterCode: "ポイント: model_dump() と model_dump_json() は Pydantic v2 のメソッドです。v1 では .dict() / .json() でしたが、v2 で名前が変わりました。ネット上の古い記事に注意してください。FastAPI がレスポンスとして返すときは自動的に model_dump() が呼ばれるので、通常は意識する必要はありません。"
  }, {
    title: "FastAPI と Pydantic の連携",
    body: "前章でリクエストボディの受け取り方を簡単に紹介しましたが、ここで FastAPI と Pydantic がどう連携するかをもう少し詳しく見てみましょう。FastAPI のエンドポイント関数で Pydantic モデルを引数の型にすると、FastAPI は以下を自動で行います。(1) クライアントから送られた JSON を読み取る、(2) Pydantic モデルのフィールド定義に従ってバリデーションする、(3) バリデーションに通れば Pydantic のインスタンスとして関数に渡す、(4) バリデーションに失敗すれば 422 エラーを返す。\n\nこの一連の流れを手動で実装すると、JSON のパース、フィールドの存在チェック、型変換、エラーレスポンスの構築と、かなりのコードが必要です。Flask でこれをやると 20 行以上になる処理が、FastAPI + Pydantic ならモデル定義とエンドポイント定義を合わせても 10 行程度で済みます。しかもエラーメッセージは「どのフィールドがどう不正か」が自動的に詳細に返されます。\n\nPydantic モデルは再利用性も高く、同じモデルを複数のエンドポイントで使い回せます。また、Swagger UI ではモデルの構造がスキーマとして表示されるため、API を使うフロントエンド開発者がリクエストの形式を一目で把握できます。",
    code: "from fastapi import FastAPI\nfrom pydantic import BaseModel\n\napp = FastAPI()\n\n# Pydantic モデルの定義\nclass Item(BaseModel):\n    name: str\n    price: float\n    is_offer: bool = False  # デフォルト値あり → 省略可能\n\n# FastAPI が自動で行ってくれること:\n# 1. JSON を読み取り\n# 2. Item モデルでバリデーション\n# 3. バリデーション OK → item にインスタンスが入る\n# 4. バリデーション NG → 422 エラーを自動返却\n@app.post(\"/items\")\ndef create_item(item: Item):\n    # item は Item のインスタンス\n    result = {\"name\": item.name, \"price_with_tax\": item.price * 1.1}\n    if item.is_offer:\n        result[\"discount\"] = \"10% off!\"\n    return result\n\n# 正常なリクエスト:\n# POST /items  body: {\"name\": \"りんご\", \"price\": 150}\n# → {\"name\": \"りんご\", \"price_with_tax\": 165.0}\n\n# エラーになるリクエスト:\n# POST /items  body: {\"name\": \"りんご\"}\n# → 422 エラー: price フィールドが必須だが不足\n\n# POST /items  body: {\"name\": \"りんご\", \"price\": \"高い\"}\n# → 422 エラー: price は float でなければならない",
    afterCode: "ポイント: is_offer のようにデフォルト値を持つフィールドは、リクエストで省略されても問題ありません。FastAPI の Swagger UI では必須フィールドと省略可能フィールドが明確に区別して表示されます。"
  }, {
    title: "Field によるバリデーション",
    body: "BaseModel でフィールドの型（str, int, float など）を指定するだけでも基本的な型チェックは行われますが、実務ではもっと細かい制約が必要です。「名前は 2 文字以上 50 文字以下」「価格は 0 より大きい」「カテゴリは特定のパターンに一致する」といったルールです。Field() を使うと、こうした詳細なバリデーションルールを宣言的に定義できます。\n\nField() の主要なパラメータは覚えやすく設計されています。数値には gt（より大きい）, ge（以上）, lt（未満）, le（以下）、文字列には min_length / max_length、正規表現には pattern を使います。これらは Python スクリプトで if 文を使って手動チェックしていた処理を、宣言的に書き換えたものと考えてください。バリデーションエラー時のメッセージも自動生成されるため、エラー処理のコードを書く必要がありません。\n\nField の第 1 引数に ... を渡すと「必須フィールド」、default=値 を渡すと「省略可能でデフォルト値あり」という意味になります。description パラメータを付けると、Swagger UI のドキュメントにフィールドの説明が表示されるので、API 利用者に親切なドキュメントを自動生成できます。",
    table: T.pydanticField,
    afterTable: "補足: gt は \"greater than\"（より大きい）、ge は \"greater than or equal\"（以上）、lt は \"less than\"（未満）、le は \"less than or equal\"（以下）の略です。数学記号の > ≧ < ≦ に対応します。",
    code: "from pydantic import BaseModel, Field\n\nclass Product(BaseModel):\n    # ... は「必須」を意味する\n    name: str = Field(\n        ...,\n        min_length=1,        # 1文字以上\n        max_length=100,      # 100文字以下\n        description=\"商品名\"  # Swagger UI に表示される説明\n    )\n    price: float = Field(\n        ...,\n        gt=0,                # 0より大きい（0は不可）\n        description=\"価格（0より大きい）\"\n    )\n    quantity: int = Field(\n        default=0,           # デフォルト値あり → 省略可能\n        ge=0,                # 0以上（0は可）\n        description=\"在庫数\"\n    )\n    category: str = Field(\n        default=\"general\",\n        pattern=r\"^[a-z]+$\",  # 正規表現: 小文字英字のみ\n        description=\"カテゴリ（小文字英字のみ）\"\n    )\n\n# OK: 全てのルールを満たす\nproduct = Product(name=\"Apple\", price=150.0)\n\n# エラー: price が 0 以下\n# Product(name=\"Apple\", price=-100)  # ValidationError\n\n# エラー: category に大文字が含まれる\n# Product(name=\"Apple\", price=150, category=\"ABC\")  # ValidationError",
    afterCode: "ミニ演習: price に -100 を、category に 'ABC'（大文字）を渡すと、それぞれどんな ValidationError が出るか確認してみましょう。エラーメッセージにはどのフィールドのどのルールに違反したかが明示されます。FastAPI のエンドポイントで使えば、これらのエラーが自動的に 422 レスポンスとして返されます。"
  }, {
    title: "model_validator とカスタムバリデーション",
    body: "Field() で指定できるのは個々のフィールドに対するルールだけですが、実務では「フィールド間の関係」を検証したい場面が頻繁にあります。たとえば「開始日が終了日より前であること」「パスワードと確認パスワードが一致すること」「割引価格が定価より低いこと」といった複合条件です。こうした場合に model_validator を使います。\n\nPydantic v2 では @model_validator(mode='before') と @model_validator(mode='after') の 2 つのタイミングがあります。before はデータが Pydantic モデルに変換される前（つまり辞書の段階）に実行され、after は全フィールドのバリデーションが通った後に実行されます。ほとんどの場合は after を使います。after ならフィールドの値が正しい型であることが保証された状態でロジックを書けるため、安全です。\n\n個別のフィールド単位のカスタムバリデーションには @field_validator を使います。こちらは「ユーザー名にスペースを含めない」「メールアドレスを小文字に正規化する」のように、特定の 1 フィールドに対するカスタムルールを書く場合に適しています。Python スクリプトで if 文で書いていたバリデーションロジックを、モデル定義の中に集約できるのが利点です。",
    code: "from pydantic import BaseModel, model_validator, field_validator\n\n# model_validator: フィールド間の関係を検証\nclass DateRange(BaseModel):\n    start_date: str\n    end_date: str\n\n    @model_validator(mode=\"after\")\n    def check_dates(self):\n        # 全フィールドのバリデーションが通った後に実行される\n        if self.start_date >= self.end_date:\n            raise ValueError(\"start_date は end_date より前でなければなりません\")\n        return self  # 必ず self を返す\n\n# field_validator: 個別フィールドのカスタムルール\nclass Username(BaseModel):\n    name: str\n\n    @field_validator(\"name\")\n    @classmethod\n    def name_must_not_contain_spaces(cls, v: str) -> str:\n        # v にはフィールドの値が渡される\n        if \" \" in v:\n            raise ValueError(\"名前にスペースは使えません\")\n        return v.strip()  # 戻り値が最終的な値になる（前後の空白を除去）\n\n# OK\nDateRange(start_date=\"2024-01-01\", end_date=\"2024-12-31\")\n\n# エラー: 開始日が終了日の後\n# DateRange(start_date=\"2024-12-31\", end_date=\"2024-01-01\")",

    title: "ネストされたモデル",

    code: "from pydantic import BaseModel, Field\n\n# 住所モデル\nclass Address(BaseModel):\n    prefecture: str            # 都道府県（必須）\n    city: str                  # 市区町村（必須）\n    street: str | None = None  # 番地（省略可能）\n\n# ユーザーモデル（Address をネスト）\nclass User(BaseModel):\n    name: str\n    age: int = Field(..., ge=0)\n    address: Address                # ← モデルをネスト\n    tags: list[str] = []            # 文字列のリスト\n    scores: dict[str, int] = {}     # 文字列→整数の辞書\n\n# 使用例: ネスト部分は辞書で渡しても自動変換される\nuser = User(\n    name=\"太郎\",\n    age=25,\n    address={\"prefecture\": \"東京都\", \"city\": \"渋谷区\"},  # 辞書 → Address に自動変換\n    tags=[\"python\", \"fastapi\"],\n    scores={\"math\": 90, \"english\": 85}\n)\n\n# address フィールドにアクセス\nprint(user.address.prefecture)  # \"東京都\"\nprint(user.address.city)        # \"渋谷区\"",

    title: "入力モデルと出力モデルの分離",
    body: "実務では「入力時に受け取るフィールド」と「出力時に返すフィールド」が異なることがほとんどです。典型的な例がユーザー登録 API です。登録時にはパスワードを受け取りますが、レスポンスにパスワードを含めてはいけません（セキュリティ上の重大なリスクになります）。また、id や created_at は DB が自動生成するため入力には不要ですが、出力には必要です。\n\nFastAPI ではこの問題を「モデルの継承」で解決するのが定番です。共通フィールドを持つ Base クラスを定義し、入力用（Create）には password フィールドを追加、出力用（Out / Response）には id フィールドを追加します。Django REST Framework の Serializer でも同様のパターンがありますが、Pydantic のほうが Python の型システムとの統合が深く、IDE のサポートも強力です。\n\nPydantic v2 では model_config で from_attributes = True を指定すると、SQLAlchemy などの ORM オブジェクトを直接 Pydantic モデルに変換できます（ORM モード）。DB から取得したオブジェクトを UserOut.model_validate(db_user) で変換するだけで、password を含まないレスポンス用データが出来上がります。DB との連携は第 7 章で詳しく解説します。",

  sections: [{
    title: "依存性注入とは",
    body: "依存性注入（Dependency Injection, DI）は「関数が必要とするもの（依存）を外部から渡す」設計パターンです。FastAPI では Depends() を使ってこれを宣言的に実現します。\n\nたとえば「全てのエンドポイントで認証チェックを行いたい」場合、各関数に認証コードをコピーペーストするのではなく、認証ロジックを 1 つの依存関数に切り出し、Depends() で注入します。Flask ではデコレータ（@login_required）や before_request フックで実現していましたが、FastAPI の DI はテスト時にモック差し替えが容易という点で優れています。\n\nDjango REST Framework にも permission_classes や authentication_classes による DI 的な仕組みがありますが、FastAPI の Depends() はより汎用的で、認証に限らずあらゆる「共通処理」を注入できます。DB セッションの取得、設定値の読み込み、レートリミット、ログ出力など、用途は無限です。",

    title: "サブ依存性（依存の連鎖）",
    body: "依存関数の中でさらに別の依存関数を Depends() で要求できます。これをサブ依存性と呼び、A → B → C のような依存の連鎖を宣言的に構築できます。\n\nたとえば「DB セッション → リポジトリ → サービス」という三層構造は、get_db → get_repository(db=Depends(get_db)) → get_service(repo=Depends(get_repository)) のように書けます。各層がそれぞれの関心に集中でき、テスト時には任意の層をモックに差し替えられます。\n\nFastAPI は依存グラフを解析し、同じ依存関数が複数回参照されている場合はリクエストごとに 1 回だけ実行してキャッシュします（use_cache=True がデフォルト）。これにより DB セッションが複数回作られるといった問題が自動的に防がれます。",

    code: "from fastapi import FastAPI, Depends\n\napp = FastAPI()\n\n# yield を使った依存関数\ndef get_db():\n    db = {\"connection\": \"open\"}\n    print(\"DB接続を開始\")\n    try:\n        yield db                  # ← ここでリクエスト処理が走る\n    finally:\n        print(\"DB接続をクローズ\")  # ← リクエスト処理後に必ず実行\n\n@app.get(\"/items\")\ndef read_items(db: dict = Depends(get_db)):\n    return {\"items\": [], \"db_status\": db[\"connection\"]}",
