  sections: [{
    title: "依存性注入とは",
    body: "依存性注入（Dependency Injection, DI）は「関数が必要とするもの（依存）を外部から渡す」設計パターンです。FastAPI では Depends() を使ってこれを宣言的に実現します。\n\nたとえば「全てのエンドポイントで認証チェックを行いたい」場合、各関数に認証コードをコピーペーストするのではなく、認証ロジックを 1 つの依存関数に切り出し、Depends() で注入します。Flask ではデコレータ（@login_required）や before_request フックで実現していましたが、FastAPI の DI はテスト時にモック差し替えが容易という点で優れています。\n\nDjango REST Framework にも permission_classes や authentication_classes による DI 的な仕組みがありますが、FastAPI の Depends() はより汎用的で、認証に限らずあらゆる「共通処理」を注入できます。DB セッションの取得、設定値の読み込み、レートリミット、ログ出力など、用途は無限です。",

    title: "yield を使った依存関数",

    title: "ライフスパンイベント",

    code: "from contextlib import asynccontextmanager\nfrom fastapi import FastAPI\nimport httpx\n\n@asynccontextmanager\nasync def lifespan(app: FastAPI):\n    # 起動時の処理\n    app.state.http_client = httpx.AsyncClient()\n    print(\"HTTP client initialized\")\n    yield\n    # 終了時の処理\n    await app.state.http_client.aclose()\n    print(\"HTTP client closed\")\n\napp = FastAPI(lifespan=lifespan)\n\n@app.get(\"/external\")\nasync def call_external():\n    client = app.state.http_client\n    response = await client.get(\"https://httpbin.org/get\")\n    return response.json()",

    title: "OAuth2 + JWT の実装",

    code: "from fastapi import FastAPI, Depends, HTTPException\nfrom fastapi.security import OAuth2PasswordBearer\nfrom enum import Enum\n\napp = FastAPI()\noauth2_scheme = OAuth2PasswordBearer(tokenUrl=\"token\")\n\nclass Role(str, Enum):\n    admin = \"admin\"\n    user = \"user\"\n    viewer = \"viewer\"\n\ndef get_current_user(token: str = Depends(oauth2_scheme)):\n    # JWT をデコードしてユーザー情報を取得\n    return {\"username\": \"admin\", \"role\": Role.admin}\n\ndef require_role(*allowed_roles: Role):\n    def checker(user: dict = Depends(get_current_user)):\n        if user[\"role\"] not in allowed_roles:\n            raise HTTPException(status_code=403, detail=\"Forbidden\")\n        return user\n    return checker\n\n@app.get(\"/admin\")\ndef admin_only(user: dict = Depends(require_role(Role.admin))):\n    return {\"message\": \"Admin area\", \"user\": user[\"username\"]}\n\n@app.get(\"/dashboard\")\ndef dashboard(user: dict = Depends(require_role(Role.admin, Role.user))):\n    return {\"message\": \"Dashboard\", \"user\": user[\"username\"]}",

    code: "from fastapi import FastAPI, WebSocket, WebSocketDisconnect\n\napp = FastAPI()\n\nclass ConnectionManager:\n    def __init__(self):\n        self.active_connections: list[WebSocket] = []\n\n    async def connect(self, websocket: WebSocket):\n        await websocket.accept()\n        self.active_connections.append(websocket)\n\n    def disconnect(self, websocket: WebSocket):\n        self.active_connections.remove(websocket)\n\n    async def send_personal(self, message: str, websocket: WebSocket):\n        await websocket.send_text(message)\n\n    async def broadcast(self, message: str):\n        for connection in self.active_connections:\n            await connection.send_text(message)\n\nmanager = ConnectionManager()\n\n@app.websocket(\"/ws/{client_id}\")\nasync def websocket_endpoint(websocket: WebSocket, client_id: str):\n    await manager.connect(websocket)\n    await manager.broadcast(f\"{client_id} joined\")\n    try:\n        while True:\n            data = await websocket.receive_text()\n            await manager.broadcast(f\"{client_id}: {data}\")\n    except WebSocketDisconnect:\n        manager.disconnect(websocket)\n        await manager.broadcast(f\"{client_id} left\")",
