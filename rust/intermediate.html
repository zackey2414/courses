  {diff:1,q:"Arc<Mutex<i32>>を2スレッドで共有し、それぞれ50回インクリメントして合計100になることを確認するコードを書け。",code:"use std::sync::{Arc, Mutex};\nuse std::thread;\n\nfn main() {\n    // ここに書く\n}",answer:"use std::sync::{Arc, Mutex};\nuse std::thread;\n\nfn main() {\n    let counter = Arc::new(Mutex::new(0));\n    let mut handles = vec![];\n    for _ in 0..2 {\n        let c = Arc::clone(&counter);\n        handles.push(thread::spawn(move || {\n            for _ in 0..50 { *c.lock().unwrap() += 1; }\n        }));\n    }\n    for h in handles { h.join().unwrap(); }\n    println!(\"{}\", *counter.lock().unwrap()); // 100\n}"},
  {diff:2,q:"RwLockを使って、複数のread threadが同時に読み、1つのwrite threadが書くコードを書け。",code:"use std::sync::{Arc, RwLock};\nuse std::thread;\n\nfn main() {\n    let data = Arc::new(RwLock::new(0i32));\n    // 3つの読みスレッドと1つの書きスレッドを起動\n}",answer:"use std::sync::{Arc, RwLock};\nuse std::thread;\n\nfn main() {\n    let data = Arc::new(RwLock::new(0i32));\n    let mut handles = vec![];\n    for _ in 0..3 {\n        let d = Arc::clone(&data);\n        handles.push(thread::spawn(move || {\n            println!(\"read: {}\", *d.read().unwrap());\n        }));\n    }\n    let d = Arc::clone(&data);\n    handles.push(thread::spawn(move || { *d.write().unwrap() = 42; }));\n    for h in handles { h.join().unwrap(); }\n}"},
  {diff:3,q:"crossbeamのscoped threadを使ってスタック上のスライスを複数スレッドで並列処理するコードを書け。",code:"// crossbeam = \"0.8\"\nfn main() {\n    let data = vec![1, 2, 3, 4];\n    // crossbeam::scope を使って各要素を別スレッドで出力\n}",answer:"fn main() {\n    let data = vec![1, 2, 3, 4];\n    crossbeam::scope(|s| {\n        for item in &data {\n            s.spawn(move |_| println!(\"{}\", item));\n        }\n    }).unwrap();\n}"},
],
ch11:[
  {diff:1,q:"reqwestを使ってhttps://httpbin.org/get にGETリクエストを送り、レスポンスのステータスコードを出力するコードを書け。",code:"// reqwest = { version = \"0.11\", features = [\"json\"] }\n#[tokio::main]\nasync fn main() -> Result<(), reqwest::Error> {\n    // ここに書く\n    Ok(())\n}",answer:"#[tokio::main]\nasync fn main() -> Result<(), reqwest::Error> {\n    let resp = reqwest::get(\"https://httpbin.org/get\").await?;\n    println!(\"Status: {}\", resp.status());\n    Ok(())\n}"},
  {diff:2,q:"serde_jsonでJSON文字列を構造体にデシリアライズし、フィールドを出力するコードを書け。",code:"use serde::Deserialize;\n\n#[derive(Deserialize, Debug)]\nstruct Point { x: f64, y: f64 }\n\nfn main() {\n    let json = r#\"{\"x\": 1.0, \"y\": 2.5}\"#;\n    // ここに書く\n}",answer:"use serde::Deserialize;\nuse serde_json;\n\n#[derive(Deserialize, Debug)]\nstruct Point { x: f64, y: f64 }\n\nfn main() {\n    let json = r#\"{\"x\": 1.0, \"y\": 2.5}\"#;\n    let p: Point = serde_json::from_str(json).unwrap();\n    println!(\"{:?}\", p);\n}"},
  {diff:3,q:"tower::ServiceBuilderを使ってリクエストにログを追加するミドルウェアスタックを構築するコードのスケルトンを書け。",code:"use tower::ServiceBuilder;\nuse tower_http::trace::TraceLayer;\n\n// axum Routerにmiddlewareを追加する例を書け",answer:"use axum::{Router, routing::get};\nuse tower::ServiceBuilder;\nuse tower_http::trace::TraceLayer;\n\nasync fn root() -> &'static str { \"ok\" }\n\n#[tokio::main]\nasync fn main() {\n    let app = Router::new()\n        .route(\"/\", get(root))\n        .layer(ServiceBuilder::new().layer(TraceLayer::new_for_http()));\n    let listener = tokio::net::TcpListener::bind(\"0.0.0.0:3000\").await.unwrap();\n    axum::serve(listener, app).await.unwrap();\n}"},

const chapters = [
{id:"ch1",num:1,title:"非同期プログラミング入門 (async/await)",est:"60分",
goal:"async/awaitの仕組みを理解し、Futureトレイトがどのように動作するかを説明できる。tokio::mainを使った非同期プログラムを自分で書ける。",
sections:[
{title:"なぜ非同期が必要か",
body:"Webサーバーやネットワーク通信では、I/O待ちの間CPUが遊んでしまいます。同期プログラムでは1スレッドが1リクエストを担当するため、同時接続数が増えるとスレッドのメモリ消費が爆発します。非同期プログラミングはI/O待ちを「他のタスクに制御を譲る」形で表現し、少ないスレッドで大量の並行処理を実現します。\n\nPythonのasyncio・JavaScriptのPromise/awaitと概念は同じです。ただしRustのasyncはコンパイル時に状態機械（ステートマシン）に変換されるため、ランタイムコストがほぼゼロという点が異なります。Pythonではasyncioのイベントループが動的にコルーチンを管理しますが、Rustでは実行時にヒープ割り当てが発生しない設計が基本です。\n\nRustのasyncはゼロコスト抽象化の典型例です。asyncブロックはFutureトレイトを実装した匿名型にコンパイルされ、スレッドをブロックせずに中断・再開できる状態機械として動作します。",
table:T.asyncBasics,
afterTable:"Futureは「まだ完成していない計算」を表す型です。.awaitと書くことで現在のタスクを中断し、ランタイムが他のタスクを実行できるようにします。Futureそのものは値であり、.awaitするまで何も実行されません（Pythonのコルーチンと同じ遅延評価）。"},
{title:"tokioランタイム",
body:"Rustのasyncはランタイムを標準ライブラリに含みません。代わりにtokio・async-std・smbioなど複数のランタイムが存在します。現在の業界標準はtokioで、Webフレームワーク・データベースドライバ・クラウドSDKの大半がtokioをベースにしています。\n\ntokioは内部でワークスティーリング方式のスレッドプールを使い、複数のCPUコアを効率よく活用します。#[tokio::main]アトリビュートを付けると、mainをtokioランタイムで包む定型文が自動生成されます。",
code:"// Cargo.toml\n// [dependencies]\n// tokio = { version = \"1\", features = [\"full\"] }\n\n#[tokio::main]\nasync fn main() {\n    let result = fetch_data().await;\n    println!(\"{}\", result);\n}\n\nasync fn fetch_data() -> String {\n    // 実際にはHTTPリクエスト等を行う\n    \"data\".to_string()\n}",
afterCode:"features = [\"full\"]は学習・プロトタイプ向けです。本番では必要なfeatureだけ有効にするとコンパイル時間が短縮されます（例: features = [\"rt-multi-thread\",\"macros\",\"io-util\"]）。"},
]},
{id:"ch2",num:2,title:"Tokioの並行処理パターン",est:"70分",
goal:"tokio::spawn・join!・select!・チャネルを使いこなし、複数の非同期タスクを安全に協調させる設計ができる。",
sections:[
{title:"tokio::spawnでタスクを並列起動",
body:"tokio::spawnは新しい非同期タスクをランタイムに送り込みます。Pythonのasyncio.create_taskに相当しますが、RustではJoinHandle<T>が返るため結果を後から受け取れます。spawnしたタスクは即座に実行を開始し、JoinHandleを.awaitすることで完了を待てます。\n\nspawnに渡すクロージャはSend + 'staticを満たす必要があります。これはmulti-thread環境で任意のスレッドに移動する可能性があるためで、Mutexで包まれていない&mut参照をキャプチャするとコンパイルエラーになります。この制約はバグを実行時ではなくコンパイル時に検出するRustの強みです。",
table:T.tokioTasks,
afterTable:"select!はPythonのasyncio.waitに相当しますが、マクロとして実装されており構文がより明確です。join!はasyncio.gatherに対応します。タイムアウト付き処理はtime::timeout(Duration, future).awaitで書くのが慣用的です。"},
{title:"チャネルによるタスク間通信",
body:"スレッド間・タスク間のデータ転送にはチャネルを使います。Rustにはstd::sync::mpscとtokio::sync::mpscがあり、非同期コードではtokio版を使います。tokio版の.send()は非同期であり、バッファが満杯のとき空きができるまで.awaitします（バックプレッシャー）。\n\nPythonのasyncio.Queueとよく似ていますが、Rustでは型安全性が保証されます。送信者(Sender)をcloneすることで複数のproducerを作れます（M→1パターン）。チャネルのバッファサイズはシステムのスループットとレイテンシのトレードオフです。",
table:T.channelTypes,
afterTable:"oneshotチャネルはリクエスト/レスポンスパターンに最適です。例えばワーカータスクにoneshotのSenderを渡し、完了したらSenderに結果を送るパターンはよく使われます。watchチャネルは設定のホットリロード等に向いています。"},
]},
{id:"ch3",num:3,title:"Webフレームワーク: axum",est:"75分",
goal:"axumでRESTful APIサーバーを構築し、パス・クエリ・JSONボディのエクストラクタを使いこなせる。共有状態をState経由で渡す設計ができる。",
sections:[
{title:"axumの設計思想",
body:"axumはtokioチームが開発したWebフレームワークで、tower/hyperをベースにしています。actix-webと並ぶ人気がありますが、axumはよりRust的な設計でマクロを最小限にし、通常の関数とトレイトでルーティングを表現します。\n\nPythonのbottleやflaskと比べると、ルーティングは文字列ではなくRouter::new().route(\"/path\", get(handler))のように型安全に記述します。ハンドラの引数は「エクストラクタ」と呼ばれるパターンで、From<Request>を実装した型を引数に書くだけで自動的にリクエストから情報を取り出せます。Dependency Injectionがコンパイル時に型で検証されるイメージです。",
table:T.axumRouting,
afterTable:"axumのエクストラクタはFromRequest/FromRequestPartsトレイトを実装しています。自分でカスタムエクストラクタを書けば認証チェック等を引数に表現できます。エラー時はIntoResponseを実装した型を返すだけでHTTPエラーレスポンスに変換されます。"},
{title:"共有状態とミドルウェア",
body:"複数のハンドラで共有する状態（データベースプール・設定等）はState<T>エクストラクタで受け取ります。Router::with_state(state)でルータに状態を束縛します。内部的にはArc<T>でラップされているため、スレッド間共有が安全です。\n\nミドルウェアはtower::Layerトレイトで実装し、.layer()でルータに追加します。tower-httpクレートにはTraceLayer（ログ）・CorsLayer・CompressionLayer等の実用的なミドルウェアが揃っています。Pythonのstarlette/fastapi middlewareと同じ概念ですが、型安全にコンパイル時に接続が検証されます。",
code:"use axum::{Router, routing::get, extract::{Path, State}, Json};\nuse std::sync::Arc;\nuse serde::Serialize;\n\n#[derive(Clone)]\nstruct AppState { greeting: String }\n\n#[derive(Serialize)]\nstruct Resp { message: String }\n\nasync fn hello(\n    Path(name): Path<String>,\n    State(state): State<Arc<AppState>>,\n) -> Json<Resp> {\n    Json(Resp { message: format!(\"{}, {}!\", state.greeting, name) })\n}\n\n#[tokio::main]\nasync fn main() {\n    let state = Arc::new(AppState { greeting: \"Hello\".into() });\n    let app = Router::new()\n        .route(\"/hello/:name\", get(hello))\n        .with_state(state);\n    let listener = tokio::net::TcpListener::bind(\"0.0.0.0:3000\").await.unwrap();\n    axum::serve(listener, app).await.unwrap();\n}",
afterCode:"State<Arc<T>>のパターンはaxumの慣用形です。Arc<Mutex<T>>にすることで可変状態も共有できますが、Mutexのロック時間を最小限に保つよう設計してください。"},
]},
{id:"ch4",num:4,title:"データベース連携: sqlx",est:"80分",
goal:"sqlxでPostgreSQL/SQLiteに接続し、型安全なクエリを書ける。コネクションプールとトランザクションを適切に使えるようになる。",
sections:[
{title:"sqlxの型安全クエリ",
body:"sqlxはコンパイル時にSQLを検証できる非同期データベースクレートです。query_as!マクロを使うと、SELECT列とRust構造体のフィールドがコンパイル時に照合されます。SQLの誤りが実行時ではなくビルド時に発覚するため、Pythonのsqlalchemyより安全です。\n\nコンパイル時検証にはDATABASE_URL環境変数と実際のデータベースへの接続が必要です（オフラインモードも用意されています）。query!とquery_as!はマクロ、sqlx::query()とsqlx::query_as()は動的バージョンで後者はコンパイル時検証なしです。",
table:T.sqlxTypes,
afterTable:"NULLの可能性がある列はOption<T>にマッピングします。Option<String>をSomeとNoneで扱うことで、NULL許容列の取り忘れをコンパイラが検出してくれます。これはPythonのNone扱いと比べて圧倒的に安全です。"},
{title:"コネクションプールとトランザクション",
body:"本番環境ではPgPoolを使いコネクションを再利用します。PgPoolOptionsでmax_connections・connect_timeout・idle_timeout等を調整できます。プールはArcで包まれているためclone()しても低コストです。\n\nトランザクションはpool.begin()で開始し、tx.commit()またはtx.rollback()で終了します。dropするとrollbackが自動実行されるため、エラー時の安全性が高いです。実務では複数のINSERT/UPDATEをまとめてatomicに実行する際に必須です。",
code:"use sqlx::{PgPool, postgres::PgPoolOptions};\n\nasync fn run(pool: &PgPool) -> Result<(), sqlx::Error> {\n    // トランザクション例\n    let mut tx = pool.begin().await?;\n\n    sqlx::query!(\n        \"INSERT INTO todos (title, done) VALUES ($1, $2)\",\n        \"Learn sqlx\",\n        false,\n    )\n    .execute(&mut *tx)\n    .await?;\n\n    let count = sqlx::query_scalar!(\"SELECT COUNT(*) FROM todos\")\n        .fetch_one(&mut *tx)\n        .await?;\n\n    println!(\"todos count: {:?}\", count);\n    tx.commit().await?;\n    Ok(())\n}",
afterCode:"&mut *txというパターンはトランザクションをExecutorとして渡すための慣用表現です。poolとtxの両方がExecutorを実装しているため、ヘルパー関数にExecutor型を受け取らせることで同一関数をプールトランザクション両方で使えます。"},
]},
{id:"ch5",num:5,title:"マクロとメタプログラミング",est:"75分",
goal:"macro_rules!で実用的な宣言的マクロを書ける。thiserror/anyhowのprocマクロを使いこなし、#[derive]の仕組みを説明できる。",
sections:[
{title:"macro_rules!: 宣言的マクロ",
body:"macro_rules!はパターンマッチによるコード生成システムです。Pythonにはデコレータがありますが、macro_rules!はより強力で引数の数を可変にしたり、式・型・識別子など様々なトークンをキャプチャできます。実行時ではなくコンパイル時に展開されるため、ゼロコストです。\n\nvec![]・println!・assert_eq!はすべてmacro_rules!で実装されています。自作マクロを書く場面はそれほど多くありませんが、反復するボイラープレートを削減するために有用です。proc-macroより学習コストが低いため、まずmacro_rules!から始めることをお勧めします。",
table:T.macroTypes,
afterTable:"cargo expandコマンド（cargo install cargo-expand）を使うとマクロ展開後のコードを確認できます。デバッグに非常に役立つので必ず覚えておいてください。"},
{title:"proc-macroとderiveマクロ",
body:"proc-macro（手続き的マクロ）はRustコード自体を入力として受け取り、新しいRustコードを出力する関数です。#[derive(Debug, Clone, Serialize)]のようなderiveマクロは最も一般的な使用例です。synクレートでASTをパースし、quote!クレートでコードを生成するのが標準パターンです。\n\nproc-macroは独立したクレートとして定義する必要があり（Cargo.tomlにproc-macro = trueを指定）、学習コストは高めです。しかしserdeのようなエコシステムの要となるクレートはprocマクロで成り立っているため、仕組みを理解しておくことは重要です。thiserror・anyhow・serde・async-traitなど日常的に使うクレートはすべてprocマクロの恩恵を受けています。",
code:"// thiserrorでカスタムエラー型を定義\nuse thiserror::Error;\n\n#[derive(Error, Debug)]\nenum AppError {\n    #[error(\"database error: {0}\")]\n    Database(#[from] sqlx::Error),\n\n    #[error(\"not found: id={0}\")]\n    NotFound(i64),\n\n    #[error(\"validation failed: {field} — {reason}\")]\n    Validation { field: String, reason: String },\n}\n\n// anyhowでアプリ層のエラー処理\nuse anyhow::{Context, Result};\n\nfn load_config(path: &str) -> Result<String> {\n    std::fs::read_to_string(path)\n        .with_context(|| format!(\"failed to read config: {}\", path))\n}",
afterTable:"thiserrorはライブラリクレート向け（型安全なエラー定義）、anyhowはアプリケーション向け（コンテキスト付きエラー伝播）と使い分けるのが定番パターンです。",
afterCode:"#[from]アトリビュートを付けるとFromトレイトが自動実装され、?演算子でsqlx::ErrorをAppErrorに自動変換できます。"},
]},
{id:"ch6",num:6,title:"unsafe Rustと低レベルプログラミング",est:"70分",
goal:"unsafeブロックの5種類の操作を説明でき、生ポインタとFFIを安全に扱える。Sendとunsafe traitの関係を理解できる。",
sections:[
{title:"unsafeブロックの役割",
body:"unsafeブロックはRustの安全保証をプログラマが手動で維持することをコンパイラと約束する構文です。Cのポインタ操作をそのまま行えますが、unsafeブロック内のバグはCのバグと同様にUB（未定義動作）を引き起こします。\n\n重要なのは「unsafeブロックはバグを許可するのではなく、バグがないことをプログラマが保証する」という点です。標準ライブラリのVecやStringはunsafeで実装されていますが、安全なAPIの背後に隠蔽されています。これが「unsafeを安全な抽象に包む」パターンで、Rustのエコシステム全体の設計思想です。",
table:T.unsafeOps,
afterTable:"cargo mirはunsafeコードのUBを検出するインタープリタです。unsafeコードを書いたら必ずcargo miri testを実行してください。Valgrindに相当するRustの標準ツールと考えてください。"},
{title:"FFI: CとRustの橋渡し",
body:"FFI（Foreign Function Interface）を使うことでCライブラリをRustから呼べます。libcクレートはC標準ライブラリの型とバインディングを提供します。extern \"C\" {}ブロックで外部関数を宣言し、unsafeブロックで呼び出します。\n\n逆にRustの関数をCから呼ぶには#[no_mangle]と extern \"C\"を付け、cdylibとしてコンパイルします。Pythonのctypes・cffiと同じ概念ですが、Rustでは型変換の安全性がより厳密に管理されています。bindgenクレートを使うとCヘッダから自動的にFFIバインディングを生成できます。",
table:T.ffiBasics,
code:"// Cの関数をRustから呼ぶ例\nuse std::ffi::{CString, CStr};\nuse std::os::raw::c_char;\n\nextern \"C\" {\n    fn strlen(s: *const c_char) -> usize;\n}\n\nfn rust_strlen(s: &str) -> usize {\n    let c_str = CString::new(s).expect(\"CString::new failed\");\n    unsafe { strlen(c_str.as_ptr()) }\n}\n\nfn main() {\n    println!(\"{}\", rust_strlen(\"hello\")); // 5\n}",
afterCode:"CStringはRustのStringをNUL終端のCスタイル文字列に変換します。as_ptr()で生ポインタを取得できますが、CStringがdropされると無効になるため、unsafeブロック内でCStringを保持しておく必要があります（dangling pointer防止）。"},
]},
{id:"ch7",num:7,title:"パフォーマンスチューニング",est:"75分",
goal:"criterionでベンチマークを書ける。イテレータチェーンとzero-copyパターンを使った最適化を説明できる。Rc/RefCellとArc/Mutexの使い分けができる。",
sections:[
{title:"測定してから最適化",
body:"パフォーマンス改善は「まず測定」が鉄則です。Rustはデフォルトでかなり高速ですが、アルゴリズムの選択・不必要なクローン・ヒープ割り当てが性能の足を引っ張ることがあります。cargo bench + criterionで統計的に安定したベンチマークを取れます。\n\nPythonでcython/numbaを使う場面の多くは、Rustであれば標準のリリースビルド（cargo build --release）でカバーされます。--releaseを付けずにベンチマークするのは厳禁です。LLVM最適化（インライン化・ループ展開・SIMD自動ベクタライゼーション）がreleaseでのみ有効になります。",
table:T.perfTools,
afterTable:"flamegraphはホットスポットを視覚的に特定するのに最も効率的なツールです。cargo install flamegraphでインストールし、cargo flamegraph --bin mybinで生成されるSVGをブラウザで開くだけで使えます。"},
{title:"ゼロコピーとメモリ効率",
body:"Rustでは所有権システムのおかげで不必要なコピーを排除しやすいです。&strはString、&[T]はVec<T>のゼロコピースライスです。関数がStringやVecを受け取る場合、引数を&strや&[T]にすることでコピーなしに処理できます。\n\nCow<str>（Clone-on-Write）は「多くの場合は借用だが、変更時だけ所有する」パターンに使います。Pythonでは文字列がimmutableなため常にコピーが発生しますが、Rustでは大半のケースでゼロコピーが実現できます。std::mem::take・swap等を活用し、不必要なcloneを避けることが最初のステップです。",
code:"// クローンを減らすパターン集\n\n// BAD: Stringを受け取るとmoveまたはcloneが必要\nfn process_bad(s: String) -> usize { s.len() }\n\n// GOOD: &strはどんな文字列型も受け取れてゼロコピー\nfn process_good(s: &str) -> usize { s.len() }\n\n// Cow: 通常はゼロコピー借用、必要時のみ所有\nuse std::borrow::Cow;\nfn ensure_lowercase<'a>(s: &'a str) -> Cow<'a, str> {\n    if s.chars().all(|c| c.is_lowercase()) {\n        Cow::Borrowed(s)  // コピーなし\n    } else {\n        Cow::Owned(s.to_lowercase())  // 変換時のみ割り当て\n    }\n}",
afterCode:"clippyの警告 needless_clone はほとんどの場合有効です。cargo clippy -- -D warningsをCIに入れることで不必要なcloneをコードレビュー前に発見できます。"},
]},
{id:"ch8",num:8,title:"高度なテスト技法",est:"65分",
goal:"プロパティテスト・統合テスト・非同期テスト・ドキュメントテストを書ける。テスト設計の戦略を説明できる。",
sections:[
{title:"テストの種類と設計方針",
body:"Rustはテストが言語に組み込まれており、#[test]アトリビュートだけで単体テストが書けます。srcファイル内にmod testsを置くことでプライベート関数もテストできる点はPythonと異なります（Pythonでは通常テストファイルから直接プライベート関数にアクセスできません）。\n\nテストピラミッドの観点では単体テストを多く、統合テストを少なく、E2Eテストをさらに少なくするのが原則ですが、Rustではコンパイル時の型検査が非常に強力なため、型の誤りをテストで検出する必要が少ないです。そのため「動作の正しさ」に集中した意味のあるテストを書くことに注力できます。",
table:T.testingTiers,
afterTable:"ドキュメントテストはドキュメントの例が常に動作することを保証するRust独自の仕組みです。///コメント内に```rustで書いたコードはcargo testで自動実行されます。ライブラリを公開する際は全てのpub関数にドキュメントテストを書く習慣をつけてください。"},
{title:"非同期テストとmockito",
body:"非同期テストには#[tokio::test]アトリビュートを使います。これはtokioランタイムを自動セットアップするdropinアトリビュートです。非同期関数は通常のテストでは.awaitできないため、async testが必要です。\n\n外部HTTPリクエストのモック化にはmockitoクレートが便利です。実際のHTTPサーバーをテスト内で起動し、URLをオーバーライドすることでネットワーク不要のテストを書けます。Pythonのunittest.mockやresponsesライブラリに相当します。",
code:"// ドキュメントテストの例\n/// 2つの数を足し合わせる。\n///\n/// # Examples\n///\n/// ```\n/// assert_eq!(mylib::add(2, 3), 5);\n/// ```\npub fn add(a: i32, b: i32) -> i32 { a + b }\n\n// 非同期テスト例\n#[cfg(test)]\nmod tests {\n    #[tokio::test]\n    async fn test_async_function() {\n        let result = super::some_async_fn().await;\n        assert_eq!(result, \"expected\");\n    }\n\n    // プロパティテスト例\n    use proptest::prelude::*;\n    proptest! {\n        #[test]\n        fn add_is_commutative(a: i32, b: i32) {\n            prop_assert_eq!(super::add(a, b), super::add(b, a));\n        }\n    }\n}",
afterCode:"proptestは100回（デフォルト）ランダムな入力でテストを実行し、失敗ケースを最小化（shrink）して出力します。境界値バグ・整数オーバーフロー等を自動発見できます。"},
]},
{id:"ch9",num:9,title:"WebAssembly (Wasm) へのコンパイル",est:"70分",
goal:"wasm-packを使ってRustコードをWasmにコンパイルし、JavaScriptから呼び出せる。wasm_bindgenで型安全な境界を設計できる。",
sections:[
{title:"RustとWasmの親和性",
body:"WebAssemblyはブラウザ上でCネイティブ水準の性能を実現するバイナリ形式です。Rustはwasmへのコンパイルサポートが非常に充実しており、ランタイムがなくても動作します。PythonもPyodideでwasm上で動きますが、インタープリタ全体を含むため数MBのダウンロードが必要です。RustのWasmバイナリは機能単位で最適化でき、数十KBに収まることも珍しくありません。\n\nwasm-packはRust→Wasm→npm packageの変換を自動化するツールです。wasm-bindgenはJavaScriptとRustの間の型変換コード（グルーコード）を自動生成します。これにより、RustのStringがJavaScriptのstringとして扱え、所有権の心配なく相互運用できます。",
table:T.wasm,
afterTable:"wasm-pack buildで生成されるpkg/ディレクトリには.wasm・.js（グルー）・.d.ts（TypeScript型定義）が含まれます。npmパッケージとして直接publishできるため、フロントエンドチームにRust実装を提供する際に便利です。"},
{title:"実践的なWasmの使い方",
body:"Wasmが最も効果を発揮するのは、CPUバウンドな処理（画像処理・暗号・パース・数値計算）をブラウザ内で行う場合です。DOM操作はweb_sys経由でできますが、JavaScriptとWasmの呼び出しにオーバーヘッドがあるため、DOM操作の多い処理はJavaScript側に残すのが実務的な設計です。\n\nwasm_bindgen_futuresを使えば非同期RustコードもWasmで実行できます。Rust側でasync fnを書き、JavaScriptのPromiseとして公開する設計です。これによりfetchAPI等のWeb APIをRust側から非同期に呼び出せます。",
code:"use wasm_bindgen::prelude::*;\nuse wasm_bindgen_futures::JsFuture;\nuse web_sys::{Request, RequestInit, Response};\n\n// JavaScriptのPromiseとして公開される非同期関数\n#[wasm_bindgen]\npub async fn fetch_text(url: String) -> Result<String, JsValue> {\n    let opts = RequestInit::new();\n    let request = Request::new_with_str_and_init(&url, &opts)?;\n\n    let window = web_sys::window().unwrap();\n    let resp_value = JsFuture::from(window.fetch_with_request(&request)).await?;\n    let resp: Response = resp_value.dyn_into()?;\n\n    let text = JsFuture::from(resp.text()?).await?;\n    Ok(text.as_string().unwrap_or_default())\n}",
afterCode:"web_sysはWeb APIのほぼ全てのバインディングを持つ巨大なクレートです。Cargo.tomlのfeaturesで必要なAPIだけ有効化することでバイナリサイズを最小化できます。"},
]},
{id:"ch10",num:10,title:"並行性と共有状態の高度な設計",est:"70分",
goal:"Arc/Mutex/RwLockとosスレッドを組み合わせた設計ができる。デッドロックを回避するパターンを説明できる。crossbeamの基本機能を使える。",
sections:[
{title:"Arc/Mutex/RwLockのパターン",
body:"複数スレッドで可変データを共有するにはArc<Mutex<T>>が基本です。Arcは参照カウントによる共有所有権（Rcのスレッドセーフ版）で、Mutexは排他的アクセスを保証します。PythonのthreadingモジュールのLockに相当しますが、Rustではlock()が失敗した場合の処理（PoisonedError）も型で強制されます。\n\nRwLockはReadWriteLockで、複数の読み取り or 一つの書き込みを許可します。データが主に読まれ稀にしか書かれない場合、Mutexより高いスループットが得られます。デッドロックはMutexの取得順序が一定でない場合に発生するため、複数のMutexを使う場合は常に同じ順序でlock()する設計にしてください。",
code:"use std::sync::{Arc, RwLock};\nuse std::thread;\n\nfn main() {\n    let data = Arc::new(RwLock::new(Vec::<i32>::new()));\n\n    let mut handles = vec![];\n\n    // 書き込みスレッド\n    let d = Arc::clone(&data);\n    handles.push(thread::spawn(move || {\n        let mut v = d.write().unwrap();\n        v.extend([1, 2, 3]);\n    }));\n\n    // 複数の読み取りスレッド\n    for _ in 0..3 {\n        let d = Arc::clone(&data);\n        handles.push(thread::spawn(move || {\n            let v = d.read().unwrap();\n            println!(\"len = {}\", v.len());\n        }));\n    }\n\n    for h in handles { h.join().unwrap(); }\n}",
afterCode:"parking_lotクレートのMutex/RwLockはstd版より高性能で、PoisonedErrorの概念もなくシンプルです。本番コードではparking_lotの採用を検討してください。"},
{title:"crossbeamとscoped threads",
body:"std::thread::spawnはクロージャにSend + 'staticを要求するため、スタック上のデータへの参照を渡せません。crossbeam::scopeはスコープ付きスレッドを提供し、スコープの終了まで生存するデータへの参照をスレッドに渡せます。\n\nstd::thread::scope（Rust 1.63以降）でも同様のことができ、crossbeamなしで利用可能です。チャネルについてはcrossbeam::channelがstdの mpscより機能豊富で（select!構文・priorityサポート等）、パフォーマンスも優れています。非同期を使わないCPUバウンドな並列処理（例: rayon）ではcrossbeamが活躍します。",
code:"use std::thread;\n\nfn main() {\n    let data = vec![1, 2, 3, 4, 5];\n\n    // std::thread::scope (Rust 1.63+)\n    thread::scope(|s| {\n        for chunk in data.chunks(2) {\n            s.spawn(|| {\n                // dataの参照を直接使える\n                println!(\"{:?}\", chunk);\n            });\n        }\n        // スコープ終了時に全スレッドをjoin\n    });\n    println!(\"done, data still owned: {:?}\", data);\n}",
afterCode:"rayonクレートはデータ並列処理の決定版です。.par_iter()をiter()に変えるだけでマルチコア並列処理が有効になります。行列計算・画像処理・大規模ソート等でPython+numpyの並列化より実装が簡単です。"},
]},
{id:"ch11",num:11,title:"HTTPクライアントとシリアライゼーション",est:"65分",
goal:"reqwestでREST APIを呼び出し、serde_jsonでデシリアライズできる。カスタムシリアライザを書ける。実務的なAPIクライアント設計ができる。",
sections:[
{title:"reqwestによるHTTPクライアント",
body:"reqwestはRustで最も広く使われているHTTPクライアントです。tokioと組み合わせた非同期版と、非async環境用のblocking版があります。PythonのhttprequestsやhttpxのRust版と考えてください。\n\nClientはコネクションプールやTLS設定・タイムアウト・ヘッダーのデフォルトをまとめて管理するオブジェクトです。グローバルなClient::new()を一度だけ作りArcで共有するパターンが推奨されます。JSONレスポンスは.json::<T>()でdeserializeできるため、Pythonのresp.json()と同様の感覚で使えます。",
code:"use reqwest::Client;\nuse serde::Deserialize;\n\n#[derive(Deserialize, Debug)]\nstruct Post {\n    id: u32,\n    title: String,\n    body: String,\n}\n\nasync fn fetch_post(client: &Client, id: u32) -> anyhow::Result<Post> {\n    let url = format!(\"https://jsonplaceholder.typicode.com/posts/{}\", id);\n    let post = client\n        .get(&url)\n        .timeout(std::time::Duration::from_secs(10))\n        .send()\n        .await?\n        .error_for_status()? // 4xx/5xxをErrに変換\n        .json::<Post>()\n        .await?;\n    Ok(post)\n}\n\n#[tokio::main]\nasync fn main() -> anyhow::Result<()> {\n    let client = Client::new();\n    let post = fetch_post(&client, 1).await?;\n    println!(\"{}: {}\", post.id, post.title);\n    Ok(())\n}",
afterCode:"error_for_status()はHTTPステータスが4xx/5xxの場合にErrを返す便利メソッドです。Pythonのresp.raise_for_status()に相当します。"},
{title:"serdeのカスタマイズ",
body:"serde_jsonはRustで最も使われるJSONライブラリです。#[derive(Serialize, Deserialize)]で通常は十分ですが、フィールド名のリネーム（snake_case→camelCase）・デフォルト値・フラット化等の高度な制御が必要な場合はserde属性を使います。\n\nPythonのpydanticと機能的に近い部分がありますが、Rustではバリデーションはvalidatorクレートを別途使います。serdeのカスタムシリアライザ/デシリアライザを書くことで、任意の変換ロジックを実装できます。",
code:"use serde::{Deserialize, Serialize};\n\n#[derive(Serialize, Deserialize, Debug)]\n#[serde(rename_all = \"camelCase\")]  // JSONはcamelCase\nstruct UserProfile {\n    user_id: u64,           // → userId\n    display_name: String,   // → displayName\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    bio: Option<String>,    // nullならシリアライズしない\n    #[serde(default)]\n    is_admin: bool,         // 欠落時はfalse\n    #[serde(rename = \"ts\")]\n    timestamp: u64,         // フィールド名を\"ts\"に\n}",
afterCode:"#[serde(rename_all = \"camelCase\")]はREST APIとの連携で最も頻繁に使うattributeです。サーバーがcamelCaseを返し、Rustコードがsnake_caseで扱うという変換を自動で行います。"},
]},
{id:"ch12",num:12,title:"クレート設計とエコシステム",est:"60分",
goal:"ワークスペースとモジュール設計のベストプラクティスを実践できる。ライブラリクレートのpub API設計・semver管理・ドキュメント生成ができる。",
sections:[
{title:"ワークスペースとモジュール設計",
body:"大規模なRustプロジェクトはworkspaceで複数のcrateに分割します。ワークスペースを使うとビルドキャッシュ・依存バージョンを共有でき、cargo testが全crateを対象に実行されます。典型的な構成はmyapp（バイナリ）+ mylib（ライブラリ）+ mylib-macros（procマクロ）の3クレートです。\n\nモジュール設計ではpubとpub(crate)の使い分けが重要です。外部に公開する必要のないものはpub(crate)または非pubにし、public APIを最小化します。pub use を使ったre-exportにより、内部モジュール構造を外部から隠蔽しながら使いやすいAPIを提供できます。Pythonの__all__に相当する役割です。",
table:T.macroTypes,
afterTable:"モジュールシステムはファイルシステムと対応しています。src/foo.rsとsrc/foo/mod.rsのどちらでモジュールを定義してもよいですが、現代のRustではsrc/foo.rs + src/foo/bar.rsの形式が推奨されます。"},
{title:"semverとAPIの安定性",
body:"Cargoはsemver（Semantic Versioning）でバージョンを管理します。メジャーバージョンアップ（1.x→2.x）はbreaking changeを許可、マイナー・パッチアップは後方互換が原則です。ライブラリを公開する場合はこのルールを厳守しないと利用者が被害を受けます。\n\ncargo-semver-checksツールはAPIの破壊的変更を自動検出します。ドキュメントはcargo docで生成されHTMLで確認できます。///コメントがrustdocに変換され、```rustのコードブロックはコンパイル実行されます。crates.ioに公開する前にcargo doc --openで見た目を確認してください。",
code:"// 良いpub API設計の例\n// src/lib.rs\n\nmod internal;        // 外部から見えない\nmod utils;           // 外部から見えない\n\npub mod error;       // エラー型は公開\npub use internal::Client;   // 内部型を再エクスポート\n\n/// ライブラリのエントリポイント\n///\n/// # Examples\n///\n/// ```\n/// let c = mylib::Client::new(\"https://api.example.com\");\n/// assert!(c.is_ok());\n/// ```\npub fn create_client(base_url: &str) -> Result<Client, error::Error> {\n    internal::Client::new(base_url)\n}",
afterCode:"#![deny(missing_docs)]をlib.rsの先頭に追加すると、ドキュメントなしのpubアイテムがコンパイルエラーになります。公開クレートにはこの設定を入れることをお勧めします。"},
]},
];
