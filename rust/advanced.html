use proc_macro::TokenStream;
use quote::quote;
use syn::{parse_macro_input, DeriveInput};

#[proc_macro_derive(Hello)]
pub fn hello_derive(input: TokenStream) -> TokenStream {
    // ここに書く
    todo!()
}`,answer:`#[proc_macro_derive(Hello)]
pub fn hello_derive(input: TokenStream) -> TokenStream {
    let input = parse_macro_input!(input as DeriveInput);
    let name = &input.ident;
    let fields = if let syn::Data::Struct(s) = &input.data {
        s.fields.iter().map(|f| f.ident.as_ref().unwrap().to_string()).collect::<Vec<_>>()
    } else { vec![] };
    let expanded = quote! {
        impl #name {
            pub fn hello(&self) {
                println!("Struct: {}, fields: {:?}", stringify!(#name), vec![#(#fields),*]);
            }
        }
    };
    expanded.into()
}`},

    // ここに書く

}`,answer:`#[proc_macro_attribute]

    let input = parse_macro_input!(item as syn::ItemFn);
    let name = &input.sig.ident;
    let block = &input.block;
    let vis = &input.vis;
    let sig = &input.sig;
    let expanded = quote! {
        #vis #sig {
            println!("calling: {}", stringify!(#name));
            #block
        }
    };
    expanded.into()
}`},

use std::pin::Pin;
use std::task::{Context, Poll, RawWaker, RawWakerVTable, Waker};

    fn no_op(_: *const ()) {}
    fn clone(p: *const ()) -> RawWaker { noop_raw_waker() }
    static VT: RawWakerVTable = RawWakerVTable::new(clone, no_op, no_op, no_op);
    RawWaker::new(std::ptr::null(), &VT)
}
fn noop_waker() -> Waker { unsafe { Waker::from_raw(noop_raw_waker()) } }

fn exec<F: Future>(f: F) -> F::Output {
    let mut f = Box::pin(f);
    let waker = noop_waker();
    let mut cx = Context::from_waker(&waker);
    loop {
        match f.as_mut().poll(&mut cx) {
            Poll::Ready(v) => return v,
            Poll::Pending => {},
        }
    }
}`},

}`,answer:`#[cfg(target_arch = "x86_64")]
use std::arch::x86_64::*;

fn simd_add(a: [f32;4], b: [f32;4]) -> [f32;4] {
    unsafe {
        let va = _mm_loadu_ps(a.as_ptr());
        let vb = _mm_loadu_ps(b.as_ptr());
        let vc = _mm_add_ps(va, vb);
        let mut out = [0f32;4];
        _mm_storeu_ps(out.as_mut_ptr(), vc);
        out
    }
}`},

use wide::f32x4;

fn simd_sum(a: &[f32], b: &[f32]) -> Vec<f32> {
    // 4要素ずつf32x4で加算
    todo!()
}`,answer:`use wide::f32x4;

fn simd_sum(a: &[f32], b: &[f32]) -> Vec<f32> {
    a.chunks(4).zip(b.chunks(4)).flat_map(|(ca, cb)| {
        let mut av = [0f32;4]; let mut bv = [0f32;4];
        av[..ca.len()].copy_from_slice(ca);
        bv[..cb.len()].copy_from_slice(cb);
        let r = f32x4::from(av) + f32x4::from(bv);
        r.to_array()[..ca.len()].to_vec()
    }).collect()
}`},

    fn next<'a>(&'a mut self) -> Option<Self::Item<'a>>;
}

struct WindowIter<'s> { data: &'s [i32], pos: usize, size: usize }

impl<'s> LendingIterator for WindowIter<'s> {
    type Item<'a> = &'a [i32] where Self: 'a;
    fn next<'a>(&'a mut self) -> Option<&'a [i32]> {
        if self.pos + self.size > self.data.len() { return None; }
        let s = &self.data[self.pos..self.pos+self.size];
        self.pos += 1;
        Some(s)
    }
}`},

    data: [Option<T>; N],
    len: usize,
}

impl<T: Copy + Default, const N: usize> Stack<T, N> {
    fn new() -> Self {
        Stack { data: [None; N], len: 0 }
    }
    fn push(&mut self, v: T) -> Result<(), &'static str> {
        if self.len >= N { return Err("full"); }
        self.data[self.len] = Some(v);
        self.len += 1;
        Ok(())
    }
    fn pop(&mut self) -> Result<T, &'static str> {
        if self.len == 0 { return Err("empty"); }
        self.len -= 1;
        Ok(self.data[self.len].take().unwrap())
    }
}`},

use std::sync::Arc;
use std::thread;

fn main() {
    let counter = Arc::new(AtomicU64::new(0));
    let mut handles = vec![];
    for _ in 0..10 {
        let c = Arc::clone(&counter);
        handles.push(thread::spawn(move || {

const chapters = [
{id:"ch1",num:1,title:"proc-macroの実装",est:"75分",
goal:"proc-macroクレートを作成し、syn/quoteを使ってderiveマクロとattribute macroを実装できる。phf等のコンパイル時計算マクロを活用できる。",
sections:[
{title:"proc-macroクレートの構成",
body:`proc-macroはコンパイラのフロントエンドに組み込まれるプラグインの一種で、Rustのソースコードを入力として受け取りRustのソースコードを出力します。通常のコードとは別のクレートとして定義し、Cargo.tomlにproc-macro = trueと宣言します。

Pythonのデコレータとよく似た役割ですが、Rustのproc-macroはコンパイル時にのみ実行され実行時コストがゼロです。さらに、型情報・ASTにアクセスできるため、コード生成の自由度が格段に高いです。#[derive(Debug)]や#[serde::Serialize]は全てこのproc-macroとして実装されています。`,
table:T.procMacroFlow,
afterTable:`proc-macroの難点はコンパイルエラーメッセージが分かりにくい点です。eprintln!を使ったデバッグと、cargo expandによる展開確認が主なデバッグ手法です。`},
{title:"syn/quoteによるASTの操作",
body:`synはTokenStreamをRustのASTに変換するパーサーライブラリです。DeriveInputをパースすると構造体名・フィールド・属性等の情報にアクセスできます。quoteはRustのコードを書くためのDSLで、#name等の補間構文でASTの値を埋め込んでTokenStreamを生成します。

proc_macro2はprocマクロとの境界で使われるTokenStream型で、テストコードでも動作します（proc-macroは実際のコンパイルプロセス内でのみ動作するためテストが困難）。proc_macro2のおかげでユニットテスト可能なprocマクロが書けます。`,
code:`// Cargo.toml (proc-macro crate)
// [lib]
// proc-macro = true
// [dependencies]
// syn = { version = "2", features = ["full"] }
// quote = "1"
// proc-macro2 = "1"

use proc_macro::TokenStream;
use quote::quote;
use syn::{parse_macro_input, DeriveInput, Data, Fields};

#[proc_macro_derive(Describe)]
pub fn describe_derive(input: TokenStream) -> TokenStream {
    let input = parse_macro_input!(input as DeriveInput);
    let name = &input.ident;

    let field_names: Vec<String> = if let Data::Struct(s) = &input.data {
        if let Fields::Named(f) = &s.fields {
            f.named.iter()
                .filter_map(|f| f.ident.as_ref().map(|i| i.to_string()))
                .collect()
        } else { vec![] }
    } else { vec![] };

    let expanded = quote! {
        impl #name {
            pub fn describe(&self) -> String {
                format!("{} has fields: {:?}", stringify!(#name), vec![#(#field_names),*])
            }
        }
    };
    expanded.into()
}`,
afterCode:`quote!内の#(#items),*はVec等のイテラブルを繰り返し展開するパターンです。Rustのforループをコンパイル時に展開する表現で、proc-macroの最重要構文の一つです。`},
]},
{id:"ch2",num:2,title:"Futureの内部実装とPin",est:"80分",
goal:"FutureとPoll/Waker/Contextの関係を理解し、手動でFutureを実装できる。Pinが必要な理由と自己参照構造体の問題を説明できる。",
sections:[
{title:"Futureトレイトの内部構造",
body:`async/awaitはコンパイル時にFutureトレイトを実装したステートマシンに変換されます。Futureのコア操作はpoll()で、PollableタスクをWakerで再スケジュールする設計です。ランタイム（tokio等）はpoll()を繰り返し呼び出し、Poll::Readyが返るまで待機します。

Pythonのasyncio.Futureと概念は似ていますが、Rustのランタイムはコールバックではなく繰り返しのpoll()でFutureを進めます（ポーリングモデル）。このモデルの利点はヒープ割り当てが少なく、スタック上にFutureを配置できる点です。`,
table:T.asyncAdvanced,
afterTable:`Wakerはコールバックに相当しますが、Rustでは不特定のスレッドからwake()できる型（Send + Sync）として設計されています。これによりtokioのワークスティーリングが実現できます。`},
{title:"Pinと自己参照問題",
body:`async fnが生成するステートマシンは、ある.await前に保持していた変数への参照を次の.await後も保持することがあります。これが「自己参照構造体」です。自己参照構造体をmoveすると内部ポインタが無効になるため、Pinによって移動を禁止する必要があります。

PhantomPinnedを含む構造体はUnpinを実装しないため、Pin<&mut Self>を通してしかアクセスできなくなります。これによりコンパイラが移動を禁止します。async/awaitを使う分にはPinを直接扱う必要はほぼありませんが、カスタムFuture実装やライブラリを書く際は避けて通れません。`,
table:T.pinnedTypes,
code:`// 自己参照構造体の問題を示す例
use std::pin::Pin;
use std::marker::PhantomPinned;

struct SelfReferential {
    value: String,
    ptr: *const String,  // valueを指す
    _pin: PhantomPinned,
}

impl SelfReferential {
    fn new(v: &str) -> Self {
        SelfReferential {
            value: v.to_string(),
            ptr: std::ptr::null(),
            _pin: PhantomPinned,
        }
    }

    fn init(self: Pin<&mut Self>) {
        let self_ptr: *const String = &self.value;
        // SAFETY: self_ptrはselfのvalueを指し、Pinなので移動しない
        unsafe { Pin::get_unchecked_mut(self).ptr = self_ptr; }
    }

    fn get_value(self: Pin<&Self>) -> &str {
        // SAFETY: ptrはPinによって移動しないvalueを指す
        unsafe { &*self.ptr }
    }
}`,
afterCode:`pin-projectクレートを使うと#[pin_project]アトリビュートでPin操作のボイラープレートを削減できます。非同期ライブラリを開発する際はpin-projectを積極的に使ってください。`},
]},
{id:"ch3",num:3,title:"カスタムアロケータとメモリ管理",est:"70分",
goal:"GlobalAllocトレイトを理解し、jemallocやmimirocをグローバルアロケータとして導入できる。アリーナアロケータのユースケースを説明できる。",
sections:[
{title:"Rustのメモリアロケータシステム",
body:`Rustはデフォルトでシステムアロケータ（Linux: glibc malloc）を使います。#[global_allocator]アトリビュートでグローバルアロケータを置き換えられます。jemallocやmimirocは特にマルチスレッド環境でのパフォーマンスが優れており、メモリ断片化も少ないです。

Pythonはメモリ管理をインタープリタが全て担うため変更できませんが、Rustでは完全にカスタマイズ可能です。サーバーアプリケーションでjemallocへの切り替えだけで10〜30%のスループット改善が観測されることがあります。ベンチマークして確認することが前提ですが、手順は非常に簡単です。`,
table:T.allocTraits,
afterTable:`Nightly APIのAllocatorトレイトを使うとコンテナごとに異なるアロケータを指定できます（Vec<T, MyAlloc>等）。stable版では#[global_allocator]のみが使用可能です。`},
{title:"アリーナアロケータ",
body:`アリーナアロケータは「まとめて割り当て、まとめて解放」する戦略で、個別のdropを必要としません。パーサー・コンパイラ・ゲームエンジン等、大量の小さなオブジェクトを生成して一括破棄するユースケースに絶大な効果があります。

bumpaloクレートはリニアアロケータ（バンプポインタ）の実装で、割り当てがほぼゼロコストです。typed-arenaは型安全なアリーナで、dropが正しく呼ばれます。Pythonではメモリプールはインタープリタが隠蔽しますが、Rustではプログラマが明示的に制御できます。`,
code:`use bumpalo::Bump;

fn parse_document(input: &str) -> Vec<&str> {
    let bump = Bump::new();

    // bump内に大量のノードを割り当て
    let words: Vec<&str> = input.split_whitespace()
        .map(|w| bump.alloc_str(w) as &str)
        .collect();

    // bump.drop()で一括解放（スコープ終了で自動）
    words
}
// ↑ words内の&strはbumpより長生きできないのでコンパイルエラーになる
// 実際にはArena + 参照のライフタイム設計が必要`,
afterCode:`アリーナの参照は必ずアリーナより先にdropされる必要があります。bumpaloでは&'bump strのようなライフタイムで表現されます。ライフタイム設計がアリーナ活用の鍵です。`},
]},
{id:"ch4",num:4,title:"組み込みRust (no_std)",est:"70分",
goal:"no_std環境でRustコードをコンパイルできる。panicハンドラとエントリポイントを実装できる。cortex-mクレートを使ったMCU向け最小プログラムの構造を説明できる。",
sections:[
{title:"no_stdとは何か",
body:`通常のRustプログラムはstdクレート（標準ライブラリ）に依存します。stdはOS機能（ヒープ・ファイルI/O・スレッド等）を前提にしており、OSのないマイコン（MCU）では動きません。#![no_std]を宣言するとstdを使わずcoreのみでコンパイルできます。

coreはstdのサブセットで、OS依存のないプリミティブ型・iteratorトレイト・オプショナル型・パニックハンドラ等が含まれます。allocクレートを追加すると、カスタムアロケータ経由でVecやStringも使えます。PythonはOSなしには動きませんが、RustはOSなしの低レベル制御に使えるのが大きな強みです。`,
table:T.embeddedPrimitives,
afterTable:`Raspberry Pi PicoやSTM32等のMCUでRustを動かす場合、rustup target add thumbv6m-none-eabiでクロスコンパイルターゲットを追加し、cargo build --target thumbv6m-none-eabiでビルドします。`},
{title:"組み込みRustエコシステム",
body:`embassyは組み込み向け非同期フレームワークで、no_std環境でasync/awaitを使えます。割り込みをFutureとして表現し、RTOSなしで協調的マルチタスクを実現します。Pythonのasyncioと同じ概念をMCU上で実現している点が革新的です。

probe-rs・cargo-flashでファームウェアの書き込みとデバッグが可能です。defmt（deferred formatting）クレートを使うとシリアル経由でprintln的なデバッグ出力を非常に低コストで実現できます（フォーマット処理をホスト側で行う設計）。`,
code:`// STM32向けLチカの概念コード（実際にはHALクレートを使用）
#![no_std]

sections:[
{title:"SIMDの基礎とRustでの利用",
body:`SIMD（Single Instruction Multiple Data）は1つの命令で複数のデータを同時に処理するCPU機能です。x86_64のSSE/AVXはf32を4〜8個同時に演算でき、機械学習・信号処理・画像処理で絶大な効果があります。Pythonでnumpy等のライブラリがSIMDを使いますが、RustではSIMDを直接プログラムできます。

std::archはCPUのintrinsic関数をRustから呼び出すAPIで、_mm_add_ps等がx86のSIMD命令に対応します。unsafeが必要で、CPUが該当命令をサポートするかの確認も自己責任です。is_x86_feature_detected!マクロでランタイムにCPU機能を確認できます。`,
table:T.simdApis,
afterTable:`ポータブルSIMD（std::simd）はNightlyで利用可能で、コンパイラが自動的に最適なSIMD命令を選択します。stable環境ではwideクレートが代替として機能します。`},
{title:"rayonによるデータ並列処理",
body:`rayonはイテレータをマルチスレッドで並列実行するライブラリです。.iter()を.par_iter()に変えるだけで自動的にCPUコア数に合わせた並列化が行われます。スレッドプールの管理はrayonが内部で行うため、スレッド生成のコストを最小化できます。

Pythonのmultiprocessing.Poolに相当しますが、GILがないためスレッドが本当に並列に動きます。さらにRustの所有権システムによりデータ競合がコンパイル時に排除されます。大規模データの変換・フィルタ・集計処理では実装コストほぼゼロで劇的な高速化が得られます。`,
code:`use rayon::prelude::*;

fn main() {
    // イテレータをpar_iterに変えるだけ
    let data: Vec<i64> = (0..10_000_000).collect();

    // 逐次版
    let sum_seq: i64 = data.iter().sum();

    // 並列版（マルチコアで自動並列化）
    let sum_par: i64 = data.par_iter().sum();

    assert_eq!(sum_seq, sum_par);

    // 並列map-filter-collect
    let result: Vec<i64> = data.par_iter()
        .filter(|&&x| x % 2 == 0)
        .map(|&x| x * x)
        .collect();

    println!("evens squared: {} items", result.len());
}`,
afterCode:`par_sort()・par_chunks()・par_bridge()（通常のIteratorをparallel化）等も用意されています。rayonのスレッドプールはカスタマイズ可能で、タスク数・スタックサイズ等を調整できます。`},
]},
{id:"ch6",num:6,title:"高度な型システム",est:"80分",
goal:"GAT・const generics・typestateパターン・PhantomDataを使った高度な型設計ができる。APIの設計段階でコンパイル時に不正状態を表現できる。",
sections:[
{title:"Generic Associated Types (GAT)",
body:`Generic Associated Types（GAT、Rust 1.65から安定化）はトレイトの関連型にジェネリクスパラメータ（特にライフタイム）を持たせる機能です。これにより、借用を返すイテレータ（Lending Iterator）のような従来は表現できなかったトレイトが記述できます。

Pythonの型ヒントではこのレベルの型表現は不可能で、Rustの型システムの高度さが際立つ機能の一つです。GATはstreamingイテレータ・コレクション・非同期トレイトの設計で重要な役割を果たします。`,
table:T.typeSystem,
afterTable:`RPITIT（Return Position Impl Trait In Trait）はRust 1.75から安定化され、トレイト内でasync fn（async-traitクレートなし）を書けるようになりました。これが安定したことでasync_traitクレートの使用は徐々に減ると予想されます。`},
{title:"Typestateパターンとコンパイル時安全性",
body:`Typestateパターンは型パラメータでオブジェクトの状態を表現し、不正な操作をコンパイルエラーにする設計手法です。例えばファイルを開く前にwriteを呼べないことを型で強制できます。実行時チェックをコンパイル時に移動できるため、バグの早期発見とランタイムコストの削減が同時に実現できます。

PhantomData<T>はメモリを消費せずに型マーカーとして機能するゼロコスト型です。Typestateパターンの実装で状態型を「保持」するために必須です。Pythonでは実行時に状態チェックを行うことが多いですが、RustのTypestateは状態遷移の正しさをコンパイラが保証します。`,
table:T.safeAbstractions,
code:`// Builderパターン + Typestateの組み合わせ
struct Builder<HasName, HasAge> {
    name: Option<String>,
    age: Option<u32>,
    _n: std::marker::PhantomData<HasName>,
    _a: std::marker::PhantomData<HasAge>,
}

struct Yes; struct No;

impl Builder<No, No> {
    fn new() -> Self {
        Builder { name: None, age: None, _n: std::marker::PhantomData, _a: std::marker::PhantomData }
    }
}

impl<A> Builder<No, A> {
    fn name(self, name: &str) -> Builder<Yes, A> {
        Builder { name: Some(name.to_string()), age: self.age, _n: std::marker::PhantomData, _a: std::marker::PhantomData }
    }
}

impl<N> Builder<N, No> {
    fn age(self, age: u32) -> Builder<N, Yes> {
        Builder { name: self.name, age: Some(age), _n: std::marker::PhantomData, _a: std::marker::PhantomData }
    }
}

// build()はName・Age両方が設定された状態のみ呼べる
impl Builder<Yes, Yes> {
    fn build(self) -> String {
        format!("{}:{}", self.name.unwrap(), self.age.unwrap())
    }
}`,
afterCode:`このパターンはreqwest::ClientBuilderやstd::fs::OpenOptionsで広く使われています。「呼び出し順序の誤り」というバグをゼロコストでコンパイル時に排除できます。`},
]},
{id:"ch7",num:7,title:"ライブラリ設計のベストプラクティス",est:"65分",
goal:"semver互換APIを設計できる。#[non_exhaustive]や#[must_use]等のattributeを使いこなせる。cargo-semver-checksでbreaking changeを検出できる。",
sections:[
{title:"公開APIの設計原則",
body:`ライブラリのpub APIは一度公開すると変更しにくくなります。特にsemverを守る場合、型の変更・フィールドの追加削除・トレイト実装の変更はすべてbreaking changeになりえます。設計段階でAPIの最小化と拡張ポイントを考慮することが重要です。

Pythonのライブラリでも後方互換性は重要ですが、Rustではコンパイラが型レベルで互換性を保証するため変更の影響がより明確です。#[non_exhaustive]をenumに付けると利用側でmatchに_=>アームが必須になり、将来バリアント追加時のbreaking changeを防げます。`,
table:T.libDesign,
afterTable:`#[must_use]をResultや重要な戻り値の型に付けると、戻り値を無視したときにコンパイル警告が出ます。Resultはデフォルトでmust_useですが、カスタム型にも積極的に付けてください。`},
{title:"ドキュメントとCHANGELOG",
body:`cargo docはsrc内の///コメントからHTMLドキュメントを生成します。ドキュメントはコードと同じリポジトリに置くことで常に最新を保てます。docs.rsはcrates.ioに公開されたクレートのドキュメントを自動ホストします。

CHANGELOG.mdはKeep a Changelog形式が業界標準です。ユーザーがアップグレード時に変更点を理解できるよう、Added/Changed/Deprecated/Removed/Fixed/Securityのカテゴリで記録します。Pythonパッケージでも同じ慣行が推奨されます。`,
code:`//! # mylib
//!
//! このクレートは...
//!
//! ## 使い方
//!
//! \`\`\`
//! use mylib::Client;
//! let client = Client::new("https://api.example.com")?;
//! \`\`\`

/// APIクライアント。
///
/// # 例
///
/// \`\`\`
/// let c = mylib::Client::new("https://api.example.com");
/// \`\`\`
#[must_use]
pub struct Client { base_url: String }

/// 将来バリアントを追加する可能性があるエラー型。
#[non_exhaustive]
#[derive(Debug, thiserror::Error)]
pub enum Error {
    #[error("connection failed: {0}")]
    Connection(String),
    #[error("not found")]
    NotFound,
}`,
afterCode:`//! (スラッシュビックリ2つ)で始まるコメントはモジュールレベルのドキュメントになります。lib.rsの先頭にクレートの概要・使い方・例を書くと、docs.rsのトップページに表示されます。`},
]},
{id:"ch8",num:8,title:"高度なパフォーマンスチューニング",est:"70分",
goal:"lock-freeデータ構造・アトミック操作・アリーナアロケータを使った性能改善ができる。cargo-flamegraphでホットスポットを特定できる。",
sections:[
{title:"アトミック操作とlock-free",
body:`Mutexを使わないアトミック操作（AtomicUsize等）はオーバーヘッドが少なく、ホットパスに向いています。AtomicにはRelaxed・AcqRel・SeqCstなどのOrderingがあり、メモリ順序保証の強さと性能のトレードオフがあります。

Relaxedは最も弱く最速で、カウンタ等に使えます。SeqCstは最強で全CPUコア間での順序を保証しますが最も遅いです。AcquireとReleaseをペアで使うのがmutex代替の一般的なパターンです。Pythonではこのレベルの制御は不可能で、Rustの低レベル性能最適化の強みが発揮されます。`,
table:T.perf,
afterTable:`crossbeamのEpoch-based reclamation（crossbeam-epoch）は安全なlock-free構造のメモリ解放に使われます。dashmapはArc<RwLock<HashMap>>の高性能代替で、内部でシャーディングによりロック競合を削減します。`},
{title:"PGOとLTO",
body:`Profile-Guided Optimization（PGO）は実際のワークロードでプロファイリングし、そのデータを使って最適化するコンパイラ技術です。インライン化・分岐予測の改善で5〜30%の高速化が報告されています。Link Time Optimization（LTO）はリンク時にクレート境界を超えた最適化を行います。

これらはリリースビルドでのみ有効です。実際のサーバーアプリケーションではthin LTO（lto = "thin"）が一般的なトレードオフです。FirefoxのRust成分部分はPGOとLTOを組み合わせて最大30%の高速化を達成しています。`,
code:`# Cargo.toml でLTOを有効化
[profile.release]
lto = "thin"          # thin: ビルド時間とパフォーマンスのバランス
# lto = true          # fat: 最大最適化、ビルド遅い
codegen-units = 1     # 並列コード生成を無効化（最大最適化）
opt-level = 3         # デフォルトはrelease=3

# PGO（プロファイルガイド最適化）の手順:
# 1. RUSTFLAGS="-Cprofile-generate=/tmp/pgo-data" cargo build --release
# 2. ./target/release/myapp < real_workload.txt  # プロファイル収集
# 3. llvm-profdata merge -o /tmp/pgo-data/merged.profdata /tmp/pgo-data/
# 4. RUSTFLAGS="-Cprofile-use=/tmp/pgo-data/merged.profdata" cargo build --release`,
afterCode:`cargo-pgo クレートはPGOの手順を自動化します。本番環境の実際のトラフィックでプロファイリングする場合は、sampled instrumentation（低オーバーヘッド）モードを使用してください。`},
]},
{id:"ch9",num:9,title:"フルスタックRust: axum + sqlx + wasm",est:"80分",
goal:"axum・sqlx・wasm-bindgenを組み合わせたフルスタックアプリケーションを設計できる。tower-httpミドルウェアとopentelemetryによるオブザーバビリティを設定できる。",
sections:[
{title:"axum + sqlxの本番的設計",
body:`本番Webサービスでは、エラーハンドリング・コネクションプール・トレーシング・graceful shutdownの設計が必要です。axumはIntoResponseトレイトを通じてカスタムエラーレスポンスを実装でき、?演算子と組み合わせてハンドラを簡潔に保てます。

PgPoolはArc<PgPool>をStateで共有するパターンが推奨です。sqlx::migrationで本番データベースのスキーマ管理もできます。Pythonのalembicに相当しますが、sqlx migrationsはRustプロセスに組み込めるため、デプロイ時に自動マイグレーションを実行するパターンが書きやすいです。`,
code:`use axum::{
    Router, extract::State, http::StatusCode,
    response::IntoResponse, Json, routing::get,
};
use sqlx::PgPool;
use std::sync::Arc;
use thiserror::Error;

#[derive(Error, Debug)]
enum AppError {
    #[error("database error")]
    Db(#[from] sqlx::Error),
    #[error("not found")]
    NotFound,
}

// AppErrorをHTTPレスポンスに変換
impl IntoResponse for AppError {
    fn into_response(self) -> axum::response::Response {
        let status = match &self {
            AppError::NotFound => StatusCode::NOT_FOUND,
            AppError::Db(_) => StatusCode::INTERNAL_SERVER_ERROR,
        };
        (status, self.to_string()).into_response()
    }
}

async fn get_user(
    State(pool): State<Arc<PgPool>>,
) -> Result<Json<String>, AppError> {
    let name = sqlx::query_scalar!("SELECT name FROM users LIMIT 1")
        .fetch_optional(pool.as_ref()).await?
        .ok_or(AppError::NotFound)?;
    Ok(Json(name))
}`,
afterCode:`Result<Json<T>, AppError>のパターンは?演算子でエラーを自動変換できるため、ハンドラのコードが非常にシンプルになります。AppErrorにthiserrorの#[from]を使うとsqlx::Errorが自動変換されます。`},
{title:"オブザーバビリティ: tracing + opentelemetry",
body:`本番サービスにはログ・メトリクス・トレーシング（三本柱）が必要です。tracingクレートはRustのデファクトロギングフレームワークで、structuredログとspan（トレーシング）を統合しています。opentelemetryとの統合でJaeger・Datadog・GrafanaTempoへのトレース送信が可能です。

tracing::instrument アトリビュートを関数に付けると、自動的にspanが作成されて関数の引数・実行時間が記録されます。PythonのOpenTelemetry SDKより型安全で、コンパイル時に計装の誤りが検出されます。`,
code:`use tracing::{info, instrument, warn};
use tracing_subscriber::{layer::SubscriberExt, util::SubscriberInitExt};

// 関数自動計装: 引数をspanに記録
#[instrument(skip(pool), fields(user_id = %user_id))]
async fn fetch_user(pool: &sqlx::PgPool, user_id: i64) -> anyhow::Result<String> {
    info!("fetching user");

    let result = sqlx::query_scalar!("SELECT name FROM users WHERE id = $1", user_id)
        .fetch_optional(pool)
        .await?;

    match result {
        Some(name) => { info!(%name, "found user"); Ok(name) }
        None => { warn!("user not found"); Err(anyhow::anyhow!("not found")) }
    }
}

fn init_tracing() {
    tracing_subscriber::registry()
        .with(tracing_subscriber::fmt::layer())
        .with(tracing_subscriber::EnvFilter::from_default_env())
        .init();
}`,
afterCode:`RUST_LOG=myapp=debug,sqlx=warn のように環境変数でログレベルを制御できます。本番ではJSONフォーマット（tracing-subscriber::fmt::format::Json）でログを出力しElasticsearch等に送るのが一般的です。`},
]},

goal:"cargo-expandでマクロ展開を確認できる。clippyのカスタムlintの仕組みを理解できる。cargo-geiger・miriでunsafeとUBを検査できる。",
sections:[
{title:"コンパイラ診断ツールチェーン",
body:`Rustのツールチェーンにはコード品質を確認するツールが充実しています。cargo expandはマクロ展開後のコードを出力し、procマクロのデバッグに不可欠です。cargo geigerはdependency treeのunsafeコード使用量を可視化し、サプライチェーンリスクの評価に使えます。

cargo mirはRustの中間表現（MIR）インタープリタで、unsafeコードのUB（未定義動作）を検出します。通常のテストではUBを見逃すことがありますが、mirはメモリアクセスパターンをシミュレートして問題を発見します。本番前に必ずcargo miri testを実行することをお勧めします。`,

{title:"独自clippyの追加（概念）",
body:`clippyはRustコンパイラプラグインとして実装されており、コントリビューターがlintを追加できます。独自のorganization lintを追加するには現状clippy自体のフォークが必要ですが、dylintクレートを使うと外部クレートとして独自lintを配布できます。

MIR（Mid-level Intermediate Representation）はRustコンパイラが型チェック後に生成する中間表現で、多くの最適化とlintがここで行われます。Pythonのastモジュールでソースコードを解析するのと同様に、RustではMIRやHIR（High-level IR）を解析してlintを実装します。`,

{id:"ch11",num:11,title:"エコシステムと重要クレートの深掘り",est:"65分",
goal:"Rustエコシステムの主要クレートを使い分けられる。serde・reqwest・clap・tokio等の高度な機能を活用できる。crates.io公開の手順を理解している。",
sections:[
{title:"主要クレートの深掘り",
body:`Rustエコシステムには少数の「デファクトスタンダード」クレートがあり、これらを習得することで大半のアプリケーション要件を満たせます。serdeは直列化/逆直列化のインフラで、JSON・TOML・YAML・MessagePack等の多くのフォーマットがserdeのトレイトを実装しています。

clapはCLIパーサーで、derive APIを使うと構造体にアトリビュートを付けるだけでサブコマンド・オプション・バリデーションが自動生成されます。Pythonのargparse・clickよりも型安全で、サブコマンドごとに異なる構造体を使った設計がしやすいです。`,
code:`// clap derive API の例
use clap::{Parser, Subcommand};

#[derive(Parser)]
#[command(version, about = "My CLI tool")]
struct Cli {
    #[command(subcommand)]
    command: Commands,

    #[arg(short, long, default_value = "info")]
    log_level: String,
}

#[derive(Subcommand)]
enum Commands {
    /// ユーザーを一覧表示
    List {
        #[arg(short, long, default_value_t = 10)]
        limit: usize,
    },
    /// ユーザーを作成
    Create {
        name: String,
        #[arg(short, long)]
        email: Option<String>,
    },
}

fn main() {
    let cli = Cli::parse();
    match cli.command {
        Commands::List { limit } => println!("listing {} users", limit),
        Commands::Create { name, email } => {
            println!("creating {} ({:?})", name, email);
        }
    }
}`,
afterCode:`clap generate機能を使うとbash/zsh/fish向けのシェル補完スクリプトを自動生成できます。プロフェッショナルなCLIツールに必要な機能がほぼ全て含まれています。`},
{title:"crates.ioへのpublish",
body:`crates.ioはRustの公式パッケージレジストリです。cargo publishコマンドで公開できますが、一度公開したバージョンは取り消せません（yankはできますが削除不可）。Cargo.tomlに必須フィールド（name・version・edition・description・license・repository）を記載してください。

semver管理・CHANGELOG・ドキュメント整備・CI設定を整えてから公開するのが理想です。cargo package --list で公開対象ファイルを事前確認できます。.gitignoreは尊重されますが、必要なファイルを除外しないよう注意してください。`,
code:`# 公開前チェックリスト実行スクリプト
#!/bin/bash
set -e

echo "=== 1. Format check ==="
cargo fmt --check

echo "=== 2. Clippy ==="
cargo clippy -- -D warnings

echo "=== 3. Tests ==="
cargo test --all

sections:[
{title:"Rustが実際に使われている場所",
body:`Rustは多くの主要プロジェクトで採用されています。MozillaのFirefox（Servo・CSS・MP4パーサー）、Cloudflare（pingora・BoringTunnel）、Dropbox（Magic Pocket・ファイルシステム）、Amazon（Firecracker VMM・Bottlerocket OS）、Microsoft（Windowsカーネルドライバ・AzureSDK）などです。

Linuxカーネル（6.1以降）にRustサポートが統合されたことで、システムプログラミングにおけるRustの地位は決定的になりました。Pythonからのシフトは特に「Pythonで書いていたサービスをRustで書き直してパフォーマンスとメモリ効率を改善」という実績が多く報告されています。`,

afterTable:`非同期ランタイムの選択はプロジェクトのライフタイム全体に影響します。tokioは最大のエコシステムを持つため、特別な理由がない限りtokioを選択することを推奨します。`},
{title:"次のステップ",
body:`このコースで学んだ技術を組み合わせて実際のプロジェクトを構築することが最も重要な次のステップです。推奨プロジェクトとしては、axum + sqlx + Dockerでの本番デプロイ可能なREST API・wasm-packを使ったブラウザアプリ・no_stdで書く簡単な組み込みファームウェアなどがあります。

Rustの公式リソースとして、The Rust Programming Language（通称The Book）・Rustonomicon（unsafe Rust詳解）・Async Book（非同期詳解）・Embedded Rust Book（組み込み詳解）が充実しています。RustのRFCリポジトリを読むと言語設計の背景を深く理解できます。`,
table:T.libDesign,
code:`// このコース修了後の推奨学習パス

// 1. 実践: axum + sqlx + DockerでREST APIを本番デプロイ
//    → 認証(JWT)・レート制限・CI/CDも含める

// 2. 実践: wasm-packでブラウザ向けRustライブラリを公開
//    → npmパッケージとしてcrates.ioとnpmに同時公開

// 3. 読書: The Rustonomicon
//    → unsafeの全てを深く理解

// 4. 実践: Raspberry Pi Pico + embassy でLチカ
//    → no_std + async の組み合わせ

// 5. 貢献: お気に入りのOSSにPRを出す
//    → ripgrep・fd・tokio・axum等

// 6. 読書: Async Book + tokioのソースコード
//    → ランタイムの実装を理解

// 推奨コミュニティ
// - users.rust-lang.org (フォーラム)
// - discord.gg/rust-lang (公式Discord)
// - This Week in Rust (週次ニュースレター)`,
afterCode:`Rustコミュニティは非常にフレンドリーで、初心者の質問にも丁寧に答えてくれます。Rustフォーラム（users.rust-lang.org）や公式Discordを積極的に活用してください。このコースで学んだ知識をベースに、実際のプロジェクトで経験を積み重ねることが上達への最短ルートです。`},
]},
];
