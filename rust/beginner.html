    {diff:1,q:"Task構造体を定義し、new()コンストラクタとDisplayトレイトを実装してください。",code:"use std::fmt;\n#[derive(Debug, Clone)]\npub struct Task {\n    pub id: u32,\n    pub title: String,\n    pub done: bool,\n    pub priority: u8,\n}\nimpl Task {\n    pub fn new(id: u32, title: String, priority: u8) -> Self { todo!() }\n}\nimpl fmt::Display for Task { /* [1] Buy milk [P1] [PENDING] */ }",answer:"use std::fmt;\n#[derive(Debug, Clone)]\npub struct Task {\n    pub id: u32, pub title: String,\n    pub done: bool, pub priority: u8,\n}\nimpl Task {\n    pub fn new(id: u32, title: String, priority: u8) -> Self {\n        Task { id, title, done: false, priority }\n    }\n}\nimpl fmt::Display for Task {\n    fn fmt(&self, f: &mut fmt::Formatter) -> fmt::Result {\n        write!(f, \"[{}] {} [P{}] [{}]\", self.id, self.title, self.priority,\n               if self.done { \"DONE\" } else { \"PENDING\" })\n    }\n}"},
    {diff:2,q:"TaskManager構造体を実装してください。add/complete/remove/list メソッドを持ちます。",code:"pub struct TaskManager { tasks: Vec<Task>, next_id: u32 }\nimpl TaskManager {\n    pub fn new() -> Self { todo!() }\n    pub fn add(&mut self, title: String, priority: u8) -> &Task { todo!() }\n    pub fn complete(&mut self, id: u32) -> bool { todo!() }\n    pub fn remove(&mut self, id: u32) -> bool { todo!() }\n    pub fn list(&self) -> &[Task] { &self.tasks }\n}",answer:"pub struct TaskManager { tasks: Vec<Task>, next_id: u32 }\nimpl TaskManager {\n    pub fn new() -> Self { TaskManager { tasks: vec![], next_id: 1 } }\n    pub fn add(&mut self, title: String, priority: u8) -> &Task {\n        self.tasks.push(Task::new(self.next_id, title, priority));\n        self.next_id += 1;\n        self.tasks.last().unwrap()\n    }\n    pub fn complete(&mut self, id: u32) -> bool {\n        if let Some(t) = self.tasks.iter_mut().find(|t| t.id == id) {\n            t.done = true; true\n        } else { false }\n    }\n    pub fn remove(&mut self, id: u32) -> bool {\n        let before = self.tasks.len();\n        self.tasks.retain(|t| t.id != id);\n        self.tasks.len() < before\n    }\n    pub fn list(&self) -> &[Task] { &self.tasks }\n}"},
    {diff:2,q:"pending()とsearch(keyword)メソッドを追加してください。",code:"// pending: 未完了タスクの参照を返す\n// search: タイトルにキーワードを含むタスクを返す",answer:"pub fn pending(&self) -> Vec<&Task> {\n    self.tasks.iter().filter(|t| !t.done).collect()\n}\npub fn search(&self, keyword: &str) -> Vec<&Task> {\n    self.tasks.iter()\n        .filter(|t| t.title.to_lowercase().contains(&keyword.to_lowercase()))\n        .collect()\n}"},

  ch2:[
    {diff:1,q:"thiserrorクレートを使ってTaskErrorカスタムエラー型を定義してください。",code:"// Cargo.toml: thiserror = \"1\"\nuse thiserror::Error;\n#[derive(Error, Debug)]\npub enum TaskError {\n    // NotFound(id), InvalidPriority(u8), StorageError(io::Error)\n}",answer:"use thiserror::Error;\nuse std::io;\n#[derive(Error, Debug)]\npub enum TaskError {\n    #[error(\"Task with id {0} not found\")]\n    NotFound(u32),\n    #[error(\"Invalid priority {0}: must be 1-3\")]\n    InvalidPriority(u8),\n    #[error(\"Storage error: {0}\")]\n    StorageError(#[from] io::Error),\n    #[error(\"Parse error: {0}\")]\n    ParseError(#[from] std::num::ParseIntError),\n}"},
    {diff:2,q:"add と complete メソッドをResult<T, TaskError>を返すように修正してください。",code:"pub fn add(&mut self, title: String, priority: u8) -> Result<&Task, TaskError> {\n    // priority が 1-3 でなければ InvalidPriority\n}\npub fn complete(&mut self, id: u32) -> Result<(), TaskError> {\n    // 見つからなければ NotFound\n}",answer:"pub fn add(&mut self, title: String, priority: u8) -> Result<&Task, TaskError> {\n    if priority < 1 || priority > 3 {\n        return Err(TaskError::InvalidPriority(priority));\n    }\n    self.tasks.push(Task::new(self.next_id, title, priority));\n    self.next_id += 1;\n    Ok(self.tasks.last().unwrap())\n}\npub fn complete(&mut self, id: u32) -> Result<(), TaskError> {\n    self.tasks.iter_mut()\n        .find(|t| t.id == id)\n        .map(|t| { t.done = true; })\n        .ok_or(TaskError::NotFound(id))\n}"},
    {diff:2,q:"anyhow を使ってmain関数のエラーハンドリングを簡潔に書いてください。",code:"// Cargo.toml: anyhow = \"1\"\nfn main() -> anyhow::Result<()> {\n    // 複数のエラー型を ? で伝播\n}",answer:"use anyhow::{Context, Result};\nfn main() -> Result<()> {\n    let mut mgr = TaskManager::new();\n    mgr.add(\"Buy milk\".into(), 1)?;\n    mgr.complete(1)?;\n    // Context でエラーに文脈を追加\n    let content = std::fs::read_to_string(\"tasks.json\")\n        .context(\"Failed to read tasks.json\")?;\n    println!(\"{}\", content);\n    Ok(())\n}"},

    {diff:2,q:"save/load メソッドを実装してください。JSONファイルへの保存と読み込みを行います。",code:"pub fn save(&self, path: &str) -> Result<(), TaskError> {\n    // serde_json::to_writer_pretty で書き込み\n}\npub fn load(path: &str) -> Result<Self, TaskError> {\n    // ファイルがなければ空のTaskManagerを返す\n}",answer:"use std::fs::{File, OpenOptions};\npub fn save(&self, path: &str) -> anyhow::Result<()> {\n    let file = File::create(path)?;\n    serde_json::to_writer_pretty(file, &self.tasks)?;\n    Ok(())\n}\npub fn load(path: &str) -> anyhow::Result<Self> {\n    if !std::path::Path::new(path).exists() {\n        return Ok(Self::new());\n    }\n    let content = std::fs::read_to_string(path)?;\n    let tasks: Vec<Task> = serde_json::from_str(&content)?;\n    let next_id = tasks.iter().map(|t| t.id).max().unwrap_or(0) + 1;\n    Ok(TaskManager { tasks, next_id })\n}"},
    {diff:3,q:"JSONファイルのパスをディレクトリ(~/.local/share/todo/)に設定してください。",code:"use std::path::PathBuf;\nfn get_data_path() -> PathBuf {\n    // dirs クレートを使って適切なデータディレクトリを取得\n}",answer:"fn get_data_path() -> std::path::PathBuf {\n    // dirs クレートがあれば: dirs::data_dir().unwrap().join(\"todo/tasks.json\")\n    // 簡易版: カレントディレクトリに保存\n    std::path::PathBuf::from(\"tasks.json\")\n}\n// Cargo.toml: dirs = \"5\"\n// fn get_data_path_dirs() -> PathBuf {\n//     let dir = dirs::data_dir().unwrap_or_else(|| PathBuf::from(\".\"));\n//     let dir = dir.join(\"todo\");\n//     std::fs::create_dir_all(&dir).unwrap();\n//     dir.join(\"tasks.json\")\n// }"},

  ch4:[
    {diff:2,q:"clapのderive APIを使ってCLIを定義してください。",code:"// Cargo.toml: clap = {version=\"4\", features=[\"derive\"]}\nuse clap::{Parser, Subcommand};\n#[derive(Parser)]\n#[command(name=\"todo\", about=\"Task manager\")]\nstruct Cli {\n    #[command(subcommand)]\n    command: Commands,\n}\n#[derive(Subcommand)]\nenum Commands {\n    Add { title: String, #[arg(short,long,default_value=\"2\")] priority: u8 },\n    List,\n    Done { id: u32 },\n    Remove { id: u32 },\n}",answer:"use clap::{Parser, Subcommand};\n#[derive(Parser)]\n#[command(name=\"todo\", version, about=\"A simple task manager\")]\nstruct Cli {\n    #[command(subcommand)]\n    command: Commands,\n    #[arg(short, long, global=true)]\n    verbose: bool,\n}\n#[derive(Subcommand)]\nenum Commands {\n    Add {\n        title: String,\n        #[arg(short, long, default_value=\"2\")]\n        priority: u8,\n    },\n    List {\n        #[arg(long)]\n        pending_only: bool,\n    },\n    Done { id: u32 },\n    Remove { id: u32 },\n    Search { keyword: String },\n}"},
    {diff:2,q:"main関数でCLIのコマンドを処理してください。",code:"fn main() -> anyhow::Result<()> {\n    let cli = Cli::parse();\n    let mut mgr = TaskManager::load(\"tasks.json\")?;\n    match cli.command {\n        // 各コマンドに対応する処理\n    }\n    mgr.save(\"tasks.json\")?;\n    Ok(())\n}",answer:"fn main() -> anyhow::Result<()> {\n    let cli = Cli::parse();\n    let data_path = \"tasks.json\";\n    let mut mgr = TaskManager::load(data_path)?;\n    match cli.command {\n        Commands::Add { title, priority } => {\n            let task = mgr.add(title, priority)?;\n            println!(\"Added: {}\", task);\n        }\n        Commands::List { pending_only } => {\n            let tasks = if pending_only { mgr.pending() } else { mgr.list().iter().collect() };\n            if tasks.is_empty() { println!(\"No tasks.\"); }\n            else { for t in tasks { println!(\"{}\", t); } }\n        }\n        Commands::Done { id } => { mgr.complete(id)?; println!(\"Completed task {}\", id); }\n        Commands::Remove { id } => { mgr.remove(id)?; println!(\"Removed task {}\", id); }\n        Commands::Search { keyword } => {\n            for t in mgr.search(&keyword) { println!(\"{}\", t); }\n        }\n    }\n    mgr.save(data_path)?;\n    Ok(())\n}"},
    {diff:2,q:"stats サブコマンドを追加して統計情報を表示してください。",code:"// total, done, pending, completion_rate を表示",answer:"Commands::Stats => {\n    let tasks = mgr.list();\n    let total = tasks.len();\n    let done = tasks.iter().filter(|t| t.done).count();\n    let rate = if total > 0 { done as f64 / total as f64 * 100.0 } else { 0.0 };\n    println!(\"Total: {} | Done: {} | Pending: {} | Rate: {:.1}%\",\n             total, done, total - done, rate);\n}"},

    {diff:1,q:"ソート機能をTaskManagerに追加してください (優先度・ID)。",code:"pub fn sort_by_priority(&mut self) { todo!() }\npub fn sort_by_id(&mut self) { todo!() }",answer:"pub fn sort_by_priority(&mut self) {\n    self.tasks.sort_by(|a, b| a.priority.cmp(&b.priority));\n}\npub fn sort_by_id(&mut self) {\n    self.tasks.sort_by_key(|t| t.id);\n}\n// 安定ソートが必要なら sort_by の代わりに sort_unstable_by も使える"},
    {diff:2,q:"due_date フィールドを追加し、期限切れタスクを警告表示してください。",code:"use chrono::{DateTime, Utc, NaiveDate};\n// due_date: Option<NaiveDate>\n// 今日以降なら [OVERDUE] 表示",answer:"// Cargo.toml: chrono = {version=\"0.4\", features=[\"serde\"]}\nuse chrono::NaiveDate;\n#[derive(Serialize, Deserialize, Debug, Clone)]\npub struct Task {\n    pub id: u32, pub title: String,\n    pub done: bool, pub priority: u8,\n    pub due_date: Option<NaiveDate>,\n}\nimpl Task {\n    pub fn is_overdue(&self) -> bool {\n        self.due_date.map_or(false, |d| {\n            d < chrono::Local::now().date_naive() && !self.done\n        })\n    }\n}"},
    {diff:3,q:"タスクをグループ分けして表示する機能を実装してください (優先度別)。",code:"pub fn grouped_by_priority(&self) -> std::collections::HashMap<u8, Vec<&Task>> {\n    todo!()\n}",answer:"use std::collections::HashMap;\npub fn grouped_by_priority(&self) -> HashMap<u8, Vec<&Task>> {\n    let mut groups: HashMap<u8, Vec<&Task>> = HashMap::new();\n    for task in &self.tasks {\n        groups.entry(task.priority).or_default().push(task);\n    }\n    groups\n}\n// 表示:\n// let groups = mgr.grouped_by_priority();\n// let mut priorities: Vec<u8> = groups.keys().cloned().collect();\n// priorities.sort();\n// for p in priorities { println!(\"=== Priority {} ===\", p); ... }"},

  ch6:[
    {diff:1,q:"std::fs::read_dir を使ってディレクトリ内のファイル一覧を返す関数を実装してください。",code:"use std::path::Path;\nfn list_files(dir: &str) -> anyhow::Result<Vec<String>> {\n    // .json ファイルのみ返す\n}",answer:"use std::path::Path;\nfn list_files(dir: &str) -> anyhow::Result<Vec<String>> {\n    let mut files = vec![];\n    for entry in std::fs::read_dir(dir)? {\n        let entry = entry?;\n        let path = entry.path();\n        if path.extension().map_or(false, |e| e == \"json\") {\n            files.push(path.to_string_lossy().into_owned());\n        }\n    }\n    files.sort();\n    Ok(files)\n}"},
    {diff:2,q:"複数のJSONファイルからタスクをインポートするimport機能を実装してください。",code:"pub fn import(&mut self, path: &str) -> anyhow::Result<usize> {\n    // 別のJSONファイルからタスクをロードして追加\n    // IDが被らないようにリナンバリング\n}",answer:"pub fn import(&mut self, path: &str) -> anyhow::Result<usize> {\n    let content = std::fs::read_to_string(path)?;\n    let mut imported: Vec<Task> = serde_json::from_str(&content)?;\n    let count = imported.len();\n    for task in &mut imported {\n        task.id = self.next_id;\n        self.next_id += 1;\n        self.tasks.push(task.clone());\n    }\n    Ok(count)\n}"},
    {diff:2,q:"タスクをCSV形式でエクスポートする機能を実装してください。",code:"pub fn export_csv(&self, path: &str) -> anyhow::Result<()> {\n    // id,title,done,priority を出力\n}",answer:"pub fn export_csv(&self, path: &str) -> anyhow::Result<()> {\n    let mut content = String::from(\"id,title,done,priority\n\");\n    for t in &self.tasks {\n        content.push_str(&format!(\"{},{},{},{}\n\",\n            t.id, t.title, if t.done {\"1\"} else {\"0\"}, t.priority));\n    }\n    std::fs::write(path, content)?;\n    Ok(())\n}"},

  ch7:[
    {diff:2,q:"Arcとstd::syncを使ってタスクの並列処理(並列バリデーション)を実装してください。",code:"use std::sync::Arc;\n// 複数のタスクのバリデーションを並列実行\nfn validate_tasks_parallel(tasks: Vec<Task>) -> Vec<anyhow::Result<Task>> {\n    todo!()\n}",answer:"use std::sync::Arc;\nuse std::thread;\nfn validate_task(task: Task) -> anyhow::Result<Task> {\n    if task.title.is_empty() { anyhow::bail!(\"Title is empty\"); }\n    if task.priority > 3 { anyhow::bail!(\"Invalid priority\"); }\n    Ok(task)\n}\nfn validate_tasks_parallel(tasks: Vec<Task>) -> Vec<anyhow::Result<Task>> {\n    let handles: Vec<_> = tasks.into_iter().map(|t| {\n        thread::spawn(move || validate_task(t))\n    }).collect();\n    handles.into_iter().map(|h| h.join().unwrap()).collect()\n}"},
    {diff:2,q:"Mutex<TaskManager>を使ってスレッドセーフなタスクマネージャーを実装してください。",code:"use std::sync::{Arc, Mutex};\nstruct SharedManager(Arc<Mutex<TaskManager>>);\nimpl SharedManager {\n    fn add_task(&self, title: String, priority: u8) -> anyhow::Result<()> { todo!() }\n}",answer:"use std::sync::{Arc, Mutex};\n#[derive(Clone)]\nstruct SharedManager(Arc<Mutex<TaskManager>>);\nimpl SharedManager {\n    fn new() -> Self { SharedManager(Arc::new(Mutex::new(TaskManager::new()))) }\n    fn add_task(&self, title: String, priority: u8) -> anyhow::Result<()> {\n        let mut mgr = self.0.lock().unwrap();\n        mgr.add(title, priority)?;\n        Ok(())\n    }\n    fn count(&self) -> usize {\n        self.0.lock().unwrap().list().len()\n    }\n}"},
    {diff:3,q:"std::threadとMpsc channelを使ってバックグラウンドで定期的にタスクを保存する機能を実装してください。",code:"use std::sync::mpsc;\n// 5秒ごとに自動保存するバックグラウンドスレッド\nfn start_autosave(manager: Arc<Mutex<TaskManager>>, path: String) -> mpsc::Sender<()> {\n    todo!() // Sender<()>でシャットダウンシグナルを受け取る\n}",answer:"use std::sync::mpsc;\nuse std::time::Duration;\nfn start_autosave(manager: Arc<Mutex<TaskManager>>, path: String) -> mpsc::Sender<()> {\n    let (tx, rx) = mpsc::channel::<()>();\n    std::thread::spawn(move || {\n        loop {\n            std::thread::sleep(Duration::from_secs(5));\n            match rx.try_recv() {\n                Ok(_) | Err(mpsc::TryRecvError::Disconnected) => break,\n                Err(mpsc::TryRecvError::Empty) => {}\n            }\n            if let Ok(mgr) = manager.lock() {\n                let _ = mgr.save(&path);\n                eprintln!(\"Auto-saved\");\n            }\n        }\n    });\n    tx\n}"},

  ch8:[
    {diff:2,q:"TaskManagerにIteratorトレイトを実装してください。",code:"impl Iterator for TaskManager {\n    type Item = Task; // or &Task\n    fn next(&mut self) -> Option<Self::Item> { todo!() }\n}",answer:"struct TaskIter<'a> { tasks: &'a [Task], index: usize }\nimpl<'a> Iterator for TaskIter<'a> {\n    type Item = &'a Task;\n    fn next(&mut self) -> Option<Self::Item> {\n        let task = self.tasks.get(self.index)?;\n        self.index += 1;\n        Some(task)\n    }\n}\nimpl TaskManager {\n    pub fn iter(&self) -> TaskIter {\n        TaskIter { tasks: &self.tasks, index: 0 }\n    }\n}\n// 使用例:\n// for task in mgr.iter().filter(|t| !t.done) { println!(\"{}\", task); }"},
    {diff:2,q:"FromIterator トレイトを実装して Vec<Task> から TaskManager を作れるようにしてください。",code:"impl FromIterator<Task> for TaskManager {\n    fn from_iter<I: IntoIterator<Item=Task>>(iter: I) -> Self { todo!() }\n}",answer:"impl FromIterator<Task> for TaskManager {\n    fn from_iter<I: IntoIterator<Item=Task>>(iter: I) -> Self {\n        let tasks: Vec<Task> = iter.into_iter().collect();\n        let next_id = tasks.iter().map(|t| t.id).max().unwrap_or(0) + 1;\n        TaskManager { tasks, next_id }\n    }\n}\n// 使用例:\n// let mgr: TaskManager = some_tasks.into_iter().filter(|t| t.priority == 1).collect();"},
    {diff:3,q:"ジェネリクスとトレイト境界を使ってプラガブルなフィルター機能を実装してください。",code:"pub trait TaskFilter {\n    fn matches(&self, task: &Task) -> bool;\n}\nstruct PriorityFilter(u8);\nstruct KeywordFilter(String);\nimpl TaskManager {\n    pub fn filter_by<F: TaskFilter>(&self, filter: &F) -> Vec<&Task> { todo!() }\n}",answer:"pub trait TaskFilter {\n    fn matches(&self, task: &Task) -> bool;\n}\nstruct PriorityFilter(u8);\nimpl TaskFilter for PriorityFilter {\n    fn matches(&self, task: &Task) -> bool { task.priority == self.0 }\n}\nstruct KeywordFilter(String);\nimpl TaskFilter for KeywordFilter {\n    fn matches(&self, task: &Task) -> bool {\n        task.title.to_lowercase().contains(&self.0.to_lowercase())\n    }\n}\nstruct DoneFilter(bool);\nimpl TaskFilter for DoneFilter {\n    fn matches(&self, task: &Task) -> bool { task.done == self.0 }\n}\nimpl TaskManager {\n    pub fn filter_by<F: TaskFilter>(&self, filter: &F) -> Vec<&Task> {\n        self.tasks.iter().filter(|t| filter.matches(t)).collect()\n    }\n}"},

  ch9:[
    {diff:2,q:"Rustのモジュールシステムを使ってプロジェクトを分割してください。",code:"// src/lib.rs と src/main.rs を分割\n// pub mod task; pub mod storage; pub mod error;\n// 各ファイルは src/task.rs, src/storage.rs, src/error.rs",answer:"// src/lib.rs\npub mod task;\npub mod storage;\npub mod error;\npub use task::{Task, TaskManager};\npub use error::TaskError;\n// src/task.rs: Task, TaskManager の定義\n// src/storage.rs: save/load の実装\n// src/error.rs: TaskError の定義\n// src/main.rs:\n// use todo_app::{TaskManager, TaskError};\n// fn main() -> anyhow::Result<()> { ... }"},
    {diff:2,q:"インテグレーションテストを tests/ ディレクトリに作成してください。",code:"// tests/integration_test.rs\n#[test]\nfn test_add_and_list() { /* TaskManagerの全体動作を確認 */ }\n#[test]\nfn test_save_load() { /* 保存→ロード→同一性確認 */ }",answer:"// tests/integration_test.rs\nuse todo_app::TaskManager;\n#[test]\nfn test_full_workflow() {\n    let mut mgr = TaskManager::new();\n    mgr.add(\"Task 1\".into(), 1).unwrap();\n    mgr.add(\"Task 2\".into(), 2).unwrap();\n    assert_eq!(mgr.list().len(), 2);\n    mgr.complete(1).unwrap();\n    assert_eq!(mgr.pending().len(), 1);\n}\n#[test]\nfn test_save_load() {\n    let path = \"/tmp/test_tasks.json\";\n    let mut mgr = TaskManager::new();\n    mgr.add(\"Test\".into(), 1).unwrap();\n    mgr.save(path).unwrap();\n    let mgr2 = TaskManager::load(path).unwrap();\n    assert_eq!(mgr2.list().len(), 1);\n    std::fs::remove_file(path).unwrap();\n}"},
    {diff:2,q:"ベンチマークテスト (criterion) を追加してください。",code:"// Cargo.toml: [dev-dependencies] criterion = {version=\"0.5\", features=[\"html_reports\"]}\n// benches/benchmark.rs を作成",answer:"// Cargo.toml:\n// [[bench]]\n// name = \"task_bench\"\n// harness = false\n// [dev-dependencies]\n// criterion = {version=\"0.5\", features=[\"html_reports\"]}\n// benches/task_bench.rs:\nuse criterion::{criterion_group, criterion_main, Criterion};\nfn benchmark_add(c: &mut Criterion) {\n    c.bench_function(\"add 1000 tasks\", |b| b.iter(|| {\n        let mut mgr = TaskManager::new();\n        for i in 0..1000 { mgr.add(format!(\"Task {}\", i), 1).unwrap(); }\n    }));\n}\ncriterion_group!(benches, benchmark_add);\ncriterion_main!(benches);\n// cargo bench で実行"},
  ],
  ch10:[
    {diff:2,q:"完成版のmain.rsを実装してください。全サブコマンドと適切なエラーメッセージを含めます。",code:"// cargo run -- add \"Buy milk\" --priority 1\n// cargo run -- list --pending-only\n// cargo run -- done 1\n// cargo run -- stats",answer:"use clap::{Parser, Subcommand};\nuse anyhow::Result;\n#[derive(Parser)]\n#[command(name=\"todo\", version=\"1.0\", about=\"Task manager\")]\nstruct Cli {\n    #[command(subcommand)]\n    command: Commands,\n}\n#[derive(Subcommand)]\nenum Commands {\n    Add { title: String, #[arg(short,long,default_value=\"2\")] priority: u8 },\n    List { #[arg(long)] pending_only: bool },\n    Done { id: u32 },\n    Remove { id: u32 },\n    Search { keyword: String },\n    Stats,\n    Export { path: String },\n}\nfn main() -> Result<()> {\n    let cli = Cli::parse();\n    let data = \"tasks.json\";\n    let mut mgr = TaskManager::load(data)?;\n    match cli.command {\n        Commands::Add{title,priority} => println!(\"{}\", mgr.add(title,priority)?),\n        Commands::List{pending_only} => {\n            let tasks: Vec<_> = if pending_only { mgr.pending() } else { mgr.list().iter().collect() };\n            if tasks.is_empty() { println!(\"No tasks.\"); }\n            else { tasks.iter().for_each(|t| println!(\"{}\", t)); }\n        },\n        Commands::Done{id} => { mgr.complete(id)?; println!(\"Done!\"); },\n        Commands::Remove{id} => { mgr.remove(id)?; println!(\"Removed.\"); },\n        Commands::Search{keyword} => mgr.search(&keyword).iter().for_each(|t| println!(\"{}\", t)),\n        Commands::Stats => {\n            let (total, done) = (mgr.list().len(), mgr.list().iter().filter(|t|t.done).count());\n            println!(\"Total:{} Done:{} Rate:{:.0}%\", total, done, if total>0 {done as f64/total as f64*100.0} else {0.0});\n        },\n        Commands::Export{path} => { mgr.export_csv(&path)?; println!(\"Exported to {}\", path); },\n    }\n    mgr.save(data)?; Ok(())\n}"},
    {diff:3,q:"GitHub Actionsで CI/CDパイプラインを設定してください。",code:"# .github/workflows/ci.yml\n# cargo test, cargo clippy, cargo fmt --check を実行",answer:"name: CI\non: [push, pull_request]\njobs:\n  test:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n      - uses: dtolnay/rust-toolchain@stable\n        with:\n          components: clippy, rustfmt\n      - uses: Swatinem/rust-cache@v2\n      - run: cargo fmt --check\n      - run: cargo clippy -- -D warnings\n      - run: cargo test\n      - run: cargo build --release"},
    {diff:3,q:"色付きターミナル出力を実現するためにcoloredクレートを使ってください。",code:"// Cargo.toml: colored = \"2\"\nuse colored::Colorize;\n// 優先度に応じて色を変える: P1=赤, P2=黄, P3=緑",answer:"use colored::Colorize;\nimpl Task {\n    pub fn colored_display(&self) -> String {\n        let priority_str = match self.priority {\n            1 => format!(\"[P1]\").red().bold().to_string(),\n            2 => format!(\"[P2]\").yellow().to_string(),\n            _ => format!(\"[P{}]\", self.priority).green().to_string(),\n        };\n        let status = if self.done { \"[DONE]\".green() } else { \"[PENDING]\".yellow() };\n        let title = if self.done { self.title.strikethrough().to_string() } else { self.title.clone() };\n        format!(\"[{}] {} {} {}\", self.id, title, priority_str, status)\n    }\n}"},

const chapters = [
  {id:"ch1",num:1,title:"プロジェクト設計とTask構造体",est:"50分",
   goal:"Task構造体とTaskManagerを設計し、基本的なCRUD操作を実装できる。Displayトレイトを実装して構造体を整形出力できる。",
   sections:[
     {title:"アプリ設計とCargo依存管理",body:"本コースでは「コマンドラインタスクマネージャー」を10章かけて実装します。最終的には `todo add \"タスク名\"` / `todo list` / `todo done 1` のようなCLIコマンドで動くアプリを完成させます。\n\n使用するクレート: `clap`（CLI引数解析）、`serde` + `serde_json`（JSON永続化）、`thiserror`（カスタムエラー型）、`anyhow`（アプリケーションエラー処理）、`chrono`（日付処理）。\n\nRustの構造体はPythonのdataclassに相当しますが、メモリレイアウトが明確で、フィールドのアクセス制御が `pub` キーワードで行えます。所有者がいることで、構造体をフィールドに持つ型も自動的にデストラクタを持ちます。",table:T.appStructure,code:"// Cargo.toml\n[package]\nname = \"todo\"\nversion = \"0.1.0\"\nedition = \"2021\"\n\n[dependencies]\nclap = { version = \"4\", features = [\"derive\"] }\nserde = { version = \"1\", features = [\"derive\"] }\nserde_json = \"1\"\nthiserror = \"1\"\nanyhow = \"1\"\nchrono = { version = \"0.4\", features = [\"serde\"] }\n\n// src/main.rs の初期版\nuse std::fmt;\n\n#[derive(Debug, Clone)]\npub struct Task {\n    pub id: u32,\n    pub title: String,\n    pub done: bool,\n    pub priority: u8, // 1=高, 2=中, 3=低\n}\n\nimpl Task {\n    pub fn new(id: u32, title: String, priority: u8) -> Self {\n        Task { id, title, done: false, priority }\n    }\n}\n\nimpl fmt::Display for Task {\n    fn fmt(&self, f: &mut fmt::Formatter) -> fmt::Result {\n        write!(f, \"[{}] {} [P{}] [{}]\",\n            self.id, self.title, self.priority,\n            if self.done { \"DONE\" } else { \"PENDING\" })\n    }\n}",afterCode:"`impl Display for Task` を実装することで、`println!(\"{}\", task)` が使えるようになります。`#[derive(Debug)]` は `println!(\"{:?}\", task)` のデバッグ出力に使えます。"},
   ]},
  {id:"ch2",num:2,title:"エラーハンドリングとthiserror",est:"55分",
   goal:"thiserrorでカスタムエラー型を定義できる。Result<T,E>で安全にエラーを伝播できる。anyhowで複数エラー型を統一できる。",
   sections:[
     {title:"カスタムエラー型の設計",body:"Rustのエラーハンドリングは「失敗しうる操作はResult<T,E>を返す」という設計になっています。エラー型を自分で定義することで、エラーの種類を型システムで表現できます。\n\n`thiserror` クレートを使うと `#[derive(Error)]` と `#[error(\"メッセージ\")]` で簡単にカスタムエラー型を作れます。`#[from]` アノテーションを使うと `?` 演算子でエラーを自動変換できます。\n\n`anyhow` はアプリケーションコードで複数のエラー型を統一したい場合に便利です。`anyhow::Result<T>` は `Result<T, anyhow::Error>` で、どんなエラー型でも `?` で伝播できます。",table:T.errorTypes,code:"use thiserror::Error;\nuse std::io;\n\n#[derive(Error, Debug)]\npub enum TaskError {\n    #[error(\"Task with id {0} not found\")]\n    NotFound(u32),\n\n    #[error(\"Invalid priority {0}: must be 1-3\")]\n    InvalidPriority(u8),\n\n    #[error(\"Storage error: {0}\")]\n    Storage(#[from] io::Error),\n\n    #[error(\"JSON error: {0}\")]\n    Json(#[from] serde_json::Error),\n}\n\npub struct TaskManager { tasks: Vec<Task>, next_id: u32 }\n\nimpl TaskManager {\n    pub fn add(&mut self, title: String, priority: u8) -> Result<&Task, TaskError> {\n        if priority < 1 || priority > 3 {\n            return Err(TaskError::InvalidPriority(priority));\n        }\n        self.tasks.push(Task::new(self.next_id, title, priority));\n        self.next_id += 1;\n        Ok(self.tasks.last().unwrap())\n    }\n\n    pub fn complete(&mut self, id: u32) -> Result<(), TaskError> {\n        self.tasks.iter_mut()\n            .find(|t| t.id == id)\n            .map(|t| t.done = true)\n            .ok_or(TaskError::NotFound(id))\n    }\n}",afterCode:"エラーメッセージは `format!()` 構文で書けます。`{0}` は最初のフィールド、`{name}` は名前付きフィールドです。エラーを Display で表示した時と Debug で表示した時の違いも意識しましょう。"},
   ]},
  {id:"ch3",num:3,title:"JSON永続化 (serde)",est:"55分",
   goal:"serde/serde_jsonでRust構造体をJSONに変換・復元できる。ファイルへの読み書きと?演算子のエラー処理を実装できる。",
   sections:[
     {title:"serdeによるシリアライゼーション",body:"`serde` はRustのデファクトシリアライゼーションフレームワークです。`#[derive(Serialize, Deserialize)]` をつけるだけで、構造体をJSON・TOML・YAML・MessagePackなど様々な形式に変換できます。\n\nPythonでは `json.dumps(obj.__dict__)` のようにやや手間がかかりますが、Rustのserdeはより型安全で高速です。`serde_json::to_string_pretty(&value)` でインデント付きJSON、`serde_json::from_str(&json_str)` でデシリアライズできます。\n\nファイルへの書き込みは `serde_json::to_writer_pretty(file, &value)` で直接書き込めます。ファイルが存在しない場合の初回起動処理も忘れずに実装します。",table:T.serdeFeatures,code:"use serde::{Serialize, Deserialize};\nuse std::fs;\nuse std::path::Path;\n\n#[derive(Serialize, Deserialize, Debug, Clone)]\npub struct Task {\n    pub id: u32,\n    pub title: String,\n    pub done: bool,\n    pub priority: u8,\n}\n\npub struct TaskManager { tasks: Vec<Task>, next_id: u32 }\n\nimpl TaskManager {\n    pub fn save(&self, path: &str) -> anyhow::Result<()> {\n        let file = fs::File::create(path)?;\n        serde_json::to_writer_pretty(file, &self.tasks)?;\n        Ok(())\n    }\n\n    pub fn load(path: &str) -> anyhow::Result<Self> {\n        if !Path::new(path).exists() {\n            return Ok(Self::new());\n        }\n        let content = fs::read_to_string(path)?;\n        let tasks: Vec<Task> = serde_json::from_str(&content)?;\n        let next_id = tasks.iter().map(|t| t.id).max().unwrap_or(0) + 1;\n        Ok(TaskManager { tasks, next_id })\n    }\n}",afterCode:"serdeは `serde_with` クレートと組み合わせると、カスタムシリアライズ形式（日付のフォーマット変更など）が簡単に書けます。また `#[serde(rename = \"field_name\")]` でJSONのキー名を変えられます。"},
   ]},
  {id:"ch4",num:4,title:"CLIインターフェース (clap)",est:"55分",
   goal:"clapのderive APIでCLIを定義できる。サブコマンド・オプション引数・フラグを正しく設定できる。matchでコマンドを振り分けてアプリを完成させられる。",
   sections:[
     {title:"clapによるCLI設計",body:"`clap` はRustで最も使われるCLIパーサーです。derive APIを使うと、構造体にアノテーションをつけるだけでコマンドライン引数のパーサーが自動生成されます。Pythonの `argparse` や `click` に相当します。\n\n`#[derive(Parser)]` で全体的なCLI、`#[derive(Subcommand)]` でサブコマンドを定義します。`#[arg(short, long)]` でオプション引数（`--priority`・`-p`）、`#[arg(default_value)]` でデフォルト値を設定します。\n\n`Cli::parse()` を呼ぶと引数を自動でパースし、無効な引数はエラーメッセージとともに終了します。`--help` も自動生成されます。",table:T.clapFeatures,code:"use clap::{Parser, Subcommand};\n\n#[derive(Parser)]\n#[command(name = \"todo\", version = \"1.0\", about = \"A simple task manager\")]\nstruct Cli {\n    #[command(subcommand)]\n    command: Commands,\n}\n\n#[derive(Subcommand)]\nenum Commands {\n    /// Add a new task\n    Add {\n        title: String,\n        #[arg(short, long, default_value = \"2\")]\n        priority: u8,\n    },\n    /// List all tasks\n    List {\n        #[arg(long)]\n        pending_only: bool,\n    },\n    /// Mark a task as done\n    Done { id: u32 },\n    /// Remove a task\n    Remove { id: u32 },\n    /// Search tasks by keyword\n    Search { keyword: String },\n    /// Show statistics\n    Stats,\n}\n\nfn main() -> anyhow::Result<()> {\n    let cli = Cli::parse();\n    let mut mgr = TaskManager::load(\"tasks.json\")?;\n    match cli.command {\n        Commands::Add { title, priority } => {\n            let task = mgr.add(title, priority)?;\n            println!(\"Added: {}\", task);\n        }\n        Commands::List { pending_only } => {\n            let tasks: Vec<_> = if pending_only {\n                mgr.pending()\n            } else {\n                mgr.list().iter().collect()\n            };\n            for t in tasks { println!(\"{}\", t); }\n        }\n        Commands::Done { id } => { mgr.complete(id)?; }\n        Commands::Remove { id } => { mgr.remove(id)?; }\n        Commands::Search { keyword } => {\n            for t in mgr.search(&keyword) { println!(\"{}\", t); }\n        }\n        Commands::Stats => { mgr.print_stats(); }\n    }\n    mgr.save(\"tasks.json\")?;\n    Ok(())\n}",afterCode:"clapは `--help` と `--version` を自動で生成します。doc commentの `/// コメント` がhelp文として使われます。`#[command(author)]` で作者情報も設定できます。"},
   ]},
  {id:"ch5",num:5,title:"ソート・フィルタ・拡張機能",est:"50分",
   goal:"優先度・日付でソートできる。due_dateフィールドを追加して期限管理できる。グループ表示・進捗表示を実装できる。",
   sections:[
     {title:"ソートとフィルタリング",body:"Rustのソートは `sort_by()` / `sort_by_key()` を使います。Pythonの `sorted(key=...)` に相当します。`sort_by` はコンパレータ（`|a,b| a.field.cmp(&b.field)`）を受け取り、`sort_by_key` はキー抽出関数を受け取ります。\n\n`Ord` トレイトは全順序（すべての要素を比較できる）を表します。整数・文字列は `Ord` を実装しています。`PartialOrd` は部分順序（floatのNaNのように一部比較できない場合）です。\n\n`retain()` はPythonのリスト内包表記的なフィルタリングをインプレースで行います。`filter().collect()` で新しいベクタを作る方法と使い分けます。",code:"impl TaskManager {\n    pub fn sort_by_priority(&mut self) {\n        self.tasks.sort_by_key(|t| t.priority);\n    }\n\n    pub fn sort_by_title(&mut self) {\n        self.tasks.sort_by(|a, b| a.title.cmp(&b.title));\n    }\n\n    pub fn pending(&self) -> Vec<&Task> {\n        self.tasks.iter().filter(|t| !t.done).collect()\n    }\n\n    pub fn print_stats(&self) {\n        let total = self.tasks.len();\n        let done = self.tasks.iter().filter(|t| t.done).count();\n        let rate = if total > 0 { done as f64 / total as f64 * 100.0 } else { 0.0 };\n        println!(\"Total: {} | Done: {} | Pending: {} | Rate: {:.0}%\",\n                 total, done, total - done, rate);\n    }\n}",afterCode:"due_date を `chrono::NaiveDate` 型で持ち、`chrono::Local::now().date_naive()` と比較すると期限切れを検出できます。`#[serde(with = \"chrono::serde::ts_seconds_option\")]` で日付のシリアライズも自動化できます。"},
   ]},
  {id:"ch6",num:6,title:"ファイルI/Oの応用",est:"50分",
   goal:"read_dir でディレクトリ操作ができる。インポート・エクスポート機能を実装できる。パスを扱う std::path::Path/PathBuf を使いこなせる。",
   sections:[
     {title:"ファイルシステム操作",body:"`std::path::Path` と `PathBuf` はRustのパス操作型です。`Path` は参照（借用）、`PathBuf` は所有型です。`path.extension()` でファイル拡張子、`path.parent()` で親ディレクトリを取得できます。\n\n`std::fs::read_dir()` でディレクトリ内のエントリを `DirEntry` のイテレータとして返します。各エントリは `entry.path()` でパスを取得できます。これはPythonの `os.listdir()` や `pathlib.Path.iterdir()` に相当します。\n\nCSVエクスポートは `std::fs::write()` で文字列を一括書き込みするのが簡単です。大きなファイルには `BufWriter` を使って書き込みをバッファリングするとパフォーマンスが向上します。",code:"use std::path::{Path, PathBuf};\nuse std::io::Write;\n\npub fn export_csv(&self, path: &str) -> anyhow::Result<()> {\n    let mut wtr = std::io::BufWriter::new(std::fs::File::create(path)?);\n    writeln!(wtr, \"id,title,done,priority\")?;\n    for t in &self.tasks {\n        writeln!(wtr, \"{},{},{},{}\",\n                 t.id, t.title, if t.done { 1 } else { 0 }, t.priority)?;\n    }\n    Ok(())\n}\n\nfn find_json_files(dir: &str) -> anyhow::Result<Vec<PathBuf>> {\n    let mut files = vec![];\n    for entry in std::fs::read_dir(dir)? {\n        let path = entry?.path();\n        if path.extension().map_or(false, |e| e == \"json\") {\n            files.push(path);\n        }\n    }\n    files.sort();\n    Ok(files)\n}",afterCode:"`std::fs::create_dir_all(path)` でパスのすべてのディレクトリを再帰的に作成できます。`Path::new(path).exists()` でファイルの存在確認ができます。"},
   ]},
  {id:"ch7",num:7,title:"並行処理入門",est:"60分",
   goal:"std::threadで並行処理を実装できる。Arc<Mutex<T>>でスレッド間のデータ共有ができる。mpsc channelでスレッド間通信ができる。",
   sections:[
     {title:"Rustの「安全な並行性」",body:"Rustの所有権システムにより、コンパイラがデータ競合を静的に防ぎます。C++ではデータ競合は実行時に現れる潜在バグですが、Rustでは`Arc<Mutex<T>>`なしにスレッド間でデータを共有しようとするとコンパイルエラーになります。\n\n`Arc<T>`（Atomically Reference Counted）はスレッドセーフな参照カウントです。`Rc<T>` のスレッドセーフ版です。`Mutex<T>` は排他ロックで、\".lock()` でロックを取得し、スコープを抜けると自動解放されます。\n\nmpsc（multiple producer, single consumer）チャネルはスレッド間のメッセージパッシングに使います。送信端（`Sender`）はcloneして複数スレッドから使え、受信端（`Receiver`）は1つだけです。Go言語のgoroutine + channelに似ています。",code:"use std::sync::{Arc, Mutex};\nuse std::thread;\nuse std::sync::mpsc;\n\nfn parallel_validate(tasks: Vec<Task>) -> Vec<Result<Task, String>> {\n    let handles: Vec<_> = tasks.into_iter().map(|task| {\n        thread::spawn(move || { // move クロージャで所有権移動\n            if task.title.is_empty() {\n                Err(\"Title is empty\".to_string())\n            } else {\n                Ok(task)\n            }\n        })\n    }).collect();\n    handles.into_iter().map(|h| h.join().unwrap()).collect()\n}\n\nfn shared_counter_demo() {\n    let counter = Arc::new(Mutex::new(0u32));\n    let mut handles = vec![];\n    for _ in 0..10 {\n        let c = Arc::clone(&counter); // 参照カウントを増やす\n        handles.push(thread::spawn(move || {\n            *c.lock().unwrap() += 1;\n        }));\n    }\n    for h in handles { h.join().unwrap(); }\n    println!(\"Counter: {}\", *counter.lock().unwrap()); // 10\n}",afterCode:"Rustには `Send` と `Sync` という特別なマーカートレイトがあります。`Send` はスレッド間の所有権移動が安全、`Sync` は参照の共有が安全であることを示します。`Arc<T>` は `T: Send + Sync` が必要です。"},
   ]},
  {id:"ch8",num:8,title:"イテレータトレイトの実装",est:"55分",
   goal:"カスタムIteratorトレイトを実装できる。FromIteratorでコレクション変換を実装できる。ジェネリクスとトレイト境界でプラガブルなAPI設計ができる。",
   sections:[
     {title:"Iterator トレイトを実装する",body:"`Iterator` トレイトは `next(&mut self) -> Option<Self::Item>` の1つのメソッドだけを要求します。これを実装すると `map`・`filter`・`collect`・`sum` など100以上のメソッドが自動的に使えるようになります。\n\nPythonでは `__iter__` と `__next__` を実装するのに相当します。Rustのイテレータは遅延評価で、実際に値が必要になるまで計算しません。Pythonのジェネレータと同じ性質です。\n\n`FromIterator<T>` トレイトを実装すると、\".collect::<MyType>()` が使えるようになります。Pythonの `list(iter)` や `dict(iter)` のようなコレクション変換が型安全に書けます。",code:"struct TaskIter<'a> {\n    tasks: &'a [Task],\n    index: usize,\n}\n\nimpl<'a> Iterator for TaskIter<'a> {\n    type Item = &'a Task;\n    fn next(&mut self) -> Option<Self::Item> {\n        let task = self.tasks.get(self.index)?;\n        self.index += 1;\n        Some(task)\n    }\n}\n\nimpl TaskManager {\n    pub fn iter(&self) -> TaskIter {\n        TaskIter { tasks: &self.tasks, index: 0 }\n    }\n}\n\n// 使用例: すべてのIteratorメソッドが使える\nfn main() {\n    let mgr = TaskManager::new();\n    let high_priority_titles: Vec<String> = mgr.iter()\n        .filter(|t| t.priority == 1 && !t.done)\n        .map(|t| t.title.clone())\n        .collect();\n    println!(\"{:?}\", high_priority_titles);\n}",afterCode:"`DoubleEndedIterator` を実装すると `rev()` で逆順イテレートができます。`ExactSizeIterator` を実装すると `len()` でサイズが取得できます。必要に応じて拡張しましょう。"},
   ]},
  {id:"ch9",num:9,title:"モジュール分割とテスト",est:"55分",
   goal:"pub mod でファイルを分割できる。ユニットテストとインテグレーションテストを書ける。cargo test でテストを実行できる。",
   sections:[
     {title:"モジュールシステムとテスト",body:"Rustのモジュールシステムはファイルシステムに対応します。`mod task;` と書くと `src/task.rs` が読み込まれます。`pub` をつけると外部からアクセス可能になります。\n\nユニットテストは `#[cfg(test)]` ブロック内に書きます。インテグレーションテストは `tests/` ディレクトリに置きます。インテグレーションテストはライブラリの公開APIのみテストします。\n\n`#[test]` でテスト関数を宣言し、`assert_eq!`, `assert!` でアサーションします。`#[should_panic]` でパニックが期待されるテストを書けます。テスト名の一部を指定して特定のテストだけ実行できます: `cargo test test_add`。",code:"// src/lib.rs\npub mod task;\npub mod storage;\npub mod error;\n\npub use task::{Task, TaskManager};\npub use error::TaskError;\n\n// src/task.rs の末尾:\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_add_task() {\n        let mut mgr = TaskManager::new();\n        let task = mgr.add(\"Buy milk\".to_string(), 1).unwrap();\n        assert_eq!(task.title, \"Buy milk\");\n        assert_eq!(task.priority, 1);\n        assert!(!task.done);\n    }\n\n    #[test]\n    fn test_complete_task() {\n        let mut mgr = TaskManager::new();\n        mgr.add(\"Task\".to_string(), 2).unwrap();\n        mgr.complete(1).unwrap();\n        assert!(mgr.list()[0].done);\n    }\n\n    #[test]\n    fn test_invalid_priority() {\n        let mut mgr = TaskManager::new();\n        assert!(mgr.add(\"Task\".to_string(), 5).is_err());\n    }\n\n    #[test]\n    fn test_not_found() {\n        let mut mgr = TaskManager::new();\n        assert!(matches!(mgr.complete(999), Err(TaskError::NotFound(999))));\n    }\n}",afterCode:"`cargo test -- --nocapture` で `println!` の出力をテスト中に表示できます。`cargo test -- --show-output` でも同様です。テストが並列実行されるため、ファイルを使うテストでは一時ファイル名を一意にしましょう。"},
   ]},
  {id:"ch10",num:10,title:"完成・配布・振り返り",est:"60分",

];
