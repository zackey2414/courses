    std::thread::spawn(move || {
        loop {
            std::thread::sleep(Duration::from_secs(5));
            match rx.try_recv() {
                Ok(_) | Err(mpsc::TryRecvError::Disconnected) => break,

    });

use std::io;

#[derive(Error, Debug)]
pub enum TaskError {
    #[error("Task with id {0} not found")]
    NotFound(u32),

    #[error("Invalid priority {0}: must be 1-3")]
    InvalidPriority(u8),

    #[error("Storage error: {0}")]
    Storage(#[from] io::Error),

    #[error("JSON error: {0}")]
    Json(#[from] serde_json::Error),
}

pub struct TaskManager { tasks: Vec<Task>, next_id: u32 }

impl TaskManager {
    pub fn add(&mut self, title: String, priority: u8) -> Result<&Task, TaskError> {
        if priority < 1 || priority > 3 {
            return Err(TaskError::InvalidPriority(priority));
        }
        self.tasks.push(Task::new(self.next_id, title, priority));
        self.next_id += 1;
        Ok(self.tasks.last().unwrap())
    }

    pub fn complete(&mut self, id: u32) -> Result<(), TaskError> {
        self.tasks.iter_mut()
            .find(|t| t.id == id)
            .map(|t| t.done = true)
            .ok_or(TaskError::NotFound(id))
    }
}`,afterCode:"エラーメッセージは `format!()` 構文で書けます。`{0}` は最初のフィールド、`{name}` は名前付きフィールドです。エラーを Display で表示した時と Debug で表示した時の違いも意識しましょう。"},

  {id:"ch8",num:8,title:"イテレータトレイトの実装",est:"55分",
   goal:"カスタムIteratorトレイトを実装できる。FromIteratorでコレクション変換を実装できる。ジェネリクスとトレイト境界でプラガブルなAPI設計ができる。",
   sections:[
     {title:"Iterator トレイトを実装する",body:``Iterator` トレイトは `next(&mut self) -> Option<Self::Item>` の1つのメソッドだけを要求します。これを実装すると `map`・`filter`・`collect`・`sum` など100以上のメソッドが自動的に使えるようになります。\n\nPythonでは `__iter__` と `__next__` を実装するのに相当します。Rustのイテレータは遅延評価で、実際に値が必要になるまで計算しません。Pythonのジェネレータと同じ性質です。\n\n`FromIterator<T>` トレイトを実装すると、`.collect::<MyType>()` が使えるようになります。Pythonの `list(iter)` や `dict(iter)` のようなコレクション変換が型安全に書けます。`,code:`struct TaskIter<'a> {
    tasks: &'a [Task],
    index: usize,
}

impl<'a> Iterator for TaskIter<'a> {
    type Item = &'a Task;
    fn next(&mut self) -> Option<Self::Item> {
        let task = self.tasks.get(self.index)?;
        self.index += 1;
        Some(task)
    }
}

impl TaskManager {
    pub fn iter(&self) -> TaskIter {
        TaskIter { tasks: &self.tasks, index: 0 }
    }
}

// 使用例: すべてのIteratorメソッドが使える
fn main() {
    let mgr = TaskManager::new();
    let high_priority_titles: Vec<String> = mgr.iter()
        .filter(|t| t.priority == 1 && !t.done)
        .map(|t| t.title.clone())
        .collect();
    println!("{:?}", high_priority_titles);
}`,afterCode:"`DoubleEndedIterator` を実装すると `rev()` で逆順イテレートができます。`ExactSizeIterator` を実装すると `len()` でサイズが取得できます。必要に応じて拡張しましょう。"},
   ]},
  {id:"ch9",num:9,title:"モジュール分割とテスト",est:"55分",
   goal:"pub mod でファイルを分割できる。ユニットテストとインテグレーションテストを書ける。cargo test でテストを実行できる。",
   sections:[
     {title:"モジュールシステムとテスト",body:`Rustのモジュールシステムはファイルシステムに対応します。`mod task;` と書くと `src/task.rs` が読み込まれます。`pub` をつけると外部からアクセス可能になります。\n\nユニットテストは `#[cfg(test)]` ブロック内に書きます。インテグレーションテストは `tests/` ディレクトリに置きます。インテグレーションテストはライブラリの公開APIのみテストします。\n\n`#[test]` でテスト関数を宣言し、`assert_eq!`, `assert!` でアサーションします。`#[should_panic]` でパニックが期待されるテストを書けます。テスト名の一部を指定して特定のテストだけ実行できます: `cargo test test_add`。`,code:`// src/lib.rs
pub mod task;
pub mod storage;
pub mod error;

pub use task::{Task, TaskManager};
pub use error::TaskError;

// src/task.rs の末尾:
#[cfg(test)]
mod tests {
    use super::*;

    #[test]
    fn test_add_task() {
        let mut mgr = TaskManager::new();
        let task = mgr.add("Buy milk".to_string(), 1).unwrap();
        assert_eq!(task.title, "Buy milk");
        assert_eq!(task.priority, 1);
        assert!(!task.done);
    }

    #[test]
    fn test_complete_task() {
        let mut mgr = TaskManager::new();
        mgr.add("Task".to_string(), 2).unwrap();
        mgr.complete(1).unwrap();
        assert!(mgr.list()[0].done);
    }

    #[test]
    fn test_invalid_priority() {
        let mut mgr = TaskManager::new();
        assert!(mgr.add("Task".to_string(), 5).is_err());
    }

    #[test]
    fn test_not_found() {
        let mut mgr = TaskManager::new();
        assert!(matches!(mgr.complete(999), Err(TaskError::NotFound(999))));
    }
}`,afterCode:"`cargo test -- --nocapture` で `println!` の出力をテスト中に表示できます。`cargo test -- --show-output` でも同様です。テストが並列実行されるため、ファイルを使うテストでは一時ファイル名を一意にしましょう。"},
   ]},
  {id:"ch10",num:10,title:"完成・配布・振り返り",est:"60分",

   sections:[

name: CI
on:

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
      - name: Format check

      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Test

      - name: Build release
