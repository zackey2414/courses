    body: "Python の型ヒントと TypeScript の型システムは、見た目は似ていますが根本的に異なるものです。Python の型ヒントは「ドキュメントとして役立つが、実行時には何の効果もないメモ書き」です。例えば Python で x: int = \"hello\" と書いても、Python インタプリタは何の警告も出さずに実行します。mypy を別途実行して初めてエラーが報告されますが、mypy を使わなければ型ヒントは完全に無視されます。\n\nTypeScript の型システムはこれとは対照的で、「コードの正しさをコンパイル時に強制する仕組み」です。let x: number = \"hello\" と書くと、コードを保存した瞬間にエディタが赤い波線でエラーを表示し、tsc によるコンパイルも失敗します。型が合っていないコードは JavaScript に変換すらされないため、実行時に型エラーが発生する可能性を大幅に削減できます。\n\nもう一つの違いは、型推論の精度です。Python の型チェッカーも型推論を行いますが、TypeScript の型推論はさらに高度です。TypeScript は条件分岐の中で変数の型を自動的に絞り込み（Narrowing）、typeof チェックの後に型を変えてくれます。Python の mypy もこれをある程度サポートしていますが、TypeScript の方がきめ細かく、開発者が書くべき型注釈の量を減らしてくれます。",
    code: "// === Python の型ヒント（参考） ===\n// x: int = \"hello\"   # 実行時エラーにならない！mypyで初めて検出\n// def add(a: int, b: int) -> int:\n//     return a + b\n// add(\"1\", \"2\")  # 実行時に \"12\" を返す（エラーにならない）\n\n// === TypeScript の型システム ===\n// let x: number = \"hello\";  // コンパイルエラー！実行前に検出\n\nfunction add(a: number, b: number): number {\n  return a + b;\n}\n// add(\"1\", \"2\");  // コンパイルエラー！string は渡せない\nadd(1, 2);         // OK: 3 が返る\n\n// TypeScript の型推論\nlet value: string | number = \"hello\";\nif (typeof value === \"string\") {\n  // この中では value は string 型と自動推論される\n  console.log(value.toUpperCase()); // OK\n} else {\n  // この中では value は number 型と自動推論される\n  console.log(value.toFixed(2));    // OK\n}",

    code: "# ===== 1. Node.js のインストール確認 =====\nnode --version          # v20.x.x 以上が表示されればOK\nnpm --version           # 10.x.x が表示されればOK\n\n# ===== 2. プロジェクトの作成 =====\n# Python で言えば「ディレクトリを作って venv を作る」に相当\nmkdir my-ts-project     # プロジェクトディレクトリを作成\ncd my-ts-project        # 移動\nnpm init -y             # package.json を作成（pip init に相当）\n\n# ===== 3. TypeScript のインストール =====\n# --save-dev は「開発時のみ必要」という意味\n# Python で言えば pip install mypy のような感覚\nnpm install --save-dev typescript\n\n# インストール確認\nnpx tsc --version       # Version 5.x.x が表示される\n\n# ===== 生成されたファイル構成 =====\n# my-ts-project/\n#   package.json        ← pyproject.toml に相当\n#   package-lock.json   ← pip freeze の結果に相当\n#   node_modules/       ← venv/lib/python3.x/ に相当",

    body: "TypeScript の開発では 3 つの主要ツールを使います。1つ目は tsc（TypeScript Compiler）で、.ts ファイルを .js ファイルに変換するコンパイラです。Python にはコンパイルの概念がないため、これは新しい体験でしょう。tsc hello.ts を実行すると、同じディレクトリに hello.js が生成され、それを node hello.js で実行します。Python で python hello.py と一発で実行できるのに比べると、一手間多いと感じるかもしれません。\n\n2つ目は ts-node です。ts-node は tsc によるコンパイルと node による実行を内部で自動的に行ってくれるツールです。npx ts-node hello.ts と書くだけで、.js ファイルを生成せずに直接 TypeScript コードを実行できます。Python の python hello.py と同じ感覚で使えるため、開発中のちょっとした動作確認に非常に便利です。ただし、本番環境では事前に tsc でコンパイルした .js を実行するのが一般的です。\n\n3つ目は @types パッケージです。JavaScript で書かれたライブラリには型情報がないため、TypeScript から使うと型エラーになることがあります。@types/node は Node.js の標準ライブラリ（fs, path, http など）の型定義を提供するパッケージで、TypeScript で Node.js 開発をする際には必ずインストールします。Python の typeshed（標準ライブラリの型スタブ）に相当するものです。",
    code: "# ===== ts-node と @types/node のインストール =====\nnpm install --save-dev ts-node @types/node\n\n# ===== tsc でコンパイルして実行する方法 =====\n# 1. TypeScript ファイルを作成\necho 'const message: string = \"Hello, TypeScript!\";\nconsole.log(message);' > hello.ts\n\n# 2. コンパイル（hello.js が生成される）\nnpx tsc hello.ts\n\n# 3. 生成された JavaScript を実行\nnode hello.js\n# 出力: Hello, TypeScript!\n\n# ===== ts-node で直接実行する方法 =====\nnpx ts-node hello.ts\n# 出力: Hello, TypeScript!\n# （.js ファイルは生成されない）\n\n# ===== コンパイル前後のファイル比較 =====\n# hello.ts（TypeScript）:\n#   const message: string = \"Hello, TypeScript!\";\n#   console.log(message);\n#\n# hello.js（生成された JavaScript）:\n#   \"use strict\";\n#   const message = \"Hello, TypeScript!\";\n#   console.log(message);\n# → 型注釈 \": string\" が消えていることに注目！",

    title: "tsconfig.json — プロジェクト設定を理解する",
    body: "tsconfig.json は TypeScript プロジェクトの設定ファイルで、コンパイルの挙動を細かく制御します。Python で言えば pyproject.toml（プロジェクト設定）と mypy.ini（型チェック設定）を合わせたようなものです。このファイルがプロジェクトルートにあると、tsc はそれを読み込んで設定に従ってコンパイルを行います。tsc --init コマンドで雛形を自動生成できます。\n\nもっとも重要な設定は strict: true です。これを有効にすると、暗黙の any 型の禁止、null / undefined のチェック強制、関数パラメータの厳密な型チェックなど、複数の厳格オプションが一括で有効になります。Python の mypy で --strict オプションを付けるのに近い意味合いです。新規プロジェクトでは必ず strict: true から始めることを強く推奨します。厳しいと感じるかもしれませんが、型安全性の恩恵を最大限に受けるために必要です。\n\ntarget はコンパイル先の JavaScript バージョンを指定します。ES2022 を指定すると、最新の JavaScript 構文をそのまま出力します。module はモジュールの形式で、Node.js で使う場合は NodeNext を指定します。outDir はコンパイル結果の出力先ディレクトリ、rootDir はソースコードの起点ディレクトリです。これらの設定により「src/ に .ts を置き、dist/ に .js を出力する」という一般的なプロジェクト構成が実現できます。",
    table: T.tsconfig,
    code: "// ===== tsconfig.json の自動生成 =====\n// npx tsc --init\n// → 全オプションがコメント付きで生成される（リファレンスとして便利）\n\n// ===== 最小限の tsconfig.json =====\n// 以下の内容で tsconfig.json を作成してください\n{\n  \"compilerOptions\": {\n    // 出力する JavaScript のバージョン\n    \"target\": \"ES2022\",\n    // モジュール形式（Node.js 用）\n    \"module\": \"NodeNext\",\n    // モジュール解決の方式\n    \"moduleResolution\": \"NodeNext\",\n    // 厳格モードを一括有効化（最重要！）\n    \"strict\": true,\n    // コンパイル結果の出力先\n    \"outDir\": \"./dist\",\n    // ソースファイルの起点\n    \"rootDir\": \"./src\",\n    // CommonJS モジュールの互換設定\n    \"esModuleInterop\": true,\n    // ファイル名の大文字小文字を厳密に区別\n    \"forceConsistentCasingInFileNames\": true,\n    // 依存パッケージの型チェックをスキップ（高速化）\n    \"skipLibCheck\": true\n  },\n  // コンパイル対象のファイルパターン\n  \"include\": [\"src/**/*\"]\n}\n\n// ===== tsconfig.json がある場合の実行手順 =====\n// mkdir src\n// echo 'console.log(\"Hello!\");' > src/main.ts\n// npx tsc              ← tsconfig.json の設定に従ってコンパイル\n// node dist/main.js    ← 出力された JS を実行",

    title: "Hello World — 1行ずつ完全に理解する",
    body: "ここでは TypeScript の Hello World プログラムを 1 行ずつ丁寧に解説します。Python では print('Hello') の 1 行で終わりますが、TypeScript にはいくつかの新しい概念が登場します。最も重要なのは「変数宣言のキーワード」と「型注釈」です。Python では name = \"太郎\" と書くだけで変数を作れますが、TypeScript では const name: string = \"太郎\" のように、宣言キーワード（const / let）と型注釈（: string）を書きます。\n\nTypeScript の変数宣言には const（再代入不可）と let（再代入可能）の 2 種類があります（var もありますが、レガシーなので使いません）。Python には const に相当するキーワードがないため、これは新しい概念です。Python では大文字の変数名（MAX_SIZE = 100）で「定数のつもり」を表現しますが、実際には再代入可能です。TypeScript の const は言語レベルで再代入を禁止するため、意図しない変更を確実に防げます。基本的に const をデフォルトで使い、後から値を変更する必要がある変数だけ let を使うのが TypeScript の流儀です。\n\n型注釈は変数名の後にコロンで書きます（const name: string = \"太郎\"）。Python の型ヒント（name: str = \"太郎\"）と構文がよく似ているため、すぐに慣れるはずです。ただし TypeScript では型注釈を省略しても、代入する値から型推論（Type Inference）が自動的に行われます。const name = \"太郎\" と書けば、TypeScript は name が string 型であることを自動的に推論します。型推論が効く場面では型注釈を省略するのが一般的で、全てに型注釈を書く必要はありません。",
    code: "// ===== TypeScript Hello World 完全解説 =====\n\n// 1行目: 定数の宣言（再代入不可）\n// const = 再代入できない変数宣言キーワード\n// greeting = 変数名\n// : string = 型注釈（この変数は文字列型）\n// = \"Hello\" = 初期値\nconst greeting: string = \"Hello, TypeScript!\";\n\n// 2行目: 標準出力（Python の print() に相当）\nconsole.log(greeting);  // Hello, TypeScript!\n\n// ===== const と let の違い =====\nconst language: string = \"TypeScript\";\n// language = \"JavaScript\";  // コンパイルエラー！const は再代入不可\n\nlet version: number = 5.4;\nversion = 5.5;  // OK: let は再代入可能\n\n// ===== 型注釈 vs 型推論 =====\n// 型注釈あり（明示的に型を指定）\nconst name1: string = \"太郎\";\nconst age1: number = 25;\nconst active1: boolean = true;\n\n// 型推論（型注釈を省略 — 値から自動推論される）\nconst name2 = \"太郎\";    // string と推論される\nconst age2 = 25;         // number と推論される\nconst active2 = true;    // boolean と推論される\n// → 両方とも同じ意味！推論できる場合は省略がベター\n\n// ===== テンプレートリテラル（Python の f-string に相当）=====\nconst userName = \"太郎\";\nconst userAge = 25;\n// Python: f\"{name}は{age}歳です\"\n// TypeScript: バッククォート ` で囲み ${} で変数を埋め込む\nconsole.log(`${userName}は${userAge}歳です`);  // 太郎は25歳です\n\n// ===== 文末のセミコロン =====\n// TypeScript / JavaScript では文末に ; を付ける（省略も可能だが推奨）\n// Python ではインデントでブロックを表すが、TypeScript では {} を使う\nif (userAge >= 20) {\n  console.log(\"成人です\");\n} else {\n  console.log(\"未成年です\");\n}",

    title: "配列とオブジェクト — Python のリストと辞書に相当する型",
    body: "TypeScript の配列は Python のリストに相当しますが、型の扱いが異なります。Python では my_list = [1, \"hello\", True] のように異なる型の値を混在させたリストを自由に作れますが、TypeScript の配列は全要素が同じ型である必要があります。const scores: number[] = [80, 90, 75] と書くと、この配列には数値しか入れられません。文字列を追加しようとするとコンパイルエラーになります。これは一見不便に思えるかもしれませんが、「この配列には何が入っているか」が常に明確になるため、バグの防止に役立ちます。\n\nオブジェクトは Python の辞書（dict）に見た目が似ていますが、より型安全です。Python の辞書は任意のキーに任意の値を入れられますが、TypeScript のオブジェクトは「どのキーがどの型の値を持つか」が型レベルで定義されています。Python の TypedDict に近い概念です。{ name: \"太郎\", age: 25 } のようなオブジェクトリテラルを作り、その型は { name: string; age: number } と表現されます。存在しないキーにアクセスしようとするとコンパイルエラーになります。\n\nTypeScript のオブジェクトは Python の辞書と違い、キーは基本的に文字列（または Symbol）です。Python の辞書では d[0] のように数値キーを使えますが、TypeScript のオブジェクトでは通常文字列キーを使います。数値インデックスでアクセスしたい場合は配列を使います。この区別を意識しておくと、Python から移行した際に混乱せずに済みます。",
    code: "// ===== 配列（Python のリストに相当） =====\nconst scores: number[] = [80, 90, 75];\nconst names: string[] = [\"Alice\", \"Bob\", \"Charlie\"];\n// scores.push(\"hello\"); // コンパイルエラー！number[] に string は入れられない\nscores.push(95);         // OK\n\n// 配列の操作（Python とよく似ている）\nconsole.log(scores.length);     // 4（Python: len(scores)）\nconsole.log(scores[0]);         // 80（Python: scores[0]）\nconsole.log(scores.includes(90)); // true（Python: 90 in scores）\n\n// Python の list comprehension に相当する書き方\nconst doubled = scores.map(s => s * 2);  // [160, 180, 150, 190]\nconst passed = scores.filter(s => s >= 80); // [80, 90, 95]\n\n// ===== オブジェクト（Python の辞書に相当） =====\nconst user: { name: string; age: number } = {\n  name: \"太郎\",\n  age: 25\n};\n\nconsole.log(user.name);    // \"太郎\"（Python: user[\"name\"]）\nconsole.log(user.age);     // 25\n// console.log(user.email); // コンパイルエラー！email は定義されていない\n\n// Python との比較:\n// Python: user = {\"name\": \"太郎\", \"age\": 25}  ← どんなキーでも追加可能\n// TS:     const user: { name: string; age: number } = {...}  ← 定義済みのキーのみ",

  sections: [{
    title: "プリミティブ型 — Python との違いを意識する",
    body: "TypeScript のプリミティブ型は Python と似ていますが、いくつか重要な違いがあります。最大の違いは number 型です。Python は int（整数）と float（浮動小数点数）を明確に別の型として分けます。例えば Python では type(42) は <class 'int'>、type(3.14) は <class 'float'> と表示されます。しかし TypeScript（JavaScript）は整数も浮動小数点数も全て number という単一の型で扱います。内部的には全て IEEE 754 の倍精度浮動小数点数です。つまり TypeScript の 42 と 42.0 は全く同じ型・同じ値です。\n\nもう 1 つの大きな違いは「何も無い」ことを表す方法です。Python には None だけがありますが、TypeScript には null と undefined の 2 つが存在します。null は「値が意図的に存在しないこと」を表し、undefined は「変数が宣言されたが値がまだ代入されていない状態」を表します。この 2 つを使い分ける場面は実務で頻繁に出てきます。tsconfig.json で strictNullChecks を有効にすると、null や undefined の可能性がある変数を安全にチェックせずに使うとコンパイルエラーになります。これは Python で None チェックを忘れた時に AttributeError が発生するのを、コンパイル時に防いでくれる仕組みです。\n\nboolean 型の値は true / false（小文字）です。Python の True / False（大文字始まり）とは異なるので、Python から移行したばかりの方は注意してください。文字列は string 型で、Python の str に相当します。ダブルクォート、シングルクォート、バッククォートの 3 種類で囲めますが、バッククォート（`）はテンプレートリテラル用です。",
    table: T.basicTypes,
    code: "// ===== 基本型の宣言 =====\nconst name: string = \"TypeScript\";     // 文字列（Python: str）\nconst version: number = 5.4;           // 数値（Python: int/float の区別なし）\nconst count: number = 42;              // これも number（Python なら int）\nconst isReady: boolean = true;         // 真偽値（Python: True/False は大文字）\nconst nothing: null = null;            // 意図的に「無し」（Python: None）\nconst notSet: undefined = undefined;   // まだ値が入っていない（Python にはない）\nconst big: bigint = 9007199254740993n; // 大きな整数（末尾に n を付ける）\n\n// ===== Python との比較 =====\n// Python: x: int = 42         → 整数型\n// TS:     const x: number = 42  → number（整数も小数も同じ型）\n\n// Python: x: float = 3.14     → 浮動小数点型\n// TS:     const x: number = 3.14 → number（int/float の区別なし！）\n\n// Python: x: Optional[str] = None   → None で「無し」を表す\n// TS:     let x: string | null = null;  → null で「無し」を表す\n// TS:     let y: string | undefined;    → undefined で「未設定」を表す\n\n// ===== null と undefined の違い =====\nlet a: string | null = null;        // 意図的に「値がない」\nlet b: string | undefined;          // 値がまだ代入されていない\nlet c: string | undefined = undefined; // 明示的に undefined を代入\n\n// strictNullChecks が有効な場合\nfunction getLength(s: string | null): number {\n  // if (s) チェックなしで s.length にアクセスすると\n  // コンパイルエラー！（null の可能性があるため）\n  if (s !== null) {\n    return s.length;  // OK: null チェック済み\n  }\n  return 0;\n}",
    afterCode: "ポイント: TypeScript の number は 2^53 - 1（約9000兆）までの整数を正確に表現できます。それを超える場合は bigint（100n のように末尾に n を付けるリテラル）を使います。Python の int は任意精度で上限がないため、この制限は TypeScript / JavaScript 固有のものです。大きな数値を扱う場面（金融計算など）では注意が必要です。"
  }, {
    title: "配列とタプル — Python のリストとタプルとの対応",
    body: "配列は Python のリストに相当しますが、TypeScript では全要素が同じ型である必要があります。Python では my_list = [1, \"hello\", True] のように異なる型を混在させたリストを自由に作れますが、TypeScript の number[] には数値しか入りません。これは一見制約に感じるかもしれませんが、配列の要素を取り出して使う時に「中身の型が確実に分かる」という大きなメリットがあります。Python で for item in mixed_list: のようにループした時に、各要素が何の型か分からず isinstance() で判定する煩雑さから解放されます。\n\n配列の型宣言は 2 通りの書き方があります。number[] と Array<number> は完全に同じ意味ですが、number[] の方が簡潔で広く使われています。Python の list[int] に相当する書き方です。ネストした配列は number[][]（Python なら list[list[int]]）、読み取り専用配列は readonly number[] と書けます。readonly を付けると push() や pop() などの変更メソッドが使えなくなり、Python の tuple に近い不変性を得られます。\n\nタプルは「要素数と各位置の型が固定された配列」です。Python のタプル（tuple[str, int]）と考え方は同じですが、TypeScript では型レベルで [string, number] のように各位置の型を指定します。関数から複数の値を返したい場合に便利です。ただし TypeScript のタプルは内部的には配列なので、push() で要素を追加できてしまうという落とし穴があります。readonly を付けることでこの問題を防げます。",
    code: "// ===== 配列（Python の list に相当） =====\nconst scores: number[] = [80, 90, 75];\nconst names: Array<string> = [\"Alice\", \"Bob\"];  // 同じ意味の別の書き方\n\n// scores.push(\"hello\");  // コンパイルエラー！number[] に string は入らない\nscores.push(95);          // OK: number を追加\n\n// 読み取り専用配列（Python の tuple に近い不変性）\nconst frozen: readonly number[] = [1, 2, 3];\n// frozen.push(4);  // コンパイルエラー！readonly は変更不可\n// frozen[0] = 10;  // これもエラー！\n\n// 多次元配列\nconst matrix: number[][] = [\n  [1, 2, 3],\n  [4, 5, 6]\n]; // Python: list[list[int]]\n\n// ===== タプル（Python の tuple に相当） =====\n// 要素ごとに異なる型を持つ、固定長の配列\nconst pair: [string, number] = [\"太郎\", 25];\n// pair = [25, \"太郎\"];  // コンパイルエラー！型の順番が違う\n\n// 分割代入（Python のアンパックに相当）\nconst [pName, pAge] = pair;\n// Python: p_name, p_age = (\"太郎\", 25)\nconsole.log(pName);  // \"太郎\"（string 型）\nconsole.log(pAge);   // 25（number 型）\n\n// 関数から複数の値を返す（Python の return a, b に相当）\nfunction divide(a: number, b: number): [number, number] {\n  return [Math.floor(a / b), a % b];  // [商, 余り]\n}\nconst [quotient, remainder] = divide(17, 5);\nconsole.log(`商: ${quotient}, 余り: ${remainder}`);  // 商: 3, 余り: 2",
    afterCode: "ポイント: TypeScript のタプルは内部的には JavaScript の配列（Array）なので、pair.push(\"余計な要素\") が型エラーにならないという落とし穴があります。readonly を付けると push() 自体が使えなくなるため、タプルには readonly を付けるのが安全です: const pair: readonly [string, number] = [\"太郎\", 25];"
  }, {
    title: "Union型 — 複数の型のいずれかを受け付ける",
    body: "Union 型は「この変数には A 型か B 型のどちらかが入る」を表す仕組みで、TypeScript の型システムの中核を成す重要な概念です。構文は Python 3.10 以降の str | int とほぼ同じで、TypeScript でも string | number と書きます。Python 3.9 以前の Union[str, int] よりもずっと直感的です。TypeScript では Union 型を Python よりもはるかに頻繁に使います。API レスポンスの成功 / 失敗の表現、関数の引数に複数の型を受け付ける場面、null / undefined の可能性を明示する場面など、あらゆる場所で登場します。\n\nUnion 型の変数を使う時には注意が必要です。string | number 型の変数に対しては、string のメソッド（toUpperCase()）も number のメソッド（toFixed()）も直接呼び出せません。なぜなら、実際にその変数がどちらの型であるか分からないからです。使うには typeof で型を確認してからアクセスする必要があります。これを「型の絞り込み（Narrowing）」と呼び、第 9 章で詳しく学びます。Python でも isinstance() を使って型を確認してから操作するのと同じ考え方ですが、TypeScript ではこの確認がコンパイラによって強制されます。\n\nUnion 型は「この値は必ず A か B のどちらかである」ことを型レベルで保証するため、想定外の値が入り込むバグを防げます。Python では動的型付けのため、期待していない型の値が関数に渡されても実行されてしまいますが、TypeScript ではコンパイル時に拒否されます。",
    code: "// ===== Union 型の基本 =====\n// id は文字列か数値のどちらか\nlet id: string | number;\nid = \"abc-123\";  // OK: string\nid = 42;         // OK: number\n// id = true;    // コンパイルエラー！boolean は許可されていない\n\n// ===== Union 型の使用時は型チェックが必要 =====\nfunction printId(id: string | number): void {\n  // id.toUpperCase();  // エラー！number には toUpperCase がない\n  if (typeof id === \"string\") {\n    // この中では id は string 型として扱える\n    console.log(id.toUpperCase());\n  } else {\n    // この中では id は number 型として扱える\n    console.log(id.toFixed(0));\n  }\n}\nprintId(\"abc\");  // \"ABC\"\nprintId(42);     // \"42\"\n\n// ===== null 許容型（よく使うパターン） =====\n// Python: Optional[str] = Union[str, None]\n// TypeScript: string | null\nfunction findUser(id: number): string | null {\n  if (id === 1) return \"太郎\";\n  return null;  // 見つからない場合\n}\n\nconst user = findUser(1);\nif (user !== null) {\n  console.log(user.toUpperCase());  // OK: null チェック済み\n}",
    afterCode: "ポイント: Python の Optional[str] は TypeScript では string | null や string | undefined で表現します。TypeScript には Optional 型エイリアスがなく、Union 型で直接書くのが慣例です。null を使うか undefined を使うかはプロジェクトの方針次第ですが、API からのデータは null、未設定の変数は undefined という使い分けが一般的です。"
  }, {
    title: "リテラル型 — 値そのものを型にする",
    body: "リテラル型は「特定の値そのもの」を型として扱う仕組みです。Python の Literal[\"success\", \"error\"] に相当しますが、TypeScript ではごく自然に使えます。\"success\" | \"error\" のようにリテラル型を Union で結合することで、「この引数には success か error の文字列しか渡せない」という制約を型レベルで表現できます。これは Python の Enum に近い用途で使えますが、クラスを定義する必要がなく、はるかに軽量です。\n\nリテラル型は文字列だけでなく、数値やブール値でも使えます。例えば type DiceRoll = 1 | 2 | 3 | 4 | 5 | 6 と定義すると、サイコロの値として 1 から 6 の整数しか受け付けない型ができます。7 を代入しようとするとコンパイルエラーになります。Python の Literal[1, 2, 3, 4, 5, 6] に相当しますが、TypeScript の方が構文が自然で読みやすいでしょう。\n\nconst と let で型推論の結果が変わる点も重要です。const x = \"hello\" と書くと、x の型は string ではなく \"hello\"（リテラル型）に推論されます。const は再代入不可なので、値が変わることはなく、「hello という文字列そのもの」が型になります。一方 let y = \"hello\" と書くと、y は後で別の文字列に変わる可能性があるため、型は string（広い型）に推論されます。この違いは型の精度に影響し、リテラル型が必要な場面で const を使うか、as const アサーションを使って明示的にリテラル型にすることがあります。",
    table: T.unionLiteral,
    code: "// ===== リテラル型の基本 =====\n// 文字列リテラル型\ntype Direction = \"north\" | \"south\" | \"east\" | \"west\";\nlet dir: Direction = \"north\";  // OK\n// dir = \"up\";                 // コンパイルエラー！\"up\" は Direction に含まれない\n\n// 数値リテラル型\ntype DiceRoll = 1 | 2 | 3 | 4 | 5 | 6;\nconst roll: DiceRoll = 3;  // OK\n// const bad: DiceRoll = 7; // コンパイルエラー！\n\n// ブールリテラル型\ntype AlwaysTrue = true;\nconst flag: AlwaysTrue = true;  // OK\n// const bad: AlwaysTrue = false; // コンパイルエラー！\n\n// ===== const vs let での型推論の違い =====\nconst x = \"hello\";   // 型は \"hello\"（リテラル型 — 値が変わらないため）\nlet y = \"hello\";     // 型は string（広い型 — 後で変わる可能性があるため）\n\n// ===== as const で配列をリテラル型にする =====\nconst colors = [\"red\", \"green\", \"blue\"] as const;\n// 型は readonly [\"red\", \"green\", \"blue\"]（各要素がリテラル型）\n// colors.push(\"yellow\"); // エラー！readonly\ntype Color = typeof colors[number];  // \"red\" | \"green\" | \"blue\"\n\n// ===== 実用例: 関数の引数を制限する =====\nfunction setAlignment(align: \"left\" | \"center\" | \"right\"): void {\n  console.log(`配置を ${align} に設定`);\n}\nsetAlignment(\"center\");  // OK\n// setAlignment(\"top\");  // コンパイルエラー！",
    afterCode: "ポイント: リテラル型と Union 型の組み合わせは、TypeScript の型システムの真髄です。Python の Enum を使わずとも、型の力だけで「許可される値の集合」を定義できます。as const アサーションは配列やオブジェクトの全ての値をリテラル型として扱うための便利な機能で、定数の定義でよく使います。"
  }, {
    title: "any, unknown, never — 3つの特殊な型を理解する",
    body: "any は「型チェックを完全に無効化する」型です。Python の Any と同じで、何でも代入でき、何にでも代入でき、どんなプロパティやメソッドにもアクセスできます。一見便利ですが、any を使った瞬間に TypeScript を使う意味がなくなります。any 型の変数にはどんな操作をしてもコンパイルエラーにならず、実行時に初めてエラーが発生します。これは Python の通常の変数と同じ状態であり、TypeScript の型安全性のメリットを完全に失ってしまいます。レガシーな JavaScript コードを TypeScript に移行する過渡期にだけ使い、最終的には全て具体的な型に置き換えるべきです。\n\nunknown は「安全な any」と呼ばれる型です。any と同じく何でも代入できますが、unknown 型の値を使うには先に型チェック（typeof や instanceof）を行う必要があります。つまり「型が分からないデータを受け取るが、使う前に必ず何の型かを検証する」という意図を型レベルで強制できます。外部 API からの JSON レスポンス、ユーザー入力、JSON.parse() の結果など、「実行時まで型が分からないデータ」の受け口として unknown を使うのが TypeScript のベストプラクティスです。Python で言えば、Any を使う代わりに object を使い、isinstance() で型を確認してから操作するのに似ています。\n\nnever は「到達しないことを表す型」で、Python の NoReturn に相当します。例外を必ず投げる関数の戻り値型や、switch 文で全ケースを網羅した後の default 節に使います。never 型の値は存在し得ないため、「ここに到達したらロジックに漏れがある」ことをコンパイル時にチェックできます。Union 型の全パターンを処理したかどうかを検証する「網羅性チェック（exhaustive check）」に特に有用で、新しいパターンを追加した時に処理の追加を忘れるとコンパイルエラーが発生します。",
    code: "// ===== any: 型チェックを完全に無効化（危険！） =====\nlet danger: any = \"hello\";\ndanger = 42;                       // OK: 何でも代入できる\ndanger.nonExistent.method();       // コンパイルは通るが実行時エラー！\n// → any を使うと TypeScript の保護が全て消える\n\n// ===== unknown: 安全な any（使う前にチェック必須） =====\nlet safe: unknown = \"hello\";\n// safe.toUpperCase();  // コンパイルエラー！型が不明のため操作できない\n\n// typeof で型を確認してから使う\nif (typeof safe === \"string\") {\n  console.log(safe.toUpperCase());   // OK: string と確認済み\n}\nif (typeof safe === \"number\") {\n  console.log(safe.toFixed(2));      // OK: number と確認済み\n}\n\n// 実用例: JSON.parse() の結果を安全に扱う\nfunction parseJson(text: string): unknown {\n  return JSON.parse(text);\n}\nconst data = parseJson('{\"name\": \"太郎\"}');\n// data.name;  // エラー！unknown のため直接アクセスできない\nif (typeof data === \"object\" && data !== null && \"name\" in data) {\n  console.log((data as {name: string}).name);  // OK: 検証済み\n}\n\n// ===== never: 到達不能を表す型 =====\n// 例外を必ず投げる関数\nfunction throwError(msg: string): never {\n  throw new Error(msg);\n  // この行以降には絶対に到達しない\n}\n\n// 網羅性チェック: 全ケースを処理したか確認\ntype Color = \"red\" | \"blue\" | \"green\";\nfunction colorToHex(c: Color): string {\n  switch (c) {\n    case \"red\":   return \"#ff0000\";\n    case \"blue\":  return \"#0000ff\";\n    case \"green\": return \"#00ff00\";\n    default:\n      // ここに到達 = 処理漏れがある\n      const _exhaustive: never = c;\n      return _exhaustive;\n      // Color に \"yellow\" を追加すると、ここでコンパイルエラー！\n      // → case \"yellow\" の処理を追加し忘れたことを教えてくれる\n  }\n}",
    afterCode: "ポイント: any と unknown の選択は「TypeScript の恩恵を受けるかどうか」の分水嶺です。any を使うとその変数に関する型チェックが全て無効になりますが、unknown を使うと「型チェックを後で行う」ことを強制されます。外部データを受け取る場面では、まず unknown で受け取り、typeof や in 演算子で型を確認してから使うのが安全なパターンです。"
  }, {
    title: "型アサーションと型キャスト — 開発者が型を指定する方法",
    body: "型アサーション（Type Assertion）は、開発者がコンパイラに「この値はこの型である」と明示的に伝える仕組みです。Python の cast() 関数（from typing import cast）に相当しますが、実行時には何の効果もなく、コンパイラへの指示に過ぎません。構文は value as Type と書きます。例えば const el = document.getElementById(\"app\") as HTMLDivElement と書くと、戻り値が HTMLElement | null ではなく HTMLDivElement であるとコンパイラに伝えられます。\n\n型アサーションは便利ですが、乱用するとTypeScript の型安全性を損ないます。コンパイラが型を正しく推論できない場合にだけ使い、可能な限り型ガード（typeof / instanceof）を使って型を絞り込む方が安全です。型アサーションは「私がこの型であることを保証する」という開発者の責任を伴うもので、間違った型をアサートすると実行時エラーにつながります。\n\n特に危険なのは as any を使うパターンです。これは型チェックを完全に無視するため、本当にやむを得ない場合以外は避けるべきです。代わりに unknown を経由するか、ユーザー定義型ガード（第9章で学習）を使って安全に型を変換しましょう。",
    code: "// ===== 型アサーションの基本 =====\n// document.getElementById() は HTMLElement | null を返す\nconst el = document.getElementById(\"app\");\n// el の型: HTMLElement | null\n\n// 型アサーションで具体的な型を指定\nconst div = document.getElementById(\"app\") as HTMLDivElement;\n// div の型: HTMLDivElement\n\n// ===== 型アサーションが必要な場面 =====\n// JSON.parse() の結果に型を付ける\ninterface Config {\n  host: string;\n  port: number;\n}\nconst config = JSON.parse('{\"host\":\"localhost\",\"port\":3000}') as Config;\nconsole.log(config.host);  // \"localhost\"\nconsole.log(config.port);  // 3000\n\n// ===== 安全な方法: 型ガードを使う（推奨） =====\nconst el2 = document.getElementById(\"app\");\nif (el2 !== null) {\n  // null チェック後は HTMLElement として使える\n  el2.textContent = \"Hello!\";\n}\n\n// ===== 非nullアサーション演算子（!） =====\n// 「null / undefined ではないことを確信している」場合に使う\nconst el3 = document.getElementById(\"app\")!;\n// 注意: 本当に null でないことを開発者が保証する必要がある\n// 存在しない要素に使うと実行時エラーになる",
    afterCode: "ポイント: 型アサーション as Type は Python の cast(Type, value) と同じく、実行時には何も起きません。コンパイラに「私がこの型を保証する」と伝えているだけです。間違った型をアサートしてもコンパイルエラーにはならないため、使いすぎると型安全性が低下します。できる限り typeof / instanceof による型ガードを使いましょう。"
  }]
}, {
  id: "ch3",
  num: 3,
  title: "関数の型付け",
  est: "60分",
  goal: "TypeScript の関数に引数型・戻り値型を正確に付けられるようになる。function 宣言とアロー関数の違い、オプショナル引数・デフォルト引数・可変長引数の使い方を理解する。コールバック・ジェネリック関数・オーバーロードの 3 パターンを書けるようになり、Python の def / lambda との対応関係を把握する。関数型を型エイリアスとして定義し、高階関数に適用できる状態を目指す。",
  sections: [{
    title: "関数宣言の基本 — Python の def との違い",
    body: "TypeScript の関数は function キーワードで宣言します。Python の def に相当しますが、構文がいくつか異なります。Python では def add(a: int, b: int) -> int: のように戻り値の型をアロー（->）で書きますが、TypeScript では function add(a: number, b: number): number のようにコロン（:）で書きます。また、Python は関数本体をインデントで表現しますが、TypeScript では {} で囲みます。return 文も Python と同じように書きますが、TypeScript では文末にセミコロン（;）を付けるのが一般的です。\n\nTypeScript の関数で最も重要なのは、引数の型注釈がほぼ必須であることです。Python では型ヒントを省略しても動きますが、TypeScript の strict モードでは引数の型を省略すると「暗黙の any」としてコンパイルエラーになります。一方、戻り値の型は多くの場合省略できます。TypeScript のコンパイラが return 文から戻り値の型を自動的に推論してくれるためです。ただし、公開する API や複雑な関数では戻り値の型を明示的に書くことが推奨されます。型を書くことで、ドキュメントの役割も果たします。\n\n戻り値が何もない関数の型は void です。Python の -> None に相当します。console.log() で出力するだけの関数や、配列を変更するだけの関数など、値を返さない関数に使います。void 関数で return 文を書くこともできますが、return; のように値なしで書きます。",
    table: T.funcCompare,
    code: "// ===== 基本的な関数宣言 =====\n// Python: def add(a: int, b: int) -> int:\n//             return a + b\nfunction add(a: number, b: number): number {\n  return a + b;\n}\nconsole.log(add(3, 5));  // 8\n\n// ===== 戻り値の型推論 =====\n// 戻り値の型を省略すると、return 文から自動推論される\nfunction multiply(a: number, b: number) {\n  return a * b;  // 戻り値は number と推論される\n}\n\n// ===== void: 値を返さない関数 =====\n// Python: def greet(name: str) -> None:\nfunction greet(name: string): void {\n  console.log(`こんにちは、${name}さん！`);\n  // return 不要（暗黙で undefined が返る）\n}\ngreet(\"太郎\");  // こんにちは、太郎さん！\n\n// ===== 引数の型を省略するとエラー =====\n// strict: true の場合\n// function double(x) { ... }  // コンパイルエラー！暗黙の any\nfunction double(x: number): number {\n  return x * 2;  // 引数の型は必ず書く\n}\n\n// ===== Python との構文比較まとめ =====\n// Python:\n//   def calculate(price: float, tax_rate: float = 0.1) -> float:\n//       return price * (1 + tax_rate)\n//\n// TypeScript:\nfunction calculate(price: number, taxRate: number = 0.1): number {\n  return price * (1 + taxRate);\n}\nconsole.log(calculate(1000));       // 1100\nconsole.log(calculate(1000, 0.08)); // 1080",
    afterCode: "ポイント: TypeScript では変数名にキャメルケース（taxRate）を使うのが慣例です。Python ではスネークケース（tax_rate）が一般的ですが、TypeScript / JavaScript の世界ではキャメルケースが標準です。コードを書く時はこの命名規則に従いましょう。"
  }, {
    title: "アロー関数 — Python の lambda を超える無名関数",
    body: "アロー関数（=>）は TypeScript で最もよく使われる関数の書き方です。Python の lambda に相当しますが、決定的に異なる点があります。Python の lambda は式 1 つだけしか書けません（lambda x: x * 2）。一方、TypeScript のアロー関数は {} で囲むことで何行でも処理を書けます。つまり、Python の lambda の制約を取り払った「より強力な無名関数」です。実務では function 宣言よりアロー関数の方が圧倒的によく使われます。\n\nアロー関数の構文は (引数): 戻り値型 => 式 または (引数): 戻り値型 => { 複数の文 } です。式が 1 つだけの場合は {} と return を省略できます（const double = (x: number): number => x * 2）。Python の lambda x: x * 2 とよく似た見た目になりますね。複数行の処理が必要な場合は {} で囲み、明示的に return を書きます。\n\nアロー関数と function 宣言にはもう 1 つ重要な違いがあります。function 宣言は「巻き上げ（hoisting）」されるため、コード上で定義より前に呼び出すことができます。アロー関数は const に代入するため、定義より前に呼び出すとエラーになります。Python では関数は必ず定義してから呼び出す必要があるため、Python 開発者にとってはアロー関数の挙動の方が直感的でしょう。",
    code: "// ===== アロー関数の基本 =====\n// 式が1つだけの場合（{} と return を省略可能）\nconst double = (x: number): number => x * 2;\n// Python: double = lambda x: x * 2\n\nconsole.log(double(5));  // 10\n\n// ===== 複数行のアロー関数 =====\n// Python の lambda ではできないが、アロー関数なら可能\nconst formatUser = (name: string, age: number): string => {\n  const title = age >= 20 ? \"さん\" : \"くん\";\n  const status = age >= 18 ? \"成人\" : \"未成年\";\n  return `${name}${title}（${age}歳・${status}）`;\n};\nconsole.log(formatUser(\"太郎\", 25));  // 太郎さん（25歳・成人）\n\n// ===== 引数が1つの場合は () も省略可能 =====\nconst square = (x: number): number => x * x;\n// 注意: 型注釈を書く場合は () が必要\n\n// ===== 実務でよく見るパターン =====\n// コールバックとしてのアロー関数\nconst numbers = [3, 1, 4, 1, 5, 9];\nconst sorted = numbers.sort((a, b) => a - b);  // 昇順ソート\nconst doubled = numbers.map(n => n * 2);        // 各要素を2倍\nconst evens = numbers.filter(n => n % 2 === 0); // 偶数だけ抽出\nconsole.log(sorted);   // [1, 1, 3, 4, 5, 9]\nconsole.log(doubled);  // [6, 2, 8, 2, 10, 18]\nconsole.log(evens);    // [4]\n\n// ===== function 宣言 vs アロー関数の巻き上げ =====\n// function 宣言は定義前に呼べる（巻き上げ）\n// console.log(hello());  // OK: \"Hello!\" が返る\nfunction hello(): string { return \"Hello!\"; }\n\n// アロー関数は定義前に呼べない\n// console.log(goodbye());  // エラー！まだ定義されていない\nconst goodbye = (): string => \"Goodbye!\";",
    afterCode: "ポイント: アロー関数はコールバック（他の関数に渡す関数）として使う場面が最も多いです。配列の map / filter / sort / reduce に渡す関数、イベントハンドラ、Promise のコールバックなど、TypeScript / JavaScript ではアロー関数が無くてはならない存在です。Python では map(lambda x: x * 2, [1,2,3]) と書きますが、TypeScript では [1,2,3].map(x => x * 2) とメソッドチェーンで書きます。"
  }, {
    title: "オプショナル引数とデフォルト引数 — 省略可能な引数の扱い方",
    body: "TypeScript のデフォルト引数は Python と同じ感覚で書けます。function f(x: number = 10) のように、引数にデフォルト値を指定できます。呼び出し時にその引数を省略すると、デフォルト値が使われます。デフォルト値がある引数は型注釈を省略できます。TypeScript が値から型を推論してくれるためです。Python 開発者にとっては馴染みのある機能で、ほぼ同じ書き方で使えます。\n\nオプショナル引数（? 記号）は Python にはない TypeScript 固有の概念です。function f(x?: number) と書くと、x は number | undefined 型になり、呼び出し時に省略できます。デフォルト引数との違いは重要です。デフォルト引数は省略しても必ず値が入りますが、オプショナル引数を省略すると undefined になります。つまり関数内で undefined チェックが必要になります。使い分けの指針は明確で、「省略時に決まった値を使いたい」ならデフォルト引数、「値があるかないかで処理を分岐したい」ならオプショナル引数を使います。\n\n可変長引数（rest パラメータ）は ...args: number[] のように書きます。Python の *args: int に相当しますが、構文が ... である点が異なります。rest パラメータは配列として受け取るため、配列のメソッド（map, filter, reduce など）をそのまま使えます。また、Python のキーワード引数（**kwargs）に直接相当する構文は TypeScript にはありませんが、オブジェクトの分割代入を使って同様のパターンを実現できます。",
    code: "// ===== デフォルト引数（Python と同じ感覚） =====\n// Python: def greet(name: str, greeting: str = \"こんにちは\") -> str:\nfunction greet(name: string, greeting: string = \"こんにちは\"): string {\n  return `${greeting}、${name}さん！`;\n}\nconsole.log(greet(\"太郎\"));              // こんにちは、太郎さん！\nconsole.log(greet(\"花子\", \"おはよう\"));  // おはよう、花子さん！\n\n// ===== オプショナル引数（TypeScript 固有） =====\nfunction createUser(name: string, age?: number): string {\n  // age の型は number | undefined\n  if (age !== undefined) {\n    return `${name}: ${age}歳`;\n  }\n  return `${name}: 年齢不明`;\n}\nconsole.log(createUser(\"太郎\", 25));  // 太郎: 25歳\nconsole.log(createUser(\"花子\"));       // 花子: 年齢不明\n\n// ===== デフォルト引数 vs オプショナル引数の違い =====\n// デフォルト引数: 省略しても必ず値がある\nfunction withDefault(x: number = 0): number {\n  return x * 2;  // x は必ず number\n}\n// オプショナル引数: 省略すると undefined\nfunction withOptional(x?: number): number {\n  // x は number | undefined なので、チェックが必要\n  return (x ?? 0) * 2;  // ?? は null/undefined の場合に右辺を使う演算子\n}\n\n// ===== 可変長引数（rest パラメータ） =====\n// Python: def total(*values: int) -> int:\nfunction total(...values: number[]): number {\n  return values.reduce((acc, v) => acc + v, 0);\n}\nconsole.log(total(1, 2, 3, 4, 5));  // 15\nconsole.log(total());                // 0\n\n// ===== オブジェクト引数（Python のキーワード引数の代替） =====\n// Python: def connect(host: str, port: int = 3000, ssl: bool = False)\n// TypeScript にはキーワード引数がないため、オブジェクトを使う\nfunction connect(options: {\n  host: string;\n  port?: number;    // 省略可能\n  ssl?: boolean;    // 省略可能\n}): void {\n  const port = options.port ?? 3000;   // デフォルト: 3000\n  const ssl = options.ssl ?? false;     // デフォルト: false\n  console.log(`接続先: ${options.host}:${port} (SSL: ${ssl})`);\n}\nconnect({ host: \"example.com\" });                    // デフォルト使用\nconnect({ host: \"example.com\", port: 8080, ssl: true }); // 明示指定",
    afterCode: "ポイント: ?? は「Nullish Coalescing（ヌル合体）演算子」と呼ばれ、左辺が null または undefined の場合にだけ右辺の値を使います。Python の or（value or default）に似ていますが、0 や空文字列（\"\"）を「値がある」と正しく判定する点で優れています。Python の or では 0 or 10 が 10 になりますが、TypeScript の 0 ?? 10 は 0 のまま保持されます。"
  }, {
    title: "関数型とコールバック — 関数を値として扱う",
    body: "TypeScript では関数の型そのものを定義できます。(a: number, b: number) => number は「number を 2 つ受け取って number を返す関数」の型です。Python の Callable[[int, int], int] に相当しますが、TypeScript の構文の方が直感的で読みやすいでしょう。関数型を使うと「この引数にはこういう形の関数を渡してほしい」ということを型レベルで明示でき、間違った形の関数を渡すとコンパイルエラーになります。\n\n関数型はコールバックパターンで非常に頻繁に使います。JavaScript / TypeScript の世界では、関数を引数に渡す「コールバック」が至る所に登場します。配列の map / filter / reduce に渡す関数、ボタンクリック時に実行されるイベントハンドラ、API 呼び出し後に実行される処理関数など、全てがコールバックです。Python でも map() や sorted() にキー関数を渡しますが、TypeScript ではその頻度が桁違いに高いです。型が付いているので、コールバックに間違った関数を渡すとコンパイル時にエラーになります。\n\n型エイリアスを使って関数型に名前を付けることもできます。type MathOperation = (a: number, b: number) => number のように定義しておくと、同じ関数型を複数箇所で再利用でき、コードの可読性が向上します。長い関数型を毎回書く必要がなくなるため、実務では積極的に使いましょう。",
    code: "// ===== 関数型の定義 =====\n// type エイリアスで関数型に名前を付ける\ntype MathOperation = (a: number, b: number) => number;\n// Python: MathOperation = Callable[[int, int], int]\n\n// 関数型を使って変数に関数を代入\nconst add: MathOperation = (a, b) => a + b;\nconst sub: MathOperation = (a, b) => a - b;\nconst mul: MathOperation = (a, b) => a * b;\n\n// ===== コールバックを受け取る高階関数 =====\n// Python: def apply(x: int, y: int, op: Callable[[int, int], int]) -> int\nfunction applyOperation(\n  x: number,\n  y: number,\n  op: MathOperation  // 関数を引数として受け取る\n): number {\n  return op(x, y);\n}\nconsole.log(applyOperation(10, 3, add));  // 13\nconsole.log(applyOperation(10, 3, sub));  // 7\nconsole.log(applyOperation(10, 3, mul));  // 30\n\n// ===== 配列メソッドでのコールバック（最も頻出するパターン） =====\nconst numbers = [1, 2, 3, 4, 5];\n\n// map: 各要素を変換（Python: [n * 2 for n in numbers]）\nconst doubled = numbers.map((n) => n * 2);         // [2, 4, 6, 8, 10]\n\n// filter: 条件に合う要素を抽出（Python: [n for n in numbers if n % 2 == 0]）\nconst evens = numbers.filter((n) => n % 2 === 0);   // [2, 4]\n\n// reduce: 畳み込み（Python: functools.reduce(lambda acc, n: acc + n, numbers, 0)）\nconst total = numbers.reduce((acc, n) => acc + n, 0); // 15\n\n// find: 条件に合う最初の要素（Python: next(n for n in numbers if n > 3)）\nconst found = numbers.find((n) => n > 3);            // 4\n\n// ===== 関数を返す関数（クロージャ） =====\n// Python: def make_multiplier(factor: int) -> Callable[[int], int]:\nfunction makeMultiplier(factor: number): (n: number) => number {\n  return (n) => n * factor;\n}\nconst triple = makeMultiplier(3);\nconsole.log(triple(5));   // 15\nconsole.log(triple(10));  // 30",
    afterCode: "ポイント: Python では map(lambda x: x*2, [1,2,3]) やリスト内包表記 [x*2 for x in [1,2,3]] を使いますが、TypeScript では [1,2,3].map(x => x*2) とメソッドチェーンで書きます。TypeScript / JavaScript では配列のメソッドチェーン（.map().filter().reduce()）がデータ処理の基本パターンであり、Python のリスト内包表記に代わる重要なイディオムです。"
  }, {
    title: "オーバーロード — 引数の型に応じて戻り値の型を変える",
    body: "TypeScript のオーバーロードは、Python の @overload デコレータに似た機能です。「引数の型によって戻り値の型が変わる」関数を正確に型付けするために使います。TypeScript では「シグネチャ宣言」を複数書き、その後に「実装本体」を 1 つだけ書きます。呼び出し側はシグネチャ宣言の型だけで型チェックされ、実装本体のシグネチャは外部からは見えません。Python の @overload と同じく、型チェックのための宣言と実装を分離する設計です。\n\nPython と TypeScript のオーバーロードには重要な違いがあります。Python の @overload は型チェッカー（mypy）のみが認識する「ヒント」であり、実行時には何の効果もありません。TypeScript のオーバーロードはコンパイラが厳密にチェックし、シグネチャ宣言と実装本体の互換性がない場合はコンパイルエラーになります。また、呼び出し側の引数の型に一致するシグネチャが見つからない場合もコンパイルエラーです。\n\nオーバーロードは強力ですが、使いすぎると可読性が下がります。多くの場合、ジェネリック関数（次のセクションで学習）や Union 型で代替できるため、本当に「引数の型によって戻り値の型が異なる」場合にだけ使うのがベストプラクティスです。例えば getElementById() のように、引数が \"div\" なら HTMLDivElement を、\"input\" なら HTMLInputElement を返すといった場面で真価を発揮します。",
    table: T.overloadCompare,
    code: "// ===== オーバーロードの基本 =====\n// シグネチャ宣言: 外部に公開される型の組み合わせ\nfunction format(value: string): string;   // string → string\nfunction format(value: number): string;   // number → string\nfunction format(value: Date): string;     // Date → string\n\n// 実装本体: 全てのシグネチャを処理する1つの関数\n// この関数の型は外部からは見えない\nfunction format(value: string | number | Date): string {\n  if (typeof value === \"string\") {\n    return value.trim();             // 文字列: 前後の空白を除去\n  } else if (typeof value === \"number\") {\n    return value.toFixed(2);         // 数値: 小数点2桁に\n  } else {\n    return value.toISOString();      // Date: ISO形式に\n  }\n}\n\nconsole.log(format(\"  hello  \"));     // \"hello\"\nconsole.log(format(3.14159));         // \"3.14\"\nconsole.log(format(new Date()));      // \"2024-01-01T...\"\n// format(true);  // コンパイルエラー！boolean のシグネチャは宣言されていない\n\n// ===== Python の @overload との比較 =====\n// Python:\n//   @overload\n//   def parse(value: str) -> int: ...\n//   @overload\n//   def parse(value: int) -> str: ...\n//   def parse(value: str | int) -> int | str:\n//       if isinstance(value, str): return int(value)\n//       return str(value)\n\n// TypeScript:\nfunction parse(value: string): number;   // シグネチャ1\nfunction parse(value: number): string;   // シグネチャ2\nfunction parse(value: string | number): number | string {\n  if (typeof value === \"string\") {\n    return Number(value);   // \"42\" → 42\n  } else {\n    return String(value);   // 42 → \"42\"\n  }\n}\n\nconst num = parse(\"42\");   // number 型（シグネチャ1 に一致）\nconst str = parse(42);     // string 型（シグネチャ2 に一致）\nconsole.log(num);  // 42\nconsole.log(str);  // \"42\"",
    afterCode: "ポイント: オーバーロードの代替として、ジェネリック関数や条件付き型（Conditional Types）を使うケースも多いです。「引数の型と戻り値の型が1対1で対応する」ならオーバーロード、「入力と出力が同じ型」ならジェネリック関数が適しています。"
  }, {
    title: "ジェネリック関数 — 型をパラメータとして受け取る",
    body: "ジェネリック関数は「型をパラメータとして受け取る関数」で、TypeScript の型システムの中でも特に強力な機能です。Python の TypeVar を使ったジェネリック関数に相当しますが、TypeScript では <T> という構文で型パラメータを宣言します。Python では T = TypeVar(\"T\") のように事前に TypeVar を定義する必要がありますが、TypeScript では関数名の直後に <T> と書くだけで型パラメータを使えます。\n\nジェネリック関数の最大の利点は「入力の型に応じて出力の型が自動的に決まる」ことです。例えば function identity<T>(value: T): T は、number を渡せば number を返す関数として振る舞い、string を渡せば string を返す関数として振る舞います。any を使えば同じ「何でも受け取って何でも返す」ことは実現できますが、型情報が完全に失われます。ジェネリック関数なら型情報を保持したまま汎用的なコードが書けるのです。型が保持されるため、戻り値を使う側でもエディタの補完や型チェックが正しく機能します。\n\n型パラメータに制約（extends）を付けることで、「T はこの型を満たす型でなければならない」という条件を指定できます。Python の TypeVar(\"T\", bound=SomeType) に相当します。制約なしの <T> だと、T がどんな型かわからないため操作がほとんどできませんが、T extends { length: number } と書けば、T は length プロパティを持つことが保証され、value.length にアクセスできるようになります。",
    code: "// ===== ジェネリック関数の基本 =====\n// <T> が型パラメータ（Python の TypeVar に相当）\nfunction identity<T>(value: T): T {\n  return value;\n}\n// 呼び出し時に T が自動推論される\nconst n = identity(42);       // T = number → 戻り値は number\nconst s = identity(\"hello\");  // T = string → 戻り値は string\n\n// Python で書くとこうなる:\n// T = TypeVar(\"T\")\n// def identity(value: T) -> T:\n//     return value\n\n// ===== 配列を受け取るジェネリック関数 =====\nfunction last<T>(arr: T[]): T | undefined {\n  return arr.length > 0 ? arr[arr.length - 1] : undefined;\n}\nconst lastNum = last([1, 2, 3]);       // number | undefined\nconst lastStr = last([\"a\", \"b\", \"c\"]); // string | undefined\nconsole.log(lastNum);  // 3\nconsole.log(lastStr);  // \"c\"\n\n// ===== 複数の型パラメータ =====\nfunction pair<A, B>(first: A, second: B): [A, B] {\n  return [first, second];\n}\nconst p = pair(\"太郎\", 25);  // [string, number] と推論\nconsole.log(p);  // [\"太郎\", 25]\n\n// ===== 制約付きジェネリック（extends） =====\n// T は length プロパティを持つ型に制約\nfunction getLength<T extends { length: number }>(item: T): number {\n  return item.length;\n}\ngetLength(\"hello\");     // 5（string は length を持つ）\ngetLength([1, 2, 3]);   // 3（配列は length を持つ）\n// getLength(42);        // コンパイルエラー！number に length はない\n\n// ===== keyof による制約 =====\n// K は T のプロパティ名のいずれかに制約\nfunction getProperty<T, K extends keyof T>(obj: T, key: K): T[K] {\n  return obj[key];\n}\nconst user = { name: \"太郎\", age: 25 };\nconsole.log(getProperty(user, \"name\"));  // \"太郎\"（string 型）\nconsole.log(getProperty(user, \"age\"));   // 25（number 型）\n// getProperty(user, \"email\");  // コンパイルエラー！\"email\" は User のキーではない",
    afterCode: "ポイント: ジェネリック関数の型パラメータは、呼び出し時に自動推論されるため、明示的に指定する必要はほとんどありません。identity<number>(42) のように書くこともできますが、identity(42) で十分です。TypeScript のコンパイラは非常に賢い型推論を行ってくれます。keyof T は「T のプロパティ名の Union 型」を返す演算子で、keyof { name: string; age: number } は \"name\" | \"age\" になります。"

    code: "// 基本的な Conditional Type\ntype IsString<T> = T extends string ? \"yes\" : \"no\";\ntype A = IsString<\"hello\">;   // \"yes\"\ntype B = IsString<42>;        // \"no\"\n\n// infer で型をキャプチャ\ntype UnwrapPromise<T> = T extends Promise<infer U> ? U : T;\ntype C = UnwrapPromise<Promise<string>>;  // string\ntype D = UnwrapPromise<number>;           // number\n\n// 配列の要素型を取り出す\ntype ElementType<T> = T extends (infer U)[] ? U : never;\ntype E = ElementType<string[]>;    // string\ntype F = ElementType<number[][]>;  // number[]\n\n// ReturnType の内部実装\ntype MyReturnType<T extends (...args: any[]) => any> =\n  T extends (...args: any[]) => infer R ? R : never;\n\ntype G = MyReturnType<() => string>;  // string",

    code: "// 基本的な Template Literal Type\ntype Greeting = `Hello, \${\"World\" | \"TypeScript\"}`;\n// \"Hello, World\" | \"Hello, TypeScript\"\n\n// イベント名の自動生成\ntype Event = \"click\" | \"focus\" | \"blur\";\ntype EventHandler = `on\${Capitalize<Event>}`;\n// \"onClick\" | \"onFocus\" | \"onBlur\"\n\n// CSS プロパティ風の型生成\ntype CSSUnit = \"px\" | \"em\" | \"rem\" | \"%\";\ntype CSSValue = `\${number}\${CSSUnit}`;\nconst width: CSSValue = \"100px\";    // OK\nconst height: CSSValue = \"2.5em\";   // OK\n// const bad: CSSValue = \"100\";     // エラー！\n\n// 組み合わせの爆発\ntype Color = \"red\" | \"blue\";\ntype Size = \"small\" | \"large\";\ntype Variant = `\${Color}-\${Size}`;\n// \"red-small\" | \"red-large\" | \"blue-small\" | \"blue-large\"",

  sections: [{

    body: "Narrowing（型の絞り込み）は、Union 型の変数が実際にどの型であるかを条件分岐で特定し、その分岐内では特定の型として扱える仕組みです。Python の isinstance() チェック後に型チェッカーが型を絞り込むのと同じ発想ですが、TypeScript の方がはるかに多くのパターンをサポートしています。\n\n例えば string | number 型の変数に対して typeof x === 'string' のチェックを入れると、そのブロック内では x は string 型として扱われます。number のメソッドを呼ぼうとするとコンパイルエラーになり、string のメソッドだけが使えます。これが Narrowing です。\n\nTypeScript のコンパイラは制御フロー解析（Control Flow Analysis）を行い、if / switch / 三項演算子 / 論理演算子など、あらゆる条件分岐で自動的に型を絞り込みます。プログラマが明示的に「ここでは string です」と宣言する必要はなく、条件式を書くだけで型が自動的に狭まります。",

    title: "Discriminated Union",
    body: "Discriminated Union（判別可能なユニオン）は TypeScript で最もよく使われる型パターンの一つです。各メンバーに共通の「タグ」プロパティ（通常は kind や type という名前のリテラル型）を持たせ、switch 文でそのタグに基づいて分岐します。\n\nPython の match 文（3.10+）と概念的に似ていますが、TypeScript では型レベルで網羅性が保証される点が異なります。switch 文の default 節で never 型に代入することで、「全てのケースを処理した」ことをコンパイラに証明できます。新しいメンバーを Union に追加した場合、処理を追加し忘れるとコンパイルエラーになります。\n\nこのパターンは API レスポンスの処理（Success | Error）、状態管理（Loading | Loaded | Failed）、AST の処理（Expression | Statement | Declaration）など、「有限個の型のいずれかである」データを扱うあらゆる場面で使えます。",

    code: "// ユーザー定義型ガード\ninterface User {\n  id: number;\n  name: string;\n  email: string;\n}\n\n// value is User: 戻り値が true なら value は User 型\nfunction isUser(value: unknown): value is User {\n  return (\n    typeof value === \"object\" &&\n    value !== null &&\n    \"id\" in value &&\n    \"name\" in value &&\n    \"email\" in value\n  );\n}\n\n// 使用例\nfunction processData(data: unknown): void {\n  if (isUser(data)) {\n    // data は User 型として扱える\n    console.log(`ユーザー: \${data.name} (\${data.email})`);\n  }\n}\n\n// 配列フィルタリングとの組み合わせ\nfunction isNonNull<T>(value: T | null | undefined): value is T {\n  return value != null;\n}\n\nconst items = [\"a\", null, \"b\", undefined, \"c\"];\nconst clean: string[] = items.filter(isNonNull);\n// [\"a\", \"b\", \"c\"]  — 型も string[] に絞り込まれる",
