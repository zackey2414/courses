  product: Product,
  updates: Partial<Product>
): Product {
  return { ...product, ...updates };

function freezeProduct(product: Product): Readonly<Product> {

  kind: "triangle";
  base: number;
  height: number;

type Shape = Circle | Rectangle | Triangle;

function isNonNull<T>(value: T | null | undefined): value is T {
