    answer: "import ts from 'typescript';\n\nfunction findConsoleLogs(filePath: string): void {\n  const program = ts.createProgram([filePath], {});\n  const sourceFile = program.getSourceFile(filePath);\n  if (!sourceFile) return;\n\n  function visit(node: ts.Node): void {\n    if (\n      ts.isCallExpression(node) &&\n      ts.isPropertyAccessExpression(node.expression) &&\n      ts.isIdentifier(node.expression.expression) &&\n      node.expression.expression.text === 'console' &&\n      node.expression.name.text === 'log'\n    ) {\n      const { line } = sourceFile!.getLineAndCharacterOfPosition(\n        node.getStart()\n      );\n      console.log(`console.log found at line \${line + 1}`);\n    }\n    ts.forEachChild(node, visit);\n  }\n\n  visit(sourceFile);\n}\n\nfindConsoleLogs('./src/index.ts');"

    q: "カスタムトランスフォーマーを作成してください。\n全ての console.log 呼び出しを、ファイル名と行番号を先頭に付けた形に変換する transformer を実装すること。\n例: console.log('hi') → console.log('[index.ts:5]', 'hi')",
    code: "import ts from 'typescript';\n\nfunction createLogTransformer(\n  program: ts.Program\n): ts.TransformerFactory<ts.SourceFile> {\n  // ここを実装\n  return context => sourceFile => sourceFile;\n}",
    answer: "import ts from 'typescript';\nimport path from 'path';\n\nfunction createLogTransformer(\n  program: ts.Program\n): ts.TransformerFactory<ts.SourceFile> {\n  return (context) => (sourceFile) => {\n    function visit(node: ts.Node): ts.Node {\n      if (\n        ts.isCallExpression(node) &&\n        ts.isPropertyAccessExpression(node.expression) &&\n        ts.isIdentifier(node.expression.expression) &&\n        node.expression.expression.text === 'console' &&\n        node.expression.name.text === 'log'\n      ) {\n        const { line } = sourceFile.getLineAndCharacterOfPosition(\n          node.getStart()\n        );\n        const fileName = path.basename(sourceFile.fileName);\n        const prefix = ts.factory.createStringLiteral(\n          `[\${fileName}:\${line + 1}]`\n        );\n        return ts.factory.updateCallExpression(\n          node,\n          node.expression,\n          node.typeArguments,\n          [prefix, ...node.arguments]\n        );\n      }\n      return ts.visitEachChild(node, visit, context);\n    }\n    return ts.visitNode(sourceFile, visit) as ts.SourceFile;\n  };\n}\n\n// 使用例\nconst program = ts.createProgram(['./src/index.ts'], { strict: true });\nconst result = ts.transpileModule(\n  'console.log(\"hello\")',\n  { transformers: { before: [createLogTransformer(program)] } }\n);\nconsole.log(result.outputText);"

    code: "// パスパラメータを型で抽出\ntype ExtractParams<Path extends string> = // ここを実装\n\nfunction route<P extends string>(\n  path: P,\n  handler: (params: ExtractParams<P>) => void\n): void {\n  // 実際のルーティングロジック（省略）\n}\n\n// 使用例\nroute('/users/:id/posts/:postId', (params) => {\n  // params.id, params.postId が string 型で参照できること\n});",
    answer: "type ExtractParams<Path extends string> =\n  Path extends `\${infer _Before}:\${infer Param}/\${infer Rest}`\n    ? { [K in Param | keyof ExtractParams<`/\${Rest}`>]: string }\n    : Path extends `\${infer _Before}:\${infer Param}`\n    ? { [K in Param]: string }\n    : Record<never, never>;\n\nfunction route<P extends string>(\n  path: P,\n  handler: (params: ExtractParams<P>) => void\n): void {\n  // 実際のルーティングではパスパターンをパースして params を構築\n  const segments = path.split('/');\n  const params: Record<string, string> = {};\n  segments.forEach(seg => {\n    if (seg.startsWith(':')) params[seg.slice(1)] = 'demo';\n  });\n  handler(params as ExtractParams<P>);\n}\n\n// 使用例\nroute('/users/:id/posts/:postId', (params) => {\n  console.log(params.id, params.postId); // 型安全\n});"

    code: "import { pipe } from 'fp-ts/function';\nimport * as O from 'fp-ts/Option';\n\nconst users: Record<string, { name: string }> = {\n  '1': { name: 'alice' },\n  '2': { name: 'bob' },\n};\n\nfunction getUserName(id: string): O.Option<string> {\n  // pipe と O.fromNullable, O.map を使って実装\n}",
    answer: "import { pipe } from 'fp-ts/function';\nimport * as O from 'fp-ts/Option';\n\nconst users: Record<string, { name: string }> = {\n  '1': { name: 'alice' },\n  '2': { name: 'bob' },\n};\n\nfunction getUserName(id: string): O.Option<string> {\n  return pipe(\n    O.fromNullable(users[id]),           // Record にあれば Some、なければ None\n    O.map(user => user.name),            // Some の中の値を変換\n    O.map(name => name.toUpperCase())    // さらに変換\n  );\n}\n\n// 使用例\nconst result1 = getUserName('1');\n// O.some('ALICE')\n\nconst result2 = getUserName('99');\n// O.none\n\n// Either でエラー情報を保持\nimport * as E from 'fp-ts/Either';\n\nfunction getUserEither(id: string): E.Either<string, string> {\n  return pipe(\n    O.fromNullable(users[id]),\n    O.map(u => u.name.toUpperCase()),\n    O.match(\n      () => E.left(`User \${id} not found`),\n      (name) => E.right(name)\n    )\n  );\n}\n\nconsole.log(getUserEither('1'));  // Right('ALICE')\nconsole.log(getUserEither('x'));  // Left('User x not found')"

    code: "import { pipe } from 'fp-ts/function';\nimport * as TE from 'fp-ts/TaskEither';\n\ninterface User { id: string; name: string; email: string; }\ninterface UserRecord { userId: string; displayName: string; }\n\n// fetchUser, transformUser, saveUser を TE で定義し、pipe で合成",
    answer: "import { pipe } from 'fp-ts/function';\nimport * as TE from 'fp-ts/TaskEither';\n\ninterface User { id: string; name: string; email: string; }\ninterface UserRecord { userId: string; displayName: string; }\n\nconst fetchUser = (id: string): TE.TaskEither<string, User> =>\n  TE.tryCatch(\n    async () => {\n      const res = await fetch(`https://api.example.com/users/\${id}`);\n      if (!res.ok) throw new Error(`HTTP \${res.status}`);\n      return res.json() as Promise<User>;\n    },\n    (e) => `Fetch failed: \${e instanceof Error ? e.message : String(e)}`\n  );\n\nconst transformUser = (user: User): TE.TaskEither<string, UserRecord> =>\n  TE.right({\n    userId: user.id,\n    displayName: user.name.trim(),\n  });\n\nconst saveUser = (record: UserRecord): TE.TaskEither<string, void> =>\n  TE.tryCatch(\n    async () => {\n      // DB保存処理\n      console.log('Saved:', record);\n    },\n    (e) => `Save failed: \${e instanceof Error ? e.message : String(e)}`\n  );\n\n// パイプライン合成\nconst processUser = (id: string): TE.TaskEither<string, void> =>\n  pipe(\n    fetchUser(id),\n    TE.chain(transformUser),\n    TE.chain(saveUser)\n  );\n\n// 実行\nprocessUser('123')().then(result => {\n  if (result._tag === 'Left') console.error('Error:', result.left);\n  else console.log('Done');\n});"

    body: "大規模プロジェクトでは tsc の型チェックが数十秒〜数分かかることがあります。最適化の第一歩は計測です。`tsc --noEmit --diagnostics` で「チェック時間」「ファイル数」「型計算の負荷」が確認できます。`--generateTrace` フラグを使うと Chrome DevTools で型チェックのフレームグラフが表示され、どの型計算がボトルネックかを特定できます。\n\n改善策は主に三つです。第一は Project References による差分ビルドです。前章で解説したように `composite: true` を設定すると、変更のあったパッケージだけを再チェックします。第二は `skipLibCheck: true` で node_modules の .d.ts 検査を省略することです。第三は型の複雑さを下げることです。`--generateTrace` で特定した重い型に対して、中間の型エイリアスを増やして計算を分割したり、条件型の深さを制限したりします。",
    code: "// 型チェック計測\n// npx tsc --noEmit --diagnostics\n// Files:     120\n// Lines of Library:   45823\n// Check time:         8.32s  ← ここが遅い\n\n// プロファイリング\n// npx tsc --generateTrace trace_output\n// → Chrome で chrome://tracing を開いてtrace_output/trace.json をロード\n\n// 改善1: skipLibCheck\n// tsconfig.json\n{ \"compilerOptions\": { \"skipLibCheck\": true } }\n\n// 改善2: isolatedDeclarations (TS 5.5+)\n// 各ファイルの型を独立して推論可能にする（並列化の鍵）\n{ \"compilerOptions\": { \"isolatedDeclarations\": true } }\n\n// 改善3: 重い型を単純化\n// ❌ 遅い: 深い再帰型\ntype DeepPaths<T> = T extends object\n  ? { [K in keyof T & string]: K | `\${K}.\${DeepPaths<T[K]>}` }[keyof T & string]\n  : never;\n\n// ✅ 速い: 深さを制限 + 中間型に名前を付ける\ntype Level1<T> = keyof T & string;\ntype Level2<T> = {\n  [K in keyof T & string]: `\${K}.\${keyof T[K] & string}`\n}[keyof T & string];\ntype ShallowPaths<T> = Level1<T> | Level2<T>;",
