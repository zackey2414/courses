    answer: "class Cache<K, V> {\n  private store = new Map<K, { value: V; expiresAt: number | null }>();\n\n  get(key: K): V | undefined {\n    const entry = this.store.get(key);\n    if (!entry) return undefined;\n    if (entry.expiresAt !== null && Date.now() > entry.expiresAt) {\n      this.store.delete(key);\n      return undefined;\n    }\n    return entry.value;\n  }\n\n  set(key: K, value: V, ttlMs?: number): void {\n    this.store.set(key, {\n      value,\n      expiresAt: ttlMs !== undefined ? Date.now() + ttlMs : null,\n    });\n  }\n\n  has(key: K): boolean {\n    return this.get(key) !== undefined;\n  }\n}\n\n// 使用例\nconst cache = new Cache<string, number>();\ncache.set('score', 100, 5000); // 5秒TTL\nconsole.log(cache.get('score')); // 100"

    answer: "import { z } from 'zod';\n\nclass ApiClient {\n  constructor(\n    private readonly baseUrl: string,\n    private readonly headers: Record<string, string> = {},\n  ) {}\n\n  private async request<T>(\n    path: string,\n    init: RequestInit,\n    schema: z.ZodType<T>,\n  ): Promise<T> {\n    const res = await fetch(`\${this.baseUrl}\${path}`, {\n      ...init,\n      headers: { 'Content-Type': 'application/json', ...this.headers, ...init.headers },\n    });\n    if (!res.ok) throw new Error(`HTTP \${res.status}`);\n    const raw: unknown = await res.json();\n    return schema.parse(raw); // 失敗時は ZodError をスロー\n  }\n\n  get<T>(path: string, schema: z.ZodType<T>): Promise<T> {\n    return this.request(path, { method: 'GET' }, schema);\n  }\n\n  post<TBody, TRes>(\n    path: string, body: TBody, schema: z.ZodType<TRes>\n  ): Promise<TRes> {\n    return this.request(\n      path,\n      { method: 'POST', body: JSON.stringify(body) },\n      schema,\n    );\n  }\n}\n\nconst client = new ApiClient('https://api.example.com', {\n  Authorization: 'Bearer token',\n});\nconst tasks = await client.get('/tasks', z.array(TaskSchema));"

    code: "// @log デコレータを実装してください（Stage 3スタイル）\nfunction log(target: unknown, context: ClassMethodDecoratorContext) {\n  // ...\n}\n\nclass TaskService {\n  @log\n  async create(title: string, priority: number): Promise<{ id: string }> {\n    return { id: Math.random().toString(36).slice(2) };\n  }\n}",

    q: "@retry(times, delayMs) デコレータを作成してください。\n非同期メソッドが失敗（Promise.reject）した場合、指定回数リトライし、全回失敗したら最後のエラーをスローすること。",
    code: "// @retry(3, 500) のように使えるデコレータを実装してください",
    answer: "function retry(times: number, delayMs = 0) {\n  return function <T extends (...args: any[]) => Promise<any>>(\n    target: T,\n    _context: ClassMethodDecoratorContext\n  ): T {\n    return async function (this: unknown, ...args: Parameters<T>): Promise<Awaited<ReturnType<T>>> {\n      let lastError: unknown;\n      for (let attempt = 0; attempt <= times; attempt++) {\n        try {\n          return await target.apply(this, args);\n        } catch (e) {\n          lastError = e;\n          if (attempt < times) {\n            console.warn(`リトライ \${attempt + 1}/\${times}...`);\n            if (delayMs > 0) await new Promise(r => setTimeout(r, delayMs));\n          }\n        }\n      }\n      throw lastError;\n    } as T;\n  };\n}\n\nclass EmailService {\n  private failCount = 0;\n\n  @retry(3, 100)\n  async send(to: string): Promise<void> {\n    if (this.failCount++ < 2) throw new Error('SMTP error');\n    console.log(`送信成功: \${to}`);\n  }\n}\n\nconst svc = new EmailService();\nawait svc.send('test@example.com'); // 2回失敗後に成功"

    q: "neverthrow を使わずに Result 型と ResultAsync 型を自作してください。\n・ok<T>(v) / err<E>(e) ヘルパー\n・ResultAsync<T,E> — Promise<Result<T,E>> のエイリアス\n・tryAsync<T>(fn) — 非同期関数を実行しResultAsyncで包む関数",
    code: "// Result型 / ResultAsync型 / tryAsync を実装してください",
    answer: "type Ok<T> = { ok: true; value: T };\ntype Err<E> = { ok: false; error: E };\ntype Result<T, E = Error> = Ok<T> | Err<E>;\ntype ResultAsync<T, E = Error> = Promise<Result<T, E>>;\n\nfunction ok<T>(value: T): Ok<T> {\n  return { ok: true, value };\n}\n\nfunction err<E>(error: E): Err<E> {\n  return { ok: false, error };\n}\n\nasync function tryAsync<T>(\n  fn: () => Promise<T>\n): ResultAsync<T, Error> {\n  try {\n    return ok(await fn());\n  } catch (e) {\n    return err(e instanceof Error ? e : new Error(String(e)));\n  }\n}\n\n// 使用例\nasync function fetchConfig(url: string): ResultAsync<unknown, Error> {\n  return tryAsync(async () => {\n    const res = await fetch(url);\n    if (!res.ok) throw new Error(`HTTP \${res.status}`);\n    return res.json();\n  });\n}\n\nconst result = await fetchConfig('https://api.example.com/config');\nif (result.ok) {\n  console.log(result.value);\n} else {\n  console.error(result.error.message);\n}"

    code: "// MyAwaited<T> と AsyncReturnType<F> を条件型+inferで実装",
    answer: "// Awaited の自前実装\ntype MyAwaited<T> =\n  T extends null | undefined\n    ? T\n    : T extends object & { then(fn: infer F, ...args: any[]): any }\n      ? F extends (value: infer V, ...args: any[]) => any\n        ? MyAwaited<V>\n        : never\n      : T;\n\n// テスト\ntype A = MyAwaited<Promise<string>>;         // string\ntype B = MyAwaited<Promise<Promise<number>>>; // number\ntype C = MyAwaited<boolean>;                  // boolean\n\n// 非同期関数の戻り値型\ntype AsyncReturnType<F extends (...args: any[]) => Promise<any>> =\n  MyAwaited<ReturnType<F>>;\n\n// テスト\nasync function getUser(id: string) {\n  return { id, name: 'Alice', createdAt: new Date() };\n}\n\ntype User = AsyncReturnType<typeof getUser>;\n// { id: string; name: string; createdAt: Date }\n\n// ユースケース: APIハンドラーの戻り値型を逆算\nasync function fetchPost(id: number) {\n  return { id, title: '記事', body: '本文', tags: ['ts'] };\n}\ntype Post = AsyncReturnType<typeof fetchPost>;"

    body: "Python のデコレータは「関数を受け取り関数を返す高階関数」として非常にシンプルに実装できます。TypeScript も構文は @decorator と同様ですが、対象（クラス、メソッド、プロパティ、アクセサ）によってデコレータが受け取る引数が異なり、やや複雑です。\n\nTypeScript のデコレータには「旧式（experimentalDecorators: true）」と「Stage 3（TC39 提案、TypeScript 5.0+）」の 2 種類があります。旧式は emitDecoratorMetadata と reflect-metadata を使った DI（依存性注入）で広く使われてきましたが、Stage 3 は tc39 で標準化が進む新仕様であり、context オブジェクトで豊富なメタ情報を受け取れます。NestJS など多くのフレームワークはまだ旧式を使っていますが、新規プロジェクトでは Stage 3 を選ぶべきです。\n\nPython との最大の違いは「TypeScript のデコレータは実行時コードである」点です。TS はコンパイルすると JS になりますが、デコレータのコードは JS にも残り、クラス定義時に実行されます。つまりデコレータは「型レベルの機能」ではなく「ランタイムの機能」です。型の変換は行えますが主目的ではなく、主に振る舞いの変更・メタデータ付与に使われます。",

    code: "// Stage 3 メソッドデコレータ: メモ化\nfunction memoize<T extends (...args: any[]) => any>(\n  target: T,\n  context: ClassMethodDecoratorContext\n): T {\n  const cache = new Map<string, ReturnType<T>>();\n  return function (this: unknown, ...args: Parameters<T>): ReturnType<T> {\n    const key = JSON.stringify(args);\n    if (cache.has(key)) {\n      console.log(`[\${String(context.name)}] キャッシュヒット`);\n      return cache.get(key)!;\n    }\n    const result = target.apply(this, args) as ReturnType<T>;\n    cache.set(key, result);\n    return result;\n  } as T;\n}\n\nclass MathService {\n  @memoize\n  fibonacci(n: number): number {\n    if (n <= 1) return n;\n    return this.fibonacci(n - 1) + this.fibonacci(n - 2);\n  }\n}\n\nconst svc = new MathService();\nsvc.fibonacci(10); // 計算\nsvc.fibonacci(10); // キャッシュヒット",

    body: "async 関数は必ず Promise を返します。async function greet(): Promise<string> と宣言した関数の中で return 'hello' と書いても、外から見た型は Promise<string> です。TypeScript はこの Promise のラップを自動で型に反映します。\n\nAwaited<T> は TypeScript 4.5 で導入された組み込みユーティリティ型で、Promise<Promise<string>> のようにネストした Promise の最終的な解決値（string）を取り出します。以前は UnwrapPromise や Unpacked という自作型が使われていましたが、現在は Awaited<T> が標準です。条件型と infer を再帰的に使って実装されており、前章で学んだ技術の応用例です。\n\nAsync Generator（async function*）や for await...of も TypeScript では AsyncGenerator<T, TReturn, TNext> という型が付いています。Python の async for や asyncio.gather() に対応する操作も、TypeScript では Promise.all([...]) に型が付き、[T1, T2, T3] のようなタプル型として推論されます。Promise.all の型推論は TypeScript の型システムの中でも特に洗練された部分の一つです。",

    title: "neverthrow で非同期エラーを型で管理する",
    body: "初級コースで自作した Result 型は、neverthrow ライブラリを使うとより体系的に扱えます。neverthrow は ok(value) / err(error) でラップし、.map() .mapErr() .andThen() .orElse() などのメソッドチェーンで Result を変換できます。Python の Optional や Either モナドに近い概念です。\n\nneverthrow の最大の利点は ResultAsync<T, E>（Promise<Result<T, E>> のラッパー）の存在です。.andThen() で非同期な変換をチェーンできるため、try/catch をネストしなくても複数の非同期操作を安全につなげられます。エラーが起きた時点でチェーンが短絡するため、Python の with contextlib.suppress(...): に似た宣言的なスタイルになります。\n\n実務での採用基準は「エラーの種類が型で重要かどうか」です。エラー内容がログに流すだけで良い場合は try/catch で十分ですが、エラーの種類によって処理を分岐する必要がある場合（NotFoundError なら 404 を返す、ValidationError なら 400 を返すなど）は Result 型のメリットが顕著です。",
    code: "// neverthrow を使った型安全な非同期処理\nimport { ok, err, ResultAsync } from 'neverthrow';\nimport { z } from 'zod';\n\nclass NotFoundError extends Error { constructor(id: string) { super(`Not found: \${id}`); } }\nclass ValidationError extends Error { constructor(msg: string) { super(msg); } }\n\nconst UserSchema = z.object({ id: z.string(), name: z.string() });\ntype User = z.infer<typeof UserSchema>;\n\nfunction fetchUser(id: string): ResultAsync<User, NotFoundError | ValidationError> {\n  return ResultAsync.fromPromise(\n    fetch(`/api/users/\${id}`).then(r => r.json()),\n    (e) => new NotFoundError(id),\n  ).andThen((raw) => {\n    const result = UserSchema.safeParse(raw);\n    return result.success ? ok(result.data) : err(new ValidationError('Invalid user'));\n  });\n}\n\n// 使用例\nconst result = await fetchUser('123');\nif (result.isOk()) {\n  console.log(result.value.name); // User 型\n} else if (result.error instanceof NotFoundError) {\n  console.log('404:', result.error.message);\n} else {\n  console.log('400:', result.error.message);\n}",

    body: "モノレポ（1 つのリポジトリに複数のパッケージを持つ構成）では、TypeScript の Project References が重要になります。composite: true を設定したプロジェクトは他のプロジェクトから参照でき、tsc --build が依存関係を解決して正しい順序でビルドします。Turborepo や Nx のようなモノレポツールはこの仕組みを利用して並列ビルドを実現しています。\n\nProject References の中核は .tsbuildinfo ファイルです。このファイルにはビルド時の型チェック結果がキャッシュされており、変更がないファイルは次のビルドでスキップされます。大規模プロジェクトでは型チェックが数分かかることがありますが、インクリメンタルビルドにより変更ファイルのみチェックするため、日常の開発では数秒に短縮できます。\n\nパフォーマンス改善の観点から、skipLibCheck: true で node_modules の .d.ts をスキップ、isolatedModules: true で単一ファイルのトランスパイル可能性を保証（esbuild との相性向上）、incremental: true でインクリメンタルビルドを有効にする、の 3 つが基本設定です。型チェックが遅い場合は tsc --diagnostics で Instantiations カウントを確認し、複雑な条件型の多用が原因でないか調べてください。",

    body: "Prisma は TypeScript 向けの ORM で、schema.prisma ファイルからデータベースの CRUD 操作の型と実装を自動生成します。Python の SQLAlchemy や Django ORM に相当しますが、型安全性において圧倒的に優れており、prisma.user.findMany() の戻り値型が自動推論されます。\n\n実務では Prisma の型だけでなく、入力バリデーション（Create 時は id 不要など）に Zod スキーマが必要です。zod-prisma-types や prisma-zod-generator というツールを使うと、schema.prisma から Zod スキーマを自動生成できます。これにより「DB スキーマ → Zod スキーマ → tRPC の input バリデーション → クライアントの型」が一貫して管理されます。\n\nTurborepo モノレポを使う場合、packages/db（Prisma）、packages/shared（Zod スキーマ・共通型）、apps/server（tRPC サーバー）、apps/web（フロントエンド）という構成が定番です。型の流れは「Prisma schema → 生成された型 → Zod スキーマ → tRPC router → クライアント型推論」となり、DB の変更がフロントエンドまで型エラーとして伝播します。",
    code: "// schema.prisma の例\n// model User {\n//   id        String   @id @default(cuid())\n//   name      String\n//   email     String   @unique\n//   createdAt DateTime @default(now())\n//   tasks     Task[]\n// }\n\n// Prisma が生成する型（自動）\n// type User = { id: string; name: string; email: string; createdAt: Date }\n\n// packages/shared/src/schemas.ts\nimport { z } from 'zod';\n\nexport const CreateUserInput = z.object({\n  name: z.string().min(1).max(100),\n  email: z.string().email(),\n});\n\nexport const UpdateUserInput = CreateUserInput.partial();\nexport type CreateUserInput = z.infer<typeof CreateUserInput>;\n\n// packages/server/src/router/user.ts\nimport { TRPCError } from '@trpc/server';\nimport { CreateUserInput } from '@myapp/shared';\nimport { prisma } from '../db';\nimport { t } from '../trpc';\n\nexport const userRouter = t.router({\n  create: t.procedure\n    .input(CreateUserInput)   // Zodスキーマでバリデーション\n    .mutation(async ({ input }) => {\n      try {\n        return await prisma.user.create({ data: input });\n      } catch {\n        throw new TRPCError({ code: 'CONFLICT', message: 'Email already used' });\n      }\n    }),\n  list: t.procedure.query(() => prisma.user.findMany()),\n});",
    afterCode: "コース完了後に目指す状態: DB スキーマ変更 → Prisma generate → 型エラー検出 → フロントエンド修正というサイクルを型に導かれながら行えるようになります。これが TypeScript フルスタックの最大の恩恵です。"
  }]
}];
