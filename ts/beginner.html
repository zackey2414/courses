    answer: "type Success<T> = { ok: true; value: T };\ntype Failure<E> = { ok: false; error: E };\ntype Result<T, E = Error> = Success<T> | Failure<E>;\n\nfunction ok<T>(value: T): Success<T> {\n  return { ok: true, value };\n}\n\nfunction err<E>(error: E): Failure<E> {\n  return { ok: false, error };\n}\n\nfunction divide(a: number, b: number): Result<number, string> {\n  if (b === 0) {\n    return err('0で割ることはできません');\n  }\n  return ok(a / b);\n}\n\nconst result = divide(10, 3);\nif (result.ok) {\n  console.log('結果:', result.value);  // 型は number\n} else {\n  console.log('エラー:', result.error); // 型は string\n}"

    q: "カスタムエラークラスの階層を作成してください。\n・AppError（基底クラス）: code と message を持つ\n・NotFoundError: id を追加\n・ValidationError: field と reason を追加\n・FileIOError: path を追加\ninstanceof で型を絞り込む handleError 関数も書いてください。",
    code: "// カスタムエラークラス階層の定義",
    answer: "class AppError extends Error {\n  constructor(\n    public readonly code: string,\n    message: string,\n  ) {\n    super(message);\n    this.name = this.constructor.name;\n  }\n}\n\nclass NotFoundError extends AppError {\n  constructor(public readonly id: string) {\n    super('NOT_FOUND', `ID \"\${id}\" が見つかりません`);\n  }\n}\n\nclass ValidationError extends AppError {\n  constructor(\n    public readonly field: string,\n    public readonly reason: string,\n  ) {\n    super('VALIDATION', `\${field}: \${reason}`);\n  }\n}\n\nclass FileIOError extends AppError {\n  constructor(\n    public readonly path: string,\n    cause?: Error,\n  ) {\n    super('FILE_IO', `ファイル操作エラー: \${path}`);\n    if (cause) this.cause = cause;\n  }\n}\n\nfunction handleError(error: unknown): void {\n  if (error instanceof ValidationError) {\n    console.error(`入力エラー [\${error.field}]: \${error.reason}`);\n  } else if (error instanceof NotFoundError) {\n    console.error(`未検出: \${error.id}`);\n  } else if (error instanceof FileIOError) {\n    console.error(`IO障害: \${error.path}`);\n  } else if (error instanceof AppError) {\n    console.error(`アプリエラー [\${error.code}]: \${error.message}`);\n  } else {\n    console.error('予期しないエラー:', error);\n  }\n}\n\nhandleError(new ValidationError('title', '空文字は許可されません'));"
  }, {

    q: "ジェネリックな Repository<T> インターフェースを定義し、InMemoryRepository<T> で実装してください。\n・findAll(): T[]\n・findById(id: string): T | undefined\n・create(item: T): T\n・delete(id: string): boolean\nTask 型で使用例を書いてください。",

    answer: "interface Identifiable {\n  id: string;\n}\n\ninterface Repository<T extends Identifiable> {\n  findAll(): T[];\n  findById(id: string): T | undefined;\n  create(item: T): T;\n  delete(id: string): boolean;\n}\n\nclass InMemoryRepository<T extends Identifiable>\n  implements Repository<T>\n{\n  private items: Map<string, T> = new Map();\n\n  findAll(): T[] {\n    return [...this.items.values()];\n  }\n\n  findById(id: string): T | undefined {\n    return this.items.get(id);\n  }\n\n  create(item: T): T {\n    this.items.set(item.id, item);\n    return item;\n  }\n\n  delete(id: string): boolean {\n    return this.items.delete(id);\n  }\n}\n\ninterface Task extends Identifiable {\n  title: string;\n  status: 'todo' | 'done';\n}\n\nconst repo = new InMemoryRepository<Task>();\nrepo.create({ id: '1', title: '学習', status: 'todo' });\nconsole.log(repo.findById('1'));\nconsole.log(repo.findAll());"

    q: "Repository<T> に update と filter メソッドを追加してください。\n・update(id, changes): Partial<T> を受け取り、既存エントリをマージ更新\n・filter(predicate): 条件関数で絞り込み\nfilter の predicate は (item: T) => boolean 型にすること。",
    code: "// update と filter の追加実装",
    answer: "interface Identifiable {\n  id: string;\n}\n\ninterface Repository<T extends Identifiable> {\n  findAll(): T[];\n  findById(id: string): T | undefined;\n  create(item: T): T;\n  update(id: string, changes: Partial<Omit<T, 'id'>>): T | undefined;\n  delete(id: string): boolean;\n  filter(predicate: (item: T) => boolean): T[];\n}\n\nclass InMemoryRepository<T extends Identifiable>\n  implements Repository<T>\n{\n  private items = new Map<string, T>();\n\n  findAll(): T[] {\n    return [...this.items.values()];\n  }\n\n  findById(id: string): T | undefined {\n    return this.items.get(id);\n  }\n\n  create(item: T): T {\n    this.items.set(item.id, item);\n    return item;\n  }\n\n  update(id: string, changes: Partial<Omit<T, 'id'>>): T | undefined {\n    const existing = this.items.get(id);\n    if (!existing) return undefined;\n    const updated = { ...existing, ...changes };\n    this.items.set(id, updated);\n    return updated;\n  }\n\n  delete(id: string): boolean {\n    return this.items.delete(id);\n  }\n\n  filter(predicate: (item: T) => boolean): T[] {\n    return this.findAll().filter(predicate);\n  }\n}\n\n// 使用例\ninterface Task extends Identifiable {\n  title: string;\n  status: 'todo' | 'done';\n}\nconst repo = new InMemoryRepository<Task>();\nrepo.create({ id: '1', title: 'A', status: 'todo' });\nrepo.create({ id: '2', title: 'B', status: 'done' });\nrepo.update('1', { status: 'done' });\nconst done = repo.filter(t => t.status === 'done');\nconsole.log('完了タスク:', done);"
  }, {
    diff: 3,
    q: "FileRepository<T> を作成してください。\n・InMemoryRepositoryと同じインターフェースだが、変更のたびにJSONファイルに永続化\n・コンストラクタで filePath と zodスキーマ を受け取る\n・非同期メソッド（async/await）で実装\n・初回読み込みを init() メソッドで行うこと",
    code: "// FileRepository<T> の完全実装",
    answer: "import { readFile, writeFile } from 'fs/promises';\nimport { z } from 'zod';\n\ninterface Identifiable { id: string; }\n\nclass FileRepository<T extends Identifiable> {\n  private items = new Map<string, T>();\n\n  constructor(\n    private readonly filePath: string,\n    private readonly schema: z.ZodType<T[]>,\n  ) {}\n\n  async init(): Promise<void> {\n    try {\n      const raw = await readFile(this.filePath, 'utf-8');\n      const parsed = this.schema.parse(JSON.parse(raw));\n      parsed.forEach(item => this.items.set(item.id, item));\n    } catch {\n      this.items.clear();\n    }\n  }\n\n  private async persist(): Promise<void> {\n    const data = [...this.items.values()];\n    await writeFile(this.filePath, JSON.stringify(data, null, 2));\n  }\n\n  async findAll(): Promise<T[]> {\n    return [...this.items.values()];\n  }\n\n  async findById(id: string): Promise<T | undefined> {\n    return this.items.get(id);\n  }\n\n  async create(item: T): Promise<T> {\n    this.items.set(item.id, item);\n    await this.persist();\n    return item;\n  }\n\n  async update(id: string, changes: Partial<Omit<T, 'id'>>): Promise<T | undefined> {\n    const existing = this.items.get(id);\n    if (!existing) return undefined;\n    const updated = { ...existing, ...changes };\n    this.items.set(id, updated);\n    await this.persist();\n    return updated;\n  }\n\n  async delete(id: string): Promise<boolean> {\n    const result = this.items.delete(id);\n    if (result) await this.persist();\n    return result;\n  }\n}"
  }],

    q: "型安全な API クライアントクラスを作成してください。\n・ベースURLをコンストラクタで受け取る\n・get<T>(path, schema): zodスキーマでバリデーション付きGET\n・post<T>(path, body, schema): POST\n・共通ヘッダー設定\n・タイムアウト設定（AbortSignal）",
    code: "// ApiClient クラスの実装",
    answer: "import { z } from 'zod';\n\nclass ApiClient {\n  private headers: Record<string, string> = {\n    'Content-Type': 'application/json',\n  };\n\n  constructor(\n    private readonly baseUrl: string,\n    private readonly timeoutMs: number = 5000,\n  ) {}\n\n  setHeader(key: string, value: string): void {\n    this.headers[key] = value;\n  }\n\n  async get<T>(path: string, schema: z.ZodType<T>): Promise<T> {\n    const response = await fetch(`\${this.baseUrl}\${path}`, {\n      method: 'GET',\n      headers: this.headers,\n      signal: AbortSignal.timeout(this.timeoutMs),\n    });\n\n    if (!response.ok) {\n      throw new Error(`GET \${path} failed: \${response.status}`);\n    }\n\n    const json: unknown = await response.json();\n    return schema.parse(json);\n  }\n\n  async post<T>(\n    path: string,\n    body: unknown,\n    schema: z.ZodType<T>,\n  ): Promise<T> {\n    const response = await fetch(`\${this.baseUrl}\${path}`, {\n      method: 'POST',\n      headers: this.headers,\n      body: JSON.stringify(body),\n      signal: AbortSignal.timeout(this.timeoutMs),\n    });\n\n    if (!response.ok) {\n      throw new Error(`POST \${path} failed: \${response.status}`);\n    }\n\n    const json: unknown = await response.json();\n    return schema.parse(json);\n  }\n}\n\n// 使用例\nconst client = new ApiClient('https://jsonplaceholder.typicode.com');\nconst TodoSchema = z.object({\n  id: z.number(),\n  title: z.string(),\n  completed: z.boolean(),\n  userId: z.number(),\n});\n\nasync function main() {\n  const todo = await client.get('/todos/1', TodoSchema);\n  console.log(todo.title);\n}\n\nmain();"

    q: "リトライ機能付きの fetchWithRetry 関数を実装してください。\n・最大リトライ回数と遅延時間を設定可能\n・指数バックオフ（遅延が毎回倍になる）\n・リトライ対象のステータスコードを指定可能\n・Result 型で結果を返す",
    code: "// リトライ機能付きfetch",
    answer: "type Result<T, E = Error> =\n  | { ok: true; value: T }\n  | { ok: false; error: E };\n\ninterface RetryOptions {\n  maxRetries: number;\n  baseDelayMs: number;\n  retryableStatuses: number[];\n}\n\nconst DEFAULT_OPTIONS: RetryOptions = {\n  maxRetries: 3,\n  baseDelayMs: 1000,\n  retryableStatuses: [408, 429, 500, 502, 503, 504],\n};\n\nfunction sleep(ms: number): Promise<void> {\n  return new Promise(resolve => setTimeout(resolve, ms));\n}\n\nasync function fetchWithRetry<T>(\n  url: string,\n  schema: import('zod').ZodType<T>,\n  options: Partial<RetryOptions> = {},\n): Promise<Result<T, Error>> {\n  const opts = { ...DEFAULT_OPTIONS, ...options };\n  let lastError: Error | undefined;\n\n  for (let attempt = 0; attempt <= opts.maxRetries; attempt++) {\n    try {\n      if (attempt > 0) {\n        const delay = opts.baseDelayMs * Math.pow(2, attempt - 1);\n        console.log(`リトライ \${attempt}/\${opts.maxRetries} (\${delay}ms後)`);\n        await sleep(delay);\n      }\n\n      const response = await fetch(url, {\n        signal: AbortSignal.timeout(10000),\n      });\n\n      if (!response.ok) {\n        if (opts.retryableStatuses.includes(response.status)) {\n          lastError = new Error(`HTTP \${response.status}`);\n          continue;\n        }\n        return { ok: false, error: new Error(`HTTP \${response.status}`) };\n      }\n\n      const json: unknown = await response.json();\n      const parsed = schema.safeParse(json);\n      if (!parsed.success) {\n        return { ok: false, error: new Error(parsed.error.message) };\n      }\n      return { ok: true, value: parsed.data };\n    } catch (e) {\n      lastError = e instanceof Error ? e : new Error(String(e));\n    }\n  }\n\n  return { ok: false, error: lastError ?? new Error('Unknown error') };\n}"
  }],

    q: "バリデーションデコレータを作成してください。\n・@validateString: 文字列引数が空でないことを検証\n・@validateRange(min, max): 数値引数が範囲内であることを検証\nデコレータファクトリパターンを使うこと。",
    code: "// バリデーションデコレータの実装",
    answer: "function validateString(\n  target: any,\n  propertyKey: string,\n  descriptor: PropertyDescriptor,\n): PropertyDescriptor {\n  const original = descriptor.value;\n  descriptor.value = function (...args: any[]) {\n    for (let i = 0; i < args.length; i++) {\n      if (typeof args[i] === 'string' && args[i].trim() === '') {\n        throw new Error(\n          `\${propertyKey}: 引数\${i + 1}が空文字列です`\n        );\n      }\n    }\n    return original.apply(this, args);\n  };\n  return descriptor;\n}\n\nfunction validateRange(min: number, max: number) {\n  return function (\n    target: any,\n    propertyKey: string,\n    descriptor: PropertyDescriptor,\n  ): PropertyDescriptor {\n    const original = descriptor.value;\n    descriptor.value = function (...args: any[]) {\n      for (let i = 0; i < args.length; i++) {\n        if (typeof args[i] === 'number') {\n          if (args[i] < min || args[i] > max) {\n            throw new Error(\n              `\${propertyKey}: 引数\${i + 1}の値\${args[i]}は` +\n              `範囲外です (min:\${min}, max:\${max})`\n            );\n          }\n        }\n      }\n      return original.apply(this, args);\n    };\n    return descriptor;\n  };\n}\n\nclass TaskManager {\n  @validateString\n  createTask(title: string): void {\n    console.log(`作成: \${title}`);\n  }\n\n  @validateRange(1, 5)\n  setPriority(level: number): void {\n    console.log(`優先度: \${level}`);\n  }\n}\n\nconst mgr = new TaskManager();\nmgr.createTask('有効なタスク');\nmgr.setPriority(3);\n// mgr.createTask('');      // → Error\n// mgr.setPriority(10);     // → Error"

    code: "// ❌ catch の型が不明\nasync function loadConfig(path: string): Promise<Config> {\n  try {\n    const raw = await readFile(path, 'utf-8');\n    return JSON.parse(raw) as Config;\n  } catch (e) {\n    // e は unknown 型 — 何が飛んできたか不明\n    if (e instanceof SyntaxError) {\n      console.error('JSON パースエラー');\n    } else if (e instanceof Error) {\n      console.error('ファイルエラー:', e.message);\n    } else {\n      console.error('予期しないエラー:', e);\n    }\n    throw e; // 再スロー…呼び出し側も同じ問題に直面\n  }\n}",
    afterCode: "ポイント: Python の except には階層的な例外型（ValueError, IOError 等）があり、型で分岐できます。TS にも Error のサブクラスを作ることはできますが、catch 節で型を指定できない点が根本的に異なります。"
  }, {
    title: "Result 型パターン",
    body: "Result 型は Rust から輸入されたパターンで、「成功した場合の値」と「失敗した場合のエラー」をひとつのオブジェクトにまとめて返します。discriminated union（Ch2 で学習済み）を使い、ok: true なら成功、ok: false なら失敗と判別します。\n\n最大のメリットは「エラーが戻り値の型に現れる」ことです。Result<Task, NotFoundError | ValidationError> と書けば、この関数が返しうるエラーが一目瞭然で、呼び出し側は if (result.ok) で安全に分岐できます。try/catch のように「catch を書き忘れても動いてしまう」ということがありません。\n\nPython にはこの概念がそのまま存在しませんが、Optional[T] や tuple[T, Error | None] で似たようなことをする場合があります。TS では discriminated union の力で、成功パスではエラーフィールドにアクセスできない、失敗パスでは値フィールドにアクセスできない、という型レベルの保証が得られます。",
    code: "// Result 型の定義\ntype Result<T, E = Error> =\n  | { ok: true; value: T }\n  | { ok: false; error: E };\n\n// ヘルパー関数\nfunction ok<T>(value: T): Result<T, never> {\n  return { ok: true, value };\n}\n\nfunction err<E>(error: E): Result<never, E> {\n  return { ok: false, error };\n}\n\n// 使用例: タスクの検索\nfunction findTask(\n  tasks: Task[],\n  id: string,\n): Result<Task, string> {\n  const task = tasks.find(t => t.id === id);\n  if (!task) return err(`ID \"\${id}\" のタスクが見つかりません`);\n  return ok(task);\n}\n\n// 呼び出し側\nconst result = findTask(tasks, 'abc');\nif (result.ok) {\n  console.log(result.value.title); // value は Task 型\n} else {\n  console.error(result.error);     // error は string 型\n}",
    afterCode: "ポイント: ok() と err() のヘルパー関数を用意しておくと、Result の生成が簡潔になります。never 型を使うことで、ok<number>(42) の結果は Result<number, never> となり、エラー側にアクセスする必要がないことが型で表現されます。"
  }, {
    title: "カスタムエラークラス",
    body: "Result 型のエラー部分に文字列を使うのは手軽ですが、エラーの種類が増えてくると構造化されたエラークラスが欲しくなります。Python で Exception のサブクラスを作るのと同様に、TS でも Error を継承したカスタムエラークラスを定義できます。\n\nエラークラスの設計で重要なのは、共通の基底クラス（AppError）を用意し、エラーコードと人間が読めるメッセージの両方を持たせることです。エラーコードは API レスポンスやログで使い、メッセージはユーザーへの表示に使います。\n\nTypeScript の class は Python のクラスとほぼ同じ構文です。constructor の引数に public readonly を付けると、フィールド宣言と代入が同時に行えます。Python の dataclass(frozen=True) に近い簡潔さです。",
    code: "// 基底エラークラス\nclass AppError extends Error {\n  constructor(\n    public readonly code: string,\n    message: string,\n  ) {\n    super(message);\n    this.name = this.constructor.name;\n  }\n}\n\n// 具体的なエラークラス\nclass NotFoundError extends AppError {\n  constructor(public readonly entityId: string) {\n    super('NOT_FOUND', `ID \"\${entityId}\" が見つかりません`);\n  }\n}\n\nclass ValidationError extends AppError {\n  constructor(\n    public readonly field: string,\n    public readonly reason: string,\n  ) {\n    super('VALIDATION', `\${field}: \${reason}`);\n  }\n}\n\n// Result 型との組み合わせ\ntype TaskResult<T> = Result<T, AppError>;\n\nfunction updateTask(id: string, title: string): TaskResult<Task> {\n  if (!title.trim()) {\n    return err(new ValidationError('title', '空文字は許可されません'));\n  }\n  // ...\n}",
    afterCode: "ポイント: instanceof で型を絞り込めるのは class の利点です。plain object の discriminated union でも同じことはできますが、class なら stack trace も自動で付くため、デバッグ時に重宝します。"
  }, {
    title: "never 型と網羅性チェック",
    body: "TypeScript の never 型は「絶対に値を持たない型」です。関数が例外をスローして決して return しない場合や、switch 文で全パターンを処理した後の到達不能コードに使われます。\n\nnever の最も実用的な使い方は「exhaustive check（網羅性チェック）」です。discriminated union を switch で処理するとき、default ケースで assertNever(action) を呼ぶと、全ケースを処理していれば action は never 型に推論されて問題なし、処理漏れがあれば never に代入できない型エラーが出ます。\n\nこの技法は「将来アクション型を追加したとき、処理を書き忘れた箇所を自動検出する」ために不可欠です。Python にはこの仕組みがないため、新しい Enum メンバーを追加しても処理漏れに気づけず、実行時に else ブランチに落ちてしまうことがあります。",
    code: "// assertNever: 到達不能であることを保証する関数\nfunction assertNever(value: never, msg?: string): never {\n  throw new Error(msg ?? `Unexpected value: \${value}`);\n}\n\ntype Status = 'todo' | 'in-progress' | 'done';\n\nfunction statusEmoji(status: Status): string {\n  switch (status) {\n    case 'todo':        return '⬜';\n    case 'in-progress': return '🔵';\n    case 'done':        return '✅';\n    default:\n      return assertNever(status);\n      // 全ケース処理済みなので status は never 型\n      // 新しいステータスを追加すると、ここでエラー！\n  }\n}",
    afterCode: "ポイント: assertNever の戻り値が never なので、return assertNever(status) と書いても型エラーになりません。never はあらゆる型に代入可能（bottom type）なためです。"

    code: "// エンティティの基本制約\ninterface Identifiable {\n  id: string;\n}\n\n// リポジトリインターフェース\ninterface Repository<T extends Identifiable> {\n  findAll(): T[];\n  findById(id: string): T | undefined;\n  create(item: T): T;\n  update(id: string, changes: Partial<Omit<T, 'id'>>): T | undefined;\n  delete(id: string): boolean;\n  filter(predicate: (item: T) => boolean): T[];\n}\n\n// Task 型はこのインターフェースに適合する\ninterface Task extends Identifiable {\n  title: string;\n  status: 'todo' | 'done';\n  priority: 'low' | 'medium' | 'high';\n}\n\n// Repository<Task> として使える",

    title: "InMemoryRepository の実装",
    body: "まずはテストしやすいメモリ内実装を作ります。内部データストアとして Map<string, T> を使い、CRUD 操作を素直に実装します。Python で言えば dict を使ったシンプルなリポジトリです。\n\nTypeScript の Map は Python の dict とほぼ同じ API（set, get, has, delete, values）を持っています。entries() でイテレートできる点も同じです。ただし TS の Map はジェネリックで Map<K, V> と型パラメータを持つため、格納する型が明確です。\n\nupdate メソッドでは Object.assign やスプレッド構文（{ ...existing, ...changes }）を使ってフィールドをマージします。Python の {**dict1, **dict2} と同じ発想です。Partial<Omit<T, 'id'>> 型のおかげで、update に id を含めても型エラーになり、ID の変更を防げます。",
    code: "class InMemoryRepository<T extends Identifiable>\n  implements Repository<T>\n{\n  private items = new Map<string, T>();\n\n  findAll(): T[] {\n    return [...this.items.values()];\n  }\n\n  findById(id: string): T | undefined {\n    return this.items.get(id);\n  }\n\n  create(item: T): T {\n    this.items.set(item.id, item);\n    return item;\n  }\n\n  update(id: string, changes: Partial<Omit<T, 'id'>>): T | undefined {\n    const existing = this.items.get(id);\n    if (!existing) return undefined;\n    const updated: T = { ...existing, ...changes };\n    this.items.set(id, updated);\n    return updated;\n  }\n\n  delete(id: string): boolean {\n    return this.items.delete(id);\n  }\n\n  filter(predicate: (item: T) => boolean): T[] {\n    return [...this.items.values()].filter(predicate);\n  }\n}",

    title: "keyof と インデックスアクセス型",
    body: "TypeScript のジェネリクスがさらに強力になるのは、keyof と T[K] を組み合わせたときです。keyof T は「T のプロパティ名のユニオン」を返す型演算子で、Python には直接の対応物がありません（TypedDict.__annotations__.keys() が近いが実行時のみ）。\n\nこれを使うと「特定のフィールド名で検索する」「特定のフィールドの値を取り出す」といった操作を型安全に書けます。たとえば findBy<K extends keyof T>(key: K, value: T[K]) と定義すれば、findBy('status', 'todo') は OK ですが findBy('status', 42) は型エラーになります。キー名と値の型が連動して検証されるのです。\n\nこの技法はリポジトリに「動的なフィールド検索」を追加するときに威力を発揮します。全てのフィールドに対して個別の find メソッドを書く必要がなく、1 つのジェネリックメソッドで全パターンをカバーできます。",
    code: "class InMemoryRepository<T extends Identifiable> {\n  private items = new Map<string, T>();\n\n  // K は T のプロパティ名、value は T[K] の型\n  findBy<K extends keyof T>(key: K, value: T[K]): T[] {\n    return [...this.items.values()].filter(\n      item => item[key] === value\n    );\n  }\n\n  // ソート: key を指定してソート\n  sortBy<K extends keyof T>(key: K, order: 'asc' | 'desc' = 'asc'): T[] {\n    const items = [...this.items.values()];\n    return items.sort((a, b) => {\n      if (a[key] < b[key]) return order === 'asc' ? -1 : 1;\n      if (a[key] > b[key]) return order === 'asc' ? 1 : -1;\n      return 0;\n    });\n  }\n}\n\n// 使用例\nconst repo = new InMemoryRepository<Task>();\nrepo.findBy('status', 'todo');   // ✅ OK\nrepo.findBy('priority', 'high'); // ✅ OK\n// repo.findBy('status', 42);    // ❌ 型エラー！",

    code: "import 'reflect-metadata';\n\n// メタデータのキー\nconst INJECTABLE = Symbol('injectable');\n\n// クラスデコレータ: DI 対象としてマーク\nfunction Injectable(target: Function) {\n  Reflect.defineMetadata(INJECTABLE, true, target);\n}\n\n// 簡易DIコンテナ\nclass Container {\n  private registry = new Map<Function, any>();\n\n  register<T>(token: Function, instance: T): void {\n    this.registry.set(token, instance);\n  }\n\n  resolve<T>(token: new (...args: any[]) => T): T {\n    const existing = this.registry.get(token);\n    if (existing) return existing;\n\n    // コンストラクタの引数型を reflect-metadata で取得\n    const paramTypes: Function[] =\n      Reflect.getMetadata('design:paramtypes', token) || [];\n\n    const deps = paramTypes.map(dep => this.resolve(dep as any));\n    const instance = new token(...deps);\n    this.registry.set(token, instance);\n    return instance;\n  }\n}\n\n@Injectable\nclass Logger {\n  log(msg: string) { console.log(`[LOG] \${msg}`); }\n}\n\n@Injectable\nclass TaskService {\n  constructor(private logger: Logger) {}\n  add(title: string) { this.logger.log(`追加: \${title}`); }\n}",
