      answer: "struct MinHeap:\n    var data: UnsafePointer[Int]\n    var size: Int\n    var cap: Int\n\n    def __init__(out self):\n        self.cap = 16\n        self.size = 0\n        self.data = UnsafePointer[Int].alloc(self.cap)\n\n    def _swap(mut self, i: Int, j: Int):\n        var tmp = (self.data + i)[]\n        (self.data + i)[] = (self.data + j)[]\n        (self.data + j)[] = tmp\n\n    def _sift_up(mut self, idx: Int):\n        var i = idx\n        while i > 0:\n            var parent = (i - 1) // 2\n            if (self.data + i)[] < (self.data + parent)[]:\n                self._swap(i, parent)\n                i = parent\n            else:\n                break\n\n    def _sift_down(mut self, idx: Int):\n        var i = idx\n        while True:\n            var smallest = i\n            var left = 2 * i + 1\n            var right = 2 * i + 2\n            if left < self.size and (self.data + left)[] < (self.data + smallest)[]:\n                smallest = left\n            if right < self.size and (self.data + right)[] < (self.data + smallest)[]:\n                smallest = right\n            if smallest == i:\n                break\n            self._swap(i, smallest)\n            i = smallest\n\n    def push(mut self, val: Int):\n        if self.size == self.cap:\n            var new_cap = self.cap * 2\n            var new_data = UnsafePointer[Int].alloc(new_cap)\n            for i in range(self.size):\n                (new_data + i).init_pointee_move((self.data + i).take_pointee())\n            self.data.free()\n            self.data = new_data\n            self.cap = new_cap\n        (self.data + self.size).init_pointee_move(val)\n        self.size += 1\n        self._sift_up(self.size - 1)\n\n    def pop_min(mut self) -> Int:\n        var min_val = (self.data + 0)[]\n        self.size -= 1\n        (self.data + 0)[] = (self.data + self.size).take_pointee()\n        self._sift_down(0)\n        return min_val\n\n    def peek_min(self) -> Int:\n        return (self.data + 0)[]\n\n    def len(self) -> Int:\n        return self.size\n\n    def __del__(owned self):\n        for i in range(self.size):\n            (self.data + i).destroy_pointee()\n        self.data.free()\n\ndef main():\n    var h = MinHeap()\n    h.push(5)\n    h.push(2)\n    h.push(8)\n    h.push(1)\n    h.push(9)\n    h.push(3)\n    print(\"min:\", h.pop_min())  # 1\n    print(\"min:\", h.pop_min())  # 2\n    print(\"min:\", h.pop_min())  # 3\n    print(\"残り:\", h.len())     # 3"

      answer: "struct Vec[N: Int, T: DType]:\n    var data: SIMD[T, N]\n\n    def __init__(out self):\n        self.data = SIMD[T, N](0)\n\n    def __init__(out self, data: SIMD[T, N]):\n        self.data = data\n\n    @staticmethod\n    def splat(val: SIMD[T, 1]) -> Vec[N, T]:\n        return Vec[N, T](SIMD[T, N](val))\n\n    def __add__(self, other: Vec[N, T]) -> Vec[N, T]:\n        return Vec[N, T](self.data + other.data)\n\n    def __sub__(self, other: Vec[N, T]) -> Vec[N, T]:\n        return Vec[N, T](self.data - other.data)\n\n    def scale(self, s: SIMD[T, 1]) -> Vec[N, T]:\n        return Vec[N, T](self.data * s)\n\n    def dot(self, other: Vec[N, T]) -> SIMD[T, 1]:\n        return (self.data * other.data).reduce_add()\n\n    def norm_sq(self) -> SIMD[T, 1]:\n        return self.dot(self)\n\n    def describe(self) -> String:\n        return \"Vec(\" + String(self.data) + \")\"\n\ndef main():\n    var v1 = Vec[4, DType.float64](SIMD[DType.float64, 4](1, 2, 3, 4))\n    var v2 = Vec[4, DType.float64](SIMD[DType.float64, 4](5, 6, 7, 8))\n\n    var sum = v1 + v2\n    print(\"和:\", sum.describe())\n    print(\"ドット積:\", v1.dot(v2))\n    print(\"v1 ノルム二乗:\", v1.norm_sq())\n\n    var scaled = v1.scale(3.0)\n    print(\"3倍:\", scaled.describe())"

      code: "# ❌ 列方向アクセス（キャッシュミス多発）\ndef bad_access(data: UnsafePointer[Float64], rows: Int, cols: Int):\n    var sum: Float64 = 0\n    for col in range(cols):\n        for row in range(rows):\n            sum += (data + row * cols + col)[]  # ストライドが大きい\n    return sum\n\n# ✅ 行方向アクセス（キャッシュフレンドリー）\ndef good_access(data: UnsafePointer[Float64], rows: Int, cols: Int):\n    var sum: Float64 = 0\n    for row in range(rows):\n        for col in range(cols):\n            sum += (data + row * cols + col)[]  # 連続アクセス\n    return sum\n\n# ✅ SIMD + キャッシュフレンドリー\ndef simd_access(data: UnsafePointer[Float64], rows: Int, cols: Int):\n    alias W = 4\n    var total = SIMD[DType.float64, W](0)\n    for row in range(rows):\n        var i = 0\n        while i + W <= cols:\n            total += (data + row * cols + i).load[width=W]()\n            i += W\n    return total.reduce_add()",

      code: "# AoS: 直感的だがSIMD不向き\n# メモリ: [x0,y0,z0, x1,y1,z1, x2,y2,z2, ...]\nstruct ParticleAoS:\n    var x: Float32\n    var y: Float32\n    var z: Float32\n\n# SoA: SIMD向き\n# メモリ: [x0,x1,x2,..., y0,y1,y2,..., z0,z1,z2,...]\nstruct ParticlesSoA:\n    var x: UnsafePointer[Float32]\n    var y: UnsafePointer[Float32]\n    var z: UnsafePointer[Float32]\n    var count: Int\n\n    def __init__(out self, n: Int):\n        self.count = n\n        self.x = UnsafePointer[Float32].alloc(n)\n        self.y = UnsafePointer[Float32].alloc(n)\n        self.z = UnsafePointer[Float32].alloc(n)\n        for i in range(n):\n            (self.x + i).init_pointee_move(Float32(0))\n            (self.y + i).init_pointee_move(Float32(0))\n            (self.z + i).init_pointee_move(Float32(0))\n\n    def update_positions(mut self, dt: Float32):\n        alias W = 8\n        var i = 0\n        var dt_vec = SIMD[DType.float32, W](dt)\n        while i + W <= self.count:\n            var vx = (self.x + i).load[width=W]()\n            (self.x + i).store(vx + dt_vec)\n            i += W\n        while i < self.count:\n            (self.x + i)[] += dt\n            i += 1\n\n    def __del__(owned self):\n        for i in range(self.count):\n            (self.x + i).destroy_pointee()\n            (self.y + i).destroy_pointee()\n            (self.z + i).destroy_pointee()\n        self.x.free()\n        self.y.free()\n        self.z.free()"

\n\"\n        return s\n\ndef main():\n    var a = Mat[2, 3, DType.float64]()\n    a.set(0,0,1); a.set(0,1,2); a.set(0,2,3)\n    a.set(1,0,4); a.set(1,1,5); a.set(1,2,6)\n    print(a.describe())\n\n    var b = Mat[3, 2, DType.float64]()\n    b.set(0,0,7); b.set(0,1,8)\n    b.set(1,0,9); b.set(1,1,10)\n    b.set(2,0,11); b.set(2,1,12)\n    print(b.describe())\n\n    var c = a.matmul(b)\n    print(\"A * B =\")\n    print(c.describe())\n\n    var I = Mat[3, 3, DType.float64].identity()\n    print(\"I =\")\n    print(I.describe())"

((unit * unit).reduce_add(), 1.0, 1e-9, \"unit norm\")\n\n    t.report()"
