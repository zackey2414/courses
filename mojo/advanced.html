    def set(mut self, idx: Int, val: SIMD[T, 1]):

    var buf: UnsafePointer[T]
    var head: Int
    var tail: Int
    var count: Int

    def __init__(out self):
        self.buf = UnsafePointer[T].alloc(N)
        self.head = 0
        self.tail = 0
        self.count = 0

    def is_empty(self) -> Bool:
        return self.count == 0

    def is_full(self) -> Bool:
        return self.count == N

    def push(mut self, val: T):
        if self.is_full():
            return  # 満杯時は無視
        (self.buf + self.tail).init_pointee_copy(val)
        self.tail = (self.tail + 1) % N
        self.count += 1

    def pop(mut self) -> T:
        var val = (self.buf + self.head).take_pointee()
        self.head = (self.head + 1) % N
        self.count -= 1
        return val

    def __del__(owned self):
        for i in range(self.count):
            var idx = (self.head + i) % N
            (self.buf + idx).destroy_pointee()
        self.buf.free()

def tiled_matmul_kernel(
    A: DeviceBuffer[DType.float32],
    B: DeviceBuffer[DType.float32],

):
    var row = block_idx.y * TILE + thread_idx.y

    # 共有メモリ（タイル）

    var tileB = stack_allocation[TILE * TILE, DType.float32]()

    var sum: Float32 = 0

    # タイルごとにループ
    var num_tiles = (N + TILE - 1) // TILE
    for t in range(num_tiles):

        if row < N and (t * TILE + tx) < N:
            tileA[ty * TILE + tx] = A[row * N + t * TILE + tx]
        else:
            tileA[ty * TILE + tx] = 0

        # B のタイルをロード
        if (t * TILE + ty) < N and col < N:

        else:
            tileB[ty * TILE + tx] = 0

        barrier()

        # タイル内の積和
        for k in range(TILE):

        barrier()

    if row < N and col < N:
        C[row * N + col] = sum`,
