    code: "# struct SimpleList:\n#     var data: UnsafePointer[Int]\n#     var size: Int\n#     var capacity: Int\n#\n# var lst = SimpleList()\n# lst.append(10)\n# lst.append(20)\n# print(lst.get(0))  # 10",

    code: "# struct SimpleDict:\n#     ...\n#     def put(mut self, key: String, val: Int): ...\n#     def get(self, key: String) -> Int: ...\n#     def contains(self, key: String) -> Bool: ...",
    answer: "@value\nstruct Entry:\n    var key: String\n    var value: Int\n    var occupied: Bool\n\nstruct SimpleDict:\n    var buckets: List[Entry]\n    var capacity: Int\n    var size: Int\n\n    def __init__(out self, capacity: Int = 16):\n        self.capacity = capacity\n        self.size = 0\n        self.buckets = List[Entry]()\n        for i in range(capacity):\n            self.buckets.append(Entry(\"\", 0, False))\n\n    def _hash(self, key: String) -> Int:\n        var h: Int = 0\n        for i in range(len(key)):\n            h = h * 31 + ord(key[i])\n        return h % self.capacity\n\n    def put(mut self, key: String, val: Int):\n        var idx = self._hash(key)\n        for i in range(self.capacity):\n            var probe = (idx + i) % self.capacity\n            if not self.buckets[probe].occupied:\n                self.buckets[probe] = Entry(key, val, True)\n                self.size += 1\n                return\n            if self.buckets[probe].key == key:\n                self.buckets[probe].value = val\n                return\n\n    def get(self, key: String) raises -> Int:\n        var idx = self._hash(key)\n        for i in range(self.capacity):\n            var probe = (idx + i) % self.capacity\n            if not self.buckets[probe].occupied:\n                raise Error(\"Key not found: \" + key)\n            if self.buckets[probe].key == key:\n                return self.buckets[probe].value\n        raise Error(\"Key not found: \" + key)\n\n    def contains(self, key: String) -> Bool:\n        try:\n            _ = self.get(key)\n            return True\n        except:\n            return False\n\ndef main():\n    var d = SimpleDict()\n    d.put(\"alice\", 100)\n    d.put(\"bob\", 200)\n    d.put(\"charlie\", 300)\n    print(\"alice:\", d.get(\"alice\"))\n    print(\"bob:\", d.get(\"bob\"))\n    print(\"contains charlie:\", d.contains(\"charlie\"))\n    print(\"contains dave:\", d.contains(\"dave\"))"

    code: "# SIMD[DType.float64, 4] で4ピクセル同時に計算\n# 各ピクセルの反復回数を返す",
    answer: "alias WIDTH = 80\nalias MAX_ITER = 50\n\ndef mandelbrot_simd(\n    cx: SIMD[DType.float64, 4],\n    cy: SIMD[DType.float64, 4],\n) -> SIMD[DType.int32, 4]:\n    \"\"\"4ピクセル同時にマンデルブロ集合を計算\"\"\"\n    var zx = SIMD[DType.float64, 4](0.0)\n    var zy = SIMD[DType.float64, 4](0.0)\n    var count = SIMD[DType.int32, 4](0)\n    var one = SIMD[DType.int32, 4](1)\n    var four = SIMD[DType.float64, 4](4.0)\n\n    for i in range(MAX_ITER):\n        var zx2 = zx * zx\n        var zy2 = zy * zy\n        var mag2 = zx2 + zy2\n        var mask = mag2 < four  # まだ発散していないピクセル\n        if not mask.reduce_or():\n            break\n        count = count + mask.select(one, SIMD[DType.int32, 4](0))\n        var new_zx = zx2 - zy2 + cx\n        zy = SIMD[DType.float64, 4](2.0) * zx * zy + cy\n        zx = new_zx\n\n    return count\n\ndef main():\n    var chars = String(\" .:-=+*#%@\")\n    for row in range(24):\n        var cy_val = Float64(row) / 12.0 - 1.0\n        var line = String(\"\")\n        var col = 0\n        while col < WIDTH:\n            var cx = SIMD[DType.float64, 4](\n                Float64(col) / 30.0 - 2.0,\n                Float64(col + 1) / 30.0 - 2.0,\n                Float64(col + 2) / 30.0 - 2.0,\n                Float64(col + 3) / 30.0 - 2.0,\n            )\n            var cy = SIMD[DType.float64, 4](cy_val)\n            var iters = mandelbrot_simd(cx, cy)\n            for j in range(4):\n                var idx = Int(iters[j]) % len(chars)\n                line += chars[idx]\n            col += 4\n        print(line)"
