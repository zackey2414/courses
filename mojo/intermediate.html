    var _error: String
    var _has_value: Bool

        return self._has_value

    def is_err(self) -> Bool:
        return not self._has_value

    def unwrap(self) raises -> T:
        if self._has_value:
            return self._value
        raise Error(self._error)

        if self._has_value:

    def __init__(out self): pass

    def sort(self, mut data: List[Int]):

                    var tmp = data[j]
                    data[j] = data[j + 1]

    def __init__(out self): pass

    def sort(self, mut data: List[Int]):
        for i in range(len(data)):
            var min_idx = i
            for j in range(i + 1, len(data)):
                if data[j] < data[min_idx]:
                    min_idx = j
            if min_idx != i:

                data[i] = data[min_idx]
                data[min_idx] = tmp

    """固定サイズのリングバッファ。"""
    var data: List[T]

        for i in range(N):

        self.data[idx] = val
        if self.size < N:

        else:

    def get(self, idx: Int) -> T:

    var data: List[Int]

    def __init__(out self):
        self.data = List[Int]()

    def _parent(self, i: Int) -> Int: return (i - 1) // 2
    def _left(self, i: Int) -> Int: return 2 * i + 1
    def _right(self, i: Int) -> Int: return 2 * i + 2

    def _swap(mut self, i: Int, j: Int):
        var tmp = self.data[i]
        self.data[i] = self.data[j]
        self.data[j] = tmp

    def _sift_up(mut self, mut idx: Int):
        while idx > 0 and self.data[idx] < self.data[self._parent(idx)]:
            self._swap(idx, self._parent(idx))
            idx = self._parent(idx)

    def _sift_down(mut self, mut idx: Int):
        var size = len(self.data)
        while self._left(idx) < size:
            var smallest = idx
            var l = self._left(idx)
            var r = self._right(idx)
            if l < size and self.data[l] < self.data[smallest]:
                smallest = l
            if r < size and self.data[r] < self.data[smallest]:
                smallest = r
            if smallest == idx:
                break
            self._swap(idx, smallest)
            idx = smallest

    def push(mut self, val: Int):
        self.data.append(val)
        var idx = len(self.data) - 1
        self._sift_up(idx)

    def pop_min(mut self) raises -> Int:
        if len(self.data) == 0:
            raise Error("Heap is empty")
        var min_val = self.data[0]
        var last = self.data.pop()
        if len(self.data) > 0:
            self.data[0] = last
            var idx = 0
            self._sift_down(idx)
        return min_val

    def __len__(self) -> Int:
        return len(self.data)
