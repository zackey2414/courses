    var data: List[Float64]
    var size: Int
    def __init__(out self, owned data: List[Float64]):
        self.size = len(data); self.data = data^
    fn mean(self) -> Float64:
        var t: Float64 = 0.0
        for i in range(self.size): t += self.data[i]
        return t / Float64(self.size)
    fn variance(self) -> Float64:
        var avg = self.mean(); var t: Float64 = 0.0
        for i in range(self.size):
            var d = self.data[i] - avg; t += d * d
        return t / Float64(self.size)
    fn std_dev(self) -> Float64: return self.variance() ** 0.5
    fn min_val(self) -> Float64:
        var m = self.data[0]
        for i in range(1, self.size):
            if self.data[i] < m: m = self.data[i]
        return m
    fn max_val(self) -> Float64:
        var m = self.data[0]
        for i in range(1, self.size):
            if self.data[i] > m: m = self.data[i]
        return m

struct Matrix(Describable):
    var rows: Int; var cols: Int; var data: List[Float64]
    def __init__(out self, rows: Int, cols: Int):
        self.rows = rows; self.cols = cols
        self.data = List[Float64]()
        for i in range(rows * cols): self.data.append(0.0)
    fn get(self, r: Int, c: Int) -> Float64:
        return self.data[r * self.cols + c]
    fn set(mut self, r: Int, c: Int, v: Float64):
        self.data[r * self.cols + c] = v
    fn matmul(self, other: Matrix) -> Matrix:
        var result = Matrix(self.rows, other.cols)
        for i in range(self.rows):
            for j in range(other.cols):
                var s: Float64 = 0.0
                for k in range(self.cols):
                    s += self.get(i, k) * other.get(k, j)
                result.set(i, j, s)
        return result
    fn describe(self) -> String:
        return "Matrix(" + String(self.rows) + "x" + String(self.cols) + ")"

fn print_info[T: Describable](item: T):
    print(item.describe())

def main():

    a.set(0,0,1.0); a.set(0,1,2.0); a.set(1,0,3.0); a.set(1,1,4.0)
