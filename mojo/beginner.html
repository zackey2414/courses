    answer: "struct Task:\n    var id: Int\n    var title: String\n    var status: String\n    var priority: Int\n    def __init__(out self, id: Int, title: String):\n        self.id = id; self.title = title\n        self.status = \"todo\"; self.priority = 1\n    def __init__(out self, id: Int, title: String, status: String, priority: Int):\n        self.id = id; self.title = title\n        self.status = status; self.priority = priority\n    def __copyinit__(out self, other: Self):\n        self.id = other.id; self.title = other.title\n        self.status = other.status; self.priority = other.priority\n    def to_csv(self) -> String:\n        return String(self.id) + \",\" + self.title + \",\" + self.status + \",\" + String(self.priority)\n    @staticmethod\n    def from_csv(line: String) raises -> Task:\n        var parts = line.split(\",\")\n        if len(parts) != 4: raise Error(\"bad CSV\")\n        return Task(Int(parts[0]), parts[1], parts[2], Int(parts[3]))\n\nstruct PersistentTaskList:\n    var tasks: List[Task]\n    var next_id: Int\n    var filepath: String\n\n    def __init__(out self, filepath: String):\n        self.tasks = List[Task]()\n        self.next_id = 1\n        self.filepath = filepath\n\n    def __enter__(mut self) -> ref [self] Self:\n        try:\n            with open(self.filepath, \"r\") as f:\n                var content = f.read()\n            var lines = content.split(\"\\n\")\n            for i in range(1, len(lines)):\n                var line = lines[i].strip()\n                if len(line) > 0:\n                    var t = Task.from_csv(line)\n                    if t.id >= self.next_id:\n                        self.next_id = t.id + 1\n                    self.tasks.append(t^)\n            print(\"[Load]\", len(self.tasks), \"件読込\")\n        except:\n            print(\"[Load] 新規作成\")\n        return self\n\n    def __exit__(mut self):\n        try:\n            with open(self.filepath, \"w\") as f:\n                f.write(\"id     answer: "trait Displayable:\n    def display(self) -> String: ...\n\nstruct Task(Displayable):\n    var id: Int\n    var title: String\n    var status: String\n    var priority: Int\n    def __init__(out self, id: Int, title: String):\n        self.id = id; self.title = title\n        self.status = \"todo\"; self.priority = 1\n    def __copyinit__(out self, other: Self):\n        self.id = other.id; self.title = other.title\n        self.status = other.status; self.priority = other.priority\n    def display(self) -> String:\n        return \"[P\" + String(self.priority) + \"/\" + self.status + \"] #\" + String(self.id) + \": \" + self.title\n\nstruct TaskList(Displayable):\n    var tasks: List[Task]\n    var name: String\n    def __init__(out self, name: String):\n        self.tasks = List[Task](); self.name = name\n    def add(mut self, task: Task):\n        self.tasks.append(task^)\n    def display(self) -> String:\n        var done = 0\n        for i in range(len(self.tasks)):\n            if self.tasks[i].status == \"done\":\n                done += 1\n        return self.name + \": \" + String(len(self.tasks)) + \"件 (完了: \" + String(done) + \"件)\"\n\ndef print_displayable[T: Displayable](item: T):\n    print(item.display())\n\ndef main():\n    var t1 = Task(1, \"買い物\")\n    var t2 = Task(2, \"レポート\")\n    t2.status = \"done\"\n\n    print_displayable(t1)\n    print_displayable(t2)\n\n    var tl = TaskList(\"マイタスク\")\n    tl.add(t1^)\n    tl.add(t2^)\n    print_displayable(tl)"

    code: "# trait Serializable:\n#     def serialize(self) -> String\n#     @staticmethod\n#     def deserialize(data: String) raises -> Self\n\n# CSVTask.serialize()  → \"1,買い物,todo,1\"\n# JSONTask.serialize() → \"{id:1,title:買い物,...}\"",
    answer: "struct CSVTask:\n    var id: Int\n    var title: String\n    var status: String\n    var priority: Int\n    def __init__(out self, id: Int, title: String):\n        self.id = id; self.title = title\n        self.status = \"todo\"; self.priority = 1\n    def __init__(out self, id: Int, title: String, status: String, priority: Int):\n        self.id = id; self.title = title\n        self.status = status; self.priority = priority\n\n    def serialize(self) -> String:\n        return String(self.id) + \",\" + self.title + \",\" + self.status + \",\" + String(self.priority)\n\n    @staticmethod\n    def deserialize(data: String) raises -> CSVTask:\n        var parts = data.split(\",\")\n        if len(parts) != 4: raise Error(\"bad CSV\")\n        return CSVTask(Int(parts[0]), parts[1], parts[2], Int(parts[3]))\n\nstruct TextTask:\n    var id: Int\n    var title: String\n    var status: String\n    var priority: Int\n    def __init__(out self, id: Int, title: String):\n        self.id = id; self.title = title\n        self.status = \"todo\"; self.priority = 1\n\n    def serialize(self) -> String:\n        return \"id=\" + String(self.id) + \";title=\" + self.title + \";status=\" + self.status + \";priority=\" + String(self.priority)\n\n    @staticmethod\n    def deserialize(data: String) raises -> TextTask:\n        var t = TextTask(0, \"\")\n        var pairs = data.split(\";\")\n        for i in range(len(pairs)):\n            var kv = pairs[i].split(\"=\")\n            if len(kv) != 2: continue\n            if kv[0] == \"id\": t.id = Int(kv[1])\n            elif kv[0] == \"title\": t.title = kv[1]\n            elif kv[0] == \"status\": t.status = kv[1]\n            elif kv[0] == \"priority\": t.priority = Int(kv[1])\n        return t\n\ndef main():\n    var csv_task = CSVTask(1, \"買い物\")\n    var csv_str = csv_task.serialize()\n    print(\"CSV:\", csv_str)\n\n    try:\n        var csv_restored = CSVTask.deserialize(csv_str)\n        print(\"CSV復元:\", csv_restored.title)\n    except e:\n        print(\"Error:\", e)\n\n    var txt_task = TextTask(2, \"レポート\")\n    var txt_str = txt_task.serialize()\n    print(\"Text:\", txt_str)\n\n    try:\n        var txt_restored = TextTask.deserialize(txt_str)\n        print(\"Text復元:\", txt_restored.title)\n    except e:\n        print(\"Error:\", e)"

    q: "所有権パターンを意識してTaskListのメソッドをリファクタリングしてください。\n以下の操作で適切な引数規約（read / mut / var）を選んでください:\n1. display_task(task) — 表示のみ → read\n2. complete_task(mut task) — ステータス変更 → mut\n3. add_task(var task) — リストに追加（所有権移動）→ var\n4. transfer_task(TaskList, TaskList, id) — リスト間移動\n\n【ポイント】引数規約の使い分け、所有権移動の実践",
    code: "# 各関数で適切な引数規約を選ぶ\n# ^ ムーブ演算子の活用",
    answer: "struct Task:\n    var id: Int\n    var title: String\n    var status: String\n    def __init__(out self, id: Int, title: String):\n        self.id = id; self.title = title; self.status = \"todo\"\n    def __copyinit__(out self, other: Self):\n        self.id = other.id; self.title = other.title; self.status = other.status\n    def __moveinit__(out self, owned other: Self):\n        self.id = other.id; self.title = other.title^; self.status = other.status^\n\n# 1. read: 表示のみ（変更なし）\ndef display_task(task: Task):\n    print(\"#\" + String(task.id) + \": \" + task.title + \" [\" + task.status + \"]\")\n\n# 2. mut: その場で変更\ndef complete_task(mut task: Task):\n    task.status = \"done\"\n\nstruct TaskList:\n    var tasks: List[Task]\n    var name: String\n\n    def __init__(out self, name: String):\n        self.tasks = List[Task](); self.name = name\n\n    # 3. owned (var): 所有権を受け取ってリストに追加\n    def add_task(mut self, owned task: Task):\n        print(self.name + \" に追加: \" + task.title)\n        self.tasks.append(task^)\n\n    # 4. リスト間移動\n    def remove_by_id(mut self, id: Int) raises -> Task:\n        for i in range(len(self.tasks)):\n            if self.tasks[i].id == id:\n                return self.tasks.pop(i)\n        raise Error(\"not found: \" + String(id))\n\n    def show_all(self):\n        print(\"--- \" + self.name + \" (\" + String(len(self.tasks)) + \"件) ---\")\n        for i in range(len(self.tasks)):\n            display_task(self.tasks[i])\n\ndef transfer_task(mut source: TaskList, mut dest: TaskList, id: Int) raises:\n    var task = source.remove_by_id(id)\n    dest.add_task(task^)\n\ndef main():\n    var inbox = TaskList(\"受信箱\")\n    var archive = TaskList(\"アーカイブ\")\n\n    inbox.add_task(Task(1, \"買い物\")^)\n    inbox.add_task(Task(2, \"レポート\")^)\n    inbox.add_task(Task(3, \"掃除\")^)\n\n    # mut で完了に変更\n    complete_task(inbox.tasks[0])\n    inbox.show_all()\n\n    # 完了タスクをアーカイブに移動\n    try:\n        transfer_task(inbox, archive, 1)\n    except e:\n        print(\"Error:\", e)\n\n    print(\"\")\n    inbox.show_all()\n    archive.show_all()"
